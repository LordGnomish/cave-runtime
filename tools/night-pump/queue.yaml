# Cave Runtime night-pump — batch dispatch queue
#
# Schema per batch:
#   id            unique batch identifier (also used as state.json key)
#   scope         one of: backend | ux | obs | adr-review
#   target_tests  expected new test count after batch lands
#   upstream      upstream project the batch ports / extends
#   pin_check     whether the upstream pin must be re-validated for this batch
#   dependency    list of batch IDs that must be Completed before this dispatches
#   priority      1 (low) … 10 (high). Higher dispatched first.
#   retry_max     how many retries before the batch stays Failed permanently (default 3)

