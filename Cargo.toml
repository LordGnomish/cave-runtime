[workspace]
resolver = "2"
members = [
    # === Shared Infrastructure ===
    "crates/cave-core",
    "crates/cave-auth",
    "crates/cave-db",
    "crates/cave-ebpf-common",
    # === Observability Stack ===
    "crates/cave-metrics",
    "crates/cave-logs",
    "crates/cave-trace",
    # === Phase 1: Quick Wins ===
    "crates/cave-flags",
    "crates/cave-secrets",
    "crates/cave-lint",
    "crates/cave-docs",
    "crates/cave-status",
    "crates/cave-changelog",
    "crates/cave-certs",
    # === Vault / Secrets Management ===
    "crates/cave-vault",
    # === Phase 2: Security Core ===
    "crates/cave-vulns",
    "crates/cave-sbom",
    "crates/cave-uptime",
    "crates/cave-cost",
    "crates/cave-sign",
    "crates/cave-forensics",
    # === Phase 3: Platform Intelligence ===
    "crates/cave-devlake",
    "crates/cave-ai-obs",
    "crates/cave-pii",
    "crates/cave-incidents",
    "crates/cave-chat",
    "crates/cave-slo",
    "crates/cave-alerts",
    "crates/cave-profiler",
    "crates/cave-trace",
    # === CI/CD ===
    "crates/cave-pipelines",
    # === Phase 4: Heavy Hitters ===
    "crates/cave-gateway",
    "crates/cave-registry",
    "crates/cave-workflows",
    "crates/cave-scan",
    "crates/cave-portal",
    "crates/cave-scaffold",
    "crates/cave-chaos",
    "crates/cave-policy",
    "crates/cave-dast",
    "crates/cave-backup",
    "crates/cave-rollouts",
    "crates/cave-pam",
    # === LLM Gateway ===
    "crates/cave-llm-gateway",
    # === Infrastructure & Networking ===
    "crates/cave-gateway",
    "crates/cave-dns",
    "crates/cave-mesh",
    "crates/cave-cluster",
    "crates/cave-ha",
    "crates/cave-infra",
    # === Data & Storage ===
    "crates/cave-pg",
    "crates/cave-cache",
    "crates/cave-store",
    "crates/cave-streams",
    # === Observability ===
    "crates/cave-metrics",
    "crates/cave-logs",
    "crates/cave-trace",
    # === Security & Admission ===
    "crates/cave-admission",
    "crates/cave-security",
    "crates/cave-vault",
    # === Developer Experience ===
    "crates/cave-cli",
    "crates/cave-dashboard",
    "crates/cave-docs-site",
    "crates/cave-deploy",
    "crates/cave-pipelines",
    "crates/cave-rollouts",
    # === Asset & Artifact Management ===
    "crates/cave-artifacts",
    # === Phase 5: Developer Experience ===
    # === Platform ===
    # === Infrastructure ===
    # === Runtime Binary ===
    "crates/cave-runtime",
    # === CLI ===
    "crates/cave-cli",
    # === Upstream Tracker ===
    "crates/cave-upstream",
    # === Issue Tracking ===
    "crates/cave-tracker",
    # === Platform Governance ===
    "crates/cave-runbook",
    "crates/cave-gitops-config",
    "crates/cave-compliance",
    "crates/cave-cost-alloc",
    # === Storage & Cache ===
    "crates/cave-cache",
    "crates/cave-store",
    # === Infrastructure ===
    "crates/cave-dns",
    "crates/cave-pg",
    # === Docs & Tracing ===
    "crates/cave-docs-site",
    "crates/cave-trace",
]

[workspace.package]
version = "0.1.0"
edition = "2024"
license = "Apache-2.0"
repository = "https://github.com/btartan/cave-runtime"
rust-version = "1.85"

[workspace.dependencies]
# Async runtime
tokio = { version = "1", features = ["full"] }
# Web framework
axum = { version = "0.8", features = ["macros"] }
tower = "0.5"
tower-http = { version = "0.6", features = ["cors", "trace", "compression-gzip"] }
# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
toml = "0.8"
# Database
deadpool-postgres = "0.14"
tokio-postgres = { version = "0.7", features = ["with-serde_json-1", "with-uuid-1", "with-chrono-0_4"] }
# Auth / JWT
jsonwebtoken = "9"
reqwest = { version = "0.12", features = ["json", "rustls-tls"], default-features = false }
# Observability
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }
opentelemetry = "0.27"
opentelemetry-otlp = "0.27"
prometheus-client = "0.23"
# Utilities
uuid = { version = "1", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
thiserror = "2"
anyhow = "1"
config = "0.14"
clap = { version = "4", features = ["derive"] }
# Security scanning
aho-corasick = "1"
regex = "1"
tree-sitter = "0.24"
# Kubernetes
kube = { version = "0.97", features = ["runtime", "derive"] }
k8s-openapi = { version = "0.23", features = ["latest"] }
# Crypto / Signing
ring = "0.17"
ed25519-dalek = "2"
# HTTP client (for upstream tracking, uptime probes)
reqwest-middleware = "0.4"
# Persistence
rusqlite = { version = "0.32", features = ["bundled"] }
async-trait = "0.1"
# Markdown rendering
pulldown-cmark = "0.12"
# Encoding
base64 = "0.22"
# Random number generation
rand = { version = "0.8", features = ["std"] }
# async traits

[profile.release]
opt-level = 3
lto = "thin"
strip = true
