# Log aggregation
groups:
  - name: cave-logs-slo
    interval: 30s
    rules:
      - alert: LogsSloBurnRateFast
        expr: |
          (
            sum(rate(loki_total{job="cave-logs",code=~"5.."}[1h]))
            /
            sum(rate(loki_total{job="cave-logs"}[1h]))
          ) > (14.4 * 0.001)
        for: 2m
        labels:
          severity: critical
          tenant_scoped: "true"
        annotations:
          summary: "cave-logs fast burn-rate (1h)"
          description: "5xx fraction is {{ $value | humanizePercentage }} — burning the 99.9% budget 14.4× faster than allowed."
          runbook_url: "https://docs.cave.dev/runbooks/cave-logs/slo-burn-fast.md"
      - alert: LogsSloBurnRateSlow
        expr: |
          (
            sum(rate(loki_total{job="cave-logs",code=~"5.."}[6h]))
            /
            sum(rate(loki_total{job="cave-logs"}[6h]))
          ) > (6 * 0.001)
        for: 15m
        labels:
          severity: warning
          tenant_scoped: "true"
        annotations:
          summary: "cave-logs slow burn-rate (6h)"
          description: "Sustained 5xx fraction over 6h."
          runbook_url: "https://docs.cave.dev/runbooks/cave-logs/slo-burn-slow.md"
      - alert: LogsErrorBudgetLow
        expr: |
          (
            1 -
            (sum(rate(loki_total{job="cave-logs",code=~"5.."}[7d]))
              / sum(rate(loki_total{job="cave-logs"}[7d])))
          ) < 0.999
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "cave-logs 7-day availability < 99.9%"
          description: "Trailing 7d availability = {{ $value | humanizePercentage }}."
          runbook_url: "https://docs.cave.dev/runbooks/cave-logs/error-budget.md"
      - alert: LogsLatencyP99High
        expr: |
          histogram_quantile(
            0.99,
            sum(rate(loki_duration_seconds_bucket{job="cave-logs"}[5m])) by (le)
          ) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "cave-logs p99 latency > 1s"
          description: "p99 = {{ $value }}s."
          runbook_url: "https://docs.cave.dev/runbooks/cave-logs/latency.md"
      - alert: LogsSaturationHigh
        expr: 'sum(loki_inflight_requests{job="cave-logs"}) > 400'
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "cave-logs inflight requests > 400"
          description: "Concurrent requests = {{ $value }}."
          runbook_url: "https://docs.cave.dev/runbooks/cave-logs/saturation.md"
      - alert: LogsMemoryPressure
        expr: 'process_resident_memory_bytes{job="cave-logs"} > 4 * 1024 * 1024 * 1024'
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "cave-logs RSS > 4 GiB"
          runbook_url: "https://docs.cave.dev/runbooks/cave-logs/memory.md"
      - alert: LogsCardinalityExplosion
        expr: 'count(count by (tenant_id) (loki_total{job="cave-logs"})) > 5000'
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "cave-logs tenant cardinality > 5000"
          description: "Count = {{ $value }}."
          runbook_url: "https://docs.cave.dev/runbooks/cave-logs/cardinality.md"
      - alert: LogsHealthProbeFailing
        expr: 'min(up{job="cave-logs"}) < 1'
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "cave-logs health probe failing"
          description: "At least one instance reports up == 0."
          runbook_url: "https://docs.cave.dev/runbooks/cave-logs/health.md"
