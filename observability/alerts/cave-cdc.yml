# Change-data capture
groups:
  - name: cave-cdc-slo
    interval: 30s
    rules:
      - alert: CdcSloBurnRateFast
        expr: |
          (
            sum(rate(cdc_total{job="cave-cdc",code=~"5.."}[1h]))
            /
            sum(rate(cdc_total{job="cave-cdc"}[1h]))
          ) > (14.4 * 0.001)
        for: 2m
        labels:
          severity: critical
          tenant_scoped: "true"
        annotations:
          summary: "cave-cdc fast burn-rate (1h)"
          description: "5xx fraction is {{ $value | humanizePercentage }} — burning the 99.9% budget 14.4× faster than allowed."
          runbook_url: "https://docs.cave.dev/runbooks/cave-cdc/slo-burn-fast.md"
      - alert: CdcSloBurnRateSlow
        expr: |
          (
            sum(rate(cdc_total{job="cave-cdc",code=~"5.."}[6h]))
            /
            sum(rate(cdc_total{job="cave-cdc"}[6h]))
          ) > (6 * 0.001)
        for: 15m
        labels:
          severity: warning
          tenant_scoped: "true"
        annotations:
          summary: "cave-cdc slow burn-rate (6h)"
          description: "Sustained 5xx fraction over 6h."
          runbook_url: "https://docs.cave.dev/runbooks/cave-cdc/slo-burn-slow.md"
      - alert: CdcErrorBudgetLow
        expr: |
          (
            1 -
            (sum(rate(cdc_total{job="cave-cdc",code=~"5.."}[7d]))
              / sum(rate(cdc_total{job="cave-cdc"}[7d])))
          ) < 0.999
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "cave-cdc 7-day availability < 99.9%"
          description: "Trailing 7d availability = {{ $value | humanizePercentage }}."
          runbook_url: "https://docs.cave.dev/runbooks/cave-cdc/error-budget.md"
      - alert: CdcLatencyP99High
        expr: |
          histogram_quantile(
            0.99,
            sum(rate(cdc_duration_seconds_bucket{job="cave-cdc"}[5m])) by (le)
          ) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "cave-cdc p99 latency > 1s"
          description: "p99 = {{ $value }}s."
          runbook_url: "https://docs.cave.dev/runbooks/cave-cdc/latency.md"
      - alert: CdcSaturationHigh
        expr: 'sum(cdc_inflight_requests{job="cave-cdc"}) > 400'
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "cave-cdc inflight requests > 400"
          description: "Concurrent requests = {{ $value }}."
          runbook_url: "https://docs.cave.dev/runbooks/cave-cdc/saturation.md"
      - alert: CdcMemoryPressure
        expr: 'process_resident_memory_bytes{job="cave-cdc"} > 4 * 1024 * 1024 * 1024'
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "cave-cdc RSS > 4 GiB"
          runbook_url: "https://docs.cave.dev/runbooks/cave-cdc/memory.md"
      - alert: CdcCardinalityExplosion
        expr: 'count(count by (tenant_id) (cdc_total{job="cave-cdc"})) > 5000'
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "cave-cdc tenant cardinality > 5000"
          description: "Count = {{ $value }}."
          runbook_url: "https://docs.cave.dev/runbooks/cave-cdc/cardinality.md"
      - alert: CdcHealthProbeFailing
        expr: 'min(up{job="cave-cdc"}) < 1'
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "cave-cdc health probe failing"
          description: "At least one instance reports up == 0."
          runbook_url: "https://docs.cave.dev/runbooks/cave-cdc/health.md"
