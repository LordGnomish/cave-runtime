# LLM gateway
groups:
  - name: cave-llm-gateway-slo
    interval: 30s
    rules:
      - alert: LlmGatewaySloBurnRateFast
        expr: |
          (
            sum(rate(llm_total{job="cave-llm-gateway",code=~"5.."}[1h]))
            /
            sum(rate(llm_total{job="cave-llm-gateway"}[1h]))
          ) > (14.4 * 0.001)
        for: 2m
        labels:
          severity: critical
          tenant_scoped: "true"
        annotations:
          summary: "cave-llm-gateway fast burn-rate (1h)"
          description: "5xx fraction is {{ $value | humanizePercentage }} — burning the 99.9% budget 14.4× faster than allowed."
          runbook_url: "https://docs.cave.dev/runbooks/cave-llm-gateway/slo-burn-fast.md"
      - alert: LlmGatewaySloBurnRateSlow
        expr: |
          (
            sum(rate(llm_total{job="cave-llm-gateway",code=~"5.."}[6h]))
            /
            sum(rate(llm_total{job="cave-llm-gateway"}[6h]))
          ) > (6 * 0.001)
        for: 15m
        labels:
          severity: warning
          tenant_scoped: "true"
        annotations:
          summary: "cave-llm-gateway slow burn-rate (6h)"
          description: "Sustained 5xx fraction over 6h."
          runbook_url: "https://docs.cave.dev/runbooks/cave-llm-gateway/slo-burn-slow.md"
      - alert: LlmGatewayErrorBudgetLow
        expr: |
          (
            1 -
            (sum(rate(llm_total{job="cave-llm-gateway",code=~"5.."}[7d]))
              / sum(rate(llm_total{job="cave-llm-gateway"}[7d])))
          ) < 0.999
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "cave-llm-gateway 7-day availability < 99.9%"
          description: "Trailing 7d availability = {{ $value | humanizePercentage }}."
          runbook_url: "https://docs.cave.dev/runbooks/cave-llm-gateway/error-budget.md"
      - alert: LlmGatewayLatencyP99High
        expr: |
          histogram_quantile(
            0.99,
            sum(rate(llm_duration_seconds_bucket{job="cave-llm-gateway"}[5m])) by (le)
          ) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "cave-llm-gateway p99 latency > 1s"
          description: "p99 = {{ $value }}s."
          runbook_url: "https://docs.cave.dev/runbooks/cave-llm-gateway/latency.md"
      - alert: LlmGatewaySaturationHigh
        expr: 'sum(llm_inflight_requests{job="cave-llm-gateway"}) > 400'
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "cave-llm-gateway inflight requests > 400"
          description: "Concurrent requests = {{ $value }}."
          runbook_url: "https://docs.cave.dev/runbooks/cave-llm-gateway/saturation.md"
      - alert: LlmGatewayMemoryPressure
        expr: 'process_resident_memory_bytes{job="cave-llm-gateway"} > 4 * 1024 * 1024 * 1024'
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "cave-llm-gateway RSS > 4 GiB"
          runbook_url: "https://docs.cave.dev/runbooks/cave-llm-gateway/memory.md"
      - alert: LlmGatewayCardinalityExplosion
        expr: 'count(count by (tenant_id) (llm_total{job="cave-llm-gateway"})) > 5000'
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "cave-llm-gateway tenant cardinality > 5000"
          description: "Count = {{ $value }}."
          runbook_url: "https://docs.cave.dev/runbooks/cave-llm-gateway/cardinality.md"
      - alert: LlmGatewayHealthProbeFailing
        expr: 'min(up{job="cave-llm-gateway"}) < 1'
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "cave-llm-gateway health probe failing"
          description: "At least one instance reports up == 0."
          runbook_url: "https://docs.cave.dev/runbooks/cave-llm-gateway/health.md"
