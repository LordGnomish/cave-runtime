# Forensic capture
groups:
  - name: cave-forensics-slo
    interval: 30s
    rules:
      - alert: ForensicsSloBurnRateFast
        expr: |
          (
            sum(rate(forensics_total{job="cave-forensics",code=~"5.."}[1h]))
            /
            sum(rate(forensics_total{job="cave-forensics"}[1h]))
          ) > (14.4 * 0.001)
        for: 2m
        labels:
          severity: critical
          tenant_scoped: "true"
        annotations:
          summary: "cave-forensics fast burn-rate (1h)"
          description: "5xx fraction is {{ $value | humanizePercentage }} — burning the 99.9% budget 14.4× faster than allowed."
          runbook_url: "https://docs.cave.dev/runbooks/cave-forensics/slo-burn-fast.md"
      - alert: ForensicsSloBurnRateSlow
        expr: |
          (
            sum(rate(forensics_total{job="cave-forensics",code=~"5.."}[6h]))
            /
            sum(rate(forensics_total{job="cave-forensics"}[6h]))
          ) > (6 * 0.001)
        for: 15m
        labels:
          severity: warning
          tenant_scoped: "true"
        annotations:
          summary: "cave-forensics slow burn-rate (6h)"
          description: "Sustained 5xx fraction over 6h."
          runbook_url: "https://docs.cave.dev/runbooks/cave-forensics/slo-burn-slow.md"
      - alert: ForensicsErrorBudgetLow
        expr: |
          (
            1 -
            (sum(rate(forensics_total{job="cave-forensics",code=~"5.."}[7d]))
              / sum(rate(forensics_total{job="cave-forensics"}[7d])))
          ) < 0.999
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "cave-forensics 7-day availability < 99.9%"
          description: "Trailing 7d availability = {{ $value | humanizePercentage }}."
          runbook_url: "https://docs.cave.dev/runbooks/cave-forensics/error-budget.md"
      - alert: ForensicsLatencyP99High
        expr: |
          histogram_quantile(
            0.99,
            sum(rate(forensics_duration_seconds_bucket{job="cave-forensics"}[5m])) by (le)
          ) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "cave-forensics p99 latency > 1s"
          description: "p99 = {{ $value }}s."
          runbook_url: "https://docs.cave.dev/runbooks/cave-forensics/latency.md"
      - alert: ForensicsSaturationHigh
        expr: 'sum(forensics_inflight_requests{job="cave-forensics"}) > 400'
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "cave-forensics inflight requests > 400"
          description: "Concurrent requests = {{ $value }}."
          runbook_url: "https://docs.cave.dev/runbooks/cave-forensics/saturation.md"
      - alert: ForensicsMemoryPressure
        expr: 'process_resident_memory_bytes{job="cave-forensics"} > 4 * 1024 * 1024 * 1024'
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "cave-forensics RSS > 4 GiB"
          runbook_url: "https://docs.cave.dev/runbooks/cave-forensics/memory.md"
      - alert: ForensicsCardinalityExplosion
        expr: 'count(count by (tenant_id) (forensics_total{job="cave-forensics"})) > 5000'
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "cave-forensics tenant cardinality > 5000"
          description: "Count = {{ $value }}."
          runbook_url: "https://docs.cave.dev/runbooks/cave-forensics/cardinality.md"
      - alert: ForensicsHealthProbeFailing
        expr: 'min(up{job="cave-forensics"}) < 1'
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "cave-forensics health probe failing"
          description: "At least one instance reports up == 0."
          runbook_url: "https://docs.cave.dev/runbooks/cave-forensics/health.md"
