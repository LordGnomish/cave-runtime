# Container runtime interface
groups:
  - name: cave-cri-slo
    interval: 30s
    rules:
      - alert: CriSloBurnRateFast
        expr: |
          (
            sum(rate(cri_operations_total{job="cave-cri",code=~"5.."}[1h]))
            /
            sum(rate(cri_operations_total{job="cave-cri"}[1h]))
          ) > (14.4 * 0.001)
        for: 2m
        labels:
          severity: critical
          tenant_scoped: "true"
        annotations:
          summary: "cave-cri fast burn-rate (1h)"
          description: "5xx fraction is {{ $value | humanizePercentage }} — burning the 99.9% budget 14.4× faster than allowed."
          runbook_url: "https://docs.cave.dev/runbooks/cave-cri/slo-burn-fast.md"
      - alert: CriSloBurnRateSlow
        expr: |
          (
            sum(rate(cri_operations_total{job="cave-cri",code=~"5.."}[6h]))
            /
            sum(rate(cri_operations_total{job="cave-cri"}[6h]))
          ) > (6 * 0.001)
        for: 15m
        labels:
          severity: warning
          tenant_scoped: "true"
        annotations:
          summary: "cave-cri slow burn-rate (6h)"
          description: "Sustained 5xx fraction over 6h."
          runbook_url: "https://docs.cave.dev/runbooks/cave-cri/slo-burn-slow.md"
      - alert: CriErrorBudgetLow
        expr: |
          (
            1 -
            (sum(rate(cri_operations_total{job="cave-cri",code=~"5.."}[7d]))
              / sum(rate(cri_operations_total{job="cave-cri"}[7d])))
          ) < 0.999
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "cave-cri 7-day availability < 99.9%"
          description: "Trailing 7d availability = {{ $value | humanizePercentage }}."
          runbook_url: "https://docs.cave.dev/runbooks/cave-cri/error-budget.md"
      - alert: CriLatencyP99High
        expr: |
          histogram_quantile(
            0.99,
            sum(rate(cri_operations_duration_seconds_bucket{job="cave-cri"}[5m])) by (le)
          ) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "cave-cri p99 latency > 1s"
          description: "p99 = {{ $value }}s."
          runbook_url: "https://docs.cave.dev/runbooks/cave-cri/latency.md"
      - alert: CriSaturationHigh
        expr: 'sum(cri_operations_inflight_requests{job="cave-cri"}) > 400'
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "cave-cri inflight requests > 400"
          description: "Concurrent requests = {{ $value }}."
          runbook_url: "https://docs.cave.dev/runbooks/cave-cri/saturation.md"
      - alert: CriMemoryPressure
        expr: 'process_resident_memory_bytes{job="cave-cri"} > 4 * 1024 * 1024 * 1024'
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "cave-cri RSS > 4 GiB"
          runbook_url: "https://docs.cave.dev/runbooks/cave-cri/memory.md"
      - alert: CriCardinalityExplosion
        expr: 'count(count by (tenant_id) (cri_operations_total{job="cave-cri"})) > 5000'
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "cave-cri tenant cardinality > 5000"
          description: "Count = {{ $value }}."
          runbook_url: "https://docs.cave.dev/runbooks/cave-cri/cardinality.md"
      - alert: CriHealthProbeFailing
        expr: 'min(up{job="cave-cri"}) < 1'
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "cave-cri health probe failing"
          description: "At least one instance reports up == 0."
          runbook_url: "https://docs.cave.dev/runbooks/cave-cri/health.md"
