# FinOps cost
groups:
  - name: cave-cost-slo
    interval: 30s
    rules:
      - alert: CostSloBurnRateFast
        expr: |
          (
            sum(rate(cost_total{job="cave-cost",code=~"5.."}[1h]))
            /
            sum(rate(cost_total{job="cave-cost"}[1h]))
          ) > (14.4 * 0.001)
        for: 2m
        labels:
          severity: critical
          tenant_scoped: "true"
        annotations:
          summary: "cave-cost fast burn-rate (1h)"
          description: "5xx fraction is {{ $value | humanizePercentage }} — burning the 99.9% budget 14.4× faster than allowed."
          runbook_url: "https://docs.cave.dev/runbooks/cave-cost/slo-burn-fast.md"
      - alert: CostSloBurnRateSlow
        expr: |
          (
            sum(rate(cost_total{job="cave-cost",code=~"5.."}[6h]))
            /
            sum(rate(cost_total{job="cave-cost"}[6h]))
          ) > (6 * 0.001)
        for: 15m
        labels:
          severity: warning
          tenant_scoped: "true"
        annotations:
          summary: "cave-cost slow burn-rate (6h)"
          description: "Sustained 5xx fraction over 6h."
          runbook_url: "https://docs.cave.dev/runbooks/cave-cost/slo-burn-slow.md"
      - alert: CostErrorBudgetLow
        expr: |
          (
            1 -
            (sum(rate(cost_total{job="cave-cost",code=~"5.."}[7d]))
              / sum(rate(cost_total{job="cave-cost"}[7d])))
          ) < 0.999
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "cave-cost 7-day availability < 99.9%"
          description: "Trailing 7d availability = {{ $value | humanizePercentage }}."
          runbook_url: "https://docs.cave.dev/runbooks/cave-cost/error-budget.md"
      - alert: CostLatencyP99High
        expr: |
          histogram_quantile(
            0.99,
            sum(rate(cost_duration_seconds_bucket{job="cave-cost"}[5m])) by (le)
          ) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "cave-cost p99 latency > 1s"
          description: "p99 = {{ $value }}s."
          runbook_url: "https://docs.cave.dev/runbooks/cave-cost/latency.md"
      - alert: CostSaturationHigh
        expr: 'sum(cost_inflight_requests{job="cave-cost"}) > 400'
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "cave-cost inflight requests > 400"
          description: "Concurrent requests = {{ $value }}."
          runbook_url: "https://docs.cave.dev/runbooks/cave-cost/saturation.md"
      - alert: CostMemoryPressure
        expr: 'process_resident_memory_bytes{job="cave-cost"} > 4 * 1024 * 1024 * 1024'
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "cave-cost RSS > 4 GiB"
          runbook_url: "https://docs.cave.dev/runbooks/cave-cost/memory.md"
      - alert: CostCardinalityExplosion
        expr: 'count(count by (tenant_id) (cost_total{job="cave-cost"})) > 5000'
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "cave-cost tenant cardinality > 5000"
          description: "Count = {{ $value }}."
          runbook_url: "https://docs.cave.dev/runbooks/cave-cost/cardinality.md"
      - alert: CostHealthProbeFailing
        expr: 'min(up{job="cave-cost"}) < 1'
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "cave-cost health probe failing"
          description: "At least one instance reports up == 0."
          runbook_url: "https://docs.cave.dev/runbooks/cave-cost/health.md"
