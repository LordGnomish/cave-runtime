# Metrics store
groups:
  - name: cave-metrics-slo
    interval: 30s
    rules:
      - alert: MetricsSloBurnRateFast
        expr: |
          (
            sum(rate(prom_total{job="cave-metrics",code=~"5.."}[1h]))
            /
            sum(rate(prom_total{job="cave-metrics"}[1h]))
          ) > (14.4 * 0.001)
        for: 2m
        labels:
          severity: critical
          tenant_scoped: "true"
        annotations:
          summary: "cave-metrics fast burn-rate (1h)"
          description: "5xx fraction is {{ $value | humanizePercentage }} — burning the 99.9% budget 14.4× faster than allowed."
          runbook_url: "https://docs.cave.dev/runbooks/cave-metrics/slo-burn-fast.md"
      - alert: MetricsSloBurnRateSlow
        expr: |
          (
            sum(rate(prom_total{job="cave-metrics",code=~"5.."}[6h]))
            /
            sum(rate(prom_total{job="cave-metrics"}[6h]))
          ) > (6 * 0.001)
        for: 15m
        labels:
          severity: warning
          tenant_scoped: "true"
        annotations:
          summary: "cave-metrics slow burn-rate (6h)"
          description: "Sustained 5xx fraction over 6h."
          runbook_url: "https://docs.cave.dev/runbooks/cave-metrics/slo-burn-slow.md"
      - alert: MetricsErrorBudgetLow
        expr: |
          (
            1 -
            (sum(rate(prom_total{job="cave-metrics",code=~"5.."}[7d]))
              / sum(rate(prom_total{job="cave-metrics"}[7d])))
          ) < 0.999
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "cave-metrics 7-day availability < 99.9%"
          description: "Trailing 7d availability = {{ $value | humanizePercentage }}."
          runbook_url: "https://docs.cave.dev/runbooks/cave-metrics/error-budget.md"
      - alert: MetricsLatencyP99High
        expr: |
          histogram_quantile(
            0.99,
            sum(rate(prom_duration_seconds_bucket{job="cave-metrics"}[5m])) by (le)
          ) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "cave-metrics p99 latency > 1s"
          description: "p99 = {{ $value }}s."
          runbook_url: "https://docs.cave.dev/runbooks/cave-metrics/latency.md"
      - alert: MetricsSaturationHigh
        expr: 'sum(prom_inflight_requests{job="cave-metrics"}) > 400'
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "cave-metrics inflight requests > 400"
          description: "Concurrent requests = {{ $value }}."
          runbook_url: "https://docs.cave.dev/runbooks/cave-metrics/saturation.md"
      - alert: MetricsMemoryPressure
        expr: 'process_resident_memory_bytes{job="cave-metrics"} > 4 * 1024 * 1024 * 1024'
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "cave-metrics RSS > 4 GiB"
          runbook_url: "https://docs.cave.dev/runbooks/cave-metrics/memory.md"
      - alert: MetricsCardinalityExplosion
        expr: 'count(count by (tenant_id) (prom_total{job="cave-metrics"})) > 5000'
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "cave-metrics tenant cardinality > 5000"
          description: "Count = {{ $value }}."
          runbook_url: "https://docs.cave.dev/runbooks/cave-metrics/cardinality.md"
      - alert: MetricsHealthProbeFailing
        expr: 'min(up{job="cave-metrics"}) < 1'
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "cave-metrics health probe failing"
          description: "At least one instance reports up == 0."
          runbook_url: "https://docs.cave.dev/runbooks/cave-metrics/health.md"
