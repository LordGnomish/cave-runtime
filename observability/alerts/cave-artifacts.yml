# Artifact store
groups:
  - name: cave-artifacts-slo
    interval: 30s
    rules:
      - alert: ArtifactsSloBurnRateFast
        expr: |
          (
            sum(rate(artifacts_total{job="cave-artifacts",code=~"5.."}[1h]))
            /
            sum(rate(artifacts_total{job="cave-artifacts"}[1h]))
          ) > (14.4 * 0.001)
        for: 2m
        labels:
          severity: critical
          tenant_scoped: "true"
        annotations:
          summary: "cave-artifacts fast burn-rate (1h)"
          description: "5xx fraction is {{ $value | humanizePercentage }} — burning the 99.9% budget 14.4× faster than allowed."
          runbook_url: "https://docs.cave.dev/runbooks/cave-artifacts/slo-burn-fast.md"
      - alert: ArtifactsSloBurnRateSlow
        expr: |
          (
            sum(rate(artifacts_total{job="cave-artifacts",code=~"5.."}[6h]))
            /
            sum(rate(artifacts_total{job="cave-artifacts"}[6h]))
          ) > (6 * 0.001)
        for: 15m
        labels:
          severity: warning
          tenant_scoped: "true"
        annotations:
          summary: "cave-artifacts slow burn-rate (6h)"
          description: "Sustained 5xx fraction over 6h."
          runbook_url: "https://docs.cave.dev/runbooks/cave-artifacts/slo-burn-slow.md"
      - alert: ArtifactsErrorBudgetLow
        expr: |
          (
            1 -
            (sum(rate(artifacts_total{job="cave-artifacts",code=~"5.."}[7d]))
              / sum(rate(artifacts_total{job="cave-artifacts"}[7d])))
          ) < 0.999
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "cave-artifacts 7-day availability < 99.9%"
          description: "Trailing 7d availability = {{ $value | humanizePercentage }}."
          runbook_url: "https://docs.cave.dev/runbooks/cave-artifacts/error-budget.md"
      - alert: ArtifactsLatencyP99High
        expr: |
          histogram_quantile(
            0.99,
            sum(rate(artifacts_duration_seconds_bucket{job="cave-artifacts"}[5m])) by (le)
          ) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "cave-artifacts p99 latency > 1s"
          description: "p99 = {{ $value }}s."
          runbook_url: "https://docs.cave.dev/runbooks/cave-artifacts/latency.md"
      - alert: ArtifactsSaturationHigh
        expr: 'sum(artifacts_inflight_requests{job="cave-artifacts"}) > 400'
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "cave-artifacts inflight requests > 400"
          description: "Concurrent requests = {{ $value }}."
          runbook_url: "https://docs.cave.dev/runbooks/cave-artifacts/saturation.md"
      - alert: ArtifactsMemoryPressure
        expr: 'process_resident_memory_bytes{job="cave-artifacts"} > 4 * 1024 * 1024 * 1024'
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "cave-artifacts RSS > 4 GiB"
          runbook_url: "https://docs.cave.dev/runbooks/cave-artifacts/memory.md"
      - alert: ArtifactsCardinalityExplosion
        expr: 'count(count by (tenant_id) (artifacts_total{job="cave-artifacts"})) > 5000'
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "cave-artifacts tenant cardinality > 5000"
          description: "Count = {{ $value }}."
          runbook_url: "https://docs.cave.dev/runbooks/cave-artifacts/cardinality.md"
      - alert: ArtifactsHealthProbeFailing
        expr: 'min(up{job="cave-artifacts"}) < 1'
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "cave-artifacts health probe failing"
          description: "At least one instance reports up == 0."
          runbook_url: "https://docs.cave.dev/runbooks/cave-artifacts/health.md"

  # Artifact-platform-specific alerts (registry/scan/replication/cosign).
  # These ride on the cave-artifacts metric surface introduced alongside
  # the consolidated harbor + pulp + nexus + cosign module set.
  - name: cave-artifacts-platform
    interval: 30s
    rules:
      - alert: RegistryBackendDown
        expr: 'min(artifacts_backend_up{job="cave-artifacts"}) by (backend) < 1'
        for: 2m
        labels:
          severity: critical
          tenant_scoped: "false"
        annotations:
          summary: "cave-artifacts backend {{ $labels.backend }} reports down"
          description: "Sub-module health probe (harbor / pulp / nexus / cosign) is failing."
          runbook_url: "https://docs.cave.dev/runbooks/cave-artifacts/backend-down.md"
      - alert: ScanBacklogGrowing
        expr: 'sum(artifacts_scan_queue_depth{job="cave-artifacts"}) > 200'
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Vulnerability scan queue depth > 200"
          description: "Trivy/Grype workers cannot keep up with submission rate."
          runbook_url: "https://docs.cave.dev/runbooks/cave-artifacts/scan-backlog.md"
      - alert: ReplicationFallingBehind
        expr: 'max(artifacts_replication_lag_seconds{job="cave-artifacts"}) by (policy, target) > 900'
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Replication policy {{ $labels.policy }} → {{ $labels.target }} > 15 min behind"
          description: "Replication lag = {{ $value }}s. Investigate target reachability + bandwidth."
          runbook_url: "https://docs.cave.dev/runbooks/cave-artifacts/replication-lag.md"
      - alert: StorageHighWatermark
        expr: 'sum(artifacts_storage_bytes{job="cave-artifacts"}) by (backend) > 1.5 * 1024 * 1024 * 1024 * 1024'
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "cave-artifacts {{ $labels.backend }} storage > 1.5 TiB"
          description: "Per-backend on-disk usage crossed the high-watermark threshold; consider cleanup policies or capacity bump."
          runbook_url: "https://docs.cave.dev/runbooks/cave-artifacts/storage-watermark.md"
      - alert: SignatureVerifyFailuresSpike
        expr: |
          (
            sum(rate(cosign_verify_total{job="cave-artifacts",outcome="failed"}[10m]))
            /
            clamp_min(sum(rate(cosign_verify_total{job="cave-artifacts"}[10m])), 1)
          ) > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Cosign verify failure rate > 5% over 10m"
          description: "Failed verifications fraction = {{ $value | humanizePercentage }}. Possible key compromise, payload tampering, or broken trust store."
          runbook_url: "https://docs.cave.dev/runbooks/cave-artifacts/cosign-verify-failures.md"
      - alert: PqcKeyMaterialExpiring
        expr: '(time() - min(cosign_key_created_timestamp_seconds{job="cave-artifacts",alg="ml-dsa-65"}) by (key_id)) / 86400 > 90'
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: "PQC key {{ $labels.key_id }} > 90 days old"
          description: "ML-DSA-65 keys should rotate at least quarterly per ADR-015."
          runbook_url: "https://docs.cave.dev/runbooks/cave-artifacts/pqc-rotation.md"
      - alert: CosignKeyRotationOverdue
        expr: '(time() - min(cosign_key_created_timestamp_seconds{job="cave-artifacts",alg="ecdsa-p256"}) by (key_id)) / 86400 > 365'
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: "Classic key {{ $labels.key_id }} > 365 days old"
          description: "ECDSA-P256 signing keys must rotate annually."
          runbook_url: "https://docs.cave.dev/runbooks/cave-artifacts/cosign-classic-rotation.md"
      - alert: RetentionPolicyViolation
        expr: 'sum(artifacts_retention_violations_total{job="cave-artifacts"}) > 0'
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "Retention policy violations detected (count = {{ $value }})"
          description: "Assets exist that should have been purged by an attached cleanup policy. Schedule run or investigate evaluator."
          runbook_url: "https://docs.cave.dev/runbooks/cave-artifacts/retention-violations.md"
