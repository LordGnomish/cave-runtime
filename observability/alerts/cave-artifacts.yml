# Artifact store
groups:
  - name: cave-artifacts-slo
    interval: 30s
    rules:
      - alert: ArtifactsSloBurnRateFast
        expr: |
          (
            sum(rate(artifacts_total{job="cave-artifacts",code=~"5.."}[1h]))
            /
            sum(rate(artifacts_total{job="cave-artifacts"}[1h]))
          ) > (14.4 * 0.001)
        for: 2m
        labels:
          severity: critical
          tenant_scoped: "true"
        annotations:
          summary: "cave-artifacts fast burn-rate (1h)"
          description: "5xx fraction is {{ $value | humanizePercentage }} — burning the 99.9% budget 14.4× faster than allowed."
          runbook_url: "https://docs.cave.dev/runbooks/cave-artifacts/slo-burn-fast.md"
      - alert: ArtifactsSloBurnRateSlow
        expr: |
          (
            sum(rate(artifacts_total{job="cave-artifacts",code=~"5.."}[6h]))
            /
            sum(rate(artifacts_total{job="cave-artifacts"}[6h]))
          ) > (6 * 0.001)
        for: 15m
        labels:
          severity: warning
          tenant_scoped: "true"
        annotations:
          summary: "cave-artifacts slow burn-rate (6h)"
          description: "Sustained 5xx fraction over 6h."
          runbook_url: "https://docs.cave.dev/runbooks/cave-artifacts/slo-burn-slow.md"
      - alert: ArtifactsErrorBudgetLow
        expr: |
          (
            1 -
            (sum(rate(artifacts_total{job="cave-artifacts",code=~"5.."}[7d]))
              / sum(rate(artifacts_total{job="cave-artifacts"}[7d])))
          ) < 0.999
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "cave-artifacts 7-day availability < 99.9%"
          description: "Trailing 7d availability = {{ $value | humanizePercentage }}."
          runbook_url: "https://docs.cave.dev/runbooks/cave-artifacts/error-budget.md"
      - alert: ArtifactsLatencyP99High
        expr: |
          histogram_quantile(
            0.99,
            sum(rate(artifacts_duration_seconds_bucket{job="cave-artifacts"}[5m])) by (le)
          ) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "cave-artifacts p99 latency > 1s"
          description: "p99 = {{ $value }}s."
          runbook_url: "https://docs.cave.dev/runbooks/cave-artifacts/latency.md"
      - alert: ArtifactsSaturationHigh
        expr: 'sum(artifacts_inflight_requests{job="cave-artifacts"}) > 400'
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "cave-artifacts inflight requests > 400"
          description: "Concurrent requests = {{ $value }}."
          runbook_url: "https://docs.cave.dev/runbooks/cave-artifacts/saturation.md"
      - alert: ArtifactsMemoryPressure
        expr: 'process_resident_memory_bytes{job="cave-artifacts"} > 4 * 1024 * 1024 * 1024'
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "cave-artifacts RSS > 4 GiB"
          runbook_url: "https://docs.cave.dev/runbooks/cave-artifacts/memory.md"
      - alert: ArtifactsCardinalityExplosion
        expr: 'count(count by (tenant_id) (artifacts_total{job="cave-artifacts"})) > 5000'
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "cave-artifacts tenant cardinality > 5000"
          description: "Count = {{ $value }}."
          runbook_url: "https://docs.cave.dev/runbooks/cave-artifacts/cardinality.md"
      - alert: ArtifactsHealthProbeFailing
        expr: 'min(up{job="cave-artifacts"}) < 1'
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "cave-artifacts health probe failing"
          description: "At least one instance reports up == 0."
          runbook_url: "https://docs.cave.dev/runbooks/cave-artifacts/health.md"
