# Kafka-parity streams
groups:
  - name: cave-streams-slo
    interval: 30s
    rules:
      - alert: StreamsSloBurnRateFast
        expr: |
          (
            sum(rate(kafka_total{job="cave-streams",code=~"5.."}[1h]))
            /
            sum(rate(kafka_total{job="cave-streams"}[1h]))
          ) > (14.4 * 0.001)
        for: 2m
        labels:
          severity: critical
          tenant_scoped: "true"
        annotations:
          summary: "cave-streams fast burn-rate (1h)"
          description: "5xx fraction is {{ $value | humanizePercentage }} — burning the 99.9% budget 14.4× faster than allowed."
          runbook_url: "https://docs.cave.dev/runbooks/cave-streams/slo-burn-fast.md"
      - alert: StreamsSloBurnRateSlow
        expr: |
          (
            sum(rate(kafka_total{job="cave-streams",code=~"5.."}[6h]))
            /
            sum(rate(kafka_total{job="cave-streams"}[6h]))
          ) > (6 * 0.001)
        for: 15m
        labels:
          severity: warning
          tenant_scoped: "true"
        annotations:
          summary: "cave-streams slow burn-rate (6h)"
          description: "Sustained 5xx fraction over 6h."
          runbook_url: "https://docs.cave.dev/runbooks/cave-streams/slo-burn-slow.md"
      - alert: StreamsErrorBudgetLow
        expr: |
          (
            1 -
            (sum(rate(kafka_total{job="cave-streams",code=~"5.."}[7d]))
              / sum(rate(kafka_total{job="cave-streams"}[7d])))
          ) < 0.999
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "cave-streams 7-day availability < 99.9%"
          description: "Trailing 7d availability = {{ $value | humanizePercentage }}."
          runbook_url: "https://docs.cave.dev/runbooks/cave-streams/error-budget.md"
      - alert: StreamsLatencyP99High
        expr: |
          histogram_quantile(
            0.99,
            sum(rate(kafka_duration_seconds_bucket{job="cave-streams"}[5m])) by (le)
          ) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "cave-streams p99 latency > 1s"
          description: "p99 = {{ $value }}s."
          runbook_url: "https://docs.cave.dev/runbooks/cave-streams/latency.md"
      - alert: StreamsSaturationHigh
        expr: 'sum(kafka_inflight_requests{job="cave-streams"}) > 400'
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "cave-streams inflight requests > 400"
          description: "Concurrent requests = {{ $value }}."
          runbook_url: "https://docs.cave.dev/runbooks/cave-streams/saturation.md"
      - alert: StreamsMemoryPressure
        expr: 'process_resident_memory_bytes{job="cave-streams"} > 4 * 1024 * 1024 * 1024'
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "cave-streams RSS > 4 GiB"
          runbook_url: "https://docs.cave.dev/runbooks/cave-streams/memory.md"
      - alert: StreamsCardinalityExplosion
        expr: 'count(count by (tenant_id) (kafka_total{job="cave-streams"})) > 5000'
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "cave-streams tenant cardinality > 5000"
          description: "Count = {{ $value }}."
          runbook_url: "https://docs.cave.dev/runbooks/cave-streams/cardinality.md"
      - alert: StreamsHealthProbeFailing
        expr: 'min(up{job="cave-streams"}) < 1'
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "cave-streams health probe failing"
          description: "At least one instance reports up == 0."
          runbook_url: "https://docs.cave.dev/runbooks/cave-streams/health.md"
