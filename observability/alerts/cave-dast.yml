# DAST scanner
groups:
  - name: cave-dast-slo
    interval: 30s
    rules:
      - alert: DastSloBurnRateFast
        expr: |
          (
            sum(rate(dast_total{job="cave-dast",code=~"5.."}[1h]))
            /
            sum(rate(dast_total{job="cave-dast"}[1h]))
          ) > (14.4 * 0.001)
        for: 2m
        labels:
          severity: critical
          tenant_scoped: "true"
        annotations:
          summary: "cave-dast fast burn-rate (1h)"
          description: "5xx fraction is {{ $value | humanizePercentage }} — burning the 99.9% budget 14.4× faster than allowed."
          runbook_url: "https://docs.cave.dev/runbooks/cave-dast/slo-burn-fast.md"
      - alert: DastSloBurnRateSlow
        expr: |
          (
            sum(rate(dast_total{job="cave-dast",code=~"5.."}[6h]))
            /
            sum(rate(dast_total{job="cave-dast"}[6h]))
          ) > (6 * 0.001)
        for: 15m
        labels:
          severity: warning
          tenant_scoped: "true"
        annotations:
          summary: "cave-dast slow burn-rate (6h)"
          description: "Sustained 5xx fraction over 6h."
          runbook_url: "https://docs.cave.dev/runbooks/cave-dast/slo-burn-slow.md"
      - alert: DastErrorBudgetLow
        expr: |
          (
            1 -
            (sum(rate(dast_total{job="cave-dast",code=~"5.."}[7d]))
              / sum(rate(dast_total{job="cave-dast"}[7d])))
          ) < 0.999
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "cave-dast 7-day availability < 99.9%"
          description: "Trailing 7d availability = {{ $value | humanizePercentage }}."
          runbook_url: "https://docs.cave.dev/runbooks/cave-dast/error-budget.md"
      - alert: DastLatencyP99High
        expr: |
          histogram_quantile(
            0.99,
            sum(rate(dast_duration_seconds_bucket{job="cave-dast"}[5m])) by (le)
          ) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "cave-dast p99 latency > 1s"
          description: "p99 = {{ $value }}s."
          runbook_url: "https://docs.cave.dev/runbooks/cave-dast/latency.md"
      - alert: DastSaturationHigh
        expr: 'sum(dast_inflight_requests{job="cave-dast"}) > 400'
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "cave-dast inflight requests > 400"
          description: "Concurrent requests = {{ $value }}."
          runbook_url: "https://docs.cave.dev/runbooks/cave-dast/saturation.md"
      - alert: DastMemoryPressure
        expr: 'process_resident_memory_bytes{job="cave-dast"} > 4 * 1024 * 1024 * 1024'
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "cave-dast RSS > 4 GiB"
          runbook_url: "https://docs.cave.dev/runbooks/cave-dast/memory.md"
      - alert: DastCardinalityExplosion
        expr: 'count(count by (tenant_id) (dast_total{job="cave-dast"})) > 5000'
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "cave-dast tenant cardinality > 5000"
          description: "Count = {{ $value }}."
          runbook_url: "https://docs.cave.dev/runbooks/cave-dast/cardinality.md"
      - alert: DastHealthProbeFailing
        expr: 'min(up{job="cave-dast"}) < 1'
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "cave-dast health probe failing"
          description: "At least one instance reports up == 0."
          runbook_url: "https://docs.cave.dev/runbooks/cave-dast/health.md"
