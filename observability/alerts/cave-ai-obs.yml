# AI/LLM observability
groups:
  - name: cave-ai-obs-slo
    interval: 30s
    rules:
      - alert: AiObsSloBurnRateFast
        expr: |
          (
            sum(rate(ai_obs_total{job="cave-ai-obs",code=~"5.."}[1h]))
            /
            sum(rate(ai_obs_total{job="cave-ai-obs"}[1h]))
          ) > (14.4 * 0.001)
        for: 2m
        labels:
          severity: critical
          tenant_scoped: "true"
        annotations:
          summary: "cave-ai-obs fast burn-rate (1h)"
          description: "5xx fraction is {{ $value | humanizePercentage }} — burning the 99.9% budget 14.4× faster than allowed."
          runbook_url: "https://docs.cave.dev/runbooks/cave-ai-obs/slo-burn-fast.md"
      - alert: AiObsSloBurnRateSlow
        expr: |
          (
            sum(rate(ai_obs_total{job="cave-ai-obs",code=~"5.."}[6h]))
            /
            sum(rate(ai_obs_total{job="cave-ai-obs"}[6h]))
          ) > (6 * 0.001)
        for: 15m
        labels:
          severity: warning
          tenant_scoped: "true"
        annotations:
          summary: "cave-ai-obs slow burn-rate (6h)"
          description: "Sustained 5xx fraction over 6h."
          runbook_url: "https://docs.cave.dev/runbooks/cave-ai-obs/slo-burn-slow.md"
      - alert: AiObsErrorBudgetLow
        expr: |
          (
            1 -
            (sum(rate(ai_obs_total{job="cave-ai-obs",code=~"5.."}[7d]))
              / sum(rate(ai_obs_total{job="cave-ai-obs"}[7d])))
          ) < 0.999
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "cave-ai-obs 7-day availability < 99.9%"
          description: "Trailing 7d availability = {{ $value | humanizePercentage }}."
          runbook_url: "https://docs.cave.dev/runbooks/cave-ai-obs/error-budget.md"
      - alert: AiObsLatencyP99High
        expr: |
          histogram_quantile(
            0.99,
            sum(rate(ai_obs_duration_seconds_bucket{job="cave-ai-obs"}[5m])) by (le)
          ) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "cave-ai-obs p99 latency > 1s"
          description: "p99 = {{ $value }}s."
          runbook_url: "https://docs.cave.dev/runbooks/cave-ai-obs/latency.md"
      - alert: AiObsSaturationHigh
        expr: 'sum(ai_obs_inflight_requests{job="cave-ai-obs"}) > 400'
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "cave-ai-obs inflight requests > 400"
          description: "Concurrent requests = {{ $value }}."
          runbook_url: "https://docs.cave.dev/runbooks/cave-ai-obs/saturation.md"
      - alert: AiObsMemoryPressure
        expr: 'process_resident_memory_bytes{job="cave-ai-obs"} > 4 * 1024 * 1024 * 1024'
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "cave-ai-obs RSS > 4 GiB"
          runbook_url: "https://docs.cave.dev/runbooks/cave-ai-obs/memory.md"
      - alert: AiObsCardinalityExplosion
        expr: 'count(count by (tenant_id) (ai_obs_total{job="cave-ai-obs"})) > 5000'
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "cave-ai-obs tenant cardinality > 5000"
          description: "Count = {{ $value }}."
          runbook_url: "https://docs.cave.dev/runbooks/cave-ai-obs/cardinality.md"
      - alert: AiObsHealthProbeFailing
        expr: 'min(up{job="cave-ai-obs"}) < 1'
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "cave-ai-obs health probe failing"
          description: "At least one instance reports up == 0."
          runbook_url: "https://docs.cave.dev/runbooks/cave-ai-obs/health.md"
