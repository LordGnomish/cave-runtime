# Alerts for cave-controller-manager (kube-controller-manager parity).
#
# Each alert references a runbook under `docs/runbooks/cave-controller-manager/`
# and is annotated with `tenant_scoped: "true"` where the metric is keyed by
# tenant — Alertmanager fan-out routes by that label.

groups:
  - name: cave-controller-manager-leader
    interval: 30s
    rules:
      - alert: ControllerLeaderElectionFlapping
        expr: |
          sum(rate(controller_manager_leader_transitions_total{job="cave-controller-manager"}[15m])) > 0.05
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "cave-controller-manager leader flapping"
          description: "Lease holder churned > 0.05/s over 15m — controllers will run twice or never."
          runbook_url: "https://docs.cave.dev/runbooks/cave-controller-manager/leader-flapping.md"

      - alert: ControllerLeaderLost
        expr: |
          max_over_time(controller_manager_leader_elected{job="cave-controller-manager"}[10m]) == 0
          and on() (sum(up{job="cave-controller-manager"}) > 0)
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "cave-controller-manager has no leader"
          description: "No pod has held the LeaseLock for the last 10m although replicas are running — reconciliation is paused."
          runbook_url: "https://docs.cave.dev/runbooks/cave-controller-manager/leader-lost.md"

  - name: cave-controller-manager-queues
    interval: 30s
    rules:
      - alert: ControllerQueueDepthHigh
        expr: |
          max(controller_manager_workqueue_depth{job="cave-controller-manager"}) by (controller) > 10000
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "cave-controller-manager workqueue depth high — {{ $labels.controller }}"
          description: "Workqueue for {{ $labels.controller }} has stayed above 10k entries for 10m — backlog draining slower than ingest."
          runbook_url: "https://docs.cave.dev/runbooks/cave-controller-manager/queue-depth.md"

      - alert: ControllerReconcileRateLow
        expr: |
          (
            sum(rate(controller_manager_workqueue_depth{job="cave-controller-manager"}[5m])) by (controller) > 0
          ) and (
            sum(rate(controller_manager_reconcile_total{job="cave-controller-manager"}[5m])) by (controller) < 0.01
          )
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "cave-controller-manager reconcile rate near zero — {{ $labels.controller }}"
          description: "{{ $labels.controller }} has a non-empty queue but is reconciling < 0.01/s — controller may be stuck."
          runbook_url: "https://docs.cave.dev/runbooks/cave-controller-manager/reconcile-stalled.md"

      - alert: ControllerRequeueStorm
        expr: |
          sum(rate(controller_manager_workqueue_requeues_total{job="cave-controller-manager"}[5m])) by (controller) > 50
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "cave-controller-manager requeue storm — {{ $labels.controller }}"
          description: "{{ $labels.controller }} re-enqueued > 50 keys/s for 5m — reconciler is failing fast and retrying."
          runbook_url: "https://docs.cave.dev/runbooks/cave-controller-manager/requeue-storm.md"

  - name: cave-controller-manager-quality
    interval: 30s
    rules:
      - alert: ControllerCrashLooping
        expr: |
          rate(controller_manager_reconcile_errors_total{job="cave-controller-manager"}[5m])
          /
          (rate(controller_manager_reconcile_total{job="cave-controller-manager"}[5m]) + 1e-9)
          > 0.5
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "cave-controller-manager error fraction > 50% — {{ $labels.controller }}"
          description: "Over half of reconcile passes errored for {{ $labels.controller }} in the last 5m — investigate the controller body."
          runbook_url: "https://docs.cave.dev/runbooks/cave-controller-manager/crash-looping.md"

      - alert: ControllerEventStorm
        expr: |
          sum(rate(controller_manager_events_total{job="cave-controller-manager"}[1m])) > 1000
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "cave-controller-manager event storm"
          description: "Reflector observed > 1000 events/s for 3m — apiserver may be bouncing or watch is over-subscribed."
          runbook_url: "https://docs.cave.dev/runbooks/cave-controller-manager/event-storm.md"

      - alert: ControllerLatencyP99High
        expr: |
          histogram_quantile(
            0.99,
            sum(rate(controller_manager_reconcile_duration_seconds_bucket{job="cave-controller-manager"}[5m])) by (le, controller)
          ) > 5
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "cave-controller-manager p99 reconcile latency > 5s — {{ $labels.controller }}"
          description: "p99 reconcile duration for {{ $labels.controller }} stayed > 5s for 10m."
          runbook_url: "https://docs.cave.dev/runbooks/cave-controller-manager/reconcile-latency.md"

  - name: cave-controller-manager-tenancy
    interval: 30s
    rules:
      - alert: ControllerCrossTenantKeysObserved
        expr: |
          sum(rate(controller_manager_cross_tenant_denied_total{job="cave-controller-manager"}[5m])) > 0
        for: 5m
        labels:
          severity: critical
          tenant_scoped: "true"
        annotations:
          summary: "cave-controller-manager observed cross-tenant keys"
          description: "The manager loop saw a key whose tenant did not match the controller owner — possible authz bypass attempt or tenant-router misconfiguration."
          runbook_url: "https://docs.cave.dev/runbooks/cave-controller-manager/cross-tenant.md"

      - alert: ControllerStubsDetected
        expr: |
          max(parity_stubs_detected{job="cave-controller-manager"}) > 0
        for: 30m
        labels:
          severity: info
        annotations:
          summary: "cave-controller-manager has unimplemented!() stubs"
          description: "{{ $value }} todo!()/unimplemented!() call site(s) remain in src — golden rule 1 violation if value > 0 in shipping build."
          runbook_url: "https://docs.cave.dev/runbooks/cave-controller-manager/stubs-detected.md"
