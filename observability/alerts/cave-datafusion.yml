# Query engine
groups:
  - name: cave-datafusion-slo
    interval: 30s
    rules:
      - alert: DatafusionSloBurnRateFast
        expr: |
          (
            sum(rate(datafusion_total{job="cave-datafusion",code=~"5.."}[1h]))
            /
            sum(rate(datafusion_total{job="cave-datafusion"}[1h]))
          ) > (14.4 * 0.001)
        for: 2m
        labels:
          severity: critical
          tenant_scoped: "true"
        annotations:
          summary: "cave-datafusion fast burn-rate (1h)"
          description: "5xx fraction is {{ $value | humanizePercentage }} — burning the 99.9% budget 14.4× faster than allowed."
          runbook_url: "https://docs.cave.dev/runbooks/cave-datafusion/slo-burn-fast.md"
      - alert: DatafusionSloBurnRateSlow
        expr: |
          (
            sum(rate(datafusion_total{job="cave-datafusion",code=~"5.."}[6h]))
            /
            sum(rate(datafusion_total{job="cave-datafusion"}[6h]))
          ) > (6 * 0.001)
        for: 15m
        labels:
          severity: warning
          tenant_scoped: "true"
        annotations:
          summary: "cave-datafusion slow burn-rate (6h)"
          description: "Sustained 5xx fraction over 6h."
          runbook_url: "https://docs.cave.dev/runbooks/cave-datafusion/slo-burn-slow.md"
      - alert: DatafusionErrorBudgetLow
        expr: |
          (
            1 -
            (sum(rate(datafusion_total{job="cave-datafusion",code=~"5.."}[7d]))
              / sum(rate(datafusion_total{job="cave-datafusion"}[7d])))
          ) < 0.999
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "cave-datafusion 7-day availability < 99.9%"
          description: "Trailing 7d availability = {{ $value | humanizePercentage }}."
          runbook_url: "https://docs.cave.dev/runbooks/cave-datafusion/error-budget.md"
      - alert: DatafusionLatencyP99High
        expr: |
          histogram_quantile(
            0.99,
            sum(rate(datafusion_duration_seconds_bucket{job="cave-datafusion"}[5m])) by (le)
          ) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "cave-datafusion p99 latency > 1s"
          description: "p99 = {{ $value }}s."
          runbook_url: "https://docs.cave.dev/runbooks/cave-datafusion/latency.md"
      - alert: DatafusionSaturationHigh
        expr: 'sum(datafusion_inflight_requests{job="cave-datafusion"}) > 400'
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "cave-datafusion inflight requests > 400"
          description: "Concurrent requests = {{ $value }}."
          runbook_url: "https://docs.cave.dev/runbooks/cave-datafusion/saturation.md"
      - alert: DatafusionMemoryPressure
        expr: 'process_resident_memory_bytes{job="cave-datafusion"} > 4 * 1024 * 1024 * 1024'
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "cave-datafusion RSS > 4 GiB"
          runbook_url: "https://docs.cave.dev/runbooks/cave-datafusion/memory.md"
      - alert: DatafusionCardinalityExplosion
        expr: 'count(count by (tenant_id) (datafusion_total{job="cave-datafusion"})) > 5000'
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "cave-datafusion tenant cardinality > 5000"
          description: "Count = {{ $value }}."
          runbook_url: "https://docs.cave.dev/runbooks/cave-datafusion/cardinality.md"
      - alert: DatafusionHealthProbeFailing
        expr: 'min(up{job="cave-datafusion"}) < 1'
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "cave-datafusion health probe failing"
          description: "At least one instance reports up == 0."
          runbook_url: "https://docs.cave.dev/runbooks/cave-datafusion/health.md"
