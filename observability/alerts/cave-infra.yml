# Infra provisioner
groups:
  - name: cave-infra-slo
    interval: 30s
    rules:
      - alert: InfraSloBurnRateFast
        expr: |
          (
            sum(rate(infra_total{job="cave-infra",code=~"5.."}[1h]))
            /
            sum(rate(infra_total{job="cave-infra"}[1h]))
          ) > (14.4 * 0.001)
        for: 2m
        labels:
          severity: critical
          tenant_scoped: "true"
        annotations:
          summary: "cave-infra fast burn-rate (1h)"
          description: "5xx fraction is {{ $value | humanizePercentage }} — burning the 99.9% budget 14.4× faster than allowed."
          runbook_url: "https://docs.cave.dev/runbooks/cave-infra/slo-burn-fast.md"
      - alert: InfraSloBurnRateSlow
        expr: |
          (
            sum(rate(infra_total{job="cave-infra",code=~"5.."}[6h]))
            /
            sum(rate(infra_total{job="cave-infra"}[6h]))
          ) > (6 * 0.001)
        for: 15m
        labels:
          severity: warning
          tenant_scoped: "true"
        annotations:
          summary: "cave-infra slow burn-rate (6h)"
          description: "Sustained 5xx fraction over 6h."
          runbook_url: "https://docs.cave.dev/runbooks/cave-infra/slo-burn-slow.md"
      - alert: InfraErrorBudgetLow
        expr: |
          (
            1 -
            (sum(rate(infra_total{job="cave-infra",code=~"5.."}[7d]))
              / sum(rate(infra_total{job="cave-infra"}[7d])))
          ) < 0.999
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "cave-infra 7-day availability < 99.9%"
          description: "Trailing 7d availability = {{ $value | humanizePercentage }}."
          runbook_url: "https://docs.cave.dev/runbooks/cave-infra/error-budget.md"
      - alert: InfraLatencyP99High
        expr: |
          histogram_quantile(
            0.99,
            sum(rate(infra_duration_seconds_bucket{job="cave-infra"}[5m])) by (le)
          ) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "cave-infra p99 latency > 1s"
          description: "p99 = {{ $value }}s."
          runbook_url: "https://docs.cave.dev/runbooks/cave-infra/latency.md"
      - alert: InfraSaturationHigh
        expr: 'sum(infra_inflight_requests{job="cave-infra"}) > 400'
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "cave-infra inflight requests > 400"
          description: "Concurrent requests = {{ $value }}."
          runbook_url: "https://docs.cave.dev/runbooks/cave-infra/saturation.md"
      - alert: InfraMemoryPressure
        expr: 'process_resident_memory_bytes{job="cave-infra"} > 4 * 1024 * 1024 * 1024'
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "cave-infra RSS > 4 GiB"
          runbook_url: "https://docs.cave.dev/runbooks/cave-infra/memory.md"
      - alert: InfraCardinalityExplosion
        expr: 'count(count by (tenant_id) (infra_total{job="cave-infra"})) > 5000'
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "cave-infra tenant cardinality > 5000"
          description: "Count = {{ $value }}."
          runbook_url: "https://docs.cave.dev/runbooks/cave-infra/cardinality.md"
      - alert: InfraHealthProbeFailing
        expr: 'min(up{job="cave-infra"}) < 1'
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "cave-infra health probe failing"
          description: "At least one instance reports up == 0."
          runbook_url: "https://docs.cave.dev/runbooks/cave-infra/health.md"
