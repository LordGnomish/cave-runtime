# ACME issuance
groups:
  - name: cave-acme-slo
    interval: 30s
    rules:
      - alert: AcmeSloBurnRateFast
        expr: |
          (
            sum(rate(acme_total{job="cave-acme",code=~"5.."}[1h]))
            /
            sum(rate(acme_total{job="cave-acme"}[1h]))
          ) > (14.4 * 0.001)
        for: 2m
        labels:
          severity: critical
          tenant_scoped: "true"
        annotations:
          summary: "cave-acme fast burn-rate (1h)"
          description: "5xx fraction is {{ $value | humanizePercentage }} — burning the 99.9% budget 14.4× faster than allowed."
          runbook_url: "https://docs.cave.dev/runbooks/cave-acme/slo-burn-fast.md"
      - alert: AcmeSloBurnRateSlow
        expr: |
          (
            sum(rate(acme_total{job="cave-acme",code=~"5.."}[6h]))
            /
            sum(rate(acme_total{job="cave-acme"}[6h]))
          ) > (6 * 0.001)
        for: 15m
        labels:
          severity: warning
          tenant_scoped: "true"
        annotations:
          summary: "cave-acme slow burn-rate (6h)"
          description: "Sustained 5xx fraction over 6h."
          runbook_url: "https://docs.cave.dev/runbooks/cave-acme/slo-burn-slow.md"
      - alert: AcmeErrorBudgetLow
        expr: |
          (
            1 -
            (sum(rate(acme_total{job="cave-acme",code=~"5.."}[7d]))
              / sum(rate(acme_total{job="cave-acme"}[7d])))
          ) < 0.999
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "cave-acme 7-day availability < 99.9%"
          description: "Trailing 7d availability = {{ $value | humanizePercentage }}."
          runbook_url: "https://docs.cave.dev/runbooks/cave-acme/error-budget.md"
      - alert: AcmeLatencyP99High
        expr: |
          histogram_quantile(
            0.99,
            sum(rate(acme_duration_seconds_bucket{job="cave-acme"}[5m])) by (le)
          ) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "cave-acme p99 latency > 1s"
          description: "p99 = {{ $value }}s."
          runbook_url: "https://docs.cave.dev/runbooks/cave-acme/latency.md"
      - alert: AcmeSaturationHigh
        expr: 'sum(acme_inflight_requests{job="cave-acme"}) > 400'
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "cave-acme inflight requests > 400"
          description: "Concurrent requests = {{ $value }}."
          runbook_url: "https://docs.cave.dev/runbooks/cave-acme/saturation.md"
      - alert: AcmeMemoryPressure
        expr: 'process_resident_memory_bytes{job="cave-acme"} > 4 * 1024 * 1024 * 1024'
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "cave-acme RSS > 4 GiB"
          runbook_url: "https://docs.cave.dev/runbooks/cave-acme/memory.md"
      - alert: AcmeCardinalityExplosion
        expr: 'count(count by (tenant_id) (acme_total{job="cave-acme"})) > 5000'
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "cave-acme tenant cardinality > 5000"
          description: "Count = {{ $value }}."
          runbook_url: "https://docs.cave.dev/runbooks/cave-acme/cardinality.md"
      - alert: AcmeHealthProbeFailing
        expr: 'min(up{job="cave-acme"}) < 1'
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "cave-acme health probe failing"
          description: "At least one instance reports up == 0."
          runbook_url: "https://docs.cave.dev/runbooks/cave-acme/health.md"
