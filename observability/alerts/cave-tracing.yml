# cave-tracing alerts — auto-generated tier1 obs scaffold
groups:
  - name: cave-tracing-slo
    interval: 30s
    rules:
      - alert: TracingSloBurnRateFast
        expr: |
          (
            sum(rate(cave_tracing_total{job="cave-tracing",code=~"5.."}[1h]))
            /
            sum(rate(cave_tracing_total{job="cave-tracing"}[1h]))
          ) > (14.4 * 0.001)
        for: 2m
        labels:
          severity: critical
          tenant_scoped: "true"
        annotations:
          summary: "cave-tracing fast burn-rate (1h)"
          description: "5xx fraction is {{ $value | humanizePercentage }}."
          runbook_url: "https://docs.cave.dev/runbooks/cave-tracing/slo-burn-fast.md"
      - alert: TracingLatencyP99High
        expr: |
          histogram_quantile(0.99, sum(rate(cave_tracing_request_duration_seconds_bucket{job="cave-tracing"}[5m])) by (le)) > 0.5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "cave-tracing p99 latency > 500ms"
          description: "p99 latency = {{ $value }}s over 5m."
          runbook_url: "https://docs.cave.dev/runbooks/cave-tracing/latency.md"
      - alert: TracingSaturationHigh
        expr: 'sum(rate(cave_tracing_inflight_requests{job="cave-tracing"}[5m])) > 100'
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "cave-tracing inflight requests > 100"
          runbook_url: "https://docs.cave.dev/runbooks/cave-tracing/saturation.md"
      - alert: TracingMemoryPressure
        expr: 'process_resident_memory_bytes{job="cave-tracing"} > (4 * 1024 * 1024 * 1024)'
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "cave-tracing RSS > 4 GiB"
          runbook_url: "https://docs.cave.dev/runbooks/cave-tracing/memory.md"
      - alert: TracingHealthProbeFailing
        expr: 'min(up{job="cave-tracing"}) < 1'
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "cave-tracing health probe failing"
          description: "At least one instance reports up == 0."
          runbook_url: "https://docs.cave.dev/runbooks/cave-tracing/health.md"
