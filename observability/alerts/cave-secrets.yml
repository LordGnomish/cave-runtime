# External Secrets Operator
groups:
  - name: cave-secrets-slo
    interval: 30s
    rules:
      - alert: SecretsSloBurnRateFast
        expr: |
          (
            sum(rate(secrets_total{job="cave-secrets",code=~"5.."}[1h]))
            /
            sum(rate(secrets_total{job="cave-secrets"}[1h]))
          ) > (14.4 * 0.001)
        for: 2m
        labels:
          severity: critical
          tenant_scoped: "true"
        annotations:
          summary: "cave-secrets fast burn-rate (1h)"
          description: "5xx fraction is {{ $value | humanizePercentage }} — burning the 99.9% budget 14.4× faster than allowed."
          runbook_url: "https://docs.cave.dev/runbooks/cave-secrets/slo-burn-fast.md"
      - alert: SecretsSloBurnRateSlow
        expr: |
          (
            sum(rate(secrets_total{job="cave-secrets",code=~"5.."}[6h]))
            /
            sum(rate(secrets_total{job="cave-secrets"}[6h]))
          ) > (6 * 0.001)
        for: 15m
        labels:
          severity: warning
          tenant_scoped: "true"
        annotations:
          summary: "cave-secrets slow burn-rate (6h)"
          description: "Sustained 5xx fraction over 6h."
          runbook_url: "https://docs.cave.dev/runbooks/cave-secrets/slo-burn-slow.md"
      - alert: SecretsErrorBudgetLow
        expr: |
          (
            1 -
            (sum(rate(secrets_total{job="cave-secrets",code=~"5.."}[7d]))
              / sum(rate(secrets_total{job="cave-secrets"}[7d])))
          ) < 0.999
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "cave-secrets 7-day availability < 99.9%"
          description: "Trailing 7d availability = {{ $value | humanizePercentage }}."
          runbook_url: "https://docs.cave.dev/runbooks/cave-secrets/error-budget.md"
      - alert: SecretsLatencyP99High
        expr: |
          histogram_quantile(
            0.99,
            sum(rate(secrets_duration_seconds_bucket{job="cave-secrets"}[5m])) by (le)
          ) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "cave-secrets p99 latency > 1s"
          description: "p99 = {{ $value }}s."
          runbook_url: "https://docs.cave.dev/runbooks/cave-secrets/latency.md"
      - alert: SecretsSaturationHigh
        expr: 'sum(secrets_inflight_requests{job="cave-secrets"}) > 400'
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "cave-secrets inflight requests > 400"
          description: "Concurrent requests = {{ $value }}."
          runbook_url: "https://docs.cave.dev/runbooks/cave-secrets/saturation.md"
      - alert: SecretsMemoryPressure
        expr: 'process_resident_memory_bytes{job="cave-secrets"} > 4 * 1024 * 1024 * 1024'
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "cave-secrets RSS > 4 GiB"
          runbook_url: "https://docs.cave.dev/runbooks/cave-secrets/memory.md"
      - alert: SecretsCardinalityExplosion
        expr: 'count(count by (tenant_id) (secrets_total{job="cave-secrets"})) > 5000'
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "cave-secrets tenant cardinality > 5000"
          description: "Count = {{ $value }}."
          runbook_url: "https://docs.cave.dev/runbooks/cave-secrets/cardinality.md"
      - alert: SecretsHealthProbeFailing
        expr: 'min(up{job="cave-secrets"}) < 1'
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "cave-secrets health probe failing"
          description: "At least one instance reports up == 0."
          runbook_url: "https://docs.cave.dev/runbooks/cave-secrets/health.md"
