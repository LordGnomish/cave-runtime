# PII detection
groups:
  - name: cave-pii-slo
    interval: 30s
    rules:
      - alert: PiiSloBurnRateFast
        expr: |
          (
            sum(rate(pii_total{job="cave-pii",code=~"5.."}[1h]))
            /
            sum(rate(pii_total{job="cave-pii"}[1h]))
          ) > (14.4 * 0.001)
        for: 2m
        labels:
          severity: critical
          tenant_scoped: "true"
        annotations:
          summary: "cave-pii fast burn-rate (1h)"
          description: "5xx fraction is {{ $value | humanizePercentage }} — burning the 99.9% budget 14.4× faster than allowed."
          runbook_url: "https://docs.cave.dev/runbooks/cave-pii/slo-burn-fast.md"
      - alert: PiiSloBurnRateSlow
        expr: |
          (
            sum(rate(pii_total{job="cave-pii",code=~"5.."}[6h]))
            /
            sum(rate(pii_total{job="cave-pii"}[6h]))
          ) > (6 * 0.001)
        for: 15m
        labels:
          severity: warning
          tenant_scoped: "true"
        annotations:
          summary: "cave-pii slow burn-rate (6h)"
          description: "Sustained 5xx fraction over 6h."
          runbook_url: "https://docs.cave.dev/runbooks/cave-pii/slo-burn-slow.md"
      - alert: PiiErrorBudgetLow
        expr: |
          (
            1 -
            (sum(rate(pii_total{job="cave-pii",code=~"5.."}[7d]))
              / sum(rate(pii_total{job="cave-pii"}[7d])))
          ) < 0.999
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "cave-pii 7-day availability < 99.9%"
          description: "Trailing 7d availability = {{ $value | humanizePercentage }}."
          runbook_url: "https://docs.cave.dev/runbooks/cave-pii/error-budget.md"
      - alert: PiiLatencyP99High
        expr: |
          histogram_quantile(
            0.99,
            sum(rate(pii_duration_seconds_bucket{job="cave-pii"}[5m])) by (le)
          ) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "cave-pii p99 latency > 1s"
          description: "p99 = {{ $value }}s."
          runbook_url: "https://docs.cave.dev/runbooks/cave-pii/latency.md"
      - alert: PiiSaturationHigh
        expr: 'sum(pii_inflight_requests{job="cave-pii"}) > 400'
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "cave-pii inflight requests > 400"
          description: "Concurrent requests = {{ $value }}."
          runbook_url: "https://docs.cave.dev/runbooks/cave-pii/saturation.md"
      - alert: PiiMemoryPressure
        expr: 'process_resident_memory_bytes{job="cave-pii"} > 4 * 1024 * 1024 * 1024'
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "cave-pii RSS > 4 GiB"
          runbook_url: "https://docs.cave.dev/runbooks/cave-pii/memory.md"
      - alert: PiiCardinalityExplosion
        expr: 'count(count by (tenant_id) (pii_total{job="cave-pii"})) > 5000'
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "cave-pii tenant cardinality > 5000"
          description: "Count = {{ $value }}."
          runbook_url: "https://docs.cave.dev/runbooks/cave-pii/cardinality.md"
      - alert: PiiHealthProbeFailing
        expr: 'min(up{job="cave-pii"}) < 1'
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "cave-pii health probe failing"
          description: "At least one instance reports up == 0."
          runbook_url: "https://docs.cave.dev/runbooks/cave-pii/health.md"
