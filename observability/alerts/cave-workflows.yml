# Argo Workflows parity
groups:
  - name: cave-workflows-slo
    interval: 30s
    rules:
      - alert: WorkflowsSloBurnRateFast
        expr: |
          (
            sum(rate(workflow_total{job="cave-workflows",code=~"5.."}[1h]))
            /
            sum(rate(workflow_total{job="cave-workflows"}[1h]))
          ) > (14.4 * 0.001)
        for: 2m
        labels:
          severity: critical
          tenant_scoped: "true"
        annotations:
          summary: "cave-workflows fast burn-rate (1h)"
          description: "5xx fraction is {{ $value | humanizePercentage }} — burning the 99.9% budget 14.4× faster than allowed."
          runbook_url: "https://docs.cave.dev/runbooks/cave-workflows/slo-burn-fast.md"
      - alert: WorkflowsSloBurnRateSlow
        expr: |
          (
            sum(rate(workflow_total{job="cave-workflows",code=~"5.."}[6h]))
            /
            sum(rate(workflow_total{job="cave-workflows"}[6h]))
          ) > (6 * 0.001)
        for: 15m
        labels:
          severity: warning
          tenant_scoped: "true"
        annotations:
          summary: "cave-workflows slow burn-rate (6h)"
          description: "Sustained 5xx fraction over 6h."
          runbook_url: "https://docs.cave.dev/runbooks/cave-workflows/slo-burn-slow.md"
      - alert: WorkflowsErrorBudgetLow
        expr: |
          (
            1 -
            (sum(rate(workflow_total{job="cave-workflows",code=~"5.."}[7d]))
              / sum(rate(workflow_total{job="cave-workflows"}[7d])))
          ) < 0.999
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "cave-workflows 7-day availability < 99.9%"
          description: "Trailing 7d availability = {{ $value | humanizePercentage }}."
          runbook_url: "https://docs.cave.dev/runbooks/cave-workflows/error-budget.md"
      - alert: WorkflowsLatencyP99High
        expr: |
          histogram_quantile(
            0.99,
            sum(rate(workflow_duration_seconds_bucket{job="cave-workflows"}[5m])) by (le)
          ) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "cave-workflows p99 latency > 1s"
          description: "p99 = {{ $value }}s."
          runbook_url: "https://docs.cave.dev/runbooks/cave-workflows/latency.md"
      - alert: WorkflowsSaturationHigh
        expr: 'sum(workflow_inflight_requests{job="cave-workflows"}) > 400'
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "cave-workflows inflight requests > 400"
          description: "Concurrent requests = {{ $value }}."
          runbook_url: "https://docs.cave.dev/runbooks/cave-workflows/saturation.md"
      - alert: WorkflowsMemoryPressure
        expr: 'process_resident_memory_bytes{job="cave-workflows"} > 4 * 1024 * 1024 * 1024'
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "cave-workflows RSS > 4 GiB"
          runbook_url: "https://docs.cave.dev/runbooks/cave-workflows/memory.md"
      - alert: WorkflowsCardinalityExplosion
        expr: 'count(count by (tenant_id) (workflow_total{job="cave-workflows"})) > 5000'
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "cave-workflows tenant cardinality > 5000"
          description: "Count = {{ $value }}."
          runbook_url: "https://docs.cave.dev/runbooks/cave-workflows/cardinality.md"
      - alert: WorkflowsHealthProbeFailing
        expr: 'min(up{job="cave-workflows"}) < 1'
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "cave-workflows health probe failing"
          description: "At least one instance reports up == 0."
          runbook_url: "https://docs.cave.dev/runbooks/cave-workflows/health.md"
