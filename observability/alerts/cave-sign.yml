# Image / artifact signing
groups:
  - name: cave-sign-slo
    interval: 30s
    rules:
      - alert: SignSloBurnRateFast
        expr: |
          (
            sum(rate(sign_total{job="cave-sign",code=~"5.."}[1h]))
            /
            sum(rate(sign_total{job="cave-sign"}[1h]))
          ) > (14.4 * 0.001)
        for: 2m
        labels:
          severity: critical
          tenant_scoped: "true"
        annotations:
          summary: "cave-sign fast burn-rate (1h)"
          description: "5xx fraction is {{ $value | humanizePercentage }} — burning the 99.9% budget 14.4× faster than allowed."
          runbook_url: "https://docs.cave.dev/runbooks/cave-sign/slo-burn-fast.md"
      - alert: SignSloBurnRateSlow
        expr: |
          (
            sum(rate(sign_total{job="cave-sign",code=~"5.."}[6h]))
            /
            sum(rate(sign_total{job="cave-sign"}[6h]))
          ) > (6 * 0.001)
        for: 15m
        labels:
          severity: warning
          tenant_scoped: "true"
        annotations:
          summary: "cave-sign slow burn-rate (6h)"
          description: "Sustained 5xx fraction over 6h."
          runbook_url: "https://docs.cave.dev/runbooks/cave-sign/slo-burn-slow.md"
      - alert: SignErrorBudgetLow
        expr: |
          (
            1 -
            (sum(rate(sign_total{job="cave-sign",code=~"5.."}[7d]))
              / sum(rate(sign_total{job="cave-sign"}[7d])))
          ) < 0.999
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "cave-sign 7-day availability < 99.9%"
          description: "Trailing 7d availability = {{ $value | humanizePercentage }}."
          runbook_url: "https://docs.cave.dev/runbooks/cave-sign/error-budget.md"
      - alert: SignLatencyP99High
        expr: |
          histogram_quantile(
            0.99,
            sum(rate(sign_duration_seconds_bucket{job="cave-sign"}[5m])) by (le)
          ) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "cave-sign p99 latency > 1s"
          description: "p99 = {{ $value }}s."
          runbook_url: "https://docs.cave.dev/runbooks/cave-sign/latency.md"
      - alert: SignSaturationHigh
        expr: 'sum(sign_inflight_requests{job="cave-sign"}) > 400'
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "cave-sign inflight requests > 400"
          description: "Concurrent requests = {{ $value }}."
          runbook_url: "https://docs.cave.dev/runbooks/cave-sign/saturation.md"
      - alert: SignMemoryPressure
        expr: 'process_resident_memory_bytes{job="cave-sign"} > 4 * 1024 * 1024 * 1024'
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "cave-sign RSS > 4 GiB"
          runbook_url: "https://docs.cave.dev/runbooks/cave-sign/memory.md"
      - alert: SignCardinalityExplosion
        expr: 'count(count by (tenant_id) (sign_total{job="cave-sign"})) > 5000'
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "cave-sign tenant cardinality > 5000"
          description: "Count = {{ $value }}."
          runbook_url: "https://docs.cave.dev/runbooks/cave-sign/cardinality.md"
      - alert: SignHealthProbeFailing
        expr: 'min(up{job="cave-sign"}) < 1'
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "cave-sign health probe failing"
          description: "At least one instance reports up == 0."
          runbook_url: "https://docs.cave.dev/runbooks/cave-sign/health.md"
