# Alert manager
groups:
  - name: cave-alerts-slo
    interval: 30s
    rules:
      - alert: AlertsSloBurnRateFast
        expr: |
          (
            sum(rate(alertmanager_total{job="cave-alerts",code=~"5.."}[1h]))
            /
            sum(rate(alertmanager_total{job="cave-alerts"}[1h]))
          ) > (14.4 * 0.001)
        for: 2m
        labels:
          severity: critical
          tenant_scoped: "true"
        annotations:
          summary: "cave-alerts fast burn-rate (1h)"
          description: "5xx fraction is {{ $value | humanizePercentage }} — burning the 99.9% budget 14.4× faster than allowed."
          runbook_url: "https://docs.cave.dev/runbooks/cave-alerts/slo-burn-fast.md"
      - alert: AlertsSloBurnRateSlow
        expr: |
          (
            sum(rate(alertmanager_total{job="cave-alerts",code=~"5.."}[6h]))
            /
            sum(rate(alertmanager_total{job="cave-alerts"}[6h]))
          ) > (6 * 0.001)
        for: 15m
        labels:
          severity: warning
          tenant_scoped: "true"
        annotations:
          summary: "cave-alerts slow burn-rate (6h)"
          description: "Sustained 5xx fraction over 6h."
          runbook_url: "https://docs.cave.dev/runbooks/cave-alerts/slo-burn-slow.md"
      - alert: AlertsErrorBudgetLow
        expr: |
          (
            1 -
            (sum(rate(alertmanager_total{job="cave-alerts",code=~"5.."}[7d]))
              / sum(rate(alertmanager_total{job="cave-alerts"}[7d])))
          ) < 0.999
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "cave-alerts 7-day availability < 99.9%"
          description: "Trailing 7d availability = {{ $value | humanizePercentage }}."
          runbook_url: "https://docs.cave.dev/runbooks/cave-alerts/error-budget.md"
      - alert: AlertsLatencyP99High
        expr: |
          histogram_quantile(
            0.99,
            sum(rate(alertmanager_duration_seconds_bucket{job="cave-alerts"}[5m])) by (le)
          ) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "cave-alerts p99 latency > 1s"
          description: "p99 = {{ $value }}s."
          runbook_url: "https://docs.cave.dev/runbooks/cave-alerts/latency.md"
      - alert: AlertsSaturationHigh
        expr: 'sum(alertmanager_inflight_requests{job="cave-alerts"}) > 400'
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "cave-alerts inflight requests > 400"
          description: "Concurrent requests = {{ $value }}."
          runbook_url: "https://docs.cave.dev/runbooks/cave-alerts/saturation.md"
      - alert: AlertsMemoryPressure
        expr: 'process_resident_memory_bytes{job="cave-alerts"} > 4 * 1024 * 1024 * 1024'
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "cave-alerts RSS > 4 GiB"
          runbook_url: "https://docs.cave.dev/runbooks/cave-alerts/memory.md"
      - alert: AlertsCardinalityExplosion
        expr: 'count(count by (tenant_id) (alertmanager_total{job="cave-alerts"})) > 5000'
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "cave-alerts tenant cardinality > 5000"
          description: "Count = {{ $value }}."
          runbook_url: "https://docs.cave.dev/runbooks/cave-alerts/cardinality.md"
      - alert: AlertsHealthProbeFailing
        expr: 'min(up{job="cave-alerts"}) < 1'
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "cave-alerts health probe failing"
          description: "At least one instance reports up == 0."
          runbook_url: "https://docs.cave.dev/runbooks/cave-alerts/health.md"
