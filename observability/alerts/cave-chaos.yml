# Chaos injector
groups:
  - name: cave-chaos-slo
    interval: 30s
    rules:
      - alert: ChaosSloBurnRateFast
        expr: |
          (
            sum(rate(chaos_total{job="cave-chaos",code=~"5.."}[1h]))
            /
            sum(rate(chaos_total{job="cave-chaos"}[1h]))
          ) > (14.4 * 0.001)
        for: 2m
        labels:
          severity: critical
          tenant_scoped: "true"
        annotations:
          summary: "cave-chaos fast burn-rate (1h)"
          description: "5xx fraction is {{ $value | humanizePercentage }} — burning the 99.9% budget 14.4× faster than allowed."
          runbook_url: "https://docs.cave.dev/runbooks/cave-chaos/slo-burn-fast.md"
      - alert: ChaosSloBurnRateSlow
        expr: |
          (
            sum(rate(chaos_total{job="cave-chaos",code=~"5.."}[6h]))
            /
            sum(rate(chaos_total{job="cave-chaos"}[6h]))
          ) > (6 * 0.001)
        for: 15m
        labels:
          severity: warning
          tenant_scoped: "true"
        annotations:
          summary: "cave-chaos slow burn-rate (6h)"
          description: "Sustained 5xx fraction over 6h."
          runbook_url: "https://docs.cave.dev/runbooks/cave-chaos/slo-burn-slow.md"
      - alert: ChaosErrorBudgetLow
        expr: |
          (
            1 -
            (sum(rate(chaos_total{job="cave-chaos",code=~"5.."}[7d]))
              / sum(rate(chaos_total{job="cave-chaos"}[7d])))
          ) < 0.999
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "cave-chaos 7-day availability < 99.9%"
          description: "Trailing 7d availability = {{ $value | humanizePercentage }}."
          runbook_url: "https://docs.cave.dev/runbooks/cave-chaos/error-budget.md"
      - alert: ChaosLatencyP99High
        expr: |
          histogram_quantile(
            0.99,
            sum(rate(chaos_duration_seconds_bucket{job="cave-chaos"}[5m])) by (le)
          ) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "cave-chaos p99 latency > 1s"
          description: "p99 = {{ $value }}s."
          runbook_url: "https://docs.cave.dev/runbooks/cave-chaos/latency.md"
      - alert: ChaosSaturationHigh
        expr: 'sum(chaos_inflight_requests{job="cave-chaos"}) > 400'
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "cave-chaos inflight requests > 400"
          description: "Concurrent requests = {{ $value }}."
          runbook_url: "https://docs.cave.dev/runbooks/cave-chaos/saturation.md"
      - alert: ChaosMemoryPressure
        expr: 'process_resident_memory_bytes{job="cave-chaos"} > 4 * 1024 * 1024 * 1024'
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "cave-chaos RSS > 4 GiB"
          runbook_url: "https://docs.cave.dev/runbooks/cave-chaos/memory.md"
      - alert: ChaosCardinalityExplosion
        expr: 'count(count by (tenant_id) (chaos_total{job="cave-chaos"})) > 5000'
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "cave-chaos tenant cardinality > 5000"
          description: "Count = {{ $value }}."
          runbook_url: "https://docs.cave.dev/runbooks/cave-chaos/cardinality.md"
      - alert: ChaosHealthProbeFailing
        expr: 'min(up{job="cave-chaos"}) < 1'
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "cave-chaos health probe failing"
          description: "At least one instance reports up == 0."
          runbook_url: "https://docs.cave.dev/runbooks/cave-chaos/health.md"
