# Pod scheduler
groups:
  - name: cave-scheduler-slo
    interval: 30s
    rules:
      - alert: SchedulerSloBurnRateFast
        expr: |
          (
            sum(rate(scheduler_schedule_total{job="cave-scheduler",code=~"5.."}[1h]))
            /
            sum(rate(scheduler_schedule_total{job="cave-scheduler"}[1h]))
          ) > (14.4 * 0.001)
        for: 2m
        labels:
          severity: critical
          tenant_scoped: "true"
        annotations:
          summary: "cave-scheduler fast burn-rate (1h)"
          description: "5xx fraction is {{ $value | humanizePercentage }} — burning the 99.9% budget 14.4× faster than allowed."
          runbook_url: "https://docs.cave.dev/runbooks/cave-scheduler/slo-burn-fast.md"
      - alert: SchedulerSloBurnRateSlow
        expr: |
          (
            sum(rate(scheduler_schedule_total{job="cave-scheduler",code=~"5.."}[6h]))
            /
            sum(rate(scheduler_schedule_total{job="cave-scheduler"}[6h]))
          ) > (6 * 0.001)
        for: 15m
        labels:
          severity: warning
          tenant_scoped: "true"
        annotations:
          summary: "cave-scheduler slow burn-rate (6h)"
          description: "Sustained 5xx fraction over 6h."
          runbook_url: "https://docs.cave.dev/runbooks/cave-scheduler/slo-burn-slow.md"
      - alert: SchedulerErrorBudgetLow
        expr: |
          (
            1 -
            (sum(rate(scheduler_schedule_total{job="cave-scheduler",code=~"5.."}[7d]))
              / sum(rate(scheduler_schedule_total{job="cave-scheduler"}[7d])))
          ) < 0.999
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "cave-scheduler 7-day availability < 99.9%"
          description: "Trailing 7d availability = {{ $value | humanizePercentage }}."
          runbook_url: "https://docs.cave.dev/runbooks/cave-scheduler/error-budget.md"
      - alert: SchedulerLatencyP99High
        expr: |
          histogram_quantile(
            0.99,
            sum(rate(scheduler_schedule_duration_seconds_bucket{job="cave-scheduler"}[5m])) by (le)
          ) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "cave-scheduler p99 latency > 1s"
          description: "p99 = {{ $value }}s."
          runbook_url: "https://docs.cave.dev/runbooks/cave-scheduler/latency.md"
      - alert: SchedulerSaturationHigh
        expr: 'sum(scheduler_schedule_inflight_requests{job="cave-scheduler"}) > 400'
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "cave-scheduler inflight requests > 400"
          description: "Concurrent requests = {{ $value }}."
          runbook_url: "https://docs.cave.dev/runbooks/cave-scheduler/saturation.md"
      - alert: SchedulerMemoryPressure
        expr: 'process_resident_memory_bytes{job="cave-scheduler"} > 4 * 1024 * 1024 * 1024'
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "cave-scheduler RSS > 4 GiB"
          runbook_url: "https://docs.cave.dev/runbooks/cave-scheduler/memory.md"
      - alert: SchedulerCardinalityExplosion
        expr: 'count(count by (tenant_id) (scheduler_schedule_total{job="cave-scheduler"})) > 5000'
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "cave-scheduler tenant cardinality > 5000"
          description: "Count = {{ $value }}."
          runbook_url: "https://docs.cave.dev/runbooks/cave-scheduler/cardinality.md"
      - alert: SchedulerHealthProbeFailing
        expr: 'min(up{job="cave-scheduler"}) < 1'
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "cave-scheduler health probe failing"
          description: "At least one instance reports up == 0."
          runbook_url: "https://docs.cave.dev/runbooks/cave-scheduler/health.md"
