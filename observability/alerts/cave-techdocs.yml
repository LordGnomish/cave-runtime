# cave-techdocs alerts — auto-generated tier1 obs scaffold
groups:
  - name: cave-techdocs-slo
    interval: 30s
    rules:
      - alert: TechdocsSloBurnRateFast
        expr: |
          (
            sum(rate(cave_techdocs_total{job="cave-techdocs",code=~"5.."}[1h]))
            /
            sum(rate(cave_techdocs_total{job="cave-techdocs"}[1h]))
          ) > (14.4 * 0.001)
        for: 2m
        labels:
          severity: critical
          tenant_scoped: "true"
        annotations:
          summary: "cave-techdocs fast burn-rate (1h)"
          description: "5xx fraction is {{ $value | humanizePercentage }}."
          runbook_url: "https://docs.cave.dev/runbooks/cave-techdocs/slo-burn-fast.md"
      - alert: TechdocsLatencyP99High
        expr: |
          histogram_quantile(0.99, sum(rate(cave_techdocs_request_duration_seconds_bucket{job="cave-techdocs"}[5m])) by (le)) > 0.5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "cave-techdocs p99 latency > 500ms"
          description: "p99 latency = {{ $value }}s over 5m."
          runbook_url: "https://docs.cave.dev/runbooks/cave-techdocs/latency.md"
      - alert: TechdocsSaturationHigh
        expr: 'sum(rate(cave_techdocs_inflight_requests{job="cave-techdocs"}[5m])) > 100'
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "cave-techdocs inflight requests > 100"
          runbook_url: "https://docs.cave.dev/runbooks/cave-techdocs/saturation.md"
      - alert: TechdocsMemoryPressure
        expr: 'process_resident_memory_bytes{job="cave-techdocs"} > (4 * 1024 * 1024 * 1024)'
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "cave-techdocs RSS > 4 GiB"
          runbook_url: "https://docs.cave.dev/runbooks/cave-techdocs/memory.md"
      - alert: TechdocsHealthProbeFailing
        expr: 'min(up{job="cave-techdocs"}) < 1'
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "cave-techdocs health probe failing"
          description: "At least one instance reports up == 0."
          runbook_url: "https://docs.cave.dev/runbooks/cave-techdocs/health.md"
