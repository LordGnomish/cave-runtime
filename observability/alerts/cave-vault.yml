# Vault-parity secrets
groups:
  - name: cave-vault-slo
    interval: 30s
    rules:
      - alert: VaultSloBurnRateFast
        expr: |
          (
            sum(rate(vault_total{job="cave-vault",code=~"5.."}[1h]))
            /
            sum(rate(vault_total{job="cave-vault"}[1h]))
          ) > (14.4 * 0.001)
        for: 2m
        labels:
          severity: critical
          tenant_scoped: "true"
        annotations:
          summary: "cave-vault fast burn-rate (1h)"
          description: "5xx fraction is {{ $value | humanizePercentage }} — burning the 99.9% budget 14.4× faster than allowed."
          runbook_url: "https://docs.cave.dev/runbooks/cave-vault/slo-burn-fast.md"
      - alert: VaultSloBurnRateSlow
        expr: |
          (
            sum(rate(vault_total{job="cave-vault",code=~"5.."}[6h]))
            /
            sum(rate(vault_total{job="cave-vault"}[6h]))
          ) > (6 * 0.001)
        for: 15m
        labels:
          severity: warning
          tenant_scoped: "true"
        annotations:
          summary: "cave-vault slow burn-rate (6h)"
          description: "Sustained 5xx fraction over 6h."
          runbook_url: "https://docs.cave.dev/runbooks/cave-vault/slo-burn-slow.md"
      - alert: VaultErrorBudgetLow
        expr: |
          (
            1 -
            (sum(rate(vault_total{job="cave-vault",code=~"5.."}[7d]))
              / sum(rate(vault_total{job="cave-vault"}[7d])))
          ) < 0.999
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "cave-vault 7-day availability < 99.9%"
          description: "Trailing 7d availability = {{ $value | humanizePercentage }}."
          runbook_url: "https://docs.cave.dev/runbooks/cave-vault/error-budget.md"
      - alert: VaultLatencyP99High
        expr: |
          histogram_quantile(
            0.99,
            sum(rate(vault_duration_seconds_bucket{job="cave-vault"}[5m])) by (le)
          ) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "cave-vault p99 latency > 1s"
          description: "p99 = {{ $value }}s."
          runbook_url: "https://docs.cave.dev/runbooks/cave-vault/latency.md"
      - alert: VaultSaturationHigh
        expr: 'sum(vault_inflight_requests{job="cave-vault"}) > 400'
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "cave-vault inflight requests > 400"
          description: "Concurrent requests = {{ $value }}."
          runbook_url: "https://docs.cave.dev/runbooks/cave-vault/saturation.md"
      - alert: VaultMemoryPressure
        expr: 'process_resident_memory_bytes{job="cave-vault"} > 4 * 1024 * 1024 * 1024'
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "cave-vault RSS > 4 GiB"
          runbook_url: "https://docs.cave.dev/runbooks/cave-vault/memory.md"
      - alert: VaultCardinalityExplosion
        expr: 'count(count by (tenant_id) (vault_total{job="cave-vault"})) > 5000'
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "cave-vault tenant cardinality > 5000"
          description: "Count = {{ $value }}."
          runbook_url: "https://docs.cave.dev/runbooks/cave-vault/cardinality.md"
      - alert: VaultHealthProbeFailing
        expr: 'min(up{job="cave-vault"}) < 1'
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "cave-vault health probe failing"
          description: "At least one instance reports up == 0."
          runbook_url: "https://docs.cave.dev/runbooks/cave-vault/health.md"
