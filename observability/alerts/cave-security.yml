# Security event bus
groups:
  - name: cave-security-slo
    interval: 30s
    rules:
      - alert: SecuritySloBurnRateFast
        expr: |
          (
            sum(rate(security_total{job="cave-security",code=~"5.."}[1h]))
            /
            sum(rate(security_total{job="cave-security"}[1h]))
          ) > (14.4 * 0.001)
        for: 2m
        labels:
          severity: critical
          tenant_scoped: "true"
        annotations:
          summary: "cave-security fast burn-rate (1h)"
          description: "5xx fraction is {{ $value | humanizePercentage }} — burning the 99.9% budget 14.4× faster than allowed."
          runbook_url: "https://docs.cave.dev/runbooks/cave-security/slo-burn-fast.md"
      - alert: SecuritySloBurnRateSlow
        expr: |
          (
            sum(rate(security_total{job="cave-security",code=~"5.."}[6h]))
            /
            sum(rate(security_total{job="cave-security"}[6h]))
          ) > (6 * 0.001)
        for: 15m
        labels:
          severity: warning
          tenant_scoped: "true"
        annotations:
          summary: "cave-security slow burn-rate (6h)"
          description: "Sustained 5xx fraction over 6h."
          runbook_url: "https://docs.cave.dev/runbooks/cave-security/slo-burn-slow.md"
      - alert: SecurityErrorBudgetLow
        expr: |
          (
            1 -
            (sum(rate(security_total{job="cave-security",code=~"5.."}[7d]))
              / sum(rate(security_total{job="cave-security"}[7d])))
          ) < 0.999
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "cave-security 7-day availability < 99.9%"
          description: "Trailing 7d availability = {{ $value | humanizePercentage }}."
          runbook_url: "https://docs.cave.dev/runbooks/cave-security/error-budget.md"
      - alert: SecurityLatencyP99High
        expr: |
          histogram_quantile(
            0.99,
            sum(rate(security_duration_seconds_bucket{job="cave-security"}[5m])) by (le)
          ) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "cave-security p99 latency > 1s"
          description: "p99 = {{ $value }}s."
          runbook_url: "https://docs.cave.dev/runbooks/cave-security/latency.md"
      - alert: SecuritySaturationHigh
        expr: 'sum(security_inflight_requests{job="cave-security"}) > 400'
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "cave-security inflight requests > 400"
          description: "Concurrent requests = {{ $value }}."
          runbook_url: "https://docs.cave.dev/runbooks/cave-security/saturation.md"
      - alert: SecurityMemoryPressure
        expr: 'process_resident_memory_bytes{job="cave-security"} > 4 * 1024 * 1024 * 1024'
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "cave-security RSS > 4 GiB"
          runbook_url: "https://docs.cave.dev/runbooks/cave-security/memory.md"
      - alert: SecurityCardinalityExplosion
        expr: 'count(count by (tenant_id) (security_total{job="cave-security"})) > 5000'
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "cave-security tenant cardinality > 5000"
          description: "Count = {{ $value }}."
          runbook_url: "https://docs.cave.dev/runbooks/cave-security/cardinality.md"
      - alert: SecurityHealthProbeFailing
        expr: 'min(up{job="cave-security"}) < 1'
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "cave-security health probe failing"
          description: "At least one instance reports up == 0."
          runbook_url: "https://docs.cave.dev/runbooks/cave-security/health.md"
