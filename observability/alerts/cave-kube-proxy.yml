# Service-VIP data-plane
groups:
  - name: cave-kube-proxy-slo
    interval: 30s
    rules:
      - alert: KubeProxySloBurnRateFast
        expr: |
          (
            sum(rate(kube_proxy_total{job="cave-kube-proxy",code=~"5.."}[1h]))
            /
            sum(rate(kube_proxy_total{job="cave-kube-proxy"}[1h]))
          ) > (14.4 * 0.001)
        for: 2m
        labels:
          severity: critical
          tenant_scoped: "true"
        annotations:
          summary: "cave-kube-proxy fast burn-rate (1h)"
          description: "5xx fraction is {{ $value | humanizePercentage }} — burning the 99.9% budget 14.4× faster than allowed."
          runbook_url: "https://docs.cave.dev/runbooks/cave-kube-proxy/slo-burn-fast.md"
      - alert: KubeProxySloBurnRateSlow
        expr: |
          (
            sum(rate(kube_proxy_total{job="cave-kube-proxy",code=~"5.."}[6h]))
            /
            sum(rate(kube_proxy_total{job="cave-kube-proxy"}[6h]))
          ) > (6 * 0.001)
        for: 15m
        labels:
          severity: warning
          tenant_scoped: "true"
        annotations:
          summary: "cave-kube-proxy slow burn-rate (6h)"
          description: "Sustained 5xx fraction over 6h."
          runbook_url: "https://docs.cave.dev/runbooks/cave-kube-proxy/slo-burn-slow.md"
      - alert: KubeProxyErrorBudgetLow
        expr: |
          (
            1 -
            (sum(rate(kube_proxy_total{job="cave-kube-proxy",code=~"5.."}[7d]))
              / sum(rate(kube_proxy_total{job="cave-kube-proxy"}[7d])))
          ) < 0.999
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "cave-kube-proxy 7-day availability < 99.9%"
          description: "Trailing 7d availability = {{ $value | humanizePercentage }}."
          runbook_url: "https://docs.cave.dev/runbooks/cave-kube-proxy/error-budget.md"
      - alert: KubeProxyLatencyP99High
        expr: |
          histogram_quantile(
            0.99,
            sum(rate(kube_proxy_duration_seconds_bucket{job="cave-kube-proxy"}[5m])) by (le)
          ) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "cave-kube-proxy p99 latency > 1s"
          description: "p99 = {{ $value }}s."
          runbook_url: "https://docs.cave.dev/runbooks/cave-kube-proxy/latency.md"
      - alert: KubeProxySaturationHigh
        expr: 'sum(kube_proxy_inflight_requests{job="cave-kube-proxy"}) > 400'
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "cave-kube-proxy inflight requests > 400"
          description: "Concurrent requests = {{ $value }}."
          runbook_url: "https://docs.cave.dev/runbooks/cave-kube-proxy/saturation.md"
      - alert: KubeProxyMemoryPressure
        expr: 'process_resident_memory_bytes{job="cave-kube-proxy"} > 4 * 1024 * 1024 * 1024'
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "cave-kube-proxy RSS > 4 GiB"
          runbook_url: "https://docs.cave.dev/runbooks/cave-kube-proxy/memory.md"
      - alert: KubeProxyCardinalityExplosion
        expr: 'count(count by (tenant_id) (kube_proxy_total{job="cave-kube-proxy"})) > 5000'
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "cave-kube-proxy tenant cardinality > 5000"
          description: "Count = {{ $value }}."
          runbook_url: "https://docs.cave.dev/runbooks/cave-kube-proxy/cardinality.md"
      - alert: KubeProxyHealthProbeFailing
        expr: 'min(up{job="cave-kube-proxy"}) < 1'
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "cave-kube-proxy health probe failing"
          description: "At least one instance reports up == 0."
          runbook_url: "https://docs.cave.dev/runbooks/cave-kube-proxy/health.md"
