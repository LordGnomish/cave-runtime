# SLO evaluator
groups:
  - name: cave-slo-slo
    interval: 30s
    rules:
      - alert: SloSloBurnRateFast
        expr: |
          (
            sum(rate(slo_total{job="cave-slo",code=~"5.."}[1h]))
            /
            sum(rate(slo_total{job="cave-slo"}[1h]))
          ) > (14.4 * 0.001)
        for: 2m
        labels:
          severity: critical
          tenant_scoped: "true"
        annotations:
          summary: "cave-slo fast burn-rate (1h)"
          description: "5xx fraction is {{ $value | humanizePercentage }} — burning the 99.9% budget 14.4× faster than allowed."
          runbook_url: "https://docs.cave.dev/runbooks/cave-slo/slo-burn-fast.md"
      - alert: SloSloBurnRateSlow
        expr: |
          (
            sum(rate(slo_total{job="cave-slo",code=~"5.."}[6h]))
            /
            sum(rate(slo_total{job="cave-slo"}[6h]))
          ) > (6 * 0.001)
        for: 15m
        labels:
          severity: warning
          tenant_scoped: "true"
        annotations:
          summary: "cave-slo slow burn-rate (6h)"
          description: "Sustained 5xx fraction over 6h."
          runbook_url: "https://docs.cave.dev/runbooks/cave-slo/slo-burn-slow.md"
      - alert: SloErrorBudgetLow
        expr: |
          (
            1 -
            (sum(rate(slo_total{job="cave-slo",code=~"5.."}[7d]))
              / sum(rate(slo_total{job="cave-slo"}[7d])))
          ) < 0.999
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "cave-slo 7-day availability < 99.9%"
          description: "Trailing 7d availability = {{ $value | humanizePercentage }}."
          runbook_url: "https://docs.cave.dev/runbooks/cave-slo/error-budget.md"
      - alert: SloLatencyP99High
        expr: |
          histogram_quantile(
            0.99,
            sum(rate(slo_duration_seconds_bucket{job="cave-slo"}[5m])) by (le)
          ) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "cave-slo p99 latency > 1s"
          description: "p99 = {{ $value }}s."
          runbook_url: "https://docs.cave.dev/runbooks/cave-slo/latency.md"
      - alert: SloSaturationHigh
        expr: 'sum(slo_inflight_requests{job="cave-slo"}) > 400'
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "cave-slo inflight requests > 400"
          description: "Concurrent requests = {{ $value }}."
          runbook_url: "https://docs.cave.dev/runbooks/cave-slo/saturation.md"
      - alert: SloMemoryPressure
        expr: 'process_resident_memory_bytes{job="cave-slo"} > 4 * 1024 * 1024 * 1024'
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "cave-slo RSS > 4 GiB"
          runbook_url: "https://docs.cave.dev/runbooks/cave-slo/memory.md"
      - alert: SloCardinalityExplosion
        expr: 'count(count by (tenant_id) (slo_total{job="cave-slo"})) > 5000'
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "cave-slo tenant cardinality > 5000"
          description: "Count = {{ $value }}."
          runbook_url: "https://docs.cave.dev/runbooks/cave-slo/cardinality.md"
      - alert: SloHealthProbeFailing
        expr: 'min(up{job="cave-slo"}) < 1'
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "cave-slo health probe failing"
          description: "At least one instance reports up == 0."
          runbook_url: "https://docs.cave.dev/runbooks/cave-slo/health.md"
