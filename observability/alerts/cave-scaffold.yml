# Service scaffolder
groups:
  - name: cave-scaffold-slo
    interval: 30s
    rules:
      - alert: ScaffoldSloBurnRateFast
        expr: |
          (
            sum(rate(scaffold_total{job="cave-scaffold",code=~"5.."}[1h]))
            /
            sum(rate(scaffold_total{job="cave-scaffold"}[1h]))
          ) > (14.4 * 0.001)
        for: 2m
        labels:
          severity: critical
          tenant_scoped: "true"
        annotations:
          summary: "cave-scaffold fast burn-rate (1h)"
          description: "5xx fraction is {{ $value | humanizePercentage }} — burning the 99.9% budget 14.4× faster than allowed."
          runbook_url: "https://docs.cave.dev/runbooks/cave-scaffold/slo-burn-fast.md"
      - alert: ScaffoldSloBurnRateSlow
        expr: |
          (
            sum(rate(scaffold_total{job="cave-scaffold",code=~"5.."}[6h]))
            /
            sum(rate(scaffold_total{job="cave-scaffold"}[6h]))
          ) > (6 * 0.001)
        for: 15m
        labels:
          severity: warning
          tenant_scoped: "true"
        annotations:
          summary: "cave-scaffold slow burn-rate (6h)"
          description: "Sustained 5xx fraction over 6h."
          runbook_url: "https://docs.cave.dev/runbooks/cave-scaffold/slo-burn-slow.md"
      - alert: ScaffoldErrorBudgetLow
        expr: |
          (
            1 -
            (sum(rate(scaffold_total{job="cave-scaffold",code=~"5.."}[7d]))
              / sum(rate(scaffold_total{job="cave-scaffold"}[7d])))
          ) < 0.999
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "cave-scaffold 7-day availability < 99.9%"
          description: "Trailing 7d availability = {{ $value | humanizePercentage }}."
          runbook_url: "https://docs.cave.dev/runbooks/cave-scaffold/error-budget.md"
      - alert: ScaffoldLatencyP99High
        expr: |
          histogram_quantile(
            0.99,
            sum(rate(scaffold_duration_seconds_bucket{job="cave-scaffold"}[5m])) by (le)
          ) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "cave-scaffold p99 latency > 1s"
          description: "p99 = {{ $value }}s."
          runbook_url: "https://docs.cave.dev/runbooks/cave-scaffold/latency.md"
      - alert: ScaffoldSaturationHigh
        expr: 'sum(scaffold_inflight_requests{job="cave-scaffold"}) > 400'
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "cave-scaffold inflight requests > 400"
          description: "Concurrent requests = {{ $value }}."
          runbook_url: "https://docs.cave.dev/runbooks/cave-scaffold/saturation.md"
      - alert: ScaffoldMemoryPressure
        expr: 'process_resident_memory_bytes{job="cave-scaffold"} > 4 * 1024 * 1024 * 1024'
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "cave-scaffold RSS > 4 GiB"
          runbook_url: "https://docs.cave.dev/runbooks/cave-scaffold/memory.md"
      - alert: ScaffoldCardinalityExplosion
        expr: 'count(count by (tenant_id) (scaffold_total{job="cave-scaffold"})) > 5000'
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "cave-scaffold tenant cardinality > 5000"
          description: "Count = {{ $value }}."
          runbook_url: "https://docs.cave.dev/runbooks/cave-scaffold/cardinality.md"
      - alert: ScaffoldHealthProbeFailing
        expr: 'min(up{job="cave-scaffold"}) < 1'
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "cave-scaffold health probe failing"
          description: "At least one instance reports up == 0."
          runbook_url: "https://docs.cave.dev/runbooks/cave-scaffold/health.md"
