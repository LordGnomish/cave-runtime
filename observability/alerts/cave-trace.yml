# Distributed tracing store
groups:
  - name: cave-trace-slo
    interval: 30s
    rules:
      - alert: TraceSloBurnRateFast
        expr: |
          (
            sum(rate(trace_total{job="cave-trace",code=~"5.."}[1h]))
            /
            sum(rate(trace_total{job="cave-trace"}[1h]))
          ) > (14.4 * 0.001)
        for: 2m
        labels:
          severity: critical
          tenant_scoped: "true"
        annotations:
          summary: "cave-trace fast burn-rate (1h)"
          description: "5xx fraction is {{ $value | humanizePercentage }} — burning the 99.9% budget 14.4× faster than allowed."
          runbook_url: "https://docs.cave.dev/runbooks/cave-trace/slo-burn-fast.md"
      - alert: TraceSloBurnRateSlow
        expr: |
          (
            sum(rate(trace_total{job="cave-trace",code=~"5.."}[6h]))
            /
            sum(rate(trace_total{job="cave-trace"}[6h]))
          ) > (6 * 0.001)
        for: 15m
        labels:
          severity: warning
          tenant_scoped: "true"
        annotations:
          summary: "cave-trace slow burn-rate (6h)"
          description: "Sustained 5xx fraction over 6h."
          runbook_url: "https://docs.cave.dev/runbooks/cave-trace/slo-burn-slow.md"
      - alert: TraceErrorBudgetLow
        expr: |
          (
            1 -
            (sum(rate(trace_total{job="cave-trace",code=~"5.."}[7d]))
              / sum(rate(trace_total{job="cave-trace"}[7d])))
          ) < 0.999
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "cave-trace 7-day availability < 99.9%"
          description: "Trailing 7d availability = {{ $value | humanizePercentage }}."
          runbook_url: "https://docs.cave.dev/runbooks/cave-trace/error-budget.md"
      - alert: TraceLatencyP99High
        expr: |
          histogram_quantile(
            0.99,
            sum(rate(trace_duration_seconds_bucket{job="cave-trace"}[5m])) by (le)
          ) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "cave-trace p99 latency > 1s"
          description: "p99 = {{ $value }}s."
          runbook_url: "https://docs.cave.dev/runbooks/cave-trace/latency.md"
      - alert: TraceSaturationHigh
        expr: 'sum(trace_inflight_requests{job="cave-trace"}) > 400'
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "cave-trace inflight requests > 400"
          description: "Concurrent requests = {{ $value }}."
          runbook_url: "https://docs.cave.dev/runbooks/cave-trace/saturation.md"
      - alert: TraceMemoryPressure
        expr: 'process_resident_memory_bytes{job="cave-trace"} > 4 * 1024 * 1024 * 1024'
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "cave-trace RSS > 4 GiB"
          runbook_url: "https://docs.cave.dev/runbooks/cave-trace/memory.md"
      - alert: TraceCardinalityExplosion
        expr: 'count(count by (tenant_id) (trace_total{job="cave-trace"})) > 5000'
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "cave-trace tenant cardinality > 5000"
          description: "Count = {{ $value }}."
          runbook_url: "https://docs.cave.dev/runbooks/cave-trace/cardinality.md"
      - alert: TraceHealthProbeFailing
        expr: 'min(up{job="cave-trace"}) < 1'
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "cave-trace health probe failing"
          description: "At least one instance reports up == 0."
          runbook_url: "https://docs.cave.dev/runbooks/cave-trace/health.md"
