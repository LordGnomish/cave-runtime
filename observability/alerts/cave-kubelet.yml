# Node-side kubelet
groups:
  - name: cave-kubelet-slo
    interval: 30s
    rules:
      - alert: KubeletSloBurnRateFast
        expr: |
          (
            sum(rate(kubelet_pod_total{job="cave-kubelet",code=~"5.."}[1h]))
            /
            sum(rate(kubelet_pod_total{job="cave-kubelet"}[1h]))
          ) > (14.4 * 0.001)
        for: 2m
        labels:
          severity: critical
          tenant_scoped: "true"
        annotations:
          summary: "cave-kubelet fast burn-rate (1h)"
          description: "5xx fraction is {{ $value | humanizePercentage }} — burning the 99.9% budget 14.4× faster than allowed."
          runbook_url: "https://docs.cave.dev/runbooks/cave-kubelet/slo-burn-fast.md"
      - alert: KubeletSloBurnRateSlow
        expr: |
          (
            sum(rate(kubelet_pod_total{job="cave-kubelet",code=~"5.."}[6h]))
            /
            sum(rate(kubelet_pod_total{job="cave-kubelet"}[6h]))
          ) > (6 * 0.001)
        for: 15m
        labels:
          severity: warning
          tenant_scoped: "true"
        annotations:
          summary: "cave-kubelet slow burn-rate (6h)"
          description: "Sustained 5xx fraction over 6h."
          runbook_url: "https://docs.cave.dev/runbooks/cave-kubelet/slo-burn-slow.md"
      - alert: KubeletErrorBudgetLow
        expr: |
          (
            1 -
            (sum(rate(kubelet_pod_total{job="cave-kubelet",code=~"5.."}[7d]))
              / sum(rate(kubelet_pod_total{job="cave-kubelet"}[7d])))
          ) < 0.999
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "cave-kubelet 7-day availability < 99.9%"
          description: "Trailing 7d availability = {{ $value | humanizePercentage }}."
          runbook_url: "https://docs.cave.dev/runbooks/cave-kubelet/error-budget.md"
      - alert: KubeletLatencyP99High
        expr: |
          histogram_quantile(
            0.99,
            sum(rate(kubelet_pod_duration_seconds_bucket{job="cave-kubelet"}[5m])) by (le)
          ) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "cave-kubelet p99 latency > 1s"
          description: "p99 = {{ $value }}s."
          runbook_url: "https://docs.cave.dev/runbooks/cave-kubelet/latency.md"
      - alert: KubeletSaturationHigh
        expr: 'sum(kubelet_pod_inflight_requests{job="cave-kubelet"}) > 400'
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "cave-kubelet inflight requests > 400"
          description: "Concurrent requests = {{ $value }}."
          runbook_url: "https://docs.cave.dev/runbooks/cave-kubelet/saturation.md"
      - alert: KubeletMemoryPressure
        expr: 'process_resident_memory_bytes{job="cave-kubelet"} > 4 * 1024 * 1024 * 1024'
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "cave-kubelet RSS > 4 GiB"
          runbook_url: "https://docs.cave.dev/runbooks/cave-kubelet/memory.md"
      - alert: KubeletCardinalityExplosion
        expr: 'count(count by (tenant_id) (kubelet_pod_total{job="cave-kubelet"})) > 5000'
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "cave-kubelet tenant cardinality > 5000"
          description: "Count = {{ $value }}."
          runbook_url: "https://docs.cave.dev/runbooks/cave-kubelet/cardinality.md"
      - alert: KubeletHealthProbeFailing
        expr: 'min(up{job="cave-kubelet"}) < 1'
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "cave-kubelet health probe failing"
          description: "At least one instance reports up == 0."
          runbook_url: "https://docs.cave.dev/runbooks/cave-kubelet/health.md"
