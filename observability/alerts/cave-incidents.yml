# Incident management
groups:
  - name: cave-incidents-slo
    interval: 30s
    rules:
      - alert: IncidentsSloBurnRateFast
        expr: |
          (
            sum(rate(incidents_total{job="cave-incidents",code=~"5.."}[1h]))
            /
            sum(rate(incidents_total{job="cave-incidents"}[1h]))
          ) > (14.4 * 0.001)
        for: 2m
        labels:
          severity: critical
          tenant_scoped: "true"
        annotations:
          summary: "cave-incidents fast burn-rate (1h)"
          description: "5xx fraction is {{ $value | humanizePercentage }} — burning the 99.9% budget 14.4× faster than allowed."
          runbook_url: "https://docs.cave.dev/runbooks/cave-incidents/slo-burn-fast.md"
      - alert: IncidentsSloBurnRateSlow
        expr: |
          (
            sum(rate(incidents_total{job="cave-incidents",code=~"5.."}[6h]))
            /
            sum(rate(incidents_total{job="cave-incidents"}[6h]))
          ) > (6 * 0.001)
        for: 15m
        labels:
          severity: warning
          tenant_scoped: "true"
        annotations:
          summary: "cave-incidents slow burn-rate (6h)"
          description: "Sustained 5xx fraction over 6h."
          runbook_url: "https://docs.cave.dev/runbooks/cave-incidents/slo-burn-slow.md"
      - alert: IncidentsErrorBudgetLow
        expr: |
          (
            1 -
            (sum(rate(incidents_total{job="cave-incidents",code=~"5.."}[7d]))
              / sum(rate(incidents_total{job="cave-incidents"}[7d])))
          ) < 0.999
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "cave-incidents 7-day availability < 99.9%"
          description: "Trailing 7d availability = {{ $value | humanizePercentage }}."
          runbook_url: "https://docs.cave.dev/runbooks/cave-incidents/error-budget.md"
      - alert: IncidentsLatencyP99High
        expr: |
          histogram_quantile(
            0.99,
            sum(rate(incidents_duration_seconds_bucket{job="cave-incidents"}[5m])) by (le)
          ) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "cave-incidents p99 latency > 1s"
          description: "p99 = {{ $value }}s."
          runbook_url: "https://docs.cave.dev/runbooks/cave-incidents/latency.md"
      - alert: IncidentsSaturationHigh
        expr: 'sum(incidents_inflight_requests{job="cave-incidents"}) > 400'
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "cave-incidents inflight requests > 400"
          description: "Concurrent requests = {{ $value }}."
          runbook_url: "https://docs.cave.dev/runbooks/cave-incidents/saturation.md"
      - alert: IncidentsMemoryPressure
        expr: 'process_resident_memory_bytes{job="cave-incidents"} > 4 * 1024 * 1024 * 1024'
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "cave-incidents RSS > 4 GiB"
          runbook_url: "https://docs.cave.dev/runbooks/cave-incidents/memory.md"
      - alert: IncidentsCardinalityExplosion
        expr: 'count(count by (tenant_id) (incidents_total{job="cave-incidents"})) > 5000'
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "cave-incidents tenant cardinality > 5000"
          description: "Count = {{ $value }}."
          runbook_url: "https://docs.cave.dev/runbooks/cave-incidents/cardinality.md"
      - alert: IncidentsHealthProbeFailing
        expr: 'min(up{job="cave-incidents"}) < 1'
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "cave-incidents health probe failing"
          description: "At least one instance reports up == 0."
          runbook_url: "https://docs.cave.dev/runbooks/cave-incidents/health.md"
