# cave-pki alerts — auto-generated tier1 obs scaffold
groups:
  - name: cave-pki-slo
    interval: 30s
    rules:
      - alert: PkiSloBurnRateFast
        expr: |
          (
            sum(rate(cave_pki_total{job="cave-pki",code=~"5.."}[1h]))
            /
            sum(rate(cave_pki_total{job="cave-pki"}[1h]))
          ) > (14.4 * 0.001)
        for: 2m
        labels:
          severity: critical
          tenant_scoped: "true"
        annotations:
          summary: "cave-pki fast burn-rate (1h)"
          description: "5xx fraction is {{ $value | humanizePercentage }}."
          runbook_url: "https://docs.cave.dev/runbooks/cave-pki/slo-burn-fast.md"
      - alert: PkiLatencyP99High
        expr: |
          histogram_quantile(0.99, sum(rate(cave_pki_request_duration_seconds_bucket{job="cave-pki"}[5m])) by (le)) > 0.5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "cave-pki p99 latency > 500ms"
          description: "p99 latency = {{ $value }}s over 5m."
          runbook_url: "https://docs.cave.dev/runbooks/cave-pki/latency.md"
      - alert: PkiSaturationHigh
        expr: 'sum(rate(cave_pki_inflight_requests{job="cave-pki"}[5m])) > 100'
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "cave-pki inflight requests > 100"
          runbook_url: "https://docs.cave.dev/runbooks/cave-pki/saturation.md"
      - alert: PkiMemoryPressure
        expr: 'process_resident_memory_bytes{job="cave-pki"} > (4 * 1024 * 1024 * 1024)'
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "cave-pki RSS > 4 GiB"
          runbook_url: "https://docs.cave.dev/runbooks/cave-pki/memory.md"
      - alert: PkiHealthProbeFailing
        expr: 'min(up{job="cave-pki"}) < 1'
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "cave-pki health probe failing"
          description: "At least one instance reports up == 0."
          runbook_url: "https://docs.cave.dev/runbooks/cave-pki/health.md"
