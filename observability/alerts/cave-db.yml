# cave-db alerts — auto-generated tier1 obs scaffold
groups:
  - name: cave-db-slo
    interval: 30s
    rules:
      - alert: DbSloBurnRateFast
        expr: |
          (
            sum(rate(cave_db_total{job="cave-db",code=~"5.."}[1h]))
            /
            sum(rate(cave_db_total{job="cave-db"}[1h]))
          ) > (14.4 * 0.001)
        for: 2m
        labels:
          severity: critical
          tenant_scoped: "true"
        annotations:
          summary: "cave-db fast burn-rate (1h)"
          description: "5xx fraction is {{ $value | humanizePercentage }}."
          runbook_url: "https://docs.cave.dev/runbooks/cave-db/slo-burn-fast.md"
      - alert: DbLatencyP99High
        expr: |
          histogram_quantile(0.99, sum(rate(cave_db_request_duration_seconds_bucket{job="cave-db"}[5m])) by (le)) > 0.5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "cave-db p99 latency > 500ms"
          description: "p99 latency = {{ $value }}s over 5m."
          runbook_url: "https://docs.cave.dev/runbooks/cave-db/latency.md"
      - alert: DbSaturationHigh
        expr: 'sum(rate(cave_db_inflight_requests{job="cave-db"}[5m])) > 100'
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "cave-db inflight requests > 100"
          runbook_url: "https://docs.cave.dev/runbooks/cave-db/saturation.md"
      - alert: DbMemoryPressure
        expr: 'process_resident_memory_bytes{job="cave-db"} > (4 * 1024 * 1024 * 1024)'
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "cave-db RSS > 4 GiB"
          runbook_url: "https://docs.cave.dev/runbooks/cave-db/memory.md"
      - alert: DbHealthProbeFailing
        expr: 'min(up{job="cave-db"}) < 1'
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "cave-db health probe failing"
          description: "At least one instance reports up == 0."
          runbook_url: "https://docs.cave.dev/runbooks/cave-db/health.md"
