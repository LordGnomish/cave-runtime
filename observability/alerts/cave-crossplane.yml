# Crossplane-parity providers
groups:
  - name: cave-crossplane-slo
    interval: 30s
    rules:
      - alert: CrossplaneSloBurnRateFast
        expr: |
          (
            sum(rate(crossplane_total{job="cave-crossplane",code=~"5.."}[1h]))
            /
            sum(rate(crossplane_total{job="cave-crossplane"}[1h]))
          ) > (14.4 * 0.001)
        for: 2m
        labels:
          severity: critical
          tenant_scoped: "true"
        annotations:
          summary: "cave-crossplane fast burn-rate (1h)"
          description: "5xx fraction is {{ $value | humanizePercentage }} — burning the 99.9% budget 14.4× faster than allowed."
          runbook_url: "https://docs.cave.dev/runbooks/cave-crossplane/slo-burn-fast.md"
      - alert: CrossplaneSloBurnRateSlow
        expr: |
          (
            sum(rate(crossplane_total{job="cave-crossplane",code=~"5.."}[6h]))
            /
            sum(rate(crossplane_total{job="cave-crossplane"}[6h]))
          ) > (6 * 0.001)
        for: 15m
        labels:
          severity: warning
          tenant_scoped: "true"
        annotations:
          summary: "cave-crossplane slow burn-rate (6h)"
          description: "Sustained 5xx fraction over 6h."
          runbook_url: "https://docs.cave.dev/runbooks/cave-crossplane/slo-burn-slow.md"
      - alert: CrossplaneErrorBudgetLow
        expr: |
          (
            1 -
            (sum(rate(crossplane_total{job="cave-crossplane",code=~"5.."}[7d]))
              / sum(rate(crossplane_total{job="cave-crossplane"}[7d])))
          ) < 0.999
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "cave-crossplane 7-day availability < 99.9%"
          description: "Trailing 7d availability = {{ $value | humanizePercentage }}."
          runbook_url: "https://docs.cave.dev/runbooks/cave-crossplane/error-budget.md"
      - alert: CrossplaneLatencyP99High
        expr: |
          histogram_quantile(
            0.99,
            sum(rate(crossplane_duration_seconds_bucket{job="cave-crossplane"}[5m])) by (le)
          ) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "cave-crossplane p99 latency > 1s"
          description: "p99 = {{ $value }}s."
          runbook_url: "https://docs.cave.dev/runbooks/cave-crossplane/latency.md"
      - alert: CrossplaneSaturationHigh
        expr: 'sum(crossplane_inflight_requests{job="cave-crossplane"}) > 400'
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "cave-crossplane inflight requests > 400"
          description: "Concurrent requests = {{ $value }}."
          runbook_url: "https://docs.cave.dev/runbooks/cave-crossplane/saturation.md"
      - alert: CrossplaneMemoryPressure
        expr: 'process_resident_memory_bytes{job="cave-crossplane"} > 4 * 1024 * 1024 * 1024'
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "cave-crossplane RSS > 4 GiB"
          runbook_url: "https://docs.cave.dev/runbooks/cave-crossplane/memory.md"
      - alert: CrossplaneCardinalityExplosion
        expr: 'count(count by (tenant_id) (crossplane_total{job="cave-crossplane"})) > 5000'
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "cave-crossplane tenant cardinality > 5000"
          description: "Count = {{ $value }}."
          runbook_url: "https://docs.cave.dev/runbooks/cave-crossplane/cardinality.md"
      - alert: CrossplaneHealthProbeFailing
        expr: 'min(up{job="cave-crossplane"}) < 1'
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "cave-crossplane health probe failing"
          description: "At least one instance reports up == 0."
          runbook_url: "https://docs.cave.dev/runbooks/cave-crossplane/health.md"
