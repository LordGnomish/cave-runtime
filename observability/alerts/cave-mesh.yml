# Service mesh
groups:
  - name: cave-mesh-slo
    interval: 30s
    rules:
      - alert: MeshSloBurnRateFast
        expr: |
          (
            sum(rate(mesh_total{job="cave-mesh",code=~"5.."}[1h]))
            /
            sum(rate(mesh_total{job="cave-mesh"}[1h]))
          ) > (14.4 * 0.001)
        for: 2m
        labels:
          severity: critical
          tenant_scoped: "true"
        annotations:
          summary: "cave-mesh fast burn-rate (1h)"
          description: "5xx fraction is {{ $value | humanizePercentage }} — burning the 99.9% budget 14.4× faster than allowed."
          runbook_url: "https://docs.cave.dev/runbooks/cave-mesh/slo-burn-fast.md"
      - alert: MeshSloBurnRateSlow
        expr: |
          (
            sum(rate(mesh_total{job="cave-mesh",code=~"5.."}[6h]))
            /
            sum(rate(mesh_total{job="cave-mesh"}[6h]))
          ) > (6 * 0.001)
        for: 15m
        labels:
          severity: warning
          tenant_scoped: "true"
        annotations:
          summary: "cave-mesh slow burn-rate (6h)"
          description: "Sustained 5xx fraction over 6h."
          runbook_url: "https://docs.cave.dev/runbooks/cave-mesh/slo-burn-slow.md"
      - alert: MeshErrorBudgetLow
        expr: |
          (
            1 -
            (sum(rate(mesh_total{job="cave-mesh",code=~"5.."}[7d]))
              / sum(rate(mesh_total{job="cave-mesh"}[7d])))
          ) < 0.999
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "cave-mesh 7-day availability < 99.9%"
          description: "Trailing 7d availability = {{ $value | humanizePercentage }}."
          runbook_url: "https://docs.cave.dev/runbooks/cave-mesh/error-budget.md"
      - alert: MeshLatencyP99High
        expr: |
          histogram_quantile(
            0.99,
            sum(rate(mesh_duration_seconds_bucket{job="cave-mesh"}[5m])) by (le)
          ) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "cave-mesh p99 latency > 1s"
          description: "p99 = {{ $value }}s."
          runbook_url: "https://docs.cave.dev/runbooks/cave-mesh/latency.md"
      - alert: MeshSaturationHigh
        expr: 'sum(mesh_inflight_requests{job="cave-mesh"}) > 400'
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "cave-mesh inflight requests > 400"
          description: "Concurrent requests = {{ $value }}."
          runbook_url: "https://docs.cave.dev/runbooks/cave-mesh/saturation.md"
      - alert: MeshMemoryPressure
        expr: 'process_resident_memory_bytes{job="cave-mesh"} > 4 * 1024 * 1024 * 1024'
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "cave-mesh RSS > 4 GiB"
          runbook_url: "https://docs.cave.dev/runbooks/cave-mesh/memory.md"
      - alert: MeshCardinalityExplosion
        expr: 'count(count by (tenant_id) (mesh_total{job="cave-mesh"})) > 5000'
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "cave-mesh tenant cardinality > 5000"
          description: "Count = {{ $value }}."
          runbook_url: "https://docs.cave.dev/runbooks/cave-mesh/cardinality.md"
      - alert: MeshHealthProbeFailing
        expr: 'min(up{job="cave-mesh"}) < 1'
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "cave-mesh health probe failing"
          description: "At least one instance reports up == 0."
          runbook_url: "https://docs.cave.dev/runbooks/cave-mesh/health.md"
