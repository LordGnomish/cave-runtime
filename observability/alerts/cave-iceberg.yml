# Iceberg lake
groups:
  - name: cave-iceberg-slo
    interval: 30s
    rules:
      - alert: IcebergSloBurnRateFast
        expr: |
          (
            sum(rate(iceberg_total{job="cave-iceberg",code=~"5.."}[1h]))
            /
            sum(rate(iceberg_total{job="cave-iceberg"}[1h]))
          ) > (14.4 * 0.001)
        for: 2m
        labels:
          severity: critical
          tenant_scoped: "true"
        annotations:
          summary: "cave-iceberg fast burn-rate (1h)"
          description: "5xx fraction is {{ $value | humanizePercentage }} — burning the 99.9% budget 14.4× faster than allowed."
          runbook_url: "https://docs.cave.dev/runbooks/cave-iceberg/slo-burn-fast.md"
      - alert: IcebergSloBurnRateSlow
        expr: |
          (
            sum(rate(iceberg_total{job="cave-iceberg",code=~"5.."}[6h]))
            /
            sum(rate(iceberg_total{job="cave-iceberg"}[6h]))
          ) > (6 * 0.001)
        for: 15m
        labels:
          severity: warning
          tenant_scoped: "true"
        annotations:
          summary: "cave-iceberg slow burn-rate (6h)"
          description: "Sustained 5xx fraction over 6h."
          runbook_url: "https://docs.cave.dev/runbooks/cave-iceberg/slo-burn-slow.md"
      - alert: IcebergErrorBudgetLow
        expr: |
          (
            1 -
            (sum(rate(iceberg_total{job="cave-iceberg",code=~"5.."}[7d]))
              / sum(rate(iceberg_total{job="cave-iceberg"}[7d])))
          ) < 0.999
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "cave-iceberg 7-day availability < 99.9%"
          description: "Trailing 7d availability = {{ $value | humanizePercentage }}."
          runbook_url: "https://docs.cave.dev/runbooks/cave-iceberg/error-budget.md"
      - alert: IcebergLatencyP99High
        expr: |
          histogram_quantile(
            0.99,
            sum(rate(iceberg_duration_seconds_bucket{job="cave-iceberg"}[5m])) by (le)
          ) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "cave-iceberg p99 latency > 1s"
          description: "p99 = {{ $value }}s."
          runbook_url: "https://docs.cave.dev/runbooks/cave-iceberg/latency.md"
      - alert: IcebergSaturationHigh
        expr: 'sum(iceberg_inflight_requests{job="cave-iceberg"}) > 400'
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "cave-iceberg inflight requests > 400"
          description: "Concurrent requests = {{ $value }}."
          runbook_url: "https://docs.cave.dev/runbooks/cave-iceberg/saturation.md"
      - alert: IcebergMemoryPressure
        expr: 'process_resident_memory_bytes{job="cave-iceberg"} > 4 * 1024 * 1024 * 1024'
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "cave-iceberg RSS > 4 GiB"
          runbook_url: "https://docs.cave.dev/runbooks/cave-iceberg/memory.md"
      - alert: IcebergCardinalityExplosion
        expr: 'count(count by (tenant_id) (iceberg_total{job="cave-iceberg"})) > 5000'
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "cave-iceberg tenant cardinality > 5000"
          description: "Count = {{ $value }}."
          runbook_url: "https://docs.cave.dev/runbooks/cave-iceberg/cardinality.md"
      - alert: IcebergHealthProbeFailing
        expr: 'min(up{job="cave-iceberg"}) < 1'
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "cave-iceberg health probe failing"
          description: "At least one instance reports up == 0."
          runbook_url: "https://docs.cave.dev/runbooks/cave-iceberg/health.md"
