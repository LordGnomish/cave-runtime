# RDBMS proxy
groups:
  - name: cave-rdbms-slo
    interval: 30s
    rules:
      - alert: RdbmsSloBurnRateFast
        expr: |
          (
            sum(rate(rdbms_total{job="cave-rdbms",code=~"5.."}[1h]))
            /
            sum(rate(rdbms_total{job="cave-rdbms"}[1h]))
          ) > (14.4 * 0.001)
        for: 2m
        labels:
          severity: critical
          tenant_scoped: "true"
        annotations:
          summary: "cave-rdbms fast burn-rate (1h)"
          description: "5xx fraction is {{ $value | humanizePercentage }} — burning the 99.9% budget 14.4× faster than allowed."
          runbook_url: "https://docs.cave.dev/runbooks/cave-rdbms/slo-burn-fast.md"
      - alert: RdbmsSloBurnRateSlow
        expr: |
          (
            sum(rate(rdbms_total{job="cave-rdbms",code=~"5.."}[6h]))
            /
            sum(rate(rdbms_total{job="cave-rdbms"}[6h]))
          ) > (6 * 0.001)
        for: 15m
        labels:
          severity: warning
          tenant_scoped: "true"
        annotations:
          summary: "cave-rdbms slow burn-rate (6h)"
          description: "Sustained 5xx fraction over 6h."
          runbook_url: "https://docs.cave.dev/runbooks/cave-rdbms/slo-burn-slow.md"
      - alert: RdbmsErrorBudgetLow
        expr: |
          (
            1 -
            (sum(rate(rdbms_total{job="cave-rdbms",code=~"5.."}[7d]))
              / sum(rate(rdbms_total{job="cave-rdbms"}[7d])))
          ) < 0.999
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "cave-rdbms 7-day availability < 99.9%"
          description: "Trailing 7d availability = {{ $value | humanizePercentage }}."
          runbook_url: "https://docs.cave.dev/runbooks/cave-rdbms/error-budget.md"
      - alert: RdbmsLatencyP99High
        expr: |
          histogram_quantile(
            0.99,
            sum(rate(rdbms_duration_seconds_bucket{job="cave-rdbms"}[5m])) by (le)
          ) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "cave-rdbms p99 latency > 1s"
          description: "p99 = {{ $value }}s."
          runbook_url: "https://docs.cave.dev/runbooks/cave-rdbms/latency.md"
      - alert: RdbmsSaturationHigh
        expr: 'sum(rdbms_inflight_requests{job="cave-rdbms"}) > 400'
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "cave-rdbms inflight requests > 400"
          description: "Concurrent requests = {{ $value }}."
          runbook_url: "https://docs.cave.dev/runbooks/cave-rdbms/saturation.md"
      - alert: RdbmsMemoryPressure
        expr: 'process_resident_memory_bytes{job="cave-rdbms"} > 4 * 1024 * 1024 * 1024'
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "cave-rdbms RSS > 4 GiB"
          runbook_url: "https://docs.cave.dev/runbooks/cave-rdbms/memory.md"
      - alert: RdbmsCardinalityExplosion
        expr: 'count(count by (tenant_id) (rdbms_total{job="cave-rdbms"})) > 5000'
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "cave-rdbms tenant cardinality > 5000"
          description: "Count = {{ $value }}."
          runbook_url: "https://docs.cave.dev/runbooks/cave-rdbms/cardinality.md"
      - alert: RdbmsHealthProbeFailing
        expr: 'min(up{job="cave-rdbms"}) < 1'
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "cave-rdbms health probe failing"
          description: "At least one instance reports up == 0."
          runbook_url: "https://docs.cave.dev/runbooks/cave-rdbms/health.md"
