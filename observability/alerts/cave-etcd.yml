# etcd KV store
groups:
  - name: cave-etcd-slo
    interval: 30s
    rules:
      - alert: EtcdSloBurnRateFast
        expr: |
          (
            sum(rate(etcd_server_total{job="cave-etcd",code=~"5.."}[1h]))
            /
            sum(rate(etcd_server_total{job="cave-etcd"}[1h]))
          ) > (14.4 * 0.001)
        for: 2m
        labels:
          severity: critical
          tenant_scoped: "true"
        annotations:
          summary: "cave-etcd fast burn-rate (1h)"
          description: "5xx fraction is {{ $value | humanizePercentage }} — burning the 99.9% budget 14.4× faster than allowed."
          runbook_url: "https://docs.cave.dev/runbooks/cave-etcd/slo-burn-fast.md"
      - alert: EtcdSloBurnRateSlow
        expr: |
          (
            sum(rate(etcd_server_total{job="cave-etcd",code=~"5.."}[6h]))
            /
            sum(rate(etcd_server_total{job="cave-etcd"}[6h]))
          ) > (6 * 0.001)
        for: 15m
        labels:
          severity: warning
          tenant_scoped: "true"
        annotations:
          summary: "cave-etcd slow burn-rate (6h)"
          description: "Sustained 5xx fraction over 6h."
          runbook_url: "https://docs.cave.dev/runbooks/cave-etcd/slo-burn-slow.md"
      - alert: EtcdErrorBudgetLow
        expr: |
          (
            1 -
            (sum(rate(etcd_server_total{job="cave-etcd",code=~"5.."}[7d]))
              / sum(rate(etcd_server_total{job="cave-etcd"}[7d])))
          ) < 0.999
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "cave-etcd 7-day availability < 99.9%"
          description: "Trailing 7d availability = {{ $value | humanizePercentage }}."
          runbook_url: "https://docs.cave.dev/runbooks/cave-etcd/error-budget.md"
      - alert: EtcdLatencyP99High
        expr: |
          histogram_quantile(
            0.99,
            sum(rate(etcd_server_duration_seconds_bucket{job="cave-etcd"}[5m])) by (le)
          ) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "cave-etcd p99 latency > 1s"
          description: "p99 = {{ $value }}s."
          runbook_url: "https://docs.cave.dev/runbooks/cave-etcd/latency.md"
      - alert: EtcdSaturationHigh
        expr: 'sum(etcd_server_inflight_requests{job="cave-etcd"}) > 400'
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "cave-etcd inflight requests > 400"
          description: "Concurrent requests = {{ $value }}."
          runbook_url: "https://docs.cave.dev/runbooks/cave-etcd/saturation.md"
      - alert: EtcdMemoryPressure
        expr: 'process_resident_memory_bytes{job="cave-etcd"} > 4 * 1024 * 1024 * 1024'
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "cave-etcd RSS > 4 GiB"
          runbook_url: "https://docs.cave.dev/runbooks/cave-etcd/memory.md"
      - alert: EtcdCardinalityExplosion
        expr: 'count(count by (tenant_id) (etcd_server_total{job="cave-etcd"})) > 5000'
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "cave-etcd tenant cardinality > 5000"
          description: "Count = {{ $value }}."
          runbook_url: "https://docs.cave.dev/runbooks/cave-etcd/cardinality.md"
      - alert: EtcdHealthProbeFailing
        expr: 'min(up{job="cave-etcd"}) < 1'
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "cave-etcd health probe failing"
          description: "At least one instance reports up == 0."
          runbook_url: "https://docs.cave.dev/runbooks/cave-etcd/health.md"
