# OPA-parity policy
groups:
  - name: cave-policy-slo
    interval: 30s
    rules:
      - alert: PolicySloBurnRateFast
        expr: |
          (
            sum(rate(policy_total{job="cave-policy",code=~"5.."}[1h]))
            /
            sum(rate(policy_total{job="cave-policy"}[1h]))
          ) > (14.4 * 0.001)
        for: 2m
        labels:
          severity: critical
          tenant_scoped: "true"
        annotations:
          summary: "cave-policy fast burn-rate (1h)"
          description: "5xx fraction is {{ $value | humanizePercentage }} — burning the 99.9% budget 14.4× faster than allowed."
          runbook_url: "https://docs.cave.dev/runbooks/cave-policy/slo-burn-fast.md"
      - alert: PolicySloBurnRateSlow
        expr: |
          (
            sum(rate(policy_total{job="cave-policy",code=~"5.."}[6h]))
            /
            sum(rate(policy_total{job="cave-policy"}[6h]))
          ) > (6 * 0.001)
        for: 15m
        labels:
          severity: warning
          tenant_scoped: "true"
        annotations:
          summary: "cave-policy slow burn-rate (6h)"
          description: "Sustained 5xx fraction over 6h."
          runbook_url: "https://docs.cave.dev/runbooks/cave-policy/slo-burn-slow.md"
      - alert: PolicyErrorBudgetLow
        expr: |
          (
            1 -
            (sum(rate(policy_total{job="cave-policy",code=~"5.."}[7d]))
              / sum(rate(policy_total{job="cave-policy"}[7d])))
          ) < 0.999
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "cave-policy 7-day availability < 99.9%"
          description: "Trailing 7d availability = {{ $value | humanizePercentage }}."
          runbook_url: "https://docs.cave.dev/runbooks/cave-policy/error-budget.md"
      - alert: PolicyLatencyP99High
        expr: |
          histogram_quantile(
            0.99,
            sum(rate(policy_duration_seconds_bucket{job="cave-policy"}[5m])) by (le)
          ) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "cave-policy p99 latency > 1s"
          description: "p99 = {{ $value }}s."
          runbook_url: "https://docs.cave.dev/runbooks/cave-policy/latency.md"
      - alert: PolicySaturationHigh
        expr: 'sum(policy_inflight_requests{job="cave-policy"}) > 400'
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "cave-policy inflight requests > 400"
          description: "Concurrent requests = {{ $value }}."
          runbook_url: "https://docs.cave.dev/runbooks/cave-policy/saturation.md"
      - alert: PolicyMemoryPressure
        expr: 'process_resident_memory_bytes{job="cave-policy"} > 4 * 1024 * 1024 * 1024'
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "cave-policy RSS > 4 GiB"
          runbook_url: "https://docs.cave.dev/runbooks/cave-policy/memory.md"
      - alert: PolicyCardinalityExplosion
        expr: 'count(count by (tenant_id) (policy_total{job="cave-policy"})) > 5000'
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "cave-policy tenant cardinality > 5000"
          description: "Count = {{ $value }}."
          runbook_url: "https://docs.cave.dev/runbooks/cave-policy/cardinality.md"
      - alert: PolicyHealthProbeFailing
        expr: 'min(up{job="cave-policy"}) < 1'
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "cave-policy health probe failing"
          description: "At least one instance reports up == 0."
          runbook_url: "https://docs.cave.dev/runbooks/cave-policy/health.md"
