# Postgres-parity OLTP
groups:
  - name: cave-rdbms-operator-slo
    interval: 30s
    rules:
      - alert: PgSloBurnRateFast
        expr: |
          (
            sum(rate(pg_total{job="cave-rdbms-operator",code=~"5.."}[1h]))
            /
            sum(rate(pg_total{job="cave-rdbms-operator"}[1h]))
          ) > (14.4 * 0.001)
        for: 2m
        labels:
          severity: critical
          tenant_scoped: "true"
        annotations:
          summary: "cave-rdbms-operator fast burn-rate (1h)"
          description: "5xx fraction is {{ $value | humanizePercentage }} — burning the 99.9% budget 14.4× faster than allowed."
          runbook_url: "https://docs.cave.dev/runbooks/cave-rdbms-operator/slo-burn-fast.md"
      - alert: PgSloBurnRateSlow
        expr: |
          (
            sum(rate(pg_total{job="cave-rdbms-operator",code=~"5.."}[6h]))
            /
            sum(rate(pg_total{job="cave-rdbms-operator"}[6h]))
          ) > (6 * 0.001)
        for: 15m
        labels:
          severity: warning
          tenant_scoped: "true"
        annotations:
          summary: "cave-rdbms-operator slow burn-rate (6h)"
          description: "Sustained 5xx fraction over 6h."
          runbook_url: "https://docs.cave.dev/runbooks/cave-rdbms-operator/slo-burn-slow.md"
      - alert: PgErrorBudgetLow
        expr: |
          (
            1 -
            (sum(rate(pg_total{job="cave-rdbms-operator",code=~"5.."}[7d]))
              / sum(rate(pg_total{job="cave-rdbms-operator"}[7d])))
          ) < 0.999
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "cave-rdbms-operator 7-day availability < 99.9%"
          description: "Trailing 7d availability = {{ $value | humanizePercentage }}."
          runbook_url: "https://docs.cave.dev/runbooks/cave-rdbms-operator/error-budget.md"
      - alert: PgLatencyP99High
        expr: |
          histogram_quantile(
            0.99,
            sum(rate(pg_duration_seconds_bucket{job="cave-rdbms-operator"}[5m])) by (le)
          ) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "cave-rdbms-operator p99 latency > 1s"
          description: "p99 = {{ $value }}s."
          runbook_url: "https://docs.cave.dev/runbooks/cave-rdbms-operator/latency.md"
      - alert: PgSaturationHigh
        expr: 'sum(pg_inflight_requests{job="cave-rdbms-operator"}) > 400'
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "cave-rdbms-operator inflight requests > 400"
          description: "Concurrent requests = {{ $value }}."
          runbook_url: "https://docs.cave.dev/runbooks/cave-rdbms-operator/saturation.md"
      - alert: PgMemoryPressure
        expr: 'process_resident_memory_bytes{job="cave-rdbms-operator"} > 4 * 1024 * 1024 * 1024'
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "cave-rdbms-operator RSS > 4 GiB"
          runbook_url: "https://docs.cave.dev/runbooks/cave-rdbms-operator/memory.md"
      - alert: PgCardinalityExplosion
        expr: 'count(count by (tenant_id) (pg_total{job="cave-rdbms-operator"})) > 5000'
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "cave-rdbms-operator tenant cardinality > 5000"
          description: "Count = {{ $value }}."
          runbook_url: "https://docs.cave.dev/runbooks/cave-rdbms-operator/cardinality.md"
      - alert: PgHealthProbeFailing
        expr: 'min(up{job="cave-rdbms-operator"}) < 1'
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "cave-rdbms-operator health probe failing"
          description: "At least one instance reports up == 0."
          runbook_url: "https://docs.cave.dev/runbooks/cave-rdbms-operator/health.md"

  - name: cave-rdbms-operator-deep
    interval: 30s
    rules:
      - alert: PgReplicationLagBytesHigh
        expr: 'max(rdbms_operator_replication_lag_bytes{job="cave-rdbms-operator"}) > 100 * 1024 * 1024'
        for: 5m
        labels:
          severity: warning
          tenant_scoped: "true"
        annotations:
          summary: "Replica lag > 100 MiB on at least one replica"
          description: "max lag = {{ $value | humanize1024 }}B — primary write rate exceeds replica apply rate."
          runbook_url: "https://docs.cave.dev/runbooks/cave-rdbms-operator/replication-lag.md"
      - alert: PgReplicationLagSecondsHigh
        expr: 'max(rdbms_operator_replication_lag_seconds{job="cave-rdbms-operator"}) > 30'
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Replica time lag > 30s"
          runbook_url: "https://docs.cave.dev/runbooks/cave-rdbms-operator/replication-lag.md"
      - alert: PgFailoverEventBurst
        expr: 'increase(rdbms_operator_failover_events_total{job="cave-rdbms-operator"}[1h]) >= 2'
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "≥ 2 failovers in the last hour for one cluster"
          description: "Cluster {{ $labels.cluster }} has flapped — investigate primary stability."
          runbook_url: "https://docs.cave.dev/runbooks/cave-rdbms-operator/failover-burst.md"
      - alert: PgBackupFailureRate
        expr: |
          sum(rate(rdbms_operator_backup_status_total{job="cave-rdbms-operator",status="failed"}[1h]))
          /
          clamp_min(sum(rate(rdbms_operator_backup_status_total{job="cave-rdbms-operator"}[1h])), 1)
          > 0.1
        for: 30m
        labels:
          severity: critical
        annotations:
          summary: "Backup failure rate > 10% over 1h"
          runbook_url: "https://docs.cave.dev/runbooks/cave-rdbms-operator/backup-failures.md"
      - alert: PgPoolSaturationCritical
        expr: |
          (sum by (pool) (rdbms_operator_pool_active_connections{job="cave-rdbms-operator"})
            /
           sum by (pool) (rdbms_operator_pool_max_size{job="cave-rdbms-operator"}))
          > 0.95
        for: 5m
        labels:
          severity: warning
          tenant_scoped: "true"
        annotations:
          summary: "Pool {{ $labels.pool }} > 95% saturated"
          runbook_url: "https://docs.cave.dev/runbooks/cave-rdbms-operator/pool-saturation.md"
      - alert: PgConnectionExhaustion
        expr: 'sum by (cluster) (rdbms_operator_pool_waiting_clients{job="cave-rdbms-operator"}) > 50'
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Cluster {{ $labels.cluster }} has > 50 waiting clients"
          runbook_url: "https://docs.cave.dev/runbooks/cave-rdbms-operator/connection-exhaustion.md"
