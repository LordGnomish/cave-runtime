# Knative-parity serverless
groups:
  - name: cave-knative-slo
    interval: 30s
    rules:
      - alert: KnativeSloBurnRateFast
        expr: |
          (
            sum(rate(knative_total{job="cave-knative",code=~"5.."}[1h]))
            /
            sum(rate(knative_total{job="cave-knative"}[1h]))
          ) > (14.4 * 0.001)
        for: 2m
        labels:
          severity: critical
          tenant_scoped: "true"
        annotations:
          summary: "cave-knative fast burn-rate (1h)"
          description: "5xx fraction is {{ $value | humanizePercentage }} — burning the 99.9% budget 14.4× faster than allowed."
          runbook_url: "https://docs.cave.dev/runbooks/cave-knative/slo-burn-fast.md"
      - alert: KnativeSloBurnRateSlow
        expr: |
          (
            sum(rate(knative_total{job="cave-knative",code=~"5.."}[6h]))
            /
            sum(rate(knative_total{job="cave-knative"}[6h]))
          ) > (6 * 0.001)
        for: 15m
        labels:
          severity: warning
          tenant_scoped: "true"
        annotations:
          summary: "cave-knative slow burn-rate (6h)"
          description: "Sustained 5xx fraction over 6h."
          runbook_url: "https://docs.cave.dev/runbooks/cave-knative/slo-burn-slow.md"
      - alert: KnativeErrorBudgetLow
        expr: |
          (
            1 -
            (sum(rate(knative_total{job="cave-knative",code=~"5.."}[7d]))
              / sum(rate(knative_total{job="cave-knative"}[7d])))
          ) < 0.999
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "cave-knative 7-day availability < 99.9%"
          description: "Trailing 7d availability = {{ $value | humanizePercentage }}."
          runbook_url: "https://docs.cave.dev/runbooks/cave-knative/error-budget.md"
      - alert: KnativeLatencyP99High
        expr: |
          histogram_quantile(
            0.99,
            sum(rate(knative_duration_seconds_bucket{job="cave-knative"}[5m])) by (le)
          ) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "cave-knative p99 latency > 1s"
          description: "p99 = {{ $value }}s."
          runbook_url: "https://docs.cave.dev/runbooks/cave-knative/latency.md"
      - alert: KnativeSaturationHigh
        expr: 'sum(knative_inflight_requests{job="cave-knative"}) > 400'
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "cave-knative inflight requests > 400"
          description: "Concurrent requests = {{ $value }}."
          runbook_url: "https://docs.cave.dev/runbooks/cave-knative/saturation.md"
      - alert: KnativeMemoryPressure
        expr: 'process_resident_memory_bytes{job="cave-knative"} > 4 * 1024 * 1024 * 1024'
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "cave-knative RSS > 4 GiB"
          runbook_url: "https://docs.cave.dev/runbooks/cave-knative/memory.md"
      - alert: KnativeCardinalityExplosion
        expr: 'count(count by (tenant_id) (knative_total{job="cave-knative"})) > 5000'
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "cave-knative tenant cardinality > 5000"
          description: "Count = {{ $value }}."
          runbook_url: "https://docs.cave.dev/runbooks/cave-knative/cardinality.md"
      - alert: KnativeHealthProbeFailing
        expr: 'min(up{job="cave-knative"}) < 1'
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "cave-knative health probe failing"
          description: "At least one instance reports up == 0."
          runbook_url: "https://docs.cave.dev/runbooks/cave-knative/health.md"
