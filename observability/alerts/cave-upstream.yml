# Upstream-tracking
groups:
  - name: cave-upstream-slo
    interval: 30s
    rules:
      - alert: UpstreamSloBurnRateFast
        expr: |
          (
            sum(rate(upstream_total{job="cave-upstream",code=~"5.."}[1h]))
            /
            sum(rate(upstream_total{job="cave-upstream"}[1h]))
          ) > (14.4 * 0.001)
        for: 2m
        labels:
          severity: critical
          tenant_scoped: "true"
        annotations:
          summary: "cave-upstream fast burn-rate (1h)"
          description: "5xx fraction is {{ $value | humanizePercentage }} — burning the 99.9% budget 14.4× faster than allowed."
          runbook_url: "https://docs.cave.dev/runbooks/cave-upstream/slo-burn-fast.md"
      - alert: UpstreamSloBurnRateSlow
        expr: |
          (
            sum(rate(upstream_total{job="cave-upstream",code=~"5.."}[6h]))
            /
            sum(rate(upstream_total{job="cave-upstream"}[6h]))
          ) > (6 * 0.001)
        for: 15m
        labels:
          severity: warning
          tenant_scoped: "true"
        annotations:
          summary: "cave-upstream slow burn-rate (6h)"
          description: "Sustained 5xx fraction over 6h."
          runbook_url: "https://docs.cave.dev/runbooks/cave-upstream/slo-burn-slow.md"
      - alert: UpstreamErrorBudgetLow
        expr: |
          (
            1 -
            (sum(rate(upstream_total{job="cave-upstream",code=~"5.."}[7d]))
              / sum(rate(upstream_total{job="cave-upstream"}[7d])))
          ) < 0.999
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "cave-upstream 7-day availability < 99.9%"
          description: "Trailing 7d availability = {{ $value | humanizePercentage }}."
          runbook_url: "https://docs.cave.dev/runbooks/cave-upstream/error-budget.md"
      - alert: UpstreamLatencyP99High
        expr: |
          histogram_quantile(
            0.99,
            sum(rate(upstream_duration_seconds_bucket{job="cave-upstream"}[5m])) by (le)
          ) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "cave-upstream p99 latency > 1s"
          description: "p99 = {{ $value }}s."
          runbook_url: "https://docs.cave.dev/runbooks/cave-upstream/latency.md"
      - alert: UpstreamSaturationHigh
        expr: 'sum(upstream_inflight_requests{job="cave-upstream"}) > 400'
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "cave-upstream inflight requests > 400"
          description: "Concurrent requests = {{ $value }}."
          runbook_url: "https://docs.cave.dev/runbooks/cave-upstream/saturation.md"
      - alert: UpstreamMemoryPressure
        expr: 'process_resident_memory_bytes{job="cave-upstream"} > 4 * 1024 * 1024 * 1024'
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "cave-upstream RSS > 4 GiB"
          runbook_url: "https://docs.cave.dev/runbooks/cave-upstream/memory.md"
      - alert: UpstreamCardinalityExplosion
        expr: 'count(count by (tenant_id) (upstream_total{job="cave-upstream"})) > 5000'
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "cave-upstream tenant cardinality > 5000"
          description: "Count = {{ $value }}."
          runbook_url: "https://docs.cave.dev/runbooks/cave-upstream/cardinality.md"
      - alert: UpstreamHealthProbeFailing
        expr: 'min(up{job="cave-upstream"}) < 1'
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "cave-upstream health probe failing"
          description: "At least one instance reports up == 0."
          runbook_url: "https://docs.cave.dev/runbooks/cave-upstream/health.md"
