# Cluster mgmt
groups:
  - name: cave-cluster-slo
    interval: 30s
    rules:
      - alert: ClusterSloBurnRateFast
        expr: |
          (
            sum(rate(cluster_total{job="cave-cluster",code=~"5.."}[1h]))
            /
            sum(rate(cluster_total{job="cave-cluster"}[1h]))
          ) > (14.4 * 0.001)
        for: 2m
        labels:
          severity: critical
          tenant_scoped: "true"
        annotations:
          summary: "cave-cluster fast burn-rate (1h)"
          description: "5xx fraction is {{ $value | humanizePercentage }} — burning the 99.9% budget 14.4× faster than allowed."
          runbook_url: "https://docs.cave.dev/runbooks/cave-cluster/slo-burn-fast.md"
      - alert: ClusterSloBurnRateSlow
        expr: |
          (
            sum(rate(cluster_total{job="cave-cluster",code=~"5.."}[6h]))
            /
            sum(rate(cluster_total{job="cave-cluster"}[6h]))
          ) > (6 * 0.001)
        for: 15m
        labels:
          severity: warning
          tenant_scoped: "true"
        annotations:
          summary: "cave-cluster slow burn-rate (6h)"
          description: "Sustained 5xx fraction over 6h."
          runbook_url: "https://docs.cave.dev/runbooks/cave-cluster/slo-burn-slow.md"
      - alert: ClusterErrorBudgetLow
        expr: |
          (
            1 -
            (sum(rate(cluster_total{job="cave-cluster",code=~"5.."}[7d]))
              / sum(rate(cluster_total{job="cave-cluster"}[7d])))
          ) < 0.999
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "cave-cluster 7-day availability < 99.9%"
          description: "Trailing 7d availability = {{ $value | humanizePercentage }}."
          runbook_url: "https://docs.cave.dev/runbooks/cave-cluster/error-budget.md"
      - alert: ClusterLatencyP99High
        expr: |
          histogram_quantile(
            0.99,
            sum(rate(cluster_duration_seconds_bucket{job="cave-cluster"}[5m])) by (le)
          ) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "cave-cluster p99 latency > 1s"
          description: "p99 = {{ $value }}s."
          runbook_url: "https://docs.cave.dev/runbooks/cave-cluster/latency.md"
      - alert: ClusterSaturationHigh
        expr: 'sum(cluster_inflight_requests{job="cave-cluster"}) > 400'
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "cave-cluster inflight requests > 400"
          description: "Concurrent requests = {{ $value }}."
          runbook_url: "https://docs.cave.dev/runbooks/cave-cluster/saturation.md"
      - alert: ClusterMemoryPressure
        expr: 'process_resident_memory_bytes{job="cave-cluster"} > 4 * 1024 * 1024 * 1024'
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "cave-cluster RSS > 4 GiB"
          runbook_url: "https://docs.cave.dev/runbooks/cave-cluster/memory.md"
      - alert: ClusterCardinalityExplosion
        expr: 'count(count by (tenant_id) (cluster_total{job="cave-cluster"})) > 5000'
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "cave-cluster tenant cardinality > 5000"
          description: "Count = {{ $value }}."
          runbook_url: "https://docs.cave.dev/runbooks/cave-cluster/cardinality.md"
      - alert: ClusterHealthProbeFailing
        expr: 'min(up{job="cave-cluster"}) < 1'
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "cave-cluster health probe failing"
          description: "At least one instance reports up == 0."
          runbook_url: "https://docs.cave.dev/runbooks/cave-cluster/health.md"
