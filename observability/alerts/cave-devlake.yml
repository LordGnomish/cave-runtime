# DORA / DevLake
groups:
  - name: cave-devlake-slo
    interval: 30s
    rules:
      - alert: DevlakeSloBurnRateFast
        expr: |
          (
            sum(rate(devlake_total{job="cave-devlake",code=~"5.."}[1h]))
            /
            sum(rate(devlake_total{job="cave-devlake"}[1h]))
          ) > (14.4 * 0.001)
        for: 2m
        labels:
          severity: critical
          tenant_scoped: "true"
        annotations:
          summary: "cave-devlake fast burn-rate (1h)"
          description: "5xx fraction is {{ $value | humanizePercentage }} — burning the 99.9% budget 14.4× faster than allowed."
          runbook_url: "https://docs.cave.dev/runbooks/cave-devlake/slo-burn-fast.md"
      - alert: DevlakeSloBurnRateSlow
        expr: |
          (
            sum(rate(devlake_total{job="cave-devlake",code=~"5.."}[6h]))
            /
            sum(rate(devlake_total{job="cave-devlake"}[6h]))
          ) > (6 * 0.001)
        for: 15m
        labels:
          severity: warning
          tenant_scoped: "true"
        annotations:
          summary: "cave-devlake slow burn-rate (6h)"
          description: "Sustained 5xx fraction over 6h."
          runbook_url: "https://docs.cave.dev/runbooks/cave-devlake/slo-burn-slow.md"
      - alert: DevlakeErrorBudgetLow
        expr: |
          (
            1 -
            (sum(rate(devlake_total{job="cave-devlake",code=~"5.."}[7d]))
              / sum(rate(devlake_total{job="cave-devlake"}[7d])))
          ) < 0.999
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "cave-devlake 7-day availability < 99.9%"
          description: "Trailing 7d availability = {{ $value | humanizePercentage }}."
          runbook_url: "https://docs.cave.dev/runbooks/cave-devlake/error-budget.md"
      - alert: DevlakeLatencyP99High
        expr: |
          histogram_quantile(
            0.99,
            sum(rate(devlake_duration_seconds_bucket{job="cave-devlake"}[5m])) by (le)
          ) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "cave-devlake p99 latency > 1s"
          description: "p99 = {{ $value }}s."
          runbook_url: "https://docs.cave.dev/runbooks/cave-devlake/latency.md"
      - alert: DevlakeSaturationHigh
        expr: 'sum(devlake_inflight_requests{job="cave-devlake"}) > 400'
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "cave-devlake inflight requests > 400"
          description: "Concurrent requests = {{ $value }}."
          runbook_url: "https://docs.cave.dev/runbooks/cave-devlake/saturation.md"
      - alert: DevlakeMemoryPressure
        expr: 'process_resident_memory_bytes{job="cave-devlake"} > 4 * 1024 * 1024 * 1024'
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "cave-devlake RSS > 4 GiB"
          runbook_url: "https://docs.cave.dev/runbooks/cave-devlake/memory.md"
      - alert: DevlakeCardinalityExplosion
        expr: 'count(count by (tenant_id) (devlake_total{job="cave-devlake"})) > 5000'
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "cave-devlake tenant cardinality > 5000"
          description: "Count = {{ $value }}."
          runbook_url: "https://docs.cave.dev/runbooks/cave-devlake/cardinality.md"
      - alert: DevlakeHealthProbeFailing
        expr: 'min(up{job="cave-devlake"}) < 1'
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "cave-devlake health probe failing"
          description: "At least one instance reports up == 0."
          runbook_url: "https://docs.cave.dev/runbooks/cave-devlake/health.md"
