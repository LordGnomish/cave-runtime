# cave-auth — Prometheus alert rules
#
# Drop into deploy/prometheus/rules/cave-auth.yml (or whatever the operator
# rule path is in your kube/Helm install). Validate before deploy:
#
#     promtool check rules cave-auth-alerts.yml
#
# Runbook URLs assume the standard portal layout
# (docs/runbooks/auth/<slug>.md). Adjust the runbook_url annotation prefix if
# your portal lives elsewhere.
#
# Metric name source-of-truth: cave-auth crate (keycloak module from
# feat/cave-auth-keycloak-mvp). Every metric below is intended to be
# instrumented in cave-auth/src/keycloak/{provider,admin,pqc}.rs and exposed
# via cave-runtime's /metrics endpoint.

groups:
  - name: cave-auth.security
    interval: 30s
    rules:
      - alert: AuthHighFailureRate
        expr: |
          (
            sum by (realm) (rate(cave_auth_login_total{outcome="failure"}[5m]))
            /
            clamp_min(sum by (realm) (rate(cave_auth_login_total[5m])), 1e-9)
          ) > 0.05
        for: 5m
        labels:
          severity: warning
          team: security
          tier: "1"
        annotations:
          summary: "Login failure rate >5% in realm {{ $labels.realm }}"
          description: |
            cave-auth has seen >5% failed logins for realm {{ $labels.realm }}
            over the last 5 minutes (current ratio: {{ $value | humanizePercentage }}).
            Possible causes: credential-stuffing, broken IdP federation, or a
            recent password-policy change locking real users out.
          runbook_url: "https://portal.cave.dev/runbooks/auth/high-failure-rate"

      - alert: AuthLockoutSpike
        expr: |
          sum by (realm) (
            increase(cave_auth_login_total{outcome="failure", reason="locked"}[5m])
          ) > 20
        for: 2m
        labels:
          severity: critical
          team: security
          tier: "1"
        annotations:
          summary: "Account-lockout spike in realm {{ $labels.realm }} (>20 / 5m)"
          description: |
            More than 20 accounts hit the lockout threshold in realm
            {{ $labels.realm }} within the last 5 minutes (count: {{ $value }}).
            Almost always indicative of an active credential-stuffing attack —
            triage immediately and consider rotating breached-password lists.
          runbook_url: "https://portal.cave.dev/runbooks/auth/lockout-spike"

      - alert: UnauthorizedAttemptsBurst
        expr: |
          sum by (realm) (
            rate(cave_auth_http_requests_total{status=~"401|403"}[1m])
          ) > 10
        for: 1m
        labels:
          severity: critical
          team: security
          tier: "1"
        annotations:
          summary: "401/403 burst on cave-auth in realm {{ $labels.realm }}"
          description: |
            cave-auth saw more than 10 unauthorized requests per second in
            realm {{ $labels.realm }} for over a minute (current rate:
            {{ $value | humanize }}/s). Check the source IPs in the audit log
            and rate-limit at the gateway if the burst is from a single peer.
          runbook_url: "https://portal.cave.dev/runbooks/auth/unauthorized-burst"

      - alert: TokenIssuanceAnomaly
        expr: |
          (
            sum by (realm) (rate(cave_auth_token_issued_total[5m]))
            >
            2 * (
              sum by (realm) (rate(cave_auth_token_issued_total[1h] offset 1h))
            )
          )
          and on(realm) (
            sum by (realm) (rate(cave_auth_token_issued_total[5m])) > 1
          )
        for: 10m
        labels:
          severity: warning
          team: security
          tier: "1"
        annotations:
          summary: "Token issuance 2× baseline in realm {{ $labels.realm }}"
          description: |
            cave-auth is issuing tokens at over 2× the rolling 1-hour
            baseline in realm {{ $labels.realm }}. Could be a runaway
            client retry-loop, leaked refresh-token, or legitimate launch
            traffic — confirm against deploy events before paging on-call.
          runbook_url: "https://portal.cave.dev/runbooks/auth/token-issuance-anomaly"

  - name: cave-auth.availability
    interval: 30s
    rules:
      - alert: KeycloakRealmDown
        expr: |
          min by (realm) (cave_auth_realm_up) == 0
        for: 2m
        labels:
          severity: critical
          team: platform
          tier: "1"
          page: "true"
        annotations:
          summary: "Keycloak realm {{ $labels.realm }} unreachable"
          description: |
            The cave-auth admin probe hitting /admin/realms/{{ $labels.realm }}
            has returned non-2xx for over 2 minutes. All authentication
            traffic for this tenant is currently failing.
          runbook_url: "https://portal.cave.dev/runbooks/auth/realm-down"

      - alert: OIDCRoundtripSlow
        expr: |
          histogram_quantile(0.99,
            sum by (le, endpoint, realm) (
              rate(cave_auth_oidc_request_duration_seconds_bucket[5m])
            )
          ) > 2
        for: 5m
        labels:
          severity: warning
          team: platform
          tier: "1"
        annotations:
          summary: "OIDC {{ $labels.endpoint }} p99 >2s in realm {{ $labels.realm }}"
          description: |
            p99 latency for {{ $labels.endpoint }} on realm {{ $labels.realm }}
            is {{ $value | humanizeDuration }} — well over the 2s SLO.
            User-facing login pages will feel sluggish; check the realm's
            backing store + JWKS hot-path.
          runbook_url: "https://portal.cave.dev/runbooks/auth/oidc-slow"

      - alert: MTLSHandshakeFailures
        expr: |
          (
            sum(rate(cave_auth_mtls_handshake_total{outcome="failure"}[5m]))
            /
            clamp_min(sum(rate(cave_auth_mtls_handshake_total[5m])), 1e-9)
          ) > 0.01
        for: 5m
        labels:
          severity: warning
          team: platform
          tier: "1"
        annotations:
          summary: "mTLS handshake failure rate >1% on cave-auth"
          description: |
            More than 1% of mTLS handshakes on the cave-auth admin/OIDC
            listeners have failed over the last 5 minutes (current:
            {{ $value | humanizePercentage }}). Often a cert-rotation race
            or a misconfigured client trust-bundle.
          runbook_url: "https://portal.cave.dev/runbooks/auth/mtls-failures"

  - name: cave-auth.product
    interval: 60s
    rules:
      - alert: PasskeyEnrollmentDrop
        expr: |
          (
            sum(rate(cave_auth_passkey_enrolled_total[1h]))
            <
            0.5 * sum(rate(cave_auth_passkey_enrolled_total[1d] offset 1d))
          )
          and on() (
            sum(rate(cave_auth_passkey_enrolled_total[1d] offset 1d)) > 0.001
          )
        for: 30m
        labels:
          severity: info
          team: product
          tier: "1"
        annotations:
          summary: "Passkey enrolment dropped >50% week-over-week"
          description: |
            cave-auth passkey enrolment in the last hour is less than
            half of the same hour last week. Could be an upstream UX
            change, broken enrolment endpoint, or a holiday — check the
            Portal Auth widget conversion funnel before raising further.
          runbook_url: "https://portal.cave.dev/runbooks/auth/passkey-drop"

      - alert: AuthAuditEventsStalled
        expr: |
          sum(rate(cave_auth_audit_events_total[5m])) == 0
          and on() (
            sum(rate(cave_auth_login_total[5m])) > 0
          )
        for: 5m
        labels:
          severity: warning
          team: security
          tier: "1"
        annotations:
          summary: "cave-auth produced 0 audit events while logins are live"
          description: |
            Login activity is non-zero but the cave-auth audit pipeline
            has emitted no events for 5 minutes. Most likely the audit
            sink (Loki / S3) is down or AuditLogger is silently failing.
          runbook_url: "https://portal.cave.dev/runbooks/auth/audit-stalled"

      - alert: WebAuthnRegistrationFailureRate
        expr: |
          (
            sum(rate(cave_auth_webauthn_registration_total{outcome="failure"}[5m]))
            /
            clamp_min(sum(rate(cave_auth_webauthn_registration_total[5m])), 1e-9)
          ) > 0.10
        for: 10m
        labels:
          severity: warning
          team: security
          tier: "1"
        annotations:
          summary: ">10% of WebAuthn registration ceremonies are failing"
          description: |
            cave-auth/webauthn/registration.rs is rejecting more than 10% of
            attestation responses. Common causes: wrong RP origin in the
            cave-portal `/admin/auth/webauthn` page config, a mismatched
            challenge cache TTL, or an unsupported attestation fmt the RP
            policy is rejecting.
          runbook_url: "https://portal.cave.dev/runbooks/auth/webauthn-registration-failure"

      - alert: WebAuthnAssertionSignatureVerifyFailureRate
        expr: |
          (
            sum(rate(cave_auth_webauthn_assertion_signature_verify_failure_total[5m]))
            /
            clamp_min(sum(rate(cave_auth_webauthn_assertion_total[5m])), 1e-9)
          ) > 0.02
        for: 5m
        labels:
          severity: critical
          team: security
          tier: "1"
        annotations:
          summary: ">2% of WebAuthn assertions fail signature verification"
          description: |
            cave-auth/webauthn/authentication.rs is rejecting assertion
            signatures above the 2% noise floor. Either an authenticator
            is roaming with a stale public-key cache, a man-in-the-middle
            is replaying authenticatorData, or the RP origin / rpId is
            misconfigured. Investigate immediately — passkey login is
            user-visible and high-trust.
          runbook_url: "https://portal.cave.dev/runbooks/auth/webauthn-signature-fail"

      - alert: PqcSignBackendMissing
        expr: |
          (
            sum(rate(cave_auth_pqc_sign_errors_total{reason="backend_missing"}[5m])) > 0
          )
        for: 10m
        labels:
          severity: info
          team: platform
          tier: "1"
        annotations:
          summary: "ML-DSA-65 backend not wired on this cave-auth instance"
          description: |
            The pluggable FIPS-204 backend in cave-auth/keycloak/pqc.rs is
            still NullMlDsa65Backend on this node. Tokens are being signed
            with Ed25519-only — acceptable for MVP but ADR-GOLDEN-003 wants
            the hybrid path live before the OSS launch (target 21 May).
          runbook_url: "https://portal.cave.dev/runbooks/auth/wire-mldsa-backend"

# ── A1: SAML 2.0 broker (Keycloak v22.0.0 port) ─────────────────────────────
# Appended-only; the rules above are untouched.
  - name: cave-auth.saml
    interval: 30s
    rules:
      - alert: SamlAuthnFailuresRate
        expr: |
          (
            sum(rate(cave_auth_saml_authn_failures_total[5m])) > 0.1
          )
        for: 10m
        labels:
          severity: warning
          team: platform
          tier: "1"
        annotations:
          summary: "SAML 2.0 AuthnRequest failures over threshold"
          description: |
            cave-auth's SAML 2.0 broker is rejecting >0.1 AuthnRequest/s for
            10m. Common causes: SP metadata drift (signing cert rotated
            without push), clock skew on the IdP host, mis-bound
            destination URL. Check the audit log
            (`/admin/auth/audit?protocol=saml`) for the rejection reason
            label and runbook for fixup steps.
          runbook_url: "https://portal.cave.dev/runbooks/auth/saml-authn-failures"

      - alert: SamlAssertionSignatureVerifyFailures
        expr: |
          (
            sum(rate(cave_auth_saml_assertion_signature_verify_failures_total[5m])) > 0
          )
        for: 5m
        labels:
          severity: critical
          team: platform
          tier: "1"
        annotations:
          summary: "SAML 2.0 Assertion signature verification failing"
          description: |
            cave-auth is rejecting >0 SAML 2.0 Assertion signatures over
            the last 5m. A non-zero rate here is always notable — either
            the IdP rotated keys without publishing new metadata, an
            attacker is replaying or forging an assertion, or our
            canonicalisation path has drifted from the IdP's. Open the
            audit log filtered to `event=saml.signature.verify.fail` and
            inspect the issuer / cert thumbprint.
          runbook_url: "https://portal.cave.dev/runbooks/auth/saml-signature-verify-failures"

  # ── 2026-05-18 FINALIZE — Phase 3 protocol coverage ────────────────────────
  # One alert per Phase 3 protocol surface so the operator gets a paged-on
  # signal for every federation / authz / issuance / persistence backend
  # cave-auth actually owns. Every metric below is instrumented by the named
  # cave-auth submodule (`cave-auth/src/<proto>/`).
  - name: cave-auth.phase3
    interval: 30s
    rules:
      - alert: LdapFederationSyncFailures
        expr: |
          sum(rate(cave_auth_ldap_sync_total{outcome="failure"}[10m])) > 0
        for: 10m
        labels:
          severity: warning
          team: platform
          tier: "1"
        annotations:
          summary: "LDAP federation sync failing"
          description: |
            cave-auth LDAP federation has emitted >0 sync failures over the
            last 10m. Run `cavectl auth ldap test-connection` to bind against
            the configured provider and inspect the BER resultCode in the
            audit log (`/admin/auth/events?protocol=ldap`).
          runbook_url: "https://portal.cave.dev/runbooks/auth/ldap-sync-failures"

      - alert: KerberosGssapiAcceptFailures
        expr: |
          sum(rate(cave_auth_kerberos_gssapi_accept_total{outcome="failure"}[5m])) > 0.1
        for: 10m
        labels:
          severity: warning
          team: platform
          tier: "1"
        annotations:
          summary: "Kerberos GSSAPI AcceptSecContext failing (>0.1/s)"
          description: |
            cave-auth is rejecting Kerberos / SPNEGO context tokens. Likely
            causes: keytab rotation without service reload, time-skew >5m vs
            KDC, or libgssapi feature flag mismatch. Validate the keytab
            with `cavectl auth kerberos validate-keytab`.
          runbook_url: "https://portal.cave.dev/runbooks/auth/kerberos-gssapi-accept-failures"

      - alert: OAuthDeviceGrantAnomaly
        expr: |
          (
            sum(rate(cave_auth_oauth_device_authz_total{outcome="approved"}[10m]))
            /
            clamp_min(sum(rate(cave_auth_oauth_device_authz_total[10m])), 1e-9)
          ) < 0.10
        for: 15m
        labels:
          severity: warning
          team: security
          tier: "1"
        annotations:
          summary: "OAuth Device Authorization Grant approval rate <10%"
          description: |
            RFC 8628 device-flow is dominated by denial / expiry events over
            the last 15m. Common causes: phishing-bait device-code spray,
            user-code typo storms, or the device-flow polling logic on a
            client has gone wrong. Inspect
            `/admin/auth/events?grant=device_code`.
          runbook_url: "https://portal.cave.dev/runbooks/auth/oauth-device-anomaly"

      - alert: UmaRptIssuanceFailures
        expr: |
          sum(rate(cave_auth_uma_rpt_issuance_total{outcome="failure"}[5m])) > 0.05
        for: 10m
        labels:
          severity: warning
          team: platform
          tier: "1"
        annotations:
          summary: "UMA 2.0 RPT issuance failing (>0.05/s)"
          description: |
            UMA Requesting Party Token minting has been failing. Most often
            policy-evaluation rejections (resource owner withdrew consent,
            scope mismatch, missing claim_token). Check
            `cavectl auth uma resource-set` and
            `cavectl auth uma permission-ticket`.
          runbook_url: "https://portal.cave.dev/runbooks/auth/uma-rpt-failures"

      - alert: Oid4vcIssuanceFailures
        expr: |
          sum(rate(cave_auth_oid4vc_issue_total{outcome="failure"}[10m])) > 0
        for: 10m
        labels:
          severity: warning
          team: platform
          tier: "1"
        annotations:
          summary: "OID4VCI credential issuance failing"
          description: |
            OpenID4VCI issuance has emitted >0 failures over the last 10m.
            Usually caused by signing-key access (Ed25519/JWS) or
            DataIntegrityProof canonicalisation drift. Inspect
            `cavectl auth oid4vc metadata` and the issuer's signing key
            health.
          runbook_url: "https://portal.cave.dev/runbooks/auth/oid4vc-issuance-failures"

      - alert: WsFedSigninFailures
        expr: |
          (
            sum(rate(cave_auth_wsfed_signin_total{outcome="failure"}[5m]))
            /
            clamp_min(sum(rate(cave_auth_wsfed_signin_total[5m])), 1e-9)
          ) > 0.10
        for: 10m
        labels:
          severity: warning
          team: platform
          tier: "1"
        annotations:
          summary: "WS-Federation signin failure rate >10%"
          description: |
            cave-auth WS-Fed `wa=wsignin1.0` rejections are above 10% over
            the last 10m. Likely realm-trust misconfiguration or SAML 1.1
            assertion signing drift.
          runbook_url: "https://portal.cave.dev/runbooks/auth/wsfed-signin-failures"

      - alert: EmailOutboxStalled
        expr: |
          (
            cave_auth_email_outbox_depth > 0
            and on()
            rate(cave_auth_email_dispatch_total[15m]) == 0
          )
        for: 15m
        labels:
          severity: warning
          team: platform
          tier: "2"
        annotations:
          summary: "Email outbox has queued mail but dispatcher is idle"
          description: |
            The email_listener outbox depth is non-zero but no mail has been
            dispatched over the last 15m. Most often SMTP creds expired or
            the upstream relay is unreachable. Check
            `cavectl auth email queue`.
          runbook_url: "https://portal.cave.dev/runbooks/auth/email-outbox-stalled"

      - alert: PersistenceMigrationFailure
        expr: |
          sum(increase(cave_auth_persistence_migration_failure_total[1h])) > 0
        for: 1m
        labels:
          severity: critical
          team: platform
          tier: "1"
        annotations:
          summary: "cave-auth persistence migration failed (>0 in last 1h)"
          description: |
            A `cave-auth/src/persistence/migration.rs` Flyway-style
            migration failed. The realm/user/session schema may be in a
            partially-applied state — refuse to roll forward until repair.
            Inspect `cavectl auth persistence status`.
          runbook_url: "https://portal.cave.dev/runbooks/auth/persistence-migration-failure"
