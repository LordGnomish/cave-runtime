reason       = "wire-format-detail"
note         = "Userspace eBPF map/program management. ADR-RUNTIME-PARITY-100-PCT-001 §5 scope_cut: cave-net keeps a semantic state-machine port via the in-process ebpf_sim map model; upstream's libbpf-backed loader + kernel verifier interaction is reserved for the same aya-rs follow-up ring as the bpf/ kernel half above."

