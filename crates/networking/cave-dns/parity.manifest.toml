[[scope_cuts]]
group = "cloud-dns-sdks"
crates = ["cave-cloud"]
items = ["aws-route53-live-sdk", "azure-dns-plugin", "gcp-clouddns-plugin"]

[[scope_cuts]]
group = "etcd-watch"
crates = ["cave-etcd"]
items = ["etcd-live-watch"]

[[scope_cuts]]
group = "fs-watch"
crates = ["cave-fsnotify"]
items = ["file-watch-notify"]

[[scope_cuts]]
group = "deprecated-upstream"
crates = ["n/a"]
items = ["federation-deprecated", "k8s-external-deprecated"]

