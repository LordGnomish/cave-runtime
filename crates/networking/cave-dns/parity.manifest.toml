upstream = "vendor/miekg/dns/fuzz_test.go"
reason = "scope_cut: wire-format fuzzing is owned by the workspace-wide cargo-fuzz job, not duplicated as a per-crate Go-style harness. ADR-RUNTIME-PARITY-100-PCT-001 §5.parallel-track."
scope_cut_target = "workspace cargo-fuzz"

[[skipped]]
name = "live-dnssec-key-rollover"
upstream = "plugin/dnssec/keyrollover.go"
reason = "scope_cut: online KSK/ZSK rollover scheduler is intentionally out of the single-binary runtime — cave-dns serves offline pre-signed zones; rollover orchestration is a cave-cert/operator concern. ADR-RUNTIME-PARITY-100-PCT-001 §5.parallel-track."
scope_cut_target = "cave-cert operator path"

# ─── Scope cuts (groupings → Phase 2 crate owners) ──────────────────────────

[[scope_cuts]]
