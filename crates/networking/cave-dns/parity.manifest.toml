local    = "src/cli.rs"

# ── Surface mappings (HTTP surfaces) ────────────────────────────────────────

[[surfaces]]
kind          = "http"
upstream_path = "DoH /dns-query"
local_path    = "/dns-query"

[[surfaces]]
kind          = "http"
upstream_path = "/api/v1/zones"
local_path    = "/api/v1/zones"

[[surfaces]]
kind          = "http"
upstream_path = "/api/v1/zones/{zone}"
local_path    = "/api/v1/zones/{zone}"

[[surfaces]]
kind          = "http"
upstream_path = "/api/v1/zones/{zone}/export"
local_path    = "/api/v1/zones/{zone}/export"

[[surfaces]]
kind          = "http"
upstream_path = "/api/v1/zones/{zone}/records/batch"
local_path    = "/api/v1/zones/{zone}/records/batch"

[portal_ui]
upstream_ui  = "(config-only)"
upstream_url = "https://coredns.io/"
status       = "scaffold"
loc          = 75
priority     = "P2"
notes        = "CoreDNS is corefile-only; cave-dns adds a REST zone management API + cavectl dns CLI."
last_audit   = "2026-05-23"
