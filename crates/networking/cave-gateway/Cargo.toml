[package]
name = "cave-gateway"
description = "API Gateway — Kong + Gravitee parity. Reverse proxy, plugin chain, Admin API, Gravitee API/plan/application/subscription surface."
version.workspace = true
edition.workspace = true
license.workspace = true

[dependencies]
cave-kernel = { path = "../../core/cave-kernel" }

# Async runtime
tokio = { workspace = true }

# Web framework
axum = { version = "0.8", features = ["macros", "ws"] }

# Serialization
serde = { workspace = true }
serde_json = { workspace = true }

# Observability / metrics
tracing = { workspace = true }
prometheus-client = { workspace = true }
jsonwebtoken = { workspace = true }

# HTTP client (upstream proxying)
reqwest = { workspace = true }

# Utilities
uuid = { workspace = true }
chrono = { workspace = true }
thiserror = { workspace = true }
regex = { workspace = true }
base64 = "0.22"
hmac = "0.12"
sha2 = "0.10"
sha1 = "0.10"
url = "2"
ipnet = "2"
bytes = "1"
http = "1"
rustls = { version = "0.23", features = ["ring"] }
rustls-pemfile = "2"
tokio-tungstenite = { version = "0.24", features = ["rustls-tls-native-roots"] }
lru = "0.12"
dashmap = "6"
rand = "0.8"
async-trait = "0.1"
futures = "0.3"

[dev-dependencies]
proptest = "1"
tokio = { workspace = true }
