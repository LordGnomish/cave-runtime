# parity.manifest.toml — cave-policy
# Upstream: open-policy-agent/opa  https://github.com/open-policy-agent/opa
# Skeleton generated by cave parity init — fill in the mapping sections

[upstream]
org     = "open-policy-agent"
repo    = "opa"
version = "v0.58.0"

[module]
name        = "cave-policy"
description = "Policy engine — OPA replacement"
source_root = "src"

# ── File mappings ────────────────────────────────────────────────────────────
# [[files]]
# upstream = "path/in/upstream/repo.go"
# local    = "src/local.rs"

# ── Function mappings ────────────────────────────────────────────────────────
# [[functions]]
# upstream_name = "UpstreamFunc"
# local_name    = "local_fn"
# file          = "src/routes.rs"

# ── Test mappings ────────────────────────────────────────────────────────────
# [[tests]]
# upstream_test = "TestUpstreamFunc"
# local_test    = "test_local_fn"

# ── Surface mappings ─────────────────────────────────────────────────────────
# [[surfaces]]
# kind          = "http"
# upstream_path = "/api/upstream"
# local_path    = "/api/policy/endpoint"
