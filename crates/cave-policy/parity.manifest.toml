# parity.manifest.toml — cave-policy
# Upstream: open-policy-agent/opa  https://github.com/open-policy-agent/opa  pinned v0.58.0
#
# Cave-policy implements the OPA REST API (/v1/data /v1/policies /v1/compile
# /v1/query) plus a Rego parser/evaluator and a Kyverno-style admission
# webhook. Mappings below pin the OPA correspondence.

[upstream]
org     = "open-policy-agent"
repo    = "opa"
version = "v0.58.0"

[module]
name        = "cave-policy"
description = "Policy engine — OPA reimplementation (Rego parser/eval, bundle service, decision log) + Kyverno-style admission webhook"
source_root = "src"

# ── File mappings ────────────────────────────────────────────────────────────

[[files]]
upstream = "runtime/runtime.go"
local    = "src/lib.rs"

[[files]]
upstream = "server/server.go"
local    = "src/routes.rs"

[[files]]
upstream = "storage/inmem/inmem.go"
local    = "src/store.rs"

[[files]]
upstream = "plugins/bundle/plugin.go"
local    = "src/bundle.rs"

[[files]]
upstream = "plugins/logs/plugin.go"
local    = "src/decision_log.rs"

[[files]]
upstream = "ast/term.go"
local    = "src/rego/ast.rs"

[[files]]
upstream = "ast/parser.go"
local    = "src/rego/parser.rs"

[[files]]
upstream = "ast/parser_ext.go"
local    = "src/rego/lexer.rs"

[[files]]
upstream = "topdown/eval.go"
local    = "src/rego/eval.rs"

[[files]]
upstream = "topdown/builtins.go"
local    = "src/rego/builtins.rs"

[[files]]
upstream = "ast/value.go"
local    = "src/rego/value.rs"

[[files]]
upstream = "types/types.go"
local    = "src/models.rs"

[[files]]
upstream = "internal/runtime/init/init.go"
local    = "src/error.rs"

# Kyverno admission webhook side (kyverno/kyverno upstream — kept in opa scope)

[[files]]
upstream = "pkg/policy/admission_review.go"
local    = "src/admission/mod.rs"

[[files]]
upstream = "pkg/engine/validate.go"
local    = "src/kyverno/validate.rs"

[[files]]
upstream = "pkg/engine/mutate.go"
local    = "src/kyverno/mutate.rs"

[[files]]
upstream = "pkg/engine/generate.go"
local    = "src/kyverno/generate.rs"

[[files]]
upstream = "pkg/engine/imageverify.go"
local    = "src/kyverno/image_verify.rs"

[[files]]
upstream = "pkg/engine/jmespath/jmespath.go"
local    = "src/kyverno/jmespath.rs"

# ── Function mappings ────────────────────────────────────────────────────────

[[functions]]
upstream_name = "Eval"
local_name    = "eval_body"
file          = "src/rego/eval.rs"

[[functions]]
upstream_name = "EvalTerm"
local_name    = "eval_term"
file          = "src/rego/eval.rs"

[[functions]]
upstream_name = "Unify"
local_name    = "unify"
file          = "src/rego/eval.rs"

[[functions]]
upstream_name = "RegisterBuiltin"
local_name    = "call"
file          = "src/rego/builtins.rs"

[[functions]]
upstream_name = "MaskRule"
local_name    = "mask_sensitive"
file          = "src/decision_log.rs"

[[functions]]
upstream_name = "Activate"
local_name    = "activate"
file          = "src/bundle.rs"

[[functions]]
upstream_name = "Read"
local_name    = "parse_bundle"
file          = "src/bundle.rs"

[[functions]]
upstream_name = "v1DataGet"
local_name    = "opa_get_data"
file          = "src/routes.rs"

[[functions]]
upstream_name = "v1DataPost"
local_name    = "opa_query_data"
file          = "src/routes.rs"

[[functions]]
upstream_name = "v1Compile"
local_name    = "opa_compile"
file          = "src/routes.rs"

[[functions]]
upstream_name = "v1Query"
local_name    = "opa_post_query"
file          = "src/routes.rs"

[[functions]]
upstream_name = "Health"
local_name    = "opa_health"
file          = "src/routes.rs"

