# ── Surface mappings ─────────────────────────────────────────────────────────

[[surfaces]]
kind          = "http"
upstream_path = "/v1/data"
local_path    = "/v1/data"

[[surfaces]]
kind          = "http"
upstream_path = "/v1/data/{path}"
local_path    = "/v1/data/{*path}"

[[surfaces]]
kind          = "http"
upstream_path = "/v1/policies"
local_path    = "/v1/policies"

[[surfaces]]
kind          = "http"
upstream_path = "/v1/policies/{id}"
local_path    = "/v1/policies/{id}"

[[surfaces]]
kind          = "http"
upstream_path = "/v1/compile"
local_path    = "/v1/compile"

[[surfaces]]
kind          = "http"
upstream_path = "/v1/query"
local_path    = "/v1/query"

[[surfaces]]
kind          = "http"
upstream_path = "/health"
local_path    = "/v1/health"

[[surfaces]]
kind          = "http"
upstream_path = "/"
local_path    = "/v1/status"

[[surfaces]]
kind          = "http"
upstream_path = "/admission/validate"
local_path    = "/webhook/validate"

[[surfaces]]
kind          = "http"
upstream_path = "/admission/mutate"
local_path    = "/webhook/mutate"

[[surfaces]]
kind          = "http"
upstream_path = "/kyverno/policies"
local_path    = "/api/kyverno/policies"
