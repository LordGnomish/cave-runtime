# parity.manifest.toml — cave-policy
# Charter v2 deep-port close 2026-05-23.
#
# cave-policy is a 3-upstream umbrella crate covering the Kubernetes policy
# triumvirate:
#
#   1. open-policy-agent/opa        v1.16.2   Apache-2.0  (Rego + REST)
#   2. open-policy-agent/gatekeeper v3.22.2   Apache-2.0  (ConstraintTemplate
#                                                          + Constraint CRDs)
#   3. kyverno/kyverno              v1.18.1   Apache-2.0  (validate/mutate/
#                                                          generate/verifyImages
#                                                          PolicyReports)
#
# All three upstreams are Apache-2.0 — line-port is permitted.

[upstream]
org           = "open-policy-agent"
repo          = "opa"
version       = "v1.16.2"
name          = "Open Policy Agent"
license       = "Apache-2.0"
language      = "Go"
url           = "https://github.com/open-policy-agent/opa"
source_sha    = "85f6d990d19094da38e829561813e7da7fbae272"

# ─── Companion upstreams ────────────────────────────────────────────────────
[[upstreams]]
org           = "open-policy-agent"
repo          = "gatekeeper"
version       = "v3.22.2"
license       = "Apache-2.0"
language      = "Go"
url           = "https://github.com/open-policy-agent/gatekeeper"
source_sha    = "eda110bdaf2510288dccd73a1be4dd0c6442a4aa"
role          = "admission-webhook + ConstraintTemplate/Constraint CRDs"

[[upstreams]]
org           = "kyverno"
repo          = "kyverno"
version       = "v1.18.1"
license       = "Apache-2.0"
language      = "Go"
url           = "https://github.com/kyverno/kyverno"
source_sha    = "ec14520a11cc25432482bfc0baa6a61d3c309524"
role          = "validate/mutate/generate/verifyImages + PolicyReports"

[module]
name          = "cave-policy"
description   = "Policy triumvirate — OPA v1.16.2 (Rego + REST) + Gatekeeper v3.22.2 (ConstraintTemplate/Constraint) + Kyverno v1.18.1 (validate/mutate/generate/verifyImages)"
source_root   = "src"

[parity]
fill_ratio            = 0.9808
honest_ratio          = 0.5962
mapped_count          = 28
partial_count         = 3
skipped_count         = 20
unmapped_count        = 1
total                 = 52
parity_ratio_source   = "manifest"
last_audit            = "2026-05-24"
infra_only            = false

