# parity.manifest.toml — cave-rdbms
# Upstream: postgres/postgres  https://github.com/postgres/postgres
# Skeleton generated by cave parity init — fill in the mapping sections

[upstream]
org     = "postgres"
repo    = "postgres"
version = "16.0"

[module]
name        = "cave-rdbms"
description = "Relational database — PostgreSQL replacement"
source_root = "src"

# ── File mappings ────────────────────────────────────────────────────────────
