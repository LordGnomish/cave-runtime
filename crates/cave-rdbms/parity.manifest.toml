# ── Surface mappings ─────────────────────────────────────────────────────────
# Native Postgres exposes a binary wire protocol (v3) on port 5432; cave-rdbms
# adds an HTTP admin API alongside.

[[surfaces]]
kind          = "tcp"
upstream_path = "/postgres-wire-v3"
local_path    = "/api/rdbms/server/port"

[[surfaces]]
kind          = "http"
upstream_path = "/health"
local_path    = "/api/rdbms/health"

[[surfaces]]
kind          = "http"
upstream_path = "/databases"
local_path    = "/api/rdbms/databases"

[[surfaces]]
kind          = "http"
upstream_path = "/databases/schemas"
local_path    = "/api/rdbms/databases/{db}/schemas"

[[surfaces]]
kind          = "http"
upstream_path = "/databases/schemas/tables"
local_path    = "/api/rdbms/databases/{db}/schemas/{schema}/tables"

[[surfaces]]
kind          = "http"
upstream_path = "/databases/tables/info"
local_path    = "/api/rdbms/databases/{db}/schemas/{schema}/tables/{table}"

[[surfaces]]
kind          = "http"
upstream_path = "/databases/tables/rows"
local_path    = "/api/rdbms/databases/{db}/schemas/{schema}/tables/{table}/rows"

[[surfaces]]
kind          = "http"
upstream_path = "/exec"
local_path    = "/api/rdbms/exec"

[[surfaces]]
kind          = "http"
upstream_path = "/server/info"
local_path    = "/api/rdbms/server/info"

[[surfaces]]
kind          = "http"
upstream_path = "/explain"
local_path    = "/api/rdbms/explain"

