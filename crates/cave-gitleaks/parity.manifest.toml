# parity.manifest.toml — cave-gitleaks
# Upstream: gitleaks/gitleaks  https://github.com/gitleaks/gitleaks  pinned v8.29.1
#
# Cave-gitleaks ports the Gitleaks surface in pure Rust: TOML config
# loader with `[extend]` composition (useDefault + disabledRules), the
# rule engine (regex + entropy + keyword pre-filter + allowlist), the
# Finding type with redaction, JSON / SARIF / CSV / JUnit reporters,
# working-tree and git-history walkers (libgit2 via the `git2` crate),
# `protect` (pre-commit/pre-push staged-blob enforcement), persistent
# baseline (TOML + upstream JSON), base64/gzip auto-decoder chains, and
# the stopwords anti-FP filter.
#
# This is the close-out of Phase 2 — 12 of >700 upstream built-in
# rules are bundled (high-signal cross-industry providers); the
# remaining rule pack import + Go-template reporter are deferred to a
# separate "rule-pack-import" ray.

[upstream]
org         = "gitleaks"
repo        = "gitleaks"
version     = "v8.29.1"
name        = "Gitleaks"
license     = "MIT"
language    = "Go"
url         = "https://github.com/gitleaks/gitleaks"
source_sha  = "v8.29.1"

[parity]
parity_ratio_source = "manifest"
fill_ratio          = 0.9444  # mapped / (mapped + partial + unmapped) = 17/18
honest_ratio        = 0.8500  # mapped / total = 17/20 (skipped excluded from credit)
last_audit          = "2026-05-19"
infra_only          = false
mapped_count        = 17
partial_count       = 1
skipped_count       = 2
unmapped_count      = 0
total               = 20

# fill_ratio derivation (Charter v2 honest measurement, subsystem-count basis):
#   mapped (17) + partial (1) + unmapped (0) = 18 in-scope subsystems
#   17 / 18 = 0.9444
#
# Supplementary LOC measurement (transparency):
#   impl_lines               = ~1750 (cave-gitleaks src/, excl #[cfg(test)])
#   upstream_in_scope_lines  = ~2350 (sum of subsystem in-scope LOC)
#   ~1750 / ~2350            = ~0.74 (LOC basis)
#
# Per-subsystem in-scope LOC against v8.29.1 (Phase 2):
#   config/config.go (+extend resolution)         400 / 492
#   config/rule.go                                107 / 107
#   config/allowlist.go                           150 / 179
#   detect/detect.go                              400 / 900
#   detect/files.go                                80 /  92
#   detect/git.go                                  35 /  35
#   detect/baseline.go                            120 / 150
#   detect/decoders/                              200 / 350
#   config/gitleaks.toml [stopwords]               80 / 100
#   cmd/protect.go                                 80 / 130
#   detect/utils.go (entropy + helpers)            80 / 263
#   report/finding.go                             100 / 126
#   report/{json,sarif,csv,junit}.go              350 / 400
#  ─────────────────────────────────────
#  Total upstream in-scope LOC                  ~2 350

[module]
name        = "cave-gitleaks"
description = "Secret scanner — Gitleaks parity (TOML rule engine + [extend], entropy + keyword pre-filter, allowlist, JSON/SARIF/CSV/JUnit reporters, libgit2 history walker, protect command, baseline, base64/gzip decoders, stopwords)"
source_root = "src"

