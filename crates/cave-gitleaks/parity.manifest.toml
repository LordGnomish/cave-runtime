# parity.manifest.toml — cave-gitleaks
# Upstream: gitleaks/gitleaks  https://github.com/gitleaks/gitleaks  pinned v8.29.1
#
# Cave-gitleaks ports the in-scope MVP surface of Gitleaks line-by-line in
# Rust: TOML config loader, rule engine (regex + entropy + keyword pre-filter
# + allowlist), Finding type with redaction, JSON + SARIF reporters, working-
# tree and git-history walkers (libgit2 via the `git2` crate).
#
# This is a scaffold/MVP close-out: 12 of >700 upstream built-in rules are
# bundled (high-signal cross-industry providers), 2 of 5 reporters land
# (JSON + SARIF), the `detect` subcommand orchestrator is ported,
# `protect` (pre-commit/pre-push) is honest-deferred.

[upstream]
org         = "gitleaks"
repo        = "gitleaks"
version     = "v8.29.1"
name        = "Gitleaks"
license     = "MIT"
language    = "Go"
url         = "https://github.com/gitleaks/gitleaks"
source_sha  = "v8.29.1"

[parity]
parity_ratio_source = "manifest"
fill_ratio          = 0.6578
honest_ratio        = 0.6578
last_audit          = "2026-05-19"
infra_only          = false
mapped_count        = 10
partial_count       = 0
skipped_count       = 8
unmapped_count      = 0
total               = 18

# fill_ratio derivation (Charter v2 honest measurement):
#   impl_lines               = 1065 (cave-gitleaks src/, excl #[cfg(test)])
#   upstream_in_scope_lines  = 1619 (sum of subsystem in-scope LOC, see below)
#   1065 / 1619              = 0.6578
#
# Per-subsystem in-scope LOC against v8.29.1 (line counts from
# `curl https://raw.githubusercontent.com/gitleaks/gitleaks/v8.29.1/<file>`):
#   config/config.go         350 / 492 (extends + condition AND/OR deferred)
#   config/rule.go           107 / 107 (full)
#   config/allowlist.go      150 / 179 (regexTarget deferred)
#   detect/detect.go         400 / 900 (detectRule + scan; source/decoder chains deferred)
#   detect/files.go           80 /  92 (working-tree walker)
#   detect/git.go             35 /  35 (full)
#   detect/location.go        60 /  80 (column-coarse; offset diagnostics deferred)
#   detect/reader.go          50 / 108 (covered via scan_str surface)
#   detect/utils.go           80 / 263 (shannon entropy + helpers)
#   report/finding.go        100 / 126 (struct + fingerprint)
#   report/json.go            17 /  17 (full)
#   report/sarif.go          170 / 217 (subset; invocations + conversion deferred)
#   report/report.go          16 /  16 (full)
#   report/constants.go        4 /   4 (full)
#  ─────────────────────────────────────
#  Total in-scope LOC      1 619 upstream

[module]
name        = "cave-gitleaks"
description = "Secret scanner — Gitleaks parity (TOML rule engine, entropy + keyword pre-filter, allowlist, JSON + SARIF reporters, libgit2 history walker)"
source_root = "src"

# ── File mappings (mapped) ──────────────────────────────────────────────────

[[files]]
upstream = "config/config.go"
local    = "src/config.rs"

[[files]]
upstream = "config/rule.go"
local    = "src/rule.rs"

[[files]]
upstream = "config/allowlist.go"
local    = "src/config.rs"

[[files]]
upstream = "detect/detect.go"
local    = "src/detect.rs"

[[files]]
upstream = "detect/files.go"
local    = "src/detect.rs"

[[files]]
upstream = "detect/git.go"
local    = "src/git_walker.rs"

[[files]]
upstream = "detect/utils.go"
local    = "src/detect.rs"

[[files]]
upstream = "report/finding.go"
local    = "src/finding.rs"

[[files]]
upstream = "report/json.go"
local    = "src/report.rs"

[[files]]
upstream = "report/sarif.go"
local    = "src/report.rs"

# ── Function mappings ───────────────────────────────────────────────────────

[[functions]]
upstream_name = "detect.Detector.detectRule"
local_name    = "Detector::check_rule_on_line"
file          = "src/detect.rs"

[[functions]]
upstream_name = "detect.Detector.Detect"
local_name    = "Detector::scan_str"
file          = "src/detect.rs"

[[functions]]
upstream_name = "detect.Detector.DetectFiles"
local_name    = "Detector::scan_working_tree"
file          = "src/detect.rs"

[[functions]]
upstream_name = "detect.Detector.DetectGit"
