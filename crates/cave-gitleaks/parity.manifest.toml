[[functions]]
upstream_name = "report.writeJson"
local_name    = "write_json"
file          = "src/report.rs"

[[functions]]
upstream_name = "report.writeSarif"
local_name    = "write_sarif"
file          = "src/report.rs"

# ── Mapped subsystems (Charter v2 [[mapped]] block) ────────────────────────

[[mapped]]
name = "config-loader"
upstream = "config/config.go"
note = "TOML schema parsing — title, [allowlist], [[rules]], per-rule allowlist."

[[mapped]]
name = "rule-engine"
upstream = "config/rule.go"
note = "Rule struct + compiled regex + path scope + keyword pre-filter + entropy floor."

[[mapped]]
name = "allowlist"
upstream = "config/allowlist.go"
note = "Path/secret/commit allowlists, per-rule overrides."

[[mapped]]
name = "detector"
upstream = "detect/detect.go"
note = "Per-line per-rule detectRule loop; secret + match redaction."

[[mapped]]
name = "shannon-entropy"
upstream = "detect/utils.go"
note = "Pure shannonEntropy port; gate on per-rule entropy floor."

[[mapped]]
name = "finding"
upstream = "report/finding.go"
note = "Finding struct with upstream JSON tag parity, fingerprint computation."

[[mapped]]
name = "json-reporter"
upstream = "report/json.go"
note = "Array-of-Finding JSON writer with upstream field names."

[[mapped]]
name = "sarif-reporter"
upstream = "report/sarif.go"
note = "SARIF 2.1.0 subset — tool driver, rules dedup, results+regions."

[[mapped]]
name = "working-tree-walker"
upstream = "detect/files.go"
note = "Filesystem walker, .git/.hg/.svn skip, binary file tolerated."

[[mapped]]
name = "git-history-walker"
upstream = "detect/git.go"
note = "libgit2 revwalk; per-commit diff; commit metadata stamping."

