# ── Skipped subsystems (out-of-scope MVP, Charter v2 [[skipped]] block) ────

[[skipped]]
name = "template-reporter"
upstream = "report/template.go"
reason = "Go-template render port deferred — no Rust analog without large dep; SARIF + CSV + JUnit cover CI needs."

[[skipped]]
