# parity.manifest.toml — cave-dast
# Upstream: zaproxy/zaproxy  https://github.com/zaproxy/zaproxy
# Skeleton generated by cave parity init — fill in the mapping sections

[upstream]
org     = "zaproxy"
repo    = "zaproxy"
version = "v2.14.0"
name    = "OWASP ZAP"
license = "Apache-2.0"
language= "Java"
url     = "https://github.com/zaproxy/zaproxy"

[parity]
ratio       = 0.0        # honest: 0.0 means upstream parity NOT yet measured
last_audit  = "2026-05-12"
infra_only  = false
[module]
name        = "cave-dast"
description = "Dynamic application security testing — OWASP ZAP replacement"
source_root = "src"

# ── File mappings ────────────────────────────────────────────────────────────
# [[files]]
# upstream = "path/in/upstream/repo.go"
# local    = "src/local.rs"

# ── Function mappings ────────────────────────────────────────────────────────
# [[functions]]
# upstream_name = "UpstreamFunc"
# local_name    = "local_fn"
# file          = "src/routes.rs"

# ── Test mappings ────────────────────────────────────────────────────────────
# [[tests]]
# upstream_test = "TestUpstreamFunc"
