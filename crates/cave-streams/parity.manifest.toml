# parity.manifest.toml — cave-streams
# Upstream: apache/kafka  https://github.com/apache/kafka
# Skeleton generated by cave parity init — fill in the mapping sections

[upstream]
org     = "apache"
repo    = "kafka"
version = "3.6.0"

[module]
name        = "cave-streams"
description = "Event streaming — Apache Kafka replacement"
source_root = "src"

# ── File mappings ────────────────────────────────────────────────────────────
# [[files]]
# upstream = "path/in/upstream/repo.go"
# local    = "src/local.rs"

# ── Function mappings ────────────────────────────────────────────────────────
# [[functions]]
# upstream_name = "UpstreamFunc"
# local_name    = "local_fn"
# file          = "src/routes.rs"

# ── Test mappings ────────────────────────────────────────────────────────────
# [[tests]]
# upstream_test = "TestUpstreamFunc"
# local_test    = "test_local_fn"

# ── Surface mappings ─────────────────────────────────────────────────────────
# [[surfaces]]
# kind          = "http"
# upstream_path = "/api/upstream"
# local_path    = "/api/streams/endpoint"
