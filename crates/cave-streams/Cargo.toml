[package]
name = "cave-streams"
description = "CAVE Streams — cloud-native event streaming platform, Kafka-compatible without JVM or ZooKeeper"
description = "Cloud-native event streaming platform — replaces Kafka + Confluent Platform"
version.workspace = true
edition.workspace = true
license.workspace = true

[dependencies]
cave-core = { path = "../cave-core" }

# Async
tokio      = { workspace = true, features = ["full"] }
# Web framework
axum       = { workspace = true }
# Serialization
serde      = { workspace = true }
serde_json = { workspace = true }
# Utilities
uuid       = { workspace = true }
chrono     = { workspace = true }
thiserror  = { workspace = true }
tracing    = { workspace = true }
anyhow     = { workspace = true }

# Extra deps not in workspace
bytes      = "1"

[dev-dependencies]
tokio-test = "0.4"
axum = { workspace = true }
serde = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }
uuid = { workspace = true }
chrono = { workspace = true }
thiserror = { workspace = true }
