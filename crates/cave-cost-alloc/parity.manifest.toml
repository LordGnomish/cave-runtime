# parity.manifest.toml — cave-cost-alloc
# Upstream: opencost/opencost  https://github.com/opencost/opencost
# Skeleton generated by cave parity init — fill in the mapping sections

[upstream]
org     = "opencost"
repo    = "opencost"
version = "v1.108.0"
name    = "OpenCost"
license = "Apache-2.0"
language= "Go"
url     = "https://github.com/opencost/opencost"
[module]
name        = "cave-cost-alloc"
description = "Cost allocation — OpenCost/Kubecost replacement"
source_root = "src"

# ── File mappings ────────────────────────────────────────────────────────────
# [[files]]
# upstream = "path/in/upstream/repo.go"
# local    = "src/local.rs"

# ── Function mappings ────────────────────────────────────────────────────────
# [[functions]]
# upstream_name = "UpstreamFunc"
# local_name    = "local_fn"
# file          = "src/routes.rs"

# ── Test mappings ────────────────────────────────────────────────────────────
# [[tests]]
# upstream_test = "TestUpstreamFunc"
# local_test    = "test_local_fn"

# ── Surface mappings ─────────────────────────────────────────────────────────
# [[surfaces]]
# kind          = "http"
# upstream_path = "/api/upstream"
# local_path    = "/api/cost-alloc/endpoint"

[parity]
infra_only = true
ratio       = 0.0        # honest: 0.0 means upstream parity NOT yet measured
last_audit  = "2026-05-12"

