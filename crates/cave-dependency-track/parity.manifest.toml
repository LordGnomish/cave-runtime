# parity.manifest.toml — cave-dependency-track
# Upstream: DependencyTrack/dependency-track  https://github.com/DependencyTrack/dependency-track  pinned v4.14.2
# Charter v2 deep-port close 2026-05-23.
#
# cave-dependency-track is the cave-runtime SBOM/SCA platform.  It reimplements
# the Dependency-Track core in Rust on top of axum: project portfolio,
# CycloneDX 1.4/1.5/1.6 + SPDX 2.3 ingestion, NVD/OSV/GHSA/Snyk/OSS-Index/
# VulnDB vulnerability intelligence with EPSS join, license/coordinates/age/
# severity policy engine, vulnerability audit state machine, CycloneDX VEX +
# Bill of Vulnerabilities export, Slack/Teams/Mattermost/Email/Webhook/Jira
# notification publishers, and DefectDojo/Fortify SSC/Kenna/ThreadFix
# outbound integrations.
#
# MVP scope (mapped + partial + skipped):
#   - Project portfolio: CRUD + tags + classifier + hierarchy + descendants
#   - SBOM ingestion: CycloneDX 1.4/1.5/1.6 + SPDX 2.3 JSON + SPDX tag-value
#   - Component identity + analysis cache (purl > cpe > swid > gnv key)
#   - Vuln intel: NVD CVE 2.0, OSV.dev, GHSA, Snyk, OSS Index, VulnDB, EPSS
#   - Policy: license, license-group, vulnerability (severity/EPSS/CWE/VulnId),
#     coordinates (purl/cpe/hash/version), component-age (ISO-8601 duration)
#   - Risk: inherited-risk score with configurable per-severity weights
#   - Audit: in-triage / exploitable / resolved / false-positive / not-affected
#     state machine + comments + suppression
#   - VEX: CycloneDX 1.6 VEX export
#   - BOV: Bill of Vulnerabilities aggregate with severity bucketing
#   - Licenses: curated SPDX catalog (MIT, Apache-2.0, AGPL-3.0, GPL family,
#     LGPL, MPL, EPL, BSD, ISC, Zlib, …)
#   - CPE 2.3 parser + wildcard matcher
#   - PURL parser (type / namespace / name / version / qualifiers / subpath)
#   - Repository metadata: Maven / Npm / Nuget / Pypi / Gem / Cargo / Composer /
#     Hex / Go / Generic latest-version registry
#   - Notifications: Slack, Teams, Mattermost, Email, Webhook, Jira (renderer)
#   - Integrations: DefectDojo, Fortify SSC, Kenna Security, ThreadFix (CSV)
#   - REST API v1 (project, component, vulnerability, bom upload, policy,
#     analysis, vex, bov, license, repository, search, graphql, swagger)
#   - GraphQL: portfolio + vulnerabilities + policies + introspection
#   - OpenAPI 3.0 swagger.json descriptor
#
# Out of MVP (skipped — Phase 2):
#   - Persistent JDO/DataNucleus query layer (in-memory `*Store`s ship instead)
#   - Trivy mirror task (`cave-trivy` deep-port owns it)
#   - Full Lucene-backed search index
#   - LDAP / OIDC / Keycloak SSO (cave-auth owns it)
#   - Konfetti web UI (Vue) — cave-portal-web Backstage parity covers it
#   - Built-in TLS termination (cave-gateway owns it)
#   - Built-in vulnerability scanner (Trivy/Snyk integration in cave-trivy)
#   - DataNucleus migration scripts + Liquibase changesets
#   - Backstage notification publisher (cave-techdocs adapter pending)
#   - SAML / OIDC interactive login (cave-auth federation owns it)

[upstream]
org        = "DependencyTrack"
repo       = "dependency-track"
version    = "v4.14.2"
name       = "Dependency-Track"
license    = "Apache-2.0"
language   = "Java"
url        = "https://github.com/DependencyTrack/dependency-track"
source_sha = "c4a156726472cd529cc9fa8ed12e825cc000327d"

[parity]
parity_ratio_source = "manifest"
fill_ratio          = 0.9756
honest_ratio        = 0.6098
last_audit          = "2026-05-23"
infra_only          = false
mapped_count        = 24
partial_count       = 1
skipped_count       = 15
unmapped_count      = 1
total               = 41

# 2026-05-23 Charter v2 deep-port — claude/cave-deptrack-2026-05-23-deep:
#   * Pre-port scaffold absent (new crate).
#   * Deep-port shipped 25 modules implementing portfolio + sbom + vuln_intel +
#     policy + audit + vex + bov + licenses + cpe + purl + risk + repositories +
#     notifications + integrations + routes + graphql + swagger + engine.
#   * Subsystem-count formula: fill_ratio = (mapped + partial + skipped) / total
#     = (24 + 1 + 15) / 41 = 0.9756.
#   * honest_ratio = (mapped + partial) / total = 25 / 41 = 0.6098 — reflects
#     that 15 subsystems (persistent ORM, web UI, mirror tasks, SSO, …) are
#     honestly cut to Phase 2 rather than silently absent.
#   * source_sha pinned to Dependency-Track v4.14.2 commit
#     c4a156726472cd529cc9fa8ed12e825cc000327d.

[module]
name        = "cave-dependency-track"
