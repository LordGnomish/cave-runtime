# parity.manifest.toml — cave-cost
# Upstream: opencost/opencost  https://github.com/opencost/opencost
# Skeleton generated by cave parity init — fill in the mapping sections

[upstream]
org     = "opencost"
repo    = "opencost"
version = "v1.108.0"
source_sha = "v1.108.0"  # G1: tag-based pin (deep-port may override)
name    = "OpenCost"
license = "Apache-2.0"
language= "Go"
url     = "https://github.com/opencost/opencost"

[parity]
ratio       = 0.0        # honest: 0.0 means upstream parity NOT yet measured
last_audit  = "2026-05-12"
infra_only  = false
[module]
name        = "cave-cost"
description = "FinOps cost management — OpenCost replacement"
source_root = "src"

# ── File mappings ────────────────────────────────────────────────────────────
# [[files]]
# upstream = "path/in/upstream/repo.go"
# local    = "src/local.rs"

# ── Function mappings ────────────────────────────────────────────────────────
# [[functions]]
# upstream_name = "UpstreamFunc"
# local_name    = "local_fn"
# file          = "src/routes.rs"

# ── Test mappings ────────────────────────────────────────────────────────────
# [[tests]]
# upstream_test = "TestUpstreamFunc"
# local_test    = "test_local_fn"

# ── Surface mappings ─────────────────────────────────────────────────────────
# [[surfaces]]
# kind          = "http"
# upstream_path = "/api/upstream"
# local_path    = "/api/cost/endpoint"

[portal_ui]
upstream_ui  = "OpenCost UI"
upstream_url = "https://www.opencost.io/"
status       = "scaffold"
loc          = 75
priority     = "P2"
notes        = "Cost allocation panels"
last_audit   = "2026-05-11"
