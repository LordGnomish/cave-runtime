# parity.manifest.toml — cave-cilium
# Upstream: cilium/cilium  https://github.com/cilium/cilium  pinned v1.19.4
#
# Scope charter: cave-cilium ports the Cilium **agent / operator
# control-plane**. The eBPF *datapath* sim (LB/DSR/conntrack/source-range)
# lives in the sibling crate cave-net; rows whose work belongs there are
# classified `skipped` with reason `orchestrator-handles` (cave-net).
#
# Each entry classifies one upstream pkg/<name>/ surface as:
#   [[mapped]]   — a src/*.rs file ports it, citing the Go source.
#   [[partial]]  — structure/interface ported; a real residual is delegated
#                  (e.g. vetted lattice crypto, the in-kernel verifier).
#   [[skipped]]  — out-of-charter: UI | CLI | orchestrator/sibling-handles |
#                  cloud | OS/kernel-bytecode | backend-infra.
#   [[unmapped]] — a real port gap in this charter, acknowledged honestly.
#
# Contract: fill_ratio = (mapped + skipped) / total. Manifest-authored.
# Fresh control-plane port (2026-06-07) — NOT inflated to 1.0; the four
# unmapped rows (ClusterMesh, egress gateway, BGP, bandwidth manager) and
# three partials are honest.

[upstream]
org        = "cilium"
repo       = "cilium"
version    = "v1.19.4"
source_sha = "v1.19.4"

[parity]
parity_ratio_source = "manifest"
infra_only          = false
last_audit          = "2026-06-07"
mapped_count        = 17
partial_count       = 3
skipped_count       = 6
unmapped_count      = 4
total               = 30
fill_ratio          = 0.7667
honest_ratio        = 0.7667

