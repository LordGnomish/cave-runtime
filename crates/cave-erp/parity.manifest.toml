# parity.manifest.toml — cave-erp
# Upstream: erpnext/erpnext  https://github.com/erpnext/erpnext
# Skeleton generated by cave parity init — fill in the mapping sections

[upstream]
org     = "erpnext"
repo    = "erpnext"
version = "v15.0.0"

[module]
name        = "cave-erp"
description = "Enterprise resource planning — ERPNext replacement"
source_root = "src"

# ── File mappings ────────────────────────────────────────────────────────────
# [[files]]
# upstream = "path/in/upstream/repo.go"
# local    = "src/local.rs"

# ── Function mappings ────────────────────────────────────────────────────────
# [[functions]]
# upstream_name = "UpstreamFunc"
# local_name    = "local_fn"
# file          = "src/routes.rs"

# ── Test mappings ────────────────────────────────────────────────────────────
# [[tests]]
# upstream_test = "TestUpstreamFunc"
# local_test    = "test_local_fn"

# ── Surface mappings ─────────────────────────────────────────────────────────
# [[surfaces]]
# kind          = "http"
# upstream_path = "/api/upstream"
# local_path    = "/api/erp/endpoint"
