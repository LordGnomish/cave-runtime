# parity.manifest.toml — cave-erp
# Upstream: frappe/erpnext  https://github.com/frappe/erpnext  pinned v15.0.0
#
# Cave-erp implements the same nine-module ERP surface that ERPNext exposes
# (HR, Recruitment, CRM, Sales, Purchase, Inventory, Accounting,
# Manufacturing, Projects). Mappings are at the per-module level; ERPNext's
# Python doctype hierarchy maps to Rust struct-per-doc + axum router-per-mod.

[upstream]
org     = "frappe"
repo    = "erpnext"
version = "v15.0.0"

[module]
name        = "cave-erp"
description = "ERP (HR/CRM/Sales/Purchase/Inventory/Accounting/Manufacturing/Projects) — ERPNext reimplementation"
source_root = "src"

# ── File mappings ────────────────────────────────────────────────────────────

[[files]]
upstream = "erpnext/hooks.py"
local    = "src/lib.rs"

[[files]]
upstream = "erpnext/setup/setup_wizard/setup_wizard.py"
local    = "src/engine.rs"

[[files]]
upstream = "erpnext/controllers/accounts_controller.py"
local    = "src/store.rs"

[[files]]
upstream = "erpnext/api.py"
local    = "src/routes.rs"

[[files]]
upstream = "erpnext/setup/doctype/company/company.py"
local    = "src/models.rs"

[[files]]
upstream = "erpnext/hr/doctype/employee/employee.py"
local    = "src/modules/hr.rs"

[[files]]
upstream = "erpnext/hr/doctype/job_applicant/job_applicant.py"
local    = "src/modules/recruitment.rs"

[[files]]
upstream = "erpnext/crm/doctype/lead/lead.py"
local    = "src/modules/crm.rs"

[[files]]
upstream = "erpnext/selling/doctype/sales_order/sales_order.py"
local    = "src/modules/sales.rs"

[[files]]
upstream = "erpnext/buying/doctype/purchase_order/purchase_order.py"
