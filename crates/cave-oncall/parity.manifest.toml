upstream_path = "/api/v1/escalation_chains"
local_path    = "/api/oncall/escalation"

[[surfaces]]
kind          = "http"
upstream_path = "/api/v1/users"
local_path    = "/api/oncall/users"

[[surfaces]]
kind          = "http"
upstream_path = "/api/v1/integrations"
local_path    = "/api/oncall/integrations"

[portal_ui]
upstream_ui  = "Grafana OnCall"
upstream_url = "https://grafana.com/docs/oncall/latest/"
status       = "partial"
loc          = 139
priority     = "P1"
notes        = "Phase 2: full schedule calendar + escalation chain editor"
last_audit   = "2026-05-19"

