local_files  = ["src/cluster/slots.rs"]
note         = "Per-slot stats (key_count, cpu_usec, network_bytes_in/out) via SlotMap::record_access + top_slots_by_keys for the CLUSTER SLOT-STATS surface."

[[unmapped]]
