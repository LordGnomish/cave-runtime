[[surfaces]]
kind          = "http"
upstream_path = "INCR <key>"
local_path    = "/api/v1/cache/keys/{key}/incr"

[[surfaces]]
kind          = "http"
upstream_path = "DECR <key>"
local_path    = "/api/v1/cache/keys/{key}/decr"

[[surfaces]]
kind          = "http"
upstream_path = "INFO"
local_path    = "/api/v1/cache/stats"

[[surfaces]]
kind          = "http"
upstream_path = "PUBLISH <channel>"
