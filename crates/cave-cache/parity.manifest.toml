# parity.manifest.toml — cave-cache
# Upstream: redis/redis  https://github.com/redis/redis  pinned 7.2.0
#
# Full Redis-equivalent cache server: RESP2/RESP3 wire protocol, all data
# types (strings, lists, hashes, sets, sorted-sets, streams, hyperloglog,
# bitmap, geo), pub/sub, ACL, scripting, transactions, expiry, persistence,
# cluster slots, plus a side REST surface (src/routes.rs) for cave-runtime.

[upstream]
org     = "redis"
repo    = "redis"
version = "7.2.0"
name    = "Redis"
license = "BSD-3-Clause"
language= "C"
url     = "https://github.com/redis/redis"

[parity]
# Package-level inventory against redis/redis 7.2.0. Inventory
# hand-curated 2026-05-12 against the Redis source tree
# (`src/{server,networking,db,t_*,replication,cluster,scripting,
# expire,aof,rdb,acl,connection,eviction,modules}.c`). The cave-
# cache `src/commands/` directory mirrors Redis's `t_*.c` 1:1.
mapped_count   = 19
partial_count  = 4
skipped_count  = 13
unmapped_count = 2
total          = 38
fill_ratio     = 0.9474
honest_ratio   = 0.8421
last_audit     = "2026-05-13"
infra_only     = false
[module]
name        = "cave-cache"
description = "Redis 7.2 reimplementation — RESP wire + all data types + pub/sub + scripting + persistence + cluster slots + REST shim"
source_root = "src"
pump_priority = "HIGH"  # qwen-pump B-prime priority gate
target_tests = 30        # qwen-pump B-prime target (#[test] count in tests/qwen_drafted.rs); below this, B-prime fires

