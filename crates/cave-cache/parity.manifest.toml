[[partial]]
upstream_pkg = "redis:src/cluster.c"
local_files  = ["src/cluster/mod.rs", "src/cluster/state.rs", "src/cluster/slots.rs", "src/cluster/gossip.rs", "src/cluster/migration.rs", "src/cluster/epoch.rs"]
note         = "Cluster mode: 16,384-slot SlotMap with hash-tag-aware routing, MOVED / ASK redirect computation, IMPORTING/MIGRATING ledger, configEpoch/currentEpoch atomic counters, and a GossipBus state machine (PING/PONG/MEET/FAIL/UPDATE message effects). Honest scope cut: the on-wire bus serializer for upstream's port-16380 listener is not implemented — gossip flows through the same control plane as the rest of the runtime."

[[partial]]
upstream_pkg = "redis:src/sentinel.c"
local_files  = ["src/sentinel.rs"]
note         = "Sentinel HA state machine: monitor/remove, SDOWN→ODOWN ladder with quorum peer voting, replica registry, lowest-priority-then-offset-then-addr promotion candidate selection (priority=0 excluded per Redis convention), begin_failover/commit_failover with config_epoch bump and deposed-master re-registration. Honest scope cut: this is the pure state machine — the gossip TCP socket + SENTINEL command set surface lives in the server crate."

[[partial]]
upstream_pkg = "redis:src/replication.c"
local_files  = ["src/replication.rs"]
note         = "Master/replica replication: master-side MasterState (repl_id, master_repl_offset, ring-buffered backlog, replica registry), replica-side ReplicaSideState (WaitPsync→Syncing→Online ladder), PSYNC decision: partial when (repl_id matches AND requested_offset ≥ backlog_floor), full otherwise (incl. '?' first-time). INFO replication output (role / master_replid / master_repl_offset / lag). Honest scope cut: no on-the-wire RDB encoder + TCP socket lifecycle — caller bridges this state to the wire."

[[unmapped]]
