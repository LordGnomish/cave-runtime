# ── Test mappings ────────────────────────────────────────────────────────────

[[tests]]
upstream_test = "tests/unit/type/zset.tcl::ZADD basic"
local_test    = "zadd_returns_new_member_count_only"

[[tests]]
upstream_test = "tests/unit/type/zset.tcl::ZADD CH flag"
local_test    = "zadd_ch_flag_counts_score_updates"

[[tests]]
upstream_test = "tests/unit/type/zset.tcl::ZADD NX"
local_test    = "zadd_nx_does_not_overwrite_existing_score"

[[tests]]
upstream_test = "tests/unit/type/zset.tcl::ZADD XX"
local_test    = "zadd_xx_does_not_create_missing"

[[tests]]
upstream_test = "tests/unit/type/zset.tcl::ZADD GT"
local_test    = "zadd_gt_only_raises_score"

[[tests]]
upstream_test = "tests/unit/type/zset.tcl::ZADD LT"
local_test    = "zadd_lt_only_lowers_score"

[[tests]]
upstream_test = "tests/unit/type/zset.tcl::ZINCRBY"
local_test    = "zincrby_increments_and_returns_new_score"

[[tests]]
upstream_test = "tests/unit/type/zset.tcl::ZINCRBY missing"
local_test    = "zincrby_creates_missing_member"

[[tests]]
upstream_test = "tests/unit/type/zset.tcl::ZRANGEBYSCORE inclusive"
local_test    = "zrangebyscore_inclusive_range_in_order"

[[tests]]
upstream_test = "tests/unit/type/zset.tcl::ZRANGEBYSCORE exclusive"
local_test    = "zrangebyscore_exclusive_bounds"

[[tests]]
upstream_test = "tests/unit/type/zset.tcl::ZPOPMIN"
local_test    = "zpopmin_returns_lowest_score_member"

[[tests]]
upstream_test = "tests/unit/type/zset.tcl::ZPOPMAX"
local_test    = "zpopmax_returns_highest_score_member"

[[tests]]
upstream_test = "tests/unit/type/zset.tcl::ZCOUNT"
local_test    = "zcount_counts_inclusive_and_exclusive"

[[tests]]
upstream_test = "tests/unit/type/zset.tcl::ZRANGEBYLEX"
local_test    = "zrangebylex_equal_scores_returns_lex_range"

[[tests]]
upstream_test = "tests/unit/type/zset.tcl::ZMSCORE"
local_test    = "zmscore_returns_per_member_with_nil_for_missing"

# ── Surface mappings ─────────────────────────────────────────────────────────
# Redis exposes a wire protocol (RESP) on TCP, not REST, but cave-cache also
# offers a REST shim in src/routes.rs for the cave-runtime control plane.

[[surfaces]]
kind          = "http"
upstream_path = "GET <key>"
local_path    = "/api/v1/cache/keys/{key}"

[[surfaces]]
kind          = "http"
upstream_path = "SET <key>"
local_path    = "/api/v1/cache/keys"

[[surfaces]]
kind          = "http"
upstream_path = "EXPIRE <key>"
local_path    = "/api/v1/cache/keys/{key}/expire"

[[surfaces]]
kind          = "http"
upstream_path = "INCR <key>"
local_path    = "/api/v1/cache/keys/{key}/incr"

[[surfaces]]
kind          = "http"
upstream_path = "DECR <key>"
local_path    = "/api/v1/cache/keys/{key}/decr"

[[surfaces]]
kind          = "http"
upstream_path = "INFO"
local_path    = "/api/v1/cache/stats"

[[surfaces]]
kind          = "http"
upstream_path = "PUBLISH <channel>"
local_path    = "/api/v1/cache/pubsub/publish"

[[surfaces]]
kind          = "http"
upstream_path = "SUBSCRIBE <channel>"
local_path    = "/api/v1/cache/pubsub/{channel}"

[[surfaces]]
kind          = "http"
upstream_path = "MULTI/EXEC pipeline"
local_path    = "/api/v1/cache/pipeline"

