local_files  = ["src/tls_listener.rs"]
note         = "Native TLS listener configuration: TlsListenerConfig (bind/tls_port/plain_port/cert+key/ca/client_auth/alpn/allowed_protocols), ClientAuth parser matching upstream `tls-auth-clients yes|no|optional`, validate() (port clash, ALPN whitelist, TLS version whitelist, CA-required-when-mTLS), load() via rustls-pemfile for PKCS#8/PKCS#1/SEC1 keys. Honest scope cut: cryptographic key-cert match + handshake live in rustls server-config builder the caller drives; this module owns the config + PEM-load surface."

