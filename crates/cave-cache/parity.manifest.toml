# parity.manifest.toml — cave-cache
# Upstream: redis/redis  https://github.com/redis/redis
# Skeleton generated by cave parity init — fill in the mapping sections

[upstream]
org     = "redis"
repo    = "redis"
version = "7.2.0"

[module]
name        = "cave-cache"
description = "In-memory cache — Redis replacement"
source_root = "src"

# ── File mappings ────────────────────────────────────────────────────────────
# [[files]]
# upstream = "path/in/upstream/repo.go"
# local    = "src/local.rs"

# ── Function mappings ────────────────────────────────────────────────────────
# [[functions]]
# upstream_name = "UpstreamFunc"
# local_name    = "local_fn"
# file          = "src/routes.rs"

# ── Test mappings ────────────────────────────────────────────────────────────
# [[tests]]
# upstream_test = "TestUpstreamFunc"
# local_test    = "test_local_fn"

# ── Surface mappings ─────────────────────────────────────────────────────────
# [[surfaces]]
# kind          = "http"
# upstream_path = "/api/upstream"
# local_path    = "/api/cache/endpoint"
