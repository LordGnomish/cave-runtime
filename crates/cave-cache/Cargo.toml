[package]
name = "cave-cache"
description = "CAVE Cache — full Redis parity: RESP3, all data types, pub/sub, transactions, Lua, persistence"
authors.workspace = true
repository.workspace = true
homepage.workspace = true
documentation = "https://docs.rs/cave-cache"
readme = "README.md"
rust-version.workspace = true
keywords = ["redis", "cache", "database", "async", "networking"]
