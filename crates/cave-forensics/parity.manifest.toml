# parity.manifest.toml — cave-forensics
# Charter v2 deep-port close 2026-05-23.
#
# Upstream: cilium/tetragon  https://github.com/cilium/tetragon  pinned v1.7.0
# License: Apache-2.0  (compatible with cave-runtime AGPL-3.0-or-later)
#
# cave-forensics implements the Tetragon TracingPolicy data model + kernel
# event taxonomy + policy filter (matchPIDs/Namespaces/Capabilities/
# Binaries/Args/Actions) + an enforcement state machine, plus a JSON/gRPC
# event exporter and a chain-of-custody case-management layer on top.
#
# Per ADR-090 the cave-runtime runtime stack is Tetragon (syscall) +
# Hubble (network) + K8s audit + Loki (app), all funneled into WORM
# storage. cave-forensics is the consumer that owns case state, evidence
# cataloguing, and severity triage.

[upstream]
org           = "cilium"
repo          = "tetragon"
version       = "v1.7.0"
name          = "Tetragon"
license       = "Apache-2.0"
language      = "Go"
url           = "https://github.com/cilium/tetragon"
source_sha    = "1de2ed8ebea18e56257dc59597aa13bf8f0e471e"

[module]
name          = "cave-forensics"
description   = "Tetragon v1.7.0 deep-port — TracingPolicy + kernel hooks + filter + enforcer + evidence chain-of-custody"
source_root   = "src"

[parity]
# 2026-05-23 wave-4: +4 [[skipped]] entries documenting Falco companion-upstream
# scope_cut. Falco (falcosecurity/falco v0.43.1) is formally recognised here
# but routed to a future cave-falco crate so we don't claim parity that doesn't
# exist on disk. Counts updated accordingly: skipped 12 → 16, total 44 → 48,
# fill_ratio 0.9545 → 0.9583 (no rounding artifacts).
fill_ratio            = 0.9583
honest_ratio          = 0.6818
mapped_count          = 30
partial_count         = 0
skipped_count         = 16
unmapped_count        = 2
total                 = 48
parity_ratio_source   = "manifest"
last_audit            = "2026-05-23"
infra_only            = false

