# parity.manifest.toml — cave-forensics
# Function-based name (ADR-147): "forensics" describes the role
# (runtime forensic evidence + chain-of-custody + case management),
# not the upstream tool. Per ADR-090 the runtime stack is
# Tetragon (syscall) + Hubble (network) + K8s audit + Loki (app),
# all funneled into WORM storage. Cave-forensics is the consumer:
# it owns case state, evidence cataloguing, and severity triage.
#
# Primary upstream: cilium/tetragon  https://github.com/cilium/tetragon
# Secondary: cilium/hubble (flow correlation)  https://github.com/cilium/hubble

[upstream]
org     = "cilium"
repo    = "tetragon"
version = "v1.2.0"

[module]
name        = "cave-forensics"
description = "Runtime forensics — Tetragon-compatible evidence model with case + chain-of-custody management"
source_root = "src"

# ── File mappings ────────────────────────────────────────────────────────────

[[files]]
upstream = "pkg/tracingpolicy/types.go"
local    = "src/models.rs"

[[files]]
upstream = "pkg/observer/observer.go"
local    = "src/engine.rs"

[[files]]
upstream = "pkg/api/eventchecker/severity.go"
local    = "src/engine.rs"

[[files]]
upstream = "pkg/exporter/exporter.go"
local    = "src/routes.rs"

[[files]]
upstream = "pkg/encoder/json_encoder.go"
local    = "src/models.rs"

# ── Function mappings ────────────────────────────────────────────────────────

[[functions]]
upstream_name = "Severity#Compare"
local_name    = "severity_rank"
file          = "src/engine.rs"

[[functions]]
upstream_name = "Observer#Filter"
local_name    = "open_cases"
file          = "src/engine.rs"

[[functions]]
upstream_name = "EventChecker#Highest"
local_name    = "highest_severity"
file          = "src/engine.rs"

[[functions]]
upstream_name = "Exporter#CountEvidence"
local_name    = "evidence_count"
file          = "src/engine.rs"

[[functions]]
upstream_name = "Exporter#ValidateHash"
local_name    = "has_valid_evidence"
file          = "src/engine.rs"

# ── Test mappings ────────────────────────────────────────────────────────────

[[tests]]
upstream_test = "TestSeverityOrdering"
local_test    = "test_severity_rank_ordering"

[[tests]]
upstream_test = "TestObserverFilter"
local_test    = "test_open_cases_filter"

[[tests]]
upstream_test = "TestEventChecker_Highest"
local_test    = "test_highest_severity"

[[tests]]
upstream_test = "TestExporter_EvidenceCount"
local_test    = "test_evidence_count"

[[tests]]
upstream_test = "TestExporter_ValidHash"
local_test    = "test_has_valid_evidence_valid_hash"

[[tests]]
upstream_test = "TestExporter_NoHash"
local_test    = "test_has_valid_evidence_no_hash"

[[tests]]
upstream_test = "TestEvidence_Serde"
local_test    = "test_evidence_item_serde_roundtrip"

[[tests]]
upstream_test = "TestCase_Serde"
local_test    = "test_forensic_case_serde_roundtrip"

[[tests]]
upstream_test = "TestEvidenceType_Serde"
local_test    = "test_evidence_type_all_variants_serde"

[[tests]]
upstream_test = "TestCaseStatus_Transitions"
local_test    = "test_case_status_transitions_serde"

# ── Surface mappings ─────────────────────────────────────────────────────────

[[surfaces]]
kind          = "http"
upstream_path = "/healthz"
local_path    = "/api/forensics/health"

[[surfaces]]
kind          = "http"
upstream_path = "/v1/events"
local_path    = "/api/forensics/cases"

[[surfaces]]
kind          = "http"
upstream_path = "/v1/events/evidence"
local_path    = "/api/forensics/cases/{id}/evidence"
