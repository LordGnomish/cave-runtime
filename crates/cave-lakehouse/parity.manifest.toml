# ── Surface mappings ─────────────────────────────────────────────────────────
# cave-lakehouse is currently a library — no HTTP surface yet. The Iceberg REST
# catalog and DataFusion query endpoint will live behind `/api/lakehouse/*`
# once cave-runtime wires them. The entries below are aspirational and will
# score 0% surface parity until the routes land — that is the honest signal.

[[surfaces]]
kind          = "http"
upstream_path = "/iceberg/v1/catalogs"
local_path    = "/api/lakehouse/catalogs"

[[surfaces]]
kind          = "http"
upstream_path = "/iceberg/v1/{prefix}/namespaces"
local_path    = "/api/lakehouse/namespaces"

[[surfaces]]
kind          = "http"
upstream_path = "/iceberg/v1/{prefix}/namespaces/{namespace}/tables"
local_path    = "/api/lakehouse/tables"

[[surfaces]]
kind          = "http"
upstream_path = "/iceberg/v1/{prefix}/namespaces/{namespace}/tables/{table}/snapshots"
local_path    = "/api/lakehouse/tables/{table}/snapshots"

[[surfaces]]
kind          = "http"
upstream_path = "/datafusion/v1/sql"
local_path    = "/api/lakehouse/query"

[[surfaces]]
kind          = "http"
upstream_path = "/health"
local_path    = "/api/lakehouse/health"

