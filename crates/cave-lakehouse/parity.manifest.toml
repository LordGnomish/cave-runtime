# parity.manifest.toml — cave-lakehouse
# Consolidated per ADR-147. Multi-upstream form per ADR-RUNTIME-UPSTREAM-MIRROR-001.
#
# cave-lakehouse fuses two primary upstreams:
#
#   * **Apache Iceberg (table format)** — schema, partition spec, manifest,
#     snapshot, table_metadata. Code lives under `src/table_format/iceberg/`.
#   * **Apache DataFusion (query engine)** — logical plan, expressions,
#     execution plan, RecordBatch. Code lives under `src/engine/datafusion/`.
#
# Optional / future upstreams (Delta, Hudi, Arrow IO, MinIO substrate) are
# declared so the audit trail is honest about scope, but are not yet mapped.
#
# Function and test names below are bare identifiers that the parity
# calculator can grep against the source tree (it searches for
# `fn <name>`). Identifiers that exist as method paths in upstream are
# mapped to the bare local function name for that reason.

[module]
name        = "cave-lakehouse"
description = "Consolidated lakehouse — Iceberg table format + DataFusion engine"
source_root = "src"
pump_priority = "HIGH"  # qwen-pump B-prime priority gate
target_tests = 30        # qwen-pump B-prime target (#[test] count in tests/qwen_drafted.rs); below this, B-prime fires

[[upstreams]]
org     = "apache"
repo    = "iceberg-rust"
version = "0.4.0"
role    = "primary-table-format"
notes   = "Table format — partition layout, snapshot isolation, time-travel."

[[upstreams]]
org     = "apache"
repo    = "datafusion"
version = "44.0.0"
role    = "primary-engine"
notes   = "Query engine — SQL planner, DataFrame, vectorized executor."

[[upstreams]]
org     = "delta-io"
repo    = "delta-rs"
version = "0.18.0"
role    = "optional-table-format"
notes   = "Optional second table format. Iceberg is the primary; Delta is opt-in for Databricks-aligned workflows."

[[upstreams]]
org     = "apache"
repo    = "hudi-rs"
version = "0.2.0"
role    = "optional-table-format"
notes   = "Optional third table format. Defer concrete impl until Iceberg + Delta are 100% parity."

[[upstreams]]
org     = "apache"
repo    = "arrow-rs"
version = "53.0.0"
role    = "io-substrate"
notes   = "Parquet columnar IO + Arrow in-memory representation."

[[upstreams]]
org     = "minio"
repo    = "minio"
version = "RELEASE.2026-04-22"
role    = "storage-substrate"
notes   = "Object store substrate. Lakehouse calls go through cave-store which mirrors MinIO."

