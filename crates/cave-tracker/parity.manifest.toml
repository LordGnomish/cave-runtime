# parity.manifest.toml — cave-tracker
# Upstream: linear-app/linear  (commercial; mappings reference Linear's
# documented GraphQL schema — Issue, Project, Cycle, WorkflowState, etc.)
#
# Cave-tracker implements an issue-tracking workspace with projects, issues,
# sprints (Linear "Cycles"), boards (kanban + scrum), workflows with
# transitions, custom fields, JQL-style query parser, and roadmap views.

[upstream]
org     = "linear-app"
repo    = "linear"
version = "v1.0.0"

[module]
name        = "cave-tracker"
description = "Issue tracker — Linear-style projects/issues/cycles + JQL parser, sprints, kanban/scrum boards, workflow transitions, roadmap"
source_root = "src"

# ── File mappings ────────────────────────────────────────────────────────────

[[files]]
upstream = "packages/server/src/main.ts"
local    = "src/lib.rs"

[[files]]
upstream = "packages/server/src/db/schema.ts"
local    = "src/models.rs"

[[files]]
upstream = "packages/server/src/store/store.ts"
local    = "src/store.rs"

[[files]]
upstream = "packages/server/src/routes.ts"
local    = "src/routes.rs"

[[files]]
upstream = "packages/server/src/tracker.ts"
local    = "src/tracker.rs"

[[files]]
upstream = "packages/server/src/jql/parser.ts"
local    = "src/jql.rs"

[[files]]
upstream = "packages/server/src/issue/query.ts"
local    = "src/query.rs"

[[files]]
upstream = "packages/server/src/issue/custom_fields.ts"
local    = "src/fields.rs"

[[files]]
upstream = "packages/server/src/board/board.ts"
local    = "src/board.rs"

[[files]]
upstream = "packages/server/src/cycle/sprint.ts"
