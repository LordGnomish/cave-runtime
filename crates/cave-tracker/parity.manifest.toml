# parity.manifest.toml — cave-tracker
# Upstream: makeplane/plane v1.3.1  https://github.com/makeplane/plane
#
# Re-targeted 2026-05-02 from `linear-app/linear` (DEAD: closed-source).
# Plane is the most mature OSS Linear-equivalent; tegonhq/tegon is a
# secondary alternative.

[upstream]
org      = "makeplane"
repo     = "plane"
version = "v1.3.1"
name     = "Plane (Linear-style issue tracking)"
license = "AGPL-3.0"
language= "TypeScript"
url      = "https://github.com/makeplane/plane"

[parity]
ratio        = 0.15        # 4/24 modules mapped after sprint auto-port
last_audit   = "2026-05-21"
infra_only   = false

[portal_ui]
upstream_ui   = "Linear / Plane"
upstream_url = "https://linear.app/"
status        = "partial"
loc           = 133
priority      = "P1"
notes         = "Issue browser"
last_audit    = "2026-05-11"

# ─── Mapped modules ────────────────────────────────────────────────────────────
[[mapped]]
name   = "sprint"
file   = "src/sprint.rs"
status = "complete"
notes  = "Auto-ported v1.3.1: sprint lifecycle, burndown, backlog, status"
last_verified = "2026-05-21"

