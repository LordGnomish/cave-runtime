# parity.manifest.toml — cave-tracker
# Upstream: makeplane/plane v1.3.0  https://github.com/makeplane/plane
#
# Re-targeted 2026-05-02 from `linear-app/linear` (DEAD: closed-source).
# Plane is the most mature OSS Linear-equivalent; tegonhq/tegon is a
# secondary alternative.

[upstream]
org     = "makeplane"
repo    = "plane"
version = "v1.3.0"
name    = "Plane (Linear-style issue tracking)"
license = "AGPL-3.0"
language= "TypeScript"
url     = "https://github.com/makeplane/plane"

[parity]
ratio       = 0.0        # honest: 0.0 means upstream parity NOT yet measured
last_audit  = "2026-05-12"
infra_only  = false
[module]
name        = "cave-tracker"
description = "Issue tracking — Plane (OSS Linear-equivalent) replacement"
source_root = "src"

