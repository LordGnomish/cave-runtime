# parity.manifest.toml — cave-tracker
# Upstream: linear-app/linear  https://github.com/linear-app/linear
# Skeleton generated by cave parity init — fill in the mapping sections

[upstream]
org     = "linear-app"
repo    = "linear"
version = "v1.0.0"

[module]
name        = "cave-tracker"
description = "Issue tracking — Linear replacement"
source_root = "src"

