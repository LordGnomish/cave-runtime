# parity.manifest.toml — cave-crm
# Upstream: twentyhq/twenty  https://github.com/twentyhq/twenty
#
# Cave-crm is a function-based reimplementation of Twenty in Rust (ADR-145).
# Twenty itself is AGPL-3.0; cave-crm inherits the workspace AGPL-3.0-or-later
# license and does not vendor any upstream source — only the data shapes,
# wire contracts, and behaviors documented below.
#
# 2026-05-19 — Charter v2 8-gate close-out (`claude/data-layer-close-2026-05-19`):
#   * Latest stable pin v2.6.0 (was v2.2.0 audit-doc placeholder).
#   * Added `source_sha` pin (twentyhq/twenty @ v2.6.0).
#   * Added `parity_ratio_source = "manifest"`.
#   * Measured fill_ratio against Twenty backend modules + standard-objects
#     enumeration.
#   * Absorbed legacy cave-erp/src/modules/crm.rs into the
#     `convert_lead`/`Lead` MVP surface.

[upstream]
org      = "twentyhq"
repo     = "twenty"
version  = "v2.6.0"
source_sha = "bad1f20012769f015ce4fcd286daf89bea93c080"
name     = "Twenty"
license  = "AGPL-3.0"
language = "TypeScript"
url      = "https://github.com/twentyhq/twenty"

[parity]
# Enumeration scope — Twenty packages/twenty-server backend modules
# (per the v2.6.0 source tree). Browser-UI (React in twenty-front),
# the marketing website (twenty-website), Docker scaffolding
# (twenty-docker), the Zapier integration (twenty-zapier), the e-mail
# template package (twenty-emails / React-Email + MJML), and the
# Chrome extension (twenty-chrome-extension) are classified as
# `skipped (alt-language / browser-UI)` per the cave-streams audit
# convention (browser UI is not a Rust port target).
#
# Counts (mapped + partial + skipped + unmapped) sum to `total`.
# fill_ratio = (mapped + partial + skipped) / total — Charter v2 honest
# enumeration.
mapped_count   = 19
partial_count  = 4
skipped_count  = 14
unmapped_count = 0
total          = 37
fill_ratio     = 1.0000
honest_ratio   = 0.5135
parity_ratio_source = "manifest"
last_audit     = "2026-05-30"
infra_only     = false

[module]
name        = "cave-crm"
description = "Sovereign CRM — Twenty replacement, function-based crate (ADR-145)"
source_root = "src"

