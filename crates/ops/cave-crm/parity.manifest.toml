[[mapped]]
upstream = "packages/twenty-server/src/modules/dashboard/standard-objects/dashboard.workspace-entity.ts"
local    = "src/models/dashboard.rs"
notes    = "Dashboard workspace-entity — title (nullable, lone search field per SEARCH_FIELDS_FOR_DASHBOARD) + pageLayoutId + float position + createdBy/updatedBy ActorMetadata + reorder/rename behaviors. searchVector holds the lowercased title text fed to Postgres to_tsvector (the tsvector itself is a DB GENERATED column). Bundles the shared ActorMetadata composite (packages/twenty-shared/src/types/composite-types/actor.composite-type.ts) — ActorSource (10-variant FieldActorSource: EMAIL/CALENDAR/WORKFLOW/AGENT/API/IMPORT/MANUAL/SYSTEM/WEBHOOK/APPLICATION) + ActorContext{provider?}. New mapped 2026-06-07."

[[mapped]]
upstream = "packages/twenty-server/src/modules/contact-creation-manager/utils/"
local    = "src/contact_creation.rs"
notes    = "contact-creation-manager pure util layer — line-by-line ports of extractDomainFromLink, getDomainNameFromHandle, getCompanyNameFromDomainName, getFirstNameAndLastNameFromHandleAndDisplayName, hasPrimaryEmailChanged, computeChangedAdditionalEmails. The two domain helpers replicate Twenty's psl (Public Suffix List) dependency with a faithful PSL algorithm (exception > longest exact/wildcard > default `*` prevailing rule); single-label TLDs are covered by the default rule, so only multi-label public suffixes (curated IANA ICANN subset) + sample wildcard/exception rules are embedded. All upstream __tests__/*.spec.ts vectors mirrored verbatim. New mapped 2026-06-07. The auto-companies-and-contacts creation job/worker that orchestrates these utils stays scope-cut (messaging-sync ray)."

