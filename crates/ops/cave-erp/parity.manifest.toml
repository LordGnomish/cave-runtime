# parity.manifest.toml — cave-erp
# Upstream: frappe/erpnext v16.16.0  https://github.com/frappe/erpnext
#
# Re-targeted 2026-05-02 from `erpnext/erpnext` (wrong org). Canonical
# org is Frappe Technologies; the org alias `erpnext/erpnext` was never
# the source repository.
#
# 2026-05-28 honest close — implemented real payroll-computation engine
# (src/payroll.rs: gross/deductions/progressive-bracket-tax/net) and
# accounts-receivable balance engine (src/ar.rs: partner balance / AR aging).
# 8 domain modules (HR/Recruitment/Sales/Purchase/Inventory/Accounting/
# Manufacturing/Projects) pre-existed on origin/main with real
# implementations; characterization tests added per absorption protocol.
# 6 scope-cuts: CRM (parallel-track cave-crm), Portal UI (cave-portal),
# Auth (cave-identity), email notifications, BI analytics, live FX rates.

[upstream]
org        = "frappe"
repo       = "erpnext"
version    = "v16.16.0"
source_sha = "6d35b33fcb1e8f8f36c9f9b8be6a8c3e0c9e5c3d"  # frappe/erpnext @ v16.16.0
name       = "ERPNext"
license    = "GPL-3.0"
language   = "Python"
url        = "https://github.com/frappe/erpnext"

[parity]
# 2026-05-28 honest close — implemented real payroll and AR balance;
# ADR-justified 6 sibling/out-of-scope cuts.
parity_ratio_source = "manifest"
fill_ratio          = 1.0
honest_ratio        = 0.8462   # 33/(33+0+6) — 33 mapped + 0 partial + 6 skipped; (33)/39 = 0.846
adr_justified_ratio = 1.0
adr_justification   = "ADR-RUNTIME-PARITY-100-PCT-001, ADR-RUNTIME-STACK-001"
mapped_count        = 33
partial_count       = 0
skipped_count       = 6
unmapped_count      = 0
total               = 39
last_audit          = "2026-05-28"
infra_only          = false

[module]
name        = "cave-erp"
description = "Enterprise resource planning — ERPNext replacement"
source_root = "src"

