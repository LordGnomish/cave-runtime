# cave-runtime-tracker.yaml — reference config for the daily upstream
# drift tracker. Regenerate the upstream list any time with:
#
#     cave-runtime-tracker config > cave-runtime-tracker.yaml
#
# To make a row's drift verdict meaningful, set `pinned:` to the upstream
# tag your cave-* crate currently ports (e.g. `pinned: v1.19.3`). Rows
# left `pinned: null` report as "unknown" — honest, but not actionable.
#
# Override `output_dir`, `github_api` (for GHE), and `request_timeout_secs`
# as needed. Set GITHUB_TOKEN in the environment to lift the 60 req/h
# unauthenticated GitHub rate limit (the registry has ~70 distinct repos).
output_dir: ~/Library/Application Support/cave-runtime/runtime-tracker
github_api: https://api.github.com
request_timeout_secs: 20
emit_latest: true
