# parity.manifest.toml — cave-tracker
# Upstream: makeplane/plane v1.3.0  https://github.com/makeplane/plane
# AGPL-3.0 — same as cave-tracker.
#
# 2026-05-28 honest close:
#   - Implemented real Rust for jql_engine (advanced parser + evaluator),
#     roadmap_engine (timeline/capacity/risk), analytics (sprint velocity +
#     cycle-time + triage), and automation_engine (trigger→condition→action rules).
#   - Characterization-tested 7 pre-existing modules (board, fields, models,
#     query, routes, sprint, workflow).
#   - ADR-justified 6 genuine scope-cuts to sibling crates / out-of-scope.

[upstream]
org        = "makeplane"
repo       = "plane"
version    = "v1.3.0"
name       = "Plane (Linear-style issue tracking)"
license    = "AGPL-3.0"
language   = "TypeScript"
url        = "https://github.com/makeplane/plane"
source_sha = "c9e3d9a3e4f8a5b2c1d7e6f0a9b8c7d6e5f4a3b2"   # v1.3.0 tag commit

[parity]
# 2026-05-28 honest close — implemented real jql_engine + roadmap + analytics + automation;
# ADR-justified 6 sibling/out-of-scope cuts.
parity_ratio_source = "manifest"
fill_ratio          = 1.0
honest_ratio        = 0.75   # (17 mapped + 1 partial) / 24 total
adr_justified_ratio = 1.0
adr_justification   = "ADR-RUNTIME-PARITY-100-PCT-001, ADR-RUNTIME-STACK-001"
mapped_count        = 17
partial_count       = 1
skipped_count       = 6
unmapped_count      = 0
total               = 24
last_audit          = "2026-05-28"
infra_only          = false

# ── Mapped surfaces ───────────────────────────────────────────────────────────

[[mapped]]
area    = "project-crud"
surface = "Project CRUD — create/list/get/update/delete with key, type, lead, members"
file    = "src/routes.rs + src/models.rs"
notes   = "Full CRUD; project board auto-created on project create"

[[mapped]]
area    = "issue-lifecycle"
surface = "Issue lifecycle — CRUD, key generation, assignee, labels, priority, due date"
file    = "src/routes.rs + src/models.rs"
notes   = "POST/GET/PUT/DELETE /api/tracker/issues"

[[mapped]]
area    = "workflow-engine"
surface = "Workflow state machine — statuses, transitions, conditions, post-functions"
file    = "src/workflow.rs"
notes   = "Scrum + Kanban default workflows; can_transition, apply_transition, available_transitions"

[[mapped]]
area    = "sprint-management"
surface = "Sprint management — create, start, complete, backlog, stats"
file    = "src/sprint.rs + src/routes.rs"
notes   = "SprintState (Future/Active/Closed), velocity calc on close"

[[mapped]]
area    = "board-views"
surface = "Board views — Scrum and Kanban column layout, WIP limit enforcement"
file    = "src/board.rs"
notes   = "board_view, check_wip_violations, default_scrum_board, default_kanban_board"

[[mapped]]
area    = "jql-engine"
surface = "JQL-like query engine — project/status/assignee/label/sprint filters, AND/OR/IN/IS EMPTY, ORDER BY"
file    = "src/jql_engine.rs"
notes   = "JqlEngine::parse + JqlEngine::evaluate; adapted from orphan jql.rs to current models"

[[mapped]]
area    = "simple-query"
surface = "Simple filter query — field-level filtering + pagination (simpler API)"
file    = "src/query.rs"
notes   = "parse_jql (basic) + apply_filter; used by GET /api/tracker/issues"

[[mapped]]
area    = "custom-fields"
surface = "Custom field definitions — text, number, select, multi-select, date, user, labels, checkbox"
file    = "src/fields.rs"
notes   = "create_field, validate_field_value; full type coverage"

[[mapped]]
area    = "comments"
surface = "Issue comments CRUD — add/list/update/delete, author, mention extraction"
file    = "src/routes.rs + src/models.rs"
notes   = "POST/GET /issues/{id}/comments, PUT/DELETE /comments/{id}"

[[mapped]]
area    = "attachments"
surface = "Attachments — add/list/delete, filename, content-type, size, url"
file    = "src/routes.rs + src/models.rs"
notes   = "Metadata only; binary storage → cave-artifacts (scope-cut)"

[[mapped]]
area    = "issue-links"
surface = "Issue links — Blocks/IsBlockedBy/RelatesTo/Duplicates/Clones link types"
file    = "src/routes.rs + src/models.rs"
notes   = "LinkType enum; bidirectional listing"

[[mapped]]
area    = "time-tracking"
surface = "Time tracking — log time, get time logs, auto-aggregate time_spent_seconds"
file    = "src/routes.rs + src/models.rs"
notes   = "POST/GET /issues/{id}/timelog"

[[mapped]]
area    = "activity-feed"
surface = "Activity feed — issue/project events, actor, event type, details"
file    = "src/routes.rs + src/models.rs"
notes   = "ActivityEvent stream; GET /api/tracker/activity with project/issue filter"

[[mapped]]
area    = "bulk-operations"
surface = "Bulk operations — bulk-update (assignee/priority/sprint/labels) + bulk-transition"
file    = "src/routes.rs"
notes   = "POST /issues/bulk-update + /issues/bulk-transition"

[[mapped]]
area    = "automation-engine"
surface = "Automation rules engine — trigger→condition→action (assign/transition/add-label/notify)"
file    = "src/automation_engine.rs"
notes   = "evaluate_rules; IssueCreated/StatusChanged/SprintStarted triggers; synchronous"

[[mapped]]
area    = "roadmap-timeline"
surface = "Roadmap & timeline — epic timeline view, capacity plan, risk detection"
file    = "src/roadmap_engine.rs"
notes   = "timeline_view, capacity_plan, risk_report (NoAssignee/DeadlineAtRisk/BlockerChain/OverloadedSprint)"

[[mapped]]
area    = "analytics"
surface = "Sprint velocity + cycle-time stats + heuristic triage"
file    = "src/analytics.rs"
notes   = "sprint_velocity, cycle_time_stats (resolved_at-created_at), triage_issue (keyword heuristic)"

# ── Partial surfaces ──────────────────────────────────────────────────────────

[[partial]]
area    = "notifications"
surface = "In-app notification model — recipient, issue_id, type, read/unread"
file    = "src/routes.rs + src/models.rs"
gap     = "Notification delivery (email/Slack/webhook) is out of cave-tracker's core responsibility; dispatched via cave-alerts (parallel-track)"

# ── Skipped (ADR-justified scope-cuts) ────────────────────────────────────────

[[skipped]]
area    = "web-ui"
surface = "Web/React UI — project board, issue detail, roadmap view, timeline"
reason  = "parallel-track: cave-portal owns all web UI surfaces for the cave-runtime workspace"

[[skipped]]
area    = "notification-delivery"
surface = "Notification delivery — email, Slack, webhook, push"
reason  = "parallel-track: cave-alerts owns all notification delivery surfaces"

[[skipped]]
area    = "file-storage"
surface = "File/attachment binary storage — S3-compatible blob store"
reason  = "parallel-track: cave-artifacts owns binary blob storage for all cave-runtime crates"

[[skipped]]
area    = "auth-sso"
surface = "Authentication/SSO/SAML/OIDC integration — user sessions, workspace auth"
reason  = "parallel-track: cave-identity (SPIRE-based) owns auth for all cave-runtime services"

[[skipped]]
area    = "metrics-export"
surface = "Prometheus/OpenTelemetry metrics scrape endpoint"
reason  = "parallel-track: cave-metrics owns metrics collection/export for all cave-runtime services"

[[skipped]]
area    = "persistence"
surface = "Database persistence layer — PostgreSQL/Redis backing store for issues/sprints"
reason  = "parallel-track: cave-rdbms/cave-docdb own all database persistence; cave-tracker uses in-memory store (dev/test)"

[module]
name        = "cave-tracker"
description = "Issue & project tracking — Plane (OSS Linear-equivalent) port"
source_root = "src"

[portal_ui]
upstream_ui  = "Plane / Linear"
upstream_url = "https://plane.so/"
status       = "partial"
loc          = 133
priority     = "P1"
notes        = "Issue browser; full Plane-equivalent UI owned by cave-portal"
last_audit   = "2026-05-28"
