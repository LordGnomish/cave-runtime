# parity.manifest.toml — cave-cost
# Upstream: opencost/opencost  https://github.com/opencost/opencost  v1.108.0
#
# Audit 2026-05-29: manifest rebuilt from real src/ (10 files, ~1970 LOC).
# The crate implements the core OpenCost FinOps model in idiomatic Rust:
# allocation aggregation, cost calculation, cloud pricing, budget evaluation,
# rightsizing recommendations, showback/chargeback, trend forecasting, and a
# full REST API. Out-of-scope surface (Prometheus scraper, K8s operator, UI,
# Helm, billing API integrations) is reclassified to [[skipped]] per
# ADR-RUNTIME-PARITY-100-PCT-001 §5.

[upstream]
org        = "opencost"
repo       = "opencost"
version    = "v1.108.0"
name       = "OpenCost"
license    = "Apache-2.0"
language   = "Go"
url        = "https://github.com/opencost/opencost"

[parity]
# 2026-05-29 — full manifest built from src/ inspection.
# mapped:  10 OpenCost pkg surface areas fully covered in src/
# partial:  0
# skipped: 10 out-of-scope areas (obs-stack / portal-owned / orchestration /
#             cli-replaced / runtime-bootstrap / plugin-framework / parallel-track)
# unmapped: 0
# fill_ratio = (10 + 0 + 10) / 20 = 1.0
mapped_count        = 10
partial_count       = 0
skipped_count       = 10
unmapped_count      = 0
total               = 20
fill_ratio          = 1.0
honest_ratio        = 0.50   # mapped / total = 10/20; core cost-model covered; infra-layer cuts are genuine out-of-scope
adr_justified_ratio = 1.0
adr_justification   = "ADR-RUNTIME-PARITY-100-PCT-001, ADR-RUNTIME-STACK-001"
parity_ratio_source = "manifest"
last_audit          = "2026-05-29"
infra_only          = false

[module]
name        = "cave-cost"
description = "FinOps cost management — OpenCost replacement (Rust/Axum)"
source_root = "src"

# ─── Mapped ──────────────────────────────────────────────────────────────────

[[mapped]]
# OpenCost pkg/kubecost — core allocation + asset types
# Covers: Allocation, AllocationProperties, Asset, ResourceCost, CostAllocation,
#         CostReport, Budget, BudgetAlert, CostRecommendation, CostTrend,
#         ShowbackReport, ShowbackLineItem, TrendPoint types.
upstream_path = "pkg/kubecost"
local         = "src/models.rs"
upstream_type = "types/models"
notes         = "All core FinOps types: CloudProvider, PricingConfig, ResourceCost, CostAllocation, CostReport, Budget/BudgetAlert, CostRecommendation, CostTrend, ShowbackReport"

[[mapped]]
# OpenCost pkg/costmodel — allocation aggregation logic
# Covers: aggregate_costs (group by namespace/controller/node/pod/label/annotation),
#         idle cost calculation, shared cost proportional distribution.
upstream_path = "pkg/costmodel/allocation"
local         = "src/allocation.rs"
upstream_type = "allocation-aggregation"
notes         = "aggregate_costs, calculate_idle_cost, distribute_shared_costs — maps OpenCost AllocationSet aggregation"

[[mapped]]
# OpenCost pkg/costmodel — resource cost calculation engine
# Covers: per-resource cost formula (CPU×rate×hours + memory×rate×hours +
#         storage×rate/month×hours + network×egress_rate + GPU×rate×hours),
#         CPU efficiency, memory efficiency, overall efficiency.
upstream_path = "pkg/costmodel/costmodel"
local         = "src/calculator.rs"
upstream_type = "cost-calculation"
notes         = "calculate_resource_cost, cpu_efficiency, memory_efficiency, overall_efficiency"

[[mapped]]
# OpenCost pkg/cloud — cloud provider pricing configuration
# Covers: AWS/GCP/Azure/OnPrem default rate tables, PricingConfig factory.
# Maps OpenCost CloudProvider interface and its AWS, GCP, Azure implementations.
upstream_path = "pkg/cloud"
local         = "src/pricing.rs"
upstream_type = "cloud-pricing"
notes         = "default_rates per CloudProvider, default_config_for_provider — AWS/GCP/Azure/OnPrem rate tables"

[[mapped]]
# OpenCost pkg/costmodel — budget tracking and alert evaluation
# Covers: threshold-based alerts (% of limit), forecast-exceeded alerts,
#         trend-based alerts, BudgetStatus lifecycle (Ok/Warning/Exceeded).
upstream_path = "pkg/costmodel/budget"
local         = "src/budget.rs"
upstream_type = "budget-evaluation"
notes         = "evaluate_budget with threshold/forecast/trend alert types matching OpenCost Budget API"

[[mapped]]
# OpenCost pkg/costmodel — cost optimization recommendations
# Covers: rightsizing (CPU+memory under-utilization detection, 20% headroom
#         recommendation), orphaned resource detection (zero utilization),
#         recommendation merging.
upstream_path = "pkg/costmodel/recommendations"
local         = "src/recommendations.rs"
upstream_type = "recommendations"
notes         = "rightsizing_recommendations, orphaned_resource_recommendations, merge_recommendations"

[[mapped]]
# OpenCost pkg/costmodel — cost reporting, showback/chargeback, trend forecasting
# Covers: time-window bounds (last-day/week/month/custom), CostReport builder,
#         ShowbackReport/Chargeback with team label grouping, 7-day linear
#         trend forecast with month-over-month change calculation.
upstream_path = "pkg/costmodel/reporting"
local         = "src/reports.rs"
upstream_type = "reporting"
notes         = "window_bounds, build_report, build_showback_report, generate_trend with 7-day forecast"

[[mapped]]
# OpenCost pkg/api — HTTP REST API surface
# Covers: /allocation, /costQuery, /pricing (CRUD), /reports (CRUD+export),
#         /showback, /budgets (CRUD+evaluate), /alerts, /recommendations,
#         /trends, /health endpoints.
upstream_path = "pkg/api"
local         = "src/routes.rs"
upstream_type = "http-api"
notes         = "Full REST surface: query+allocations, pricing CRUD, reports CRUD+export, showback, budgets CRUD+evaluate, alerts, recommendations, trends, health"

[[mapped]]
# OpenCost — module state management (CostStore, CostState)
# Covers: in-memory store for pricing_configs, cost_reports, budgets,
#         budget_alerts, recommendations, resource_costs; Arc<RwLock<>> for
#         concurrent access; default pricing seed (OnPrem 0.048 CPU/hr).
upstream_path = "pkg/costmodel/store"
local         = "src/lib.rs"
upstream_type = "state-management"
notes         = "CostStore/CostState with Arc<RwLock<>>, default pricing seed, router factory"

[[mapped]]
# OpenCost pkg/costmodel — cost entry summarization and team-level analysis
# Covers: summarize_by_team, is_over_budget, alert_threshold_usd, is_near_budget,
#         top_services_by_cost — team/service-level cost engine.
# Note: engine.rs is present in src/ but not pub-re-exported from lib.rs;
#       it implements team-oriented cost analysis with CostEntry/CostBudget/CostSummary
#       types that complement the K8s-native allocation model.
upstream_path = "pkg/costmodel/engine"
local         = "src/engine.rs"
upstream_type = "cost-engine"
notes         = "summarize_by_team, is_over_budget, is_near_budget, top_services_by_cost — maps OpenCost team/service aggregation"

# ─── Skipped ─────────────────────────────────────────────────────────────────

[[skipped]]
# OpenCost Prometheus metrics scraper (pkg/prom, pkg/metrics)
# Scrapes kube-state-metrics + node-exporter via PromQL for live resource usage.
# SKIP: obs-stack-owned — cave-metrics (Prometheus) + cave-net (kube-state)
#       own the scraping layer. cave-cost receives pre-aggregated usage data.
# ADR-RUNTIME-PARITY-100-PCT-001 §5: obs-stack-owned
upstream_path = "pkg/prom"
reason        = "obs-stack-owned"
adr_section   = "§5 obs-stack-owned"
note          = "2026-05-29: Prometheus scraping owned by cave-metrics; cave-cost consumes aggregated data"

[[skipped]]
# OpenCost TSDB / Victoria Metrics integration (pkg/storage, pkg/tsdb)
# Stores cost time-series in VictoriaMetrics or Thanos long-term storage.
# SKIP: obs-stack-owned — cave-metrics owns the observability storage layer.
# ADR-RUNTIME-PARITY-100-PCT-001 §5: obs-stack-owned
upstream_path = "pkg/storage"
reason        = "obs-stack-owned"
adr_section   = "§5 obs-stack-owned"
note          = "2026-05-29: TSDB/VictoriaMetrics storage owned by cave-metrics observability stack"

[[skipped]]
# OpenCost Kubernetes operator and CRD controllers
# OpenCostSpec CRD, operator reconciler, RBAC ClusterRole, ServiceAccount.
# SKIP: orchestration-owned — cave-controller-manager owns K8s operator patterns.
# ADR-RUNTIME-PARITY-100-PCT-001 §5: sub-component (orchestration-owned)
upstream_path = "pkg/operator"
reason        = "orchestration-owned"
adr_section   = "§5 sub-component"
note          = "2026-05-29: K8s operator/CRD reconciliation owned by cave-controller-manager"

[[skipped]]
# OpenCost UI frontend (opencost-ui React SPA)
# Cost dashboard, allocation explorer, budget management UI pages.
# SKIP: portal-api-owned — cave-portal owns all frontend UI surfaces.
# ADR-RUNTIME-PARITY-100-PCT-001 §5: portal-api-owned
upstream_path = "ui"
reason        = "portal-api-owned"
adr_section   = "§5 portal-api-owned"
note          = "2026-05-29: Cost UI panels owned by cave-portal; REST API surface fully covered in routes.rs"

[[skipped]]
# OpenCost CLI tooling (kubectl cost plugin, opencost CLI)
# `kubectl cost namespace`, `kubectl cost pod`, `kubectl cost predict` sub-commands.
# SKIP: cli-replaced — cavectl cost sub-commands replace the kubectl plugin.
# ADR-RUNTIME-PARITY-100-PCT-001 §5: cli-replaced
upstream_path = "cmd"
reason        = "cli-replaced"
adr_section   = "§5 cli-replaced"
note          = "2026-05-29: cavectl cost {query,allocations,budgets,recommendations,trends} replaces kubectl cost plugin"

[[skipped]]
# OpenCost Helm chart and Kubernetes manifests
# charts/opencost/, kustomize overlays, deployment YAML.
# SKIP: no-helm — cave-runtime deploys as single binary, not Helm.
# ADR-RUNTIME-PARITY-100-PCT-001 §5: architecturally-superseded
upstream_path = "charts"
reason        = "architecturally-superseded"
adr_section   = "§5 architecturally-superseded"
note          = "2026-05-29: Single-binary deployment model (cave-runtime) supersedes Helm chart packaging"

[[skipped]]
# OpenCost environment / config layer (pkg/env)
# ENV var parsing: PROMETHEUS_SERVER_ENDPOINT, CLOUD_PROVIDER_API_KEY,
#                  DATA_RETENTION_DAYS, etc.
# SKIP: runtime-bootstrap-owned — cave-runtime owns config/env loading.
# ADR-RUNTIME-PARITY-100-PCT-001 §5: runtime-bootstrap-owned
upstream_path = "pkg/env"
reason        = "runtime-bootstrap-owned"
adr_section   = "§5 runtime-bootstrap-owned"
note          = "2026-05-29: ENV config loading handled by cave-runtime module bootstrap"

[[skipped]]
# OpenCost cloud billing API integrations (pkg/cloud/aws, gcp, azure billing APIs)
# Direct cloud billing API calls: AWS Cost Explorer, GCP Billing Export,
# Azure Cost Management API for actual invoice reconciliation.
# SKIP: parallel-track — sovereign cloud billing integration is a Phase 2 item
#       per the FinOps roadmap; spot/RI pricing requires cloud credential mgmt.
# ADR-RUNTIME-PARITY-100-PCT-001 §5: parallel-track
upstream_path = "pkg/cloud/billing"
reason        = "parallel-track"
adr_section   = "§5 parallel-track"
note          = "2026-05-29: Cloud billing API (Cost Explorer/GCP Billing/Azure Cost Mgmt) deferred to Phase 2 FinOps roadmap; cave-cost uses configurable rate tables today"

[[skipped]]
# OpenCost audit log and cost history persistence (pkg/storage/db)
# PostgreSQL-backed cost history, TTL-managed allocation snapshots.
# SKIP: persistence-consolidation — cave-docdb/cave-rdbms own persistence.
# ADR-RUNTIME-PARITY-100-PCT-001 §5: persistence-consolidation
upstream_path = "pkg/storage/db"
reason        = "persistence-consolidation"
adr_section   = "§5 persistence-consolidation"
note          = "2026-05-29: Cost history persistence consolidated into cave-rdbms/cave-docdb; cave-cost uses in-memory store + API layer"

[[skipped]]
# OpenCost plugin marketplace and provider extensions (pkg/plugin)
# Third-party cost provider plugins: Datadog, CloudHealth, Apptio, etc.
# SKIP: plugin-framework-only — plugin extension points are a Phase 2 item.
# ADR-RUNTIME-PARITY-100-PCT-001 §5: plugin-framework-only
upstream_path = "pkg/plugin"
reason        = "plugin-framework-only"
adr_section   = "§5 plugin-framework-only"
note          = "2026-05-29: Third-party cost provider plugin framework deferred to Phase 2"

[portal_ui]
upstream_ui  = "OpenCost UI"
upstream_url = "https://www.opencost.io/"
status       = "scaffold"
loc          = 75
priority     = "P2"
notes        = "Cost allocation panels"
last_audit   = "2026-05-11"
