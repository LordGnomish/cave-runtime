adr_category  = "persistence-consolidation"

[[skipped]]
upstream_path = "util/grpc/"
reason        = "gRPC transport layer (argocd-server gRPC API) — cli-replaced: CAVE internal IPC is axum HTTP; grpc transport is not required for single-binary architecture"
adr_category  = "cli-replaced"
