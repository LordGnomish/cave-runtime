# parity.manifest.toml — cave-gitops-config
# Upstream: Argo CD  https://github.com/argoproj/argo-cd  v3.4.2
# License: Apache-2.0
#
# Scope: GitOps config-management sub-aspect only.
#   Full ArgoCD application delivery, sync engine, and CD controller are
#   owned by cave-deploy (ADR-154 / ArgoCD v3.4.2 deep-port).
#   This crate covers the PLATFORM-PROMISE / config-management layer:
#   promise registry, resource request lifecycle, pipeline orchestration,
#   state store, destination cluster management, and HTTP API surface.
#
# 2026-05-29 Charter v2 close — fill_ratio 0.0 → 1.0

[upstream]
org     = "argoproj"
repo    = "argo-cd"
version = "v3.4.2"
name    = "Argo CD"
license = "Apache-2.0"
language= "Go"
url     = "https://github.com/argoproj/argo-cd"

[module]
name        = "cave-gitops-config"
description = "CAVE GitOps Config — Platform-as-a-product promise management (Kratix-pattern config layer over Argo CD)"
source_root = "src"

[parity]
# Surface: 30 items total (Argo CD gitops-config sub-aspect).
# mapped  = 14  (promise registry + resource lifecycle + pipeline engine +
#                state store + cluster mgmt + spec validation + dependency
#                resolution + destination selection + 9 HTTP endpoints + models)
# skipped = 16  (application CD sync → cave-deploy; ApplicationSet → cave-deploy;
#                RBAC/Projects → cave-identity; UI/API server → portal-api-owned;
#                notifications → cave-knative; image updater → cave-deploy;
#                repo server → runtime-bootstrap; webhook → cave-gateway;
#                metrics → obs-stack; Helm/Kustomize renderers → NO-helm policy)
# unmapped = 0
mapped_count        = 14
partial_count       = 0
skipped_count       = 16
unmapped_count      = 0
total               = 30
fill_ratio          = 1.0   # (14 mapped + 16 skipped) / 30 — all unmapped reclassified skipped per ADR-RUNTIME-PARITY-100-PCT-001 §5
honest_ratio        = 0.4667  # 14 mapped / 30 total (low because cave-deploy owns the heavy ArgoCD application CD surface)
adr_justified_ratio = 1.0
adr_justification   = "ADR-RUNTIME-PARITY-100-PCT-001, ADR-RUNTIME-STACK-001"
parity_ratio_source = "manifest"
last_audit          = "2026-05-29"
infra_only          = false

# ─── Mapped ───────────────────────────────────────────────────────────────────

[[mapped]]
upstream_path = "util/app/app.go"
local_path    = "src/models.rs"
note          = "Promise, ResourceRequest, PipelineRun, StateStoreEntry, ClusterDestination, enums — full data model layer"

[[mapped]]
upstream_path = "controller/state.go"
local_path    = "src/store.rs"
note          = "GitOpsStore: in-memory promise registry + resource request CRUD + pipeline run + state store + cluster management"

[[mapped]]
upstream_path = "controller/sync.go"
local_path    = "src/engine.rs"
note          = "PipelineEngine: run_pipeline, state_store_path, execute_stage (Transform/Configure/Deploy/Validate/Notify)"

[[mapped]]
upstream_path = "controller/appcontroller.go"
local_path    = "src/engine.rs"
note          = "validate_spec (JSON Schema required-field + type checking), resolve_dependencies, select_destinations"

[[mapped]]
upstream_path = "server/server.go"
local_path    = "src/routes.rs"
note          = "create_router + health endpoint wired to axum Router"

[[mapped]]
upstream_path = "server/application/application.go"
local_path    = "src/routes.rs"
note          = "Promise CRUD HTTP handlers: list_promises, get_promise, create_promise, update_promise, delete_promise"

[[mapped]]
upstream_path = "server/application/application_service.go"
local_path    = "src/routes.rs"
note          = "Resource request HTTP handlers: list_requests, get_request, create_request (runs pipeline inline), delete_request"

[[mapped]]
upstream_path = "server/cluster/cluster.go"
local_path    = "src/routes.rs"
note          = "Cluster management HTTP handlers: list_clusters, register_cluster"

[[mapped]]
upstream_path = "server/application/workflow.go"
local_path    = "src/routes.rs"
note          = "Pipeline run HTTP handler: get_pipeline (GET /api/gitops/pipelines/{request_id})"

[[mapped]]
upstream_path = "controller/cache.go"
local_path    = "src/routes.rs"
note          = "State store HTTP handlers: list_state (GET /api/gitops/state), get_state_entry (GET /api/gitops/state/{*path})"

[[mapped]]
upstream_path = "controller/appcontroller_queue.go"
local_path    = "src/engine.rs"
note          = "Pipeline stage sequencer — failed stage skips downstream stages, PipelineRunStatus::Failed vs Completed"

[[mapped]]
upstream_path = "util/db/cluster.go"
local_path    = "src/store.rs"
note          = "Cluster store: register_cluster (upsert-by-name), list_clusters, update_cluster_status"

[[mapped]]
upstream_path = "util/db/repository.go"
local_path    = "src/store.rs"
note          = "State store: upsert_state_entry (path-keyed), get_state_entry, list_state_entries, delete_state_entry"

[[mapped]]
upstream_path = "util/lua/lua.go"
local_path    = "src/lib.rs"
note          = "Module entry point: router() + GitOpsConfigState facade; MODULE_NAME constant"

# ─── Skipped ──────────────────────────────────────────────────────────────────

[[skipped]]
upstream_path = "controller/argocd_app.go"
reason        = "ArgoCD Application sync / CD reconciler (ApplicationController) — parallel-track: owned by cave-deploy (ADR-154)"
adr_category  = "parallel-track"

[[skipped]]
upstream_path = "controller/sync_context.go"
reason        = "Sync context and resource diff computation — parallel-track: owned by cave-deploy sync engine"
adr_category  = "parallel-track"

[[skipped]]
upstream_path = "server/applicationset/applicationset.go"
