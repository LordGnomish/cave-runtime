[[skipped]]
upstream_path = "cmd/argocd/commands/"
reason        = "argocd CLI commands — cli-replaced: CAVE surfaces ops via cavectl (cave-cli)"
adr_category  = "cli-replaced"

[[skipped]]
upstream_path = "util/notification/"
reason        = "Argo CD Notifications — architecturally-superseded: cave-knative owns event/notification routing (ADR cave-knative)"
adr_category  = "architecturally-superseded"

[[skipped]]
upstream_path = "controller/imageupdater.go"
reason        = "Image Updater integration — sub-component: owned by cave-deploy ADR-154 (Argo CD Image Updater v0.16.0)"
adr_category  = "sub-component"

[[skipped]]
upstream_path = "reposerver/"
reason        = "Repo Server (Git/Helm/Kustomize fetch & render) — runtime-bootstrap-owned: CAVE uses declarative config, no dynamic repo-server required"
