[package]
name = "cave-portal"
description = "Developer portal — compatible with Backstage"
version.workspace = true
edition.workspace = true
license.workspace = true

[dependencies]
cave-kernel = { path = "../../core/cave-kernel" }
cave-auth = { path = "../../security/cave-auth" }
cave-db = { path = "../../data/cave-db" }
cave-upstream-watchd = { path = "../cave-upstream-watchd" }
cave-upstream = { path = "../cave-upstream" }
cave-keda = { path = "../../orchestration/cave-keda" }
axum = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
serde_yaml = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }
uuid = { workspace = true }
chrono = { workspace = true }
thiserror = { workspace = true }
async-trait = { workspace = true }
# Real-runtime wiring (Portal admin pages → cave-apiserver over HTTPS)
reqwest = { workspace = true }
base64 = { workspace = true }
futures = { workspace = true }
async-stream = "0.3"

[dev-dependencies]
proptest = "1"
tempfile = "3"
tokio = { workspace = true, features = ["full"] }
tower = { workspace = true }
httpmock = "0.7"

[features]
live-integration = []
