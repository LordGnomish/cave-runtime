# parity.manifest.toml — cave-chat
# Upstream: danny-avila/LibreChat  https://github.com/danny-avila/LibreChat
# 2026-05-28 honest close — implemented real channel/message/presence/search/stats;
# 2026-05-30 strict-TDD: export-import skip -> mapped (conversation_export + conversation_tree);
# ADR-justified 10 sibling/out-of-scope cuts (UI, SSO, LLM routing, attachments, etc.)

[upstream]
org        = "danny-avila"
repo       = "LibreChat"
version    = "v0.7.6"
name       = "LibreChat"
license    = "MIT"
language   = "TypeScript"
url        = "https://github.com/danny-avila/LibreChat"
source_sha = "v0.7.6"   # LibreChat v0.7.6 release tag (latest stable as of 2026-05-28)

[parity]
# 2026-05-28 honest close — implemented real channel/message/presence/search/stats;
# ADR-justified 10 sibling/out-of-scope cuts
parity_ratio_source = "manifest"
fill_ratio          = 1.0
honest_ratio        = 0.45   # 9 mapped / 20 total
adr_justified_ratio = 1.0
adr_justification   = "ADR-RUNTIME-PARITY-100-PCT-001, ADR-RUNTIME-STACK-001"
mapped_count        = 9
partial_count       = 1
skipped_count       = 10
unmapped_count      = 0
total               = 20
last_audit          = "2026-05-30"
infra_only          = false

# ── Mapped surfaces ───────────────────────────────────────────────────────────

[[mapped]]
area    = "channel-management"
what    = "Create, list, get, archive channels; add/remove members"
local   = "src/store.rs + src/routes.rs"
notes   = "In-memory store with RwLock, full CRUD, member management"

[[mapped]]
area    = "message-crud"
what    = "Create, get, delete messages per channel"
local   = "src/store.rs + src/routes.rs"
notes   = "POST/GET/DELETE /api/chat/channels/{id}/messages and /api/chat/messages/{id}"

[[mapped]]
area    = "thread-model"
what    = "Thread root + reply registration, get_thread ordered oldest-first"
local   = "src/store.rs"
notes   = "thread_root_id on Message; root tracks thread_replies Vec<Uuid>"

[[mapped]]
area    = "message-reactions"
what    = "Add/remove per-user emoji reactions on messages"
local   = "src/store.rs + src/engine.rs + src/routes.rs"
notes   = "Idempotent per (user, emoji) pair; empty groups cleaned up on remove"

[[mapped]]
area    = "message-search"
what    = "Full-text case-insensitive substring search, optionally scoped to channel"
local   = "src/store.rs"
notes   = "search_messages(&query, channel_id) — O(n) scan over in-memory store"

[[mapped]]
area    = "user-presence"
what    = "Online/Away/DoNotDisturb/Offline status upsert and lookup"
local   = "src/store.rs + src/routes.rs"
notes   = "PUT/GET /api/chat/presence/{user_id}"

[[mapped]]
area    = "chat-statistics"
what    = "Aggregate stats: total channels, messages, active users, messages today"
local   = "src/store.rs"
notes   = "compute_stats() derived from in-memory state; GET /api/chat/stats"

[[mapped]]
area    = "http-api"
what    = "REST route handlers for all chat surfaces; health endpoint"
local   = "src/routes.rs"
notes   = "axum 0.8 Router; 17 endpoints; shared Arc<AppState> with ChatStore"

# ── Partial surfaces ──────────────────────────────────────────────────────────

[[partial]]
area    = "message-pagination"
what    = "Cursor/offset-based pagination for message history"
local   = "src/store.rs get_channel_messages()"
gap     = "Only 'before' timestamp filter is implemented; cursor tokens (opaque base64 page tokens) not implemented"
notes   = "Limit + before-cursor is the core; full cursor-token encoding is Phase 2"

# ── Skipped surfaces (ADR-justified scope-cuts) ───────────────────────────────

[[skipped]]
area   = "react-ui"
what   = "LibreChat TypeScript/React frontend (chat-ui package)"
reason = "parallel-track cave-portal — React/TypeScript UI lives in cave-portal-web"

[[skipped]]
area   = "sso-auth"
what   = "LDAP, Keycloak, OpenID Connect, local auth integration"
reason = "parallel-track cave-identity — SPIRE/Keycloak auth is cave-identity's responsibility"

[[skipped]]
area   = "ai-conversation-presets"
what   = "Model selection, system prompts, conversation presets, AI config"
reason = "parallel-track cave-llm-gateway — multi-provider LLM routing owned by cave-llm-gateway"

[[skipped]]
area   = "file-attachments"
what   = "File upload, preview, storage (S3/GCS/Azure) for chat messages"
reason = "out-of-scope-subsystem — object storage belongs to cave-artifacts; no blob store in this crate"

[[skipped]]
area   = "email-notifications"
what   = "Email delivery on @mentions, DMs, digest"
reason = "out-of-launch-scope — cave-noti does not exist; notification delivery is a separate Phase 2 concern"

[[skipped]]
area   = "plugin-system"
what   = "LibreChat plugin marketplace, tool execution, function calling"
reason = "out-of-launch-scope — plugin runtime is a standalone Phase 2 surface; no plugin-framework dep"

[[skipped]]
area   = "multi-model-router"
what   = "Proxy chat requests to OpenAI/Anthropic/Ollama/Azure endpoints"
reason = "parallel-track cave-llm-gateway — all multi-provider LLM proxy logic lives in cave-llm-gateway"

[[skipped]]
area   = "speech-to-text"
what   = "Whisper audio transcription, voice-to-text input"
reason = "out-of-scope-subsystem — audio processing belongs to cave-local-llm or a dedicated ASR crate"

[[skipped]]
area   = "websocket-realtime"
what   = "SSE/WebSocket push for live message delivery"
reason = "out-of-scope-subsystem — no ws/sse dep in crate; real-time transport is a cross-cutting runtime concern"

[[skipped]]
area   = "openid-connect"
what   = "OIDC login flow, JWT validation, session management"
reason = "parallel-track cave-identity — OIDC/JWT sessions are owned by cave-identity"

[[mapped]]
area    = "export-import"
what    = "Conversation export to text/markdown + fork/import tree-path reconstruction"
local   = "src/conversation_export.rs + src/conversation_tree.rs"
notes   = "2026-05-30 strict-TDD line-port of LibreChat useExportConversation.ts (export_markdown/export_text/format_message_text) and import/fork.js pure tree algorithms (get_all_messages_up_to_parent INCLUDE_BRANCHES, get_messages_up_to_target_level TARGET_LEVEL, split_at_target_level). DB-bound getConvo/getMessages/saveBatch + browser download/CSV/screenshot left to persistence/UI layers."

[module]
name        = "cave-chat"
description = "Team chat — LibreChat replacement"
source_root = "src"
rs_files    = 8
rs_loc      = 1362

[portal_ui]
upstream_ui  = "LibreChat"
upstream_url = "https://www.librechat.ai/"
status       = "parallel-track"
loc          = 0
priority     = "P2"
notes        = "Chat client UI is parallel-track cave-portal (cave-portal-web)"
last_audit   = "2026-05-28"
