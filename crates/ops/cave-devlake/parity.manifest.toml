# parity.manifest.toml — cave-devlake
# Upstream: apache/incubator-devlake  https://github.com/apache/incubator-devlake
# 2026-05-28 honest close — implemented DORA engine, store, full REST API, rich models;
# ADR-justified 8 sibling/out-of-scope cuts.

[upstream]
org        = "apache"
repo       = "incubator-devlake"
version    = "v0.21.1"
source_sha = "a3e2b1f9c4d87e6a5b32f1d09c6e4a7b8f2d3c1a"
name       = "Apache DevLake"
license    = "Apache-2.0"
language   = "Go"
url        = "https://github.com/apache/incubator-devlake"

[parity]
# 2026-05-28 honest close — implemented real DORA engine + store + routes + rich models;
# ADR-justified 8 surface cuts to sibling crates and out-of-launch-scope vendor adapters
parity_ratio_source = "manifest"
fill_ratio          = 1.0
honest_ratio        = 0.6875   # (9 mapped + 2 partial) / 16 total
adr_justified_ratio = 1.0
adr_justification   = "ADR-RUNTIME-PARITY-100-PCT-001, ADR-RUNTIME-STACK-001"
mapped_count        = 9
partial_count       = 2
skipped_count       = 5
unmapped_count      = 0
total               = 16
last_audit          = "2026-05-28"
infra_only          = false

# ── Mapped surfaces ──────────────────────────────────────────────────────────

[[mapped]]
area    = "DORA metrics engine"
notes   = "Deployment frequency, lead time, CFR, MTTR with Elite/High/Medium/Low ratings per DevLake/DORA spec; overall_dora_rating minimum-of-four rule"

[[mapped]]
area    = "Deployment record model and store"
notes   = "Deployment struct with environment, status, lead_time_secs, rollback flag; insert/get/list/recent/period-filter CRUD"

[[mapped]]
area    = "Pipeline run model and store"
notes   = "Pipeline struct with stages (build/test/deploy), status tracking, update_pipeline_status CRUD"

[[mapped]]
area    = "Incident model and store"
notes   = "Incident struct with severity, services, linked deployment; insert/resolve/list CRUD; mttr_secs() helper"

[[mapped]]
area    = "Pull request model and store"
notes   = "PullRequest struct with cycle_time_secs, review_count, additions/deletions; prs_by_state filter; compute_cycle_time helper"

[[mapped]]
area    = "Commit model and store"
notes   = "Commit struct with author, message, additions/deletions, files_changed; insert/list/recent CRUD"

[[mapped]]
area    = "Issue model and store"
notes   = "Issue struct with IssueType (Bug/Story/Task/Epic), IssueStatus, story_points; issues_by_status filter; resolution_time_secs helper"

[[mapped]]
area    = "Sprint model and store"
notes   = "Sprint struct with SprintState (Future/Active/Closed), planned/completed points; velocity_pct helper; list/get CRUD"

[[mapped]]
area    = "REST API routes"
notes   = "15 GET endpoints: /health, /dora, /deployments, /deployments/{id}, /pipelines, /pipelines/{id}, /incidents, /incidents/{id}, /prs, /prs/{id}, /commits, /issues, /issues/{id}, /sprints, /sprints/{id}"

[[partial]]
area    = "Sprint velocity analytics"
notes   = "sprint_velocity_avg implemented; per-sprint burndown chart and predictive velocity deferred (out-of-launch-scope)"

[[partial]]
area    = "PR cycle time analytics"
notes   = "pr_cycle_time_avg_secs implemented; per-reviewer wait time breakdown deferred (out-of-launch-scope)"

# ── Skipped surfaces ──────────────────────────────────────────────────────────

[[skipped]]
area    = "React/web dashboard UI"
reason  = "Engineering metrics dashboard UI → parallel-track cave-portal"
category = "parallel-track"

[[skipped]]
area    = "Prometheus/Grafana metrics export"
reason  = "Metric scrape endpoint and Grafana dashboards → parallel-track cave-metrics"
category = "parallel-track"

[[skipped]]
area    = "Alert rules and notification delivery"
reason  = "DORA regression alerts and PagerDuty/Slack delivery → parallel-track cave-alerts"
category = "parallel-track"

[[skipped]]
area    = "GitHub/GitLab/Jenkins CI source connectors"
reason  = "Vendor-specific REST/webhook adapters (GitHub Actions, GitLab CI, Jenkins) → out-of-launch-scope vendor-adapter"
category = "vendor-adapter"

[[skipped]]
area    = "Jira/Linear/Shortcut issue tracker connectors"
reason  = "Vendor-specific REST adapters for project-management tools → out-of-launch-scope vendor-adapter"
category = "vendor-adapter"

[module]
name        = "cave-devlake"
description = "Dev metrics — Apache DevLake replacement (DORA metrics, pipelines, deployments, incidents, PRs, commits, issues, sprints)"
source_root = "src"

[portal_ui]
upstream_ui  = "Apache DevLake UI"
upstream_url = "https://devlake.apache.org/"
status       = "parallel-track cave-portal"
loc          = 75
priority     = "P2"
notes        = "Engineering metrics dashboard → parallel-track cave-portal"
last_audit   = "2026-05-28"
