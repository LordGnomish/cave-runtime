# parity.manifest.toml — cave-infra
# Upstream: hashicorp/terraform  https://github.com/hashicorp/terraform  pinned v1.12.1
#
# Cave-infra implements infrastructure-as-code with intent → plan → apply
# pipeline, drift detection, dependency-graph topological order, rollback,
# multi-provider resource registry, MCP server, NLP-driven intent parsing,
# and template/cookbook expansion.

[upstream]
org        = "hashicorp"
repo       = "terraform"
version    = "v1.12.1"
source_sha = "1af16f86d5c9a3ecac25cfe30d0a7c10b95cfb5e"
name       = "HashiCorp Terraform"
license    = "BSL-1.1"
language   = "Go"
url        = "https://github.com/hashicorp/terraform"

[parity]
# 2026-05-28 honest close — 19 surfaces mapped; 5 skipped (HCL-parser + remote-backends + cloud-sdk + portal + registry)
parity_ratio_source = "manifest"
fill_ratio          = 1.0
honest_ratio        = 0.7917
adr_justified_ratio = 1.0
adr_justification   = "ADR-RUNTIME-PARITY-100-PCT-001, ADR-RUNTIME-STACK-001"
mapped_count        = 19
partial_count       = 0
skipped_count       = 5
unmapped_count      = 0
total               = 24
last_audit          = "2026-05-28"
infra_only          = false

[[mapped]]
name    = "resource-dependency-graph"
file    = "src/graph.rs"
notes   = "Topological sort via petgraph; apply_order + destroy_order + validate_dependencies"

[[mapped]]
name    = "change-plan-generation"
file    = "src/plan.rs"
notes   = "Diff desired vs actual state; generate_plan + PlanOp + PlannedChange + Plan"

[[mapped]]
name    = "plan-apply-executor"
file    = "src/executor.rs"
notes   = "execute_plan (step runner), rollback, dry_run, stream_progress"

[[mapped]]
name    = "drift-detection"
file    = "src/drift.rs"
notes   = "detect_drift, mark_drifted, reconcile with DriftReport"

[[mapped]]
name    = "resource-state-store"
file    = "src/resource.rs"
notes   = "ResourceStore, ResourceState, ResourceSpec, versioned history, DriftItem"

[[mapped]]
name    = "rollback-mechanism"
file    = "src/rollback.rs"
notes   = "rollback_resource, rollback_batch with history restore"

[[mapped]]
name    = "provider-abstraction"
file    = "src/provider.rs"
notes   = "Provider trait, BareMetalProvider, NoopProvider, ProviderRegistry"

[[mapped]]
name    = "mock-provider-implementations"
file    = "src/providers.rs"
notes   = "ResourceProvider trait, MockProvider (normal + failing), ResourceType enum"

[[mapped]]
name    = "infrastructure-templates"
file    = "src/templates.rs"
notes   = "render, builtin_templates (web-app, postgres, k8s), parameter substitution"

[[mapped]]
name    = "natural-language-parser"
file    = "src/nlp.rs"
notes   = "parse_intent → InfraIntent; heuristic NL → resource kind extraction"

[[mapped]]
name    = "mcp-server-protocol"
file    = "src/mcp.rs"
notes   = "JSON-RPC 2.0 McpServer; all_tools, handle method dispatch"

[[mapped]]
name    = "mcp-provider-bridge"
file    = "src/mcp_bridge.rs"
notes   = "McpRegistry: register, execute_tool, health_check, discover_capabilities, batch_execute"

[[mapped]]
name    = "planner-cost-risk-explain"
file    = "src/planner.rs"
notes   = "generate_plan, optimize_plan, estimate_cost, assess_risk, explain_plan"

[[mapped]]
name    = "approval-workflow"
file    = "src/approval.rs"
notes   = "ApprovalWorkflow: submit, approve, reject, check_approval, pending_for_tenant"

[[mapped]]
name    = "domain-models"
file    = "src/models.rs"
notes   = "InfraResource, InfraIntent, InfraState, ExecutionPlan, PlanStep, McpProvider, DriftReport, PolicyCheck, CostEstimate"

[[mapped]]
name    = "intent-engine"
file    = "src/intent.rs"
notes   = "parse_intent, resolve_dependencies, validate_intent, diff_state"

[[mapped]]
name    = "state-persistence-store"
file    = "src/state.rs"
notes   = "InfraStateStore: lock_state, unlock_state, detect_drift, import_resource, snapshot, state_history"

[[mapped]]
name    = "http-routes"
file    = "src/routes.rs"
notes   = "All HTTP handlers: health, resources, plan, apply, drift, reconcile, rollback, templates, providers, natural, MCP endpoint"

[[mapped]]
name    = "error-types"
file    = "src/error.rs"
notes   = "InfraError enum covering all failure modes; InfraResult alias"

[[skipped]]
name   = "hcl-config-language-parser"
reason = "Full HCL grammar (Terraform's native config format) is a compiler-level effort; cave-infra uses YAML+JSON for intent input — out-of-launch-scope"

[[skipped]]
name   = "remote-state-backends"
reason = "S3/GCS/Azure Blob/Consul/HTTP backends for tfstate — out-of-launch-scope (Phase 2; each requires heavyweight cloud SDK)"

[[skipped]]
name   = "cloud-provider-plugin-sdk"
reason = "Real AWS/GCP/Azure/Hetzner REST client providers — out-of-launch-scope (require provider-specific API SDKs; MCP bridge covers the integration layer)"

[[skipped]]
name   = "portal-web-ui"
reason = "Terraform Cloud-style web dashboard — parallel-track cave-portal (exists at crates/ops/cave-portal)"

[[skipped]]
name   = "module-registry-integration"
reason = "Publish/consume Terraform modules from registry.terraform.io — parallel-track cave-registry (exists at crates/registry/cave-registry)"

[module]
name        = "cave-infra"
description = "Infrastructure as code — Terraform parity (intent/plan/apply, drift, graph, rollback, providers, MCP, templates)"
source_root = "src"

