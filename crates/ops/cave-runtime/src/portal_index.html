<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>CAVE Platform</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--bg-sidebar:#161b22;--bg-card:#21262d;--bg-hover:#30363d;
  --border:#30363d;--text:#e6edf3;--text-muted:#8b949e;
  --accent:#58a6ff;--accent-dim:#1f6feb;
  --green:#3fb950;--yellow:#d29922;--red:#f85149;
  --radius:6px;--sidebar-w:240px;--transition:0.18s ease;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;line-height:1.5}
#app{display:flex;height:100vh;overflow:hidden}

/* ── Sidebar ── */
#sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);background:var(--bg-sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;transition:transform var(--transition);z-index:100}
.sidebar-header{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0}
.logo{width:28px;height:28px;background:linear-gradient(135deg,var(--accent-dim),var(--accent));border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px;color:#fff;flex-shrink:0;letter-spacing:-0.5px}
.logo-text{font-weight:700;font-size:15px}
.sidebar-search{padding:9px 12px;border-bottom:1px solid var(--border);flex-shrink:0}
.search-btn{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:6px 10px;color:var(--text-muted);font-size:12px;cursor:pointer;display:flex;align-items:center;gap:8px;transition:border-color var(--transition),color var(--transition)}
.search-btn:hover{border-color:var(--accent);color:var(--text)}
.search-btn-kbd{margin-left:auto;font-size:10px;background:var(--bg-card);padding:2px 5px;border-radius:3px;border:1px solid var(--border)}
.sidebar-nav{flex:1;overflow-y:auto;padding:6px 0}
.sidebar-nav::-webkit-scrollbar{width:3px}
.sidebar-nav::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.nav-item{display:flex;align-items:center;gap:8px;padding:7px 16px;color:var(--text-muted);cursor:pointer;transition:background var(--transition),color var(--transition);user-select:none}
.nav-item:hover{background:var(--bg-hover);color:var(--text)}
.nav-item.active{background:rgba(31,111,235,0.25);color:var(--accent);font-weight:500}
.nav-item .sdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.nav-sec{display:flex;align-items:center;gap:6px;padding:7px 16px 4px;color:var(--text-muted);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.6px;cursor:pointer;user-select:none;margin-top:2px}
.nav-sec:hover{color:var(--text)}
.nav-sec .chev{margin-left:auto;font-size:9px;transition:transform var(--transition);display:inline-block}
.nav-sec.closed .chev{transform:rotate(-90deg)}
.nav-sub{overflow:hidden}
.nav-sub .nav-item{padding-left:30px;font-size:13px}
.sidebar-footer{padding:8px 16px;border-top:1px solid var(--border);font-size:11px;color:var(--text-muted);flex-shrink:0}

/* ── Main ── */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
#topbar{height:50px;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:12px;flex-shrink:0;background:var(--bg)}
#hamburger{display:none;background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:18px;padding:4px;line-height:1}
#breadcrumb{color:var(--text-muted);font-size:13px;display:flex;align-items:center;gap:6px;min-width:0}
#breadcrumb .bc-active{color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.hbadge{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-muted);background:var(--bg-card);border:1px solid var(--border);border-radius:20px;padding:3px 10px;white-space:nowrap}
.btn-topbar{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:var(--radius);font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--bg-card);color:var(--text);font-family:inherit;transition:all var(--transition)}
.btn-topbar:hover{border-color:var(--accent);color:var(--accent)}
#content{flex:1;overflow-y:auto;padding:24px}
#content::-webkit-scrollbar{width:5px}
#content::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* ── Cards & Stats ── */
.page-hdr{margin-bottom:24px}
.page-title{font-size:22px;font-weight:700;margin-bottom:4px}
.page-sub{color:var(--text-muted);font-size:13px}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:28px}
.stat-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:14px}
.stat-lbl{font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:5px}
.stat-val{font-size:24px;font-weight:700;line-height:1}
.stat-sub{font-size:11px;color:var(--text-muted);margin-top:3px}
.c-green{color:var(--green)}.c-yellow{color:var(--yellow)}.c-red{color:var(--red)}.c-accent{color:var(--accent)}
.sec-title{font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.sec-title::after{content:'';flex:1;height:1px;background:var(--border)}
.module-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:8px;margin-bottom:28px}
.mcard{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:13px;cursor:pointer;transition:border-color var(--transition),box-shadow var(--transition),transform var(--transition)}
.mcard:hover{border-color:var(--accent);box-shadow:0 4px 14px rgba(0,0,0,0.4);transform:translateY(-1px)}
.mcard-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px}
.mcard-name{font-weight:600;font-size:13px}
.sdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.mcard-desc{font-size:11px;color:var(--text-muted);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.mcard-foot{margin-top:9px;display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.pbadge{font-size:10px;padding:2px 6px;border-radius:10px;font-weight:600;white-space:nowrap}
.p1{background:#1f6feb22;color:var(--accent);border:1px solid #1f6feb55}
.p2{background:#3fb95022;color:var(--green);border:1px solid #3fb95055}
.p3{background:#d2992222;color:var(--yellow);border:1px solid #d2992255}
.p4{background:#f8514922;color:var(--red);border:1px solid #f8514955}
.utag{font-size:10px;color:var(--text-muted);background:var(--bg);border:1px solid var(--border);padding:2px 6px;border-radius:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:110px}

/* ── Status dots ── */
.dg{background:var(--green);box-shadow:0 0 5px var(--green)}
.dy{background:var(--yellow);box-shadow:0 0 5px var(--yellow)}
.dr{background:var(--red);box-shadow:0 0 5px var(--red)}
.dm{background:var(--text-muted)}

/* ── Module detail ── */
.mod-hdr{display:flex;align-items:flex-start;gap:16px;margin-bottom:24px;flex-wrap:wrap}
.mod-icon{width:50px;height:50px;border-radius:10px;background:linear-gradient(135deg,var(--accent-dim),var(--accent));display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.mod-title{font-size:22px;font-weight:700;margin-bottom:6px}
.mod-meta{display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.spill{display:inline-flex;align-items:center;gap:5px;font-size:12px;padding:3px 10px;border-radius:20px;font-weight:600}
.sp-healthy{background:#3fb95018;color:var(--green);border:1px solid #3fb95044}
.sp-warning{background:#d2992218;color:var(--yellow);border:1px solid #d2992244}
.sp-error{background:#f8514918;color:var(--red);border:1px solid #f8514944}
.sp-pending{background:var(--bg-hover);color:var(--text-muted);border:1px solid var(--border)}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:24px}
.dcrd{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:16px}
.dcrd-title{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-muted);margin-bottom:12px}
.feat-list{list-style:none;display:flex;flex-direction:column;gap:7px}
.feat-list li{display:flex;align-items:center;gap:8px;font-size:13px}
.feat-list li::before{content:'✓';color:var(--green);font-weight:700;font-size:11px;flex-shrink:0}
.qactions{display:flex;flex-wrap:wrap;gap:7px}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;border-radius:var(--radius);font-size:13px;font-weight:500;cursor:pointer;border:1px solid transparent;transition:all var(--transition);background:none;font-family:inherit}
.btn-p{background:var(--accent-dim);color:#fff;border-color:var(--accent-dim)}
.btn-p:hover{background:var(--accent)}
.btn-s{background:var(--bg-card);color:var(--text);border-color:var(--border)}
.btn-s:hover{border-color:var(--accent);color:var(--accent)}
.cfg-ph{background:var(--bg);border:1px dashed var(--border);border-radius:var(--radius);padding:18px;text-align:center;color:var(--text-muted);font-size:12px;line-height:1.6}
.info-row{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border)}
.info-row:last-child{border-bottom:none}
.info-k{font-size:12px;color:var(--text-muted)}
.info-v{font-size:12px;font-weight:500}
.adr-tag{display:inline-flex;align-items:center;font-size:10px;padding:2px 7px;border-radius:10px;background:#1f6feb18;color:var(--accent);border:1px solid #1f6feb44;cursor:pointer;transition:background var(--transition);margin:2px}
.adr-tag:hover{background:#1f6feb33}
.ep-code{font-size:11px;color:var(--accent);background:var(--bg);padding:3px 8px;border-radius:4px;border:1px solid var(--border);font-family:monospace}

/* ── Search palette ── */
#soverlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:1000;backdrop-filter:blur(3px)}
#soverlay.open{display:flex;align-items:flex-start;justify-content:center;padding-top:14vh}
#spalette{background:var(--bg-sidebar);border:1px solid var(--border);border-radius:10px;width:540px;max-width:92vw;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,0.6)}
#sinput{width:100%;background:transparent;border:none;border-bottom:1px solid var(--border);padding:13px 16px;color:var(--text);font-size:15px;outline:none;font-family:inherit}
#sinput::placeholder{color:var(--text-muted)}
#sresults{max-height:340px;overflow-y:auto}
#sresults::-webkit-scrollbar{width:3px}
#sresults::-webkit-scrollbar-thumb{background:var(--border)}
.sresult{display:flex;align-items:center;gap:10px;padding:9px 16px;cursor:pointer;transition:background var(--transition)}
.sresult:hover,.sresult.focused{background:var(--bg-hover)}
.sr-icon{font-size:16px;width:22px;text-align:center;flex-shrink:0}
.sr-name{font-weight:600;font-size:13px}
.sr-desc{font-size:11px;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:300px}
.sr-cat{font-size:10px;color:var(--text-muted);margin-left:auto;background:var(--bg-card);padding:2px 7px;border-radius:10px;border:1px solid var(--border);white-space:nowrap;flex-shrink:0}
.sempty{padding:20px;text-align:center;color:var(--text-muted);font-size:13px}

/* ── Scaffold modal ── */
#scaffoverlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:1000;backdrop-filter:blur(3px);align-items:center;justify-content:center}
#scaffoverlay.open{display:flex}
#scaffmodal{background:var(--bg-sidebar);border:1px solid var(--border);border-radius:10px;width:480px;max-width:94vw;box-shadow:0 20px 60px rgba(0,0,0,0.6);overflow:hidden}
.scaff-hdr{padding:18px 20px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.scaff-hdr h2{font-size:16px;font-weight:700}
.scaff-close{background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:18px;line-height:1;padding:2px 6px}
.scaff-close:hover{color:var(--text)}
.scaff-body{padding:20px;display:flex;flex-direction:column;gap:14px}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-label{font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.4px}
.form-input,.form-select{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:8px 10px;color:var(--text);font-size:13px;font-family:inherit;width:100%;outline:none;transition:border-color var(--transition)}
.form-input:focus,.form-select:focus{border-color:var(--accent)}
.form-select option{background:var(--bg-card)}
.scaff-footer{padding:14px 20px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end}
#scaffresult{padding:10px 12px;border-radius:var(--radius);font-size:12px;font-family:monospace;background:var(--bg);border:1px solid var(--border);color:var(--green);display:none;word-break:break-all}

/* ── ADR Browser ── */
.adr-filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;align-items:center}
.adr-filter-inp{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:6px 10px;color:var(--text);font-size:12px;font-family:inherit;outline:none;flex:1;min-width:160px;transition:border-color var(--transition)}
.adr-filter-inp:focus{border-color:var(--accent)}
.scope-btn{font-size:11px;padding:4px 10px;border-radius:10px;cursor:pointer;border:1px solid var(--border);background:var(--bg-card);color:var(--text-muted);font-family:inherit;transition:all var(--transition)}
.scope-btn.active,.scope-btn:hover{border-color:var(--accent);color:var(--accent);background:#1f6feb18}
.adr-list-grid{display:flex;flex-direction:column;gap:4px}
.adr-row{display:flex;align-items:center;gap:10px;padding:9px 13px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;transition:border-color var(--transition),background var(--transition)}
.adr-row:hover{border-color:var(--accent);background:var(--bg-hover)}
.adr-num{font-size:11px;font-weight:700;color:var(--accent);font-family:monospace;min-width:48px}
.adr-title{flex:1;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.adr-scope{font-size:10px;padding:2px 7px;border-radius:10px;background:var(--bg);border:1px solid var(--border);color:var(--text-muted);white-space:nowrap;flex-shrink:0}
.adr-cat{font-size:10px;color:var(--text-muted);white-space:nowrap;flex-shrink:0;min-width:80px;text-align:right}
/* Markdown rendering */
.md-body{font-size:13px;line-height:1.7;color:var(--text);max-width:760px}
.md-body h1{font-size:20px;font-weight:700;margin:0 0 16px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.md-body h2{font-size:15px;font-weight:700;margin:20px 0 8px;color:var(--accent)}
.md-body h3{font-size:13px;font-weight:700;margin:16px 0 6px}
.md-body p{margin:0 0 10px;color:var(--text-muted)}
.md-body strong{color:var(--text);font-weight:600}
.md-body code{font-family:monospace;font-size:11px;background:var(--bg-card);padding:1px 5px;border-radius:3px;border:1px solid var(--border)}
.md-body pre{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:12px;overflow-x:auto;margin:10px 0;font-size:11px;font-family:monospace;white-space:pre-wrap}
.md-body ul,.md-body ol{margin:0 0 10px 20px;color:var(--text-muted)}
.md-body li{margin-bottom:3px}
.md-body table{width:100%;border-collapse:collapse;margin:10px 0;font-size:12px}
.md-body th{background:var(--bg-card);padding:7px 10px;text-align:left;font-weight:600;border:1px solid var(--border)}
.md-body td{padding:6px 10px;border:1px solid var(--border)}
.md-body tr:nth-child(even) td{background:#ffffff05}
.md-body blockquote{border-left:3px solid var(--accent);padding:6px 12px;margin:10px 0;color:var(--text-muted);background:#1f6feb08}
.md-body hr{border:none;border-top:1px solid var(--border);margin:16px 0}

/* ── Upstream Tracker ── */
.upstream-table{width:100%;border-collapse:collapse;font-size:12px}
.upstream-table th{background:var(--bg-card);padding:9px 12px;text-align:left;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:0.4px;color:var(--text-muted);border:1px solid var(--border);white-space:nowrap}
.upstream-table td{padding:8px 12px;border:1px solid var(--border);vertical-align:middle}
.upstream-table tr:hover td{background:var(--bg-hover)}
.parity-bar{display:flex;align-items:center;gap:6px}
.parity-track{flex:1;height:5px;background:var(--bg-hover);border-radius:3px;overflow:hidden;min-width:60px}
.parity-fill{height:100%;border-radius:3px;transition:width 0.3s}
.parity-pct{font-size:11px;font-family:monospace;color:var(--text-muted);min-width:30px;text-align:right}
.gh-link{color:var(--accent);text-decoration:none;font-size:11px}
.gh-link:hover{text-decoration:underline}
.cave-mod-tag{font-size:10px;padding:2px 6px;border-radius:10px;background:var(--bg-card);border:1px solid var(--border);color:var(--text-muted)}
.upstream-search{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:7px 12px;color:var(--text);font-size:13px;font-family:inherit;outline:none;width:280px;transition:border-color var(--transition)}
.upstream-search:focus{border-color:var(--accent)}
.cat-filter{display:flex;gap:6px;flex-wrap:wrap}

/* ── Mobile overlay ── */
#sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:90}

/* ── Responsive ── */
@media(max-width:768px){
  #sidebar{position:fixed;top:0;left:0;bottom:0;transform:translateX(-100%);box-shadow:none}
  #sidebar.open{transform:translateX(0);box-shadow:4px 0 20px rgba(0,0,0,0.5)}
  #sidebar-overlay.show{display:block}
  #hamburger{display:flex}
  #content{padding:14px}
  .stats-grid{grid-template-columns:repeat(2,1fr)}
  .module-grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr))}
  .detail-grid{grid-template-columns:1fr}
}
@media(max-width:480px){
  .stats-grid{grid-template-columns:repeat(2,1fr)}
  .module-grid{grid-template-columns:1fr 1fr}
}

/* ── Animations ── */
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.pulse{animation:pulse 2s infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite}
</style>
</head>
<body>
<div id="app">
  <div id="sidebar-overlay" onclick="closeSidebar()"></div>
  <nav id="sidebar">
    <div class="sidebar-header">
      <div class="logo">CV</div>
      <span class="logo-text">CAVE Platform</span>
    </div>
    <div class="sidebar-search">
      <button class="search-btn" onclick="openSearch()">
        <span>⌕</span><span>Search modules…</span>
        <span class="search-btn-kbd">⌘K</span>
      </button>
    </div>
    <div style="padding:6px 0 4px;border-bottom:1px solid var(--border)">
      <div style="padding:4px 16px 4px;font-size:10px;text-transform:uppercase;letter-spacing:0.6px;color:var(--text-muted);font-weight:600">Portal</div>
      <a href="/admin/upstream" class="nav-item" style="text-decoration:none">⇪ Upstream Tracker</a>
      <a href="/admin/adr" class="nav-item" style="text-decoration:none">📜 ADR Browser</a>
      <a href="/attribution" class="nav-item" style="text-decoration:none">⌗ Attribution</a>
    </div>
    <div class="sidebar-nav" id="sidebar-nav"></div>
    <div class="sidebar-footer">
      v<span id="rv">…</span> · <span id="ru">—</span>
    </div>
  </nav>

  <div id="main">
    <div id="topbar">
      <button id="hamburger" onclick="toggleSidebar()">☰</button>
      <div id="breadcrumb">
        <span style="color:var(--text-muted)">CAVE</span>
        <span style="color:var(--border)">›</span>
        <span class="bc-active" id="bc">Overview</span>
      </div>
      <div class="topbar-right">
        <button class="btn-topbar" onclick="openScaffold()">＋ New Project</button>
        <div class="hbadge" id="userbadge" title="Click to sign out" style="cursor:pointer" onclick="if(confirm('Sign out?'))location.href='/api/auth/logout'">
          <span class="sdot" style="background:var(--text-muted)"></span>
          <span id="userlabel">…</span>
        </div>
        <div class="hbadge">
          <span class="sdot dm" id="gsdot"></span>
          <span id="gstext">Connecting…</span>
        </div>
      </div>
    </div>

(async () => {

      lab.textContent = 'sign in';
      document.getElementById('userbadge').onclick = () => location.href = '/login';

})();

}

  return {healthy:'sp-healthy',warning:'sp-warning',error:'sp-error',pending:'sp-pending',unknown:'sp-pending'}[s]||'sp-pending';

function parityColor(p){
  if(p>=80)return'var(--green)';

async function fetchHealth(){
  try{
    const r=await fetch('/health');
    if(!r.ok)throw 0;
    const d=await r.json();
    S.health=d;
    S.ver=d.version||'?';
    document.getElementById('rv').textContent=d.version||'?';
    const gsd=document.getElementById('gsdot');
    const gst=document.getElementById('gstext');
    gsd.className='sdot dg';
    gst.textContent='Runtime OK';
    ['secrets','lint','docs','status','changelog','certs','portal','upstream'].forEach(id=>{
      if(MODS[id])MODS[id].status='healthy';
    });
    if(S.page==='overview')renderPage();
    renderNav();
  }catch{
    document.getElementById('gsdot').className='sdot dr';
    document.getElementById('gstext').textContent='Unreachable';
  }
}

async function fetchModuleHealth(){
  try{
    const r=await fetch('/api/portal/health/all');
    if(!r.ok)return;
    const d=await r.json();
    S.moduleHealth=d.modules||{};
    // Update MODS statuses
    for(const[id,status]of Object.entries(S.moduleHealth)){
      if(MODS[id])MODS[id].status=status==='healthy'?'healthy':status==='unknown'?'pending':'error';
    }
    // Update dots in current overview if visible
    if(S.page==='overview'){
      for(const[id,status]of Object.entries(S.moduleHealth)){
        const dots=document.querySelectorAll(`.sdot[data-mod="${id}"]`);
        dots.forEach(el=>{
          el.className='sdot '+dot(status==='healthy'?'healthy':status==='unknown'?'pending':'error');
        });
      }
    }
  }catch{/* silently ignore */}
}

// Live parity from backend — replaces hardcoded UPSTREAM_PROJECTS.parity values.
// Backend computes file/function/test/surface parity in cave-kernel and exposes
// the weighted `overall` field (0.0–1.0). On failure we silently fall back to
// the hardcoded estimates so the UI still renders.
async function fetchLiveParity(){
  try{
    const r=await fetch('/api/portal/parity');
    if(!r.ok)throw new Error('HTTP '+r.status);
    const d=await r.json();
    const next={};
    for(const m of (d.modules||[])){
      if(m&&typeof m.module==='string'&&typeof m.overall==='number'){
        // Backend keys are "cave-<id>" (e.g. cave-cri); UPSTREAM_PROJECTS[].cave
        // uses the bare id ("cri"). Index by both so renderUpstream can look up
        // either form without further normalization.
        const pct=Math.round(m.overall*100);
        next[m.module]=pct;
        const bare=m.module.replace(/^cave-/,'');
        if(bare!==m.module)next[bare]=pct;
      }
    }
    S.parityLive=next;
    S.parityError=null;
  }catch(e){
    S.parityError=e.message||'fetch failed';
  }finally{
    S.parityLoading=false;
    if(S.page==='upstream')renderPage();
  }
}

// ── Router ───────────────────────────────────────────────────────────────────

function go(page){
  // 2026-05-14 dedup: ADR routes hop out to /admin/adr instead of
  // taking over the SPA. Callers that still pass 'adrs' or 'adr:NNN'
  // (e.g. lingering bookmarks) get a hard navigation to the canonical
  // page; the SPA never tries to render them itself.
  if(page==='adrs'){window.location='/admin/adr';return;}
  if(page.startsWith('adr:')){window.location='/admin/adr/'+page.slice(4);return;}
  S.page=page;
  if(page==='overview') window.location.hash='#/';
  else if(page==='progress') window.location.hash='#/progress';
  else if(page==='upstream') window.location.hash='#/upstream';
  else window.location.hash='#/m/'+page;
  renderPage();
  renderNav();
  if(window.innerWidth<=768)closeSidebar();
}

window.addEventListener('hashchange',()=>{
  const h=window.location.hash;
  if(!h||h==='#/'||h==='#'){S.page='overview';}
  else if(h==='#/progress'){S.page='progress';}
  else if(h==='#/upstream'){S.page='upstream';}
  // 2026-05-14: legacy `#/adrs` and `#/adr/NNN` bookmarks redirect.
  else if(h==='#/adrs'){window.location='/admin/adr';return;}
  else if(h.startsWith('#/adr/')){window.location='/admin/adr/'+h.slice(6);return;}
  else{
    const ma=h.match(/^#\/adr\/(.+)$/);
    if(ma){S.page='adr:'+ma[1];}
    else{const mm=h.match(/^#\/m\/(.+)$/);S.page=(mm&&MODS[mm[1]])?mm[1]:'overview';}
  }
  renderPage();renderNav();
});

function renderNav(){
  let h='';
  // `adrs` removed from special-pages list 2026-05-14 — the Decisions
  // tab no longer renders inside the SPA; it hops to /admin/adr.
  const specialPages=['overview','upstream'];
  for(const item of NAV){
    if(item.type==='link'){
      const a=S.page===item.id;
      h+=`<div class="nav-item${a?' active':''}" onclick="go('${item.id}')">${item.icon} ${item.label}</div>`;
    } else {
      const exp=S.expanded.has(item.id);
      h+=`<div class="nav-sec${exp?'':' closed'}" onclick="toggleSec('${item.id}')">
        <span>${item.label}</span><span class="chev">▾</span>
      </div>`;
      if(exp){
        h+=`<div class="nav-sub">`;
        for(const mid of item.mods){
          const m=MODS[mid];if(!m)continue;
          const a=S.page===mid;
          h+=`<div class="nav-item${a?' active':''}" onclick="go('${mid}')">
            <span class="sdot ${dot(m.status)}"></span><span style="flex:1">${m.name}</span>
          </div>`;
        }
        h+=`</div>`;
      }
    }
  }
  // 2026-05-14: `adrs` + `adr:NNN` removed — SPA breadcrumb never
  // sees those pages now because go() redirects them to /admin/adr.
  const bcMap={overview:'Overview',progress:'Runtime Progress',upstream:'Upstream'};
  const label=bcMap[S.page]||MODS[S.page]?.name||S.page;
  document.getElementById('sidebar-nav').innerHTML=h;
  document.getElementById('bc').textContent=label;
}

// ── Feature: Runtime Progress ───────────────────────────────────────────────
// Polls /api/portal/runtime/progress every 60 s while the page is visible.

let _progressTimer=null;

function loadProgress(c){
  c.innerHTML=`
    <div class="page-hdr">
      <div class="page-title">Runtime Progress <span id="prog-refresh-ind" style="font-size:11px;color:var(--text-muted);font-weight:400;margin-left:10px">loading…</span></div>
      <div class="page-sub">Per-module completion against upstream-parity targets — backend tests / portal endpoints / cavectl commands / grafana panels.</div>
    </div>
    <div id="prog-body"><div style="padding:40px;text-align:center;color:var(--text-muted)">Fetching /api/portal/runtime/progress…</div></div>
  `;
  fetchProgress();
  if(_progressTimer) clearInterval(_progressTimer);
  _progressTimer=setInterval(()=>{
    if(S.page==='progress') fetchProgress();
    else { clearInterval(_progressTimer); _progressTimer=null; }
  },60000);
}

async function fetchProgress(){
  const ind=document.getElementById('prog-refresh-ind');
  if(ind) ind.textContent='refreshing…';
  try{
    const r=await fetch('/api/portal/runtime/progress');
    if(!r.ok) throw new Error('HTTP '+r.status);
    const d=await r.json();
    const body=document.getElementById('prog-body');
    if(!body) return;
    body.innerHTML=renderProgressBody(d);
    if(ind) ind.textContent='updated '+new Date().toLocaleTimeString();
  }catch(e){
    const body=document.getElementById('prog-body');
    if(body) body.innerHTML=`<div style="padding:40px;text-align:center;color:var(--red)">Fetch failed: ${esc(String(e.message||e))}</div>`;
    if(ind) ind.textContent='error';
  }
}

function progColor(pct){
  if(pct>=100) return 'var(--green)';
  if(pct>=80)  return '#d4d942';
  if(pct>=50)  return 'var(--yellow)';
  return 'var(--red)';
}

function progBar(have,target,color,height){
  const pct=target===0?100:Math.min(100,Math.round((have/target)*100));
  const h=height||6;
  return `<div style="background:var(--bg);border-radius:${h}px;height:${h}px;overflow:hidden;border:1px solid var(--border)">
    <div style="width:${pct}%;height:100%;background:${color||progColor(pct)};transition:width .3s ease"></div>
  </div>`;
}

function renderProgressBody(d){
  const t=d.totals||{};
  const overall=t.overall_pct||0;
  const mods=d.modules||[];
  const hdrStats=`
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-lbl">Overall Completion</div>
        <div class="stat-val" style="color:${progColor(overall)}">${overall}%</div>
        <div class="stat-sub">weighted across ${mods.length} modules</div>
        <div style="margin-top:10px">${progBar(overall,100,progColor(overall),10)}</div>
      </div>
      <div class="stat-card"><div class="stat-lbl">Complete</div><div class="stat-val c-green">${t.modules_complete||0}</div><div class="stat-sub">100%</div></div>
      <div class="stat-card"><div class="stat-lbl">In Progress</div><div class="stat-val c-yellow">${t.modules_in_progress||0}</div><div class="stat-sub">1–99%</div></div>
      <div class="stat-card"><div class="stat-lbl">Not Started</div><div class="stat-val c-red">${t.modules_todo||0}</div><div class="stat-sub">0%</div></div>
      <div class="stat-card"><div class="stat-lbl">Computed</div><div class="stat-val" style="font-size:13px">${esc(d.computed_at||'')}</div><div class="stat-sub">cached 60s</div></div>
    </div>`;

  let cards='';
  for(const m of mods){
    const pct=m.completion_pct||0;
    const clr=progColor(pct);
    const commit=m.last_commit?new Date(m.last_commit).toLocaleString():'—';
    const sha=m.last_commit_sha?`<code style="font-family:monospace;font-size:11px;color:var(--accent)">${esc(m.last_commit_sha)}</code>`:'';
    const subj=m.last_commit_subject?esc(m.last_commit_subject.slice(0,64)):'';
    cards+=`
      <div class="stat-card" style="padding:14px;min-width:0">
        <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px">
          <div style="font-weight:600;font-size:13px">${esc(m.label||m.name)}</div>
          <div style="font-size:18px;font-weight:700;color:${clr}">${pct}%</div>
        </div>
        <div style="margin-bottom:10px">${progBar(pct,100,clr,6)}</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px 12px;font-size:11px">
          <div><div style="color:var(--text-muted);margin-bottom:2px">Tests <b style="color:var(--text)">${m.backend_tests}/${m.backend_tests_target}</b></div>${progBar(m.backend_tests,m.backend_tests_target)}</div>
          <div><div style="color:var(--text-muted);margin-bottom:2px">Endpoints <b style="color:var(--text)">${m.portal_endpoints}/${m.portal_endpoints_target}</b></div>${progBar(m.portal_endpoints,m.portal_endpoints_target)}</div>
          <div><div style="color:var(--text-muted);margin-bottom:2px">cavectl <b style="color:var(--text)">${m.cavectl_commands}/${m.cavectl_commands_target}</b></div>${progBar(m.cavectl_commands,m.cavectl_commands_target)}</div>
          <div><div style="color:var(--text-muted);margin-bottom:2px">Metrics <b style="color:var(--text)">${m.grafana_panels}/${m.grafana_panels_target}</b></div>${progBar(m.grafana_panels,m.grafana_panels_target)}</div>
        </div>
        <div style="margin-top:10px;padding-top:8px;border-top:1px solid var(--border);font-size:11px;color:var(--text-muted)">
          <div style="display:flex;justify-content:space-between;gap:8px">
            <span>${commit}</span>${sha}
          </div>
          ${subj?`<div style="margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${esc(m.last_commit_subject||'')}">${subj}</div>`:''}
        </div>
      </div>`;
  }

  return `${hdrStats}
    <div class="sec-title">Modules (${mods.length})</div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px;margin-bottom:28px">${cards}</div>`;
}

      <div class="stat-card"><div class="stat-lbl">Total Modules</div><div class="stat-val c-accent">${all.length}</div><div class="stat-sub">across all phases</div></div>
      <div class="stat-card"><div class="stat-lbl">Healthy</div><div class="stat-val c-green">${healthy}</div><div class="stat-sub">Phase 1 live</div></div>
      <div class="stat-card"><div class="stat-lbl">Phase 1</div><div class="stat-val">${all.filter(m=>m.phase===1).length}</div><div class="stat-sub">implemented</div></div>
      <div class="stat-card"><div class="stat-lbl">Upstream OSS</div><div class="stat-val c-accent">66</div><div class="stat-sub">reimplemented</div></div>
      <div class="stat-card"><div class="stat-lbl">ADRs</div><div class="stat-val c-accent">142</div><div class="stat-sub">decisions recorded</div></div>
      <div class="stat-card"><div class="stat-lbl">Runtime</div><div class="stat-val" style="font-size:18px">${hstate}</div><div class="stat-sub">v${S.ver}</div></div>
    </div>
    ${grids}`;
}

// ── Feature 1: Module Detail ─────────────────────────────────────────────────

function renderMod(m){
  if(!m)return`<div style="padding:40px;text-align:center;color:var(--text-muted)">Module not found</div>`;
  const feats=m.features.map(f=>`<li>${esc(f)}</li>`).join('');
  const adrTags=(m.relatedAdrs||[]).map(n=>{
    const num=String(n).padStart(3,'0');
    return`<span class="adr-tag" onclick="go('adr:${num}')" title="Open ADR-${num}">ADR-${num}</span>`;
  }).join('');
  let actions=`<button class="btn btn-s" onclick="go('overview')">← Overview</button>`;
  if(m.ep)actions+=` <button class="btn btn-p" onclick="chkHealth('${m.ep}')">⟳ Health</button>`;
  actions+=` <button class="btn btn-s" onclick="showCfg('${m.id}')">⚙ Configure</button>`;
  if(m.github)actions+=` <a class="btn btn-s" href="${m.github}" target="_blank" rel="noopener">↗ GitHub</a>`;

  return `
    <div style="margin-bottom:16px">
      <button class="btn btn-s" onclick="go('overview')" style="font-size:12px">← Back to Overview</button>
    </div>
    <div class="mod-hdr">
      <div class="mod-icon">${m.icon}</div>
      <div>
        <div class="mod-title">${esc(m.name)}</div>
        <div class="mod-meta">
          <span class="spill ${pillClass(m.status)}">
            <span class="sdot ${dot(m.status)}" style="width:6px;height:6px" data-mod="${m.id}"></span>
            ${statusLabel(m.status)}
          </span>
          <span class="pbadge p${m.phase}">Phase ${m.phase}</span>
          ${m.up?`<span class="utag">↳ ${esc(m.up)}</span>`:''}
        </div>
      </div>
    </div>
    <p style="color:var(--text-muted);margin-bottom:22px;font-size:13px;max-width:580px;line-height:1.6">${esc(m.desc)}</p>
    <div class="detail-grid">
      <div class="dcrd">
        <div class="dcrd-title">Features</div>
        <ul class="feat-list">${feats}</ul>
      </div>
      <div class="dcrd">
        <div class="dcrd-title">Quick Actions</div>
        <div class="qactions">${actions}</div>
        ${m.ep?`<div style="margin-top:14px">
          <div class="dcrd-title" style="margin-bottom:6px">API Endpoints</div>
          <code class="ep-code">${esc(m.ep)}</code>
        </div>`:''}
      </div>
      <div class="dcrd">
        <div class="dcrd-title">Module Info</div>
        <div class="info-row"><span class="info-k">Status</span><span class="info-v" style="color:${m.status==='healthy'?'var(--green)':'var(--text-muted)'}">${statusLabel(m.status)}</span></div>
        <div class="info-row"><span class="info-k">Phase</span><span class="info-v">${m.phase}</span></div>
        <div class="info-row"><span class="info-k">Crate</span><span class="info-v" style="font-family:monospace;font-size:12px">cave-${m.id}</span></div>
        <div class="info-row"><span class="info-k">Lines of Code</span><span class="info-v c-accent">${m.loc.toLocaleString()}</span></div>
        ${m.up?`<div class="info-row"><span class="info-k">Upstream</span><span class="info-v">${esc(m.up)}</span></div>`:''}
        <div class="info-row"><span class="info-k">Category</span><span class="info-v" style="text-transform:capitalize">${CAT_LABELS[m.cat]||m.cat}</span></div>
        ${m.github?`<div class="info-row"><span class="info-k">GitHub</span><span class="info-v"><a href="${m.github}" target="_blank" rel="noopener" style="color:var(--accent);font-size:11px;word-break:break-all">${m.github.replace('https://','')}</a></span></div>`:''}
      </div>
      <div class="dcrd">
        <div class="dcrd-title">Related Decisions (ADRs)</div>
        ${adrTags||`<div style="color:var(--text-muted);font-size:12px">No ADRs linked</div>`}
        <div style="margin-top:12px">
          <div class="dcrd-title">Configuration</div>
          <div class="cfg-ph">Configuration panel coming in Phase ${m.phase}<br><span style="font-size:11px">Edit <code>cave-runtime.yaml</code> for now</span></div>
        </div>
      </div>
    </div>`;
}

async function chkHealth(ep){
  try{
    const r=await fetch(ep);
    const d=await r.json();
    alert(JSON.stringify(d,null,2));
  }catch(e){alert('Health check failed: '+e.message);}
}
function showCfg(id){
  alert(`Configure ${id}:\n\nEdit cave-runtime.yaml and restart.\nFull UI config coming in Phase 2.`);
}

// ── Feature 2: Scaffolder ────────────────────────────────────────────────────

function openScaffold(){
  document.getElementById('scaffoverlay').classList.add('open');
  document.getElementById('scaffresult').style.display='none';
  document.getElementById('sf-name').focus();
}
function closeScaffold(){
  document.getElementById('scaffoverlay').classList.remove('open');
}
function handleScaffOverlay(e){
  if(e.target===document.getElementById('scaffoverlay'))closeScaffold();
}
async function submitScaffold(){
  const name=document.getElementById('sf-name').value.trim();
  const lang=document.getElementById('sf-lang').value;
  const tmpl=document.getElementById('sf-tmpl').value;
  const ns=document.getElementById('sf-ns').value.trim();
  if(!name){document.getElementById('sf-name').focus();return;}
  const btn=document.getElementById('scaffsubmit');
  btn.disabled=true;btn.textContent='Creating…';
  const res=document.getElementById('scaffresult');
  res.style.display='none';
  try{
    const r=await fetch('/api/portal/scaffold',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({name,language:lang,template:tmpl,namespace:ns||'default'})
    });
    const d=await r.json();
    res.textContent=d.message||JSON.stringify(d,null,2);
    res.style.display='block';
    res.style.color='var(--green)';
  }catch(e){
    res.textContent='Error: '+e.message;
    res.style.display='block';
    res.style.color='var(--red)';
  }finally{
    btn.disabled=false;btn.textContent='Create Project';
  }
}

// ── Feature 3: Upstream Tracker ──────────────────────────────────────────────

function renderUpstream(){
  const cats=['All',...new Set(UPSTREAM_PROJECTS.map(p=>p.cat))].sort((a,b)=>a==='All'?-1:b==='All'?1:a.localeCompare(b));
  const q=S.upstreamQuery.toLowerCase();
  const cat=S.upstreamCat;
  const filtered=UPSTREAM_PROJECTS.filter(p=>{
    const matchCat=cat==='All'||p.cat===cat;
    const matchQ=!q||p.name.toLowerCase().includes(q)||p.cave.toLowerCase().includes(q)||p.cat.toLowerCase().includes(q);
    return matchCat&&matchQ;
  });

  const catBtns=cats.map(c=>`<button class="scope-btn${c===cat?' active':''}" onclick="setUpstreamCat('${c}')">${c}</button>`).join('');
  const rows=filtered.map(p=>{
    const live=S.parityLive[p.cave];
    const isLive=typeof live==='number';
    const parity=isLive?live:p.parity;
    const pc=parityColor(parity);
    const liveTag=isLive
      ?`<span class="parity-pct" style="color:var(--green);font-size:9px;margin-left:4px" title="Live from /api/portal/parity">●</span>`
      :'';
    return`<tr>
      <td><a class="gh-link" href="${p.gh}" target="_blank" rel="noopener">${esc(p.name)}</a></td>
      <td><span class="cave-mod-tag">${esc(p.cave)}</span></td>
      <td>${esc(p.cat)}</td>
      <td><span class="pbadge p${Math.min(p.phase,4)}">Phase ${p.phase}</span></td>
      <td><div class="parity-bar"><div class="parity-track"><div class="parity-fill" style="width:${parity}%;background:${pc}"></div></div><span class="parity-pct" style="color:${pc}">${parity}%</span>${liveTag}</div></td>
    </tr>`;
  }).join('');

  const parityStatus=S.parityLoading
    ?`<span style="color:var(--text-muted);font-size:11px">⟳ loading live parity…</span>`
    :S.parityError
      ?`<span style="color:var(--yellow);font-size:11px" title="${esc(S.parityError)}">⚠ live parity unavailable — showing hardcoded estimates</span>`
      :`<span style="color:var(--green);font-size:11px">● ${Object.keys(S.parityLive).length} module(s) live from /api/portal/parity</span>`;

  return`<div class="page-hdr">
    <div class="page-title">Upstream Tracker</div>
    <div class="page-sub">73 OSS projects monitored for releases, CVEs, and breaking changes</div>
    <div style="margin-top:6px">${parityStatus}</div>
  </div>
  <div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px;align-items:center">
    <input class="upstream-search" type="text" placeholder="Search projects…"
      value="${esc(S.upstreamQuery)}" oninput="setUpstreamQuery(this.value)">
    <div class="cat-filter">${catBtns}</div>
  </div>
  <div style="overflow-x:auto">
    <table class="upstream-table">
      <thead><tr>
        <th>Project</th><th>CAVE Module</th><th>Category</th><th>Phase</th><th style="min-width:140px">Parity</th>
      </tr></thead>
      <tbody>${rows||'<tr><td colspan="5" style="text-align:center;color:var(--text-muted);padding:20px">No results</td></tr>'}</tbody>
    </table>
  </div>`;
}

function setUpstreamCat(cat){S.upstreamCat=cat;renderPage();}
function setUpstreamQuery(q){S.upstreamQuery=q;renderPage();}


// ── Search ───────────────────────────────────────────────────────────────────

function openSearch(){
  S.searchOpen=true;S.sfocus=-1;
  document.getElementById('soverlay').classList.add('open');
  const inp=document.getElementById('sinput');
  inp.value='';
  setTimeout(()=>inp.focus(),30);
  renderSearch('');
}
function closeSearch(){
  S.searchOpen=false;
  document.getElementById('soverlay').classList.remove('open');
}
function handleSOverlay(e){if(e.target===document.getElementById('soverlay'))closeSearch();}
function onSInput(){S.sfocus=-1;renderSearch(document.getElementById('sinput').value);}
function onSKey(e){
  const res=document.querySelectorAll('.sresult');
  if(e.key==='Escape'){closeSearch();return;}
  if(e.key==='ArrowDown'){e.preventDefault();S.sfocus=Math.min(S.sfocus+1,res.length-1);updSFocus();return;}
  if(e.key==='ArrowUp'){e.preventDefault();S.sfocus=Math.max(S.sfocus-1,-1);updSFocus();return;}
  if(e.key==='Enter'){
    if(S.sfocus>=0&&S.sresults[S.sfocus]){go(S.sresults[S.sfocus].id);closeSearch();}
    return;
  }
}
function updSFocus(){
  document.querySelectorAll('.sresult').forEach((el,i)=>el.classList.toggle('focused',i===S.sfocus));
}
function renderSearch(q){
  const lq=q.toLowerCase().trim();
  const all=Object.values(MODS);
  S.sresults=lq?all.filter(m=>m.name.toLowerCase().includes(lq)||m.desc.toLowerCase().includes(lq)||m.id.includes(lq)||(m.up&&m.up.toLowerCase().includes(lq))):all;
  const el=document.getElementById('sresults');
  if(!S.sresults.length){el.innerHTML=`<div class="sempty">No results for "${esc(q)}"</div>`;return;}
  el.innerHTML=S.sresults.map(m=>`
    <div class="sresult" onclick="go('${m.id}');closeSearch()">
      <span class="sr-icon">${m.icon}</span>
      <div style="flex:1;min-width:0">
        <div class="sr-name">${esc(m.name)}</div>
        <div class="sr-desc">${esc(m.desc)}</div>
      </div>
      <span class="sr-cat">${CAT_LABELS[m.cat]||m.cat}</span>
    </div>`).join('');
}

// ── Keyboard Shortcuts ────────────────────────────────────────────────────────

document.addEventListener('keydown',e=>{
  if((e.metaKey||e.ctrlKey)&&e.key==='k'){
    e.preventDefault();
    S.searchOpen?closeSearch():openSearch();
  }
  if(e.key==='Escape'){
    if(S.searchOpen)closeSearch();
    if(document.getElementById('scaffoverlay').classList.contains('open'))closeScaffold();
  }
});

// ── Init ─────────────────────────────────────────────────────────────────────

(()=>{
  const h=window.location.hash;
  if(h&&h!=='#/'&&h!=='#'){
    if(h==='#/upstream'){S.page='upstream';}
    // 2026-05-14: ADR hashes redirect to /admin/adr at page load too,
    // so a bookmarked `#/adrs` or `#/adr/NNN` lands on the canonical
    // page instead of trying to render the SPA tab that no longer
    // exists.
    else if(h==='#/adrs'){window.location='/admin/adr';return;}
    else if(h.startsWith('#/adr/')){window.location='/admin/adr/'+h.slice(6);return;}
    else{
      const mm=h.match(/^#\/m\/(.+)$/);if(mm&&MODS[mm[1]])S.page=mm[1];
    }
  }
  renderNav();
  renderPage();
})();
</script>
