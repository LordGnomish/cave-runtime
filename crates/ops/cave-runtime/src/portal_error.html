<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>404 &middot; Cave Portal</title>
<style>
  :root{--bg:#0d1117;--panel:#161b22;--border:#30363d;--text:#e6edf3;--muted:#8b949e;--accent:#58a6ff}
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;background:var(--bg);color:var(--text);
    font:15px/1.6 -apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
    display:flex;align-items:center;justify-content:center}
  .card{max-width:520px;width:90%;text-align:center;padding:48px 32px;
    background:var(--panel);border:1px solid var(--border);border-radius:12px}
  .code{font-size:72px;font-weight:800;letter-spacing:-2px;
    background:linear-gradient(90deg,var(--accent),#a371f7);-webkit-background-clip:text;
    background-clip:text;-webkit-text-fill-color:transparent;margin:0 0 8px}
  h1{font-size:20px;margin:0 0 12px}
  p{color:var(--muted);margin:0 0 28px}
  a.btn{display:inline-block;padding:10px 20px;border-radius:8px;text-decoration:none;
    color:#fff;background:var(--accent);font-weight:600}
  a.btn:hover{filter:brightness(1.1)}
  .foot{margin-top:28px;color:var(--muted);font-size:12px}
</style>
</head>
<body>
  <main class="card">
    <p class="code">404</p>
    <h1>Page not found</h1>
    <p>The route you requested isn&rsquo;t mounted on this Cave Runtime instance.</p>
    <a class="btn" href="/">Back to the portal</a>
    <div class="foot">Cave Runtime &middot; single-binary developer portal</div>
  </main>
</body>
</html>
