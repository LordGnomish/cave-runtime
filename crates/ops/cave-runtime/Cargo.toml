[package]
name = "cave-runtime"
description = "CAVE Unified Runtime — single binary hosting all platform modules"
authors.workspace = true
repository.workspace = true
homepage.workspace = true
documentation = "https://docs.rs/cave-runtime"
readme = "README.md"
rust-version.workspace = true
keywords = ["runtime", "kubernetes", "platform", "unified", "binary"]
categories = ["api-bindings", "command-line-utilities", "network-programming"]
version.workspace = true
edition.workspace = true
license.workspace = true

[[bin]]
name = "cave-runtime"
path = "src/main.rs"

[dependencies]
# Shared infrastructure
cave-etcd = { path = "../../compute/cave-etcd" }
