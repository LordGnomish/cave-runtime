# parity.manifest.toml — cave-profiler
# Upstream: grafana/pyroscope  https://github.com/grafana/pyroscope
# Skeleton generated by cave parity init — fill in the mapping sections

[upstream]
org     = "grafana"
repo    = "pyroscope"
version = "v1.3.0"
name    = "Pyroscope"
license = "AGPL-3.0"
language= "Go"
url     = "https://github.com/grafana/pyroscope"
[module]
name        = "cave-profiler"
description = "Continuous profiling — Pyroscope replacement"
source_root = "src"

# ── File mappings ────────────────────────────────────────────────────────────
# [[files]]
# upstream = "path/in/upstream/repo.go"
# local    = "src/local.rs"

# ── Function mappings ────────────────────────────────────────────────────────
# [[functions]]
# upstream_name = "UpstreamFunc"
# local_name    = "local_fn"
# file          = "src/routes.rs"

# ── Test mappings ────────────────────────────────────────────────────────────
# [[tests]]
# upstream_test = "TestUpstreamFunc"
# local_test    = "test_local_fn"

# ── Surface mappings ─────────────────────────────────────────────────────────
# [[surfaces]]
# kind          = "http"
# upstream_path = "/api/upstream"
# local_path    = "/api/profiler/endpoint"

[parity]
infra_only = true
ratio       = 0.0        # honest: 0.0 means upstream parity NOT yet measured
last_audit  = "2026-05-12"

