# parity-nexus.manifest.toml — cave-artifacts/nexus sub-module
#
# Companion manifest for the nexus sub-module of cave-artifacts. cave-
# kernel's discover_workspace currently only reads parity.manifest.toml
# (one upstream per crate). This file is therefore read documentation /
# future-tool input today — extending discovery to walk per-sub-module
# manifests is a tracked follow-up.

[upstream]
org     = "sonatype"
repo    = "nexus-public"
version = "release-3.69.0-02"

[module]
name        = "cave-artifacts-nexus"
description = "Universal binary repository sub-module — Sonatype Nexus 3"
source_root = "src/nexus"

# ── File mappings ────────────────────────────────────────────────────────
[[files]]
upstream = "components/nexus-repository/src/main/java/org/sonatype/nexus/repository/Format.java"
local    = "src/nexus/format.rs"

[[files]]
upstream = "components/nexus-repository/src/main/java/org/sonatype/nexus/repository/Repository.java"
local    = "src/nexus/models.rs"

[[files]]
upstream = "components/nexus-repository/src/main/java/org/sonatype/nexus/repository/storage/Component.java"
local    = "src/nexus/models.rs"

[[files]]
upstream = "components/nexus-repository/src/main/java/org/sonatype/nexus/repository/storage/Asset.java"
local    = "src/nexus/models.rs"

[[files]]
upstream = "components/nexus-repository/src/main/java/org/sonatype/nexus/repository/manager/RepositoryManager.java"
local    = "src/nexus/store.rs"

[[files]]
upstream = "plugins/nexus-coreui-plugin/src/main/java/org/sonatype/nexus/coreui/RepositoryComponent.groovy"
local    = "src/nexus/routes.rs"

[[files]]
upstream = "components/nexus-repository/src/main/java/org/sonatype/nexus/repository/raw/RawFormat.java"
local    = "src/nexus/format.rs"

[[files]]
upstream = "components/nexus-cleanup/src/main/java/org/sonatype/nexus/cleanup/internal/task/CleanupServiceImpl.java"
local    = "src/nexus/cleanup.rs"

[[files]]
upstream = "components/nexus-repository/src/main/java/org/sonatype/nexus/repository/routing/RoutingRule.java"
local    = "src/nexus/routing.rs"

[[files]]
upstream = "components/nexus-repository/src/main/java/org/sonatype/nexus/repository/manager/RepositoryNotFoundException.java"
local    = "src/nexus/error.rs"

# ── Function mappings ────────────────────────────────────────────────────
[[functions]]
upstream_name = "RepositoryManagerImpl.create"
local_name    = "create_repository"
file          = "src/nexus/store.rs"

[[functions]]
upstream_name = "RepositoryManagerImpl.get"
local_name    = "get_repository"
file          = "src/nexus/store.rs"

[[functions]]
upstream_name = "RepositoryManagerImpl.delete"
local_name    = "delete_repository"
file          = "src/nexus/store.rs"

[[functions]]
upstream_name = "RawContentFacetImpl.put"
local_name    = "upload_raw"
file          = "src/nexus/routes.rs"

[[functions]]
upstream_name = "RawContentFacetImpl.get"
local_name    = "download_raw"
file          = "src/nexus/routes.rs"

[[functions]]
upstream_name = "CleanupServiceImpl.findEligibleAssets"
local_name    = "evaluate"
file          = "src/nexus/cleanup.rs"

[[functions]]
upstream_name = "CleanupServiceImpl.deleteFromRepository"
local_name    = "apply"
file          = "src/nexus/cleanup.rs"

[[functions]]
upstream_name = "RoutingRuleHelper.isAllowed"
local_name    = "evaluate"
file          = "src/nexus/routing.rs"

[[functions]]
upstream_name = "FormatRegistry.byName"
local_name    = "FormatRegistry::get"
file          = "src/nexus/format.rs"

[[functions]]
upstream_name = "BlobStoreImpl.create"
local_name    = "store_blob"
file          = "src/nexus/store.rs"

