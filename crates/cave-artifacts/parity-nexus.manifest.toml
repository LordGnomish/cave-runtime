# ── Surface mappings ─────────────────────────────────────────────────────
[[surfaces]]
kind          = "http"
upstream_path = "/service/rest/v1/repositories"
local_path    = "/api/nexus/v1/repositories"

[[surfaces]]
kind          = "http"
upstream_path = "/service/rest/v1/components"
local_path    = "/api/nexus/v1/components"

[[surfaces]]
kind          = "http"
upstream_path = "/service/rest/v1/assets"
local_path    = "/api/nexus/v1/assets"

[[surfaces]]
kind          = "http"
upstream_path = "/service/rest/v1/cleanup-policies"
local_path    = "/api/nexus/v1/cleanup-policies"

[[surfaces]]
kind          = "http"
upstream_path = "/service/rest/v1/routing-rules"
local_path    = "/api/nexus/v1/routing-rules"

[[surfaces]]
kind          = "http"
upstream_path = "/repository/{name}/{path}"
local_path    = "/api/nexus/repository/{name}/{*path}"
