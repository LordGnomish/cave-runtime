# parity.manifest.toml — cave-artifacts
#
# This is the primary manifest consumed by cave-kernel's parity discover
# (one [upstream] per parity.manifest.toml). cave-artifacts is a multi-
# upstream consolidation crate; we record the Pulp-side mapping here
# because Pulp is the largest live surface (~140k LOC, ten content plugins)
# and our parity.manifest.toml predecessor pointed at it.
#
# The companion mappings for the harbor and nexus sub-modules live in
# parity-harbor.manifest.toml and parity-nexus.manifest.toml in the same
# directory. cave-kernel's discover_workspace does not currently traverse
# those — extending the discover to walk sub-module manifests is tracked
# as a follow-up. Until then those companion files are documentation /
# future-tool inputs only.

[upstream]
org        = "pulp"
repo       = "pulpcore"
version    = "3.49.0"
name       = "Pulp (pulpcore)"
license    = "GPL-2.0"
language   = "Python"
url        = "https://github.com/pulp/pulpcore"
source_sha = { pulpcore = "3.49.0", harbor = "v2.10.0", nexus = "release-3.69.0-02" }

# ── Secondary upstreams ──────────────────────────────────────────────────────

[[secondary_upstreams]]
org     = "goharbor"
repo    = "harbor"
version = "v2.10.0"
purpose = "Container registry sub-module — see parity-harbor.manifest.toml"

[[secondary_upstreams]]
org     = "sonatype"
repo    = "nexus-public"
version = "release-3.69.0-02"
purpose = "Universal binary repository sub-module — see parity-nexus.manifest.toml"

[parity]
# Charter v2 8-gate close-out 2026-05-19. cave-artifacts is the unified
# artifact platform consolidating Pulp (primary), Harbor (container
# registry), and Nexus (universal repo) into one Rust crate.
#
# Counts measured against the union surface of:
#   * pulpcore (3.49.0): ~30 core subsystems (repository, content,
#     publication, tasks, RBAC, storage, ...)
#   * Harbor   (v2.10.0): ~20 core subsystems (project, registry v2,
#     replication, scanner, webhook, retention, robot, OIDC, ...)
#   * Nexus    (3.69.0): ~15 core subsystems (format, repository,
#     storage, blob store, search, proxy, ...)
# = ~65 union subsystems.
#
# Pulp Phase 2 (9 plugin deep-port — claude/cave-artifacts-pulp-phase2-
# 2026-05-18 branch, 19 commits) is **NOT in main yet**: branch conflicts
# with f90c1300 core-abstraction merge on 7 plugin .rs files. Those 9
# extended plugin sub-systems are listed as [[scope_cuts]] in this manifest
# until reconciled.
mapped_count   = 18      # [[files]] count — Pulp core + Harbor ProjectStore + integrations
partial_count  = 4       # Cosign verifier, Nexus REST stub, Harbor webhook framework, Pulp tasking framework
skipped_count  = 35      # [[scope_cuts]] — explicit deferrals (Pulp Phase 2 9 plugins + Harbor replication/preheat + Nexus blob backends + ...)
unmapped_count = 8       # [[missings]] — real gaps (multi-region replication, OCI subject artifact, ...)
total          = 65
ratio          = 0.8769  # (18 + 4 + 35) / 65 = 57/65
fill_ratio     = 0.8769
honest_ratio   = 0.2769  # mapped/total = 18/65
parity_ratio_source = "manifest"
last_audit     = "2026-05-19"
infra_only     = false

# ── Partial ports (real, documented narrow scope-cut) ────────────────────────

[[partials]]
upstream  = "src/pkg/scan/v1/scanner/scanner.go (Harbor)"
scope_cut = "Cosign signature verification stub — sigstore/cosign library wired but multi-CT-log fanout deferred"

[[partials]]
upstream  = "components/nexus-rest/* (Nexus)"
scope_cut = "Nexus REST API skeleton — format-detection + repository CRUD partial; group/proxy repo types deferred"

[[partials]]
upstream  = "src/server/v2.0/handler/webhook.go (Harbor)"
scope_cut = "Webhook framework wired — JSON payload emission only; HMAC signature + retry queue deferred"

[[partials]]
upstream  = "pulpcore/app/tasks/* (Pulp)"
scope_cut = "Tasking framework wired — synchronous execution only; pulpcore-worker process + RQ-style queue + cancel/wait API deferred"

# ── Scope cuts — explicitly out of MVP scope ─────────────────────────────────

