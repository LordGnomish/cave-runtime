# parity.manifest.toml — cave-artifacts
# Upstream: sonatype/nexus-public  https://github.com/sonatype/nexus-public
# Skeleton generated by cave parity init — fill in the mapping sections

[upstream]
org     = "sonatype"
repo    = "nexus-public"
version = "v3.0.0"

[module]
name        = "cave-artifacts"
description = "Artifact repository — Nexus/Artifactory replacement"
source_root = "src"

# ── File mappings ────────────────────────────────────────────────────────────
# [[files]]
# upstream = "path/in/upstream/repo.go"
# local    = "src/local.rs"

# ── Function mappings ────────────────────────────────────────────────────────
# [[functions]]
# upstream_name = "UpstreamFunc"
# local_name    = "local_fn"
# file          = "src/routes.rs"

# ── Test mappings ────────────────────────────────────────────────────────────
# [[tests]]
# upstream_test = "TestUpstreamFunc"
# local_test    = "test_local_fn"

# ── Surface mappings ─────────────────────────────────────────────────────────
# [[surfaces]]
# kind          = "http"
# upstream_path = "/api/upstream"
# local_path    = "/api/artifacts/endpoint"
