# ── Phase 3 candidates (deferred from Phase 2) ──────────────────────────
# Documented here so the gap is visible in the parity dashboard.
#
# 1. RPM primary.xml.gz compression in publication output (one-line
#    flate2 GzEncoder; kept out of plugin layer for now).
# 2. RPM filelists.xml + other.xml secondary metadata files.
# 3. deb control.tar.xz + control.tar.zst decompression (needs xz2/zstd
#    workspace dep audit; modern Debian 12+/Ubuntu 22.04+ use zstd).
# 4. Maven POM property substitution ($\{revision\}, $\{project.version\}),
#    parent merge for effective POM, XSD validation.
# 5. OSTree GVariant commit-object decoder (`(a{sv}aya(say)sstayay)`)
#    needs ~200 LOC hand-rolled deserializer or new crate.
# 6. Helm provenance `.prov` PGP clear-signature wrapper, OCI registry
#    push (`helm registry login`).
# 7. Galaxy v3 multi-page response composer for `ansible-galaxy
#    collection list` (single-version composer is in place).
# 8. Real sync orchestrator (Pulp `pulp_workers`): currently
#    routes/tasks scaffolds exist but worker dispatch is a no-op stub.
# 9. Publication merkle tree + content-addressed storage layer
#    (cave-storage hook).
# 10. Signing service backends (sigstore, GPG, X.509) beyond fixture.
