# parity.manifest.toml — cave-incidents
# Upstream: grafana/oncall  https://github.com/grafana/oncall
# Skeleton generated by cave parity init — fill in the mapping sections

[upstream]
org     = "grafana"
repo    = "oncall"
version = "v1.4.0"
name    = "Grafana OnCall"
license = "AGPL-3.0"
language= "Python"
url     = "https://github.com/grafana/oncall"

[parity]
ratio       = 0.0        # honest: 0.0 means upstream parity NOT yet measured
last_audit  = "2026-05-12"
infra_only  = false
[module]
name        = "cave-incidents"
description = "Incident management — Grafana OnCall replacement"
source_root = "src"

