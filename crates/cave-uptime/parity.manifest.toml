# parity.manifest.toml — cave-uptime
# Upstream: louislam/uptime-kuma  https://github.com/louislam/uptime-kuma
# Skeleton generated by cave parity init — fill in the mapping sections

[upstream]
org     = "louislam"
repo    = "uptime-kuma"
version = "v1.23.0"

[module]
name        = "cave-uptime"
description = "Uptime monitoring — Uptime Kuma replacement"
source_root = "src"

