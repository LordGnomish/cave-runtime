# parity.manifest.toml — cave-gitops-config
# Upstream: fluxcd/flux2  https://github.com/fluxcd/flux2
# Skeleton generated by cave parity init — fill in the mapping sections

[upstream]
org     = "fluxcd"
repo    = "flux2"
version = "v2.1.0"

[module]
name        = "cave-gitops-config"
description = "GitOps configuration — Flux replacement"
source_root = "src"

# ── File mappings ────────────────────────────────────────────────────────────
# [[files]]
# upstream = "path/in/upstream/repo.go"
# local    = "src/local.rs"

# ── Function mappings ────────────────────────────────────────────────────────
# [[functions]]
# upstream_name = "UpstreamFunc"
# local_name    = "local_fn"
# file          = "src/routes.rs"

# ── Test mappings ────────────────────────────────────────────────────────────
# [[tests]]
# upstream_test = "TestUpstreamFunc"
# local_test    = "test_local_fn"

# ── Surface mappings ─────────────────────────────────────────────────────────
# [[surfaces]]
# kind          = "http"
# upstream_path = "/api/upstream"
# local_path    = "/api/gitops-config/endpoint"
