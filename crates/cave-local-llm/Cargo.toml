[package]
name = "cave-local-llm"
description = "Cave Local LLM — offline draft-generation daemon using Ollama (Qwen 2.5 Coder)"
version.workspace = true
edition.workspace = true
license.workspace = true

[[bin]]
name = "cave-local-llm"
path = "src/bin/cave-local-llm.rs"

[[bin]]
name = "cave-local-llm-daemon"
path = "src/bin/cave-local-llm-daemon.rs"

[dependencies]
cave-kernel = { path = "../cave-kernel" }
tokio = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
serde_yaml = { workspace = true }
toml = { workspace = true }
reqwest = { workspace = true, features = ["stream"] }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
thiserror = { workspace = true }
anyhow = { workspace = true }
clap = { workspace = true, features = ["env"] }
chrono = { workspace = true }
uuid = { workspace = true }
prometheus-client = { workspace = true }
futures = { workspace = true }
tokio-util = { workspace = true }
bytes = { workspace = true }
fs2 = "0.4"

[dev-dependencies]
tokio = { workspace = true }
axum = { workspace = true }
serde_json = { workspace = true }
tempfile = "3"
