# parity.manifest.toml — cave-lint
# Upstream: SonarSource/sonarqube  https://github.com/SonarSource/sonarqube
# Skeleton generated by cave parity init — fill in the mapping sections

[upstream]
org     = "SonarSource"
repo    = "sonarqube"
version = "v10.3.0"
source_sha = "v10.3.0"  # G1: tag-based pin (deep-port may override)
name    = "SonarQube"
license = "LGPL-3.0"
language= "Java"
url     = "https://github.com/SonarSource/sonarqube"
[module]
name        = "cave-lint"
description = "Code quality — SonarQube replacement"
source_root = "src"

# ── File mappings ────────────────────────────────────────────────────────────
# [[files]]
# upstream = "path/in/upstream/repo.go"
# local    = "src/local.rs"

# ── Function mappings ────────────────────────────────────────────────────────
# [[functions]]
# upstream_name = "UpstreamFunc"
# local_name    = "local_fn"
# file          = "src/routes.rs"

# ── Test mappings ────────────────────────────────────────────────────────────
# [[tests]]
# upstream_test = "TestUpstreamFunc"
# local_test    = "test_local_fn"

# ── Surface mappings ─────────────────────────────────────────────────────────
# [[surfaces]]
# kind          = "http"
# upstream_path = "/api/upstream"
# local_path    = "/api/lint/endpoint"

[parity]
infra_only = true
ratio       = 0.0        # honest: 0.0 means upstream parity NOT yet measured
last_audit  = "2026-05-12"

