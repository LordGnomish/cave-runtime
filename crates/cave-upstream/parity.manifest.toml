# parity.manifest.toml — cave-upstream
# Upstream: cave-runtime/cave-runtime  https://github.com/cave-runtime/cave-runtime
# Skeleton generated by cave parity init — fill in the mapping sections

[upstream]
org     = "cave-runtime"
repo    = "cave-runtime"
version = "v0.1.0"


[parity]
ratio       = 0.0        # honest: 0.0 means upstream parity NOT yet measured
last_audit  = "2026-05-12"
infra_only  = true
[module]
name        = "cave-upstream"
description = "Upstream version tracking"
source_root = "src"

# ── File mappings ────────────────────────────────────────────────────────────
# [[files]]
# upstream = "path/in/upstream/repo.go"
# local    = "src/local.rs"

# ── Function mappings ────────────────────────────────────────────────────────
# [[functions]]
# upstream_name = "UpstreamFunc"
# local_name    = "local_fn"
# file          = "src/routes.rs"

# ── Test mappings ────────────────────────────────────────────────────────────
# [[tests]]
# upstream_test = "TestUpstreamFunc"
# local_test    = "test_local_fn"

# ── Surface mappings ─────────────────────────────────────────────────────────
# [[surfaces]]
# kind          = "http"
# upstream_path = "/api/upstream"
# local_path    = "/api/upstream/endpoint"
