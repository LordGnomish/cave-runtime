# parity.manifest.toml — cave-compliance
# Upstream: open-policy-agent/gatekeeper  https://github.com/open-policy-agent/gatekeeper
# Skeleton generated by cave parity init — fill in the mapping sections

[upstream]
org     = "open-policy-agent"
repo    = "gatekeeper"
version = "v3.14.0"

[module]
name        = "cave-compliance"
description = "Policy compliance — OPA/Gatekeeper replacement"
source_root = "src"

