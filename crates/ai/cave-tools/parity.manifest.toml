# parity.manifest.toml — cave-tools
# Primary upstream: modelcontextprotocol/modelcontextprotocol  https://github.com/modelcontextprotocol/modelcontextprotocol
#   spec revision 2025-11-25 (schema/2025-11-25/schema.ts)
# Reference patterns (NOTICE): OpenAI Function Calling wire format + LangChain
#   tool framework (MIT, Copyright LangChain Inc.).
#
# cave-tools is the Cave runtime's LLM tool-calling framework. It ports the
# *tool* half of the Model Context Protocol — the Tool object, JSON Schema
# argument validation, and the JSON-RPC server methods (initialize /
# tools/list / tools/call) — and layers on the host-side concerns MCP delegates
# to implementors (per-tool/per-user authorization, a tamper-evident audit
# log) plus the affordances production tool stacks need (sandboxed built-ins,
# streaming + batch execution, semantic tool search) and OpenAI/LangChain
# interop adapters.
#
# Scope boundary (see [[skipped]]): cave-tools owns *tools*. The MCP Resources
# and Prompts primitives, the client-side features (sampling/roots/elicitation),
# the wire transports (stdio/HTTP+SSE), and authorization/OAuth are out of
# scope — owned by sibling crates or by the host — and are ADR-justified skips,
# not unmapped gaps.

[upstream]
org         = "modelcontextprotocol"
repo        = "modelcontextprotocol"
version     = "2025-11-25"
name        = "Model Context Protocol"
license     = "MIT"
language    = "TypeScript"
url         = "https://github.com/modelcontextprotocol/modelcontextprotocol"
source_sha  = "2025-11-25"

[parity]
parity_ratio_source = "manifest"
fill_ratio          = 0.875
honest_ratio        = 0.875
adr_justified_ratio = 1.0      # all 8 skipped subsystems are out-of-scope by ADR (sibling-crate- or host-owned); the 4 partials are the honest in-scope gaps
adr_justification   = "ADR-RUNTIME-PARITY-100-PCT-001, ADR-RUNTIME-STACK-001"
last_audit          = "2026-05-31"
infra_only          = false
mapped_count        = 28
partial_count       = 4
skipped_count       = 8
unmapped_count      = 0
total               = 40       # 28 + 4 + 8 + 0 = 40

# honest_ratio derivation (Charter v2 honest measurement):
#   In-scope subsystems  = mapped + partial + unmapped = 28 + 4 + 0 = 32
#   Fully mapped         = 28
#   28 / 32              = 0.875
# The 8 [[skipped]] subsystems are excluded from the denominator: each is a
# documented out-of-scope boundary (adr_justified_ratio = 1.0), not an
# unfinished obligation. honest_ratio therefore rises ONLY by converting a
# partial → mapped, never by reclassifying a real gap as skipped.
#
# impl LOC (src/, excludes tests/ which are integration tests):
#   error 67 · tool 266 · schema 204 · mcp 164 · permission 177 · audit 198 ·
#   builtin 553 · streaming 157 · batch 200 · search 148 · adapters 114 ·
#   lib 65  ──  2313 impl LOC, 1138 test LOC across 10 RED→GREEN cycles.

[module]
name        = "cave-tools"
description = "LLM tool-calling framework — Tool trait + JSON Schema validation, MCP server, sandboxed built-ins, permissions, audit, streaming, batch, semantic search, OpenAI/LangChain adapters"
source_root = "src"

