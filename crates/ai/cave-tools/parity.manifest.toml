# ── Partials (honest in-scope gaps) ─────────────────────────────────────────

[[partial]]
name     = "tool.Content block types"
upstream = "schema.ts:TextContent | ImageContent | AudioContent | EmbeddedResource"
local    = "src/tool.rs:Content (Text only)"
note     = "Only text content blocks are modelled; image/audio/embedded-resource blocks are deferred until a Cave modality pipeline needs them. The Content enum is the single extension point."

[[partial]]
name     = "builtin.code_exec execution surface"
upstream = "general code-execution tool (subprocess / WASM sandbox)"
local    = "src/builtin.rs:eval_arithmetic"
note     = "Ships a pure no-IO arithmetic evaluator as the safe sandbox MVP. General code execution (subprocess, WASM, language runtimes) is deferred to a hardened executor crate; the FnTool wiring is unchanged when it lands."

[[partial]]
name     = "search.ToolSearchIndex ranking backend"
upstream = "embedding-vector semantic tool selection"
local    = "src/search.rs:ToolSearchIndex (TF-IDF lexical)"
note     = "Lexical TF-IDF cosine ranking, deterministic and dependency-free. An embedding-backed index is hot-swappable behind the same search() API once cave-search exposes a vector store."

[[partial]]
name     = "mcp.tools listChanged notifications"
upstream = "server/tools notifications/tools/list_changed"
local    = "src/mcp.rs:initialize (capabilities.tools.listChanged = false)"
note     = "The capability is negotiated (advertised false). Emitting live list_changed notifications needs a mutable/observed registry + a transport push channel, deferred with the transport layer."

# ── Skipped (ADR-justified out-of-scope) ────────────────────────────────────

[[skipped]]
name   = "MCP Resources primitive (resources/list, resources/read, subscriptions)"
reason = "cave-tools owns *tools*. The Resources primitive (context/data exposure) is a separate MCP feature; if the runtime needs it, it belongs in a dedicated resources crate, not the tool-calling framework."

[[skipped]]
name   = "MCP Prompts primitive (prompts/list, prompts/get)"
reason = "Templated prompt/workflow messages are a distinct MCP feature owned by cave-hermes' prompt assembly (src/prompt.rs), not by the tool framework."

[[skipped]]
name   = "MCP client features (sampling, roots, elicitation)"
reason = "These are capabilities a host/client offers to servers (server-initiated LLM calls, filesystem roots, user prompts). cave-tools is the server/tool side; client features belong to the host runtime."

[[skipped]]
name   = "MCP transport layer (stdio, Streamable HTTP + SSE)"
reason = "McpServer is deliberately transport-agnostic (handle(Value)->Option<Value>). Wiring stdio/HTTP/SSE framing is owned by the host (cave-runtime route mount / a CLI bridge), keeping the core testable."

[[skipped]]
name   = "MCP authorization / OAuth 2.1 resource-server flow"
reason = "Authentication and token issuance are owned by cave-auth / cave-vault. The permission layer here is the host-side per-user/per-tool policy that runs *after* the caller identity is established."

[[skipped]]
name   = "Live web-search backend (HTTP client + result parsing)"
reason = "web_search takes an injected WebSearchProvider so the framework opens no sockets. A concrete backend belongs in cave-search; the trait is the seam."

[[skipped]]
name   = "Persistent audit sink (database / on-disk JSONL)"
reason = "AuditLog is an in-memory hash-chained ledger. Durable persistence + retention is owned by cave-store / observability; the hash chain is the integrity contract a sink preserves."

[[skipped]]
name   = "Concurrent / async batch fan-out"
reason = "BatchExecutor is synchronous and deterministic (topo order). Parallel fan-out across a tokio runtime is a host-runtime concern layered on the same DAG; the sequential semantics are the spec the parallel version must match."
