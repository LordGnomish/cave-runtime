reason = "Planner::decompose is the offline heuristic fallback; LLM-driven goal→tool-DAG decomposition is delegated to cave-llm-gateway (no live model in this crate)."

[[partial]]
name   = "llm-driven-self-tuner"
src    = "src/tune.rs"
reason = "propose() is the deterministic guard-rail policy that bounds any tuner; the tuning-LLM prompt+call is delegated to cave-llm-gateway."

[[partial]]
name   = "semantic-recall"
src    = "src/memory.rs"
reason = "recall() is a deterministic substring scan; embedding-backed semantic recall is delegated to cave-search."

# ── skipped (ADR-justified scope cuts to owning crates) ─────────────────────
[[skipped]]
name   = "hardware-energy-sampling"
reason = "RAPL / battery-counter sampling is host/OS-owned; RunMetrics energy is caller-supplied."

[[skipped]]
name   = "live-io-tools"
reason = "bash / file / web-fetch side-effecting tools and their sandbox live in cave-hermes; cave-agent ships only pure built-ins."

[[skipped]]
name   = "remote-signed-patch-fetch"
reason = "network fetch + signature verification of patch bundles is delegated to cave-vault (secrets) and cave-sign (sigstore); hotpatch is the in-process apply engine."

[[skipped]]
name   = "otlp-prometheus-scrape"
reason = "live telemetry ingestion is owned by cave-metrics; observe consumes already-collected sample windows."

[[skipped]]
name   = "changelog-network-fetch"
reason = "fetching the upstream CHANGELOG over HTTP is owned by cave-upstream / cave-changelog; this crate is the pure parser+diff."

[[skipped]]
name   = "persistent-conversation-store"
reason = "on-disk / sqlite transcript persistence is owned by cave-hermes / cave-store; ConversationMemory is in-process."

[[skipped]]
name   = "thread-fanout-scheduler"
reason = "true OS-thread parallel tool execution is owned by the host runtime; Pattern::Parallel has array semantics, sequential evaluation."
