# parity.manifest.toml — cave-agent
# Upstream: open-jarvis/OpenJarvis  https://github.com/open-jarvis/OpenJarvis  pinned v2026.5.20
#
# cave-agent ports the *control-plane* surface of OpenJarvis — the composable
# on-device agent primitives plus the self-improvement loop mandated by
# ADR-SELF-IMPROVE-001 — to dependency-light Rust:
#
#   OpenJarvis primitives
#     - tool registry + pure built-in tools (calc / str_upper / str_len)
#     - conversation memory (windowing, budget eviction, keyword recall)
#     - plan-and-execute loop (decompose, step state machine, replan)
#     - evaluation tools (energy / latency / cost / accuracy scoring + fleets)
#     - composable patterns (Tool / Chain / Parallel / Fallback / Retry)
#   Self-improvement loop
#     - observability analysis (summary stats + z-score regression)
#     - self-tuning policy (observation -> knob proposals -> apply)
#     - upstream changelog watch (semver compare, classify, actionable diff)
#     - hot-patch ingestion (checksum stage / apply / rollback / audit)
#
# The 4-track Charter v2 surface (Backend + Portal + cavectl + Observability):
# Backend, a self-contained /admin/agent Portal page, and the `cavectl agent`
# subcommand all ship in this wave. Live-side concerns (hardware energy
# sampling, real IO tools, remote signed-patch fetch, OTLP scrape, on-disk
# conversation store, OS thread fan-out) are scope-cut to the owning crates and
# documented as [[skipped]] below.

[upstream]
org         = "open-jarvis"
repo        = "OpenJarvis"
version     = "v2026.5.20"
name        = "OpenJarvis"
license     = "Apache-2.0"
language    = "Python"
url         = "https://github.com/open-jarvis/OpenJarvis"
source_sha  = "v2026.5.20"

[parity]
parity_ratio_source = "manifest"
fill_ratio          = 0.6552
honest_ratio        = 0.6552
adr_justified_ratio = 1.0      # all 7 skips delegate a live-side concern to an
                               # owning crate (host/OS, cave-hermes, cave-vault,
                               # cave-sign, cave-metrics, cave-store, cave-search)
                               # and all 3 partials keep an honest control-plane
                               # core with the LLM/embedding half delegated.
adr_justification   = "ADR-SELF-IMPROVE-001, ADR-RUNTIME-STACK-001"
last_audit          = "2026-06-01"
infra_only          = false
mapped_count        = 19
partial_count       = 3
skipped_count       = 7
unmapped_count      = 0
total               = 29       # 19 + 3 + 7 + 0 = 29

# fill_ratio derivation (Charter v2 honest measurement):
#   mapped / total = 19 / 29 = 0.6552
# Subsystem-coverage framing (not LOC), since OpenJarvis is a Python upstream
# and this is a clean-room control-plane port. Partials are counted as skipped
# for the ratio — i.e. the ratio reports only fully-mapped subsystems, so it is
# a floor, never inflated. impl LOC ≈ 1681 (src/, excluding #[cfg(test)]),
# 873 LOC of strict-TDD tests, 92 tests green.

