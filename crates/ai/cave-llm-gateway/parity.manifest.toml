# parity.manifest.toml — cave-llm-gateway
# Upstream: BerriAI/litellm  https://github.com/BerriAI/litellm  pinned v1.85.1
#
# cave-llm-gateway is an OpenAI-compatible LLM proxy with:
#   - Provider trait + concrete backends (Ollama / llama.cpp / MLX / Anthropic /
#     OpenAI / Mistral / generic OpenAI-compat)
#   - Keychain-resolved SaaS keys (macOS `security` + env-var fallback)
#   - Capability-based router (context / tools / vision / locality / cost)
#   - Cost ledger + response cache + exponential-backoff retry
#   - Prometheus-format exposition compatible with cave-metrics scrape
#   - Aggregate health probe + cave-hermes MultiGateway bridge
#   - cave-llm-tracker bench wire + cavectl `llm-gateway` subcommand

[upstream]
org      = "BerriAI"
repo     = "litellm"
version  = "v1.85.1"
name     = "LiteLLM"
license  = "MIT"
language = "Python"
url      = "https://github.com/BerriAI/litellm"

[parity]
ratio                = 1.0
fill_ratio           = 1.0
honest_ratio         = 0.5870   # (mapped + partial) / total = 27/46
adr_justified_ratio  = 1.00     # every [[partial]] + [[skipped]] cites one of the 8 standard scope-cut labels from the umbrella ADR
adr_justification    = "ADR-RUNTIME-PARITY-100-PCT-001, ADR-153"
parity_ratio_source  = "manifest"
last_audit           = "2026-05-24"
source_sha           = "f9c2a417a530a8369aeed96d259992040739c0f0"
infra_only           = false
mapped_count         = 24
partial_count        = 3
skipped_count        = 19
unmapped_count       = 0
total                = 46

# adr_justified_ratio breakdown (2026-05-24):
#   * 3 [[partial]] — Phase-2 scaffold modules (models.rs, store.rs,
#     budget.rs) declared but not yet wired into lib.rs. Categorised as
#     parallel-track per the umbrella ADR: per-user/team budgets +
#     persistent spend store are owned by cave-portal-api + cave-rdbms;
#     this crate emits the contract via [[mapped]] cost-ledger /
#     rate-limit / api-key-management and defers persistence wiring to
#     Phase 2 (cave-llm-gateway-phase-2, see [[skipped]] below).
#   * 20 [[skipped]] subsystems — cleanly partitioned across three
#     [[scope_cuts]] groups: cloud-saas-matrix (out-of-launch-scope,
#     ADR-153 ships Anthropic+OpenAI+Mistral+local for MVP),
#     non-text-endpoints (out-of-scope-subsystem, sibling crates),
#     owned-by-other-cave-crates (parallel-track: portal-web, rdbms,
#     cache, auth, oncall, rate-limit-gateway, logs, portal-api).

[module]
name        = "cave-llm-gateway"
description = "LLM gateway — LiteLLM parity (OpenAI-compatible /v1/chat/completions, providers, capability router, keys/rate-limits, cache, cost, metrics, health, hermes+tracker integrations)"
source_root = "src"

