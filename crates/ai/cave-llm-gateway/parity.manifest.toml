           "provider-together-fireworks",
           "provider-replicate-huggingface", "provider-groq-deepseek"]
reason  = "Phase 2 — keep MVP focused on Anthropic + OpenAI + Mistral SaaS plus all three local backends"

[[scope_cuts]]
group   = "non-text-endpoints"
members = ["endpoint-audio", "endpoint-images", "endpoint-embeddings-rerank", "endpoint-batch"]
reason  = "MVP is chat-completions only; audio/image/embeddings/batch ship as sibling crates"

[[scope_cuts]]
group   = "owned-by-other-cave-crates"
members = ["admin-ui", "spend-store-postgres", "cache-redis-back-end",
           "auth-sso-oidc", "auth-scim-provisioning", "notifications-slack-discord",
           "rate-limit-parallel-request", "log-store-multi-backend", "team-management"]
reason  = "Cave runtime already owns these capabilities — gateway just emits/consumes the contract"

