# parity.manifest.toml — cave-etcd
# Upstream: etcd v3.5.13  https://github.com/etcd-io/etcd

[upstream]
org     = "etcd-io"
repo    = "etcd"
version = "v3.5.13"

[module]
name        = "cave-etcd"
description = "etcd v3 API reimplementation with MVCC, watch, leases, transactions, auth, cluster, maintenance"
source_root = "src"

# ── File mappings ────────────────────────────────────────────────────────────
# upstream path (relative to etcd repo root) → local path (relative to this crate root)

[[files]]
upstream = "server/etcdserver/api/v3rpc/kv.go"
local    = "src/routes.rs"

[[files]]
upstream = "server/etcdserver/api/v3rpc/watch.go"
local    = "src/routes.rs"

[[files]]
upstream = "server/etcdserver/api/v3rpc/lease.go"
local    = "src/routes.rs"

[[files]]
upstream = "server/etcdserver/api/v3rpc/auth.go"
local    = "src/routes.rs"

[[files]]
upstream = "server/etcdserver/api/v3rpc/maintenance.go"
local    = "src/routes.rs"

[[files]]
upstream = "server/etcdserver/api/v3rpc/cluster.go"
local    = "src/routes.rs"

[[files]]
upstream = "server/mvcc/kvstore.go"
local    = "src/store.rs"

[[files]]
upstream = "server/mvcc/backend/backend.go"
local    = "src/store.rs"

[[files]]
upstream = "server/auth/store.go"
local    = "src/store.rs"

