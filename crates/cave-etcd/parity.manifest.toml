# parity.manifest.toml — cave-etcd
# Upstream: etcd v3.6.10  https://github.com/etcd-io/etcd
# Bumped from v3.6.0 in feat/cave-etcd-deeper-002.

[upstream]
org      = "etcd-io"
repo     = "etcd"
version  = "v3.6.10"
name     = "etcd"
license  = "Apache-2.0"
language = "Go"
url      = "https://github.com/etcd-io/etcd"

[parity]
# Package-level inventory (see [[mapped]]/[[skipped]]/[[unmapped]] below):
#   fill_ratio = (mapped + skipped) / total
# On 2026-05-12 the audit-doc self-reported 1.0 was replaced with a
# measured value: every etcd v3.6.x top-level package was enumerated
# and classified honestly. WAL was newly ported in this pass.
# See docs/parity/cave-etcd-port-2026-05-12.md for methodology.
mapped_count   = 28
partial_count  = 2
skipped_count  = 35
unmapped_count = 6
total          = 71
fill_ratio     = 0.9155
honest_ratio   = 0.8873
last_audit     = "2026-05-12"
infra_only     = false

[module]
name          = "cave-etcd"
description   = "etcd v3 API reimplementation with MVCC, watch, leases, transactions, auth, cluster, maintenance"
source_root   = "src"
target_tests = 30        # qwen-pump B-prime target (#[test] count in tests/qwen_drafted.rs); below this, B-prime fires
pump_priority = "HIGH"  # charter-critical 7 — distributed KV foundation under cave-apiserver

# ── File mappings ────────────────────────────────────────────────────────────
# upstream path (relative to etcd repo root) → local path (relative to this crate root)

[[files]]
upstream = "server/etcdserver/api/v3rpc/kv.go"
