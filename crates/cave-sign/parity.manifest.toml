# parity.manifest.toml — cave-sign
# Upstream: sigstore/cosign  https://github.com/sigstore/cosign  pinned v3.0.6
# Upstream (lib): sigstore/sigstore  https://github.com/sigstore/sigstore  pinned v1.10.6
# Charter v2 deep-port close 2026-05-22.
#
# cave-sign is the cave-runtime artifact-signing engine. It implements the
# cosign command surface (sign / verify / attest / verify-attestation /
# policy / fulcio / rekor) on top of pure-Rust ECDSA P-256 + Ed25519 +
# SHA-256 + a self-contained Merkle transparency log. Public-good Sigstore
# (fulcio.sigstore.dev + rekor.sigstore.dev) and sovereign cave-fulcio +
# cave-rekor deployments are both supported via SigningConfig.
#
# MVP scope (mapped + partial + scope_cuts):
#   - Keypair generate / import / public-key export (P-256 + Ed25519)
#   - Keyless sign coordinator (OIDC -> Fulcio -> Rekor)
#   - Blob sign + verify
#   - OCI image sign + verify (manifest digest envelope)
#   - Rekor HTTP client + in-memory log + Merkle inclusion proof
#   - Fulcio HTTP client + offline mock issuance
#   - in-toto Statement v1 + DSSE envelope + SLSA Provenance v1 + OpenVEX 0.2.0
#   - cert-identity (glob) / cert-issuer (exact) / require-rekor / require-keyless policy DSL
#   - Cosign bundle (.sig + .pem + .bundle JSON) + triple emit
#   - SCT presence check
#   - TrustedRoot parse + cave-default builder
#   - SigningConfig (public-good vs sovereign)
#   - Verification orchestrator (signature -> tlog -> policy)
#
# Out of MVP (skipped / Phase 2 — see [[scope_cuts]] + [[skipped]]):
#   - Hardware keys: PIV / YubiKey / pkcs11 / SmartCard
#   - Cloud KMS: AWS / Azure / GCP / HashiCorp Vault transit / KeyVault
#   - TUF bootstrap + full TUF root rotation
#   - CT-log live verification (signed certificate timestamp signature check)
#   - dockerfile / manifest / tree / triangulate / copy / clean side commands
#   - TSA (RFC 3161) timestamp authority
#   - Sigstore protobuf bundle v0.3 envelope (we ship the cosign JSON bundle)
#   - Fuzz harness (deferred to workspace `cargo-fuzz` job)

[upstream]
org        = "sigstore"
repo       = "cosign"
version    = "v3.0.6"
name       = "Sigstore Cosign"
license    = "Apache-2.0"
language   = "Go"
url        = "https://github.com/sigstore/cosign"
source_sha = "f1ad3ee952313be5d74a49d67ba0aa8d0d5e351f"

# Companion library — sigstore/sigstore — also pinned for the keys/signature
# primitives we re-implement (verifiers, keypair PEM, attestation DSSE).
[[upstreams]]
org        = "sigstore"
repo       = "sigstore"
version    = "v1.10.6"
license    = "Apache-2.0"
language   = "Go"
url        = "https://github.com/sigstore/sigstore"
source_sha = "311895e7870187320e47337734a9c321c0a8819c"

[parity]
parity_ratio_source = "manifest"
fill_ratio          = 0.9487
honest_ratio        = 0.5385
last_audit          = "2026-05-22"
infra_only          = false
mapped_count        = 20
partial_count       = 1
skipped_count       = 16
unmapped_count      = 2
total               = 39

# 2026-05-22 Charter v2 deep-port — claude/cave-sign-2026-05-22:
#   * Pre-port scaffold was 4 files / ~5 KB / `parity.ratio = 0.0`.
#   * Deep-port replaced the scaffold with 20 src/ modules implementing
#     keypair + keyless + Fulcio + Rekor + DSSE + SLSA + OpenVEX + bundle
#     + OCI + policy + tlog + sct + trustedroot + signing_config + verify
#     + store + routes + engine + signature + error.
#   * Subsystem-count formula: fill_ratio = (mapped + partial + skipped) / total
#     = (20 + 1 + 16) / 39 = 0.9487.
#   * honest_ratio = (mapped + partial) / total = 21 / 39 = 0.5385 — reflects
#     that 16 cosign subsystems (hardware keys, cloud KMS, TUF, side
#     commands) are honestly cut to Phase 2, not silently absent.
#   * source_sha pinned to cosign v3.0.6 commit
#     f1ad3ee952313be5d74a49d67ba0aa8d0d5e351f.
#   * Companion sigstore/sigstore v1.10.6 commit
#     311895e7870187320e47337734a9c321c0a8819c.

[module]
name        = "cave-sign"
description = "Artifact signing & verification — Sigstore Cosign reimplementation (keypair + keyless + Fulcio + Rekor + SLSA attestation + policy)"
source_root = "src"

# ─── Mapped subsystems (20) ─────────────────────────────────────────────────

[[mapped]]
name = "keypair-generate-import"
upstream = "cmd/cosign/cli/generate_key_pair.go + importkeypair"
note = "P-256 + Ed25519 keypair generation, deterministic-from-seed, public/private PEM encode + decode. src/keypair.rs + src/signature.rs."

[[mapped]]
name = "blob-sign"
upstream = "cmd/cosign/cli/signblob.go"
note = "cosign sign-blob — hashed-rekord blob signing, ECDSA P-256 + Ed25519. src/blob.rs::sign_blob_keypair."

[[mapped]]
name = "blob-verify"
upstream = "cmd/cosign/cli/verifyblob"
note = "cosign verify-blob — digest check + signature verify against bundle PEM. src/blob.rs::verify_blob."

[[mapped]]
name = "oci-image-sign"
upstream = "pkg/cosign/sign + pkg/oci/static + cmd/cosign/cli/sign"
note = "OCI image signature envelope: simplesigning v1 payload + cosign signature-layer annotations. src/oci.rs::sign_image_keypair."

[[mapped]]
name = "oci-image-verify"
upstream = "pkg/cosign/verify.go + pkg/cosign/verify_oci"
note = "OCI image verify — digest+payload reconstruction. src/oci.rs::verify_image."

[[mapped]]
name = "keyless-sign-orchestrator"
upstream = "pkg/cosign/keyless_sign.go + cmd/cosign/cli/sign keyless path"
note = "OIDC -> Fulcio -> Rekor flow: ephemeral keypair + CSR proof-of-possession + cert -> sign -> tlog upload. src/keyless.rs."

[[mapped]]
name = "fulcio-csr-client"
upstream = "pkg/cosign/fulcioverifier + cmd/cosign/cli/fulcio"
note = "Fulcio HTTP v2 client (signingCert) + offline mock issuer + CSR proof-of-possession verifier. src/fulcio.rs."

[[mapped]]
name = "rekor-hashedrekord-client"
upstream = "cmd/cosign/cli/rekor + pkg/cosign/tlog.go + sigstore/rekor"
note = "Rekor HTTP v1 client + in-memory log + Merkle inclusion proof + tree state. src/rekor.rs."

[[mapped]]
name = "in-toto-statement"
upstream = "pkg/cosign/attestation + in-toto-attestation"
note = "in-toto Statement v1 envelope + Subject + predicateType URI roundtrip. src/attestation.rs::InTotoStatement."

[[mapped]]
name = "dsse-envelope"
upstream = "github.com/secure-systems-lab/go-securesystemslib/dsse"
note = "DSSE PAE + sign + verify, multiple signatures (any-passes verify). src/attestation.rs::DsseEnvelope + sign_attestation + verify_envelope."

[[mapped]]
name = "slsa-provenance-v1"
upstream = "pkg/cosign/attestation/predicates (slsa) + cmd/cosign/cli/attest"
note = "SLSA Provenance v1 predicate builder (buildDefinition + runDetails). src/attestation.rs::build_slsa_provenance."

[[mapped]]
name = "openvex-predicate"
upstream = "pkg/cosign/attestation/predicates (vex)"
note = "OpenVEX 0.2.0 predicate builder + VexStatement + 4 statuses. src/attestation.rs::build_vex_predicate."

[[mapped]]
name = "cosign-bundle"
upstream = "pkg/cosign/bundle/bundle.go"
note = "Cosign JSON bundle envelope: sig + cert + chain + rekor entry, plus `triple` (.sig/.crt/.bundle) emit. src/bundle.rs."

[[mapped]]
name = "tlog-binding-verify"
upstream = "pkg/cosign/tlog.go::VerifyTLogEntry"
note = "Verify a bundle's claimed rekor entry: digest/sig/cert/uuid/time consistency + witness. src/tlog.rs."

[[mapped]]
name = "policy-cert-identity"
upstream = "cmd/cosign/cli/verify --certificate-identity[-regexp]"
note = "Glob-anchored identity matcher (* wildcard, anchored both ends) + cert claims extractor. src/policy.rs::CertificateIdentity + glob_match."

[[mapped]]
name = "policy-cert-issuer"
upstream = "cmd/cosign/cli/verify --certificate-oidc-issuer"
note = "Exact-match issuer rule. src/policy.rs::CertificateIssuer."

[[mapped]]
name = "policy-require-rekor"
upstream = "cmd/cosign/cli/verify --insecure-ignore-tlog negation"
note = "RequireRekorEntry + RequireKeyless rules — gate signatures by tlog presence + signature kind. src/policy.rs."

[[mapped]]
name = "trusted-root"
upstream = "pkg/cosign/trustedroot + cmd/cosign/cli/trustedroot"
note = "trusted_root.json parse + cave-default builder + validity-range lookup. src/trustedroot.rs."

[[mapped]]
name = "signing-config"
upstream = "cmd/cosign/cli/signingconfig"
note = "Public-good vs sovereign signing config + CAVE_SIGN_* env overrides. src/signing_config.rs."

[[mapped]]
name = "verify-orchestrator"
upstream = "pkg/cosign/verifiers.go + pkg/cosign/verify.go"
note = "Top-level Verify(payload, bundle, rekor?, policy?) — chains signature/digest, rekor binding, policy, returning VerifyResult. src/verify.rs."

# ─── Partial subsystems (1) ─────────────────────────────────────────────────

[[partial]]
name = "sct-presence-check"
upstream = "pkg/cosign/verify_sct.go + pkg/cosign/ctlog.go"
note = "We parse + sanity-check Sigstore SCT (presence + structural decode) but defer signature verification against the CT log public keys to Phase 2 (cave-ctlog). Mock SCT decodes to known shape. src/sct.rs."
phase_2_owner = "cave-ctlog"

