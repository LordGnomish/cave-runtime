# parity.manifest.toml — cave-sign
# Upstream: sigstore/sigstore  https://github.com/sigstore/sigstore
# Skeleton generated by cave parity init — fill in the mapping sections

[upstream]
org     = "sigstore"
repo    = "sigstore"
version = "v1.8.0"
name    = "Sigstore"
license = "Apache-2.0"
language= "Go"
url     = "https://github.com/sigstore/sigstore"
[module]
name        = "cave-sign"
description = "Artifact signing — Sigstore replacement"
source_root = "src"

# ── File mappings ────────────────────────────────────────────────────────────
# [[files]]
# upstream = "path/in/upstream/repo.go"
# local    = "src/local.rs"

# ── Function mappings ────────────────────────────────────────────────────────
# [[functions]]
# upstream_name = "UpstreamFunc"
# local_name    = "local_fn"
# file          = "src/routes.rs"

# ── Test mappings ────────────────────────────────────────────────────────────
# [[tests]]
# upstream_test = "TestUpstreamFunc"
# local_test    = "test_local_fn"

# ── Surface mappings ─────────────────────────────────────────────────────────
# [[surfaces]]
# kind          = "http"
# upstream_path = "/api/upstream"
# local_path    = "/api/sign/endpoint"

[parity]
infra_only = true
ratio       = 0.0        # honest: 0.0 means upstream parity NOT yet measured
last_audit  = "2026-05-12"

