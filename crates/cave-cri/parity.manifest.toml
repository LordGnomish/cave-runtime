# parity.manifest.toml — cave-cri
# Primary upstream: containerd v2.2.3 (latest stable, 2025-04-14).
# Secondary upstream: opencontainers/runc v1.4.2 (latest stable, 2025-04-03).
#
# The deeper-002 batch lifts the runtime surface so the OCI bundle, cgroup
# v2 writes, registry Bearer-challenge auth, and exec/attach byte transport
# match the API shape of these two pinned versions exactly.

[upstream]
org     = "containerd"
repo    = "containerd"
version = "v2.2.3"

[[secondary_upstreams]]
org     = "opencontainers"
repo    = "runc"
version = "v1.4.2"
notes   = "OCI runtime spec generation + cgroup v2 writer — see libcontainer/cgroups/fs2/."

[parity]
# Package-level inventory (see [[mapped]]/[[skipped]]/[[unmapped]] below):
#   fill_ratio = (mapped + skipped) / total
# On 2026-05-12 the audit-doc self-reported 1.0 was replaced with a
# measured value: containerd v2.2.x pkg/cri/* + core/* + plugins/*
# packages enumerated and classified honestly.
# See docs/parity/cave-cri-port-2026-05-12.md for methodology.
mapped_count   = 17
skipped_count  = 11
unmapped_count = 6
total          = 34
fill_ratio     = 0.8235
last_audit     = "2026-05-12"
infra_only     = false

[module]
name          = "cave-cri"
description   = "containerd CRI reimplementation — 42 endpoints covering container lifecycle, images, sandboxes, snapshots"
source_root   = "src"
target_tests = 30        # qwen-pump B-prime target (#[test] count in tests/qwen_drafted.rs); below this, B-prime fires
pump_priority = "HIGH"  # charter-critical 7 — container runtime interface

