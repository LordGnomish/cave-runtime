# parity.manifest.toml — cave-cri
# Upstream: containerd v1.7.0  https://github.com/containerd/containerd

[upstream]
org     = "containerd"
repo    = "containerd"
version = "v1.7.0"

[module]
name        = "cave-cri"
description = "containerd CRI reimplementation — 42 endpoints covering container lifecycle, images, sandboxes, snapshots"
source_root = "src"

# ── File mappings ────────────────────────────────────────────────────────────

[[files]]
upstream = "pkg/cri/server/service.go"
local    = "src/routes.rs"

[[files]]
upstream = "pkg/cri/server/container_create.go"
local    = "src/runtime.rs"

[[files]]
upstream = "pkg/cri/server/container_start.go"
local    = "src/runtime.rs"

[[files]]
upstream = "pkg/cri/server/container_stop.go"
local    = "src/runtime.rs"

[[files]]
upstream = "pkg/cri/server/container_exec.go"
local    = "src/runtime.rs"

[[files]]
upstream = "pkg/cri/server/image_pull.go"
local    = "src/registry.rs"

[[files]]
upstream = "pkg/cri/server/sandbox_run.go"
local    = "src/runtime.rs"

[[files]]
upstream = "pkg/snapshots/snapshotter.go"
local    = "src/store.rs"

[[files]]
upstream = "pkg/oci/spec.go"
local    = "src/oci_spec.rs"

[[files]]
upstream = "pkg/cri/server/container_list.go"
local    = "src/store.rs"

[[files]]
upstream = "pkg/cri/server/runtime_handler.go"
local    = "src/runtime_handler.rs"

[[files]]
upstream = "pkg/cri/streaming/logs.go"
local    = "src/log_v2.rs"

[[files]]
upstream = "pkg/cri/server/container_log_reopen.go"
local    = "src/log_v2.rs"

[[files]]
upstream = "pkg/cri/server/container_stats.go"
local    = "src/stats.rs"

[[files]]
upstream = "pkg/cri/server/container_stats_list.go"
local    = "src/stats.rs"

[[files]]
upstream = "pkg/cri/server/imagefs_info.go"
local    = "src/stats.rs"

[[files]]
upstream = "pkg/cri/server/metrics.go"
local    = "src/stats.rs"

