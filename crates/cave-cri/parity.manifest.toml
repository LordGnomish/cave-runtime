[[skipped]]
upstream_pkg = "vendor/"
reason       = "stdlib-analog"
note         = "Vendored Go deps; Rust deps in Cargo.toml"

[[unmapped]]
upstream_pkg = "core/content/"
note         = "Content store (CAS) with garbage collection. cave-cri reads images directly from registry into rootfs.rs without a persistent CAS layer; image GC is reduced to image_gc.rs in cave-kubelet, which only knows about images-by-tag."

[[unmapped]]
upstream_pkg = "core/diff/"
note         = "Layer diff service — applies/extracts overlayfs diffs as gzipped tarballs. cave-cri shells out to tar at rootfs assembly; the diff *production* path (commit container changes back to a new layer) is not implemented."

[[unmapped]]
upstream_pkg = "core/leases/"
note         = "Resource lease tracker to prevent GC of in-use content. Tightly coupled to core/content/ above — missing for the same reason."

[[unmapped]]
upstream_pkg = "pkg/cri/server/podsandbox/sandbox_run_other.go (non-Linux)"
note         = "Windows/FreeBSD sandbox runners. cave-cri Linux-only by design; left as an honest gap rather than a skip because the Charter does not explicitly limit platform support."

[[unmapped]]
upstream_pkg = "pkg/oom/"
note         = "OOM event watcher — feeds eviction.rs in kubelet. cave-cri exits container with OOMKilled status but does not surface the kernel oom_score_adj events for cluster-level scoring."

[[unmapped]]
upstream_pkg = "core/introspection/"
note         = "containerd self-introspection API (list installed plugins + versions). cave-cri serves /healthz but not /introspection — the operator tooling that consumes it would need a cave-runtime-wide equivalent."

