local    = "src/providers/azure.rs"

[[providers.azure.files]]
upstream = "pkg/provider/azure_zones.go"
local    = "src/providers/azure_extras.rs"

[[providers.azure.files]]
upstream = "pkg/provider/azure_app_gateway.go"
local    = "src/providers/azure_extras.rs"

[[providers.azure.files]]
upstream = "pkg/provider/azure_securitygroup_repo.go"
local    = "src/providers/azure_extras.rs"

[[providers.azure.files]]
upstream = "pkg/provider/azure_managed_disk.go"
local    = "src/providers/azure_extras.rs"

[[providers.azure.files]]
upstream = "pkg/provider/azure_workload_identity.go"
local    = "src/providers/azure_extras.rs"

[[providers.azure.files]]
upstream = "pkg/provider/azure_managedclusters.go"
local    = "src/providers/azure_resources.rs"

[[providers.azure.files]]
upstream = "pkg/provider/azure_publicipaddressclient.go"
local    = "src/providers/azure_extras.rs"
