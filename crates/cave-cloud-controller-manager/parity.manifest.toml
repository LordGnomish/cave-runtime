# parity.manifest.toml — cave-cloud-controller-manager
# Tracks the kube-controller-manager → cloud-controller-manager split, plus
# two out-of-tree provider implementations (Hetzner, Azure).

[upstream]
org     = "kubernetes"
repo    = "kubernetes"
version = "v1.36.0"

[module]
name        = "cave-cloud-controller-manager"
description = "Cloud provider trait + node/service/route controllers + Hetzner & Azure provider scaffolds"
source_root = "src"

# ── In-tree (kubernetes/kubernetes) file mappings ────────────────────────────
[[files]]
upstream = "staging/src/k8s.io/cloud-provider/cloud.go"
local    = "src/provider.rs"

[[files]]
upstream = "staging/src/k8s.io/cloud-provider/controllers/node/node_controller.go"
local    = "src/node_controller.rs"

[[files]]
upstream = "staging/src/k8s.io/cloud-provider/controllers/node/node_lifecycle_controller.go"
local    = "src/node_controller.rs"

[[files]]
upstream = "staging/src/k8s.io/cloud-provider/node/helpers/address.go"
local    = "src/node_controller.rs"

[[files]]
upstream = "staging/src/k8s.io/cloud-provider/controllers/service/controller.go"
local    = "src/service_controller.rs"

[[files]]
upstream = "staging/src/k8s.io/cloud-provider/controllers/route/route_controller.go"
local    = "src/route_controller.rs"

[[files]]
upstream = "staging/src/k8s.io/utils/net/ipnet.go"
local    = "src/route_controller.rs"

# ── In-tree function mappings ────────────────────────────────────────────────
[[functions]]
upstream_name = "syncNode"
local_name    = "reconcile"
file          = "src/node_controller.rs"

[[functions]]
upstream_name = "ensureNodeExistsByProviderID"
local_name    = "handle_shutdown"
file          = "src/node_controller.rs"

[[functions]]
upstream_name = "mergeNodeAddresses"
local_name    = "canonicalize_addresses"
file          = "src/node_controller.rs"

[[functions]]
upstream_name = "preferredNodeAddress"
local_name    = "preferred_address"
file          = "src/node_controller.rs"

[[functions]]
upstream_name = "syncLoadBalancerIfNeeded"
local_name    = "reconcile"
file          = "src/service_controller.rs"

[[functions]]
upstream_name = "needsUpdate"
local_name    = "lb_spec_drifted"
file          = "src/service_controller.rs"

[[functions]]
upstream_name = "shouldSyncLoadBalancer"
local_name    = "should_manage"
file          = "src/service_controller.rs"

[[functions]]
upstream_name = "ensureLoadBalancer"
local_name    = "reconcile_phase"
file          = "src/service_controller.rs"

[[functions]]
upstream_name = "ensureLoadBalancerDeleted"
local_name    = "reconcile_phase"
file          = "src/service_controller.rs"

[[functions]]
upstream_name = "reconcile"
local_name    = "plan_routes"
file          = "src/route_controller.rs"

[[functions]]
upstream_name = "reconcileRoutes"
local_name    = "reconcile"
file          = "src/route_controller.rs"

[[functions]]
upstream_name = "findBlackholeRoutes"
local_name    = "detect_blackhole"
file          = "src/route_controller.rs"

[[functions]]
upstream_name = "IsIPv6CIDR"
local_name    = "cidr_family"
file          = "src/route_controller.rs"

[[functions]]
upstream_name = "InstanceMetadata"
local_name    = "InstanceMetadata::validate"
file          = "src/provider.rs"

[[functions]]
upstream_name = "InstanceExists"
local_name    = "InstancesV2Iface::instance_exists"
file          = "src/provider.rs"

# ── Hetzner (out-of-tree) provider mappings ──────────────────────────────────
[[providers.hetzner]]
upstream = "github.com/hetznercloud/hcloud-cloud-controller-manager"
version  = "v1.30.1"
local    = "src/providers/hetzner.rs"

[[providers.hetzner.files]]
upstream = "hcloud/instances.go"
local    = "src/providers/hetzner.rs"

[[providers.hetzner.files]]
upstream = "hcloud/load_balancers.go"
local    = "src/providers/hetzner.rs"

[[providers.hetzner.files]]
upstream = "hcloud/load_balancer.go"
local    = "src/providers/hetzner_lb.rs"

[[providers.hetzner.files]]
upstream = "hcloud/floating_ip.go"
local    = "src/providers/hetzner_failover.rs"

[[providers.hetzner.files]]
upstream = "hcloud/server_type.go"
local    = "src/providers/hetzner_resources.rs"

[[providers.hetzner.files]]
upstream = "hcloud/network.go"
local    = "src/providers/hetzner_resources.rs"

[[providers.hetzner.files]]
upstream = "hcloud/volume.go"
local    = "src/providers/hetzner_resources.rs"

[[providers.hetzner.files]]
upstream = "hcloud/certificate.go"
local    = "src/providers/hetzner_lb.rs"

# ── Azure (out-of-tree) provider mappings ────────────────────────────────────
[[providers.azure]]
