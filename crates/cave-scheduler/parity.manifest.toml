# parity.manifest.toml — cave-scheduler
# Upstream: kubernetes/kubernetes  https://github.com/kubernetes/kubernetes

[upstream]
org     = "kubernetes"
repo    = "kubernetes"
version = "v1.36.0"

[parity]
# Package-level inventory (see [[mapped]]/[[skipped]]/[[unmapped]] below):
#   fill_ratio = (mapped + skipped) / total
# On 2026-05-12 the audit-doc self-reported 1.0 was replaced with a
# measured value: kubernetes/kubernetes v1.31.x pkg/scheduler/* packages
# enumerated and classified honestly.
# See docs/parity/cave-scheduler-port-2026-05-12.md for methodology.
mapped_count   = 19
skipped_count  = 7
unmapped_count = 3
total          = 29
fill_ratio     = 0.8966
last_audit     = "2026-05-13"
infra_only     = false

[module]
name        = "cave-scheduler"
description = "kube-scheduler reimpl — Filter/Score framework, preemption, priority queue, topology spread, DRA (KEP-4381), multi-profile"
source_root = "src"
pump_priority = "HIGH"  # qwen-pump B-prime priority gate
target_tests = 30        # qwen-pump B-prime target (#[test] count in tests/qwen_drafted.rs); below this, B-prime fires

