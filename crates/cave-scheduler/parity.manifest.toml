[[skipped]]
upstream_pkg = "pkg/scheduler/testing/"
reason       = "test-harness"
note         = "Test fixture builders — cave has #[cfg(test)] helpers in each module"

[[skipped]]
upstream_pkg = "pkg/scheduler/metrics/"
reason       = "parallel-track"
note         = "Prometheus metric definitions — cave uses prometheus-client crate directly"

[[mapped]]
upstream_pkg = "pkg/scheduler/framework/plugins/imagelocality/"
local_files  = ["src/plugins.rs"]
note         = "k8s-cri push batch2 2026-05-13: ImageLocality scorer ported with upstream's size-weighted formula. `scaled_image_score = size × (num_nodes_with_image / total_nodes)`; `calculate_priority` linearly maps the sum onto [0, MAX_NODE_SCORE] between min/max thresholds (23 MiB / 1000 MiB × containers). 14 deterministic tests + `update_node_images` / `set_cluster_state` APIs for cave-kubelet image GC or cave-cri ListImages to populate."

[[unmapped]]
upstream_pkg = "pkg/scheduler/framework/plugins/interpodaffinity/"
note         = "Soft-affinity weighted scoring with anti-affinity topology keys. Filter path implemented; PreScore/Score fall back to neutral 0 — hard-affinity works, soft preferences are no-ops."

[[unmapped]]
upstream_pkg = "pkg/scheduler/framework/preemption/recovery"
note         = "Preemption-victim restoration after API failure during the victim eviction window. cave preempt.rs aborts and re-queues but does not re-add the would-have-victims, so transient apiserver errors can leak victim state."

[[unmapped]]
upstream_pkg = "pkg/scheduler/framework/plugins/volumezone/"
note         = "Forbid pods from binding PVs in a zone that does not include the candidate node. volume.rs handles topology-aware provisioning but does not enforce per-zone restriction at scheduling time."

