# ── Upstream test cross-reference (behavioral parity) ────────────────────────
# Each [[upstream_test]] entry pairs ONE upstream test (Go t.Run subtest =
# one entry) with the cave port. `status`:
#   ported  — line-by-line behavioral port, asserts the same input→output
#             equivalence class as the upstream case;
#   partial — covers part of the upstream case (e.g. only the happy path);
#   missing — declared in the audited scope but not yet ported.
#
# behavioral_parity_ratio (rendered on /admin/compliance) =
#   ported_count / total entries here.
# Scope-bounded: the denominator is the audited subset, not the entire
# upstream test corpus. Honest Charter framing — expand the scope by
# adding more `missing` entries.

[behavioral_parity]
audit_scope = "imagelocality + tainttoleration + nodeaffinity + nodename + nodeunschedulable + noderesources/least_allocated (v1.36.0)"
audit_at    = "2026-05-13"

