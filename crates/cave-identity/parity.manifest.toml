# parity.manifest.toml — cave-identity
# Upstream: spiffe/spire  https://github.com/spiffe/spire  pinned v1.15.0
# Charter v2 deep-port close 2026-05-24.
#
# cave-identity implements SPIRE-style workload identity: a server CA
# hierarchy (root + rotating intermediate + JWT signing key), registration
# entries with selector-driven matching (k8s/unix/docker/x509_pop),
# X.509-SVID + JWT-SVID issuance/verification/rotation, trust-bundle
# (JWKS-with-SPIFFE-extensions) marshalling, trust-domain federation,
# OIDC discovery + JWKS endpoints, k8s workload + PSAT node attestors,
# an in-memory persistence facade behind a sqlite-ready boundary, axum
# REST surface, and admission policy with TTL clamping.
#
# Out of MVP (skipped — see [[scope_cuts]]):
#   - gRPC SDS-v3 wire / Workload API socket  → cave-mesh (envoy side)
#   - cryptographic signing backend (real ES256/RSA) → cave-pki / KMS
#   - sqlite/postgres persistence backend → cave-db (CavePool) delegation
#   - spire-server / spire-agent CLIs → cave-cli (`cavectl identity ...`)
#   - spire-controller-manager K8s operator → cave-cri / cave-k8s
#   - aws_iid / azure_msi / gcp_iit / TPM nodeattestors → Phase 2
#   - upstream-authority (Vault / aws_pca / cert-manager) → cave-pki ingress
#   - SPIFFE Workload-API hot-restart / cgroup-v1 inspection → Linux-only

[upstream]
org        = "spiffe"
repo       = "spire"
version    = "v1.15.0"
name       = "SPIRE"
license    = "Apache-2.0"
language   = "Go"
url        = "https://github.com/spiffe/spire"
source_sha = "b7db9650aa98598ee7af21d7a75fbab8f6b70d42"

[parity]
parity_ratio_source = "manifest"
fill_ratio          = 0.96
honest_ratio        = 0.68
adr_justified_ratio = 1.0      # 14 skipped (CLI→cavectl identity, k8s-operator→cave-cri/cave-k8s, datastore→cave-db CavePool, gRPC SDS-v3 + Workload-API UDS→cave-mesh, cloud attestors {aws_iid,azure_msi,gcp_iit}→cave-cloud, hw attestors {tpm,sshpop}→cave-hwsign, upstream-authority+bundle-publisher→cave-pki/cave-vault, HA cluster→cave-ha lease, cgroup-v1→cave-cri) + 4 partials (AgentManager/SDS-v3 stub→cave-mesh wire, NodeAttestor trait→Phase 2 cloud/hw attestors, crypto-backend→cave-pki+cave-certs) + 2 unmapped (agent-fingerprint-rebinding + registration-entry-event-stream→Phase 2 cave-streams) all architecturally justified
adr_justification   = "ADR-RUNTIME-PARITY-100-PCT-001, ADR-RUNTIME-STACK-001"
last_audit          = "2026-05-24"
infra_only          = false
mapped_count        = 30
partial_count       = 4
skipped_count       = 14
unmapped_count      = 2
total               = 50

# 2026-05-24 Charter v2 close-out:
#   * 14 src/ modules (~5 200 LOC), 91 lib tests + 9 self-audit = 100 PASS.
#   * Subsystem-count formula:  fill_ratio = (mapped + partial + skipped) / total
#                              = (30 + 4 + 14) / 50 = 48 / 50 = 0.96.
#   * honest_ratio = (mapped + partial) / total = 34 / 50 = 0.68.
#   * source_sha pinned to v1.15.0 commit
#     b7db9650aa98598ee7af21d7a75fbab8f6b70d42.

[module]
name        = "cave-identity"
description = "SPIFFE/SPIRE workload identity — CA hierarchy, registration entries, X.509-SVID + JWT-SVID, federation, OIDC, k8s attestor"
source_root = "src"

