# parity.manifest.toml — cave-ha
# Upstream: etcd-io/etcd  https://github.com/etcd-io/etcd  pinned v3.5.13
#
# Cave-ha re-implements etcd's Raft consensus core (server-side log,
# membership, snapshot, read-index, leader transfer) plus the higher-level
# HA orchestration (manual failover, leader handoff, DR site failover,
# disaster recovery replication) that runs on top of it.

[upstream]
org     = "etcd-io"
repo    = "etcd"
version = "v3.5.13"
source_sha = "v3.5.13"  # G1: tag-based pin (deep-port may override)
name    = "etcd"
license = "Apache-2.0"
language= "Go"
url     = "https://github.com/etcd-io/etcd"

[parity]
ratio       = 0.0        # honest: 0.0 means upstream parity NOT yet measured
last_audit  = "2026-05-12"
infra_only  = false
[module]
name        = "cave-ha"
description = "High-availability + Raft consensus — etcd's raft package + server failover/DR primitives"
source_root = "src"

