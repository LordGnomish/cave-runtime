# parity.manifest.toml — cave-ha
# Upstream: etcd-io/etcd  https://github.com/etcd-io/etcd
# Skeleton generated by cave parity init — fill in the mapping sections

[upstream]
org     = "etcd-io"
repo    = "etcd"
version = "v3.5.13"

[module]
name        = "cave-ha"
description = "High-availability consensus layer — Raft/etcd HA"
source_root = "src"

# ── File mappings ────────────────────────────────────────────────────────────
# [[files]]
# upstream = "path/in/upstream/repo.go"
# local    = "src/local.rs"

# ── Function mappings ────────────────────────────────────────────────────────
# [[functions]]
# upstream_name = "UpstreamFunc"
# local_name    = "local_fn"
# file          = "src/routes.rs"

# ── Test mappings ────────────────────────────────────────────────────────────
# [[tests]]
# upstream_test = "TestUpstreamFunc"
# local_test    = "test_local_fn"

# ── Surface mappings ─────────────────────────────────────────────────────────
# [[surfaces]]
# kind          = "http"
# upstream_path = "/api/upstream"
# local_path    = "/api/ha/endpoint"
