# parity.manifest.toml — cave-core
# Upstream: cave-runtime/cave-runtime  https://github.com/cave-runtime/cave-runtime
# Skeleton generated by cave parity init — fill in the mapping sections

[upstream]
org     = "cave-runtime"
repo    = "cave-runtime"
version = "v0.1.0"
source_sha = "v0.1.0"  # G1: tag-based pin (deep-port may override)

[module]
name        = "cave-core"
description = "CAVE shared core types and utilities"
source_root = "src"

# ── File mappings ────────────────────────────────────────────────────────────
# [[files]]
# upstream = "path/in/upstream/repo.go"
# local    = "src/local.rs"

# ── Function mappings ────────────────────────────────────────────────────────
# [[functions]]
# upstream_name = "UpstreamFunc"
# local_name    = "local_fn"
# file          = "src/routes.rs"

# ── Test mappings ────────────────────────────────────────────────────────────
# [[tests]]
# upstream_test = "TestUpstreamFunc"
# local_test    = "test_local_fn"

# ── Surface mappings ─────────────────────────────────────────────────────────
# [[surfaces]]
# kind          = "http"
# upstream_path = "/api/upstream"
# local_path    = "/api/core/endpoint"

[parity]
infra_only = true
ratio       = 0.0        # honest: 0.0 means upstream parity NOT yet measured
last_audit  = "2026-05-12"

