# parity.manifest.toml — cave-rollouts
# Upstream: argoproj/argo-rollouts  https://github.com/argoproj/argo-rollouts
# Skeleton generated by cave parity init — fill in the mapping sections

[upstream]
org     = "argoproj"
repo    = "argo-rollouts"
version = "v1.6.0"
name    = "Argo Rollouts"
license = "Apache-2.0"
language= "Go"
url     = "https://github.com/argoproj/argo-rollouts"

[parity]
ratio       = 0.0        # honest: 0.0 means upstream parity NOT yet measured
last_audit  = "2026-05-12"
infra_only  = false
[module]
name        = "cave-rollouts"
description = "Progressive delivery — Argo Rollouts replacement"
source_root = "src"

# ── File mappings ────────────────────────────────────────────────────────────
