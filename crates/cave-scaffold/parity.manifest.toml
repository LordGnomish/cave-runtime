# parity.manifest.toml — cave-scaffold
# Upstream: backstage/backstage  https://github.com/backstage/backstage
# Skeleton generated by cave parity init — fill in the mapping sections

[upstream]
org     = "backstage"
repo    = "backstage"
version = "v1.20.0"
name    = "Backstage"
license = "Apache-2.0"
language= "TypeScript"
url     = "https://github.com/backstage/backstage"
[module]
name        = "cave-scaffold"
description = "Project scaffolding — Backstage Scaffolder replacement"
source_root = "src"

# ── File mappings ────────────────────────────────────────────────────────────
# [[files]]
# upstream = "path/in/upstream/repo.go"
# local    = "src/local.rs"

# ── Function mappings ────────────────────────────────────────────────────────
# [[functions]]
# upstream_name = "UpstreamFunc"
# local_name    = "local_fn"
# file          = "src/routes.rs"

# ── Test mappings ────────────────────────────────────────────────────────────
# [[tests]]
# upstream_test = "TestUpstreamFunc"
# local_test    = "test_local_fn"

# ── Surface mappings ─────────────────────────────────────────────────────────
# [[surfaces]]
# kind          = "http"
# upstream_path = "/api/upstream"
# local_path    = "/api/scaffold/endpoint"

[parity]
infra_only = true
ratio       = 0.0        # honest: 0.0 means upstream parity NOT yet measured
last_audit  = "2026-05-12"

