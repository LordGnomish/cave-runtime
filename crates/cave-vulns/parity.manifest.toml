# parity.manifest.toml — cave-vulns
# Deep DefectDojo port landed 2026-05-17 — see commits 8227fd8e..b25b4ab4.
# Upstream pinned to v2.58.2 (commit 6eab87386d504c4bc164f87b6aae58a8e0c1b8d2).
#
# Primary upstream:   DefectDojo/django-DefectDojo  https://github.com/DefectDojo/django-DefectDojo
# Secondary upstream: DependencyTrack/dependency-track  https://github.com/DependencyTrack/dependency-track

[upstream]
org      = "DefectDojo"
repo     = "django-DefectDojo"
version  = "v2.58.2"
source_sha  = "v2.58.2"  # G1: tag-based pin (deep-port may override)
name     = "DefectDojo"
license  = "BSD-3-Clause"
language = "Python"
url      = "https://github.com/DefectDojo/django-DefectDojo"
sha      = "6eab87386d504c4bc164f87b6aae58a8e0c1b8d2"

[parity]
# Parity-uplift-sec-stack 2026-05-19. Adds 4 mapped subsystems
# (cyclonedx_vex / notification_rules / lifecycle / engagement_scope),
# moves "notification fan-out" out of unmapped into scope_cuts
# (cave-noti owns transport), keeps JIRA bidirectional sync as the
# single remaining unmapped Phase 2 item.
# = (18 + 0 + 1) / 20 = 0.95
mapped_count   = 18
partial_count  = 0
skipped_count  = 1
unmapped_count = 1
total          = 20
ratio          = 0.95
fill_ratio     = 0.95
honest_ratio   = 0.90
adr_justified_ratio = 1.0      # 1 skipped (Cisco/Mattermost fan-out → cave-noti = parallel-track) + 1 unmapped (JIRA bidirectional sync = out-of-launch-scope Phase 2) + 1 scope_cut (Slack/Teams fan-out → cave-noti = parallel-track) all architecturally justified.
adr_justification   = "ADR-RUNTIME-PARITY-100-PCT-001, ADR-RUNTIME-STACK-001"
parity_ratio_source = "manifest"
last_audit     = "2026-05-19"
infra_only     = false

[module]
name        = "cave-vulns"
description = "Vulnerability aggregation hub — DefectDojo-parity finding lifecycle, deduplication (4 algorithms), CVSS v3+v4, SLA tracking, multi-tool ingest (7 parsers); DTrack-style SBOM/SCA correlation"
source_root = "src"

# ── Secondary upstream (ADR-035 absorbed ADR-034) ────────────────────────────

[[secondary_upstreams]]
org     = "DependencyTrack"
repo    = "dependency-track"
version = "v4.11.0"
purpose = "Continuous SBOM/SCA monitoring; feeds finding aggregation"

