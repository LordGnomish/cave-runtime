# parity.manifest.toml — cave-vulns
# Function-based name (ADR-147): "vulns" describes the role —
# vulnerability tracking, finding aggregation, deduplication, SLA
# enforcement — not the tool brand. Primary upstream is DefectDojo
# (ADR-035: single source of truth for ALL security findings);
# Dependency-Track is the absorbed complementary SBOM/SCA tracker
# (ADR-034 → ADR-035) and is referenced as a secondary upstream
# below for parity purposes.
#
# Primary upstream:   DefectDojo/django-DefectDojo  https://github.com/DefectDojo/django-DefectDojo
# Secondary upstream: DependencyTrack/dependency-track  https://github.com/DependencyTrack/dependency-track

[upstream]
org     = "DefectDojo"
repo    = "django-DefectDojo"
version = "v2.36.0"
name    = "DefectDojo"
license = "BSD-3-Clause"
language= "Python"
url     = "https://github.com/DefectDojo/django-DefectDojo"

[parity]
ratio       = 0.0        # honest: 0.0 means upstream parity NOT yet measured
last_audit  = "2026-05-12"
infra_only  = false
[module]
name        = "cave-vulns"
description = "Vulnerability aggregation hub — DefectDojo-compatible finding lifecycle, deduplication, SLA tracking, multi-tool ingest; DTrack-style SBOM/SCA correlation"
source_root = "src"

# ── Secondary upstream (ADR-035 absorbed ADR-034) ────────────────────────────

[[secondary_upstreams]]
org     = "DependencyTrack"
repo    = "dependency-track"
version = "v4.11.0"
purpose = "Continuous SBOM/SCA monitoring; feeds finding aggregation"

# ── File mappings ────────────────────────────────────────────────────────────
# DefectDojo (Django) source mappings — the lifecycle/severity/dedup
# pipeline lives in dojo/models.py and dojo/finding/views.py.

[[files]]
upstream = "dojo/models.py"
local    = "src/models.rs"

[[files]]
upstream = "dojo/finding/views.py"
local    = "src/engine.rs"

[[files]]
upstream = "dojo/finding/helper.py"
local    = "src/dedup.rs"

[[files]]
upstream = "dojo/sla_config/views.py"
local    = "src/dedup.rs"

[[files]]
upstream = "dojo/api_v2/views.py"
local    = "src/routes.rs"

# Secondary upstream (DependencyTrack) — Java backend for SBOM ingest

[[files]]
upstream = "src/main/java/org/dependencytrack/model/Vulnerability.java"
local    = "src/models.rs"
secondary = "DependencyTrack"

[[files]]
upstream = "src/main/java/org/dependencytrack/parser/cyclonedx/CycloneDxParser.java"
local    = "src/engine.rs"
secondary = "DependencyTrack"

# ── Function mappings ────────────────────────────────────────────────────────

[[functions]]
upstream_name = "Finding.severity_display"
local_name    = "cvss_to_severity"
file          = "src/engine.rs"

[[functions]]
upstream_name = "Finding.is_active"
local_name    = "is_affected"
file          = "src/engine.rs"

[[functions]]
upstream_name = "do_dedupe_finding"
local_name    = "dedup_key"
file          = "src/dedup.rs"

[[functions]]
upstream_name = "deduplicate_findings"
local_name    = "deduplicate"
file          = "src/dedup.rs"

[[functions]]
upstream_name = "SLA_Configuration#days_for"
local_name    = "sla_days"
file          = "src/dedup.rs"

[[functions]]
upstream_name = "Finding.sla_deadline"
local_name    = "sla_deadline"
file          = "src/dedup.rs"

[[functions]]
upstream_name = "Engagement.aggregate_findings"
local_name    = "build_scan_result"
file          = "src/engine.rs"

[[functions]]
upstream_name = "Finding.severity_count"
local_name    = "count_by_severity"
file          = "src/engine.rs"

# Secondary (DTrack)

[[functions]]
upstream_name = "VulnerabilityQueryManager#getVulnerabilities"
local_name    = "find_for_component"
file          = "src/engine.rs"

[[functions]]
upstream_name = "VersionDistance#isAffected"
local_name    = "version_lt"
file          = "src/engine.rs"

