# ── Scope cuts — explicit deferred work ─────────────────────────────────────

[[scope_cuts]]
upstream = "dojo/notifications/helper.py (Slack/Teams/Cisco/Mattermost fan-out)"
reason   = "cave-noti owns transport — cave-vulns emits the generic NotificationEvent that cave-noti subscribes to; moved from unmapped to scope_cut after parity-uplift-sec-stack-2026-05-19"

# ── Unmapped — real deferred gaps ────────────────────────────────────────────

[[missings]]
upstream = "dojo/jira_link/views.py (JIRA bidirectional sync)"
reason   = "Phase 2 — one-way emission works (finding → JIRA ticket); incoming JIRA status reconciliation deferred"

