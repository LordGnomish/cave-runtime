# parity.manifest.toml — cave-portal
# Upstream: backstage/backstage  https://github.com/backstage/backstage
# Skeleton generated by cave parity init — fill in the mapping sections

[upstream]
org     = "backstage"
repo    = "backstage"
version = "v1.20.0"

[module]
name        = "cave-portal"
description = "Developer portal — Backstage replacement"
source_root = "src"

