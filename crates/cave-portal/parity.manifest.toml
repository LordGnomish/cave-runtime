# parity.manifest.toml — cave-portal
#
# Upstream: backstage/backstage  https://github.com/backstage/backstage
# Pinned: v1.50.3 (source_sha pins the tag so reproducibility audits
# can re-resolve identically). Backstage is the developer-portal
# parity contract — cave-portal ports the admin-view plugin surface
# (Sessions, Search, Catalog, Permissions, Kubernetes, ArgoCD,
# Grafana, Prometheus, …) onto a server-rendered htmx + Tailwind
# stack, keeping the per-plugin tab layout the operator already
# knows from Backstage's Material-UI shell.
#
# 2026-05-19 FINALIZE — Charter v2 close-out:
#   * Replaced placeholder `infra_only = true` (audit-fallback 0.25)
#     with a per-file mapping inventory measured against backstage v1.50.3.
#   * 78 mapped + 8 partial + 13 skipped + 5 unmapped = 104 total
#     (77 top-level src/admin/*.rs + 27 admin/<sub-page>/ folders).
#   * fill_ratio   = (mapped + partial + skipped) / total = 99/104 = 0.9519
#   * honest_ratio = (mapped + skipped) / total           = 91/104 = 0.8750
#   * source_sha added — matches the cave-auth FINALIZE convention.

[upstream]
org        = "backstage"
repo       = "backstage"
version    = "v1.50.3"
source_sha = "v1.50.3"
name       = "Backstage"
license    = "Apache-2.0"
language   = "TypeScript"
url        = "https://github.com/backstage/backstage"

[module]
name        = "cave-portal"
description = "Developer portal — Backstage parity (admin views, tenant dashboard, htmx + tailwind UX, persona-gated chrome)"
source_root = "src"

[parity]
# 2026-05-19 close-out — measured per-file inventory against backstage
# v1.50.3's plugin tree (plugins/auth, plugins/permission*, plugins/
# kubernetes, plugins/scaffolder, plugins/catalog, plugins/techdocs,
# plugins/search, plugins/explore, plugins/cost-insights, plugins/
# pagerduty, plugins/argo-cd, plugins/grafana, plugins/prometheus,
# plugins/kafka, plugins/jenkins, plugins/snyk, …) plus the
# packages/core-components/Layout chrome.
#
# `mapped`   = the cave-portal page has a clear Backstage plugin
#              counterpart, with parity at the operator-visible level.
# `partial`  = the local page has a real port but the Backstage
#              equivalent is either narrower (e.g. crm vs. salesforce
#              plugin) or only partially mirrored.
# `skipped`  = cave-internal scaffolding with no Backstage analog
#              (Charter dashboards, RBAC types, render helpers, the
#              live cluster widget, the layout chrome itself).
# `unmapped` = a cave-only page that doesn't yet have a chosen
#              upstream parity target — documented so future audits
#              know which gaps to close.
mapped_count   = 78
partial_count  = 8
skipped_count  = 13
unmapped_count = 5
total          = 104
fill_ratio     = 0.9519
honest_ratio   = 0.8750
parity_ratio_source = "manifest"
last_audit     = "2026-05-19"
infra_only     = false

