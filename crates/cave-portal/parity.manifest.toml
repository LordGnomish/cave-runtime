# parity.manifest.toml — cave-portal
# Upstream: backstage/backstage  https://github.com/backstage/backstage
# Tracks the developer-portal surface; this batch ports the per-module
# admin views that Backstage exposes through its plugin system.

[upstream]
org     = "backstage"
repo    = "backstage"
version = "v1.50.3"

[module]
name        = "cave-portal"
description = "Developer portal — Backstage parity (admin views, tenant dashboard, htmx + tailwind-light UX)"
source_root = "src"

# ── Admin-view file mappings (this batch) ────────────────────────────────────
[[files]]
upstream = "plugins/permission-react/src/index.ts"
local    = "src/admin/permission.rs"

[[files]]
upstream = "packages/core-components/src/layout/Page/Page.tsx"
local    = "src/admin/render.rs"

[[files]]
upstream = "plugins/explore/src/components/ExplorePage.tsx"
local    = "src/admin/tenant_dashboard.rs"

[[files]]
upstream = "plugins/kubernetes/src/components/Pods/PodsTable.tsx"
local    = "src/admin/cri.rs"

[[files]]
upstream = "plugins/kubernetes/src/components/EmptyResponses/PodsEmptyState.tsx"
local    = "src/admin/apiserver.rs"

[[files]]
upstream = "plugins/permission-backend/src/index.ts"
local    = "src/admin/iam.rs"

[[files]]
upstream = "plugins/auth-react/src/components/UserSettings/AuthProviders/AuthProviders.tsx"
local    = "src/admin/vault.rs"

[[files]]
upstream = "plugins/explore/src/components/Tabs/DocsTab.tsx"
local    = "src/admin/etcd.rs"

[[files]]
upstream = "plugins/catalog-graph/src/components/CatalogGraphPage/CatalogGraphPage.tsx"
local    = "src/admin/mesh.rs"

[[files]]
upstream = "plugins/search/src/components/SearchType/SearchType.tsx"
local    = "src/admin/pg.rs"
