local_files  = ["src/tainteviction.rs"]
note         = "k8s-cri push batch2 2026-05-13: per-pod NoExecute eviction with tolerationSeconds timers. Pure-function `evaluate` returns EvictionAction (Tolerated / EvictNow / Schedule / Expired); `EvictionLedger` tracks pending evictions with deterministic `due(now)` polling. 12 tests."

[[mapped]]
upstream_pkg = "pkg/controller/cidrallocator/"
local_files  = ["src/cidrallocator.rs"]
note         = "k8s-cri push batch2 2026-05-13: pod-CIDR slice allocator for clusters without a cloud provider. `CidrAllocator::new(cluster, node_mask)` carves the cluster CIDR into N slots; `allocate(node)` / `occupy(node, cidr)` / `release(node)` + idempotency + slot reuse + cluster-range bounds checking. 17 tests."

[[unmapped]]
upstream_pkg = "pkg/controller/endpoint/"
note         = "Legacy v1 Endpoints controller — superseded by endpointslice/. v1.32 still ships it for older clients; cave only writes EndpointSlice."

[[unmapped]]
upstream_pkg = "pkg/controller/replication/"
note         = "Legacy ReplicationController — superseded by ReplicaSet. cave does not ship this."

[[mapped]]
upstream_pkg = "pkg/controller/volume/pvprotection/"
local_files  = ["src/pvprotection.rs"]
note         = "k8s-streams-mesh batch 2026-05-13: PV-side protection finalizer. `evaluate(ObservedPv) → Action::{EnsureFinalizer / BlockDeletion / ReleaseFinalizer / NoOp}`. In-use means Phase=Bound OR claimRef set. `PvProtector` tracks last-action for admin UI. 11 tests."

[[mapped]]
upstream_pkg = "pkg/controller/volume/ephemeral/"
local_files  = ["src/ephemeralvolume.rs"]
note         = "k8s-streams-mesh batch 2026-05-13: generic-ephemeral-volume controller. `EphemeralVolumeDecl` from pod spec → `evaluate(decl, observed_pvc)` returns Create / AlreadyAdopted / OwnerConflict; PVC name = `<pod>-<volume>`. Reconciler refuses to hijack PVCs already owned by a different pod (KEP-1698 hijack-safety). 8 tests."

[[mapped]]
upstream_pkg = "pkg/controller/resourceclaim/"
local_files  = ["src/resourceclaim.rs"]
note         = "k8s-core push 2026-05-13: DRA (KEP-4381) cluster-side ResourceClaim reconciler — finalizer dance + Immediate/WaitForFirstConsumer allocation + reservedFor[] reconciliation + deletion drain. 23 deterministic tests covering the full state machine. Scheduler hooks remain in cave-scheduler/src/dra.rs (device-fitness)."

[[mapped]]
upstream_pkg = "pkg/controller/validatingadmissionpolicystatus/"
local_files  = ["src/validatingadmissionpolicystatus.rs"]
note         = "k8s-streams-mesh batch 2026-05-13: VAP status reconciler. `aggregate(generation, &[TypeCheck])` reduces per-GVK Ok/Err results into ConditionState + sorted warnings; `StatusReconciler` rejects stale generations. apiserver vap_advanced.rs still owns the write-time type-check; this is the post-write status loop. 10 tests."

[[unmapped]]
upstream_pkg = "pkg/controller/storageversionmigrator/migrator/"
note         = "Inner worker for storageversionmigrator above — split out in v1.32."

