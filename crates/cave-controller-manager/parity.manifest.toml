# parity.manifest.toml — cave-controller-manager
# Upstream: kubernetes/kubernetes  https://github.com/kubernetes/kubernetes
# Tracks pkg/controller for the kube-controller-manager binary.

[upstream]
org     = "kubernetes"
repo    = "kubernetes"
version = "v1.36.0"

[module]
name        = "cave-controller-manager"
description = "Workload controllers — Deployment, ReplicaSet, StatefulSet, DaemonSet, Job, CronJob, HPA, PDB, EndpointSlice, Service, GC, NodeLifecycle, SA/Token, CSR, RBAC, PV, Quota, Namespace, BootstrapToken"
source_root = "src"

