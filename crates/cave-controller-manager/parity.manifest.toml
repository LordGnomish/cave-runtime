# ── Surface mappings ─────────────────────────────────────────────────────────
# HTTP surfaces that cave-runtime exposes for the controller-manager admin.
# The `local_path` field must appear literally in cave-runtime/src/main.rs or
# in the cave-runtime portal module.

[[surfaces]]
kind          = "http"
upstream_path = "/healthz"
local_path    = "/api/portal/controller-manager/health"

[[surfaces]]
kind          = "http"
upstream_path = "/livez"
local_path    = "/api/portal/cm/health"

[[surfaces]]
kind          = "http"
upstream_path = "/readyz"
local_path    = "/api/portal/cm"

[[surfaces]]
kind          = "http"
upstream_path = "/debug/controllers"
local_path    = "/api/controller-manager/controllers"

[[surfaces]]
kind          = "http"
upstream_path = "/leader"
local_path    = "/api/controller-manager/leader"

[[surfaces]]
kind          = "http"
upstream_path = "/status"
local_path    = "/api/controller-manager/status"

[[surfaces]]
kind          = "http"
upstream_path = "/parity"
local_path    = "/api/controller-manager/parity"

[[surfaces]]
kind          = "http"
upstream_path = "/queues"
local_path    = "/api/portal/cm/queues"

[[surfaces]]
kind          = "http"
upstream_path = "/events"
local_path    = "/api/portal/cm/events"

[[surfaces]]
kind          = "cli"
upstream_path = "kube-controller-manager --controllers=*"
local_path    = "ControllerManagerCmd::ListControllers"

[[surfaces]]
kind          = "cli"
upstream_path = "kube-controller-manager --leader-elect"
local_path    = "ControllerManagerCmd::GetLeader"
