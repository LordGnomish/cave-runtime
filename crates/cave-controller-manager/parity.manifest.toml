# parity.manifest.toml — cave-controller-manager
# Upstream: kubernetes/kubernetes  https://github.com/kubernetes/kubernetes
# Tracks pkg/controller for the kube-controller-manager binary.

[upstream]
org     = "kubernetes"
repo    = "kubernetes"
version = "v1.36.0"

[parity]
# Package-level inventory (see [[mapped]]/[[skipped]]/[[unmapped]] below):
#   fill_ratio = (mapped + skipped) / total
# On 2026-05-12 the audit-doc self-reported 0.25 was replaced with a
# measured value: kubernetes/kubernetes v1.31.x pkg/controller/* sub-
# packages enumerated and classified honestly.
# 2026-05-13 k8s-core push: pkg/controller/resourceclaim/ → MAPPED
# (DRA ResourceClaim controller MVP — finalizer + allocation +
# reservedFor reconciliation + deletion drain, 23 deterministic tests).
# See docs/parity/cave-controller-manager-port-2026-05-12.md for methodology.
mapped_count   = 31
skipped_count  = 10
unmapped_count = 4
total          = 45
fill_ratio     = 0.9111
last_audit     = "2026-05-13"
infra_only     = false

[module]
name        = "cave-controller-manager"
description = "Workload controllers — Deployment, ReplicaSet, StatefulSet, DaemonSet, Job, CronJob, HPA, PDB, EndpointSlice, Service"
source_root = "src"
pump_priority = "HIGH"  # qwen-pump B-prime priority gate
target_tests = 30        # qwen-pump B-prime target (#[test] count in tests/qwen_drafted.rs); below this, B-prime fires

