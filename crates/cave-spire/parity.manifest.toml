# parity.manifest.toml — cave-spire
# Upstream: spiffe/spire  https://github.com/spiffe/spire
# Skeleton generated by cave parity init — fill in the mapping sections

[upstream]
org     = "spiffe"
repo    = "spire"
version = "v1.9.0"

[module]
name        = "cave-spire"
description = "SPIFFE/SPIRE workload identity replacement"
source_root = "src"

