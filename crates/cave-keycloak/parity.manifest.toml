# parity.manifest.toml — cave-keycloak
# Upstream: keycloak/keycloak  https://github.com/keycloak/keycloak  pinned v26.6.2
# Charter v2 deep-port scaffold + close 2026-05-23.
#
# cave-keycloak implements the Keycloak IAM/SSO control plane —
# realm + user + group + role + client CRUD with multi-tenancy, an
# authentication flow executor wired to password / TOTP / WebAuthn /
# magic-link credentials, an OAuth2 + OIDC provider that emits ES256 /
# EdDSA JWTs (ML-DSA-65 placeholder), a SAML 2.0 IDP + SP, LDAP / AD
# federation through a pluggable backend trait, identity brokering for
# Google / GitHub / Microsoft OIDC, SSO + offline sessions, refresh
# token rotation with chain replay revocation, the brute-force tracker,
# the password policy validator, the conditional access evaluator, the
# audit event sink, the admin + account REST URL builders, OIDC
# discovery + JWKS endpoints, and a 10-panel / 6-alert observability
# contract.
#
# MVP scope (mapped + partial + scope_cuts):
#   - Realm + user + group + role + client CRUD (tenant scoped)
#   - Password (PBKDF2-SHA256/512 + Argon2-style) + TOTP RFC 6238 +
#     WebAuthn (Ed25519 + ES256) + magic link
#   - OAuth2 authorization code + PKCE S256/plain + refresh token
#     rotation with replay-detection chain revocation
#   - OAuth2 client_credentials grant + scope binding
#   - OIDC discovery (.well-known/openid-configuration) + JWKS publish
#   - Userinfo + introspection (RFC 7662) shape + revocation (RFC 7009)
#   - Device authorization grant (RFC 8628) with pending/approved/denied
#   - SAML 2.0 IDP-issued Response + SP-side Response verify
#   - LDAP / AD federation through a pluggable backend trait (in-memory)
#   - Identity brokering for Google / GitHub / Microsoft OIDC + generic,
#     with family-default endpoint table
#   - SSO + offline UserSession with idle / max TTLs + per-client sessions
#   - Brute-force tracker (windowed failures + lockout)
#   - Password policy validator (length, char-class, history)
#   - Conditional access evaluator (DenyClient / MFA-unless-IP /
#     re-auth max age)
#   - Audit event sink (bounded FIFO, drop oldest with counter)
#   - JWT signer registry (ES256 + EdDSA real; ML-DSA-65 placeholder)
#   - Admin REST URL builders (/admin/realms/...) + Account REST URL
#     builders + AccountProfile DTO
#   - Authentication flow executor (Required / Alternative / Conditional /
#     Disabled, ordered with contiguous-alternative blocks)
#   - Observability: 10 standard metric panels + 6 standard alert rules
#   - cavectl iam {realm,user,role,client,session,event,health}
#   - HTTP surface: /api/iam/health + /api/iam/realms/{r}/.well-known/...
#     + /api/iam/realms/{r}/protocol/openid-connect/certs
#
# Out of MVP (skipped — see [[scope_cuts]]):
#   - Admin console UI runtime              → cave-portal-ui
#   - Account console UI runtime            → cave-portal-ui
#   - Email theme rendering (Freemarker)    → cave-templates
#   - LDAP network adapter + sync daemon    → Phase 2 cave-keycloak-ldap-net
#   - Kerberos GSSAPI runtime               → Phase 2 cave-keycloak-kerberos
#   - Vault-backed secret store adapter     → cave-vault
#   - Token Exchange (RFC 8693)             → Phase 2
#   - User profile (X.509 attributes API)   → Phase 2
#   - Cross-realm trust + Organization API  → Phase 2
#   - SCIM provisioning                     → Phase 2 cave-keycloak-scim
#   - Authorization Services (UMA 2.0)      → Phase 2 cave-keycloak-uma
#   - DPoP-bound tokens (RFC 9449)          → Phase 2 cave-keycloak-dpop
#   - XML-DSig signature verify             → Phase 2 cave-xmlsec
#   - oid4vc / verifiable credentials       → Phase 2 cave-keycloak-oid4vc

