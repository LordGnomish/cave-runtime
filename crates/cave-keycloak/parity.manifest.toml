url        = "https://github.com/keycloak/keycloak"
source_sha = "0a402f777f8985eccbb07556e96d9b386275e048"

[parity]
parity_ratio_source = "manifest"
fill_ratio          = 0.9574
honest_ratio        = 0.7660
last_audit          = "2026-05-23"
infra_only          = false
mapped_count        = 33
partial_count       = 3
skipped_count       = 9
unmapped_count      = 2
total               = 47

# 2026-05-23 Charter v2 deep-port scaffold + close — claude/cave-keycloak-2026-05-23-deep:
#   * 20 src/ modules (~5929 LOC), 132 lib tests + 9 self-audit assertions
#     + 8 smoke tests = 149 PASS at close.
#   * Subsystem-count formula: fill_ratio = (mapped + partial + skipped) / total
#                             = (33 + 3 + 9) / 47 = 0.9574.
#   * honest_ratio = (mapped + partial) / total = 36 / 47 = 0.7660.
#   * source_sha pinned to v26.6.2 commit
#     0a402f777f8985eccbb07556e96d9b386275e048.
#   * parity_ratio_source = "manifest" (manifest count is the source of truth).
#   * 2 unmapped (token-exchange-rfc8693 + user-profile-x509) carried as
#     honest gaps for Phase 2.

