[package]
name = "cave-keycloak"
description = "Keycloak IAM/SSO control plane reimplementation — realm/user/role/client + OAuth2/OIDC + SAML2 + LDAP federation + IDP brokering + PQC-ready JWT signing (Keycloak v26.6.2 parity)"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
homepage.workspace = true
repository.workspace = true
rust-version.workspace = true
documentation = "https://docs.rs/cave-keycloak"
keywords = ["keycloak", "iam", "sso", "oidc", "saml"]
categories = ["authentication", "web-programming"]

[dependencies]
cave-core = { path = "../cave-core" }

# Web
axum = { workspace = true }
tower = { workspace = true }

# Async
tokio = { workspace = true }

# Serialization
serde = { workspace = true }
serde_json = { workspace = true }

# Utilities
uuid = { workspace = true }
chrono = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }

# Crypto — JWT signing + credential hashes
ring = { workspace = true }
ed25519-dalek = { workspace = true }
p256 = { workspace = true }
sha2 = { workspace = true }
hex = { workspace = true }
base64 = { workspace = true }
rand = { workspace = true }

[dev-dependencies]
tokio = { workspace = true }
