# parity.manifest.toml — cave-sandbox
# Triumvirate deep-port: google/gvisor + kata-containers + firecracker-microvm.
# Charter v2 close — 2026-05-23.

# ── primary upstream: gVisor (Sentry/Gofer) ──────────────────────────────────
[upstream]
org        = "google"
repo       = "gvisor"
version    = "release-20260520.0"
license    = "Apache-2.0"
source_sha = "d8751e5ab6770060517e3cd00617820b6b8663a6"

# ── kata-containers ──────────────────────────────────────────────────────────
[[upstreams]]
org        = "kata-containers"
repo       = "kata-containers"
version    = "3.31.0"
license    = "Apache-2.0"
source_sha = "cec98e0d976bbf4cae016298ffea269f57294264"

# ── firecracker ──────────────────────────────────────────────────────────────
[[upstreams]]
org        = "firecracker-microvm"
repo       = "firecracker"
version    = "v1.15.1"
license    = "Apache-2.0"
source_sha = "f82c0bd0f0a74015642a0d452880f3ad10147b14"

[parity]
# 2026-05-23 — Charter v2 deep port across three upstreams.
#
# Mapped (42): OCI runtime-spec types; gVisor runsc cmd surface + state FSM;
# Sentry config + syscall allowlist; Gofer 9P descriptor + FD table; kata
# runtime cmd surface + sandbox state; kata-agent gRPC method set; QEMU/CH/
# Firecracker hypervisor configs + abstraction trait; containerd-shim Task v2
# method set; Firecracker VMM resources (MachineConfig/BootSource/Drive/NetIf/
# Vsock/Balloon/Logger/Metrics/Entropy); Firecracker REST API (axum router);
# jailer CLI params + chroot layout; unified lifecycle FSM + history; sandbox
# store + Postgres DDL; cave-sandbox HTTP API; observability surface.
#
# Out-of-scope (formal `scope_cut`): kernel-FFI (ptrace/KVM/vsock-kernel/9P-
# wire/seccomp-bpf install/tap-iface/clone-namespaces/cgroup-v2-attach) —
# the no-unsafe/no-FFI policy makes these out of process. Live VMM probes,
# CNI live calls, and ttrpc transports are out-of-process by design.
mapped_count          = 42
partial_count         = 2
skipped_count         = 15
unmapped_count        = 0
total                 = 59
fill_ratio            = 1.0000  # (mapped + partial + skipped) / total = 59/59
honest_ratio          = 0.7458  # (mapped + partial) / total            = 44/59
adr_justified_ratio   = 1.0000  # every scope_cut/unmapped cites this ADR or umbrella
adr_justification     = "ADR-RUNTIME-SANDBOX-NO-FFI-001, ADR-RUNTIME-PARITY-100-PCT-001"
parity_ratio_source   = "manifest"
last_audit            = "2026-05-24"
infra_only            = false

[module]
name        = "cave-sandbox"
description = "Sandbox runtime triumvirate — gVisor + Kata + Firecracker"
source_root = "src"
pump_priority = "HIGH"
target_tests  = 100

# 4-track status (2026-05-23):
#   Backend     : 4/4 — this crate (12 modules + api + store + observability)
#   Portal      : 0/4 — pending; orchestrator wires `/admin/sandbox` later
#   cavectl     : 0/4 — pending; orchestrator wires `cavectl sandbox` later
#   Observ.     : 4/4 — 9 panels + 5 alerts + observability.toml at crate root

