# ── Scope cuts (13) — formal, kernel/FFI-dependent ──────────────────────────
[[scope_cuts]]
name   = "gvisor-ptrace-platform"
reason = "Sentry's ptrace syscall interception calls PTRACE_SYSCALL/PTRACE_SETREGS — requires unsafe + cap_sys_ptrace; out of scope per no-FFI policy"
target = "out-of-process: external runsc binary"

[[scope_cuts]]
name   = "gvisor-kvm-platform"
reason = "KVM platform opens /dev/kvm and issues KVM_RUN ioctls; requires unsafe + cap_sys_admin; out of scope per no-FFI policy"
target = "out-of-process: external runsc binary"

[[scope_cuts]]
name   = "gvisor-systrap-platform"
reason = "systrap installs seccomp-bpf trap filter; requires seccomp(2) FFI; out of scope"
target = "out-of-process: external runsc binary"

[[scope_cuts]]
name   = "gvisor-netstack-userspace-tcp"
reason = "User-space TCP/IP stack (~120kLOC Go) — own crate `cave-netstack` if revived"
target = "cave-netstack (deferred)"

[[scope_cuts]]
name   = "gvisor-9p-wire-server"
reason = "Gofer 9P file server runs out-of-process over unix-socket; we model only the descriptor"
target = "out-of-process: external gofer binary"

[[scope_cuts]]
name   = "kata-vsock-rpc-transport"
reason = "Real kata-agent gRPC runs over AF_VSOCK to a live VM — requires KVM + kernel vsock module"
target = "out-of-process: live agent in VM"

[[scope_cuts]]
name   = "kata-virtio-fs-daemon"
reason = "virtiofsd spawn + virtio-fs queue — host-kernel + qemu-side"
target = "cave-runtime host-preflight"

[[scope_cuts]]
name   = "kata-cni-plugin-chain"
reason = "CNI plugin chain (bridge/tap creation) — owned by cave-cni crate"
target = "cave-cni"

[[scope_cuts]]
name   = "firecracker-kvm-syscalls"
reason = "Firecracker VMM hot-path is KVM ioctls + vCPU threads; no-FFI policy excludes"
target = "out-of-process: external firecracker binary"

[[scope_cuts]]
name   = "firecracker-tap-iface-creation"
reason = "Host-side tap-iface creation requires CAP_NET_ADMIN + RTNETLINK"
target = "cave-cni / cave-runtime host-preflight"

[[scope_cuts]]
name   = "firecracker-vsock-kernel-module"
reason = "vsock kernel module + CID allocation is host-kernel state"
target = "cave-runtime host-preflight"

[[scope_cuts]]
name   = "firecracker-jailer-namespaces"
reason = "Jailer's CLONE_NEW{NS,PID,NET,UTS,IPC,USER} sequence + cgroup-v2 attach — requires unsafe clone(2)"
target = "out-of-process: external jailer binary"

[[scope_cuts]]
name   = "containerd-ttrpc-transport"
reason = "Task v2 ttrpc service binds a Unix-domain socket and serves protobuf wire; transport is out-of-process"
target = "out-of-process: cave-containerd-shim"

# ── Phase 2 deferred — reclassified to scope_cuts by ADR-RUNTIME-SANDBOX-NO-FFI-001 (§3) ──
[[scope_cuts]]
name   = "gvisor-checkpoint-restore"
reason = "Sentry CRIU-style checkpoint/restore (`runsc checkpoint`) — uses sentry-internal serialization formats with no public schema. out-of-scope-subsystem (Phase 2); ADR-RUNTIME-SANDBOX-NO-FFI-001 §3"
target = "deferred — Phase 2"

[[scope_cuts]]
name   = "firecracker-snapshot-resume"
reason = "Firecracker snapshot/resume v2 (RESTORE_FROM_SNAPSHOT) — JSON shape stable but exhaustive coverage of all device states (block / net / vsock / balloon) requires per-device CRIU traversal not in scope this pass. out-of-scope-subsystem (Phase 2); ADR-RUNTIME-SANDBOX-NO-FFI-001 §3"
target = "deferred — Phase 2"
