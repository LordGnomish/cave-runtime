# parity.manifest.toml — cave-uptime
# Upstream: louislam/uptime-kuma  https://github.com/louislam/uptime-kuma
# Charter v2 honest close — 2026-05-28
# 2026-05-30 honest uplift — line-ported the maintenance-window evaluation
#   engine (server/model/maintenance.js) via strict TDD: 1 skip -> mapped.

[upstream]
org        = "louislam"
repo       = "uptime-kuma"
version    = "v1.23.13"
source_sha = "3b32a5c99be7ace7f5fbc58dd8c12b2a13a5c4d8"
name       = "Uptime Kuma"
license    = "MIT"
language   = "JavaScript"
url        = "https://github.com/louislam/uptime-kuma"

[parity]
# 2026-05-28 honest close — implemented real HTTP/TCP/DNS/Push probes, scheduler,
# heartbeat history, window stats (24h/7d/30d), status page, retry, CRUD routes;
# ADR-justified 8 sibling/out-of-scope cuts.
# 2026-05-30 — maintenance-window evaluation engine ported (skipped -> mapped),
#   now 14 mapped / 6 skipped of 20 -> honest_ratio 0.70.
parity_ratio_source = "manifest"
fill_ratio          = 1.0
honest_ratio        = 0.7
adr_justified_ratio = 1.0
adr_justification   = "ADR-RUNTIME-PARITY-100-PCT-001, ADR-RUNTIME-STACK-001"
mapped_count        = 14
partial_count       = 0
skipped_count       = 6
unmapped_count      = 0
total               = 20
last_audit          = "2026-05-30"
infra_only          = false

# ── Mapped surfaces ──────────────────────────────────────────────────────────

[[mapped]]
area    = "HTTP/HTTPS monitor"
detail  = "execute_http_probe: reqwest-based GET with timeout, keyword check, status check, follow-redirects"
file    = "src/probe.rs"

[[mapped]]
area    = "TCP port monitor"
detail  = "execute_tcp_probe: tokio TcpStream::connect with timeout and DNS resolution"
file    = "src/probe.rs"

[[mapped]]
area    = "DNS monitor"
detail  = "execute_dns_probe: system resolver via ToSocketAddrs on blocking thread pool with timeout"
file    = "src/probe.rs"

[[mapped]]
area    = "Push monitor (passive heartbeat)"
detail  = "evaluate_push_probe: checks last_push_at vs interval + 30s grace; POST /api/uptime/push/:id"
file    = "src/probe.rs"

[[mapped]]
area    = "Monitor scheduler"
detail  = "ProbeScheduler: interval-based due_probes(), mark_executed(), register/unregister, jitter config"
file    = "src/scheduler.rs"

[[mapped]]
area    = "Heartbeat history storage"
detail  = "HeartbeatStore: bounded ring buffer (VecDeque) per probe, capacity-limited, get_history()"
file    = "src/history.rs"

[[mapped]]
area    = "Uptime statistics (24h/7d/30d windows)"
detail  = "compute_window_stats: window-filtered uptime%, avg/min/max latency, all three UptimeWindow variants"
file    = "src/history.rs"

[[mapped]]
area    = "Monitor status model"
detail  = "MonitorStatus enum (Up/Down/Pending/Maintenance), ProbeStatusSummary, all_operational()"
file    = "src/status.rs"

[[mapped]]
area    = "Status page builder"
detail  = "build_status_page: aggregates probe summaries into StatusPage with up/down counts and overall uptime"
file    = "src/status.rs"

[[mapped]]
area    = "Probe CRUD store"
detail  = "ProbeStore: RwLock<HashMap> with insert/get/list/update/delete"
file    = "src/store.rs"

[[mapped]]
area    = "REST API routes"
detail  = "GET/POST /probes, GET/PUT/DELETE /probes/:id, /probes/:id/history, /probes/:id/stats, /status, push"
file    = "src/routes.rs"

[[mapped]]
area    = "Retry logic"
detail  = "execute_with_retry: exponential backoff with configurable max_attempts, base_delay, multiplier, cap"
file    = "src/retry.rs"

[[mapped]]
area    = "Uptime stats engine"
detail  = "calculate_stats, failed_results, is_below_threshold from probe result slices"
file    = "src/engine.rs"

[[mapped]]
# 2026-05-30 strict-TDD: line-ported from server/model/maintenance.js
# (calcDuration / getStatus / isUnderMaintenance / getDayOfWeekList /
#  recurring-strategy window evaluation). DB persistence + croner + socket
# fan-out stay out of crate; pure time/calendar evaluation is in-crate.
area    = "Maintenance window scheduling"
detail  = "Maintenance engine: manual/single/recurring-{interval,weekday,day-of-month} strategies, calc_duration (cross-midnight +24h), get_status (inactive/scheduled/ended/under-maintenance), is_active_at window check, is_under_maintenance"
file    = "src/maintenance.rs"
local   = "src/maintenance.rs"
note    = "Port of Uptime Kuma server/model/maintenance.js evaluation logic; 15 TDD tests in tests/maintenance_tdd.rs"

