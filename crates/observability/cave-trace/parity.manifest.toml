note = "Cassandra db-model codec line-port: DbSpan from_domain/to_domain (16-byte big-endian TraceID, StartTime+Duration in microseconds per model.TimeAsEpochMicroseconds/DurationAsMicroseconds, span_hash), DbKeyValue typed encoding + AsString with value-type constants string/bool/int64/float64/binary + CHILD_OF/FOLLOWS_FROM reftypes, GetAllUniqueTags (combine process+span+log tags, sort, skip binary, dedupe adjacent → TagInsertion). 2026-05-30 TDD RED->GREEN (tests/cassandra_dbmodel_tdd.rs, 8 cases). The live gocql session + CQL DDL stay scope_cut (operational-storage-backends)."

[[mapped]]
