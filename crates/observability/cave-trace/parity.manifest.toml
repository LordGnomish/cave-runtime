upstream = "cmd/ingester"
reason = "Standalone Kafka consumer binary draining storage-kafka into a span store. Skipped jointly with storage-kafka — Phase 3 cave-streams bridge."

[[skipped]]
name = "cmd-remote-storage-binary"
upstream = "cmd/remote-storage"
reason = "Standalone gRPC plugin host. Skipped jointly with storage-grpc-remote."

[[skipped]]
name = "es-tooling"
upstream = "cmd/es-index-cleaner + cmd/es-rollover + cmd/esmapping-generator"
reason = "Elasticsearch-specific operational tooling. Out of scope without storage-elasticsearch."

[[skipped]]
name = "sampling-leader-election"
upstream = "plugin/sampling/leaderelection"
reason = "Distributed sampling coordination across collector replicas — requires cave-ha shared-state coordination. Phase 3 deferred."

[[skipped]]
name = "jaeger-v2-otel-binary"
upstream = "cmd/jaeger"
reason = "Jaeger v2 OTel-collector-based binary (separate code path from v1 query/collector). cave-trace targets the v1 API surface contract; v2 wrapper is operational packaging."

# ─── Unmapped subsystems — formally scope-cut 2026-05-28 (uplift-pz ray) ─────
# Former [[unmapped]] entries (agent-grpc-forwarder, storage-archival) are
# now categorical [[skipped]] below since both are split-host / Phase 3
# architectural decisions, not algorithmic gaps. ADR-justified per
# ADR-RUNTIME-PARITY-100-PCT-001 §1 (split-host deployment) + §5
# (Phase 3 cave-store integration).

[[skipped]]
name         = "agent-grpc-forwarder"
upstream     = "cmd/agent/app/reporter/grpc/reporter.go"
scope_cut_to = "split-host-agent-collector (Phase 3)"
reason       = "Jaeger agent's gRPC forwarder to collector (agent batches UDP spans then ships via gRPC). cave-trace's embedded UDP agent writes directly into the in-process TraceStore so the gRPC forwarder hop is structurally unnecessary today. Reopens if a future deployment splits agent + collector across hosts."

[[skipped]]
name         = "storage-archival"
upstream     = "storage/spanstore/composite/composite.go (archival second writer)"
scope_cut_to = "cave-store (Phase 3)"
reason       = "Secondary archival writer (warm → cold) mirroring traces to a second backend. cave-trace exposes one TraceStore today; archival composition lands alongside cave-store S3 integration in Phase 3."

# ─── Scope cuts (deliberate Phase 3 deferrals) ───────────────────────────────

[[scope_cuts]]
group = "operational-storage-backends"
reason = "kafka / grpc-remote / scylladb / blackhole are operational deployment surfaces — cave-trace covers them in [[skipped]] (4 entries). The cassandra / elasticsearch / badger db-model *codecs* are now [[mapped]] in-crate (src/storage_cassandra.rs, src/storage_es.rs, src/storage_badger.rs); only their live network/mmap *drivers* remain scope_cut here. MVP routes operational storage through cave-store (S3 surface) in Phase 3."
phase = "Phase 3 — cave-store / cave-search / cave-streams integration"

[[scope_cuts]]
group = "standalone-cli-binaries"
reason = "cmd/ingester + cmd/remote-storage + cmd/tracegen + es-tooling are standalone binaries — cave-trace runs inside cave-runtime, not as separate processes. Their data-plane behaviors map to in-process functions."
phase = "Phase 3 — only if cave-runtime composition demands process splits"

[[scope_cuts]]
group = "split-host-agent-collector"
reason = "Agent → Collector gRPC forwarder (cmd/agent/app/reporter/grpc) only applies when agent and collector run on separate hosts. cave-trace's embedded UDP agent writes directly into the in-process TraceStore, making the forwarder structurally unnecessary in the single-binary deployment model."
phase = "Phase 3 — only if cave-runtime composition is split across hosts"

[[scope_cuts]]
group = "archival-second-writer"
reason = "Composite spanstore with a second archival writer (storage/spanstore/composite) requires a second TraceStore backend. MVP ships a single in-memory TraceStore; archival composition lands with cave-store warm/cold integration in Phase 3."
phase = "Phase 3 — cave-store warm/cold storage integration"

