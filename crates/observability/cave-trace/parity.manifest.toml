upstream = "plugin/storage/badger/spanstore/writer.go (key layout)"
local = "src/storage_badger.rs"
note = "Badger key-encoding store line-port: byte-exact primary key [0x80|traceHigh|traceLow|startMicros|spanID] + secondary index key [(prefix&0x0f)|0x80|value|startMicros|traceHigh|traceLow] with per-index value bytes (service / service+operation / service+operation+duration8B / service+key+AsString tag), backed by an in-process BTreeMap reproducing Badger's sorted LSM ordering so write_span + get_trace + trace_ids_by_service prefix-scans genuinely read through the real layout. 2026-05-30 TDD RED->GREEN (tests/badger_keys_tdd.rs, 8 cases). The live Badger mmap LSM + value-log + GC stay scope_cut (operational-storage-backends)."

