note = "tracegen span-shape construction line-port: root SERVER span 'lets-go' (peer.service/peer.host.ipv4 + debug/firehose flags) + N child CLIENT spans 'child-span-NN', 123us fakeSpanDuration each, parent total = ChildSpans*fakeSpanDuration, cyclic attr_NN/val_NN keys mod attr_keys/attr_values; simulate_one_trace + simulate_traces (workers*traces, services suffix). 2026-05-30 TDD RED->GREEN (tests/tracegen_tdd.rs, 7 cases). The standalone cmd/tracegen binary + OTLP exporter stay scope_cut (standalone-cli-binaries)."

