# NOTE: the cassandra / elasticsearch / badger *db-model codecs* (Wave 5) + the
# kafka *marshaller codec* + the esmapping-generator *render logic* (Wave 6)
# were promoted to [[mapped]] on 2026-05-30 — only their live network/mmap
# drivers, the Kafka transport, and the es-cleaner/rollover CLIs remain
