upstream = "plugin/storage/grpc"
reason = "Out-of-process gRPC storage plugin host. cave-trace runs in-process inside cave-runtime; gRPC remote-plugin protocol is operational not API surface."

[[skipped]]
name = "storage-scylladb"
upstream = "plugin/storage/scylladb"
reason = "Cassandra-protocol-compatible store. Same rationale as storage-cassandra; one would imply the other."

[[skipped]]
