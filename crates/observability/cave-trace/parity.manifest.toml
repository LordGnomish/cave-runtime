name = "tempo-trace-combiner"
upstream = "grafana/tempo pkg/model/trace/combine.go (CombineTraceProtos + tokenForID)"
local = "src/trace_combiner.rs"
note = "Tempo read-path trace combiner line-port: when a querier reads a trace it receives several partial copies (one per ingester replica + one per touched block); combine_traces merges two copies into one, deduping spans by tokenForID — an FNV-1/32 hash over the span-ID bytes followed by the span kind as 4 little-endian bytes — so a B3-propagated client/server pair that shares one span ID but differs in kind keeps both halves. All of a survives (a wins on conflict), unique b-spans append in original order, and the number of b-spans dropped as duplicates (of a or of an already-kept b) is returned for over-read accounting. 2026-05-31 TDD RED->GREEN (7 cases). The live querier block/ingester fan-out + bloom/WAL read path stay in cave-store / Phase 3. Tempo-compat subsystem (Apache-2.0)."

