note = "Elasticsearch db-model codec line-port: EsSpan document with model.TraceID/SpanID.String() hex IDs (high word dropped when zero), startTime+duration micros plus the startTimeMillis ES routing field, UPPERCASE CHILD_OF/FOLLOWS_FROM references, structured EsKeyValue tags array + Kibana flattened tag map (gated on all_tags_as_fields / tag_keys_as_fields, dots→@ DEFAULT_TAG_DOT_REPLACEMENT, binary excluded), date-rotated [prefix-]jaeger-span-YYYY-MM-DD index naming. 2026-05-30 TDD RED->GREEN (tests/es_dbmodel_tdd.rs, 9 cases). The live ES bulk HTTP client + ILM rollover stay scope_cut (operational-storage-backends)."

[[mapped]]
