# parity.manifest.toml — cave-ai-obs
# Upstream: langfuse/langfuse  https://github.com/langfuse/langfuse  pinned v3.75.1
#
# cave-ai-obs implements the Langfuse LLM observability core:
#   - Trace ingestion (upsert by id, user/session attribution, status tracking)
#   - Span tracking (sub-spans with parent-child linkage, latency)
#   - Generation tracking (LLM calls: model, tokens, cost, parameters, latency)
#   - Score ingestion (human/model/API scoring with named metrics)
#   - Session grouping (trace→session aggregation, first/last, user roster)
#   - Analytics (per-model stats, p50/p95/p99 latency, cost windows, top-N)
#   - Prompt template management (versioned, {{variable}} substitution)
#   - Full REST API (15 routes: traces/spans/generations/scores/prompts/stats)
#   - Charter v2 8-gate self-audit

[upstream]
org        = "langfuse"
repo       = "langfuse"
version    = "v3.75.1"
name       = "Langfuse"
license    = "MIT"
language   = "TypeScript"
url        = "https://github.com/langfuse/langfuse"
source_sha = "a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2"

[parity]
# 2026-05-29 honest close — implemented real trace/span/gen/score/session/prompt/analytics;
# ADR-justified 9 sibling/out-of-scope cuts (web-UI, auth, SDK, media, datasets, eval, export, SSO, webhooks)
parity_ratio_source = "manifest"
fill_ratio          = 1.0
honest_ratio        = 0.5000
adr_justified_ratio = 1.0
adr_justification   = "ADR-RUNTIME-PARITY-100-PCT-001, ADR-RUNTIME-STACK-001"
mapped_count        = 6
partial_count       = 3
skipped_count       = 9
unmapped_count      = 0
total               = 18
last_audit          = "2026-05-29"
infra_only          = false

[[mapped]]
area    = "Trace ingestion"
surface = "POST /api/ai-obs/traces, GET /api/ai-obs/traces, GET /api/ai-obs/traces/{id}"
local   = "src/trace_store.rs + src/routes.rs"
notes   = "Upsert-by-id, user/session attribution, status, tags, metadata, newest-first listing"

[[mapped]]
area    = "Span tracking"
surface = "POST /api/ai-obs/spans, GET /api/ai-obs/traces/{id}/spans"
local   = "src/trace_store.rs + src/routes.rs"
notes   = "Sub-spans with parent_span_id linkage, latency, input/output capture"

[[mapped]]
area    = "Generation tracking"
surface = "POST /api/ai-obs/generations, GET /api/ai-obs/traces/{id}/generations"
local   = "src/trace_store.rs + src/routes.rs"
notes   = "LLM call details: model, prompt/completion/total tokens, cost_usd, latency, model_parameters"

[[mapped]]
area    = "Score ingestion"
surface = "POST /api/ai-obs/scores, GET /api/ai-obs/traces/{id}/scores"
local   = "src/trace_store.rs + src/routes.rs"
notes   = "Named scores (quality/relevance/safety/etc.), Human/Model/API source, per-generation link"

[[mapped]]
area    = "Session grouping"
surface = "session_id field on Trace, TraceStore::get_session()"
local   = "src/trace_store.rs"
notes   = "Groups traces into sessions; computes trace_count, first/last timestamps, user roster"

[[mapped]]
area    = "Prompt template management"
surface = "POST/GET /api/ai-obs/prompts/{name}, versioned templates"
local   = "src/prompt.rs + src/trace_store.rs + src/routes.rs"
notes   = "Versioned PromptTemplate with {{var}} substitution, is_active flag, extract_variables"

[[partial]]
area    = "User attribution"
surface = "user_id on traces/scores, list_traces filter"
local   = "src/trace_models.rs + src/trace_store.rs"
notes   = "user_id stored and filterable; full user analytics dashboard is parallel-track cave-portal"

[[partial]]
area    = "Analytics and statistics"
surface = "GET /api/ai-obs/stats, /stats/costs, /stats/models"
local   = "src/analytics.rs + src/routes.rs"
notes   = "Per-model stats (p50/p95/p99 latency, token/cost totals), cost windows, top-N; ClickHouse backend is out-of-launch-scope"

[[partial]]
area    = "Engine (LlmTrace/LlmStats legacy)"
surface = "calculate_stats, filter_by_model, cost_per_thousand_tokens"
local   = "src/engine.rs + src/models.rs"
notes   = "Legacy simple stats API; full feature parity uses trace_store.rs + analytics.rs; kept for backward compat"

[[skipped]]
area    = "Web UI dashboard"
surface = "Langfuse React frontend (traces table, eval UI, prompt editor)"
reason  = "parallel-track cave-portal — UI is cave-portal responsibility"

[[skipped]]
area    = "Auth, RBAC, API keys"
surface = "Langfuse auth (JWT, SCIM, project-level RBAC, API key rotation)"
reason  = "parallel-track cave-identity — all auth/RBAC is cave-identity's responsibility"

[[skipped]]
area    = "Webhooks and event triggers"
surface = "Langfuse webhooks (trace-created, score-created, evaluation-complete events)"
reason  = "parallel-track cave-alerts — event delivery belongs to cave-alerts"

[[skipped]]
area    = "SDK integrations (Python/JS/TypeScript clients)"
surface = "langfuse Python SDK, langfuse-js, OpenAI/LangChain/LlamaIndex decorators"
reason  = "out-of-scope-subsystem — language-specific SDK clients not part of Rust backend"

[[skipped]]
area    = "Media/blob capture"
surface = "Langfuse media upload (images, audio, arbitrary binary attachments on traces)"
reason  = "out-of-scope-subsystem — blob storage belongs to cave-artifacts"

[[skipped]]
area    = "Dataset management"
surface = "Langfuse datasets (create dataset, dataset items, run evaluations on datasets)"
reason  = "out-of-launch-scope — eval dataset management is a Phase 2 feature"

[[skipped]]
area    = "Evaluation pipeline (LLM-as-judge)"
surface = "Langfuse automated evaluations (configureEvaluator, run LLM judge on traces)"
reason  = "parallel-track cave-llm-gateway — LLM inference routing is cave-llm-gateway's scope"

[[skipped]]
area    = "Analytics export (ClickHouse/CSV/Parquet)"
surface = "Langfuse ClickHouse persistence, CSV/Parquet analytics export, data warehouse"
reason  = "out-of-launch-scope — analytics persistence/export is a Phase 2 concern"

[[skipped]]
area    = "SCIM/SSO provisioning"
surface = "Langfuse SCIM user provisioning, SSO (SAML, OIDC) configuration"
reason  = "parallel-track cave-identity — SSO/SCIM belongs to cave-identity"

[module]
name        = "cave-ai-obs"
description = "LLM observability — Langfuse v3 compatible (traces, spans, generations, scores, prompts, analytics)"
source_root = "src"

[portal_ui]
upstream_ui  = "Langfuse"
upstream_url = "https://langfuse.com/"
status       = "parallel-track"
loc          = 0
priority     = "P2"
notes        = "Langfuse frontend UI — parallel-track cave-portal; REST API for all data access is implemented here"
last_audit   = "2026-05-29"
