[package]
name = "cave-tracing"
description = "Grafana Alloy reimplementation — Alloy/River config syntax + component-graph controller + OpenTelemetry span SDK (batching, sampling, OTLP exporter, W3C propagation, multi-tenant)"
authors.workspace = true
repository.workspace = true
homepage.workspace = true
documentation = "https://docs.rs/cave-tracing"
readme = "README.md"
rust-version.workspace = true
keywords = ["tracing", "opentelemetry", "telemetry", "observability", "sdk"]
categories = ["api-bindings", "asynchronous", "development-tools"]
version.workspace = true
edition.workspace = true
license.workspace = true

[dependencies]
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
chrono = { workspace = true }
thiserror = { workspace = true }
parking_lot = { workspace = true }
async-trait = { workspace = true }
reqwest = { workspace = true }

[dev-dependencies]
proptest = "1"
tokio = { workspace = true, features = ["test-util", "macros", "rt-multi-thread"] }
