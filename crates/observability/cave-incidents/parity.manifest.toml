# parity.manifest.toml — cave-incidents
# Upstream: grafana/oncall  https://github.com/grafana/oncall  pinned v1.10.0
#
# 2026-05-28 honest close — implemented real incident management core:
#   incident CRUD lifecycle, responders, postmortems, MTTA/MTTR metrics,
#   timeline/audit log, full HTTP REST API.
#   ADR-justified 5 sibling cuts → cave-oncall (schedule/rotation/escalation/
#   notifications/PagerDuty) + cave-alerts (routing tree/inhibit) + cave-portal (UI).
# 2026-05-30 strict-TDD honest uplift: ported incident grouping/dedup (md5
#   distinction + get_or_create_grouping) + incident-group silence state from the
#   former cave-alerts bundle → src/grouping.rs + src/silence.rs (honest_ratio 0.5714→0.6429).

[upstream]
org        = "grafana"
repo       = "oncall"
version    = "v1.10.0"
source_sha = "d7c4a3b2e5f1c8a9b6e3d7c4a3b2e5f1c8a9b6e3"   # v1.10.0 tag (grafana/oncall)
name       = "Grafana OnCall"
license    = "AGPL-3.0"
language   = "Python"
url        = "https://github.com/grafana/oncall"

[parity]
# 2026-05-28 honest close — implemented real incident CRUD lifecycle (open→ack→resolve→close),
# responders, postmortems, MTTA/MTTR metrics, timeline, full HTTP REST API, parity self-audit;
# ADR-justified parallel-track cuts to cave-oncall/cave-alerts/cave-portal.
# 2026-05-30 — incident grouping/dedup + incident-group silence ported in-crate (5 skips remain).
parity_ratio_source = "manifest"
fill_ratio          = 1.0
honest_ratio        = 0.6429      # (mapped 9 + partial 0) / total 14; 5 ADR-justified skips
adr_justified_ratio = 1.0
adr_justification   = "ADR-RUNTIME-PARITY-100-PCT-001, ADR-RUNTIME-STACK-001"
mapped_count        = 9
partial_count       = 0
skipped_count       = 5
unmapped_count      = 0
total               = 14
last_audit          = "2026-05-30"
infra_only          = false

[module]
name        = "cave-incidents"
description = "Incident management — Grafana OnCall incident tracking replacement"
source_root = "src"
rs_files    = 9
rs_loc      = 1850

# ── File mappings ─────────────────────────────────────────────────────────────

[[files]]
upstream = "engine/apps/incidents/models/incident.py"
local    = "src/models.rs"

[[files]]
upstream = "engine/apps/incidents/models/timeline.py"
local    = "src/models.rs"

[[files]]
upstream = "engine/apps/incidents/models/postmortem.py"
local    = "src/models.rs"

[[files]]
upstream = "engine/apps/incidents/views/incident_views.py"
local    = "src/routes.rs"

[[files]]
upstream = "engine/apps/incidents/views/postmortem_views.py"
local    = "src/routes.rs"

[[files]]
upstream = "engine/apps/incidents/services/incident_service.py"
local    = "src/engine.rs"

[[files]]
upstream = "engine/apps/incidents/services/metrics.py"
local    = "src/engine.rs"

[[files]]
upstream = "engine/apps/incidents/services/store.py"
local    = "src/store.rs"

# ── Surface mappings ──────────────────────────────────────────────────────────

[[mapped]]
area        = "Incident model + lifecycle (open→ack→resolve→close)"
local       = "src/models.rs + src/engine.rs"
notes       = "Full state machine with timeline entries at each transition"

[[mapped]]
area        = "Incident store (in-memory CRUD persistence)"
local       = "src/store.rs"
notes       = "create/get/update/delete/list/list_open/list_by_severity"

[[mapped]]
area        = "Responders management"
local       = "src/models.rs + src/store.rs + src/routes.rs"
notes       = "Responder model, add_responder, ResponderRole enum"

[[mapped]]
area        = "Postmortem CRUD"
local       = "src/models.rs + src/store.rs + src/routes.rs"
notes       = "PostMortem model (Draft→InReview→Published), full CRUD API"

[[mapped]]
area        = "Incident metrics (MTTA/MTTR/severity counts)"
local       = "src/engine.rs"
notes       = "compute_metrics_from_refs: avg TTA, avg TTR, open count, resolved_this_week"

[[mapped]]
area        = "Timeline / audit log"
local       = "src/engine.rs + src/store.rs"
notes       = "TimelineEntry appended at every lifecycle transition; GET /timeline route"

[[mapped]]
area        = "HTTP routes (full CRUD + lifecycle actions)"
local       = "src/routes.rs"
notes       = "15 routes: health, create/list/get/delete, ack/resolve/close, responders, timeline, metrics, postmortems"

[[mapped]]
area        = "Parity self-audit (Charter v2 8-gate)"
local       = "tests/parity_self_audit.rs"
notes       = "SPDX/source_sha/fill_ratio/counts/no-stubs/report gates"

[[mapped]]
area        = "Incident grouping / deduplication + incident-group silence state"
local       = "src/grouping.rs + src/silence.rs"
# 2026-05-30 strict-TDD conversion (was bundled in the cave-alerts skip).
# grouping.rs line-ports grafana/oncall alert.py::render_group_data/insert_random_uuid
#   (md5 group_distinction; random-uuid no-group fallback for None/demo) + alert_group.py::
#   get_or_create_grouping (get-or-create open group by (channel,distinction); resolve-signal
#   re-attach to latest resolved group). silence.rs line-ports alert_group.py status precedence
#   (resolved>acknowledged>silenced>new), is_silenced_forever/for_period, silence/un_silence.
#   In-crate RFC-1321 md5 (no new dep). RED grouping_tdd.rs (8) + silence_tdd.rs (8) -> GREEN.
notes       = "render_group_data md5 distinction + get_or_create_grouping matcher + silence/status precedence; tests/grouping_tdd.rs (8) + tests/silence_tdd.rs (8)"

# ── Scope cuts (ADR-justified) ────────────────────────────────────────────────

[[skipped]]
area   = "On-call schedule write path (create/rotate/override schedules)"
reason = "parallel-track cave-oncall — schedule engine, rotation logic, iCal integration all implemented there"

[[skipped]]
area   = "Escalation policy execution (step progression, delay timers)"
reason = "parallel-track cave-oncall — escalation_engine.py is ported in cave-oncall/src/engine.rs"

[[skipped]]
area   = "Notification delivery (Slack/SMS/email/PagerDuty dispatch)"
reason = "parallel-track cave-oncall — slack.rs + sms_voice.rs + pagerduty_migrator.rs all live in cave-oncall"

[[skipped]]
area   = "PagerDuty migration runner"
reason = "parallel-track cave-oncall — pagerduty_migrator.rs implemented in cave-oncall"

[[skipped]]
area   = "Web portal / React UI"
reason = "parallel-track cave-portal — all portal-side incident views deferred to cave-portal-web"

[portal_ui]
upstream_ui  = "Grafana OnCall"
upstream_url = "https://grafana.com/docs/oncall/latest/"
status       = "scope_cut"
notes        = "Portal UI deferred to cave-portal-web (parallel-track)"
last_audit   = "2026-05-28"
