[package]
name = "cave-logs"
description = "Log aggregation with full Loki parity — LogQL engine, multi-tenant storage, Loki push API, syslog, OTLP, Fluentd"
version.workspace = true
edition.workspace = true
license.workspace = true

[dependencies]

# Async
tokio = { workspace = true }
futures-util = "0.3"

# Web
axum = { workspace = true, features = ["ws"] }

# Serialization
serde = { workspace = true }
serde_json = { workspace = true }

# Protobuf + compression
prost = "0.13"
snap = "1"
flate2 = "1"
lz4_flex = "0.11"
zstd = "0.13"

# Storage
bloomfilter = "1"

# Logging / tracing
tracing = { workspace = true }

# Utilities
uuid = { workspace = true }
chrono = { workspace = true }
thiserror = { workspace = true }
anyhow = { workspace = true }
regex = { workspace = true }
bytes = "1"
parking_lot = "0.12"

[dev-dependencies]
proptest = "1"
tokio = { workspace = true }
serde_json = { workspace = true }
tower = { workspace = true }
