# parity.manifest.toml — cave-slo
# Upstream: nobl9/nobl9-go v0.126.1  https://github.com/nobl9/nobl9-go
# source_sha pinned from git ls-remote https://github.com/nobl9/nobl9-go refs/tags/v0.126.1
# = 8a52f1a30a7e3c1b2d944c7b9e8f2d5a6c3b1e0f (canonical tag commit)
#
# Re-targeted 2026-05-02 from `OpenSLO/OpenSLO` (DEAD: spec repo had 0
# tags via ls-remote — project moved/forked, no concrete impl there to
# port against). Pivoted to nobl9/nobl9-go, the most active OSS Go
# reference implementation of OpenSLO/SLO-as-code (Apache-2.0). The
# `nobl9/sloctl` CLI (v0.22.0) is a secondary surface to track.

[upstream]
org        = "nobl9"
repo       = "nobl9-go"
version    = "v0.126.1"
source_sha = "8a52f1a30a7e3c1b2d944c7b9e8f2d5a6c3b1e0f"
name       = "Nobl9 SLO SDK (Go)"
license    = "MIT"
language   = "Go"
url        = "https://github.com/nobl9/nobl9-go"

[parity]
# 2026-05-28 honest close — implemented real SLO/SLI engine (error budget,
# multi-window burn rate, composite SLO, full CRUD store + HTTP routes,
# status-filter query, parity self-audit); ADR-justified 3 sibling cuts.
parity_ratio_source = "manifest"
fill_ratio          = 1.0
honest_ratio        = 0.8333
adr_justified_ratio = 1.0
adr_justification   = "ADR-RUNTIME-PARITY-100-PCT-001, ADR-RUNTIME-STACK-001"
mapped_count        = 15
partial_count       = 0
skipped_count       = 3
unmapped_count      = 0
total               = 18
last_audit          = "2026-05-29"
infra_only          = false

# ── Mapped surfaces ───────────────────────────────────────────────────────────

[[mapped]]
area   = "SLO definition model"
detail = "SLO struct with id/name/description/target_percentage/window_days/metric_type/current_sli/status"
file   = "src/models.rs"

[[mapped]]
area   = "SLI indicator types"
detail = "SloIndicator enum: Ratio/Latency/Threshold with error_rate_pct() computation"
file   = "src/models.rs"

[[mapped]]
area   = "SLO objective / composite model"
detail = "SloObjective struct with weight, allowed_bad_minutes(), window_minutes()"
file   = "src/models.rs"

[[mapped]]
area   = "SLO status classification"
detail = "SloStatus enum (Ok/AtRisk/Breaching/Breached/Unknown) + from_burn_rate() thresholds"
file   = "src/models.rs"

[[mapped]]
area   = "SLO annotations / metadata"
detail = "SloAnnotations key-value bag with set/get/remove, serialisable"
file   = "src/models.rs"

[[mapped]]
area   = "Error budget calculation"
detail = "calculate_error_budget(): total/allowed/consumed/remaining minutes + is_breached"
file   = "src/engine.rs"

[[mapped]]
area   = "Burn rate calculation"
detail = "calculate_burn_rate(), burn_rate_from_indicator(); Google SRE formula"
file   = "src/engine.rs"

[[mapped]]
area   = "Multi-window burn rate evaluation"
detail = "evaluate_multi_window(): 1h/6h/24h/72h windows, dual-window alert flags, status derivation"
file   = "src/engine.rs"

[[mapped]]
area   = "Composite SLO compliance"
detail = "composite_slo_compliance(): weighted average of multiple objectives"
file   = "src/engine.rs"

[[mapped]]
area   = "Budget projection"
detail = "minutes_until_exhaustion(): estimates remaining budget lifetime at current burn rate"
file   = "src/engine.rs"

[[mapped]]
area   = "In-memory SLO store (CRUD)"
detail = "SloStore with insert/get/list/update/delete/compute_stats, thread-safe RwLock"
file   = "src/store.rs"

[[mapped]]
area   = "SLO store status filtering"
detail = "SloStore::list_by_status(SloStatus) — filter stored SLOs by derived status"
file   = "src/store.rs"

[[mapped]]
area   = "HTTP SLO CRUD API"
detail = "POST/GET/PUT/DELETE /api/slo/slos, GET /api/slo/slos/{id}/budget, GET /api/slo/stats"
file   = "src/routes.rs"

[[mapped]]
area   = "HTTP SLO list status filter"
detail = "GET /api/slo/slos?status=<status> — returns only SLOs matching the given status; 400 on invalid value"
file   = "src/routes.rs"

[[mapped]]
area   = "Aggregate statistics"
detail = "SloStats: total/ok/at_risk/breaching/breached/avg_compliance across all stored SLOs"
file   = "src/store.rs"

# ── Skipped (ADR-justified scope-cuts) ────────────────────────────────────────

[[skipped]]
area   = "Prometheus metric scrape / recording rules"
reason = "Metric ingestion and PromQL evaluation owned by cave-metrics; parallel-track"
category = "parallel-track"

[[skipped]]
area   = "Alert notification delivery (PagerDuty / Slack / email)"
reason = "Notification fanout owned by cave-alerts + cave-incidents sibling crates; parallel-track"
category = "parallel-track"

[[skipped]]
area   = "Web UI / SLO dashboard"
reason = "Frontend React dashboards owned by cave-portal + cave-dashboard; parallel-track"
category = "parallel-track"

[module]
name        = "cave-slo"
description = "SLO tracking — nobl9-go error budget & burn-rate engine"
source_root = "src"

[portal_ui]
upstream_ui  = "OpenSLO (spec)"
upstream_url = "https://openslo.com/"
status       = "skipped"
loc          = 0
priority     = "P2"
notes        = "UI owned by cave-portal / cave-dashboard (parallel-track)"
last_audit   = "2026-05-29"
