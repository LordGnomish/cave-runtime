# ── Phase 2 mapped (2026-05-19 deep-port) ────────────────────────────────────

[[mapped]]
upstream_pkg = "grafana/grafana:pkg/plugins (backend datasource plugin SDK)"
local_files  = ["src/plugin_sdk.rs"]
note         = "PluginManifest TOML parser + PluginRegistry + BackendPlugin trait (health_check + query); supports Datasource/Panel/App kinds with id-mismatch + duplicate guards."

[[mapped]]
upstream_pkg = "grafana/grafana:public/app/features/explore (multi-source explore)"
local_files  = ["src/explore.rs"]
note         = "ExploreController — query planner groups by datasource; CorrelationRule::{ByTraceId, ByExactTimestamp, ByTimeWindow}; SourceKind enum covers Prom/Loki/Jaeger/Tempo/Postgres/ES/Influx."

[[mapped]]
upstream_pkg = "grafana/grafana:public/app/features/transformations (filter/reduce/merge/rename/sortBy)"
local_files  = ["src/transformations.rs"]
note         = "DataFrame transforms: filter (NoNulls/ValueBetween/EqualLabel), reduce (mean/sum/min/max/last/count), merge (concat tall + NaN-pad missing), rename (starts_with replacement), sort_by (asc/desc)."

[[mapped]]
upstream_pkg = "grafana/grafana:pkg/services/folder (nested folder service)"
local_files  = ["src/folder_service.rs", "src/models.rs", "src/store.rs"]
note         = "2026-05-30: standalone nested folder service ported (folderimpl/folder.go) — create/move/get_parents(root-first)/get_height/fullpath/delete with MaxNestedFolderDepth=4 + circular-reference detection. Wired /api/folders/{uid}/{parents,children,move}."

[[mapped]]
upstream_pkg = "grafana/grafana:pkg/services/accesscontrol (RBAC evaluator)"
local_files  = ["src/access_control.rs", "src/auth.rs"]
note         = "2026-05-30: Grafana-shaped RBAC evaluator ported (evaluator.go + scope.go + ValidateScope) — scope split/build/prefix/wildcards, scope match, Evaluator Permission/All/Any over action->scopes. API-key hash/generate in auth.rs. Wired /api/access-control/eval. Distinct from cave-auth identity RBAC."

[[mapped]]
upstream_pkg = "grafana/grafana:pkg/expr + pkg/services/query (mixed-datasource expressions)"
local_files  = ["src/expressions.rs", "src/query.rs"]
note         = "2026-05-30: server-side expression engine ported (pkg/expr mathexp reducers + resample, classic conditions, exp.go math) — cross-refId ExprCommand pipeline (Reduce/Resample/MathBinary/Threshold/ClassicCondition) is the __expr__ datasource. Wired /api/ds/query/expr."

[[skipped]]
upstream_pkg = "grafana/grafana:public/app/ (React SPA)"
reason       = "browser-UI"
note         = "Vue+React frontend — cave-portal serves /admin/grafana instead"

[[skipped]]
upstream_pkg = "grafana/grafana:pkg/cmd/"
reason       = "go-bootstrap"

[[skipped]]
upstream_pkg = "grafana/grafana:devenv/ + scripts/ + Dockerfile/"
reason       = "go-bootstrap"

[[skipped]]
upstream_pkg = "grafana/grafana:e2e/ + tests/"
reason       = "test-harness"

[[skipped]]
upstream_pkg = "grafana/grafana:pkg/infra/{db,localcache,log,metrics,...}"
reason       = "stdlib-analog"
note         = "Rust uses cave-db + tracing + cave-core — Grafana's infra layer is Go-stdlib glue"

[[skipped]]
upstream_pkg = "grafana/grafana:pkg/services/rendering/grpc (image renderer)"
reason       = "off-roadmap-feature"
note         = "Headless-Chrome PNG/PDF export not on the cave-portal roadmap; portal serves SSR HTML for sharing."

[[skipped]]
upstream_pkg = "grafana/grafana:pkg/services/{accesscontrol/server,search,librarypanels,publicdashboards,sso}"
reason       = "scope_cut: deep RBAC server → cave-auth (shared identity/AuthZ stack); search index → cave-search; library panels + public-dashboard sharing → portal-side (cave-portal owns shareable UI); SSO bridge → cave-auth OIDC/SAML. All five are cross-cutting services where the single-binary runtime intentionally consolidates ownership outside cave-dashboard. ADR-RUNTIME-PARITY-100-PCT-001 §5.parallel-track."
scope_cut_target = "cave-auth + cave-search + cave-portal"

# ── Scope cuts (informational; mirror [[unmapped]] above) ────────────────────

[[scope_cuts]]
name        = "enterprise-services"
upstream    = "grafana/grafana:pkg/services/{accesscontrol/server,search,librarypanels,publicdashboards,sso}"
reason      = "Enterprise-edge services — deep RBAC server / search index / library panels / public-dashboard sharing / SSO bridge."
