[package]
name = "cave-auth"
description = "Full Okta AuthN+AuthZ — OIDC, RBAC, ABAC, SCIM 2.0, PAT, sessions, multi-tenancy"
authors.workspace = true
repository.workspace = true
homepage.workspace = true
documentation = "https://docs.rs/cave-auth"
readme = "README.md"
rust-version.workspace = true
keywords = ["auth", "oidc", "rbac", "scim", "identity"]
categories = ["authentication", "web-programming"]
version.workspace = true
edition.workspace = true
license.workspace = true

[dependencies]
cave-core = { path = "../cave-core" }
axum = { workspace = true }
jsonwebtoken = { workspace = true }
reqwest = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }
uuid = { workspace = true }
chrono = { workspace = true }
thiserror = { workspace = true }
tower = { workspace = true }
# Crypto: SHA-256 for PAT hashing
ring = { workspace = true }
base64 = { workspace = true }
rand = { workspace = true }
anyhow = { workspace = true }
# SAML 2.0 protocol parsing — Keycloak `saml-core` port (src/saml/)
quick-xml = "0.37"
flate2    = "1.0"
# Prometheus metrics for OIDC endpoint instrumentation
prometheus-client = { workspace = true }
once_cell = "1"
# URL form-encoded parsing for revoke / PAR / CIBA endpoints
form_urlencoded = "1"
