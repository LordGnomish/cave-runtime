[package]
name = "cave-auth"
description = "Full Okta AuthN+AuthZ — OIDC, RBAC, ABAC, SCIM 2.0, PAT, sessions, multi-tenancy"
authors.workspace = true
repository.workspace = true
homepage.workspace = true
documentation = "https://docs.rs/cave-auth"
readme = "README.md"
rust-version.workspace = true
keywords = ["auth", "oidc", "rbac", "scim", "identity"]
categories = ["authentication", "web-programming"]
version.workspace = true
edition.workspace = true
license.workspace = true

[dependencies]
cave-core = { path = "../cave-core" }
axum = { workspace = true }
jsonwebtoken = { workspace = true }
reqwest = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }
uuid = { workspace = true }
chrono = { workspace = true }
thiserror = { workspace = true }
tower = { workspace = true }
# Crypto: SHA-256 for PAT hashing
ring = { workspace = true }
base64 = { workspace = true }
rand = { workspace = true }
anyhow = { workspace = true }
# SAML 2.0 protocol parsing — Keycloak `saml-core` port (src/saml/)
quick-xml = "0.37"
flate2    = "1.0"
# JWE (RFC 7516) + DPoP (RFC 9449) + RFC 8693 token exchange
# RSA-OAEP / RSA-OAEP-256 key encryption + ES256/RS256/Ed25519 DPoP proof verification
rsa       = { version = "0.9", features = ["sha2"] }
aes-gcm   = "0.10"
aes-kw    = "0.2"
aes       = "0.8"
cbc       = { version = "0.1", features = ["std"] }
hmac      = "0.12"
sha2      = { workspace = true }
hkdf      = "0.12"
subtle    = "2"
ctr       = "0.9"
sha1      = "0.10"
