[package]
name = "cave-auth"
description = "Full Okta AuthN+AuthZ — OIDC, RBAC, ABAC, SCIM 2.0, PAT, sessions, multi-tenancy"
authors.workspace = true
repository.workspace = true
homepage.workspace = true
documentation = "https://docs.rs/cave-auth"
readme = "README.md"
rust-version.workspace = true
keywords = ["auth", "oidc", "rbac", "scim", "identity"]
categories = ["authentication", "web-programming"]
version.workspace = true
edition.workspace = true
license.workspace = true

[dependencies]
cave-core = { path = "../cave-core" }
axum = { workspace = true }
jsonwebtoken = { workspace = true }
reqwest = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }
uuid = { workspace = true }
chrono = { workspace = true }
thiserror = { workspace = true }
tower = { workspace = true }
# Crypto: SHA-256 for PAT hashing
ring = { workspace = true }
base64 = { workspace = true }
rand = { workspace = true }
anyhow = { workspace = true }
# SAML 2.0 protocol parsing — Keycloak `saml-core` port (src/saml/)
quick-xml = "0.37"
flate2    = "1.0"
# WebAuthn / FIDO2 — clean-room port of webauthn4j (Apache-2.0)
# Source: webauthn4j/webauthn4j@82345b8
ciborium       = { workspace = true }
sha2           = { workspace = true }
p256           = { workspace = true }
p384           = { workspace = true }
rsa            = { workspace = true }
ed25519-dalek  = { workspace = true }
hex            = { workspace = true }

[dev-dependencies]
tokio = { workspace = true }
tower = { workspace = true }
hex   = { workspace = true }
p256  = { workspace = true }
sha2  = { workspace = true }
rand  = { workspace = true }
ciborium = { workspace = true }
base64   = { workspace = true }
