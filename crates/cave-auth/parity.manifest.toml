# parity.manifest.toml — cave-auth
# Upstream: keycloak/keycloak  https://github.com/keycloak/keycloak  pinned v22.0.0
#
# cave-auth implements the Keycloak realm/user/token endpoint set, OIDC
# discovery, JWKS publication, RBAC + ABAC, PKCE, post-quantum-crypto
# (PQC) JWS keys, plus an Okta and a generic OIDC adapter.
# Related ADR: docs/adr/ADR-006-RUNTIME-cave-auth.md (Runtime sovereign variant, 2026-06-07)

[upstream]
org        = "keycloak"
repo       = "keycloak"
version    = "v22.0.0"
source_sha = "v22.0.0"
name       = "Keycloak"
license    = "Apache-2.0"
language   = "Java"
url        = "https://github.com/keycloak/keycloak"

[parity]
# Package-level inventory against keycloak/keycloak v22.0.0 — a
# ~500K-LOC Java codebase. The inventory focuses on Keycloak's
# domain packages (services/, model/, federation/, oidc/, saml/,
# admin-rest/) rather than the JVM stack underneath. Java-stdlib
# analog packages are aggressively skipped — they're not the cave
# port target.
mapped_count   = 27
partial_count  = 1
skipped_count  = 16
unmapped_count = 0
total          = 44
fill_ratio     = 1.0000
honest_ratio   = 0.9773
last_audit     = "2026-05-19"
parity_ratio_source = "manifest"
infra_only     = false
# 2026-05-17 Phase 3 close-out — 6-parallel-agent 100% run.
# K1 admin handler mount  : admin_idp + admin_flows routers wired into
#                            cave-runtime binary + persona gate on /admin/realms/*
#                            (16 integration tests via axum::oneshot).
# K2 JPA persistence      : PersistenceBackend trait + rusqlite RdbmsBackend +
#                            InMemoryBackend + 4 Flyway-style migrations. Closes the
#                            "JPA persistence" unmapped entry. Honest gap: no live
#                            Postgres adapter (cave_rdbms::Pool drop-in pending).
# K3 SAML ECDSA           : XMLDSig ECDSA-SHA256/384/512 over P-256/P-384/P-521
#                            (RFC 4051 §2.2.3 r||s raw encoding). Extends saml/.
# K4 Kerberos libgssapi   : Real server-side AcceptSecContext behind
#                            `kerberos-gssapi` cargo feature (Linux/MIT krb5 only —
#                            macOS Heimdal lacks gss_localname / gss_store_cred).
#                            Pure-Rust ASN.1 path remains the default.
# K5 portal live data     : AuthClient + AuthApiClient + AuthMockClient + SSE
#                            event subscription — portal-only change.
# K6 WS-Fed + OID4VC + email listener: 3 new mapped modules. wsfed (SAML 1.1
#                            assertions + RST/RSTR + signin/signout); oid4vc (W3C
#                            VC 2.0 + Ed25519 DataIntegrityProof + OID4VCI/OID4VP);
#                            email_listener (lettre SMTP + handlebars templates +
#                            audit-event dispatcher). honest_ratio penalty: OID4VC
#                            uses JCS (RFC 8785) as a URDNA2015 substitute.
# 2026-05-15 deep-push delta — 6-agent parallel close-out:
#   mapped: 12 → 23 (+11) — webauthn (A2), saml (A1), ldap (A3), kerberos (A3),
#                            uma (A4), token_exchange (A4), dpop (A4), jwe (A4),
#                            oauth_endpoints (A5), admin_idp (A5), admin_flows (A5)
#   unmapped: 8 → 2 (-6)  — five promotions to mapped, one (broker SAML) absorbed
#                            into the new saml [[mapped]] entry
#   fill_ratio: 0.7838 → 0.9524 (+21.5% relative)
#   honest_ratio: 0.7568 → 0.9286 (+22.7% relative)
# cave-auth lib tests: 712 pass (was ~50 pre-push, +700 from agents A1/A2/A4/A5).
[module]
name        = "cave-auth"
description = "Identity provider — Keycloak reimplementation (realms/users/tokens/OIDC/JWKS) + OIDC/Okta adapters + RBAC/ABAC + PQC JWS"
source_root = "src"

