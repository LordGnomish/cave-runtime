# parity.manifest.toml — cave-auth
# Upstream: keycloak/keycloak  https://github.com/keycloak/keycloak
# Skeleton generated by cave parity init — fill in the mapping sections

[upstream]
org     = "keycloak"
repo    = "keycloak"
version = "v22.0.0"

[module]
name        = "cave-auth"
description = "Identity and access management — Keycloak replacement"
source_root = "src"

# ── File mappings ────────────────────────────────────────────────────────────
# [[files]]
# upstream = "path/in/upstream/repo.go"
# local    = "src/local.rs"

# ── Function mappings ────────────────────────────────────────────────────────
# [[functions]]
# upstream_name = "UpstreamFunc"
# local_name    = "local_fn"
# file          = "src/routes.rs"

# ── Test mappings ────────────────────────────────────────────────────────────
# [[tests]]
# upstream_test = "TestUpstreamFunc"
# local_test    = "test_local_fn"

# ── Surface mappings ─────────────────────────────────────────────────────────
# [[surfaces]]
# kind          = "http"
# upstream_path = "/api/upstream"
# local_path    = "/api/auth/endpoint"
