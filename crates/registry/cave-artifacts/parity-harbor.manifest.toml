# ── Surface mappings ─────────────────────────────────────────────────────
[[surfaces]]
kind          = "http"
upstream_path = "/v2/{name}/manifests/{reference}"
local_path    = "/v2/{name}/manifests/{reference}"

[[surfaces]]
kind          = "http"
upstream_path = "/v2/{name}/blobs/{digest}"
local_path    = "/v2/{name}/blobs/{digest}"

[[surfaces]]
kind          = "http"
upstream_path = "/v2/{name}/blobs/uploads/"
local_path    = "/v2/{name}/blobs/uploads/"

[[surfaces]]
kind          = "http"
upstream_path = "/api/v2.0/projects"
local_path    = "/api/v2.0/projects"

[[surfaces]]
kind          = "http"
upstream_path = "/api/v2.0/registries"
local_path    = "/api/v2.0/registries"

[[surfaces]]
