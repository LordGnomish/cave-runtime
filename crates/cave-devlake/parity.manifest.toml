# parity.manifest.toml — cave-devlake
# Upstream: apache/incubator-devlake  https://github.com/apache/incubator-devlake
# Skeleton generated by cave parity init — fill in the mapping sections

[upstream]
org     = "apache"
repo    = "incubator-devlake"
version = "v0.19.0"

[module]
name        = "cave-devlake"
description = "Dev metrics — Apache DevLake replacement"
source_root = "src"

