# parity.manifest.toml — cave-metrics
# Upstream: prometheus/prometheus  https://github.com/prometheus/prometheus  pinned v2.48.0
#
# cave-metrics covers Prometheus's TSDB engine (head + WAL + block + compaction),
# PromQL (lexer/parser/engine/functions), scrape/discovery, recording + alerting
# rules, remote_write/remote_read, multi-tenant federation, plus an
# Alertmanager-equivalent slice (src/alertmgr/*).

[upstream]
org     = "prometheus"
repo    = "prometheus"
version = "v2.48.0"
name    = "Prometheus"
license = "Apache-2.0"
language= "Go"
url     = "https://github.com/prometheus/prometheus"

[parity]
ratio       = 0.0        # honest: 0.0 means upstream parity NOT yet measured
last_audit  = "2026-05-12"
infra_only  = false
[module]
name        = "cave-metrics"
description = "Prometheus reimplementation — TSDB + PromQL + scrape + remote_write + rules + Alertmanager-equivalent silence/notify"
source_root = "src"

