# parity.manifest.toml — cave-metrics
# Upstream: prometheus/prometheus  https://github.com/prometheus/prometheus
# Skeleton generated by cave parity init — fill in the mapping sections

[upstream]
org     = "prometheus"
repo    = "prometheus"
version = "v2.48.0"

[module]
name        = "cave-metrics"
description = "Metrics collection — Prometheus replacement"
source_root = "src"

# ── File mappings ────────────────────────────────────────────────────────────
# [[files]]
# upstream = "path/in/upstream/repo.go"
# local    = "src/local.rs"

# ── Function mappings ────────────────────────────────────────────────────────
# [[functions]]
# upstream_name = "UpstreamFunc"
# local_name    = "local_fn"
# file          = "src/routes.rs"

# ── Test mappings ────────────────────────────────────────────────────────────
# [[tests]]
# upstream_test = "TestUpstreamFunc"
# local_test    = "test_local_fn"

# ── Surface mappings ─────────────────────────────────────────────────────────
# [[surfaces]]
# kind          = "http"
# upstream_path = "/api/upstream"
# local_path    = "/api/metrics/endpoint"
