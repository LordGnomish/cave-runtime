# parity.manifest.toml — cave-pam
# Upstream: gravitational/teleport  https://github.com/gravitational/teleport
# Skeleton generated by cave parity init — fill in the mapping sections

[upstream]
org     = "gravitational"
repo    = "teleport"
version = "v14.0.0"
name    = "Teleport"
license = "AGPL-3.0"
language= "Go"
url     = "https://github.com/gravitational/teleport"

[parity]
ratio       = 0.0        # honest: 0.0 means upstream parity NOT yet measured
last_audit  = "2026-05-12"
infra_only  = false
[module]
name        = "cave-pam"
description = "Privileged access management — Teleport replacement"
source_root = "src"

# ── File mappings ────────────────────────────────────────────────────────────
# [[files]]
# upstream = "path/in/upstream/repo.go"
# local    = "src/local.rs"

# ── Function mappings ────────────────────────────────────────────────────────
# [[functions]]
# upstream_name = "UpstreamFunc"
# local_name    = "local_fn"
# file          = "src/routes.rs"

# ── Test mappings ────────────────────────────────────────────────────────────
# [[tests]]
# upstream_test = "TestUpstreamFunc"
# local_test    = "test_local_fn"

# ── Surface mappings ─────────────────────────────────────────────────────────
# [[surfaces]]
# kind          = "http"
# upstream_path = "/api/upstream"
# local_path    = "/api/pam/endpoint"

[portal_ui]
upstream_ui  = "Teleport Web UI"
upstream_url = "https://goteleport.com/docs/"
status       = "scaffold"
loc          = 75
priority     = "P2"
notes        = "Access proxy UI"
last_audit   = "2026-05-11"
