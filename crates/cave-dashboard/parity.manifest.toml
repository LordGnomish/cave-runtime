# parity.manifest.toml — cave-dashboard
# Upstream: grafana/grafana  https://github.com/grafana/grafana
# Skeleton generated by cave parity init — fill in the mapping sections

[upstream]
org     = "grafana"
repo    = "grafana"
version = "v10.2.0"

[module]
name        = "cave-dashboard"
description = "Observability dashboard — Grafana replacement"
source_root = "src"

# ── File mappings ────────────────────────────────────────────────────────────
# [[files]]
# upstream = "path/in/upstream/repo.go"
# local    = "src/local.rs"

# ── Function mappings ────────────────────────────────────────────────────────
# [[functions]]
# upstream_name = "UpstreamFunc"
# local_name    = "local_fn"
# file          = "src/routes.rs"

# ── Test mappings ────────────────────────────────────────────────────────────
# [[tests]]
# upstream_test = "TestUpstreamFunc"
# local_test    = "test_local_fn"

# ── Surface mappings ─────────────────────────────────────────────────────────
# [[surfaces]]
# kind          = "http"
# upstream_path = "/api/upstream"
# local_path    = "/api/dashboard/endpoint"
