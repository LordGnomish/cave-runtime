# parity.manifest.toml — cave-dashboard
# Upstream: grafana/grafana  https://github.com/grafana/grafana  pinned v10.2.0
#
# cave-dashboard implements the Grafana dashboard / panel / datasource /
# alerting / variables / orgs/users / API key surfaces.

[upstream]
org     = "grafana"
repo    = "grafana"
version = "v10.2.0"

[module]
name        = "cave-dashboard"
description = "Grafana reimplementation — dashboards / panels / datasources / alerting / variables / orgs / API keys"
source_root = "src"

# ── File mappings ────────────────────────────────────────────────────────────

[[files]]
upstream = "pkg/cmd/grafana-server/server.go"
local    = "src/lib.rs"

[[files]]
upstream = "pkg/api/api.go"
local    = "src/routes.rs"

[[files]]
upstream = "pkg/services/dashboards/database/database.go"
local    = "src/store.rs"

[[files]]
upstream = "pkg/services/dashboards/dashboard.go"
local    = "src/models.rs"

[[files]]
upstream = "pkg/services/datasources/service/datasource.go"
local    = "src/datasource.rs"

[[files]]
upstream = "pkg/services/ngalert/eval/eval.go"
local    = "src/alerting.rs"

[[files]]
upstream = "pkg/services/auth/api_keys.go"
local    = "src/auth.rs"

[[files]]
upstream = "pkg/services/dashboards/manager/dashboard_provisioning_service.go"
local    = "src/provisioning.rs"

[[files]]
upstream = "pkg/services/query/query.go"
local    = "src/query.rs"

[[files]]
upstream = "pkg/services/rendering/rendering.go"
local    = "src/renderer.rs"

[[files]]
upstream = "pkg/services/dashboards/templating/templating.go"
local    = "src/variables.rs"

[[files]]
upstream = "pkg/plugins/plugins.go"
local    = "src/panels.rs"

# ── Function mappings ────────────────────────────────────────────────────────

[[functions]]
upstream_name = "EvalThreshold"
local_name    = "eval_threshold"
file          = "src/alerting.rs"

[[functions]]
upstream_name = "ApplyReducer"
local_name    = "apply_reducer"
file          = "src/alerting.rs"

[[functions]]
upstream_name = "EvalAlertRule"
local_name    = "evaluate_alert_rule"
file          = "src/alerting.rs"

[[functions]]
upstream_name = "RouteAlert"
local_name    = "route_alert"
file          = "src/alerting.rs"

[[functions]]
upstream_name = "BuildAlertGroups"
local_name    = "build_alert_groups"
file          = "src/alerting.rs"

[[functions]]
upstream_name = "IsSilenced"
local_name    = "is_silenced"
file          = "src/alerting.rs"

[[functions]]
upstream_name = "IsMuted"
local_name    = "is_muted"
file          = "src/alerting.rs"

[[functions]]
upstream_name = "HashAPIKey"
local_name    = "hash_api_key"
file          = "src/auth.rs"

[[functions]]
upstream_name = "GenerateAPIKey"
local_name    = "generate_api_key"
file          = "src/auth.rs"

[[functions]]
upstream_name = "PrometheusQueryURL"
local_name    = "prometheus_query_url"
file          = "src/datasource.rs"

[[functions]]
upstream_name = "LokiQueryURL"
local_name    = "loki_query_url"
file          = "src/datasource.rs"

[[functions]]
upstream_name = "JaegerTraceURL"
local_name    = "jaeger_trace_url"
file          = "src/datasource.rs"

[[functions]]
upstream_name = "ParsePanelCatalog"
local_name    = "parse_catalog"
file          = "src/panels.rs"

