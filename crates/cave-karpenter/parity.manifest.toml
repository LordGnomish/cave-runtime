# parity.manifest.toml — cave-karpenter
# Upstream: kubernetes-sigs/karpenter  https://github.com/kubernetes-sigs/karpenter
# Skeleton generated by cave parity init — fill in the mapping sections

[upstream]
org     = "kubernetes-sigs"
repo    = "karpenter"
version = "v1.12.0"

[module]
name        = "cave-karpenter"
description = "Node autoscaling — Karpenter replacement"
source_root = "src"
pump_priority = "HIGH"  # qwen-pump B-prime priority gate
target_tests = 30        # qwen-pump B-prime target

# 4-track status (honest):
