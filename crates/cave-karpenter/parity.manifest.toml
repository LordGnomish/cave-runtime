# parity.manifest.toml — cave-karpenter
# Upstream: kubernetes-sigs/karpenter  https://github.com/kubernetes-sigs/karpenter  pinned v1.4.0
#
# cave-karpenter ports the in-scope MVP surface of Karpenter — a
# cluster-provider-agnostic node autoscaler — in pure Rust: the v1
# CRD model (NodePool, NodeClaim, NodeClass envelope, Requirement
# with all 6 operators In/NotIn/Exists/DoesNotExist/Gt/Lt, Taint,
# Disruption + Budget, Limits) plus a deterministic first-match
# scheduler and an in-memory store.
#
# Out of MVP (see [[skipped]] / [[unmapped]] below): concrete cloud-
# provider implementations (AWS/Azure/GCP/Hetzner), consolidation /
# expiration / drift controllers, lifecycle batcher, webhook
# validation, full CAS provisioning queue. Hetzner+Azure NodeClass
# envelopes land alongside cave-cloud-controller-manager Phase 2.

[upstream]
org         = "kubernetes-sigs"
repo        = "karpenter"
version     = "v1.4.0"
name        = "Karpenter"
license     = "Apache-2.0"
language    = "Go"
url         = "https://github.com/kubernetes-sigs/karpenter"
source_sha  = "v1.4.0"

[parity]
parity_ratio_source = "manifest"
fill_ratio          = 0.4980
honest_ratio        = 0.4980
last_audit          = "2026-05-19"
infra_only          = false
mapped_count        = 9
partial_count       = 0
skipped_count       = 9
unmapped_count      = 2
total               = 20

# fill_ratio derivation (Charter v2 honest measurement):
#   impl_lines               = 249  (cave-karpenter src/, excl tests/ + blanks/comments)
#   upstream_in_scope_lines  = 500  (sum of subsystem in-scope LOC, see below)
#   249 / 500                = 0.4980
#
# Per-subsystem in-scope LOC against v1.4.0:
#   pkg/apis/v1/nodepool_types.go         100 / 250 (NodePool + template subset)
#   pkg/apis/v1/nodeclaim_types.go         80 / 200 (NodeClaim spec + status subset)
#   pkg/apis/v1/nodeclass_types.go         30 /  30 (interface — opaque envelope)
#   pkg/apis/v1/disruption_types.go        50 /  80 (Disruption + Budget structs)
#   pkg/apis/v1/requirements.go            80 / 120 (6 operators)
#   pkg/apis/v1/taints.go                  30 /  50 (Taint struct)
#   pkg/controllers/provisioning/scheduling/scheduler.go (first-match) 80 / 800
#   pkg/storage/in-memory (no upstream file)  50 /  50 (round-trip store)
#  ─────────────────────────────────────
#  Total in-scope LOC                       500 upstream

[module]
name        = "cave-karpenter"
description = "Node autoscaler — Karpenter v1 CRD model + first-match scheduler + in-memory store"
source_root = "src"
pump_priority = "HIGH"
target_tests = 30

# 4-track status (honest):
#   Backend     : 1/4 — this scaffold (models + store + first-match scheduler)
#   Portal      : 0/4 — admin page Phase 2 alongside cave-ccm
#   cavectl     : 0/4 — `cavectl karpenter` Phase 2
#   Observ.     : 0/4 — alerts + dashboard Phase 2

# ── File mappings ───────────────────────────────────────────────────────────

[[files]]
upstream = "pkg/apis/v1/nodepool_types.go"
local    = "src/models/mod.rs"

[[files]]
upstream = "pkg/apis/v1/nodeclaim_types.go"
local    = "src/models/mod.rs"

[[files]]
upstream = "pkg/apis/v1/nodeclass_types.go"
local    = "src/models/mod.rs"

[[files]]
upstream = "pkg/apis/v1/disruption_types.go"
local    = "src/models/mod.rs"

[[files]]
upstream = "pkg/apis/v1/requirements.go"
local    = "src/models/mod.rs"

[[files]]
upstream = "pkg/apis/v1/taints.go"
local    = "src/models/mod.rs"

[[files]]
upstream = "pkg/controllers/provisioning/scheduling/scheduler.go"
local    = "src/scheduler.rs"

# ── Function mappings ───────────────────────────────────────────────────────

[[functions]]
upstream_name = "Provisioner.NewScheduler"
local_name    = "schedule_first_match"
file          = "src/scheduler.rs"

[[functions]]
upstream_name = "scheduling.Requirements.NodeSelectorRequirementsAsSelector"
local_name    = "requirement_satisfies"
file          = "src/scheduler.rs"

[[functions]]
upstream_name = "v1.NodePool.zz_generated.deepcopy.DeepCopy"
