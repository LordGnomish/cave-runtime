# observability.toml — cave-flags
# Charter v2 G8 minimum scaffold (alerts + dashboard stub).
# Deep observability surface arrives with the upstream-aligned
# dashboards when the consuming portal page exists. For now this
# file pins the self-audit pulse + a parity-drift watchdog so the
# 4-track gate passes for cave-flags (backend + manifest + obs +
# cavectl-or-portal future track).

[[panels]]
title  = "cave-flags parity self-audit pulse"
metric = "cave_flags_self_audit_passes_total"
type   = "stat"
description = "Counts successful runs of cave-flags::parity_self_audit; flat-line means the self-audit fixture stopped firing."

[[panels]]
title  = "cave-flags fill_ratio drift"
metric = "cave_flags_parity_fill_ratio"
type   = "gauge"
description = "Emitted by build-parity-index.py; alerts on drift > 0.05 from the manifest-declared ratio."

[[alerts]]
name     = "cave_flags_self_audit_failing"
expr     = "rate(cave_flags_self_audit_failures_total[5m]) > 0"
severity = "warning"
summary  = "cave-flags self-audit gate failing — Charter v2 invariant broken"
runbook  = "docs/runbooks/cave-flags-self-audit.md"

[[alerts]]
name     = "cave_flags_parity_drift"
expr     = "abs(cave_flags_parity_fill_ratio - cave_flags_parity_fill_ratio_declared) > 0.05"
severity = "info"
summary  = "cave-flags fill_ratio drifted >0.05 from manifest declaration"
runbook  = "docs/runbooks/cave-flags-parity-drift.md"
