# parity.manifest.toml — cave-flags
# Upstream: Unleash/unleash  https://github.com/Unleash/unleash  pinned v5.0.0
#
# Cave-flags implements the Unleash feature-flag protocol: client/frontend/
# admin REST APIs, flag evaluation engine with strategies (default,
# flexibleRollout, gradualRolloutUserId, segments, kill-switch), constraints
# (in/contains/numeric/date/semver), variant selection (murmur3 stickiness),
# environment-scoped enable/disable, metrics ingest, SDK register.

[upstream]
org         = "Unleash"
repo        = "unleash"
version     = "v5.0.0"
source_sha  = "v5.0.0"  # Unleash 5.0.0 release tag (TypeScript monorepo)
name        = "Unleash"
license     = "Apache-2.0"
language    = "TypeScript"
url         = "https://github.com/Unleash/unleash"

[module]
name        = "cave-flags"
description = "Feature-flag platform — Unleash parity (client/frontend/admin REST, strategy + constraint + variant evaluation, metrics, environments)"
source_root = "src"

[parity]
# Subsystem-level inventory hand-curated 2026-05-18 against Unleash v5.0.0
# src/lib/ (services/, routes/, features/, addons/, db/, openapi/, middleware/)
# plus top-level entrypoints (server.ts, snapshot/seed scaffolding).
# Each entry counts once. Mapped subsystems have working Rust + tests under src/,
# partial subsystems have data-model coverage but no runtime flow yet, skipped
# subsystems are handed off to a sibling crate by architectural decision, and
# unmapped subsystems are honest gaps deferred to a later sprint.
mapped_count          = 25
partial_count         = 3
skipped_count         = 30
unmapped_count        = 7
total                 = 65
fill_ratio            = 0.8923   # (mapped + partial + skipped) / total = 58/65
honest_ratio          = 0.8462   # (mapped + skipped) / total           = 55/65
parity_ratio_source   = "manifest"
last_audit            = "2026-05-18"
infra_only            = false

