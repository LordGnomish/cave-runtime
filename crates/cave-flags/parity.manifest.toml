# parity.manifest.toml — cave-flags
# Upstream: Unleash/unleash  https://github.com/Unleash/unleash
# Skeleton generated by cave parity init — fill in the mapping sections

[upstream]
org     = "Unleash"
repo    = "unleash"
version = "v5.0.0"

[module]
name        = "cave-flags"
description = "Feature flags — Unleash replacement"
source_root = "src"

# ── File mappings ────────────────────────────────────────────────────────────
# [[files]]
# upstream = "path/in/upstream/repo.go"
# local    = "src/local.rs"

# ── Function mappings ────────────────────────────────────────────────────────
# [[functions]]
# upstream_name = "UpstreamFunc"
# local_name    = "local_fn"
# file          = "src/routes.rs"

# ── Test mappings ────────────────────────────────────────────────────────────
# [[tests]]
# upstream_test = "TestUpstreamFunc"
# local_test    = "test_local_fn"

# ── Surface mappings ─────────────────────────────────────────────────────────
# [[surfaces]]
# kind          = "http"
# upstream_path = "/api/upstream"
# local_path    = "/api/flags/endpoint"
