# parity.manifest.toml — cave-flags
# Upstream: Unleash/unleash  https://github.com/Unleash/unleash  pinned v5.0.0
#
# Cave-flags implements the Unleash feature-flag protocol: client/frontend/
# admin REST APIs, flag evaluation engine with strategies (default,
# flexibleRollout, gradualRolloutUserId, segments, kill-switch), constraints
# (in/contains/numeric/date/semver), variant selection (murmur3 stickiness),
# environment-scoped enable/disable, metrics ingest, SDK register.

[upstream]
org     = "Unleash"
repo    = "unleash"
version = "v5.0.0"

[module]
name        = "cave-flags"
description = "Feature-flag platform — Unleash parity (client/frontend/admin REST, strategy + constraint + variant evaluation, metrics, environments)"
source_root = "src"

# ── File mappings ────────────────────────────────────────────────────────────

[[files]]
upstream = "src/server.ts"
local    = "src/lib.rs"

[[files]]
upstream = "src/lib/types/model.ts"
local    = "src/models.rs"

[[files]]
upstream = "src/lib/services/feature-toggle-service.ts"
local    = "src/engine.rs"

[[files]]
upstream = "src/lib/db/feature-toggle-store.ts"
local    = "src/store.rs"

[[files]]
upstream = "src/lib/db/db-pool.ts"
local    = "src/pool.rs"

[[files]]
upstream = "src/lib/openapi/index.ts"
local    = "src/routes.rs"

[[files]]
upstream = "src/lib/routes/client-api/index.ts"
local    = "src/unleash.rs"

# ── Function mappings ────────────────────────────────────────────────────────

[[functions]]
upstream_name = "normalizedHash"
local_name    = "normalized_value_100"
file          = "src/engine.rs"

[[functions]]
upstream_name = "normalizedHash1000"
local_name    = "normalized_value_1000"
file          = "src/engine.rs"

[[functions]]
upstream_name = "isEnabled"
local_name    = "evaluate_flag"
file          = "src/engine.rs"

[[functions]]
upstream_name = "getFeatureToggleDefinitions"
local_name    = "evaluate_all"
file          = "src/engine.rs"

[[functions]]
upstream_name = "constraintsMatch"
local_name    = "evaluate_constraints"
file          = "src/engine.rs"

[[functions]]
upstream_name = "selectVariant"
local_name    = "select_variant"
file          = "src/engine.rs"

