[package]
name = "cave-docdb"
description = "MongoDB-compatible document database — replaces MongoDB (wire protocol + BSON + aggregation)"
version.workspace = true
edition.workspace = true
license.workspace = true

[dependencies]
cave-core = { path = "../cave-core" }
axum = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }
uuid = { workspace = true }
chrono = { workspace = true }
thiserror = { workspace = true }
bytes = "1"
async-trait = "0.1"
regex = "1"
hex = "0.4"

[dev-dependencies]
tokio = { workspace = true, features = ["macros", "rt"] }
