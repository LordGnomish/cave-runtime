[package]
name = "cave-docdb"
description = "MongoDB-compatible document database — compatible with MongoDB (wire protocol + BSON + aggregation)"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true
documentation = "https://docs.rs/cave-docdb"
readme = "README.md"
rust-version.workspace = true
keywords = ["mongodb", "database", "bson", "document", "wire-protocol"]
categories = ["database-implementations", "api-bindings", "asynchronous"]

[dependencies]
cave-core = { path = "../cave-core" }
cave-kernel = { path = "../cave-kernel" }
axum = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }
uuid = { workspace = true }
chrono = { workspace = true }
thiserror = { workspace = true }
bytes = "1"
async-trait = "0.1"
regex = "1"
hex = "0.4"

[dev-dependencies]
tokio = { workspace = true, features = ["macros", "rt"] }
