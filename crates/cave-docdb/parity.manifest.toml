# parity.manifest.toml — cave-docdb
# Upstream: mongodb/mongo  https://github.com/mongodb/mongo  pinned 7.0.0
#
# Cave-docdb implements the MongoDB wire protocol (OP_MSG) on a TCP server
# alongside an HTTP admin API: BSON codec, command dispatcher, find/insert/
# update/delete + aggregate pipeline + cursors + indexes + admin commands
# (hello, ping, buildInfo, listDatabases, listCollections, currentOp,
# serverStatus, endSessions).

[upstream]
org     = "mongodb"
repo    = "mongo"
version = "7.0.0"
name    = "MongoDB"
license = "SSPL-1.0"
language= "C++"
url     = "https://github.com/mongodb/mongo"

[parity]
ratio       = 0.0        # honest: 0.0 means upstream parity NOT yet measured
last_audit  = "2026-05-12"
infra_only  = false
[module]
name        = "cave-docdb"
description = "MongoDB-protocol document DB — wire OP_MSG, BSON, find/insert/update/delete/aggregate, cursors, indexes, admin commands"
source_root = "src"
pump_priority = "HIGH"  # qwen-pump B-prime priority gate
target_tests = 30        # qwen-pump B-prime target (#[test] count in tests/qwen_drafted.rs); below this, B-prime fires

