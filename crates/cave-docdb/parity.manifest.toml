# ── Surface mappings ─────────────────────────────────────────────────────────
# Native Mongo speaks OP_MSG on a TCP wire (default port 27017); cave-docdb
# wraps it with an HTTP admin API.

[[surfaces]]
kind          = "tcp"
upstream_path = "/mongo-wire-op-msg"
local_path    = "/api/docdb/server/port"

[[surfaces]]
kind          = "http"
upstream_path = "/health"
local_path    = "/api/docdb/health"

[[surfaces]]
kind          = "http"
upstream_path = "/admin/listDatabases"
local_path    = "/api/docdb/databases"

[[surfaces]]
kind          = "http"
upstream_path = "/admin/serverInfo"
local_path    = "/api/docdb/server/info"

[[surfaces]]
kind          = "http"
upstream_path = "/admin/serverStats"
local_path    = "/api/docdb/stats"
