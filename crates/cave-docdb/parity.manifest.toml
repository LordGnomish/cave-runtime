# parity.manifest.toml — cave-docdb
# Upstream: mongodb/mongo  https://github.com/mongodb/mongo
# Skeleton generated by cave parity init — fill in the mapping sections

[upstream]
org     = "mongodb"
repo    = "mongo"
version = "7.0.0"

[module]
name        = "cave-docdb"
description = "Document database — MongoDB replacement"
source_root = "src"

