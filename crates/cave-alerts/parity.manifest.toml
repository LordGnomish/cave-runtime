# parity.manifest.toml — cave-alerts
# Upstream: prometheus/alertmanager  https://github.com/prometheus/alertmanager  pinned v0.26.0
#
# Cave-alerts implements Prometheus Alertmanager — alert ingestion, routing
# tree, grouping with group_by/group_wait/group_interval/repeat_interval,
# inhibit rules, silences, multi-tenant isolation, receivers (Slack, email,
# PagerDuty, OpsGenie, webhook), and Prometheus-format rule files.

[upstream]
org     = "prometheus"
repo    = "alertmanager"
version = "v0.26.0"
source_sha = "v0.26.0"  # G1: tag-based pin (deep-port may override)
name    = "Alertmanager"
license = "Apache-2.0"
language= "Go"
url     = "https://github.com/prometheus/alertmanager"

[parity]
ratio       = 0.0        # honest: 0.0 means upstream parity NOT yet measured
last_audit  = "2026-05-12"
infra_only  = false
[module]
name        = "cave-alerts"
description = "Prometheus Alertmanager parity — routing tree, grouping, inhibits, silences, multi-tenant, receivers (slack/email/pagerduty/opsgenie/webhook)"
source_root = "src"

# ── File mappings ────────────────────────────────────────────────────────────

[[files]]
upstream = "cmd/alertmanager/main.go"
local    = "src/lib.rs"

[[files]]
