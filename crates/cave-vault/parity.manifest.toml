# parity.manifest.toml — cave-vault
# Upstream: openbao/openbao  https://github.com/openbao/openbao
# Pinned to the latest v2.x stable release at 2026-04-26.

[upstream]
org     = "openbao"
repo    = "openbao"
version = "v2.5.3"

[module]
name          = "cave-vault"
description   = "Secrets management — OpenBao (HashiCorp Vault fork) parity"
source_root   = "src"
target_tests = 30        # qwen-pump B-prime target (#[test] count in tests/qwen_drafted.rs); below this, B-prime fires
pump_priority = "HIGH"  # charter-critical 7 — secrets management surface

# ── File mappings ────────────────────────────────────────────────────────────
[[files]]
upstream = "builtin/logical/kv/path_data.go"
local    = "src/engines/kv2.rs"

[[files]]
upstream = "builtin/logical/kv/path_metadata.go"
local    = "src/engines/kv2.rs"

[[files]]
upstream = "builtin/logical/kv/path_delete.go"
local    = "src/engines/kv2.rs"

[[files]]
upstream = "builtin/logical/kv/path_destroy.go"
local    = "src/engines/kv2.rs"

[[files]]
upstream = "builtin/credential/userpass/path_login.go"
local    = "src/auth/userpass.rs"

[[files]]
upstream = "builtin/credential/userpass/path_users.go"
local    = "src/auth/userpass.rs"

[[files]]
upstream = "builtin/credential/approle/path_role.go"
local    = "src/auth/approle.rs"

[[files]]
upstream = "builtin/credential/approle/path_login.go"
local    = "src/auth/approle.rs"

[[files]]
upstream = "vault/policy.go"
local    = "src/core/policy.rs"

[[files]]
upstream = "vault/policy_store.go"
local    = "src/core/policy.rs"

[[files]]
upstream = "vault/mount.go"
local    = "src/lib.rs"

[[files]]
upstream = "vault/token_store.go"
local    = "src/token.rs"

[[files]]
upstream = "vault/seal.go"
local    = "src/core/seal.rs"

[[files]]
upstream = "sdk/helper/shamir/shamir.go"
local    = "src/core/seal.rs"

[[files]]
upstream = "audit/format.go"
local    = "src/core/audit.rs"

[[files]]
upstream = "audit/format_json.go"
local    = "src/core/audit.rs"

[[files]]
upstream = "helper/namespace/namespace.go"
local    = "src/lib.rs"

# ── Function mappings ────────────────────────────────────────────────────────
[[functions]]
upstream_name = "pathDataRead"
local_name    = "read_secret_version"
file          = "src/engines/kv2.rs"

[[functions]]
upstream_name = "pathDataWrite"
local_name    = "write_secret"
file          = "src/engines/kv2.rs"

[[functions]]
upstream_name = "pathDataDelete"
local_name    = "delete_secret"
file          = "src/engines/kv2.rs"

[[functions]]
upstream_name = "pathUndeleteWrite"
local_name    = "undelete_versions"
file          = "src/engines/kv2.rs"

[[functions]]
upstream_name = "pathDestroyWrite"
local_name    = "destroy_versions"
file          = "src/engines/kv2.rs"

[[functions]]
upstream_name = "pathMetadataRead"
local_name    = "read_metadata"
file          = "src/engines/kv2.rs"

[[functions]]
upstream_name = "pathMetadataWrite"
local_name    = "write_metadata"
file          = "src/engines/kv2.rs"

[[functions]]
upstream_name = "ParseACLPolicy"
local_name    = "Policy::parse"
file          = "src/core/policy.rs"

[[functions]]
upstream_name = "Split"
local_name    = "split_secret"
file          = "src/core/seal.rs"

[[functions]]
upstream_name = "Combine"
local_name    = "combine_shares"
file          = "src/core/seal.rs"

# Transit engine — encryption + signing
[[functions]]
upstream_name = "pathEncryptWrite"
local_name    = "encrypt"
file          = "src/engines/transit.rs"

[[functions]]
upstream_name = "pathDecryptWrite"
local_name    = "decrypt"
file          = "src/engines/transit.rs"

[[functions]]
upstream_name = "pathSignWrite"
local_name    = "sign"
file          = "src/engines/transit.rs"

[[functions]]
upstream_name = "pathRotate"
local_name    = "rotate_key"
file          = "src/engines/transit.rs"

# PKI engine — root + role-based issuance
[[functions]]
upstream_name = "pathGenerateRoot"
local_name    = "generate_root"
file          = "src/engines/pki.rs"

[[functions]]
upstream_name = "pathSignIntermediate"
local_name    = "sign_intermediate"
file          = "src/engines/pki.rs"

[[functions]]
upstream_name = "pathFetchCRL"
local_name    = "get_crl_pem"
file          = "src/engines/pki.rs"

# ── Test mappings ────────────────────────────────────────────────────────────
# Each entry maps an upstream openbao test (Go source) to an actual `fn`
# in our crate; the calculator greps `fn {local_test}` under source_root, so
# every name below resolves to a live #[test] in the listed file.

# Shamir SSS — sealing
[[tests]]
upstream_test = "TestShamirCombine"
local_test    = "test_split_combine_roundtrip"

[[tests]]
upstream_test = "TestShamirSplitThreshold"
local_test    = "test_split_combine_threshold_2"

[[tests]]
upstream_test = "TestGFMul"
local_test    = "test_gf_mul_identity"

[[tests]]
upstream_test = "TestGFInv"
local_test    = "test_gf_inv"

# Seal lifecycle
[[tests]]
upstream_test = "TestSealInitUnseal"
local_test    = "test_seal_initialize_unseal"

[[tests]]
upstream_test = "TestShamir2of3"
local_test    = "test_shamir_round_trip_2_of_3"

[[tests]]
upstream_test = "TestShamir3of5"
local_test    = "test_shamir_round_trip_3_of_5"

# ACL policy
[[tests]]
upstream_test = "TestACLAllow"
local_test    = "test_policy_allows_matching_path"

[[tests]]
upstream_test = "TestACLDeny"
local_test    = "test_policy_deny_overrides"

[[tests]]
upstream_test = "TestRootPolicy"
local_test    = "test_root_policy_allows_all"

[[tests]]
upstream_test = "TestPolicyParse"
local_test    = "test_policy_parse"

# Token store
[[tests]]
upstream_test = "TestTokenCreate"
local_test    = "test_create_lookup_token"

[[tests]]
upstream_test = "TestTokenRenew"
local_test    = "test_renew_token"

[[tests]]
upstream_test = "TestTokenRevoke"
local_test    = "test_revoke_token"

[[tests]]
upstream_test = "TestRootToken"
local_test    = "test_root_token"

# Lease store
[[tests]]
upstream_test = "TestLeaseCreate"
local_test    = "test_lease_creation_and_lookup"

[[tests]]
upstream_test = "TestLeaseRenew"
local_test    = "test_lease_renew"

[[tests]]
upstream_test = "TestLeaseRevoke"
local_test    = "test_lease_revoke"

# Database engine — credential issuance
[[tests]]
upstream_test = "TestPostgresCreds"
local_test    = "test_db_generate_postgres_creds"

[[tests]]
upstream_test = "TestMysqlCreds"
local_test    = "test_db_generate_mysql_creds"

[[tests]]
upstream_test = "TestDatabaseRevoke"
local_test    = "test_db_revoke_credentials"

# Transit — symmetric crypto round-trip
[[tests]]
upstream_test = "TestAES256GCM"
local_test    = "test_aes256_gcm_round_trip"

[[tests]]
upstream_test = "TestChaCha20Poly1305"
local_test    = "test_chacha20_round_trip"

# ── Surface mappings ─────────────────────────────────────────────────────────
[[surfaces]]
kind          = "http"
upstream_path = "/v1/secret/data/{path}"
local_path    = "/v1/{mount}/data/{path}"

[[surfaces]]
kind          = "http"
upstream_path = "/v1/auth/userpass/login/{username}"
local_path    = "/v1/auth/userpass/login/{username}"

[[surfaces]]
kind          = "http"
upstream_path = "/v1/auth/approle/login"
local_path    = "/v1/auth/approle/login"

[[surfaces]]
kind          = "http"
upstream_path = "/v1/sys/policy/{name}"
local_path    = "/v1/sys/policies/acl/{name}"

[[surfaces]]
kind          = "http"
upstream_path = "/v1/sys/seal-status"
local_path    = "/v1/sys/seal-status"

[[surfaces]]
kind          = "http"
upstream_path = "/v1/sys/unseal"
local_path    = "/v1/sys/unseal"

[[surfaces]]
kind          = "http"
upstream_path = "/v1/sys/health"
local_path    = "/v1/sys/health"

[portal_ui]
upstream_ui  = "Vault Web UI (built-in)"
upstream_url = "https://developer.hashicorp.com/vault/docs/configuration/ui"
status       = "partial"
loc          = 156
priority     = "P0"
notes        = "Secret engines, auth methods, policy editor"
last_audit   = "2026-05-11"
