# parity.manifest.toml — cave-vault
# Upstream: openbao/openbao  https://github.com/openbao/openbao
# Pinned to the latest v2.x stable release at 2026-04-26.

[upstream]
org     = "openbao"
repo    = "openbao"
version = "v2.5.3"
name    = "OpenBao"
license = "MPL-2.0"
language= "Go"
url     = "https://github.com/openbao/openbao"
[parity]
# Package-level inventory against openbao/openbao v2.5.3 — every
# top-level package the secret store needs (engines, auth, core,
# audit, sys-API). Inventory hand-curated 2026-05-12 against the
# OpenBao tree (`builtin/credential`, `builtin/logical`, `vault/`,
# `audit/`, `physical/`, `sdk/`, `command/`).
mapped_count   = 19
partial_count  = 0
skipped_count  = 11
unmapped_count = 8
total          = 38
fill_ratio     = 0.7895
honest_ratio   = 0.7895
last_audit     = "2026-05-13"
infra_only     = false

[module]
name          = "cave-vault"
description   = "Secrets management — OpenBao (HashiCorp Vault fork) parity"
source_root   = "src"
target_tests = 30        # qwen-pump B-prime target (#[test] count in tests/qwen_drafted.rs); below this, B-prime fires
pump_priority = "HIGH"  # charter-critical 7 — secrets management surface

