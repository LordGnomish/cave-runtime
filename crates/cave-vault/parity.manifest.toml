# parity.manifest.toml — cave-vault
# Upstream: hashicorp/vault  https://github.com/hashicorp/vault
# Skeleton generated by cave parity init — fill in the mapping sections

[upstream]
org     = "hashicorp"
repo    = "vault"
version = "v1.15.0"

[module]
name        = "cave-vault"
description = "Secrets management — HashiCorp Vault replacement"
source_root = "src"

