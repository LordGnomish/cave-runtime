[package]
name = "cave-vault"
description = "HashiCorp Vault-compatible secrets engine — full API parity"
authors.workspace = true
repository.workspace = true
homepage.workspace = true
documentation = "https://docs.rs/cave-vault"
readme = "README.md"
rust-version.workspace = true
keywords = ["vault", "secrets", "hashicorp", "api", "security"]
categories = ["api-bindings", "cryptography", "authentication"]
version.workspace = true
edition.workspace = true
license.workspace = true

[dependencies]
axum = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }
uuid = { workspace = true }
chrono = { workspace = true }
thiserror = { workspace = true }
ring = { workspace = true }
regex = { workspace = true }
# Additional deps (local, not in workspace)
rcgen = { version = "0.13", features = ["pem"] }
time = { version = "0.3", features = ["std"] }
base64 = "0.22"
hex = "0.4"
rand = "0.8"

[dev-dependencies]
tokio = { workspace = true }
chrono = { workspace = true }
serde_json = { workspace = true }
ring = { workspace = true }
uuid = { workspace = true }
serde = { workspace = true }
hex = "0.4"
base64 = "0.22"
tempfile = "3"
