# parity.manifest.toml — cave-pii
# Upstream: microsoft/presidio  https://github.com/microsoft/presidio
# Skeleton generated by cave parity init — fill in the mapping sections

[upstream]
org     = "microsoft"
repo    = "presidio"
version = "v2.2.0"

[module]
name        = "cave-pii"
description = "PII detection and redaction — Microsoft Presidio replacement"
source_root = "src"

# ── File mappings ────────────────────────────────────────────────────────────
# [[files]]
# upstream = "path/in/upstream/repo.go"
# local    = "src/local.rs"

# ── Function mappings ────────────────────────────────────────────────────────
# [[functions]]
# upstream_name = "UpstreamFunc"
# local_name    = "local_fn"
# file          = "src/routes.rs"

# ── Test mappings ────────────────────────────────────────────────────────────
# [[tests]]
# upstream_test = "TestUpstreamFunc"
# local_test    = "test_local_fn"

# ── Surface mappings ─────────────────────────────────────────────────────────
