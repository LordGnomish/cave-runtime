# parity.manifest.toml — cave-core
# First-party shared-types crate. There is NO external upstream.
#
# Parity axis (2026-05-31): measured against the CAVE *shared-primitive
# consolidation charter* — the canonical foundational types/utilities that
# every cave-* module should import from here instead of re-declaring. Each
# entry below is one charter primitive; `local` is the module that homes it.
#
#   honest_ratio = (mapped + skipped) / total   — partials EXCLUDED
#   fill_ratio   = (mapped + partial + skipped) / total
#
# Honest classification notes:
#   - pqc = PARTIAL: the FIPS 203/204/205 parameter-set table, algorithm
#     registry (OIDs), and length-prefixed CompositeSignature container are
#     fully homed and tested, but the lattice/hash KEM+signature ENGINES are
#     pluggable traits — no real post-quantum crypto is implemented here, so
#     it is honestly a partial (excluded from honest_ratio).

[upstream]
org     = "cave-runtime"
repo    = "cave-runtime"
version = "v0.1.0"

[module]
name        = "cave-core"
description = "CAVE shared core types and utilities"
source_root = "src"
first_party = true

# ── Charter primitive mappings ───────────────────────────────────────────────
[[files]]
upstream = "charter:error-types"
local    = "src/error.rs"
[[files]]
upstream = "charter:config-loader"
local    = "src/config.rs"
[[files]]
upstream = "charter:layered-config-merge"
local    = "src/layered.rs"
[[files]]
upstream = "charter:rbac-model"
local    = "src/rbac.rs"
[[files]]
upstream = "charter:deployment-profile"
local    = "src/profile.rs"
[[files]]
upstream = "charter:tenant-model"
local    = "src/tenant.rs"
[[files]]
upstream = "charter:labels-selectors"
local    = "src/labels.rs"
[[files]]
upstream = "charter:shared-types"
local    = "src/types.rs"
[[files]]
upstream = "charter:write-ahead-log"
local    = "src/wal.rs"
# PARTIAL — param tables + container homed; lattice engines pluggable.
[[files]]
upstream = "charter:pqc-primitives"
local    = "src/pqc.rs"

[parity]
infra_only     = false
fill_ratio     = 1.0      # (9 mapped + 1 partial + 0 skipped) / 10
honest_ratio   = 0.90     # (9 mapped + 0 skipped) / 10
mapped_count   = 9
partial_count  = 1        # pqc (pluggable engines, no real crypto)
skipped_count  = 0
unmapped_count = 0
total          = 10
last_audit     = "2026-05-31"
