# parity.manifest.toml — cave-store
# Upstream: minio/minio  https://github.com/minio/minio  pinned RELEASE.2024-01-01
#
# cave-store is a hybrid S3 + etcd-v3 store. The S3 surface is the primary
# upstream parity target (versioning, multipart, encryption, lifecycle,
# policy, notification, presigned URLs); the etcd-v3 surface (src/etcd/*)
# is a secondary target tracked separately.

[upstream]
org     = "minio"
repo    = "minio"
version = "RELEASE.2024-01-01"
source_sha = "RELEASE.2024-01-01"  # G1: tag-based pin (deep-port may override)
name    = "MinIO"
license = "AGPL-3.0"
language= "Go"
url     = "https://github.com/minio/minio"

[parity]
ratio       = 0.0        # honest: 0.0 means upstream parity NOT yet measured
last_audit  = "2026-05-12"
infra_only  = false
[module]
name        = "cave-store"
description = "Object store — MinIO-equivalent S3 surface (multipart, versioning, encryption, lifecycle, policy, presigned) + etcd-v3 KV/lease/watch shim"
source_root = "src"

# ── File mappings ────────────────────────────────────────────────────────────
# S3 core (cmd/*) → src/s3/*

[[files]]
upstream = "cmd/main.go"
local    = "src/lib.rs"

[[files]]
upstream = "cmd/api-router.go"
local    = "src/s3/router.rs"

[[files]]
upstream = "cmd/api-handlers.go"
local    = "src/s3/routes.rs"

[[files]]
upstream = "cmd/object-handlers.go"
local    = "src/routes.rs"

[[files]]
upstream = "cmd/storage-rest-server.go"
local    = "src/server.rs"

[[files]]
upstream = "cmd/object-api-multipart.go"
local    = "src/multipart.rs"

[[files]]
upstream = "cmd/api-response.go"
local    = "src/s3/xml.rs"

[[files]]
upstream = "cmd/encryption-v1.go"
local    = "src/encryption.rs"

[[files]]
upstream = "cmd/sse-kms.go"
local    = "src/s3/encryption.rs"

[[files]]
upstream = "cmd/bucket-lifecycle.go"
local    = "src/lifecycle.rs"

[[files]]
upstream = "cmd/bucket-lifecycle-handlers.go"
local    = "src/s3/lifecycle.rs"

[[files]]
upstream = "cmd/bucket-policy.go"
local    = "src/policy.rs"

[[files]]
upstream = "cmd/bucket-policy-handlers.go"
local    = "src/s3/policy.rs"

[[files]]
upstream = "cmd/bucket-notification.go"
local    = "src/notification.rs"

[[files]]
upstream = "cmd/bucket-notification-handlers.go"
local    = "src/s3/notification.rs"

[[files]]
upstream = "cmd/bucket-versioning.go"
local    = "src/versioning.rs"

[[files]]
upstream = "cmd/postpolicyform.go"
local    = "src/presigned.rs"

[[files]]
upstream = "cmd/signature-v4.go"
local    = "src/s3/presigned.rs"

[[files]]
upstream = "cmd/erasure-utils.go"
local    = "src/storage.rs"

[[files]]
upstream = "cmd/format-erasure.go"
local    = "src/store.rs"

[[files]]
upstream = "cmd/object-api-utils.go"
local    = "src/s3/store.rs"

[[files]]
upstream = "cmd/api-datatypes.go"
local    = "src/s3/types.rs"

[[files]]
upstream = "cmd/typed-errors.go"
local    = "src/error.rs"

[[files]]
upstream = "cmd/config-current.go"
local    = "src/config.rs"

[[files]]
upstream = "cmd/api-router.go"
local    = "src/types.rs"

[[files]]
upstream = "cmd/data-update-tracker.go"
local    = "src/wal.rs"

[[files]]
upstream = "cmd/object-api-listobjects.go"
local    = "src/models.rs"

# Engine + S3 module bundle

[[files]]
upstream = "cmd/handler-utils.go"
local    = "src/engine.rs"

[[files]]
upstream = "internal/auth/credentials.go"
local    = "src/s3/mod.rs"

# etcd-v3 secondary surface (src/etcd/*) — etcd-io/etcd v3.5.13

[[files]]
upstream = "etcdserver/server.go"
local    = "src/etcd/mod.rs"

[[files]]
upstream = "etcdserver/api/v3rpc/key.go"
local    = "src/etcd/kv.rs"

[[files]]
upstream = "etcdserver/api/v3rpc/lease.go"
local    = "src/etcd/lease.rs"

[[files]]
upstream = "etcdserver/api/v3rpc/watch.go"
