[[files]]
upstream = "etcdserver/api/v3rpc/auth.go"
local    = "src/etcd/auth.rs"

[[files]]
upstream = "etcdserver/api/membership/cluster.go"
local    = "src/etcd/cluster.rs"

[[files]]
upstream = "etcdserver/etcdhttp/client.go"
local    = "src/etcd/routes.rs"

# ── Function mappings ────────────────────────────────────────────────────────

[[functions]]
upstream_name = "DeriveKey"
local_name    = "derive_key"
file          = "src/encryption.rs"

[[functions]]
upstream_name = "encryptObject"
local_name    = "xor_encrypt"
file          = "src/encryption.rs"

[[functions]]
upstream_name = "compareInt64"
local_name    = "compare_values"
file          = "src/engine.rs"

[[functions]]
upstream_name = "compareBytes"
local_name    = "compare_values_bytes"
file          = "src/engine.rs"

[[functions]]
upstream_name = "newLease"
local_name    = "rand_lease_id"
file          = "src/engine.rs"

