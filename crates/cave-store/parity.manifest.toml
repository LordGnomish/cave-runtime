# parity.manifest.toml — cave-store
# Upstream: minio/minio  https://github.com/minio/minio
# Skeleton generated by cave parity init — fill in the mapping sections

[upstream]
org     = "minio"
repo    = "minio"
version = "RELEASE.2024-01-01"

[module]
name        = "cave-store"
description = "Object storage — MinIO replacement"
source_root = "src"

# ── File mappings ────────────────────────────────────────────────────────────
