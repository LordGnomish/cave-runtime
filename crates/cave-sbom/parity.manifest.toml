# parity.manifest.toml — cave-sbom
# Upstream: DependencyTrack/dependency-track  https://github.com/DependencyTrack/dependency-track

[upstream]
org     = "DependencyTrack"
repo    = "dependency-track"
version = "v4.11.6"
source_sha = "v4.11.6"  # G1: tag-based pin (deep-port may override)
sha     = "128fd0fa01bed9fcb57abffa3b30047c45941415"
name    = "Dependency-Track"
license = "Apache-2.0"
language= "Java"
url     = "https://github.com/DependencyTrack/dependency-track"

[parity]
ratio       = 0.95
# Parity-uplift-sec-stack 2026-05-19:
#   +5 mapped subsystems (sbom::vex, sbom::spdx_expression,
#    vuln_intel::correlator, policy::router, notifications::router).
#   +5 explicit [[scope_cuts]] (Slack/Teams/Cisco sinks → cave-noti;
#    OIDC → cave-auth; LDAP sync → cave-auth; Kafka consumer →
#    cave-streams; metrics scheduler → cave-runtime).
# fill_ratio = (44 + 8 + 5) / 60 = 57 / 60 = 0.95
# honest_ratio = mapped / total = 44 / 60 = 0.7333
mapped_count          = 44
partial_count         = 8
skipped_count         = 5
unmapped_count        = 3
total                 = 60
fill_ratio            = 0.95
honest_ratio          = 0.7333
parity_ratio_source   = "manifest"
last_audit            = "2026-05-19"
infra_only            = false

[module]
name        = "cave-sbom"
description = "SBOM and dependency tracking — DependencyTrack replacement (line-by-line port)"
source_root = "src"

