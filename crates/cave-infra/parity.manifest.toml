# parity.manifest.toml — cave-infra
# Upstream: hashicorp/terraform  https://github.com/hashicorp/terraform  pinned v1.6.0
#
# Cave-infra implements infrastructure-as-code with intent → plan → apply
# pipeline, drift detection, dependency-graph topological order, rollback,
# multi-provider resource registry, MCP server, NLP-driven intent parsing,
# and template/cookbook expansion.

[upstream]
org     = "hashicorp"
repo    = "terraform"
version = "v1.6.0"
name    = "HashiCorp Terraform"
license = "BSL-1.1"
language= "Go"
url     = "https://github.com/hashicorp/terraform"

[parity]
ratio       = 0.0        # honest: 0.0 means upstream parity NOT yet measured
last_audit  = "2026-05-12"
infra_only  = false
[module]
name        = "cave-infra"
description = "Infrastructure as code — Terraform parity (intent/plan/apply, drift, graph, rollback, providers, MCP, templates)"
source_root = "src"

# ── File mappings ────────────────────────────────────────────────────────────

[[files]]
upstream = "main.go"
local    = "src/lib.rs"

[[files]]
upstream = "internal/configs/config.go"
local    = "src/models.rs"

[[files]]
