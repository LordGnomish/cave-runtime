[package]
name = "cave-docdb"
description = "MongoDB-compatible document database — compatible with MongoDB (wire protocol + BSON + aggregation)"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true
documentation = "https://docs.rs/cave-docdb"
readme = "README.md"
rust-version.workspace = true
keywords = ["mongodb", "database", "bson", "document", "wire-protocol"]
categories = ["database-implementations", "api-bindings", "asynchronous"]

[dependencies]
cave-kernel = { path = "../../core/cave-kernel" }
axum = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }
uuid = { workspace = true }
chrono = { workspace = true }
thiserror = { workspace = true }
async-trait = { workspace = true }
bytes = "1"
regex = "1"
hex = "0.4"
sha2 = { workspace = true }
tokio-postgres = { workspace = true, optional = true }

[features]
# Real PostgreSQL backend (cave-pg / cave-rdbms wire) via tokio-postgres.
# Off by default so the unit suite stays hermetic; the translation layer and
# the in-memory backend need no database.
pg = ["dep:tokio-postgres"]

[dev-dependencies]
proptest = "1"
tokio = { workspace = true, features = ["macros", "rt"] }
