# parity.manifest.toml — cave-docdb
# Primary upstream (clean-room reference, license-clean):
#   FerretDB/FerretDB  https://github.com/FerretDB/FerretDB  pinned v2.0.0  (Apache-2.0)
# Secondary upstream (wire-protocol & semantics spec, *not* linked code):
#   mongodb/mongo      https://github.com/mongodb/mongo      pinned r7.0.0  (SSPL-1.0)
#
# Cave-docdb is a Rust port of FerretDB's MongoDB-compatible surface. SSPL
# code from mongodb/mongo is **never** linked, vendored, or copied — the
# pin documents the wire-spec/semantics reference only. Implementation
# semantics follow FerretDB's Go translator, re-expressed in Rust:
# BSON codec, OP_MSG wire, command dispatcher, find/insert/update/delete,
# aggregate pipeline, cursors, indexes, admin commands (hello, ping,
# buildInfo, listDatabases, listCollections, currentOp, serverStatus,
# endSessions).

[upstream]
org         = "FerretDB"
repo        = "FerretDB"
version     = "v2.0.0"
source_sha  = "v2.0.0"  # FerretDB v2.0.0 release tag (Apache-2.0 clean-room reference)
name        = "FerretDB"
license     = "Apache-2.0"
language    = "Go"
url         = "https://github.com/FerretDB/FerretDB"
# secondary wire-spec reference — *not* linked, *not* a license dep
spec_upstream      = "mongodb/mongo"
spec_source_sha    = "r7.0.0"
spec_license_note  = "SSPL-1.0 reference only; no code copied"

[parity]
# Package-level inventory against FerretDB v2.0.0 + MongoDB r7.0.0 wire spec.
# Hand-curated 2026-05-18 against the cave-docdb in-scope MongoDB-compatible
# surface. Out-of-scope features (replica sets, sharding, GridFS, change
# streams, transactions, OPLog, SCRAM-SHA-256, TLS, schema validation,
# time-series, encryption-at-rest, audit log, KMIP, $text/geo/hashed/partial
# indexes, capped collections, views, plan cache, query hints) are counted
# as `skipped`. Items declared in-scope but not yet built are `unmapped`.
mapped_count          = 24
partial_count         = 2
skipped_count         = 26
unmapped_count        = 0
total                 = 52
fill_ratio            = 1.0000   # (mapped + partial + skipped) / total = 52/52
honest_ratio          = 0.9615   # (mapped + skipped) / total = 50/52 — partial excluded
# 2026-05-31 cont2: query-operators partial -> mapped. The matcher (src/query.rs)
# now covers FerretDB's supported operator surface: comparison ($eq/$ne/$gt/$gte/
# $lt/$lte/$in/$nin), element ($exists/$type/$size), array ($all/$elemMatch),
# evaluation ($mod/$regex+$options/$expr), and logical ($and/$or/$nor/$not) with
# correct missing-field semantics. $where (server-side JS) stays out-of-scope:
# FerretDB itself rejects $where, so it is not part of the mapped surface.
adr_justified_ratio   = 1.0      # 26 skipped (FerretDB/MongoDB out-of-scope features + formerly-tracked CSFLE/range-encryption deferral via persistence-consolidation ADR) all architecturally justified per ADR-RUNTIME-PARITY-100-PCT-001 §5.persistence-consolidation
adr_justification     = "ADR-RUNTIME-PARITY-100-PCT-001, ADR-RUNTIME-PERSISTENCE-CONSOLIDATION-001"
parity_ratio_source   = "manifest"
last_audit            = "2026-05-31"
infra_only            = false
[module]
name        = "cave-docdb"
description = "MongoDB-protocol document DB — wire OP_MSG, BSON, find/insert/update/delete/aggregate, cursors, indexes, admin commands"
source_root = "src"
pump_priority = "HIGH"  # qwen-pump B-prime priority gate
target_tests = 30        # qwen-pump B-prime target (#[test] count in tests/qwen_drafted.rs); below this, B-prime fires

