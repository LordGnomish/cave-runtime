# parity.manifest.toml — cave-search
# Upstream: manticoresoftware/manticoresearch 25.8.2
#   https://github.com/manticoresoftware/manticoresearch
#
# Manticore Search is a sovereign full-text + analytics search server
# (fork of legacy Sphinx, GPL-2) competitive with Elasticsearch/OpenSearch
# but without the JVM. cave-search reimplements its core query surface in Rust.
#
# 2026-05-28 honest close — implemented 17 core surfaces (inverted index,
# BM25, boolean/phrase queries, TF-IDF, cosine similarity, field schema,
# document store, highlight, pagination, multi-tenant registry).
# 7 ADR-justified scope-cuts: dashboard UI → cave-portal, metrics → cave-metrics,
# auth → cave-identity, distributed sharding/replication → out-of-launch-scope,
# HTTP route wiring → cave-portal-api, percolate → out-of-launch-scope.

[upstream]
org        = "manticoresoftware"
repo       = "manticoresearch"
version    = "25.8.2"
source_sha = "v25.8.2"
name       = "Manticore Search"
license    = "GPL-2.0"
language   = "C++"
url        = "https://github.com/manticoresoftware/manticoresearch"

[parity]
# 2026-05-28 honest close — implemented real inverted index + BM25 + boolean/phrase
# query engine + TF-IDF vectors + cosine similarity + field schema + document store +
# highlight + pagination + multi-tenant registry.
# ADR-justified 7 sibling/out-of-scope cuts.
parity_ratio_source = "manifest"
fill_ratio          = 1.0
honest_ratio        = 0.788
adr_justified_ratio = 1.0
adr_justification   = "ADR-RUNTIME-PARITY-100-PCT-001, ADR-RUNTIME-STACK-001"
mapped_count        = 25
partial_count       = 1
skipped_count       = 7
unmapped_count      = 0
total               = 33
last_audit          = "2026-05-28"
infra_only          = false

