# parity.manifest.toml — cave-rdbms
# Upstream: postgres/postgres  https://github.com/postgres/postgres  pinned 16.0
#
# Cave-rdbms implements the PostgreSQL wire protocol (v3 startup, simple
# query, extended query, error response), the SQL grammar (lexer, parser,
# planner, optimizer, executor), an in-memory storage engine with
# transactions/savepoints, and information_schema/pg_catalog views.

[upstream]
org         = "postgres"
repo        = "postgres"
version     = "16.0"
source_sha  = "REL_16_0"  # postgres v16.0 release tag (pinned for this audit)
name        = "PostgreSQL"
license     = "PostgreSQL"
language    = "C"
url         = "https://github.com/postgres/postgres"

[parity]
# Package-level inventory against postgres/postgres REL_16_0. Hand-curated
# 2026-05-18 against the postgres source layout (src/backend/{libpq,parser,
# optimizer,executor,access,catalog,storage,utils}, src/include/catalog).
# cave-rdbms targets a minimal subset: wire-v3 + SQL grammar + executor +
# in-memory storage + info_schema/pg_catalog. Remaining out-of-scope
# subsystems (autovacuum/triggers/FDW/FTS/jsonb ops/COPY/LISTEN/NOTIFY/
# SSL+SCRAM/RLS/window-funcs/CTEs) are counted as `skipped`. Items declared
# in-scope but not yet built are `unmapped`.
#
# 2026-05-31 (cont2, strict-TDD): seven subsystems previously declared
# `skipped` are now genuinely built, tested, and in-crate, so they are
# reclassified `skipped` → `mapped` (a dishonest out-of-scope claim removed):
#   WAL (storage/wal.rs)            MVCC (storage/mvcc.rs)
#   GIN/GiST/BRIN (storage/index/)  replication (storage/replication.rs)
#   extensions (storage/extension.rs)
# Added depth not re-counted (already-mapped or off-core upstream): the
# cost-based optimizer cost model (sql/costsize.rs, depth on optimizer.rs),
# heap access method (storage/heap.rs), and pgvector (storage/pgvector.rs,
# a separate upstream).
mapped_count          = 40
partial_count         = 4
skipped_count         = 25
unmapped_count        = 0
total                 = 69
fill_ratio            = 1.0     # (mapped + partial + skipped) / total = 69/69
honest_ratio          = 0.9420  # (mapped + skipped) / total            = 65/69 (corrects stale 0.9130 + 7 skipped→mapped)
adr_justified_ratio   = 1.0      # 25 remaining skipped all architecturally justified per ADR-RUNTIME-PERSISTENCE-CONSOLIDATION-001 §1 (out-of-scope subsystems + Lease→cave-ha, connect-verbs→cave-cri sibling-crate ownership)
adr_justification     = "ADR-RUNTIME-PARITY-100-PCT-001, ADR-RUNTIME-PERSISTENCE-CONSOLIDATION-001, ADR-RUNTIME-STACK-001"
parity_ratio_source   = "manifest"
last_audit            = "2026-05-31"
infra_only            = false
[module]
name        = "cave-rdbms"
description = "Postgres-protocol RDBMS — wire v3, SQL parser/planner/executor, txn/savepoints, info_schema"
source_root = "src"

