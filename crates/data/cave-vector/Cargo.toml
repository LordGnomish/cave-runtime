[package]
name = "cave-vector"
description = "Vector database — Qdrant-compatible REST surface, HNSW indexing, quantization, sparse/hybrid search, pgvector operators"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true
documentation = "https://docs.rs/cave-vector"
readme = "README.md"
rust-version.workspace = true
keywords = ["vector-database", "hnsw", "embeddings", "similarity-search", "qdrant"]
categories = ["database-implementations", "api-bindings", "asynchronous"]

[dependencies]
cave-kernel = { path = "../../core/cave-kernel" }
axum = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }
uuid = { workspace = true }
thiserror = { workspace = true }

[dev-dependencies]
tokio = { workspace = true, features = ["macros", "rt"] }
