# parity.manifest.toml — cave-streams
#
# Two upstream projects collapse into one Rust implementation.  Per
# ADR-RUNTIME-STREAMING-CONSOLIDATION-001 we expose both wire protocols
# from a single broker process; the parity audit therefore tracks both
# upstreams as `[[upstreams]]` rather than the single `[upstream]` form.

[upstream]
# Primary upstream (kept for the legacy single-upstream parity audit).
org     = "apache"
repo    = "kafka"
version = "4.2.0"
name    = "Apache Kafka"
license = "Apache-2.0"
language= "Java"
url     = "https://github.com/apache/kafka"
[[upstreams]]
org     = "apache"
repo    = "kafka"
version = "4.2.0"
notes   = "Apache Kafka wire protocol (KIP-482 flexible versions)."

[[upstreams]]
org     = "apache"
repo    = "pulsar"
version = "v4.2.0"
notes   = "Apache Pulsar binary protocol + persistent://tenant/ns/topic addressing."

[parity]
# Package-level inventory against Kafka (primary) + Pulsar
# (secondary). Inventory hand-curated 2026-05-12 against Kafka's
# package tree (server/, controller/, common/, clients/, log/,
# coordinator/, network/, raft/, streams/, connect/, storage/)
# plus Pulsar's pulsar-broker / pulsar-common / pulsar-client.
# Each entry counts once, even when both Kafka and Pulsar contribute.
#
# 2026-05-19 FINALIZE — Charter v2 8-gate close-out:
#   * Added `source_sha` inline-table pinning BOTH upstreams (Kafka 4.2.0
#     git sha 9f8b3ad4… + Pulsar v4.2.0 git sha 1940aebc…) for
#     reproducibility audits.
#   * Added `parity_ratio_source = "manifest"` declaring this manifest
#     as the authoritative source for parity-index aggregation.
#   * Refreshed `last_audit = "2026-05-19"`.
#   * Counts unchanged from 2026-05-14 (mapped 23 + partial 0 +
#     skipped 16 + unmapped 6 = 45, fill_ratio 0.8667). The 6 unmapped
#     rows are the deferred Pulsar subsystems documented under
#     `[[scope_cuts]]` below and in PARITY_REPORT.md "Scope cuts".
#   * SPDX (AGPL-3.0-or-later) coverage: 77/77 .rs files.
#   * 4-track: Backend cave-streams lib + Portal /admin/streams/
#     (kafka/pulsar/connect/tiered) + cavectl streams sub-commands +
#     observability cave-streams alerts & dashboard — all green
#     pre-close.
mapped_count   = 29
partial_count  = 0
skipped_count  = 16
unmapped_count = 0
total          = 45
fill_ratio     = 1.0
honest_ratio   = 1.0
adr_justified_ratio = 1.0      # 16 skipped (go-bootstrap + stdlib-analog + test-harness + CLI). 2026-05-30 streaming honest-ratio uplift: the 2 previously scope-cut items (KIP-932 share groups + Pulsar transactions) are now REAL strict-TDD ports → promoted skipped→mapped (src/kafka_share_groups.rs + src/pulsar_transactions.rs), honest_ratio 0.9556→1.0. No deferrals remain.
adr_justification   = "ADR-RUNTIME-PARITY-100-PCT-001, ADR-RUNTIME-STREAMING-CONSOLIDATION-001"
parity_ratio_source = "manifest"
source_sha     = { kafka = "9f8b3ad416bd416f3706f3d7a1f425b9dd8bc5f2", pulsar = "1940aebc6ade10050399cd65f870353eedf80008" }
last_audit     = "2026-05-30"
infra_only     = false

# 2026-05-19 Phase 2 close — parity-push-mid-end:
#   * 4 of 6 prior [[scope_cuts]] promoted to [[mapped]] via real Rust ports:
#       pulsar-geographic-replication → src/pulsar_geo_replication.rs
#       pulsar-managed-ledger         → src/pulsar_managed_ledger.rs
#       pulsar-io-connectors          → src/pulsar_io_connectors.rs
#       kafka-streams-processor-api   → src/kafka_streams_processor.rs
#   * 2 [[scope_cuts]] retained for streaming-ray-2:
#       pulsar-transactions (Kafka EOS is mapped; Pulsar TC remains a gap),
#       kafka-share-groups  (KIP-932 preview feature, not stable upstream).
#   * mapped 23 → 27, unmapped 6 → 2, fill_ratio 0.8667 → 0.9556.

[module]
name          = "cave-streams"
description   = "Event streaming — single Rust impl, two wire protocols (Kafka + Pulsar)"
source_root   = "src"
target_tests = 30        # qwen-pump B-prime target (#[test] count in tests/qwen_drafted.rs); below this, B-prime fires
pump_priority = "HIGH"  # charter-critical 7 — Kafka+Pulsar event streaming surface

