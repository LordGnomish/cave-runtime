[package]
name = "cave-store"
description = "Unified storage engine — etcd v3 KV + MinIO/S3 object store with WAL and MVCC"
authors.workspace = true
repository.workspace = true
homepage.workspace = true
documentation = "https://docs.rs/cave-store"
readme = "README.md"
rust-version.workspace = true
keywords = ["storage", "etcd", "s3", "minio", "mvcc"]
categories = ["database-implementations", "api-bindings", "asynchronous"]
version.workspace = true
edition.workspace = true
license.workspace = true

[dependencies]
cave-core = { path = "../../core/cave-core" }

# Async runtime & streams
tokio = { workspace = true }
tokio-stream = "0.1"
futures = "0.3"
async-stream = "0.3"

# Web framework
axum = { workspace = true }

# Serialization
serde = { workspace = true }
serde_json = { workspace = true }

# Encoding
base64 = "0.22"
hex = "0.4"

# Crypto (presigned URLs, SSE-C, SigV4)
ring = { workspace = true }
hmac = "0.12"

# IDs & time
uuid = { workspace = true }
chrono = { workspace = true }

# Utilities
thiserror = { workspace = true }
tracing = { workspace = true }
bytes = "1"

[dev-dependencies]
proptest = "1"
tokio = { workspace = true }
tempfile = "3"
