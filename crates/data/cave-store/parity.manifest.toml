[module]
name        = "cave-store"
description = "Object store — MinIO-equivalent S3 surface (multipart, versioning, SSE encryption, lifecycle, policy, presigned) + etcd-v3 KV/lease/watch/auth/cluster shim + WAL persistence"
source_root = "src"

[portal_ui]
upstream_ui  = "MinIO Console"
upstream_url = "https://min.io/docs/minio/linux/operations/minio-console.html"
status       = "partial"
loc          = 137
priority     = "P1"
notes        = "Bucket browser widget — parallel-track cave-portal backlog"
last_audit   = "2026-05-29"
