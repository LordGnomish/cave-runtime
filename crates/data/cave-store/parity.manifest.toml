# parity.manifest.toml — cave-store
# Upstream: minio/minio  https://github.com/minio/minio  RELEASE.2025-04-22T22-12-26Z
# Secondary: etcd-io/etcd v3.5.17  https://github.com/etcd-io/etcd
#
# cave-store is a hybrid S3-compatible + etcd-v3 store. The S3 surface is the
# primary upstream parity target (versioning, multipart, encryption, lifecycle,
# policy, notification, presigned URLs); the etcd-v3 surface (src/etcd/*)
# is a secondary target tracked under the same crate.

[upstream]
org         = "minio"
repo        = "minio"
version     = "RELEASE.2025-04-22T22-12-26Z"
source_sha  = "e4b2db563a91975e0dd0e0aaa8b3b38b4eefb62c"
name        = "MinIO"
license     = "AGPL-3.0"
language    = "Go"
url         = "https://github.com/minio/minio"

[parity]
# 2026-05-29 honest close — implemented real MVCC KV, S3 object store,
# etcd auth/cluster, WAL persistence; ADR-justified 4 sibling/out-of-scope cuts.
parity_ratio_source = "manifest"
fill_ratio          = 1.0
honest_ratio        = 0.8000
adr_justified_ratio = 1.0
adr_justification   = "ADR-RUNTIME-PARITY-100-PCT-001, ADR-RUNTIME-STACK-001"
mapped_count        = 16
partial_count       = 0
skipped_count       = 4
unmapped_count      = 0
total               = 20
last_audit          = "2026-05-29"
infra_only          = false

# ── Mapped surfaces ───────────────────────────────────────────────────────────

[[mapped]]
area     = "MVCC KV engine (put/range/delete/txn/compact)"
upstream = "cmd/object-api-utils.go + etcdserver/api/v3rpc/key.go"
local    = "src/engine.rs"
notes    = "Full BTreeMap-backed MVCC with revision history, prefix/range scan, compare-and-swap transactions, compaction with history pruning"

[[mapped]]
area     = "etcd Watch subscriptions (broadcast, filter, SSE streaming)"
upstream = "etcdserver/api/v3rpc/watch.go"
local    = "src/engine.rs (watch_create/cancel/notify) + src/etcd/routes.rs (watch SSE)"
notes    = "Watch subscriptions with put/delete filters, key/range matching, revision-gated delivery, SSE streaming endpoint"

[[mapped]]
area     = "etcd Lease lifecycle (grant/revoke/keepalive/ttl/list)"
upstream = "etcdserver/api/v3rpc/lease.go"
local    = "src/engine.rs (LeaseManager) + src/etcd/routes.rs"
notes    = "Full lease lifecycle including TTL tracking, key attachment, expiry-triggered key deletion, background reaper"

[[mapped]]
area     = "S3 bucket CRUD (create/delete/list/head + sub-resources)"
upstream = "cmd/bucket-handlers.go + cmd/api-handlers.go"
local    = "src/s3/store.rs + src/s3/routes.rs"
notes    = "Create/delete/list/head bucket with name validation (3-63 chars, lowercase), bucket region, tags, ACL"

[[mapped]]
area     = "S3 object CRUD (put/get/delete/head/copy)"
upstream = "cmd/object-handlers.go"
local    = "src/s3/store.rs + src/s3/routes.rs"
notes    = "Full object lifecycle with content-type, user metadata, ETag computation, batch delete, copy with metadata directive"

[[mapped]]
area     = "S3 bucket versioning"
upstream = "cmd/bucket-versioning.go"
local    = "src/versioning.rs + src/s3/store.rs + src/s3/types.rs"
notes    = "Disabled/Enabled/Suspended states, per-put version ID generation (UUID), delete markers, historical version retrieval"

[[mapped]]
area     = "S3 multipart upload (init/upload-part/complete/abort/list)"
upstream = "cmd/object-api-multipart.go + cmd/api-multipart-handlers.go"
local    = "src/multipart.rs + src/s3/store.rs + src/s3/routes.rs"
notes    = "Full multipart flow: initiate → upload parts (WAL-backed, 5 MB min except last) → complete (assembly + ETag) → abort; list-parts"

[[mapped]]
area     = "S3 SSE encryption (SSE-S3 and SSE-C)"
upstream = "cmd/encryption-v1.go + cmd/sse-kms.go"
local    = "src/encryption.rs + src/s3/encryption.rs"
notes    = "AES-256-GCM encrypt/decrypt with ring; SSE-S3 uses server root key with per-object HMAC-SHA256 derivation; SSE-C uses customer base64 key; key rotation supported"

[[mapped]]
area     = "S3 lifecycle rules (expiry/transitions/abort-incomplete-multipart)"
upstream = "cmd/bucket-lifecycle.go + cmd/bucket-lifecycle-handlers.go"
local    = "src/lifecycle.rs + src/s3/lifecycle.rs + src/s3/store.rs"
notes    = "Rule evaluation: expiry by days/date, delete marker cleanup, storage class transitions, abort-incomplete-multipart-upload, background enforcer"

[[mapped]]
area     = "S3 bucket policy (IAM statement evaluation with glob matching)"
upstream = "cmd/bucket-policy.go + cmd/bucket-policy-handlers.go"
local    = "src/policy.rs + src/s3/policy.rs"
notes    = "Full IAM policy language subset: Allow/Deny effect, Principal (wildcard/*), Action/Resource glob, Deny overrides Allow; per-bucket policy CRUD"

[[mapped]]
area     = "S3 event notifications (queue/topic/lambda config + dispatch)"
upstream = "cmd/bucket-notification.go + cmd/bucket-notification-handlers.go"
local    = "src/notification.rs + src/s3/notification.rs"
notes    = "NotificationConfiguration with QueueConfig/TopicConfig/LambdaConfig; event matching with wildcard patterns (s3:ObjectCreated:*); broadcast to tokio channel"

[[mapped]]
area     = "S3 presigned URLs (HMAC-SHA256 sign + verify)"
upstream = "cmd/postpolicyform.go + cmd/signature-v4.go"
local    = "src/presigned.rs + src/s3/presigned.rs"
notes    = "Canonical string (METHOD/bucket/key/expires/access_key), HMAC-SHA256 signature, URL generation with Cave1-HMAC-SHA256 scheme, expiry enforcement"

[[mapped]]
area     = "etcd Auth API (users/roles/permissions/authenticate)"
upstream = "etcdserver/api/v3rpc/auth.go"
local    = "src/etcd/auth.rs + src/etcd/routes.rs"
notes    = "User add/delete/list/get/change-password; role add/delete/list/get; grant/revoke role; grant/revoke permission; authenticate with SHA256 password hash; enable/disable auth"

[[mapped]]
area     = "etcd Cluster API (members add/remove/update/promote/list)"
upstream = "etcdserver/api/membership/cluster.go"
local    = "src/etcd/cluster.rs + src/etcd/routes.rs"
notes    = "Member CRUD with learner promotion, cluster ID, peer/client URL management"

[[mapped]]
area     = "WAL persistence (write-ahead log, append, replay, compaction)"
upstream = "cmd/data-update-tracker.go + cmd/format-erasure.go"
local    = "src/wal.rs + src/store.rs"
notes    = "JSON-serialised WalEntry enum covering all KV+S3 operations; async append with fsync; replay on startup to restore in-memory state; atomic WAL compaction via rename"

[[mapped]]
area     = "S3 object listing (ListObjectsV2 with prefix/delimiter/pagination/versions)"
upstream = "cmd/object-api-listobjects.go"
local    = "src/models.rs + src/s3/store.rs + src/s3/routes.rs"
notes    = "ListObjectsV2 with prefix filter, delimiter common-prefix grouping, max-keys pagination, is_truncated, continuation token; ListObjectVersions"

# ── Skipped surfaces (ADR-justified) ──────────────────────────────────────────

[[skipped]]
area     = "MinIO Console web UI (bucket browser, dashboard, admin)"
upstream = "console/* (separate repo: github.com/minio/console)"
reason   = "parallel-track cave-portal — bucket browser widget mapped to cave-portal P1 backlog"

[[skipped]]
area     = "SQS/SNS/Webhook/Kafka event delivery (actual external delivery)"
upstream = "cmd/notification-targets.go"
reason   = "out-of-scope-subsystem — internal broadcast channel exists; external delivery delegates to cave-alerts (parallel-track)"

[[skipped]]
area     = "AWS KMS integration (SSE-KMS with external KMS server)"
upstream = "cmd/sse-kms.go (external KMS calls)"
reason   = "out-of-launch-scope — SSE-KMS algorithm modelled in types/routes; actual KMS gRPC deferred; SSE-S3 and SSE-C are implemented"

[[skipped]]
area     = "S3 Object Lock / Retention / Legal Hold"
upstream = "cmd/object-lock.go"
reason   = "out-of-launch-scope — compliance feature requiring WORM semantics; deferred to Phase 2"

