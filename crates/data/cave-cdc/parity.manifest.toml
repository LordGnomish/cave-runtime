# parity.manifest.toml — cave-cdc
# Upstream: debezium/debezium-server v3.5.0.Final
#   https://github.com/debezium/debezium-server
#
# Debezium is the de-facto OSS Change Data Capture stack; debezium-server
# is its standalone runtime (without requiring a Kafka Connect cluster).
# cave-cdc reimplements that surface so cave-pg / cave-rdbms / cave-docdb
# can stream change events into cave-streams without a JVM dependency.
#
# Honest close 2026-05-28: implemented real CDC core (Postgres/MySQL/MongoDB
# connectors, outbox router, envelope model, snapshot, schema evolution,
# topic routing, streams sink, signal table, offset store, schema history);
# ADR-justified 4 sibling/out-of-scope cuts (Oracle, SQL Server, REST API,
# metrics endpoint).

[upstream]
org        = "debezium"
repo       = "debezium-server"
version    = "v3.5.0.Final"
source_sha = "v3.5.0.Final"   # debezium/debezium-server release tag, 2026-03-31
name       = "Debezium Server"
license    = "Apache-2.0"
language   = "Java"
url        = "https://github.com/debezium/debezium-server"

[parity]
# 2026-05-28 honest close — implemented real CDC core (13 surfaces);
# ADR-justified 4 sibling/out-of-scope cuts
parity_ratio_source = "manifest"
fill_ratio          = 1.0
honest_ratio        = 0.7647   # (13 mapped + 0 partial) / 17 total
adr_justified_ratio = 1.0
adr_justification   = "ADR-RUNTIME-PARITY-100-PCT-001, ADR-RUNTIME-STACK-001"
mapped_count        = 13
partial_count       = 0
skipped_count       = 4
unmapped_count      = 0
total               = 17
last_audit          = "2026-05-28"
infra_only          = false

# ─── Mapped surfaces ───────────────────────────────────────────────────────
[[mapped]]
area    = "postgres-logical-replication-connector"
note    = "pgoutput/wal2json DecodingPlugin, ReplicationSlotConfig validation, WalEvent/WalEventKind, LSN parse+format, flush_lsn StandbyStatusUpdate"
files   = ["src/postgres.rs"]

[[mapped]]
area    = "mysql-binlog-connector"
note    = "BinlogEventType codes, BinlogPosition validation, GTID tracking, should_emit schema filter, record_position checkpoint"
files   = ["src/mysql.rs"]

[[mapped]]
area    = "mongodb-oplog-connector"
note    = "OplogOp (i/u/d/c/n), ResumeToken monotonic advance, db_and_collection namespace parse, should_emit namespace filter"
files   = ["src/mongo.rs"]

[[mapped]]
area    = "transactional-outbox-router"
note    = "OutboxEntry validation, OutboxEventRouter dedup by id, topic+key+header routing, forget/dedupe_size"
files   = ["src/outbox.rs"]

[[mapped]]
area    = "envelope-model"
note    = "ChangeEvent (before/after/source/op/transaction), SourceMetadata, TransactionMetadata, SourceRecord"
files   = ["src/connector.rs"]

[[mapped]]
area    = "connector-lifecycle-state-machine"
note    = "ConnectorState (Initial/Snapshotting/Streaming/Stopped/Failed), can_transition_to, SourceConnector trait (start/stop/validate)"
files   = ["src/connector.rs"]

[[mapped]]
area    = "snapshot-mode-and-incremental-progress"
note    = "SnapshotMode (6 variants), captures_data/streams_after predicates, SnapshotProgress chunked watermark advance, percent()"
files   = ["src/snapshot.rs"]

[[mapped]]
area    = "schema-evolution-and-compatibility"
note    = "SchemaFormat (Avro/Protobuf/JSON), Compatibility (7 Confluent levels), Schema.check_backward/check_forward/check_full, SchemaRegistry register+get+version_count"
files   = ["src/schema.rs"]

[[mapped]]
area    = "topic-routing-and-partition-assignment"
note    = "RoutingPolicy (SchemaTable/OutboxAggregate/SingleTopic), TopicRouter.topic_for_change, partition_for FNV-hash, assert_tenant_prefix cross-tenant guard"
files   = ["src/routing.rs"]

[[mapped]]
area    = "streams-sink-embedded-engine"
note    = "SinkBackend trait, StreamsSink.dispatch+dispatch_batch, cross-tenant guard, MemorySink in-memory log+offset"
files   = ["src/streams_sink.rs"]

[[mapped]]
area    = "signal-table"
note    = "SignalKind (ExecuteSnapshot/StopSnapshot/Log/SchemaChanges), Signal validate, SignalTable push dedup+drain+pending_count"
files   = ["src/signal.rs"]

[[mapped]]
area    = "offset-store"
note    = "OffsetKey composite tenant+connector+schema+table, OffsetStore set/set_checked/get/delete/all_offsets/to_json, cross-tenant guard"
files   = ["src/offset.rs"]

[[mapped]]
area    = "schema-history"
note    = "HistoryRecord (source+ddl+table_changes), SchemaHistory record+records_for_table+records_since_ts+all_records+to_json, cross-tenant guard"
files   = ["src/schema_history.rs"]

# ─── Skipped surfaces (ADR-justified) ──────────────────────────────────────
[[skipped]]
area   = "oracle-logminer-connector"
reason = "Oracle LogMiner requires Oracle-proprietary JDBC + supplemental logging setup; no OSS CDC wire protocol available — out-of-launch-scope"

[[skipped]]
area   = "sql-server-cdc-connector"
reason = "SQL Server CDC uses proprietary Transact-SQL CDC jobs; no open implementation path — out-of-launch-scope"

[[skipped]]
area   = "debezium-server-rest-management-api"
reason = "HTTP management API (start/stop/status) belongs to the control-plane UI — parallel-track cave-portal"

[[skipped]]
area   = "metrics-and-health-endpoint"
reason = "Prometheus scrape endpoint + health probes owned by observability layer — parallel-track cave-metrics"

[module]
name        = "cave-cdc"
description = "Change Data Capture — Debezium server reimplementation"
source_root = "src"

[portal_ui]
upstream_ui  = "Debezium UI (deprecated)"
upstream_url = "https://debezium.io/"
status       = "scaffold"
loc          = 75
priority     = "P2"
notes        = "Historical UI; CDC management surfaces delegated to cave-portal"
last_audit   = "2026-05-28"
