# ── Newly mapped 2026-05-19 (K8s parity uplift Phase 2) ─────────────────────

[[mapped]]
upstream_pkg = "pkg/apis/resource/ (DRA)"
local_files  = ["src/dra.rs"]
note         = "DynamicResourceAllocation (KEP-4381, v1.32 beta). ResourceClass / ResourceClaim / PodSchedulingContext type surface + DraRegistry with create/get/list/delete on classes, full claim lifecycle (allocate / reserve_for / unreserve / deallocate with reservation gate). Feature-gated via DraRegistry::enable() to match upstream feature-gate semantics. Reconciler stays in cave-controller-manager."

[[mapped]]
upstream_pkg = "staging/src/k8s.io/apiserver/plugin/pkg/audit/"
local_files  = ["src/audit_backends.rs"]
note         = "Pluggable audit-backend registry — LogBackend / WebhookBackend (with injectable sender) / BufferedBackend (capacity-flush) / TruncateBackend (large-body redaction) + AuditBackendRegistry fan-out / flush / shutdown lifecycle. Backends register at boot; routes.rs no longer needs to know each sink."

[[mapped]]
upstream_pkg = "staging/src/k8s.io/apiserver/pkg/endpoints/openapi/"
local_files  = ["src/openapi_v3.rs"]
note         = "Live OpenAPI v3 handler — Registry of ResourceRegistration synthesises full v3 document at request time: per-resource schema fragments with `x-kubernetes-group-version-kind` annotations, paths for list / item / create / delete, namespaced vs cluster-scoped routing, naive pluraliser with K8s irregulars (endpoints, ingresses, networkpolicies, storageclasses)."

[[mapped]]
upstream_pkg = "staging/src/k8s.io/apiserver/pkg/admission/initializer/"
local_files  = ["src/admission_initializer.rs"]
note         = "Admission plugin initializer — Wants{Authorizer,Informers,RestMapper,Client,FeatureGate} marker traits + PluginInitializer builder + drive() dispatcher. Replaces hand-wired construction in main.rs; FeatureGate is shared by Arc across all plugins."

[[unmapped]]
upstream_pkg = "pkg/registry/coordination/lease/storage/"
note         = "Lease objects (lease-based leader election). routes.rs surfaces the CRUD but the holder-identity/renewTime semantics are not enforced — cave-ha uses its own Raft-derived leases."

[[unmapped]]
upstream_pkg = "staging/src/k8s.io/apiserver/pkg/registry/rest/connect.go"
note         = "Long-running connect verbs (pod exec/attach/portforward proxying). Cave-cri serves exec directly; the apiserver proxy path is not implemented."

