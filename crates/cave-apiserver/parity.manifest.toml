# parity.manifest.toml — cave-apiserver
# Upstream: kubernetes/kubernetes v1.36.0  https://github.com/kubernetes/kubernetes
# (verified at https://github.com/kubernetes/kubernetes/releases/latest)

[upstream]
org     = "kubernetes"
repo    = "kubernetes"
version = "v1.36.0"

[module]
name          = "cave-apiserver"
description   = "Kubernetes API server reimplementation — 24 resource types, full CRUD + watch"
source_root   = "src"
target_tests = 30        # qwen-pump B-prime target (#[test] count in tests/qwen_drafted.rs); below this, B-prime fires
pump_priority = "HIGH"  # charter-critical 7 — K8s control-plane primary entrypoint

