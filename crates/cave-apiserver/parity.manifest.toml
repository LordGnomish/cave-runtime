# parity.manifest.toml — cave-apiserver
# Upstream: kubernetes/kubernetes v1.36.0  https://github.com/kubernetes/kubernetes
# (verified at https://github.com/kubernetes/kubernetes/releases/latest)
#
# 2026-05-18 FINALIZE — Charter v2 8-gate close-out.
#   * Added `source_sha = "v1.36.0"` for reproducibility audits (matches
#     the cave-net / cave-auth / cave-portal FINALIZE convention — pins
#     the git tree-ish the manifest was enumerated against).
#   * Refreshed `last_audit = "2026-05-18"`.
#   * No code or count delta: mapped 26 / partial 1 / skipped 18 /
#     unmapped 6 / total 51 / fill_ratio 0.8824 is the measured-audit
#     baseline from the 2026-05-12 CEL evaluator MVP landing. The 6
#     unmapped rows remain honestly scope-cut (apiextensions-apiserver
#     CRD storage migration, aggregator dynamic SD, …) — see
#     PARITY_REPORT.md "Unmapped surface" section.
#   * SPDX (AGPL-3.0-or-later) coverage: 58/58 .rs files.
#   * 4-track: Backend cave-apiserver lib + Portal /admin/k8s_dashboard/
#     + cavectl ApiserverCmd + observability cave-apiserver alerts &
#     dashboard — all green pre-close.
#
# 2026-05-19 K8s parity uplift — Phase 2 deep-port.
#   * Audit-backend plugin registry ported (src/audit_backends.rs):
#     LogBackend / WebhookBackend / BufferedBackend / TruncateBackend +
#     `AuditBackendRegistry` with fan-out / flush / shutdown.
#   * OpenAPI v3 live handler ported (src/openapi_v3.rs): `Registry` of
#     resource registrations synthesises full v3 doc — per-resource
#     schema fragments + paths + `x-kubernetes-group-version-kind`.
#   * Admission plugin initializer ported (src/admission_initializer.rs):
#     `WantsAuthorizer` / `WantsInformers` / `WantsRestMapper` /
#     `WantsClient` / `WantsFeatureGate` markers + `PluginInitializer`
#     builder + `drive()` dispatcher.
#   * DRA types ported (src/dra.rs): `ResourceClass` / `ResourceClaim` /
#     `PodSchedulingContext` + `DraRegistry` (CRUD + allocate + reserve +
#     deallocate). Reconciler stays in cave-controller-manager.
#   * Counts: mapped 26→30 (+4), partial 1 unchanged, skipped 18, unmapped
#     6→2 (-4). fill_ratio 0.8824 → 0.9608, honest_ratio 0.8627 → 0.9412.
#   * last_audit = "2026-05-19", parity_ratio_source = "manifest".

[upstream]
org        = "kubernetes"
repo       = "kubernetes"
version    = "v1.36.0"
source_sha = "v1.36.0"

[parity]
# Package-level inventory (see [[mapped]]/[[skipped]]/[[unmapped]] below):
#   fill_ratio = (mapped + skipped) / total
# Measured pass: top-level kubernetes/kubernetes v1.31.x apiserver-
# bearing packages enumerated and classified honestly.
# 2026-05-12 (audit landing): 26 mapped / 17 skipped / 7 unmapped = 0.86.
# 2026-05-12 (later same day, CEL evaluator MVP landed): the CEL
# evaluator entry moved from [[unmapped]] to [[mapped]] — see
# `src/cel_eval.rs` (CelInterpreterEvaluator backed by the
# `cel-interpreter` crate). New ratio: 27 mapped / 17 skipped / 6
# unmapped = 0.88.
# See docs/parity/cave-apiserver-port-2026-05-12.md for methodology.
mapped_count   = 30
partial_count  = 1
skipped_count  = 18
unmapped_count = 2
total          = 51
fill_ratio     = 0.9608
honest_ratio   = 0.9412
last_audit     = "2026-05-19"
infra_only     = false
parity_ratio_source = "manifest"

[module]
name          = "cave-apiserver"
description   = "Kubernetes API server reimplementation — 24 resource types, full CRUD + watch"
source_root   = "src"
target_tests = 30        # qwen-pump B-prime target (#[test] count in tests/qwen_drafted.rs); below this, B-prime fires
pump_priority = "HIGH"  # charter-critical 7 — K8s control-plane primary entrypoint

