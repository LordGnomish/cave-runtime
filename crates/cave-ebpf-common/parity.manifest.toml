# parity.manifest.toml — cave-ebpf-common
# Upstream: cilium/cilium  https://github.com/cilium/cilium
# Skeleton generated by cave parity init — fill in the mapping sections

[upstream]
org     = "cilium"
repo    = "cilium"
version = "v1.14.0"
name    = "Cilium"
license = "Apache-2.0"
language= "Go"
url     = "https://github.com/cilium/cilium"
[module]
name        = "cave-ebpf-common"
description = "Shared eBPF utilities — Cilium eBPF replacement"
source_root = "src"

# ── File mappings ────────────────────────────────────────────────────────────
# [[files]]
# upstream = "path/in/upstream/repo.go"
# local    = "src/local.rs"

# ── Function mappings ────────────────────────────────────────────────────────
# [[functions]]
# upstream_name = "UpstreamFunc"
# local_name    = "local_fn"
# file          = "src/routes.rs"

# ── Test mappings ────────────────────────────────────────────────────────────
# [[tests]]
# upstream_test = "TestUpstreamFunc"
# local_test    = "test_local_fn"

# ── Surface mappings ─────────────────────────────────────────────────────────
# [[surfaces]]
# kind          = "http"
# upstream_path = "/api/upstream"
# local_path    = "/api/ebpf-common/endpoint"

[parity]
infra_only = true
ratio       = 0.0        # honest: 0.0 means upstream parity NOT yet measured
last_audit  = "2026-05-12"

