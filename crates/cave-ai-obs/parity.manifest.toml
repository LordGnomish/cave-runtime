# parity.manifest.toml — cave-ai-obs
# Upstream: langfuse/langfuse  https://github.com/langfuse/langfuse
# Skeleton generated by cave parity init — fill in the mapping sections

[upstream]
org     = "langfuse"
repo    = "langfuse"
version = "v2.0.0"

[module]
name        = "cave-ai-obs"
description = "AI observability — Langfuse replacement"
source_root = "src"

# ── File mappings ────────────────────────────────────────────────────────────
