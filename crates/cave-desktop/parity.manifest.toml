# parity.manifest.toml — cave-desktop
# Upstream: zed-industries/zed (GPUI framework only — not the editor itself)

[upstream]
org     = "zed-industries"
repo    = "zed"
version = "main"
source_sha = "main"  # G1: tag-based pin (deep-port may override)
name    = "Zed"
license = "GPL-3.0"
language= "Rust"
url     = "https://github.com/zed-industries/zed"
[module]
name        = "cave-desktop"
description = "GPUI-based native admin shell — see ADR-PORTAL-DESKTOP-001"
source_root = "src"

# cave-desktop is not a parity reimplementation of an upstream product.
# It consumes GPUI as a UI framework dependency (analogous to depending on
# axum or tokio). Parity tracking here exists so the upstream-watch daemon
# (`crates/cave-upstream`) can notify us when Zed publishes breaking GPUI
# changes that we need to react to.

# ── File mappings ────────────────────────────────────────────────────────────
# Intentionally empty — we don't mirror Zed source.

# ── Function mappings ────────────────────────────────────────────────────────
# Intentionally empty.

[parity]
infra_only = true
ratio       = 0.0        # honest: 0.0 means upstream parity NOT yet measured
last_audit  = "2026-05-12"

