# parity.manifest.toml — cave-pipelines
# Upstream: tektoncd/pipeline  https://github.com/tektoncd/pipeline  pinned v0.55.0
#
# Cave-pipelines implements Tekton-style CI/CD: Pipeline/Task/PipelineRun/
# TaskRun CRDs, Triggers (cron + webhook with CEL interceptors), workspace
# binding, build strategies (docker/buildpacks/kaniko), notifications,
# Tekton catalog, GitHub commit-status reporter, Jenkinsfile importer.

[upstream]
org     = "tektoncd"
repo    = "pipeline"
version = "v0.55.0"
name    = "Tekton Pipelines"
license = "Apache-2.0"
language= "Go"
url     = "https://github.com/tektoncd/pipeline"

[parity]
# 2026-05-30 Wave-3 honest uplift — honest_ratio 0.6316 → 0.6842
#   Source count methodology:
#     total          = upstream surface areas = 19
#     mapped         = 12  (all implemented src/ modules)
#     partial        = 1   (Tekton Dashboard / portal_ui)
#     skipped        = 6   (ADR-RUNTIME-PARITY-100-PCT-001 §5 scope-cuts)
#     unmapped_count = 0
#
#   fill_ratio  = (12 + 1 + 6) / 19 = 1.0
#   honest_ratio = (12 + 1) / 19  = 0.6842
#
#   Wave-3 (2026-05-30) honest conversion (strict TDD, RED→GREEN):
#     * pkg/pod/ skip → mapped: ported the PURE step-sequencing core of
#       tektoncd/pipeline pkg/pod/entrypoint.go `orderContainers` (+helpers
#       resultArgument / stepResultArgument / collectResultsName) into
#       src/entrypoint.rs. This rewrites every step's argv to wrap it in the
#       /tekton/bin/entrypoint binary with -wait_file/-post_file flags so
#       step N blocks on step N-1's /tekton/run/{i-1}/out post-file — pure
#       in-memory argv assembly, NOT k8s pod scheduling / volume mounting
#       (which remains cave-cri's). 6 entrypoint_tdd + 2 inline tests.
#     * The k8s pod lifecycle (init-container sidecars, workspace volume
#       mounts, runtime class) that the prior pkg/pod/ skip ALSO covered is
#       genuinely cave-cri's; that residue is folded into the pkg/container/
#       sub-component skip below (cave-cri owns container execution).
#
#   2026-05-29 Charter v2 close — fill_ratio 0.0 → 1.0:
#     * Added pub mod declarations in lib.rs for 5 previously-orphaned modules
#       (build, executor, github, notifications, workspace) — all had genuine
#       implementations on disk but were undeclared.
#     * Fixed type-name mismatches in the 5 modules to compile against the
#       current models.rs (RunStatus→RunPhase, WorkspaceBinding struct→enum,
#       ParameterValue→Param/ParamValue, interpolate_params→resolve_param_string,
#       Step.timeout_seconds→Step.timeout: Option<String>).
parity_ratio_source = "manifest"
fill_ratio          = 1.0
honest_ratio        = 0.6842
adr_justified_ratio = 1.0
adr_justification   = "ADR-RUNTIME-PARITY-100-PCT-001, ADR-RUNTIME-STACK-001"
mapped_count        = 12
partial_count       = 1
skipped_count       = 6
unmapped_count      = 0
total               = 19
last_audit          = "2026-05-30"
infra_only          = false

[module]
name        = "cave-pipelines"
description = "Tekton-parity CI/CD — pipelines/tasks/runs, triggers (CEL), workspaces, build strategies, GitHub status, Jenkins import, catalog"
source_root = "src"
rs_files    = 13
tests_passing = 73

# ── Mapped subsystems ────────────────────────────────────────────────────────

[[mapped]]
upstream_pkg = "pkg/apis/pipeline/v1/pipeline_types.go"
local_files  = ["src/models.rs"]
note         = "Pipeline/Task/PipelineRun/TaskRun CRDs, params, workspaces, results, matrix, retries, when-expressions"

[[mapped]]
upstream_pkg = "pkg/reconciler/pipelinerun/"
local_files  = ["src/engine.rs"]
note         = "DAG execution engine — Kahn topological sort, resolve_param_string, validate_params, should_run_finally, matrix fan-out"

[[mapped]]
upstream_pkg = "pkg/reconciler/taskrun/"
local_files  = ["src/executor.rs"]
note         = "Step executor — child-process execution, stdout/stderr capture, timeout, env injection, script interpolation"

[[mapped]]
upstream_pkg = "pkg/workspace/"
local_files  = ["src/workspace.rs"]
note         = "WorkspaceManager — EmptyDir/PVC/ConfigMap/Secret/Projected bindings, path resolution, cleanup"

[[mapped]]
upstream_pkg = "pkg/image/build.go"
local_files  = ["src/build.rs"]
note         = "Build strategies — Dockerfile, Kaniko, Buildpacks, S2I; CLI arg generation, param interpolation"

[[mapped]]
upstream_pkg = "pkg/apis/triggers/v1beta1/trigger_types.go"
local_files  = ["src/triggers.rs"]
note         = "TriggerTemplate/TriggerBinding/EventListener, CEL interceptor evaluation, cron/webhook/git-push triggers"

[[mapped]]
upstream_pkg = "pkg/notifications/"
local_files  = ["src/notifications.rs"]
note         = "Notification dispatch — webhook, Slack, email; filter by RunPhase (OnSuccess/OnFailure/OnComplete/Always)"

[[mapped]]
upstream_pkg = "pkg/catalog/"
local_files  = ["src/catalog.rs"]
note         = "Built-in task catalog — Git clone, Docker build, Kaniko, Buildpacks, Helm, tests/lint/SAST; TaskRef resolution"

[[mapped]]
upstream_pkg = "pkg/git/github_status.go"
local_files  = ["src/github.rs"]
note         = "GitHub commit-status API (POST /repos/.../statuses/{sha}), check-runs, CommitState mapping from RunPhase"

[[mapped]]
upstream_pkg = "pkg/migrate/jenkins.go"
local_files  = ["src/jenkins.rs"]
note         = "Jenkinsfile importer — pipeline/stage/step parser, to_pipeline_spec conversion to Tekton Pipeline CRD"

[[mapped]]
upstream_pkg = "pkg/apis/pipeline/v1/routes.go"
local_files  = ["src/routes.rs"]
note         = "HTTP routes — Pipeline/Task/PipelineRun/TaskRun CRUD, logs streaming, catalog, event-listeners, Jenkins import"

[[mapped]]
upstream_pkg = "pkg/pod/entrypoint.go"
local_files  = ["src/entrypoint.rs"]
note         = "Step-sequencing (orderContainers): rewrites each step's argv to wrap /tekton/bin/entrypoint with -wait_file/-post_file so step N blocks on step N-1's /tekton/run/{i-1}/out post-file; + resultArgument/stepResultArgument/collectResultsName. Pure in-memory argv assembly. 2026-05-30 strict-TDD RED→GREEN (tests/entrypoint_tdd.rs). k8s pod scheduling/volume mounts remain cave-cri."

# ── Partial ──────────────────────────────────────────────────────────────────

[[partial]]
upstream_pkg = "dashboard/"
local_files  = []
note         = "Tekton Dashboard UI — portal_ui status=partial; PipelineRun graph will land in cave-portal admin/pipelines/"
category     = "portal-api-owned"

# ── Skipped (ADR-RUNTIME-PARITY-100-PCT-001 §5) ──────────────────────────────

[[skipped]]
upstream_pkg = "cmd/"
reason       = "orchestrator-handles"
note         = "Tekton controller/webhook/resolvers binary entrypoints. cave-runtime IS the orchestrator — these process-level controllers are superseded by the cave-runtime event loop. ADR-RUNTIME-PARITY-100-PCT-001 §5."

[[skipped]]
upstream_pkg = "pkg/resolution/"
reason       = "parallel-track"
note         = "Remote pipeline/task resolution from OCI, Bundle, Git, Cluster registries. Parallel-track: cave-artifacts owns registry resolution. ADR-RUNTIME-PARITY-100-PCT-001 §5."

[[skipped]]
upstream_pkg = "pkg/remote/"
reason       = "parallel-track"
note         = "HTTP/OCI remote resource fetcher backing the resolver framework. Same parallel-track as pkg/resolution/ above."

[[skipped]]
upstream_pkg = "pkg/container/"
reason       = "sub-component"
note         = "Step container spec plumbing (runtime class, security, resource limits) AND the k8s pod lifecycle residue of pkg/pod/ (initContainer sidecars, workspace volume mounts on k8s pods, pod scheduling). cave-cri owns container/pod execution. The PURE step-ordering algorithm of pkg/pod/entrypoint.go was ported in-crate (see src/entrypoint.rs mapped entry). ADR-RUNTIME-PARITY-100-PCT-001 §5."

[[skipped]]
upstream_pkg = "tkn"
reason       = "cli-replaced"
note         = "Tekton CLI (tkn) — all pipeline/task/run management is via cavectl pipeline subcommands. ADR-RUNTIME-PARITY-100-PCT-001 §5."

[[skipped]]
upstream_pkg = "pkg/apis/pipeline/v1beta1/"
reason       = "no-backcompat"
note         = "Tekton v1beta1 API — superseded by v1 (promoted in Tekton v0.44.0). cave-pipelines targets v1 only; no v1beta1 compat surface required. ADR-RUNTIME-PARITY-100-PCT-001 §5."

