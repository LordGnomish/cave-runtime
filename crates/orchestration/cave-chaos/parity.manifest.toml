# parity.manifest.toml — cave-chaos
# Upstream: chaos-mesh/chaos-mesh  https://github.com/chaos-mesh/chaos-mesh
# 2026-05-31 honest cont — reconciled against the real built surface: selector,
# reconcile decision-core, daemon command planner, Prometheus exporter, admission
# webhook now mapped; cavectl wired; 22 fault types. 4 narrowed scope-cuts remain.

[upstream]
org        = "chaos-mesh"
repo       = "chaos-mesh"
version    = "v2.7.0"
name       = "Chaos Mesh"
license    = "Apache-2.0"
language   = "Go"
url        = "https://github.com/chaos-mesh/chaos-mesh"
source_sha = "b061f3c26be3f0d3f52049044f2513c42c843c1f"
#   * source_sha pinned to v2.7.0 tag commit (dereferenced)

[parity]
# 2026-05-31 honest cont — reconciled the stale manifest against the real
# surface built since the 2026-05-28 close: added the pod selector, reconcile
# decision-core, chaos-daemon command planner, in-crate Prometheus exporter and
# admission webhook as mapped; wired the cavectl `chaos` verb to the live REST
# routes (cavectl skip -> mapped). The three remaining skips were *narrowed* to
# the genuinely out-of-process residual (K8s informer/watch/leader-election,
# Grafana dashboards + cluster scrape config, privileged daemon kernel exec) and
# the React SPA. Also closed the open extra-faults TDD cycle (22 fault types) and
# wired NetworkDuplicate into the daemon injection plan.
parity_ratio_source = "manifest"
fill_ratio          = 1.0
honest_ratio        = 0.8261  # 19 mapped / 23 total — 4 genuine scope-cuts
adr_justified_ratio = 1.0
adr_justification   = "ADR-RUNTIME-PARITY-100-PCT-001, ADR-RUNTIME-STACK-001"
mapped_count        = 19
partial_count       = 0
skipped_count       = 4
unmapped_count      = 0
total               = 23
last_audit          = "2026-05-31"
infra_only          = false

# ── Mapped surfaces ───────────────────────────────────────────────────────────

[[mapped]]
area    = "experiment-type-model"
what    = "Full ExperimentType enum (22 fault types: Network{Latency,PacketLoss,Corruption,Bandwidth,Partition,Duplicate}, CpuStress, MemoryStress, DiskFill, IoLatency, IoChaos, PodKill, ProcessKill, NodeDrain, ClockSkew, HttpFault, GrpcFault, JvmException, DnsChaos, KernelChaos, BlockChaos, PhysicalMachineChaos) + serde snake_case roundtrip"
file    = "src/models.rs"
note    = "Extends origin/main 6-type enum to the full Chaos Mesh v2.7.0 surface"

[[mapped]]
area    = "experiment-lifecycle-model"
what    = "ChaosExperiment struct with full lifecycle fields (id, name, type, target, params, status, timestamps, duration, blast_radius, safety_guard, result, annotations)"
file    = "src/models.rs"
note    = "Pre-existing on origin/main; extended with blast_radius/safety_guard/result/annotations"

[[mapped]]
area    = "blast-radius-control"
what    = "BlastRadius struct (max_pod_fraction, max_pods cap, namespace restriction list) — limits how many pods an experiment can affect. Maps to Chaos Mesh spec.selector.mode + pod count"
file    = "src/models.rs"
note    = "NEW type — absorbed from orphan executor.rs reference into models.rs"

[[mapped]]
area    = "safety-guard"
what    = "SafetyGuard struct (enabled flag, protected_namespaces list, min_healthy_pod_percentage threshold) — blocks experiments in kube-system/kube-public/cave-system and halts when pod health drops below threshold"
file    = "src/models.rs + src/executor.rs"
note    = "NEW type — absorbed from orphan executor.rs reference into models.rs"

[[mapped]]
area    = "experiment-execution"
what    = "ChaosExecutor: execute() (run + collect metrics), validate() (safety guard + engine validation), check_safety() (health threshold monitor), rollback() (abort running experiment)"
file    = "src/executor.rs"
note    = "Orphan file on origin/main; wired via lib.rs pub mod executor"

[[mapped]]
area    = "fault-simulation-metrics"
what    = "simulate_experiment(): generates realistic before/after metric degradation for all 22 fault types (p50/p99 latency, error_rate, cpu_util, memory_util); structured ExperimentEvent timeline"
file    = "src/executor.rs"
note    = "All 22 ExperimentType variants handled exhaustively"

[[mapped]]
area    = "experiment-store"
what    = "ChaosStore: thread-safe RwLock CRUD (insert, get, update, remove, list, list_by_status, count) + ExperimentSchedule CRUD (add_schedule, get_schedule, remove_schedule, list_schedules)"
file    = "src/store.rs"
note    = "Orphan file on origin/main; wired via lib.rs pub mod store"

[[mapped]]
area    = "experiment-schedule-model"
what    = "ExperimentSchedule struct (id, experiment_id, cron_expression, enabled, last_run, next_run, max_runs, run_count) — maps to Chaos Mesh Schedule CRD"
file    = "src/models.rs"
note    = "NEW type — absorbed from orphan store.rs reference into models.rs"

[[mapped]]
area    = "experiment-workflow"
what    = "ChaosWorkflow (running instance), WorkflowTemplate (DAG definition), WorkflowNode (Sequential/Parallel/Suspend), execute_workflow() (DAG executor with sequential abort-on-fail + parallel fan-out). Maps to Chaos Mesh Workflow CRD"
file    = "src/workflow.rs"
note    = "NEW module — core Chaos Mesh orchestration feature"

[[mapped]]
area    = "cron-schedule-engine"
what    = "Pure-Rust 5-field cron parser: CronField (Wildcard/Exact/Step/Range/List), parse_cron(), validate_cron_expression(), cron_field_matches(), is_cron_due(), next_cron_run(), should_run() with max_runs exhaustion + same-minute dedup. Maps to Chaos Mesh Schedule CRD cron evaluation"
file    = "src/schedule.rs"
note    = "NEW module — no external cron library; pure std + chrono"

[[mapped]]
area    = "validation-engine"
what    = "validate_experiment() (per-type parameter validation for all 22 types incl. NetworkDuplicate 0-100% bound), is_active(), is_high_risk(), actual_duration_secs()"
file    = "src/engine.rs"
note    = "Pre-existing on origin/main; extended to handle all 22 ExperimentType variants"

[[mapped]]
area    = "rest-api-crud"
what    = "Full CRUD REST API: GET /api/chaos/health, GET /api/chaos/experiments, POST /api/chaos/experiments, GET /api/chaos/experiments/{id}, DELETE /api/chaos/experiments/{id}, POST /api/chaos/experiments/{id}/start, POST /api/chaos/experiments/{id}/stop"
file    = "src/routes.rs"
note    = "Origin/main had only health endpoint; extended to full lifecycle CRUD"

[[mapped]]
area    = "event-history"
what    = "ExperimentEvent struct (timestamp, event_type, message, target) + 5-event audit trail per execution (target_selected, metrics_collected, injection_started, metrics_observed, injection_stopped)"
file    = "src/models.rs + src/executor.rs"
note    = "NEW model + generates structured event history per experiment execution"

[[mapped]]
area    = "pod-target-selector"
what    = "resolve_targets(): namespace scope + LabelSelector (matchLabels equality AND + matchExpressions In/NotIn/Exists/DoesNotExist) + SelectorMode subset-size (one/all/fixed/fixed-percent ceil/random-max-percent floor). Maps api/v1alpha1/selector.go + controllers/utils/selector"
file    = "src/selector.rs"
note    = "NEW module. The live random tie-break in random-max-percent/one is part of the privileged daemon path — out of scope; the exact subset *size* formula is preserved"

[[mapped]]
area    = "reconcile-decision-core"
what    = "Pure controllers/common decision core: desired_phase() recovery enforcer (manual-stop / unbounded / elapsed>=duration), compute_conditions() (Selected/AllInjected/AllRecovered/Paused), compute_phase() (Initial/Injecting/Running/Recovering/Finished/Paused), is_terminal()"
file    = "src/reconcile.rs"
note    = "NEW module. The K8s informer/watch loop, leader election and RBAC that DRIVE this logic remain a narrowed scope-cut (cave-controller-manager)"

[[mapped]]
area    = "chaos-daemon-command-planning"
what    = "Portable chaos-daemon command planner: tc_netem (delay/loss/corrupt/duplicate + jitter/correlation), tc_tbf bandwidth, iptables_partition (CHAOS-INPUT/OUTPUT ipset DROP), stress_ng_cpu/mem, dns_chaos_command, and injection_plan() mapping an experiment to its ordered command list"
file    = "src/daemon.rs"
note    = "NEW module. Deterministic command *planning* only; the privileged kernel/namespace execution (nsenter, cgroups, real tc syscalls) stays a narrowed scope-cut"

[[mapped]]
area    = "metrics-prometheus-exporter"
what    = "render_prometheus(): in-crate Prometheus text exposition (chaos_experiments_total, _by_status{draft|running|completed|aborted|failed}, _active, _high_risk) served at GET /api/chaos/metrics"
file    = "src/metrics.rs"
note    = "NEW module. Cluster-wide scraping + Grafana dashboards remain a narrowed scope-cut (cave-metrics); this is the portable /metrics endpoint that a scraper hits"

[[mapped]]
area    = "validating-admission-webhook"
what    = "validate_experiment_admission() (empty-name, blast-radius (0,1] bound, max_pods>0, safety-guard protected-namespace block, then per-type validation) + validate_schedule_admission() (cron validity). Maps api/v1alpha1/*_webhook.go"
file    = "src/webhook.rs"
note    = "NEW module — rejects dangerous experiments at admission time before they are ever stored"

[[mapped]]
area    = "cavectl-cli-integration"
what    = "cavectl `chaos` verb: experiments(list), get/create/start/stop/delete by id, metrics — dispatched to the live /api/chaos/* REST routes"
file    = "crates/ops/cave-cli/src/main.rs"
note    = "Realigned from stale /templates + /run placeholders to the real route surface; cave-runtime merges cave_chaos::router and the portal catalog entry is live (healthy, ep=/api/chaos/health)"

