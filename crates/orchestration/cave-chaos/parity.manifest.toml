[[skipped]]
area   = "portal-ui-dashboard"
what   = "Chaos Mesh Dashboard React SPA — experiment timeline, topology graph, archive browser"
reason = "parallel-track: cave-portal owns all React/web UI surfaces for the cave-runtime workspace"

[[skipped]]
area   = "cavectl-cli-integration"
what   = "cavectl chaos {create,list,get,start,stop,delete,workflow} subcommands"
reason = "parallel-track: cave-cli/cavectl is the monorepo CLI driver; surface exists but wiring is deferred to cavectl integration sprint"

[[skipped]]
area   = "observability-metrics-export"
what   = "Prometheus /metrics scrape endpoint, Grafana dashboard JSON, experiment latency/error histograms"
reason = "parallel-track: cave-metrics owns Prometheus/OTEL scrape surfaces across the workspace"

[[skipped]]
area   = "chaos-daemon-ebpf-injection"
what   = "ChaosDaemon daemonset — eBPF-level tc/netem kernel fault injection, cgroups-based CPU/memory stress, nsenter process kill"
reason = "out-of-scope-subsystem: requires privileged daemonset DaemonSet running ChaosDaemon on each node; out-of-process kernel interaction outside cave-chaos scope"

