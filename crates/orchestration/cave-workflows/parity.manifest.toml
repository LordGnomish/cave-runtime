# parity.manifest.toml — cave-workflows
# Upstream: argoproj/argo-workflows  https://github.com/argoproj/argo-workflows  pinned v4.0.5
# Charter v2 close-out 2026-05-24.
# Repointed from n8n auto-init skeleton to Argo Workflows.

[upstream]
org        = "argoproj"
repo       = "argo-workflows"
version    = "v4.0.5"
name       = "Argo Workflows"
license    = "Apache-2.0"
language   = "Go"
url        = "https://github.com/argoproj/argo-workflows"
source_sha = "0ab1452144d8f4d57c50b37ce50dad218868e950"

[parity]
parity_ratio_source = "manifest"
fill_ratio          = 1.0
honest_ratio        = 0.7143
adr_justified_ratio = 1.0      # 7 scope_cuts (React UI → cave-portal-ui, pod lifecycle → cave-cri/kubelet, metrics → cave-metrics, semaphore/mutex/rbac → cave-permission, CronWorkflow → cave-knative, GC → cave-controller-manager, suspend/resume persist → Phase 2 cave-db + cave-controller-manager wakeup) + 8 skipped (same: 7 originals + 1 formalized 2026-05-28 for suspend/resume durable persist) all parallel-track per ADR-RUNTIME-STACK-001.
adr_justification   = "ADR-RUNTIME-PARITY-100-PCT-001, ADR-RUNTIME-STACK-001"
last_audit          = "2026-05-28"
infra_only          = false
mapped_count        = 20
partial_count       = 0
skipped_count       = 8
unmapped_count      = 0
total               = 28

# 2026-05-24 close-out — claude/cave-workflows-close-2026-05-24:
#   * Repointed upstream n8n→argoproj/argo-workflows v4.0.5.
#   * 2 new src/ modules (workflow_crd.rs + executor.rs, ~1 600 LOC).
#   * 46 lib + 9 self-audit = 55 PASS.
#   * fill_ratio  = (mapped + partial + skipped) / total = (16 + 0 + 7) / 24 = 0.9583.
#   * honest_ratio = (mapped + partial) / total          = 16 / 24           = 0.6667.
#   * source_sha pinned to v4.0.5 commit 0ab1452144d8f4d57c50b37ce50dad218868e950.

# ─── Argo Events module — argoproj/argo-events v1.9.10 (2026-05-28) ──────────
#   * Moved in from cave-knative (mismapped there during the 2026-05-24 Argo
#     close-out). Argo Events is the event-trigger companion to Argo Workflows
#     (same argoproj upstream family) — see
#     ADR-RUNTIME-ARGO-EVENTS-IN-WORKFLOWS-001.
#   * +4 mapped subsystems: argo-events-eventsource-crd /
#     argo-events-sensor-crd / argo-events-trigger-templates /
#     argo-events-eventbus-crd as src/events.rs (module renamed
#     argo_events → events).
#   * Counts: 16→20 mapped, 24→28 total. fill_ratio stays 1.0
#     ((20 + 0 + 8) / 28). honest_ratio = (mapped + partial) / total
#     = 20 / 28 = 0.7143.

[module]
name        = "cave-workflows"
description = "Argo Workflows parity — Workflow + Template CRDs (Container / Script / Resource / Suspend / DAG / Steps), Parameter + Artifact pipelines, RetryStrategy, pure-function executor reducer"
source_root = "src"

[[mapped]]
name = "workflow-crd"
upstream = "pkg/apis/workflow/v1alpha1/workflow_types.go (Workflow + WorkflowSpec)"
note = "Workflow + WorkflowSpec + WorkflowStatus + WorkflowPhase (Pending/Running/Succeeded/Failed/Error/Suspended) + NodeStatus + entrypoint + on_exit + parallelism + workflow_template_ref; src/workflow_crd.rs."

[[mapped]]
name = "template-container"
upstream = "pkg/apis/workflow/v1alpha1/container_template.go"
note = "ContainerTemplate (image + command + args + env + working_dir); src/workflow_crd.rs."

[[mapped]]
name = "template-script"
upstream = "pkg/apis/workflow/v1alpha1/script_template.go"
note = "ScriptTemplate (image + inline source + command); compiled into a Container schedule by the executor; src/workflow_crd.rs + src/executor.rs."

[[mapped]]
name = "template-resource"
upstream = "pkg/apis/workflow/v1alpha1/resource_template.go"
note = "ResourceTemplate (action create/apply/delete/replace/patch/get + manifest + success/failure conditions); src/workflow_crd.rs."

[[mapped]]
name = "template-suspend"
upstream = "pkg/apis/workflow/v1alpha1/suspend_template.go"
note = "SuspendTemplate with optional duration; executor emits NodeAction::Suspend with parsed seconds (30s/5m/2h/1d); src/workflow_crd.rs + src/executor.rs."

[[mapped]]
name = "template-dag"
upstream = "workflow/controller/dag.go"
note = "DagTemplate + DagTask + dependency graph + fail_fast + when clause; topo_order + cycle detection (Kahn); src/workflow_crd.rs."

[[mapped]]
name = "template-steps"
upstream = "workflow/controller/steps.go"
note = "StepsTemplate as Vec<Vec<WorkflowStep>> — outer = serial groups, inner = parallel; group_complete reducer in executor; src/workflow_crd.rs + src/executor.rs."

[[mapped]]
name = "parameter-with-value-from"
upstream = "pkg/apis/workflow/v1alpha1/parameter.go (Parameter + ValueFrom)"
note = "Parameter + ParameterValueFrom (path / parameter / jq_filter / event) + default fall-through; apply_parameter_defaults reducer; src/workflow_crd.rs + src/executor.rs::apply_parameter_defaults."

[[mapped]]
name = "artifact-with-repositories"
upstream = "pkg/apis/workflow/v1alpha1/artifact.go (Artifact + ArtifactRepository)"
note = "Artifact + ArtifactRepository (S3 / GCS / HTTP / Git / OSS / Raw / HDFS — all 7 first-party) + ArtifactArchive (None / Tar / Zip); src/workflow_crd.rs."

[[mapped]]
name = "retry-strategy"
upstream = "pkg/apis/workflow/v1alpha1/retry_strategy.go"
note = "RetryStrategy with limit + retry_policy (Always/OnFailure/OnError/OnTransientError) + RetryBackoff (duration + factor + max_duration); retry_decision reducer; src/workflow_crd.rs + src/executor.rs::retry_decision."

[[mapped]]
name = "workflow-validator"
upstream = "workflow/validate/validate.go"
note = "Workflow::validate — entrypoint exists + DAG task templates resolve + cycle detection + Steps template references resolve; src/workflow_crd.rs."

[[mapped]]
name = "workflow-executor-reducer"
upstream = "workflow/controller/operator.go (operateWorkflow)"
note = "next_actions: emits NodeAction (Schedule / Retry / Suspend / Complete) for the runtime to apply; pure function over Workflow + NodeStatus map; src/executor.rs."

[[mapped]]
name = "aggregate-phase-reducer"
upstream = "workflow/controller/operator.go (assessNodeStatus)"
note = "aggregate_phase: any Suspended → Suspended; any Error → Error; any Failed → Failed; all Succeeded → Succeeded; else Running; src/executor.rs::aggregate_phase."

[[mapped]]
name = "outputs-recording"
upstream = "workflow/controller/operator.go (recordOutputs)"
note = "record_success writes NodeStatus with outputs + recomputes aggregate phase + stamps finished_at when terminal; src/executor.rs::record_success."

[[mapped]]
name = "store-crud"
upstream = "persist/sqldb/workflow_store.go"
note = "WorkflowStore in-memory CRUD keyed by (namespace, name) + id; create + get + list + delete + update closure; src/store.rs."

[[mapped]]
name = "http-api-surface"
upstream = "server/workflow/workflow_server.go"
note = "axum router /api/workflows {list,get,submit,resubmit,terminate,logs}; src/routes.rs."

# ─── Argo Events module extension — argoproj/argo-events v1.9.10 ─────────────
# Moved in from cave-knative 2026-05-28 (was mismapped there during the
# 2026-05-24 Argo close-out). Argo Events triggers Argo Workflows — same
# argoproj family. See ADR-RUNTIME-ARGO-EVENTS-IN-WORKFLOWS-001.
# source_sha 3de38ac2501f80427e052a2c0d174366a9c81c8b (deref of tag
# 071d4125d33ef2a696addf3747e1af431a670f98).

[[mapped]]
name = "argo-events-eventsource-crd"
upstream = "argoproj/argo-events pkg/apis/eventsource/v1alpha1/types.go"
note = "EventSource CRD with 7 source families: webhook / kafka / github / generic / k8s-resource / pulsar / sqs; src/events.rs::EventSourceSpec."

[[mapped]]
name = "argo-events-sensor-crd"
upstream = "argoproj/argo-events pkg/apis/sensor/v1alpha1/types.go"
note = "Sensor + EventDependency + Filters (TimeFilter + ContextFilter + DataFilter with JSON pointer + comparator); matches_filters + evaluate_sensor reducers; src/events.rs."

[[mapped]]
name = "argo-events-trigger-templates"
upstream = "argoproj/argo-events pkg/apis/sensor/v1alpha1/triggers.go"
note = "6 TriggerTemplate variants: K8s / Http / ArgoWorkflow / Kafka / Slack / Pulsar + TriggerRetry (steps + duration + factor); src/events.rs."

[[mapped]]
name = "argo-events-eventbus-crd"
upstream = "argoproj/argo-events pkg/apis/eventbus/v1alpha1/types.go"
note = "EventBus CRD with JetStream (version + replicas) + Kafka (brokers + topic prefix) backends; Event envelope (CloudEvents-compatible); src/events.rs."

[[scope_cuts]]
group = "cave-portal-ui"
reason = "Argo Workflows React UI (~30k LOC) maps onto cave-portal-ui — cave-workflows exposes JSON only."
items = ["argo-workflows-ui"]

[[scope_cuts]]
group = "cave-cri"
reason = "Emissary executor + workflow-controller's live kubernetes pod lifecycle (PodSpec build, container exec, log tail) belong in cave-cri / cave-kubelet. cave-workflows ships the pure-function reducer."
items = ["emissary-executor", "pod-lifecycle-controller"]

[[scope_cuts]]
group = "cave-metrics"
reason = "Prometheus-format metrics endpoint + custom controller metrics are aggregated through cave-metrics."
items = ["prometheus-metrics-collector"]

[[scope_cuts]]
group = "cave-permission"
reason = "Semaphore + Mutex synchronization + RBAC enforcement are general primitives owned by cave-permission."
items = ["semaphore-mutex-rbac"]

[[scope_cuts]]
group = "cave-knative"
reason = "CronWorkflow (time-triggered workflow submission) overlaps with cave-knative's eventing PingSource — landed there for a single cron scheduler instead of duplicating."
items = ["cron-workflow-scheduler"]

[[scope_cuts]]
group = "cave-controller-manager"
reason = "Node-pruning GC + completed-workflow TTL belong in the controller-manager GC loop."
items = ["completed-workflow-gc"]

# ─── Formally scope-cut 2026-05-28 (uplift-pz ray) ──────────────────────────
# workflow-suspend-resume-persist is architectural Phase 2 (cave-db
# schema + cave-controller-manager wakeup signal), not an algorithmic
# gap. ADR-justified per ADR-RUNTIME-PARITY-100-PCT-001 §1.

[[scope_cuts]]
group = "cave-db + cave-controller-manager"
reason = "Suspend / Resume currently survives the executor reducer only — durable persistence (cave-db wiring so a Suspended workflow can resume across restarts) is Phase 2. Requires cave-db schema for workflow snapshots (workflow_id, state JSON, suspended_at, resume_token) + cave-controller-manager wakeup signal."
items = ["workflow-suspend-resume-persist"]

[[skipped]]
name         = "workflow-suspend-resume-persist"
upstream     = "workflow/controller/operator.go (Suspend + Resume durable state)"
scope_cut_to = "cave-db + cave-controller-manager (Phase 2)"
reason       = "In-memory Suspend/Resume reducer is mapped; cross-restart durable persistence is a Phase 2 cross-crate integration, not a cave-workflows algorithmic gap."

[portal_ui]
upstream_ui  = "Argo Workflows UI"
upstream_url = "https://argoproj.github.io/argo-workflows/"
status       = "scope_cut"
loc          = 0
priority     = "P2"
notes        = "Argo Workflows React app moves to cave-portal-ui — cave-workflows exposes JSON only."
last_audit   = "2026-05-24"
