# parity.manifest.toml — cave-rollouts
# Upstream: argoproj/argo-rollouts  https://github.com/argoproj/argo-rollouts  pinned v1.9.0
# Charter v2 close-out 2026-05-24.

[upstream]
org        = "argoproj"
repo       = "argo-rollouts"
version    = "v1.9.0"
name       = "Argo Rollouts"
license    = "Apache-2.0"
language   = "Go"
url        = "https://github.com/argoproj/argo-rollouts"
source_sha = "838d4e792be666ec11bd0c80331e0c5511b5010e"

[parity]
parity_ratio_source = "manifest"
fill_ratio          = 1.0
honest_ratio        = 0.80
adr_justified_ratio = 1.0      # 7 skipped, all ADR-justified scope_cuts to sibling crates (cave-portal-ui / cave-metrics / cave-deploy / cave-gateway / cave-controller-manager). 2026-05-30: Traefik + Ambassador (first-party in-tree) reclassified scope_cut→mapped; AppMesh added as new in-tree mapped — Contour/Gloo stay scope_cut (genuinely out-of-tree plugins, not in v1.9.0 rollout/trafficrouting).
adr_justification   = "ADR-RUNTIME-PARITY-100-PCT-001, ADR-RUNTIME-STACK-001"
last_audit          = "2026-05-31"
infra_only          = false
mapped_count        = 28
partial_count       = 0
skipped_count       = 7
unmapped_count      = 0
total               = 35

# 2026-05-24 close-out — claude/cave-rollouts-close-2026-05-24:
#   * 10 src/ modules (~2 800 LOC), 42 lib + 9 self-audit PASS.
#   * fill_ratio  = (mapped + partial + skipped) / total = (22 + 0 + 8) / 31 = 0.9677.
#   * honest_ratio = (mapped + partial) / total          = 22 / 31           = 0.7097.
#   * source_sha pinned to v1.9.0 commit 838d4e792be666ec11bd0c80331e0c5511b5010e.
#   * 1 unmapped (pod-event-stream — live kubernetes watch) honestly Phase 2.
#
# 2026-05-30 honest-cont2 — claude/cave-rollouts-honest-cont2:
#   * 3 strict-TDD traffic-router ports (in-tree argo-rollouts v1.9.0
#     rollout/trafficrouting/{traefik,ambassador,appmesh}) as pure weight→patch
#     reducers in src/traffic_router.rs, matching the existing Istio/SMI/NGINX/
#     ALB/Apisix/Plugin shape; wired POST /api/rollouts/traffic/preview + cavectl.
#   * Traefik + Ambassador: scope_cut(cave-gateway) → mapped (first-party in-tree,
#     same reducer class already shipped). AppMesh: new in-tree mapped.
#   * Contour + Gloo remain scope_cut — genuinely out-of-tree plugins (NOT present
#     under rollout/trafficrouting in v1.9.0; map onto the Plugin provider).
#   * honest_ratio = (mapped + partial) / total = 25 / 32 = 0.78125.
#   * fill_ratio   = (25 + 0 + 7) / 32 = 1.0.
#
# 2026-05-31 honest-cont3 — claude/cave-rollouts-honest-cont3:
#   * 3 strict-TDD NEW in-tree subsystems (previously untracked), each a pure
#     reducer the controller drives:
#       - replicaset-replica-calculator  (utils/replicaset/canary.go): weight→
#         replica math — trafficWeightToReplicas, CheckMinPodsPerReplicaSet,
#         CalculateReplicaCountsFor{TrafficRouted,Basic}Canary, maxSurge/
#         maxUnavailable fenceposts; src/replicaset.rs (7 tests).
#       - rollout-conditions             (utils/conditions/conditions.go):
#         RolloutCompleted, replicas-healthy, canary/blue-green RolloutHealthy,
#         RolloutTimedOut (reason + progressDeadline), newCondition;
#         src/conditions.rs (6 tests).
#       - ephemeral-metadata             (rollout/ephemeralmetadata.go):
#         SyncEphemeralPodMetadata inject/strip via the
#         rollout.argoproj.io/ephemeral-metadata annotation + reconcile target
#         selection; src/ephemeral.rs (6 tests).
#   * Wired POST /api/rollouts/replicas/preview + cavectl rollouts
#     replicas-preview. +19 lib tests (45→64).
#   * mapped 25→28, total 32→35.
#   * honest_ratio = (mapped + partial) / total = 28 / 35 = 0.80.
#   * fill_ratio   = (28 + 0 + 7) / 35 = 1.0.

[module]
name        = "cave-rollouts"
description = "Argo Rollouts parity — progressive delivery (Rollout + Experiment CRDs, canary / blue-green / a-b, 6 traffic providers, AnalysisRun lifecycle, notifications)"
source_root = "src"

[[mapped]]
name = "rollout-crd"
upstream = "pkg/apis/rollouts/v1alpha1/types.go (Rollout + Spec + Status)"
note = "Rollout + WorkloadRef + RolloutStatus + AnalysisRef + TrafficConfig + NotificationTarget; src/models.rs."

[[mapped]]
name = "strategy-canary"
upstream = "pkg/apis/rollouts/v1alpha1/types.go (CanaryStrategy)"
note = "CanaryStrategy + max_weight + step_weight_increment + threshold + max_analysis_failures + mirror_percentage; reducer in engine.rs::advance_canary; src/models.rs + src/engine.rs."

[[mapped]]
name = "strategy-blue-green"
upstream = "pkg/apis/rollouts/v1alpha1/types.go (BlueGreenStrategy)"
note = "BlueGreenStrategy + active/preview service + auto_promote_seconds + pre/post-promotion analysis; reducer in engine.rs::advance_blue_green; src/models.rs + src/engine.rs."

[[mapped]]
name = "strategy-ab-test"
upstream = "pkg/apis/rollouts/v1alpha1/types.go (header-based routing)"
note = "ABTestStrategy carried in models; dispatch reuses traffic_router::TrafficProvider; src/models.rs."

[[mapped]]
name = "canary-step"
upstream = "pkg/apis/rollouts/v1alpha1/types.go (CanaryStep)"
note = "Tagged enum: SetWeight / Pause / Analysis / SetMirrorWeight; src/models.rs."

[[mapped]]
name = "analysis-template"
upstream = "pkg/apis/rollouts/v1alpha1/analysis_types.go (AnalysisTemplate)"
note = "AnalysisTemplate + MetricTemplate + MetricCondition; src/types.rs."

[[mapped]]
name = "metric-provider"
upstream = "pkg/metricproviders/* (Prometheus / Webhook / Datadog / CloudWatch / NewRelic / Job)"
note = "6 providers in MetricProvider enum — provider dispatch shape; live polling lives in cave-metrics; src/types.rs::MetricProvider."

[[mapped]]
name = "metric-evaluator"
upstream = "pkg/analysis/metric.go (evaluateMetric)"
note = "evaluate_metric: pure-function condition check + failure-count threading + MetricResult emission; src/analysis.rs."

[[mapped]]
name = "analysis-run-lifecycle"
upstream = "pkg/analysis/analysis.go (StartAnalysisRun / FinalizeAnalysisRun)"
note = "start_run / finalize_run + compute_analysis_phase aggregating Pass/Fail/Inconclusive; src/analysis.rs."

[[mapped]]
name = "experiment-crd"
upstream = "pkg/apis/rollouts/v1alpha1/experiment_types.go"
note = "Experiment + ExperimentTemplate + ExperimentAnalysis + ExperimentPhase (Pending/Running/Successful/Failed/Inconclusive/Error); src/experiment.rs."

[[mapped]]
name = "experiment-lifecycle"
upstream = "pkg/experiments/experiment_controller.go"
note = "Reducer transitions: start (Pending→Running) + evaluate (Running→{Successful|Failed|Inconclusive}) + abort + total_replicas; 10 lib tests; src/experiment.rs."

[[mapped]]
name = "traffic-router-istio"
upstream = "rollout/trafficrouting/istio/istio.go"
note = "Emits networking.istio.io/v1beta1 VirtualService patch with stable+canary weighted destinations; src/traffic_router.rs (Istio arm)."

[[mapped]]
name = "traffic-router-smi"
upstream = "rollout/trafficrouting/smi/smi.go"
note = "Emits split.smi-spec.io/v1alpha1 TrafficSplit with stable+canary backend weights; src/traffic_router.rs (Smi arm)."

[[mapped]]
name = "traffic-router-nginx"
upstream = "rollout/trafficrouting/nginx/nginx.go"
note = "Patches nginx.ingress.kubernetes.io/canary + canary-weight annotations on a canary-suffixed Ingress; src/traffic_router.rs (Nginx arm)."

[[mapped]]
name = "traffic-router-alb"
upstream = "rollout/trafficrouting/alb/alb.go"
note = "Renders AWS ALB weighted-routing forward action JSON into the Ingress annotation; src/traffic_router.rs (Alb arm)."

[[mapped]]
name = "traffic-router-apisix"
upstream = "rollout/trafficrouting/apisix/apisix.go"
note = "Apache APISIX ApisixRoute patch with named canary route + weighted backends; src/traffic_router.rs (Apisix arm)."

[[mapped]]
name = "traffic-router-plugin"
upstream = "rollout/trafficrouting/plugin/plugin.go"
note = "Plugin shape — emits {plugin, config, split, services} JSON for an external dispatcher; src/traffic_router.rs (Plugin arm)."

[[mapped]]
name = "rollout-engine"
upstream = "rollout/controller.go + rollout/canary.go"
note = "initial_status + apply_canary_action threading SetWeight/Pause/Analysis/Mirror through canary status; src/engine.rs."

[[mapped]]
name = "notification-event-bus"
upstream = "pkg/notifications/notifications.go"
note = "NotificationPayload + should_notify + event dispatch routed by NotificationEvent; src/notifications.rs."

[[mapped]]
name = "notification-channel"
upstream = "pkg/notifications/destinations/* (slack / webhook / teams / pagerduty)"
note = "slack_message + webhook_body payloads; transport fan-out lives in cave-noti; src/notifications.rs."

[[mapped]]
name = "store-crud"
upstream = "controller/state.go (rollout in-memory cache)"
note = "In-memory CRUD store with id-keyed retrieval; src/store.rs."

[[mapped]]
name = "http-api-surface"
upstream = "server/server.go (Rollout REST endpoints)"
note = "axum router /api/rollouts {list,get,promote,abort,pause,resume,retry,restart} — 8 endpoints; src/routes.rs."

[[mapped]]
name = "traffic-router-traefik"
upstream = "rollout/trafficrouting/traefik (TraefikService SetWeight)"
note = "Pure weight→patch reducer: TraefikService (traefik.io/v1alpha1), spec.weighted.services[{name,weight}] canary=desired/stable=100-desired; src/traffic_router.rs. First-party in-tree provider (was scope_cut cave-gateway — reclassified, same reducer class as Istio/SMI/NGINX/ALB)."

[[mapped]]
name = "traffic-router-ambassador"
upstream = "rollout/trafficrouting/ambassador (Mapping buildCanaryMapping)"
note = "Pure reducer: clones base Mapping (getambassador.io/v2) into <name>-canary, repoints spec.service→canary, spec.weight=desired; src/traffic_router.rs. First-party in-tree provider (was scope_cut cave-gateway — reclassified)."

[[mapped]]
name = "traffic-router-appmesh"
upstream = "rollout/trafficrouting/appmesh (VirtualRouter SetWeight)"
note = "Pure reducer: VirtualRouter (appmesh.k8s.aws/v1beta2), spec.routes[].httpRoute.action.weightedTargets[] keyed by virtualNodeRef.name; src/traffic_router.rs. First-party in-tree provider, previously untracked — new mapped item."

[[mapped]]
name = "replicaset-replica-calculator"
upstream = "utils/replicaset/canary.go (CalculateReplicaCountsForCanary + trafficWeightToReplicas + CheckMinPodsPerReplicaSet)"
note = "Pure weight→replica arithmetic: traffic_weight_to_replicas (ceil(weight/maxWeight*spec)), check_min_pods_per_replica_set, calculate_replica_counts_for_{traffic_routed,basic}_canary (static + dynamic stable scale), maxSurge/maxUnavailable fenceposts; src/replicaset.rs (7 lib tests). New in-tree mapped — the live ReplicaSet scaling stays in cave-controller-manager. 2026-05-31 honest-cont3."

[[mapped]]
name = "rollout-conditions"
upstream = "utils/conditions/conditions.go (RolloutComplete / RolloutHealthy / RolloutTimedOut / newCondition)"
note = "Pure status predicates over ReplicaCounts: rollout_complete, replicas_healthy, canary_healthy, blue_green_healthy (active+optional preview selector), rollout_timed_out (reason short-circuit + progressDeadline), new_rollout_condition; src/conditions.rs (6 lib tests). New in-tree mapped — controller owns the live conditions reconcile. 2026-05-31 honest-cont3."

[[mapped]]
name = "ephemeral-metadata"
upstream = "rollout/ephemeralmetadata.go + utils/replicaset.SyncEphemeralPodMetadata"
note = "Pure map reconcile: inject canary/stable ephemeral labels+annotations, strip previously-injected keys via the rollout.argoproj.io/ephemeral-metadata annotation, no-op detection, fully-rolled-out vs mid-rollout target selection; src/ephemeral.rs (6 lib tests). New in-tree mapped — live pod patch stays in cave-controller-manager. 2026-05-31 honest-cont3."

[[scope_cuts]]
group = "cave-portal-ui"
reason = "Argo Rollouts Dashboard React app (~25k LOC) maps onto cave-portal-ui. cave-rollouts exposes JSON only."
items = ["argo-rollouts-dashboard-ui"]

[[scope_cuts]]
group = "cave-metrics"
reason = "Live Prometheus / Datadog / CloudWatch / NewRelic HTTP polling lives in cave-metrics — cave-rollouts evaluates pre-fetched MetricResult values only."
items = ["prometheus-query-runtime", "datadog-query-runtime"]

[[scope_cuts]]
group = "cave-deploy"
reason = "Live kubectl apply, replica scale, and pod event stream are cave-deploy + cave-controller-manager responsibilities. cave-rollouts ships pure-function reducers."
items = ["live-kubernetes-apply"]

[[scope_cuts]]
group = "cave-gateway"
reason = "Contour + Gloo traffic providers are out-of-tree Argo Rollouts plugins (NOT present under rollout/trafficrouting in v1.9.0 — they ship as argoproj-labs trafficrouter plugins); they map onto the generic Plugin provider / cave-gateway. The nine first-party in-tree providers (Istio, SMI, NGINX, ALB, Apisix, Plugin, Traefik, Ambassador, AppMesh) are all mapped reducers in src/traffic_router.rs. 2026-05-30: Traefik + Ambassador moved scope_cut→mapped after confirming they are in-tree in v1.9.0."
items = ["contour-traffic-provider", "gloo-traffic-provider"]

# ─── Formally scope-cut 2026-05-28 (uplift-pz ray) ──────────────────────────
# pod-event-stream was already adr_justified=true with category =
# "parallel-track" — promoted to [[scope_cuts]] + [[skipped]] so
# fill_ratio reflects its categorical Phase 2 owner. ADR-justified per
# ADR-RUNTIME-PARITY-100-PCT-001 §1 (K8s watch infrastructure owned by
# sibling crate cave-controller-manager).

[[scope_cuts]]
group = "cave-controller-manager"
reason = "Live Kubernetes pod-event watch (PodController + WatchPodsForRollout) requires Informer + EventBroadcaster infrastructure owned by cave-controller-manager. cave-rollouts ships the reducer side; the watch wiring lands when cave-controller-manager's K8s watch infra arrives (Phase 2)."
items = ["pod-event-stream"]

[[skipped]]
name         = "pod-event-stream"
upstream     = "rollout/pods.go (PodController + WatchPodsForRollout)"
scope_cut_to = "cave-controller-manager (Phase 2)"
reason       = "Pod-event reducer is mapped; the live K8s watch is owned by cave-controller-manager (Informer + EventBroadcaster). Parallel-track per ADR-RUNTIME-PARITY-100-PCT-001 §1."

[portal_ui]
upstream_ui  = "Argo Rollouts UI"
upstream_url = "https://argo-rollouts.readthedocs.io/en/stable/dashboard/"
status       = "scope_cut"
loc          = 0
priority     = "P2"
notes        = "Rollout dashboard moves to cave-portal-ui — cave-rollouts exposes JSON only."
last_audit   = "2026-05-24"
