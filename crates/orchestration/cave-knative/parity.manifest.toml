# parity.manifest.toml — cave-knative
# Upstream: knative/serving + knative/eventing  pinned knative-v1.22.0
#   https://github.com/knative/serving
#   https://github.com/knative/eventing
#
# Tag-scheme note: Knative tags releases as `knative-vX.Y.Z`,
# not `vX.Y.Z`. Latest stable is `knative-v1.22.0`.
#
# cave-knative ports the in-scope MVP surface of Knative Serving +
# Eventing in pure Rust:
#
#   SERVING:
#     - Ksvc (top-level Service) + ServiceSpec + ServiceStatus
#     - Configuration (desired state) + ConfigurationSpec/Status
#     - Revision (immutable code+config snapshot) + Spec/Status
#     - Route (traffic split) + RouteSpec/Status
#     - KPA autoscaler with stable + panic modes
#     - RevisionTemplateSpec (PodSpec + Container + EnvVar)
#     - TrafficTarget + validate_traffic + validate_template
#
#   EVENTING:
#     - EventingSource + EventingSink
#     - Channel
#     - Subscription
#     - Trigger + TriggerFilter
#
# Out of MVP (see [[skipped]] / [[unmapped]] below): queue-proxy
# sidecar, activator (cold-start request hold), broker controller,
# eventing-contrib transports (Kafka / RabbitMQ — runtime impl),
# admission webhook (cave-admission), domain-mapping,
# cert-manager integration, `build` (deprecated upstream — Burak's
# explicit "Out: build (deprecate)"), HPA-direct integration.

[upstream]
org         = "knative"
repo        = "serving"
version     = "knative-v1.22.0"
name        = "Knative Serving + Eventing"
license     = "Apache-2.0"
language    = "Go"
url         = "https://github.com/knative/serving"
source_sha  = "knative-v1.22.0"

[parity]
parity_ratio_source = "manifest"
fill_ratio          = 1.0
honest_ratio        = 0.8667
last_audit          = "2026-05-24"
infra_only          = false
mapped_count        = 26
partial_count       = 0
skipped_count       = 4
unmapped_count      = 0
total               = 30

# 2026-05-28 Argo Events module moved OUT to cave-workflows:
#   * Argo Events (argoproj/argo-events v1.9.10) was mismapped into
#     cave-knative during the 2026-05-24 Argo close-out. Knative
#     (serving + eventing) is a different upstream from argoproj.
#   * Moved src/argo_events.rs → cave-workflows/src/events.rs and the
#     4 mapped subsystems (argo-events-{eventsource,sensor,trigger-
#     templates,eventbus}-crd) with it. See
#     ADR-RUNTIME-ARGO-EVENTS-IN-WORKFLOWS-001.
#   * Counts: 30→26 mapped, 34→30 total. fill_ratio stays 1.0
#     ((26 + 0 + 4) / 30). honest_ratio = (mapped + partial) / total
#     = 26 / 30 = 0.8667. cave-knative scope is now strictly Knative.

# 2026-05-19 Phase 2 close — parity-push-mid-end:
#   * Added 7 new mapped subsystems (PingSource / ApiServerSource /
#     ContainerSource / eventing-contrib-pulsar / eventing-contrib-nats /
#     github-source / broker-delivery-spec).
#   * Moved 5 from [[skipped]] → [[mapped]] now that real ports exist:
#     broker-controller, eventing-contrib-kafka, eventing-contrib-rabbitmq,
#     webhook-validation, cert-mgmt-cert-manager.
#   * Remaining [[skipped]] (4): queue-proxy, activator, domain-mapping,
#     build-deprecated. Remaining [[unmapped]] (2): hpa-direct-integration,
#     eventing-in-memory-channel-impl (kept for Phase 3 broker data-plane).
#   * fill_ratio formula switched from LOC-ratio to count-ratio matching
#     the rest of the workspace ((mapped + partial + skipped) / total).
#   * 28/30 = 0.9333 in-scope coverage against knative-v1.22.0.

[module]
name        = "cave-knative"
description = "Serverless workloads — Knative Serving + Eventing parity (Service/Configuration/Revision/Route, KPA, eventing primitives)"
source_root = "src"

