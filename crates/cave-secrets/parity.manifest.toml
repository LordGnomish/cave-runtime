# parity.manifest.toml — cave-secrets
# Upstream: trufflesecurity/trufflehog  https://github.com/trufflesecurity/trufflehog
# Cave-secrets implements regex + Shannon-entropy secret detection compatible
# with the TruffleHog v3 detector framework (per-detector regex, severity,
# verify flag, redacted findings).

[upstream]
org     = "trufflesecurity"
repo    = "trufflehog"
version = "v3.63.7"
name    = "TruffleHog"
license = "AGPL-3.0"
language= "Go"
url     = "https://github.com/trufflesecurity/trufflehog"

[parity]
ratio       = 0.0        # honest: 0.0 means upstream parity NOT yet measured
last_audit  = "2026-05-12"
infra_only  = false
[module]
name        = "cave-secrets"
description = "Secret scanner — TruffleHog-compatible detector framework with entropy + regex + verifier hooks"
source_root = "src"

# ── File mappings ────────────────────────────────────────────────────────────

[[files]]
upstream = "pkg/detectors/aws/v2/aws.go"
local    = "src/detector.rs"

[[files]]
upstream = "pkg/detectors/github/v2/github.go"
local    = "src/detector.rs"

[[files]]
upstream = "pkg/detectors/jwt/jwt.go"
local    = "src/detector.rs"

[[files]]
upstream = "pkg/detectors/slack/slack.go"
local    = "src/detector.rs"

[[files]]
upstream = "pkg/detectors/azure/azure.go"
local    = "src/detector.rs"

[[files]]
upstream = "pkg/detectors/privatekey/privatekey.go"
local    = "src/detector.rs"

[[files]]
upstream = "pkg/engine/engine.go"
local    = "src/detector.rs"

[[files]]
upstream = "pkg/output/json.go"
local    = "src/models.rs"

[[files]]
upstream = "pkg/sources/sources.go"
local    = "src/routes.rs"

# ── Function mappings ────────────────────────────────────────────────────────

[[functions]]
upstream_name = "Detector#FromData"
local_name    = "scan"
file          = "src/detector.rs"

[[functions]]
upstream_name = "Detector#Keywords"
local_name    = "builtin_detectors"
file          = "src/detector.rs"

[[functions]]
upstream_name = "Result#Redacted"
local_name    = "redact_match"
file          = "src/detector.rs"

[[functions]]
upstream_name = "entropy.Shannon"
local_name    = "shannon_entropy"
file          = "src/detector.rs"

[[functions]]
upstream_name = "Engine#Scan"
local_name    = "scan_content"
file          = "src/routes.rs"

# ── Test mappings ────────────────────────────────────────────────────────────

[[tests]]
upstream_test = "TestAWS_FromData"
local_test    = "test_aws_key_detection"

[[tests]]
upstream_test = "TestAWS_FromData_Found"
local_test    = "test_scan_aws_key_detected"

[[tests]]
upstream_test = "TestGitHub_FromData_Found"
local_test    = "test_scan_github_token"

[[tests]]
upstream_test = "TestPrivateKey_FromData"
local_test    = "test_private_key_detection"

[[tests]]
upstream_test = "TestPrivateKey_FromData_Found"
local_test    = "test_scan_private_key"

[[tests]]
upstream_test = "TestJWT_FromData_Found"
local_test    = "test_scan_jwt_token"

[[tests]]
upstream_test = "TestEntropy"
local_test    = "test_entropy"

[[tests]]
upstream_test = "TestEntropy_Low"
local_test    = "test_entropy_low"

[[tests]]
upstream_test = "TestEntropy_High"
local_test    = "test_entropy_high"

[[tests]]
upstream_test = "TestEntropy_Binary"
local_test    = "test_entropy_binary_string"

[[tests]]
upstream_test = "TestEngine_ScanEmpty"
local_test    = "test_scan_empty_content"

[[tests]]
upstream_test = "TestEngine_ScanClean"
local_test    = "test_scan_clean_content"

[[tests]]
upstream_test = "TestEngine_MultipleFindings"
local_test    = "test_scan_multiple_findings"

[[tests]]
upstream_test = "TestResult_LineNumber"
local_test    = "test_finding_line_number"

[[tests]]
upstream_test = "TestEngine_BuiltinDetectorCount"
local_test    = "test_builtin_detectors_count"

# ── Surface mappings ─────────────────────────────────────────────────────────

[[surfaces]]
kind          = "http"
upstream_path = "/healthz"
local_path    = "/api/secrets/health"

[[surfaces]]
kind          = "http"
upstream_path = "/scan"
local_path    = "/api/secrets/scan"

[[surfaces]]
kind          = "http"
upstream_path = "/detectors"
local_path    = "/api/secrets/detectors"
