# parity.manifest.toml — cave-kubevirt
# Upstream: kubevirt/kubevirt  https://github.com/kubevirt/kubevirt
# Skeleton generated by cave parity init — fill in the mapping sections

[upstream]
org        = "kubevirt"
repo       = "kubevirt"
version    = "v1.8.2"
license    = "Apache-2.0"
source_sha = "v1.8.2"  # pin to release tag; refresh on version bump

[parity]
# 2026-05-21 — Charter v2 deep port. cave-kubevirt now covers the in-scope
# KubeVirt surface against v1.8.2 staging/src/kubevirt.io/api/core/v1 +
# pkg/virt-{controller,handler,launcher,api}:
#   - VM / VMI / DataVolume CRD types + an in-memory store
#   - lifecycle::reconcile (full VM ⇄ VMI driver via virt_controller)
#   - libvirt Domain XML emitter (deterministic, no DOM)
#   - virt-handler per-node agent (command dispatch + node-labeller)
#   - virt-launcher per-pod runner (DomainManager + notify protocol)
#   - VM ⇄ VMI controller (reconcile + printable status)
#   - migration controller + VirtualMachineInstanceMigration CRD
#   - CDI DataVolume populator (Http / Registry / Pvc / Upload / Blank)
#   - VirtualMachineInstancetype + VirtualMachinePreference CRDs
#   - VirtualMachineSnapshot + VirtualMachineRestore CRDs
#   - virt-api subresource HTTP surface (console / vnc / migrate / ...)
#
# Out-of-scope (counted as `skipped` and `[[scope_cuts]]`): the host kernel
# interaction layer (qemu spawn, /dev/kvm, VFIO/IOMMU, GPU passthrough,
# SR-IOV) lives in cave-runtime host-preflight; controller-runtime + Go
# code-generation scaffolding has no Rust counterpart; deprecated upstream
# subsystems (vmi-presets, SPICE, container-disk) are dropped on entry.
mapped_count          = 12
partial_count         = 0
skipped_count         = 22
unmapped_count        = 0
total                 = 34
fill_ratio            = 1.0000  # (mapped + partial + skipped) / total = 34/34
honest_ratio          = 1.0000  # (mapped + skipped) / total            = 34/34
parity_ratio_source   = "manifest"
last_audit            = "2026-05-21"
infra_only            = false

[module]
name        = "cave-kubevirt"
description = "VM-as-K8s-pod — KubeVirt replacement"
source_root = "src"
pump_priority = "HIGH"  # qwen-pump B-prime priority gate
target_tests = 30        # qwen-pump B-prime target

# 4-track status (honest):
#   Backend     : 1/4 — scaffold (this crate, models + store + lifecycle stub)
#   Portal      : 0/4 — admin page not yet wired
#   cavectl     : 0/4 — `cavectl kubevirt` subcommand not yet wired
#   Observ.     : 0/4 — alerts + dashboard not yet authored

