# parity.manifest.toml — cave-slo
# Upstream: OpenSLO/OpenSLO  https://github.com/OpenSLO/OpenSLO
# Skeleton generated by cave parity init — fill in the mapping sections

[upstream]
org     = "OpenSLO"
repo    = "OpenSLO"
version = "v0.1.0"

[module]
name        = "cave-slo"
description = "SLO tracking — OpenSLO replacement"
source_root = "src"

# ── File mappings ────────────────────────────────────────────────────────────
# [[files]]
# upstream = "path/in/upstream/repo.go"
# local    = "src/local.rs"

# ── Function mappings ────────────────────────────────────────────────────────
# [[functions]]
# upstream_name = "UpstreamFunc"
# local_name    = "local_fn"
# file          = "src/routes.rs"

# ── Test mappings ────────────────────────────────────────────────────────────
# [[tests]]
# upstream_test = "TestUpstreamFunc"
# local_test    = "test_local_fn"

# ── Surface mappings ─────────────────────────────────────────────────────────
# [[surfaces]]
# kind          = "http"
# upstream_path = "/api/upstream"
# local_path    = "/api/slo/endpoint"
