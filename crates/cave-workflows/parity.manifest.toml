# parity.manifest.toml — cave-workflows
# Upstream: n8n-io/n8n  https://github.com/n8n-io/n8n
# Skeleton generated by cave parity init — fill in the mapping sections

[upstream]
org     = "n8n-io"
repo    = "n8n"
version = "v1.0.0"

[module]
name        = "cave-workflows"
description = "Workflow automation — n8n replacement"
source_root = "src"

