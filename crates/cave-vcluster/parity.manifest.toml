# parity.manifest.toml — cave-vcluster
# Upstream: loft-sh/vcluster  https://github.com/loft-sh/vcluster
# Skeleton generated by cave parity init — fill in the mapping sections

[upstream]
org     = "loft-sh"
repo    = "vcluster"
version = "v0.19.0"

[module]
name        = "cave-vcluster"
description = "Virtual Kubernetes clusters — vCluster replacement"
source_root = "src"

