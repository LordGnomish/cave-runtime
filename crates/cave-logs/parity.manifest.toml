# parity.manifest.toml — cave-logs
# Upstream: grafana/loki  https://github.com/grafana/loki  pinned v2.9.0
#
# cave-logs reimplements Loki's distributor+ingester chain (push, chunks,
# index, retention, multitenant), LogQL (lexer/parser/eval), the query API,
# and the read-side label/series/tail endpoints — plus syslog/fluentd/OTLP
# ingestion adapters.

[upstream]
org     = "grafana"
repo    = "loki"
version = "v2.9.0"
name    = "Loki"
license = "AGPL-3.0"
language= "Go"
url     = "https://github.com/grafana/loki"

[parity]
ratio       = 0.0        # honest: 0.0 means upstream parity NOT yet measured
last_audit  = "2026-05-12"
infra_only  = false
[module]
name        = "cave-logs"
description = "Loki reimplementation — push/chunks/index/retention/multitenant + LogQL + /loki/api/v1/* read API + syslog/fluentd/OTLP ingest"
source_root = "src"

# ── File mappings ────────────────────────────────────────────────────────────

[[files]]
upstream = "cmd/loki/main.go"
local    = "src/lib.rs"

[[files]]
upstream = "pkg/distributor/http.go"
local    = "src/routes.rs"

[[files]]
upstream = "pkg/distributor/distributor.go"
local    = "src/push.rs"

[[files]]
upstream = "pkg/ingester/ingester.go"
