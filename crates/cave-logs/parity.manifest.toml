[[files]]
upstream = "pkg/storage/stores/series/index.go"
local    = "src/index.rs"

[[files]]
upstream = "pkg/util/limiter/rate_limiter.go"
local    = "src/limits.rs"

[[files]]
upstream = "pkg/util/multitenant/multitenant.go"
