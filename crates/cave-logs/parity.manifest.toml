# parity.manifest.toml — cave-logs
# Upstream: grafana/loki  https://github.com/grafana/loki
# Skeleton generated by cave parity init — fill in the mapping sections

[upstream]
org     = "grafana"
repo    = "loki"
version = "v2.9.0"

[module]
name        = "cave-logs"
description = "Log aggregation — Grafana Loki replacement"
source_root = "src"

# ── File mappings ────────────────────────────────────────────────────────────
