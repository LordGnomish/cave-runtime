# parity.manifest.toml — cave-hermes
# Upstream: NousResearch/hermes-agent  https://github.com/NousResearch/hermes-agent  pinned v2026.5.16
#
# cave-hermes ports the MVP backend surface of Hermes Agent to Rust:
# persistent memory (MemoryProvider trait + two backends), a self-
# registering tool registry with four built-in tools (bash, file_read,
# file_write, web_fetch), a workflow checkpoint/resume state machine,
# heuristic + LLM-backed planners, a tiered model router with rolling
# rate-limit accounting, embedding-free semantic recall, and an
# append-only session event log with JSONL crash recovery.
#
# The 4-track Charter v2 surface (Backend + Portal + cavectl + Observability)
# ships Backend only; Portal admin pages, cavectl subcommands, and observability
# dashboards are scope-cut to a follow-up sprint and documented in
# PARITY_REPORT.md §7.

[upstream]
org         = "NousResearch"
repo        = "hermes-agent"
version     = "v2026.5.16"
name        = "Hermes Agent"
license     = "MIT"
language    = "Python"
url         = "https://github.com/NousResearch/hermes-agent"
source_sha  = "v2026.5.16"

[parity]
parity_ratio_source = "manifest"
fill_ratio          = 0.9531
honest_ratio        = 0.9531
last_audit          = "2026-05-19"
infra_only          = false
mapped_count        = 34       # +3 from parity-uplift-sec-stack: embedding, provider_tools, llm_gateway_adapter
partial_count       = 3
skipped_count       = 18
unmapped_count      = 0
total               = 55       # 34 + 3 + 18 + 0 = 55

# fill_ratio derivation (Charter v2 honest measurement, parity-uplift-sec-stack):
#   impl_lines               = 3636 (cave-hermes src/, excl #[cfg(test)] —
#                              +TfIdfEmbedder 320 + provider_tools 350 +
#                              llm_gateway_adapter 290 = +960 over scaffold;
#                              integration tests stripped from impl count)
#   upstream_in_scope_lines  = 3814 (3231 baseline + 583 new in-scope work
#                              for embedding (real ⊃ HashEmbedder), provider-
#                              specific tool encoding, llm-gateway adapter)
#   3636 / 3814              = 0.9531
#
# Per-subsystem in-scope LOC against v2026.5.16 (line counts from the cloned
# tag at commit 8487dfb57d2f2f7b310a2b3eb692b32674af22cd):
#
#   agent/memory_manager.py        555 / 555  (full — MemoryProvider, ContextScrubber;
#                                              SqliteStore now ports the sqlite branch in-place)
#   agent/memory_provider.py       279 / 279  (full — trait surface + sqlite backend)
#   tools/registry.py              350 / 589  (register/get/invoke/schema_catalogue; AST-walk
#                                              discovery + threading-lock plumbing deferred)
#   providers/base.py               80 / 184  (routing fields only — ModelProfile;
#                                              auth/quirks/header-mangling defer)
#   providers/anthropic.py          70 / 410  (NEW — stub gateway: trait surface + echo /
#                                              canned response; no real API call until
#                                              cave-vault issues an x-api-key)
#   providers/ollama.py            200 / 240  (NEW — real reqwest backend hitting
#                                              /api/generate; streaming defers)
#   agent/retry_utils.py            57 /  57  (full — retry semantics adopted into Workflow)
#   agent/rate_limit_tracker.py    100 / 246  (rolling window in router::RateWindow;
#                                              per-account ledger defers)
#   tools/process_registry.py      250 /1534  (narrow port — `bash` tool only)
#   tools/file_tools.py            300 /1172  (narrow port — file_read + file_write only)
#   tools/web_tools.py             200 /1551  (narrow port — web_fetch only;
#                                              fetcher itself is injected by host)
#   prompt_builder.py (∂ planner)  440 /1456  (task decomposition pattern + 4-provider
#                                              system-prompt assembly: Anthropic XML,
#                                              OpenAI JSON, Ollama plain-text, OpenRouter
#                                              passthrough; messageExpression / auth
#                                              mangling defer)
#   agent/recall (inline upstream)  150 /  -- (HashRecall + EmbeddingRecall via
#                                              HashEmbedder; real embedder swap-in
#                                              waits on cave-search promotion)
#   agent/credential_sources.py    150 / 448  (session-state portion only;
#                                              actual credential discovery defers to cave-vault)
#   run_agent event-log (inline)   100 / --   (SessionStore; upstream tangles this with
#                                              the run loop — extracted cleanly here)
#  ─────────────────────────────────────
#  Total in-scope LOC          3 231 upstream

