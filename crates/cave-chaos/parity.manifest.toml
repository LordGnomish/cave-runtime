# parity.manifest.toml — cave-chaos
# Upstream: chaos-mesh/chaos-mesh  https://github.com/chaos-mesh/chaos-mesh
# Skeleton generated by cave parity init — fill in the mapping sections

[upstream]
org     = "chaos-mesh"
repo    = "chaos-mesh"
version = "v2.6.0"

[module]
name        = "cave-chaos"
description = "Chaos engineering — Chaos Mesh replacement"
source_root = "src"

