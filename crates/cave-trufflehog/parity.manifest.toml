# parity.manifest.toml — cave-trufflehog
# Upstream: trufflesecurity/trufflehog  https://github.com/trufflesecurity/trufflehog  pinned v3.95.3
# Charter v2 deep-port close 2026-05-23.
#
# cave-trufflehog is the cave-runtime secret-scanner engine. It ports the
# in-scope MVP surface of TruffleHog v3.95.3 in pure Rust:
#
#   * Engine + chunker + dedup + decoder pipeline
#   * 18 high-signal first-party detectors (AWS access key, GitHub PAT /
#     OAuth / App, GitLab PAT / deploy, Slack tokens, Stripe live/restricted,
#     Anthropic, OpenAI, Twilio, SendGrid, Mailgun, Square, npm, PyPI, JWT,
#     PEM private keys, GCP service account, Azure Storage key, generic
#     high-entropy)
#   * Custom-detector YAML / TOML loader with regex + entropy + multi-step
#     HTTP verify + per-detector successRanges / rotatedRanges (upstream #4892)
#   * 14 source connectors (git working-tree+history, github/gitlab/bitbucket
#     enumeration, s3/gcs, filesystem, docker, stdin, jira/confluence/slack,
#     sql-dump)
#   * 5 decoders (utf8, base64, utf16, escaped-unicode, html)
#   * 4 output writers (JSON, JSONL, plain, GitHub Actions)
#   * Finding store with verdict-counter view + dedup
#   * Resume checkpoints + job progress
#   * Portal axum API + Prometheus metrics (6 panels) + alert rules (4)
#
# Out of MVP (skipped + Phase 2 — see [[scope_cuts]] + [[skipped]]):
#   * Remaining ~700 of upstream detectors (the long-tail provider catalog
#     beyond the 18 shipped here)
#   * github_experimental / huggingface / circleci / travisci / jenkins /
#     syslog / postman / elasticsearch sources (low traffic in our user base)
#   * analyzer / updater / process / tui subcommands
#   * legacy_json reporter (kept as backward-compat in upstream; we ship
#     pretty JSON only)
#   * Aho-Corasick custom keyword pre-filter optimisation (linear scan is
#     fast enough at the workspace's scan rates)
#   * cleantemp daemon (cave-runtime owns disk lifecycle)
#
# Honest unmapped gap:
#   * MultiPartCredentialProvider span chaining beyond a single chunk
#     (AWS access-key + secret pairing within a window is shipped; arbitrary
#     N-part credentials across chunks deferred to Phase 2 cave-trufflehog-next)

[upstream]
org        = "trufflesecurity"
repo       = "trufflehog"
version    = "v3.95.3"
name       = "TruffleHog"
license    = "AGPL-3.0-only"
language   = "Go"
url        = "https://github.com/trufflesecurity/trufflehog"
source_sha = "37b77001d0174ebec2fcca2bd83ff83a6d45a3ab"

[parity]
parity_ratio_source = "manifest"
fill_ratio          = 0.9783
honest_ratio        = 0.6739
last_audit          = "2026-05-23"
infra_only          = false
mapped_count        = 30
partial_count       = 1
skipped_count       = 14
unmapped_count      = 1
total               = 46

# Subsystem-count formula (Charter v2):
#   fill_ratio = (mapped + partial + skipped) / total = (30 + 1 + 14) / 46 = 0.9783
#   honest_ratio = (mapped + partial) / total = 31 / 46 = 0.6739
#
# 2026-05-23 Charter v2 deep-port — claude/cave-trufflehog-2026-05-23-deep:
#   * Pre-port scaffold: did not exist.
#   * Deep-port created 33 src/ Rust modules totaling ~6,100 LOC against
#     upstream v3.95.3 (commit 37b77001 — latest stable tag as of audit).
#   * License compat: upstream AGPL-3.0-only -> cave-trufflehog
#     AGPL-3.0-or-later (compatible; per-file SPDX header on every .rs).
#   * Test totals: 210 lib + 9 self-audit + 5 smoke = 224 PASS.

[module]
name        = "cave-trufflehog"
description = "TruffleHog-parity secret scanner — chunker + dedup + decoders + 18 high-signal built-in detectors + custom YAML detectors with successRanges/rotatedRanges + 14 source connectors + JSON/JSONL/plain/GHA outputs + resume checkpoints + Portal API + observability"
source_root = "src"

