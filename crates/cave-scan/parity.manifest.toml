# ── Honest missing/skipped surface ───────────────────────────────────────────

[[missings]]
upstream = "trivy/pkg/iac/rego/*"
note     = "Rego policy engine — we use pure-Rust pattern matching instead of OPA"

[[missings]]
upstream = "trivy/pkg/iac/scanners/helm/helmtemplate.go"
note     = "Live helm template render — would require helm Go binary; static Chart.yaml + values.yaml only"

[[missings]]
upstream = "trivy-db/pkg/db/bolt.go (compaction)"
note     = "Sled handles its own compaction; trivy-db bbolt manual compaction omitted"

[[missings]]
upstream = "trivy/pkg/version/<ecosystem>/*"
note     = "Per-ecosystem version comparators (Debian dpkg vercmp, RPM rpmvercmp, Ruby Gem::Version) — single generic numeric+lexical fallback used; close enough for >90% of feeds, prerelease edge cases will misorder"

[[missings]]
upstream = "trivy/pkg/iac/terraform/parser/interpolation.go"
note     = "var.foo / local.bar interpolation — current scanner only sees literal expressions"

[[missings]]
upstream = "gitleaks/config/baseline.toml allowlists"
note     = "No allow/deny path filtering yet — all paths scanned uniformly"

[[missings]]
upstream = "trivy/pkg/licensing/google_licensecheck"
note     = "Full rabin-fingerprint corpus match (3000+ license texts) — replaced with 14 fingerprint phrases + SPDX header parse"

[[missings]]
upstream = "trivy-db/pkg/vulnsrc/aqua (proprietary feed)"
note     = "Aqua-proprietary CVE feed — out of scope for AGPL port"

[[missings]]
upstream = "trivy/pkg/iac/scanners/azure/*"
note     = "Azure ARM templates — not in S3 scope (5 providers only)"

[[missings]]
upstream = "trivy/pkg/iac/scanners/json/*"
note     = "Generic JSON CFN — YAML supported, JSON dialect deferred"

# Honest fill_ratio:
#   mapped files = 19
#   mapped functions = 17
#   mapped tests = 34
#   missing  = 10
# fill_ratio = (19 + 17 + 34) / (19 + 17 + 34 + 10) = 70/80 = 0.875
[parity_s3]
fill_ratio = 0.875
last_audit = "2026-05-15"
notes      = "S3-port-only parity ratio; merge with global parity table after S1+S2+S4 land."
