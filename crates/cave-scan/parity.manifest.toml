# parity.manifest.toml — cave-scan
# Upstream: SonarSource/sonarqube  https://github.com/SonarSource/sonarqube
# Cave-scan implements SAST-style code quality scanning (rules engine,
# severity-ranked findings, coverage import) compatible with SonarQube's
# Issue / Severity taxonomy.

[upstream]
org        = "SonarSource"
repo       = "sonarqube"
version    = "v10.4.1"
name       = "SonarQube"
license    = "LGPL-3.0"
language   = "Java"
url        = "https://github.com/SonarSource/sonarqube"
source_sha = { sonarqube = "v10.4.1", trivy = "v0.70.0" }

# ── Secondary upstream (cave-scan is dual-upstream — declared explicitly) ────

[[secondary_upstreams]]
org     = "aquasecurity"
repo    = "trivy"
version = "v0.70.0"
purpose = "Vulnerability / IaC / secrets / license scanning packets — see [parity_s2..s4]"

[parity]
# Charter v2 8-gate close-out + 2026-05-19 parity uplift.
# MEASURED 2026-05-19 by tomllib against this manifest after the b-tier
# parity-uplift sprint added 5 new SonarQube deep-port modules
# (Semgrep matcher / AST rule engine / CPD / Quality Gates / Security
# Hotspots) and reclassified 9 prior [[missings]] as [[skipped]]
# (architectural scope-cuts handed off to sibling crates / out-of-scope):
#   files=49, functions=30, tests=70, upstream_test=21, surfaces=7
# Charter v2 counts treat each port artifact (file/function/test/upstream_test/
# surface) as a mapped subsystem; [[missings]] entries split into honest
# [[skipped]] (architectural decision) vs unmapped (real gap).
#   mapped   = 49 + 30 + 70 + 21 + 7 = 177
#   skipped  = 9   (handed off / out-of-scope; see [[skipped]] below)
#   unmapped = 7   (honest gaps; see remaining [[missings]] below)
#   total    = 193
#   fill_ratio = (mapped + partial + skipped) / total = 186 / 193 = 0.9637
mapped_count   = 177
partial_count  = 0
skipped_count  = 9
unmapped_count = 7
total          = 193
ratio          = 0.9637
fill_ratio     = 0.9637
honest_ratio   = 0.9171   # mapped/total = 177/193
parity_ratio_source = "manifest"
last_audit     = "2026-05-19"
infra_only     = false
notes          = "Dual upstream: SonarQube v10.4.1 (legacy SAST) + Trivy v0.70.0 (vuln/iac/secrets/license). See [parity_s1..s4] for per-packet breakdown."
[module]
name        = "cave-scan"
description = "Code quality & SAST scanner — SonarQube-compatible findings, rules and coverage import"
source_root = "src"

