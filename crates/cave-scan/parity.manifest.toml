# parity.manifest.toml — cave-scan
# Upstream: SonarSource/sonarqube  https://github.com/SonarSource/sonarqube
# Cave-scan implements SAST-style code quality scanning (rules engine,
# severity-ranked findings, coverage import) compatible with SonarQube's
# Issue / Severity taxonomy.

[upstream]
org     = "SonarSource"
repo    = "sonarqube"
version = "v10.4.1"

[module]
name        = "cave-scan"
description = "Code quality & SAST scanner — SonarQube-compatible findings, rules and coverage import"
source_root = "src"

# ── File mappings ────────────────────────────────────────────────────────────

[[files]]
upstream = "sonar-scanner-engine/src/main/java/org/sonar/scanner/issue/IssuePublisher.java"
local    = "src/engine.rs"

[[files]]
upstream = "sonar-plugin-api/src/main/java/org/sonar/api/rule/Severity.java"
local    = "src/models.rs"

[[files]]
upstream = "sonar-plugin-api/src/main/java/org/sonar/api/issue/Issue.java"
local    = "src/models.rs"

[[files]]
upstream = "sonar-plugin-api/src/main/java/org/sonar/api/batch/rule/Rule.java"
local    = "src/models.rs"

[[files]]
upstream = "sonar-scanner-engine/src/main/java/org/sonar/scanner/genericcoverage/GenericCoverageReportParser.java"
local    = "src/coverage.rs"

[[files]]
upstream = "sonar-scanner-engine/src/main/java/org/sonar/scanner/genericcoverage/JaCoCoXmlReportImporter.java"
local    = "src/coverage.rs"

[[files]]
upstream = "sonar-scanner-engine/src/main/java/org/sonar/scanner/cpd/CpdExecutor.java"
local    = "src/engine.rs"

[[files]]
upstream = "server/sonar-webserver-webapi/src/main/java/org/sonar/server/issue/ws/SearchAction.java"
local    = "src/routes.rs"

# ── Function mappings ────────────────────────────────────────────────────────

[[functions]]
upstream_name = "Severity#ALL"
local_name    = "severity_rank"
file          = "src/engine.rs"

[[functions]]
upstream_name = "IssuePublisher#initAndAddIssue"
local_name    = "build_result"
file          = "src/engine.rs"

[[functions]]
upstream_name = "IssueFilter#accept"
local_name    = "filter_by_min_severity"
file          = "src/engine.rs"

[[functions]]
upstream_name = "RegexpScanner#scan"
local_name    = "match_keyword"
file          = "src/engine.rs"

[[functions]]
upstream_name = "DefaultIssueChain#scan"
local_name    = "scan_content"
file          = "src/engine.rs"

[[functions]]
upstream_name = "GenericCoverageReportParser#parse"
local_name    = "parse_lcov"
file          = "src/coverage.rs"

[[functions]]
upstream_name = "JaCoCoXmlReportImporter#importReport"
local_name    = "parse_cobertura"
file          = "src/coverage.rs"

# ── Test mappings ────────────────────────────────────────────────────────────

[[tests]]
upstream_test = "GenericCoverageReportParserTest#parseSimpleReport"
local_test    = "test_parse_lcov_basic"

[[tests]]
upstream_test = "GenericCoverageReportParserTest#parseMultipleFiles"
local_test    = "test_parse_lcov_multiple_files"

[[tests]]
upstream_test = "GenericCoverageReportParserTest#parseEmptyReport"
local_test    = "test_parse_lcov_empty"

[[tests]]
upstream_test = "JaCoCoXmlReportImporterTest#importReport"
local_test    = "test_parse_cobertura_basic"

[[tests]]
upstream_test = "JaCoCoXmlReportImporterTest#importEmptyReport"
local_test    = "test_parse_cobertura_empty"

[[tests]]
upstream_test = "SeverityTest#ordering"
local_test    = "test_severity_rank_ordering"

[[tests]]
upstream_test = "SeverityTest#serialize"
local_test    = "test_finding_severity_serde"

[[tests]]
upstream_test = "RuleTest#serialize"
local_test    = "test_scan_rule_roundtrip"

[[tests]]
upstream_test = "IssueTest#severity"
local_test    = "test_finding_severity_ordering"

[[tests]]
upstream_test = "RegexpScannerTest#match"
local_test    = "test_keyword_match_found"

[[tests]]
upstream_test = "RegexpScannerTest#caseInsensitive"
local_test    = "test_keyword_match_case_insensitive"

[[tests]]
upstream_test = "RegexpScannerTest#disabledRule"
local_test    = "test_keyword_disabled_rule_skipped"

[[tests]]
upstream_test = "RegexpScannerTest#multilineMatch"
local_test    = "test_keyword_match_multiple_lines"

[[tests]]
upstream_test = "DefaultIssueChainTest#scanEmptyRules"
local_test    = "test_scan_content_empty_rules"

[[tests]]
upstream_test = "IssueFilterTest#minSeverity"
local_test    = "test_filter_by_min_severity"

# ── Surface mappings ─────────────────────────────────────────────────────────

[[surfaces]]
kind          = "http"
upstream_path = "/api/server/health"
local_path    = "/api/scan/health"

[[surfaces]]
kind          = "http"
upstream_path = "/api/issues/search"
local_path    = "/api/scan/issues"

[[surfaces]]
kind          = "http"
upstream_path = "/api/rules/search"
local_path    = "/api/scan/rules"

[[surfaces]]
kind          = "http"
upstream_path = "/api/measures/component"
local_path    = "/api/scan/coverage"
