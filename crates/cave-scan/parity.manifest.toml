# ── Subsystem buckets ────────────────────────────────────────────────────────
# Mapped: subsystems with working Rust + tests under src/
[[mapped]]
upstream = "sonar-plugin-api Severity"
local    = "src/models.rs FindingSeverity + src/engine.rs severity_rank"
notes    = "Info/Minor/Major/Critical taxonomy mirroring upstream INFO/MINOR/MAJOR/CRITICAL with strict total ordering"

[[mapped]]
upstream = "sonar-plugin-api Issue"
local    = "src/models.rs Finding"
notes    = "id, rule_id, rule_name, file_path, line_number, matched_text, severity, message — subset of upstream Issue.java"

[[mapped]]
upstream = "sonar-plugin-api Rule (batch/rule)"
local    = "src/models.rs ScanRule + RuleType"
notes    = "id, name, description, pattern, rule_type (Keyword/Semgrep/AST), severity, enabled — subset of upstream Rule.java"

[[mapped]]
upstream = "sonar-scanner-engine RegexpScanner (keyword path)"
local    = "src/engine.rs match_keyword"
notes    = "case-insensitive substring scan over line-split content, returns line-positioned Findings"

[[mapped]]
upstream = "sonar-scanner-engine DefaultIssueChain"
local    = "src/engine.rs scan_content"
notes    = "apply all enabled rules to one file; dispatches by RuleType (Keyword wired, Semgrep/AST in [[unmapped]])"

[[mapped]]
upstream = "sonar-scanner-engine IssueFilter (min-severity)"
local    = "src/engine.rs filter_by_min_severity"
notes    = "filters Findings at-or-above a configurable minimum severity, used by the CI gate"

[[mapped]]
upstream = "sonar-scanner-engine GenericCoverageReportParser (LCOV)"
local    = "src/coverage.rs parse_lcov"
notes    = "TN/LH/LF/end_of_record line parser, multi-file aggregation, malformed-number safety, dangling-record tolerance"

[[mapped]]
upstream = "sonar-scanner-engine JaCoCoXmlReportImporter (Cobertura)"
local    = "src/coverage.rs parse_cobertura"
notes    = "regex-based extraction of <package> entries and overall line-rate; basic vs full XML — see [[unmapped]] for class/line-level"

[[mapped]]
upstream = "sonar-scanner-engine coverage aggregation"
local    = "src/coverage.rs CoverageReport"
notes    = "per-file FileCoverage roll-up into overall total_lines / covered_lines / coverage_percent"

[[mapped]]
upstream = "sonar-scanner-engine IssuePublisher (scan-result envelope)"
local    = "src/engine.rs build_result"
notes    = "ScanResult { scan_id, target, findings, scanned_at, rules_applied, files_scanned } — published per-scan record"

# Partial: stub-route or data-model coverage without full runtime flow
[[partial]]
upstream = "server/sonar-webserver-webapi (REST API surface)"
local    = "src/routes.rs"
notes    = "minimal router declared (/api/scan/health surface declared in [[surfaces]]); /api/scan/issues, /api/scan/rules, /api/scan/coverage handlers not yet wired beyond skeleton"

[[partial]]
upstream = "sonar-scanner-engine RuleStore"
local    = "src/rules.rs (currently disabled in lib.rs)"
notes    = "rules.rs is currently excluded from the build due to pre-existing raw-string syntax issues; rule definitions present but not loaded — see [[unmapped]] for the rule-activation surface"

