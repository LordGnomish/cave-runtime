<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ADR Browser — CAVE</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--bg-card:#161b22;--bg-hover:#21262d;
  --border:#30363d;--text:#e6edf3;--text-muted:#8b949e;
  --accent:#58a6ff;--accent-bg:#1f6feb;
  --green:#3fb950;--yellow:#d29922;--red:#f85149;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:13px;line-height:1.55}
.topbar{display:flex;align-items:center;gap:12px;padding:10px 18px;background:var(--bg-card);border-bottom:1px solid var(--border)}
.topbar a{color:var(--text-muted);text-decoration:none;font-size:13px}
.topbar a:hover{color:var(--accent)}
.brand{font-weight:700;color:var(--text)}
.spacer{flex:1}
.user{font-size:12px;color:var(--text-muted)}
.layout{display:flex;height:calc(100vh - 41px);overflow:hidden}
.list-pane{width:380px;border-right:1px solid var(--border);display:flex;flex-direction:column;background:var(--bg-card)}
.list-hdr{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:8px}
.list-hdr h2{font-size:14px}
.list-hdr input,.list-hdr select{padding:6px 10px;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:6px;font-family:inherit;font-size:12.5px;outline:none}
.list-hdr input:focus,.list-hdr select:focus{border-color:var(--accent)}
.cats{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}
.cat-chip{font-size:10.5px;padding:2px 7px;border-radius:10px;background:#1f6feb22;color:var(--accent);cursor:pointer;border:1px solid #1f6feb33}
.cat-chip.active{background:#1f6feb;color:#fff;border-color:#58a6ff}
.list-body{flex:1;overflow-y:auto}
.adr-row{padding:8px 14px;border-bottom:1px solid var(--border);cursor:pointer;display:flex;flex-direction:column;gap:2px}
.adr-row:hover{background:var(--bg-hover)}
.adr-row.active{background:rgba(31,111,235,0.16);border-left:3px solid var(--accent);padding-left:11px}
.adr-id{font-size:11px;color:var(--accent);font-weight:600;font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
.adr-title{font-size:13px}
.adr-meta{font-size:10.5px;color:var(--text-muted)}
.detail-pane{flex:1;overflow-y:auto;padding:24px 32px}
.empty{padding:80px;text-align:center;color:var(--text-muted)}
.det-hdr{display:flex;align-items:flex-start;gap:14px;border-bottom:1px solid var(--border);padding-bottom:14px;margin-bottom:18px}
.det-id{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;color:var(--accent);font-weight:700}
.det-title{font-size:20px;font-weight:700;margin-top:2px}
.upstream-chips{margin-top:8px}
.upstream-chip{display:inline-block;padding:2px 8px;border-radius:10px;background:#3fb95022;color:var(--green);border:1px solid #3fb95055;font-size:11px;margin-right:5px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
.markdown{font-size:13.5px;line-height:1.65}
.markdown h1{font-size:22px;margin:18px 0 8px;border-bottom:1px solid var(--border);padding-bottom:6px}
.markdown h2{font-size:18px;margin:18px 0 6px;color:var(--accent)}
.markdown h3{font-size:15px;margin:14px 0 4px}
.markdown p{margin:8px 0}
.markdown ul,.markdown ol{margin:8px 0 8px 24px}
.markdown li{margin:3px 0}
.markdown code{background:#21262d;padding:1px 5px;border-radius:3px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px}
.markdown pre{background:#0d1117;border:1px solid var(--border);padding:12px;border-radius:6px;overflow-x:auto;margin:10px 0}
.markdown pre code{background:transparent;padding:0}
.markdown table{border-collapse:collapse;margin:10px 0;width:100%;font-size:12.5px}
.markdown table th,.markdown table td{border:1px solid var(--border);padding:6px 10px;text-align:left}
.markdown table th{background:#21262d}
.markdown blockquote{border-left:3px solid var(--accent);padding:4px 12px;color:var(--text-muted);background:#161b22;margin:8px 0}
.markdown a{color:var(--accent)}
</style>
</head>
<body>
<div class="topbar">
  <span class="brand">CAVE</span>
  <a href="/">Portal</a>
  <a href="/upstream">Upstream Tracker</a>
  <a href="/adr">ADR Browser</a>
  <a href="/attribution">Attribution</a>
  <span class="spacer"></span>
  <span class="user" id="user">…</span>
  <a href="/api/auth/logout">Logout</a>
</div>

<div class="layout">
  <div class="list-pane">
    <div class="list-hdr">
      <h2>ADR Browser <span style="color:var(--text-muted);font-weight:400;font-size:12px;margin-left:6px" id="atot"></span></h2>
      <input id="filter" placeholder="Filter ADRs…">
      <div class="cats" id="cats"></div>
    </div>
    <div class="list-body" id="list"><div class="empty">Loading…</div></div>
  </div>
  <div class="detail-pane" id="detail">
    <div class="empty">Select an ADR from the list to view it here.</div>
  </div>
</div>

<script>
let ALL=[];let CURRENT=null;let CAT_FILTER='';
async function loadWho(){
  try{const r=await fetch('/api/auth/whoami');const j=await r.json();
    if(j.authenticated){document.getElementById('user').textContent=`${j.email} · ${(j.roles||[]).join(',')}`;}
  }catch(e){}
}
async function load(){
  const r=await fetch('/api/adr',{credentials:'include'});
  if(!r.ok){document.getElementById('list').innerHTML='<div class="empty">Error '+r.status+'</div>';return}
  const j=await r.json();
  ALL=j.adrs||[];
  document.getElementById('atot').textContent=`(${j.total})`;
  const cats=Object.entries(j.categories||{}).sort((a,b)=>b[1]-a[1]);
  document.getElementById('cats').innerHTML=
    `<span class="cat-chip ${CAT_FILTER===''?'active':''}" data-cat="">All</span>`+
    cats.map(([c,n])=>`<span class="cat-chip ${CAT_FILTER===c?'active':''}" data-cat="${c}">${c} (${n})</span>`).join('');
  document.querySelectorAll('.cat-chip').forEach(el=>{
    el.addEventListener('click',()=>{CAT_FILTER=el.dataset.cat;load();});
  });
  render();
  // hash → open
  const h=location.hash.replace('#','');
  if(h)open(h);
}
function render(){
  const q=document.getElementById('filter').value.toLowerCase().trim();
  let view=ALL.filter(a=>{
    if(CAT_FILTER&&a.category!==CAT_FILTER)return false;
    if(!q)return true;
    return (a.id+' '+a.title+' '+a.category).toLowerCase().includes(q);
  });
  if(view.length===0){document.getElementById('list').innerHTML='<div class="empty">No matches</div>';return}
  document.getElementById('list').innerHTML=view.map(a=>{
    const active=CURRENT===a.id?' active':'';
    return `<div class="adr-row${active}" data-id="${a.id}">
      <div class="adr-id">${a.id}</div>
      <div class="adr-title">${a.title.replace(/[<>]/g,c=>c=='<'?'&lt;':'&gt;')}</div>
      <div class="adr-meta">${a.category} · ${(a.size_bytes/1024).toFixed(1)} KB${a.linked_upstreams.length?' · '+a.linked_upstreams.length+' upstream':''}</div>
    </div>`;
  }).join('');
  document.querySelectorAll('.adr-row').forEach(el=>{
    el.addEventListener('click',()=>open(el.dataset.id));
  });
}
async function open(id){
  CURRENT=id;render();location.hash=id;
  document.getElementById('detail').innerHTML='<div class="empty">Loading…</div>';
  const r=await fetch('/api/adr/'+encodeURIComponent(id));
  if(!r.ok){document.getElementById('detail').innerHTML='<div class="empty">Error '+r.status+'</div>';return}
  const j=await r.json();
  const ups=(j.linked_upstreams||[]).map(u=>`<a class="upstream-chip" href="https://github.com/${u}" target="_blank">${u}</a>`).join('');
  document.getElementById('detail').innerHTML=
    `<div class="det-hdr">
       <div>
         <div class="det-id">${j.id}</div>
         <div class="det-title">${(j.title||'').replace(/[<>]/g,c=>c=='<'?'&lt;':'&gt;')}</div>
         ${ups?`<div class="upstream-chips">${ups}</div>`:''}
       </div>
     </div>
     <article class="markdown">${j.html||''}</article>`;
}
document.getElementById('filter').addEventListener('input',render);
loadWho();load();
window.addEventListener('hashchange',()=>{const h=location.hash.replace('#','');if(h&&h!==CURRENT)open(h);});
</script>
</body>
</html>
