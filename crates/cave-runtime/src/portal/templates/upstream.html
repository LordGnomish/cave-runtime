<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upstream Tracker — CAVE</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--bg-card:#161b22;--bg-hover:#21262d;
  --border:#30363d;--text:#e6edf3;--text-muted:#8b949e;
  --accent:#58a6ff;--accent-bg:#1f6feb;
  --green:#3fb950;--yellow:#d29922;--red:#f85149;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:13px;line-height:1.5}
.topbar{display:flex;align-items:center;gap:12px;padding:10px 18px;background:var(--bg-card);border-bottom:1px solid var(--border)}
.topbar a{color:var(--text-muted);text-decoration:none;font-size:13px}
.topbar a:hover{color:var(--accent)}
.brand{font-weight:700;color:var(--text)}
.spacer{flex:1}
.user{font-size:12px;color:var(--text-muted)}
.layout{padding:18px 24px;max-width:1400px;margin:0 auto}
h1{font-size:22px;font-weight:700;margin-bottom:3px}
.sub{color:var(--text-muted);font-size:13px;margin-bottom:18px}
.summary{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.chip{padding:6px 12px;border-radius:18px;font-size:11px;font-weight:600;border:1px solid;display:inline-flex;align-items:center;gap:6px}
.chip-tot{background:rgba(31,111,235,0.15);color:var(--accent);border-color:#1f6feb55}
.chip-syn{background:rgba(63,185,80,0.13);color:var(--green);border-color:#3fb95055}
.chip-beh{background:rgba(210,153,34,0.13);color:var(--yellow);border-color:#d2992255}
.chip-pen{background:rgba(248,81,73,0.13);color:var(--red);border-color:#f8514955}
.controls{display:flex;gap:8px;margin-bottom:14px}
.controls input,.controls select{padding:7px 11px;background:var(--bg-card);color:var(--text);border:1px solid var(--border);border-radius:6px;font-size:13px;font-family:inherit;outline:none}
.controls input:focus,.controls select:focus{border-color:var(--accent)}
.controls input{flex:1;min-width:180px}
.tbl{width:100%;border-collapse:collapse;background:var(--bg-card);border:1px solid var(--border);border-radius:8px;overflow:hidden;font-size:12.5px}
.tbl th,.tbl td{padding:8px 12px;text-align:left;border-bottom:1px solid var(--border);vertical-align:middle}
.tbl th{background:#21262d;font-size:11px;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-muted);font-weight:600;cursor:pointer;user-select:none}
.tbl th:hover{color:var(--text)}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover{background:var(--bg-hover)}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}
.adr{display:inline-block;padding:1px 6px;background:#1f6feb22;color:var(--accent);border-radius:10px;font-size:10.5px;font-weight:600;margin-right:4px;cursor:pointer;border:1px solid #1f6feb55}
.adr:hover{background:#1f6feb44}
.dim{color:var(--text-muted)}
.bar{position:relative;width:90px;height:7px;background:#30363d;border-radius:4px;overflow:hidden}
.bar>span{position:absolute;top:0;left:0;height:100%;border-radius:4px}
.bar.synced>span{background:var(--green)}
.bar.behind>span{background:var(--yellow)}
.bar.pending>span{background:var(--red)}
.dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px}
.dot.synced{background:var(--green)}
.dot.behind{background:var(--yellow)}
.dot.pending{background:var(--red)}
.empty{padding:50px;text-align:center;color:var(--text-muted)}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:none;align-items:center;justify-content:center;z-index:50;padding:24px}
.modal-bg.show{display:flex}
.modal{background:var(--bg-card);border:1px solid var(--border);border-radius:8px;max-width:880px;width:100%;max-height:88vh;overflow:auto}
.modal-hdr{display:flex;align-items:center;gap:12px;padding:14px 18px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg-card);z-index:1}
.modal-title{font-weight:700;flex:1}
.modal-close{cursor:pointer;color:var(--text-muted);font-size:20px;background:none;border:none}
.modal-close:hover{color:var(--text)}
.modal-body{padding:18px}
pre{background:#0d1117;border:1px solid var(--border);padding:12px;border-radius:6px;overflow-x:auto;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:11.5px;line-height:1.55}
.commit-row{display:flex;gap:10px;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px}
.commit-row:last-child{border-bottom:none}
.commit-sha{color:var(--accent);font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
.commit-time{color:var(--text-muted);min-width:120px}
</style>
</head>
<body>
<div class="topbar">
  <span class="brand">CAVE</span>
  <a href="/">Portal</a>
  <a href="/upstream">Upstream Tracker</a>
  <a href="/adr">ADR Browser</a>
  <a href="/attribution">Attribution</a>
  <span class="spacer"></span>
  <span class="user" id="user">…</span>
  <a href="/api/auth/logout">Logout</a>
</div>

<div class="layout">
  <h1>Upstream Tracker</h1>
  <div class="sub">ADR-aware view of the <span id="ttot">…</span> upstream OSS projects re-implemented inside cave-runtime.</div>

  <div class="summary" id="summary"></div>

  <div class="controls">
    <input id="filter" placeholder="Filter by upstream, crate, ADR, category…">
    <select id="status">
      <option value="">All statuses</option>
      <option value="synced">synced</option>
      <option value="behind">behind</option>
      <option value="pending">pending</option>
    </select>
  </div>

  <table class="tbl" id="tbl">
    <thead>
      <tr>
        <th data-sort="upstream_repo">Upstream</th>
        <th data-sort="cave_crate">Cave crate</th>
        <th data-sort="category">Category</th>
        <th>ADR</th>
        <th data-sort="parity_overall">Parity</th>
        <th data-sort="last_commit_at">Last commit</th>
        <th data-sort="parity_status">Status</th>
      </tr>
    </thead>
    <tbody id="tbody">
      <tr><td colspan="7" class="empty">Loading…</td></tr>
    </tbody>
  </table>
</div>

<div class="modal-bg" id="modal" onclick="if(event.target.id==='modal')closeModal()">
  <div class="modal">
    <div class="modal-hdr">
      <div class="modal-title" id="mtitle">…</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="mbody"></div>
  </div>
</div>

<script>
let ROWS=[];let SORT={key:'upstream_repo',dir:1};
async function loadWho(){
  try{const r=await fetch('/api/auth/whoami');const j=await r.json();
    if(j.authenticated){document.getElementById('user').textContent=`${j.email} · ${(j.roles||[]).join(',')}`;}
    else{document.getElementById('user').textContent='not signed in';}
  }catch(e){}
}
async function load(){
  const r=await fetch('/api/upstream/tracker',{credentials:'include'});
  if(!r.ok){document.getElementById('tbody').innerHTML='<tr><td colspan="7" class="empty">Error: '+r.status+'</td></tr>';return}
  const j=await r.json();
  ROWS=j.rows||[];
  document.getElementById('ttot').textContent=j.total;
  const s=j.summary||{};
  document.getElementById('summary').innerHTML=
    `<span class="chip chip-tot">total ${j.total}</span>`+
    `<span class="chip chip-syn">synced ${s.synced||0}</span>`+
    `<span class="chip chip-beh">behind ${s.behind||0}</span>`+
    `<span class="chip chip-pen">pending ${s.pending||0}</span>`;
  render();
}
function fmt(v){if(v===null||v===undefined||v===-1)return '<span class="dim">—</span>';return v;}
function pct(v){if(v===-1)return '<span class="dim">no manifest</span>';return Math.round(v*100)+'%';}
function ago(iso){if(!iso)return '<span class="dim">—</span>';const d=new Date(iso);if(isNaN(d))return iso;
  const s=Math.floor((Date.now()-d.getTime())/1000);
  if(s<60)return s+'s ago';if(s<3600)return Math.floor(s/60)+'m ago';
  if(s<86400)return Math.floor(s/3600)+'h ago';return Math.floor(s/86400)+'d ago';
}
function render(){
  const q=document.getElementById('filter').value.toLowerCase().trim();
  const sf=document.getElementById('status').value;
  let view=ROWS.filter(r=>{
    if(sf&&r.parity_status!==sf)return false;
    if(!q)return true;
    return (r.upstream_repo+' '+r.cave_crate+' '+r.category+' '+(r.adr_refs||[]).join(' ')).toLowerCase().includes(q);
  });
  view.sort((a,b)=>{
    const k=SORT.key;let A=a[k],B=b[k];
    if(typeof A==='number'){return SORT.dir*((A||0)-(B||0))}
    A=(A||'').toString();B=(B||'').toString();
    return SORT.dir*A.localeCompare(B);
  });
  if(view.length===0){document.getElementById('tbody').innerHTML='<tr><td colspan="7" class="empty">No matches</td></tr>';return}
  document.getElementById('tbody').innerHTML=view.map(r=>{
    const p=r.parity_overall;
    const w=p>=0?Math.max(2,Math.round(p*100)):0;
    const adr=(r.adr_refs||[]).map(a=>`<span class="adr" onclick="openAdr('${a}')">${a}</span>`).join('')||'<span class="dim">—</span>';
    return `<tr>
      <td><a href="https://github.com/${r.upstream_repo}" target="_blank" rel="noopener">${r.upstream_repo}</a><div class="dim" style="font-size:11px">${r.upstream_name}</div></td>
      <td><a href="javascript:void(0)" onclick="openDetails('${r.upstream_repo}','${r.cave_crate}')">${r.cave_crate}</a></td>
      <td>${r.category}</td>
      <td>${adr}</td>
      <td><div style="display:flex;align-items:center;gap:8px"><div class="bar ${r.parity_status}"><span style="width:${w}%"></span></div><span>${pct(p)}</span></div></td>
      <td>${ago(r.last_commit_at)}</td>
      <td><span class="dot ${r.parity_status}"></span>${r.parity_status}</td>
    </tr>`;
  }).join('');
}
function openModal(title,html){
  document.getElementById('mtitle').innerHTML=title;
  document.getElementById('mbody').innerHTML=html;
  document.getElementById('modal').classList.add('show');
}
function closeModal(){document.getElementById('modal').classList.remove('show');}
async function openAdr(id){
  openModal(id,'Loading…');
  try{
    const r=await fetch('/api/adr/'+encodeURIComponent(id));
    if(!r.ok){openModal(id,'Error '+r.status);return}
    const j=await r.json();
    openModal(`${j.id} — ${j.title||''}`,j.html||'<pre>'+(j.markdown||'').replace(/[<>]/g,c=>c=='<'?'&lt;':'&gt;')+'</pre>');
  }catch(e){openModal(id,'Network error: '+e.message);}
}
async function openDetails(repo,crateName){
  openModal(crateName,'Loading…');
  try{
    const r=await fetch('/api/upstream/'+repo);
    if(!r.ok){openModal(crateName,'Error '+r.status);return}
    const j=await r.json();
    const commits=(j.recent_commits||[]).map(c=>
      `<div class="commit-row"><span class="commit-sha">${c.sha.slice(0,8)}</span><span class="commit-time">${ago(c.iso_time)}</span><div><div>${(c.subject||'').replace(/[<>]/g,x=>x=='<'?'&lt;':'&gt;')}</div><div class="dim" style="font-size:11px">${c.author}</div></div></div>`
    ).join('')||'<div class="dim">No commits in workspace history</div>';
    const adrChips=(j.adr_refs||[]).map(a=>`<span class="adr" onclick="openAdr('${a}')">${a}</span>`).join('')||'<span class="dim">—</span>';
    const manifest=j.manifest_present
      ?`<pre>${(j.manifest_toml||'').replace(/[<>]/g,c=>c=='<'?'&lt;':'&gt;')}</pre>`
      :`<div class="dim">No parity manifest at ${j.manifest_path||''}</div>`;
    openModal(`${crateName} <span class="dim" style="font-weight:400;font-size:12px">— ${repo}</span>`,
      `<div style="margin-bottom:14px">${adrChips}</div>
       <h3 style="font-size:13px;margin:14px 0 6px">Parity manifest</h3>${manifest}
       <h3 style="font-size:13px;margin:14px 0 6px">Recent commits</h3>${commits}`);
  }catch(e){openModal(crateName,'Network error: '+e.message);}
}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal()});
document.getElementById('filter').addEventListener('input',render);
document.getElementById('status').addEventListener('change',render);
document.querySelectorAll('th[data-sort]').forEach(th=>{
  th.addEventListener('click',()=>{
    const k=th.dataset.sort;
    SORT.dir=(SORT.key===k)?-SORT.dir:1;SORT.key=k;render();
  });
});
loadWho();load();
</script>
</body>
</html>
