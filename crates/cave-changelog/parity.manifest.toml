# parity.manifest.toml — cave-changelog
# Upstream: towncrier/towncrier  https://github.com/towncrier/towncrier
# Skeleton generated by cave parity init — fill in the mapping sections

[upstream]
org     = "towncrier"
repo    = "towncrier"
version = "23.0.0"

[module]
name        = "cave-changelog"
description = "Changelog generation — towncrier replacement"
source_root = "src"

