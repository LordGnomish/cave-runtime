# parity.manifest.toml — cave-rdbms-operator
# Renamed from cave-pg per ADR-147 §3.1. Multi-upstream form per ADR-RUNTIME-UPSTREAM-MIRROR-001.

[module]
name        = "cave-rdbms-operator"
description = "RDBMS operator (CloudNativePG-style) — sibling to cave-rdbms (engine)"
source_root = "src"

[[upstreams]]
org     = "cloudnative-pg"
repo    = "cloudnative-pg"
version = "1.24.0"
role    = "primary-operator"
notes   = "Cluster CRD spec, Barman backup integration, connection pooling, PVCResize, tablespace mgmt."

[[upstreams]]
org     = "pgbouncer"
repo    = "pgbouncer"
version = "1.21.0"
role    = "secondary-pooler"
notes   = "Connection-pooler subset of the operator surface — pool stats, pool sizing, pool routing."

# ── File mappings ────────────────────────────────────────────────────────────
# [[files]]
# upstream = "<repo>:<path>"
# local    = "src/<path>"

# ── Function mappings ────────────────────────────────────────────────────────
# [[functions]]
# upstream_name = "UpstreamFunc"
# local_name    = "local_fn"
# file          = "src/<path>"

# ── Test mappings ────────────────────────────────────────────────────────────
# [[tests]]
# upstream_test = "TestUpstreamFunc"
# local_test    = "test_local_fn"

# ── Surface mappings ─────────────────────────────────────────────────────────
# [[surfaces]]
# kind          = "http"
# upstream_path = "/api/upstream"
# local_path    = "/api/rdbms/endpoint"
