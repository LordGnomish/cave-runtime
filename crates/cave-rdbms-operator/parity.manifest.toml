local    = "src/backup.rs"

[[files]]
upstream = "cloudnative-pg/cloudnative-pg:pkg/reconciler/instance/replica/replica.go"
local    = "src/ha.rs"

[[files]]
upstream = "cloudnative-pg/cloudnative-pg:pkg/postgres/metrics/metrics.go"
local    = "src/monitoring.rs"

[[files]]
upstream = "cloudnative-pg/cloudnative-pg:pkg/management/postgres/user.go"
local    = "src/user.rs"

[[files]]
upstream = "cloudnative-pg/cloudnative-pg:api/v1/cluster_types.go"
local    = "src/types.rs"

[[files]]
upstream = "cloudnative-pg/cloudnative-pg:api/v1/cluster_types.go"
local    = "src/models.rs"

[[files]]
upstream = "cloudnative-pg/cloudnative-pg:internal/cnpi/plugin/operatorclient/operatorclient.go"
local    = "src/error.rs"

[[files]]
upstream = "cloudnative-pg/cloudnative-pg:pkg/management/url/url.go"
local    = "src/routes.rs"

# PgBouncer (C) → cave-rdbms-operator pool subset.

[[files]]
upstream = "pgbouncer/pgbouncer:src/pooler.c"
local    = "src/pool.rs"

[[files]]
upstream = "pgbouncer/pgbouncer:src/objects.c"
