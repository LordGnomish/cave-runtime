# parity.manifest.toml — cave-rdbms-operator
# Renamed from cave-pg per ADR-147 §3.1. Multi-upstream form per ADR-RUNTIME-UPSTREAM-MIRROR-001.
#
# Cave-rdbms-operator is the *control-plane* for Postgres-style RDBMS
# instances:
#
#   * **CloudNativePG (CNPG)** — primary upstream. The operator's domain logic
#     (Cluster CRD reconciliation, primary election, Barman backup, failover)
#     lives in `lifecycle.rs`, `backup.rs`, `ha.rs`, `monitoring.rs`.
#   * **PgBouncer** — secondary upstream. The connection-pooler subset
#     (transaction/session/statement modes, pool stats) lives in `pool.rs`.
#
# `routes.rs` exposes a unified HTTP admin API that maps both upstreams onto
# REST endpoints under `/api/pg/*`.

[module]
name        = "cave-rdbms-operator"
description = "RDBMS operator (CloudNativePG-style) — sibling to cave-rdbms (engine)"
source_root = "src"
pump_priority = "HIGH"  # qwen-pump B-prime priority gate
target_tests = 30        # qwen-pump B-prime target (#[test] count in tests/qwen_drafted.rs); below this, B-prime fires

[[upstreams]]
org     = "cloudnative-pg"
repo    = "cloudnative-pg"
version = "1.24.0"
role    = "primary-operator"
notes   = "Cluster CRD spec, Barman backup integration, connection pooling, PVCResize, tablespace mgmt."

[[upstreams]]
org     = "pgbouncer"
repo    = "pgbouncer"
version = "1.21.0"
role    = "secondary-pooler"
notes   = "Connection-pooler subset of the operator surface — pool stats, pool sizing, pool routing."

# ── File mappings ────────────────────────────────────────────────────────────

# CloudNativePG (Go) → cave-rdbms-operator (Rust). The operator surface.

[[files]]
upstream = "cloudnative-pg/cloudnative-pg:pkg/specs/pgbouncer.go"
local    = "src/pool.rs"

[[files]]
upstream = "cloudnative-pg/cloudnative-pg:pkg/management/postgres/lifecycle.go"
local    = "src/lifecycle.rs"

[[files]]
upstream = "cloudnative-pg/cloudnative-pg:pkg/management/postgres/webserver/management.go"
