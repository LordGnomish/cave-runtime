reason       = "wire-format-detail"
note         = "Folded into probe.rs"

[[unmapped]]
upstream_pkg = "pkg/kubelet/status/"
note         = "Pod status manager — reconciles observed pod phase + conditions back to apiserver. cave-kubelet's sync loop writes status during agent.rs reconciliation but does not maintain the full StatusManager queue + retry semantics."

[[unmapped]]
upstream_pkg = "pkg/kubelet/prober/"
note         = "Probe results manager + container-restart trigger. probe.rs runs probes but the worker pool + restart-coordination ledger is missing."

[[unmapped]]
upstream_pkg = "pkg/kubelet/cm/util/cgroups/"
note         = "v2 unified-hierarchy cgroup writer. cave-kubelet writes cpu/mem limits via CRI; direct cgroup writes for systemd-cgroup-driver mode are not implemented."

[[unmapped]]
upstream_pkg = "pkg/kubelet/lifecycle/"
note         = "Pod-lifecycle event hooks (preStop, postStart). CRI execution wired in cave-cri but kubelet's per-event timeout + log-correlation orchestration is missing."

[[unmapped]]
upstream_pkg = "pkg/kubelet/preemption/"
note         = "Critical-pod preemption admit. cave-kubelet admits pods based on resource availability but does not evict lower-priority pods for system-critical ones."

[[unmapped]]
upstream_pkg = "pkg/kubelet/nodeshutdown/"
note         = "Graceful node shutdown handler (KEP-2000). systemd-inhibitor integration + pod-priority-based termination ordering are not implemented."

[[unmapped]]
upstream_pkg = "pkg/kubelet/userns/"
note         = "User namespace remapping (KEP-127, v1.30 beta). cave-kubelet runs containers under the kubelet's UID."

[[unmapped]]
upstream_pkg = "pkg/kubelet/runonce/"
note         = "Standalone runonce mode (boot static pod manifest without apiserver). Useful for boot-time control-plane components."

[[unmapped]]
upstream_pkg = "pkg/kubelet/checkpoint/"
note         = "Container checkpoint API (CRIU). cave-cri has the runtime hook; kubelet-side endpoint + apiserver coordination missing."

