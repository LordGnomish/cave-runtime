# parity.manifest.toml — cave-crossplane
# Upstream: crossplane/crossplane  https://github.com/crossplane/crossplane  pinned v2.3.1
# Charter v2 deep-port close 2026-05-23.
#
# cave-crossplane reimplements the Crossplane v2 control plane: XRDs,
# Compositions (v2 pipeline + legacy resources mode), Composite Resources,
# Claims, Composed resources, Providers + ProviderConfigs + DeploymentRuntime,
# Functions (gRPC RunFunctionRequest/Response codec + built-in
# patch-and-transform / KCL / go-templating / auto-ready), XPKG packages
# (Configuration / Provider / Function packages, OCI pull + install +
# revision + dependency resolution), claim ↔ XR binding, and Ready/Synced
# /Healthy condition propagation.
#
# MVP scope (mapped + partial + scope_cuts):
#   - Composition v2 pipeline + step + FunctionRef + inline templates + legacy 1.x mode
#   - XR lifecycle (creating/ready/deleting) + status reconciliation + connection details
#   - XRD spec parser (openAPIV3Schema), schema validate (type/required/min/max/pattern),
#     defaulting, conversion (v1 ↔ v2)
#   - Provider + ProviderConfig + ProviderRevision + ControllerConfig + DeploymentRuntimeConfig
#   - Function + FunctionRevision + RunFunctionRequest/Response gRPC codec (proto wire shape)
#   - Built-in functions: function-patch-and-transform, function-kcl (stub eval),
#     function-go-templating (handlebars-like subset), function-auto-ready
#   - XPKG: Configuration package, OCI pull (registry + offline layout), install,
#     revision rollout, dependency resolution
#   - Claim ↔ XR binding (cluster-scoped vs namespace-scoped, claim defaulting)
#   - Condition propagation Ready/Synced/Healthy from composed → XR → claim
#   - Built-in cave-flavored providers: provider-kubernetes (Object), provider-helm (Release)
#   - Compose engine (patch types + transforms + readiness checks + connection secrets)
#   - Reconcile queue + provider catalog + HTTP routes + cavectl infra dispatcher
#
# Out of MVP (skipped / Phase 2 — see [[scope_cuts]] + [[skipped]]):
#   - Real OCI registry HTTP client (uses cave-artifacts in Phase 2)
#   - Full KCL evaluator (we ship a deterministic stub; cave-kcl in Phase 2)
#   - go-templating native (we ship a handlebars-like subset)
#   - kubectl-style apply / kube apiserver client (uses cave-apiserver)
#   - Real cert-manager / webhook-cert rotation (uses cave-cert)
#   - Composition Functions Beta gRPC server runtime (codec only — cave-llm-gateway-style runtime in Phase 2)
#   - Crossplane CLI binary (cavectl handles this)
#   - Helm v3 OCI registry pull (uses cave-artifacts)
#   - Real cloud provider managed resources (out of scope; provider stubs only)

[upstream]
org        = "crossplane"
repo       = "crossplane"
version    = "v2.3.1"
name       = "Crossplane"
license    = "Apache-2.0"
language   = "Go"
url        = "https://github.com/crossplane/crossplane"
source_sha = "41c6f9c4729175cf0f953cbf267378b8734e8d27"

[parity]
parity_ratio_source = "manifest"
fill_ratio          = 0.9750
honest_ratio        = 0.6750
adr_justified_ratio = 1.0     # 12 skipped scope_cut to siblings (cave-artifacts OCI / cave-apiserver apply+finalizers / cave-cert webhook TLS / cave-kcl Phase 2 / cave-llm-gateway sidecar / cave-cli crank / cave-cloud real providers / cave-sign cosign) = out-of-scope-subsystem; 1 partial (Healthy condition back-off) + 1 unmapped (composition-revision-GC daemon Phase 2) = out-of-launch-scope.
adr_justification   = "ADR-RUNTIME-PARITY-100-PCT-001"
last_audit          = "2026-05-23"
infra_only          = false
mapped_count        = 26
partial_count       = 1
skipped_count       = 12
unmapped_count      = 1
total               = 40

# 2026-05-23 Charter v2 deep-port — claude/cave-crossplane-close-2026-05-23:
#   * Pre-port scaffold was 10 src/ files / 2352 LOC / `parity.ratio = 0.0`
#     with 0 Charter v2 [[mapped]] subsystem entries (legacy file-list only).
#   * Deep-port restructures src/ into sub-modules:
#       composition/{mod,pipeline,step,patch_transform,legacy}
#       xr/{mod,lifecycle,status,bind}
#       xrd/{mod,spec,schema_validate,defaulting,conversion}
#       provider/{mod,config,revision,runtime}
#       function/{mod,grpc_codec,patch_transform,kcl,go_template,auto_ready}
#       xpkg/{mod,pull,install,revision,dependency}
#       providers_builtin/{kubernetes,helm}
#       conditions, cli, observability, claim, engine, models, reconciler,
#       error, routes, lib + parity_self_audit
#   * Subsystem-count formula: fill_ratio = (mapped + partial + skipped) / total
#     = (26 + 1 + 12) / 40 = 0.9750.
#   * honest_ratio = (mapped + partial) / total = 27 / 40 = 0.6750 — 12 cuts
#     are Phase 2 ownerships routed to existing crates (cave-artifacts /
#     cave-apiserver / cave-cert / cave-llm-gateway).
#   * source_sha pinned to crossplane v2.3.1 commit
#     41c6f9c4729175cf0f953cbf267378b8734e8d27.

[module]
name        = "cave-crossplane"
description = "Crossplane v2 control plane — XRDs, Compositions (pipeline + legacy), XRs, claims, Providers, Functions, XPKG package manager, condition propagation"
source_root = "src"

