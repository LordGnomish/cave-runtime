# parity.manifest.toml — cave-crossplane
# Upstream: crossplane/crossplane  https://github.com/crossplane/crossplane
# Skeleton generated by cave parity init — fill in the mapping sections

[upstream]
org     = "crossplane"
repo    = "crossplane"
version = "v1.14.0"

[module]
name        = "cave-crossplane"
description = "Universal control plane — Crossplane replacement"
source_root = "src"

