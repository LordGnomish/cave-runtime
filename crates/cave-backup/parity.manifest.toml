# parity.manifest.toml — cave-backup
# Upstream: vmware-tanzu/velero  https://github.com/vmware-tanzu/velero
# Skeleton generated by cave parity init — fill in the mapping sections

[upstream]
org     = "vmware-tanzu"
repo    = "velero"
version = "v1.12.0"

[module]
name        = "cave-backup"
description = "Kubernetes backup — Velero replacement"
source_root = "src"

