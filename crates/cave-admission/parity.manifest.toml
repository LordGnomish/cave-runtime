# parity.manifest.toml — cave-admission
# Upstream: kubernetes/kubernetes  https://github.com/kubernetes/kubernetes
# Skeleton generated by cave parity init — fill in the mapping sections

[upstream]
org     = "kubernetes"
repo    = "kubernetes"
version = "v1.28.0"

[module]
name        = "cave-admission"
description = "Kubernetes admission controller"
source_root = "src"

