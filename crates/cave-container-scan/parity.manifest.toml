# parity.manifest.toml — cave-container-scan
# Upstream: aquasecurity/trivy  https://github.com/aquasecurity/trivy
# Skeleton generated by cave parity init — fill in the mapping sections

[upstream]
org     = "aquasecurity"
repo    = "trivy"
version = "v0.48.0"

[module]
name        = "cave-container-scan"
description = "Container scanning — Trivy replacement"
source_root = "src"

