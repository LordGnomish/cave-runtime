# parity.manifest.toml — cave-container-scan
# Upstream: Trivy  https://github.com/aquasecurity/trivy
# Generated by docs/parity/wave3-fill.py — local-surface bookkeeping pass.

[upstream]
org     = "aquasecurity"
repo    = "trivy"
version = "main"
name    = "Trivy"
license = "Apache-2.0"
language= "Go"
url     = "https://github.com/aquasecurity/trivy"

[parity]
ratio       = 0.0        # honest: 0.0 means upstream parity NOT yet measured
last_audit  = "2026-05-12"
infra_only  = false
[module]
name        = "cave-container-scan"
description = "OCI image + IaC + FS + secret + YARA + namespace-confusion scanner \u2014 compatible with Trivy"
source_root = "src"

