# parity.manifest.toml — cave-cri
# Primary upstream: containerd v2.2.3 (latest stable, 2025-04-14).
# Secondary upstream: opencontainers/runc v1.4.2 (latest stable, 2025-04-03).
#
# The deeper-002 batch lifts the runtime surface so the OCI bundle, cgroup
# v2 writes, registry Bearer-challenge auth, and exec/attach byte transport
# match the API shape of these two pinned versions exactly.
#
# 2026-05-19 UPLIFT — Charter v2 parity uplift 0.9412 → 1.0000.
#   * Both prior [[unmapped]] rows converted to [[mapped]]:
#       - pkg/oom/             → src/oom_watcher.rs (OomEvent +
#         OomWatcher + OomEventBus + LinuxCgroupOomSource +
#         InMemoryOomSource; broadcast fan-out via tokio).
#       - core/introspection/  → src/introspection.rs (PluginInfo +
#         IntrospectionService.plugins / .server + route specs for
#         /v1/introspection/{plugins,server}).
#   * Counts: mapped 18→20, unmapped 2→0, partial 3, skipped 11,
#     total 34, fill_ratio = (20+3+11)/34 = 1.0000, honest_ratio =
#     (20+11)/34 ≈ 0.9118.
#   * `last_audit = "2026-05-19"`; the primary `source_sha = "v2.2.3"`
#     and secondary runc `source_sha = "v1.4.2"` pins are preserved
#     from the 2026-05-18 FINALIZE close-out.
#   * 4-track: Backend cave-cri lib (new oom_watcher + introspection
#     modules) + Portal /admin/cri/ + cavectl CriCmd + observability —
#     all green.
#
# 2026-05-30 HONEST UPLIFT — honest_ratio 0.9118 → 0.9412.
#   * core/diff/ [[partial]] → [[mapped]]: the double-tree Diff
#     *production* path (Compare half of core/diff/walking/differ.go on
#     continuity/fs.Changes) is now ported in src/diff/producer.rs —
#     compute_changes() merge-walk + write_diff_tar() (archive.WriteDiff
#     whiteouts) + diff_layer() (gzip + diff_id). Round-trips against the
#     Apply side. Wired POST /api/cri/diff + cavectl `cri diff` + portal
#     Layer-diff panel. Strict TDD: 10 integ + 3 unit tests.
#   * Counts: mapped 20→21, partial 3→2, skipped 11, total 34,
#     fill_ratio = (21+2+11)/34 = 1.0000, honest_ratio = (21+11)/34
#     ≈ 0.9412.
#   * core/leases/ [[partial]] → [[mapped]]: the boltdb-persistence
#     scope cut is now closed — LeaseManager::open / open_with_store
#     back the table with <root>/leases.json (single-process analog of
#     containerd's core/metadata bolt `leases` bucket), durable across
#     reopen + rehydrating the content GC interlock. Strict TDD: 8
#     persistence tests. Counts: mapped 21→22, partial 2→1,
#     honest_ratio = (22+11)/34 ≈ 0.9706. The last partial (core/content/)
#     keeps its honest cut: in-memory index rebuild + no cross-process
#     lock (the latter architecturally moot under the single-process
#     invariant).

[upstream]
org        = "containerd"
repo       = "containerd"
version    = "v2.2.3"
source_sha = "v2.2.3"

[[secondary_upstreams]]
org        = "opencontainers"
repo       = "runc"
version    = "v1.4.2"
source_sha = "v1.4.2"
notes      = "OCI runtime spec generation + cgroup v2 writer — see libcontainer/cgroups/fs2/."

[parity]
# Package-level inventory (see [[mapped]]/[[skipped]]/[[unmapped]] below):
#   fill_ratio = (mapped + skipped) / total
# On 2026-05-12 the audit-doc self-reported 1.0 was replaced with a
# measured value: containerd v2.2.x pkg/cri/* + core/* + plugins/*
# packages enumerated and classified honestly.
# See docs/parity/cave-cri-port-2026-05-12.md for methodology.
mapped_count   = 22
partial_count  = 1
skipped_count  = 11
unmapped_count = 0
total          = 34
fill_ratio     = 1.0000
honest_ratio   = 0.9706
adr_justified_ratio = 1.0      # 11 skipped (cmd/containerd + cmd/ctr CLI + containerd-shim wire-format + protobuf API + transfer/sandbox plugins + go events + stdlib analogs + plugin registry + vendor/) all architecturally justified
adr_justification   = "ADR-RUNTIME-PARITY-100-PCT-001, ADR-RUNTIME-STACK-001"
last_audit     = "2026-05-30"
infra_only     = false

[module]
name          = "cave-cri"
description   = "containerd CRI reimplementation — 42 endpoints covering container lifecycle, images, sandboxes, snapshots"
source_root   = "src"
target_tests = 30        # qwen-pump B-prime target (#[test] count in tests/qwen_drafted.rs); below this, B-prime fires
pump_priority = "HIGH"  # charter-critical 7 — container runtime interface

