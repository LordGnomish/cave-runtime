[[partial]]
upstream_pkg = "core/content/"
local_files  = ["src/content/mod.rs", "src/content/digest.rs", "src/content/store.rs", "src/content/writer.rs"]
note         = "Content-addressable store (CAS): Digest parsing for sha256/384/512, filesystem-backed LocalStore with <root>/blobs/<alg>/<hex> layout matching containerd, streaming Writer with on-the-fly hashing and rename-on-commit. Scope cuts (honest): no boltdb metadata persistence (in-memory index rebuilds via directory walk on open) and no cross-process locking (single-process cave-cri invariant)."

[[mapped]]
upstream_pkg = "core/diff/"
local_files  = ["src/diff/mod.rs", "src/diff/walking_differ.rs", "src/diff/compression.rs", "src/diff/producer.rs"]
note         = "k8s-cri parity uplift 2026-05-30: BOTH diff directions now in place. Apply (read side) — gzip decompress + tar unpack honoring OCI whiteouts (.wh.<name> + .wh..wh..opq) + path-escape rejection (walking_differ.rs). Compress + diff-id (sha256 of *uncompressed* tar) per upstream convention (compression.rs). The prior scope cut — the double-tree Diff *production* path (the `Compare` half of core/diff/walking/differ.go layered on continuity/fs.Changes) — is now ported in src/diff/producer.rs: compute_changes() merge-walks lower vs upper in lexical order (deleted dir = single whiteout subsuming the subtree, added dir recurses), write_diff_tar() serialises Add/Modify (upper bytes / dir header / symlink) + Delete (.wh.<name>) per archive.WriteDiff, and diff_layer() returns the gzipped layer + diff_id + change set. Round-trip invariant verified against the Apply side: apply(write_diff_tar(lower,upper), copy(lower)) == upper. Wired POST /api/cri/diff + cavectl `cri diff`. 10 integ + 3 unit tests."

[[mapped]]
upstream_pkg = "core/leases/"
local_files  = ["src/leases/mod.rs", "src/leases/manager.rs", "src/leases/resource.rs"]
note         = "k8s-cri parity uplift 2026-05-30: lease lifecycle + GC interlock + DURABLE persistence. LeaseManager wired to LocalStore.mark_in_use/release_lease so content blobs held by an active lease cannot be reaped; Content/Snapshot/Ingest resource kinds, TTL reaping, live_content() GC-walker query. The prior scope cut — no boltdb persistence — is now closed: LeaseManager::open / open_with_store back the table with <root>/leases.json (the single-process analog of containerd's core/metadata bolt `leases` bucket), flushing every create/add/remove/delete/reap atomically (tmp + rename), and open_with_store rehydrates the content in-use interlock on restart so a blob held before a daemon bounce stays unreapable after it. In-memory new()/with_store() retained for ephemeral callers. 8 persistence + 15 lifecycle tests."

[[mapped]]
upstream_pkg = "pkg/cri/server/podsandbox/sandbox_run_other.go (non-Linux)"
local_files  = ["src/sandbox_other.rs"]
note         = "k8s-cri push batch2 2026-05-13: Windows + FreeBSD sandbox state machine. `WindowsSandbox` (job-object + HCS container id), `FreeBsdJail` (jail id + per-jail rootfs path), unified `OtherSandbox` enum + `run_pod_sandbox_other(spec, platform, now)`. Spec validation, idempotent stop, Ready→NotReady transitions. Tests run on every host (no #[cfg] gate). Platform-syscall layer (jail_create / CreateJobObjectW / HCS::CreateContainer) belongs to the runtime backend; this is the deterministic state-machine half. 15 tests."

[[mapped]]
upstream_pkg = "pkg/oom/"
local_files  = ["src/oom_watcher.rs"]
note         = "k8s-cri parity uplift 2026-05-19: OOM event watcher. `OomEvent` carries container_id+pid+oom_score_adj+killed_at; `OomWatcher` pulls from a trait `OomSource` (production wires `LinuxCgroupOomSource` → cgroup-v2 memory.events via inotify; tests use deterministic `InMemoryOomSource`); `OomEventBus` is a tokio::sync::broadcast fan-out for kubelet + eviction + audit subscribers. Container exit code 137 + Reason `OOMKilled` is canonicalised via `OomEvent::from_exit`. The platform syscall layer (inotify wiring) is the only honest scope-cut — the trait-based state machine is fully in place. 13 tests."

[[mapped]]
upstream_pkg = "core/introspection/"
local_files  = ["src/introspection.rs"]
note         = "k8s-cri parity uplift 2026-05-19: containerd `IntrospectionService` v1 — `Plugins(filter)` returns a snapshot of registered image/snapshot/runtime/sandbox plugins with `PluginInfo { kind, name, version, capabilities, exports }`; `Server()` returns the bind UUID + PID + started_at + deprecations list. `with_defaults()` registers the four canonical cave-cri plugins (registry/overlayfs/runc/podsandbox). HTTP routes declared via `route_specs()` (GET /v1/introspection/{plugins,server}) — caller mounts on whichever Router (cave-cri root or cave-runtime mux). 12 tests."

