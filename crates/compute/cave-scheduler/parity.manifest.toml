# parity.manifest.toml — cave-scheduler
# Upstream: kubernetes/kubernetes  https://github.com/kubernetes/kubernetes
#
# 2026-05-19 UPLIFT — Charter v2 parity uplift 0.8966 → 0.9655.
#   * Two [[unmapped]] → [[mapped]] (interpodaffinity soft scoring,
#     volumezone Filter):
#       - pkg/scheduler/framework/plugins/interpodaffinity/ →
#         src/interpodaffinity_scoring.rs (new). PreScore computes the
#         per-(topology_key, topology_value) weight table once per
#         cycle; Score sums it for the candidate node; NormalizeScore
#         linearly maps the range onto [0, framework.MAX_NODE_SCORE].
#         Symmetric soft anti-affinity subtracts weights. The existing
#         eager `InterPodAffinityScore` in plugins.rs stays for callers
#         that want the O(N×M) direct path; the new module is the
#         framework-shaped Pre/Score/Normalize variant upstream uses.
#       - pkg/scheduler/framework/plugins/volumezone/ →
#         src/volumezone_plugin.rs (new). Dedicated module mirroring
#         upstream's package layout; checks bound-PV `node_affinity`
#         entries against the candidate node's `topology.kubernetes.io/
#         {zone,region}` and legacy `failure-domain.beta` labels.
#         Unbound PVCs skip; PVs with no zone affinity are
#         unconstrained.
#   * Counts: mapped 19→21, unmapped 3→1, fill_ratio
#     (21+0+7)/29 = 0.9655, honest_ratio (21+7)/29 = 0.9655.
#   * Refreshed `last_audit = "2026-05-19"`.
#
# 2026-05-18 FINALIZE — Charter v2 8-gate close-out.
#   * Added `source_sha = "v1.36.0"` for reproducibility audits — pins
#     the git tree-ish the manifest was enumerated against.
#   * Refreshed `last_audit = "2026-05-18"`.
#   * Baseline measured fill_ratio 0.8966 (mapped 19 / partial 0 /
#     skipped 7 / unmapped 3 / total 29) from the 2026-05-13 batch2
#     imagelocality port.
#   * SPDX (AGPL-3.0-or-later) coverage: 25/25 .rs files.
#   * 4-track: Backend cave-scheduler lib + Portal /admin/scheduler/ +
#     cavectl SchedulerCmd + observability cave-scheduler alerts &
#     dashboard — all green pre-close.

[upstream]
org        = "kubernetes"
repo       = "kubernetes"
version    = "v1.36.0"
source_sha = "v1.36.0"

[parity]
# 2026-05-28 honest close — implemented real preemption-victim-recovery loop;
# ADR-justified 7 sibling/stdlib/test-harness/parallel-track cuts.
#
# Package-level inventory (see [[mapped]]/[[skipped]]/[[unmapped]] below):
#   fill_ratio = (mapped + skipped) / total
# On 2026-05-12 the audit-doc self-reported 1.0 was replaced with a
# measured value: kubernetes/kubernetes v1.31.x pkg/scheduler/* packages
# enumerated and classified honestly.
# See docs/parity/cave-scheduler-port-2026-05-12.md for methodology.
# 2026-05-28: preemption-victim-recovery closed (EvictionRecoveryLoop +
# mark_failed/take_failed/failed_evictions in default_preemption.rs).
parity_ratio_source = "manifest"
# 2026-05-30 honest uplift — two skipped/stdlib-analog reclassifications backed
# by real strict-TDD ports:
#   * pkg/scheduler/internal/heap/ skipped→mapped (src/scheduling_heap.rs): the
#     scheduler heap is a key-indexed structure (Update/Delete/AddIfNotPresent),
#     NOT a std BinaryHeap analog. Wired into the active queue.
#   * pkg/scheduler/apis/config/validation/ added as a new mapped package
#     (src/config_validation.rs); the config *types* remain a serde skip below.
#   Counts: mapped 22→24, skipped 7→6, total 29→30.
#   honest_ratio = mapped/total = 24/30 = 0.8 (was 0.7586).
#   fill_ratio = (mapped + skipped) / total = (24+6)/30 = 1.0.
mapped_count   = 24
partial_count  = 0
skipped_count  = 6
unmapped_count = 0
total          = 30
fill_ratio     = 1.0
honest_ratio   = 0.8
adr_justified_ratio = 1.0
adr_justification   = "ADR-RUNTIME-PARITY-100-PCT-001, ADR-RUNTIME-STACK-001"
last_audit     = "2026-05-30"
infra_only     = false

[module]
name        = "cave-scheduler"
description = "kube-scheduler reimpl — Filter/Score framework, preemption, priority queue, topology spread, DRA (KEP-4381), multi-profile"
source_root = "src"
pump_priority = "HIGH"  # qwen-pump B-prime priority gate
target_tests = 30        # qwen-pump B-prime target (#[test] count in tests/qwen_drafted.rs); below this, B-prime fires

