[[mapped]]
upstream_pkg = "pkg/scheduler/framework/plugins/imagelocality/"
local_files  = ["src/plugins.rs"]
note         = "k8s-cri push batch2 2026-05-13: ImageLocality scorer ported with upstream's size-weighted formula. `scaled_image_score = size × (num_nodes_with_image / total_nodes)`; `calculate_priority` linearly maps the sum onto [0, MAX_NODE_SCORE] between min/max thresholds (23 MiB / 1000 MiB × containers). 14 deterministic tests + `update_node_images` / `set_cluster_state` APIs for cave-kubelet image GC or cave-cri ListImages to populate."

[[mapped]]
upstream_pkg = "pkg/scheduler/framework/plugins/interpodaffinity/"
local_files  = ["src/interpodaffinity_scoring.rs", "src/plugins.rs"]
note         = "2026-05-19 uplift: dedicated PreScore/Score/Normalize module mirroring upstream's `scoring.go`. PreScoreState aggregates ±weight per (topology_key, topology_value) once per cycle; Score is O(1) per node; Normalize maps the raw [min,max] linearly to [0, MAX_NODE_SCORE]. Hard-affinity Filter (`InterPodAffinity` in plugins.rs) remains; this module fills the soft-preferences gap."

[[mapped]]
upstream_pkg = "pkg/scheduler/framework/plugins/volumezone/"
local_files  = ["src/volumezone_plugin.rs", "src/volume.rs"]
note         = "2026-05-19 uplift: dedicated module mirroring upstream's package layout. Filter rejects nodes whose `topology.kubernetes.io/{zone,region}` (or legacy `failure-domain.beta.*`) label isn't in the pod's bound PV's `node_affinity` allow-list. Unbound PVCs skip; PVs without zone affinity are unconstrained; missing node label is a hard reject."

[[mapped]]
upstream_pkg = "pkg/scheduler/framework/preemption/recovery"
local_files  = ["src/default_preemption.rs"]
note         = "2026-05-28 close: EvictionRecoveryLoop + mark_failed/take_failed/failed_evictions added to AsyncPreemptHandle in default_preemption.rs. When the apiserver returns a transient error during eviction, mark_failed() moves the task from pending→failed; drain_failed() atomically drains the failed list, clears preemptor nominations (so the next cycle can pick a different node), and returns the failed tasks for re-admission — mirrors upstream pkg/scheduler/framework/preemption/preemption.go §handlePreemptionResult error-path."

[[mapped]]
upstream_pkg = "pkg/scheduler/internal/heap/"
local_files  = ["src/scheduling_heap.rs"]
note         = "2026-05-30 honest uplift (skipped→mapped): faithful port of heap.go's key-indexed Heap. Wraps an items-by-key map alongside the heap queue so the active queue can Update a pod in place, Delete an interior node by key, and AddIfNotPresent without duplicates — operations std BinaryHeap cannot express. sift up/down/fix/remove mirror container/heap exactly, keeping the index map consistent on every swap; metricRecorder add-counter modeled. Wired as the backing store for priority_queue::PriorityQueue.active (add dedups by uid, new update()/delete() methods). 10 heap + 3 queue port tests."

[[mapped]]
upstream_pkg = "pkg/scheduler/apis/config/validation/"
local_files  = ["src/config_validation.rs"]
note         = "2026-05-30 honest uplift (new mapped package; config *types* stay serde-skipped above): port of validation.go's ValidateKubeSchedulerConfiguration rules — parallelism>0, percentageOfNodesToScore in [0,100], at-least-one profile, required+unique scheduler names, positive non-overflowing score weights, unique enabled plugins + plugin-config names. Errors aggregate like field.ErrorList. Wired to POST /api/scheduler/config/validate + cavectl scheduler validate-config + /admin/scheduler Config tab. 11 validation + 2 route tests."

