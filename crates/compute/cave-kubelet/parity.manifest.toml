[[mapped]]
upstream_pkg = "pkg/kubelet/status/"
local_files  = ["src/pod_status_manager.rs"]
note         = "k8s-core push 2026-05-13: PodStatusManager queue + retry. Lazy hash-dedupe via PodStatus::content_hash, bounded queue with oldest-eviction, exponential backoff via cave_kernel::backoff::Backoff, transient/permanent failure separation, deleted-pod drop semantics. 15 deterministic tests."

[[mapped]]
upstream_pkg = "pkg/kubelet/prober/"
local_files  = ["src/prober.rs"]
note         = "k8s-core push 2026-05-13: ProberCoordinator on top of probe::ProberManager — concurrency control via cave_kernel::semaphore (default 16 concurrent probes), restart-coordination ledger (suppresses duplicate liveness-restart fan-out, auto-clears on safety window), readiness flip dedupe. 17 deterministic tests."

[[mapped]]
upstream_pkg = "pkg/kubelet/cm/util/cgroups/"
local_files  = ["src/cgroups.rs"]
note         = "k8s-streams-mesh batch 2026-05-13 + honest close 2026-05-30: cgroup v2 unified-hierarchy writer. CgroupBackend trait with TWO impls — InMemoryCgroups (tests) AND the production Cgroupv2FsBackend that writes control files into the v2 hierarchy rooted at a configurable mount (/sys/fs/cgroup in prod). serialize_value/parse_value implement the libcontainer/cgroups/fs2 v2 wire format (memory.max/cpu.max/cpuset.cpus/pids.max, \"max\" sentinels, \"$QUOTA $PERIOD\" cpu.max), with shared validate_value short-circuiting bad writes before any dir is materialised. QosTier slice naming, pod_cgroup_path + container_cgroup_path conventions, idempotent remove. v2 only — no v1 legacy hierarchy. 27 tests."

[[mapped]]
upstream_pkg = "pkg/kubelet/lifecycle/"
local_files  = ["src/lifecycle.rs"]
note         = "k8s-cri push batch2 2026-05-13: PreStop / PostStart hook orchestration. `HookExecution` + `evaluate(sample, now)` state machine handles Fire / Pending / Completed / TimedOut / Failed with per-hook timeout independent of `terminationGracePeriodSeconds`. Sample-driven (success/failure stickiness). 8 tests."

[[mapped]]
upstream_pkg = "pkg/kubelet/preemption/"
local_files  = ["src/preemption.rs"]
note         = "k8s-cri push batch2 2026-05-13: critical-pod preemption admit. `evaluate(PreemptionRequest)` returns AdmitNoVictims / Evict{victim_uids} / Insufficient. Lowest-priority-first selection, greedy on resources, deterministic tie-break by name. 12 tests."

[[mapped]]
upstream_pkg = "pkg/kubelet/nodeshutdown/"
local_files  = ["src/nodeshutdown.rs"]
note         = "k8s-streams-mesh batch 2026-05-13: graceful node-shutdown ordering (KEP-2000). ShutdownTier (Regular / ClusterCritical / NodeCritical), build_plan(pods, cfg) deterministic per-tier + per-priority ordering, ShutdownConfig (total_grace / critical_grace) with saturating regular_grace, ShutdownClock budget tracker. systemd-inhibitor integration intentionally outside this module. 10 tests."

[[mapped]]
upstream_pkg = "pkg/kubelet/userns/"
local_files  = ["src/userns.rs"]
note         = "k8s-streams-mesh batch 2026-05-13: user-namespace allocator (KEP-127). UserNsAllocator (POD_RANGE_SIZE=65536, HOST_BASE=100_000) with free-list LIFO reuse, idempotent allocate per pod uid, release-makes-reusable, exhaustion error, assignments-disjoint invariant. CRI-side unshare(CLONE_NEWUSER) + uid_map writes stay in the runtime. 11 tests."

[[mapped]]
upstream_pkg = "pkg/kubelet/runonce/"
local_files  = ["src/runonce.rs"]
note         = "k8s-streams-mesh batch 2026-05-13: standalone runonce mode for boot static-pod manifests. StaticPodManifest validation (name + images + restart policy), RunOnceResult outcomes (Running / Completed / Failed / Rejected), all_settled() driver-exit predicate. CRI-side container start delegated. 11 tests."

[[mapped]]
upstream_pkg = "pkg/kubelet/pleg/"
local_files  = ["src/pleg.rs"]
note         = "upstream test port batch4 2026-05-14: PodLifecycleEventGenerator diff state machine. Line-by-line port of generateEvents (generic.go:214-235) — five transition rules across container + sandbox snapshots. GenericPleg.relist() consumes Vec<PodSnapshot> from cave-cri-side caller, emits RelistOutcome { events, dropped } with channel-capacity-bounded buffering (matches eventChannel cap + pleg_events_dropped_total). IP preservation across exit, 3-min Healthy() threshold, cache eviction for gone pods. 16 upstream tests ported. Async timer / wait.NonSlidingUntil orchestration left to the agent::sync_loop caller (state machine only)."

[[skipped]]
upstream_pkg = "pkg/kubelet/checkpoint/"
note         = "Container checkpoint API (CRIU). ADR-RUNTIME-PARITY-100-PCT-001 §5 scope_cut: cave-cri already owns the runtime CRIU hook; kubelet-side checkpoint endpoint + apiserver coordination deferred (no current cave-runtime workload requires live-migration / forensic-snapshot of running containers, and the API is alpha-gated upstream)."

