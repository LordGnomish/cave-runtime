# parity.manifest.toml — cave-wasm-runtime
# Greenfield pure-Rust WebAssembly engine. Multi-upstream *concept port*
# (behaviour reimplemented in safe Rust, nothing vendored):
#   bytecodealliance/wasmtime  (Apache-2.0)  — primary semantics
#   wasmerio/wasmer            (MIT)         — runtime/registry shapes
#   spinframework/spin         (Apache-2.0)  — registry + trigger model
# Published under Apache-2.0 (NOT the workspace-default AGPL). See NOTICE.
#
# 2026-05-31 ESTABLISHING BASELINE (7 strict-TDD cycles, 40 lib tests):
#   mapped (9): binary parser, i32 interpreter, function calls, linear
#     memory, fuel metering, import/host dispatch, content-addressed
#     registry, SHA-256, capability sandbox.
#   partial (4): WASI preview1 (stdio/args/env/clock/exit only),
#     structured control flow (call/return/drop; no block/loop/if/br),
#     float+full-i64 ops, cave-sandbox triumvirate OS bridge.
#   skipped/scope_cut (4): cranelift JIT (architectural: safe interpreter
#     chosen), Spin triggers (→ sibling cave-spin crate), wasmCloud actors
#     (→ sibling cave-wasmcloud crate), distributed registry transport
#     (→ OCI distribution / cave-registry).
#   unmapped (3): component model, WIT bindgen, WASI preview2 — real
#     engine roadmap gaps, not justified away.

[upstream]
org        = "bytecodealliance"
repo       = "wasmtime"
version    = "v37.0.0"      # approximate; concept port not pinned to a tag
license    = "Apache-2.0"
source_sha = "unknown"     # not vendored — see NOTICE for multi-upstream refs

[parity]
parity_ratio_source = "manifest"
mapped_count   = 9
partial_count  = 4
skipped_count  = 4
unmapped_count = 3
total          = 20
fill_ratio     = 0.8500   # (mapped + partial + skipped) / total = 17/20
honest_ratio   = 0.6500   # (mapped + skipped) / total          = 13/20
last_audit     = "2026-05-31"
infra_only     = false

# ---- mapped: implemented + strict-TDD tested ----
[[mapped]]
id = "wasm-binary-parser"
upstream_ref = "wasmparser: binary decoder"
notes = "src/parser.rs — preamble/version, LEB128, section walk (type/import/function/memory/export/code). Cycle 1."

[[mapped]]
id = "core-interpreter-numeric"
upstream_ref = "core spec numeric instrs; wasmtime exec"
notes = "src/exec.rs — i32 const/arith/bitwise/shift/compare/eqz, signed-LEB consts, div/rem traps. Cycle 2."

[[mapped]]
id = "function-calls"
upstream_ref = "core spec: call"
notes = "src/exec.rs — cross-function call + 1024-frame recursion guard; combined import/defined index space. Cycles 2/4."

[[mapped]]
id = "linear-memory"
upstream_ref = "core spec: memory (wasm32 64KiB pages)"
notes = "src/limits.rs+exec.rs — load/store/load8_u/store8, memory.size/grow with cap, OOB trap. Cycle 3."

[[mapped]]
id = "resource-limits-fuel"
upstream_ref = "wasmtime: Config::consume_fuel"
notes = "src/limits.rs — per-instruction fuel charge, FuelExhausted trap. Cycle 3."

[[mapped]]
id = "module-imports-host-dispatch"
upstream_ref = "core spec import section; wasmtime Linker"
notes = "src/parser.rs+exec.rs — import decode + host (WASI) call dispatch. Cycle 4."

[[mapped]]
id = "content-addressed-registry"
upstream_ref = "spin oci/content store"
notes = "src/registry.rs — push/pull/get_by_digest/resolve/list/remove; sha256-keyed blob dedup. Cycle 5."

[[mapped]]
id = "sha256-digest"
upstream_ref = "FIPS 180-4"
notes = "src/digest.rs — pure-Rust SHA-256, NIST vectors verified. Cycle 5."

[[mapped]]
id = "capability-sandbox"
upstream_ref = "wasmtime-wasi WasiCtxBuilder; spin allowed_outbound"
notes = "src/sandbox.rs — Capabilities gate every WASI call; CapabilityDenied on deny; caps.to_limits(). Cycle 6."

# ---- partial: real but incomplete ----
[[partial]]
id = "wasi-preview1"
upstream_ref = "wasmtime-wasi: wasi_snapshot_preview1"
notes = "src/wasi.rs — fd_write/proc_exit/args/environ/clock/fd_read(EOF). Missing fs, sockets, poll_oneoff."

[[partial]]
id = "structured-control-flow"
upstream_ref = "core spec: block/loop/if/br*"
notes = "Straight-line + call + return + drop done; block/loop/if/br/br_if/br_table not yet."

[[partial]]
id = "float-and-i64-ops"
upstream_ref = "core spec: f32/f64 + full i64"
notes = "Value/locals carry f32/f64/i64 and i64.const; f32/f64 arithmetic + full i64 op set not yet."

[[partial]]
id = "cave-sandbox-triumvirate-bridge"
upstream_ref = "cave-sandbox (seccomp/namespace/landlock)"
notes = "In-crate software capability denial done; OS-level confinement handoff deferred."

