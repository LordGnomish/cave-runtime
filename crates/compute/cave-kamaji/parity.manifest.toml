upstream = "internal/utilities/kubeconfig.go"
note = "Standard kubeconfig JSON (apiVersion/clusters/contexts/users) keyed on tcp.status.api_server_endpoint."

[[mapped]]
name = "rest-api"
upstream = "(Cave-specific HTTP surface)"
note = "axum router /api/kamaji/tenants{,/:id,/:id/kubeconfig} — CRUD + kubeconfig endpoint."

[[mapped]]
name = "in-memory-store"
upstream = "(local — Cave runtime hold)"
note = "DashMap<Uuid, TenantControlPlane>; persistence Phase 3 alongside datastore tracks."

[[mapped]]
name = "datastore-crd"
upstream = "api/v1alpha1/datastore_types.go"
note = "DataStore CRD shape (Etcd/Postgres/MySql kinds + KineDriver alignment + EtcdSnapshotConfig)."

[[mapped]]
name = "datastore-validation"
upstream = "internal/datastore/{etcd,postgres,mysql}"
note = "Non-empty endpoints + kind/kine_driver alignment invariants."

[[mapped]]
name = "konnectivity-controller"
upstream = "internal/resources/konnectivity"
note = "Konnectivity tunnel config (gRPC port 8132 / HTTP-CONNECT port 8133); agent_manifest_args."

[[mapped]]
name = "admission-webhook"
upstream = "internal/webhook"
note = "validate_create + validate_update with immutability check on kubernetes_version + namespace."

[[mapped]]
name = "apiserver-pod-plan"
upstream = "internal/resources/kubeapiserver"
note = "ApiServerPodPlan emits image + command + sorted args + volume mounts + env from TenantControlPlane."

[[mapped]]
name = "kubeadm-init-renderer"
upstream = "internal/utilities/kubeadm"
note = "Deterministic YAML render of InitConfiguration + ClusterConfiguration."

[[mapped]]
name = "status-conditions"
upstream = "internal/controllers/conditions.go"
note = "Ready / ControlPlaneHealthy / KubeconfigReady / DataStoreHealthy / KonnectivityHealthy with in-place set_condition."

[[mapped]]
name = "cluster-api-integration"
upstream = "internal/controllers/clusterapi"
note = "CAPI bootstrap-provider shape: ControlPlaneEndpoint parse, InfrastructureRef, CapiBootstrapStatus, CapiTenantStatus, ready predicate. Wave-2 close-out 2026-05-19 — promoted partial → mapped via src/cluster_api.rs."

[[mapped]]
name = "cert-controller"
upstream = "internal/kubeadm/certificates.go + controllers/certificate_lifecycle_controller.go"
note = "Per-tenant PKI decision layer (src/certs.rs): kubeadm cert tree (ca→apiserver/apiserver-kubelet-client, front-proxy-ca→front-proxy-client, sa key-pair) with signer chain + ext-key-usage; kubeadm GetAPIServerAltNames SAN computation; CertificateLifecycle 1-day rotation deadline (now+1d > NotAfter) with x509/kubeconfig strategies; checksum+CA-validity regeneration-skip predicate. Real x509 signing delegated to cave-certs/cave-pki. Wave-7 close-out 2026-05-30 — promoted skipped → mapped (4 strict-TDD cycles, 18 tests). Exposed via /api/kamaji/tenants/:id/certificates + cavectl kamaji tcp-certs."

[[mapped]]
name = "leader-election-helper"
upstream = "internal/utilities/leaderelection"
note = "Lease acquire/renew/observe decision core (src/leaderelection.rs): client-go tryAcquireOrRenew (create / acquire-on-expiry with leader_transitions++ / renew-preserving-acquire_time / lose-on-valid-foreign-lease), renew-deadline step-down check, and NewLeaderElector config validation (leaseDuration>renewDeadline>1.2*retryPeriod, all>0). Kamaji's manager runs LeaderElection:true; Lease object I/O left to the runtime. Wave-8 close-out 2026-05-31 — promoted skipped -> mapped (strict-TDD, 6 tests)."

