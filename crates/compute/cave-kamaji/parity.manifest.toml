# 2026-06-07 wave — line-by-line deepening (5 mandate areas)

[[mapped]]
name = "datastore-driver-kine"
upstream = "internal/datastore/{postgresql,mysql}.go"
note = "Driver enum (etcd/MySQL/PostgreSQL/NATS), faithful Postgres+MySQL DDL renderers (verbatim *Statement consts, preserved arg order), kine table schema (CREATE TABLE kine + TRUNCATE + 4 indexes + 1 unique index), Connection trait + in-memory FakeConnection backend. cont2 (2026-06-07): concrete kine migration — Connection::execute_ddl + connection::run_migrate run the full kine_table_ddl for kine drivers (no-op for native etcd), driven by the reconcile datastore-migrate step."

[[mapped]]
name = "datastore-setup-isolation"
upstream = "internal/resources/datastore/{datastore_setup,datastore_storage_config,datastore_multitenancy}.go"
note = "Per-tenant resource isolation: tenant_schema ns_name dash->underscore coalesce (issue #328), idempotent createDB->createUser->grant setup + revoke->dropDB->dropUser teardown, OperationResult precedence, ShouldStatusBeUpdated drift, NATS single-tenant boundary."

[[mapped]]
name = "control-plane-components"
upstream = "internal/builders/controlplane/deployment.go"
note = "Per-tenant control-plane component lifecycle: kube-apiserver + kube-controller-manager + kube-scheduler container builders with exact sorted arg maps + etcd-vs-Kine --etcd-servers switch + ComponentImages + ArgsFromMapToSlice. cont2 (2026-06-07): the reconcile `deployment` step now genuinely materialises the 3 containers (Reconciler::control_plane) against the tenant's DatastoreBinding."

[[mapped]]
name = "multitenancy-boundaries"
upstream = "internal/utilities/utilities.go + internal/constants/labels.go"
note = "Tenant security isolation primitives: KamajiLabels (project/name/component), AddTenantPrefix, MergeMaps, per-tenant label selector + cross-tenant ownership boundary, DataStore UsedBy sharing registry. cont2 (2026-06-07): enforced end-to-end by the TenantManager orchestrator (src/manager.rs) — authorize() refuses cross-tenant resource access via the ownership label; provision/delete register/release the shared usedBy claim."

[[mapped]]
name = "reconcile-pipeline"
upstream = "controllers/resources.go"
note = "TenantControlPlane provisioning pipeline (getDefaultResources verbatim 26-step ordering) + convergence-driven phase machine (Provisioning->Running) + GetDeletableResources datastore teardown; datastore-setup step wired to the real ds_setup state machine. cont2 (2026-06-07): datastore-migrate runs the concrete kine migration, deployment materialises the dedicated control plane, and every pass reports incremental status conditions (Reconciler::report_status — DataStore/ControlPlane/Konnectivity/Kubeconfig flip True as stages converge, Ready aggregates at steady state)."

