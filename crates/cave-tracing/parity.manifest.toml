# parity.manifest.toml — cave-tracing
# Upstream: jaegertracing/jaeger v2.17.0
#   https://github.com/jaegertracing/jaeger
#
# Jaeger v2 is a CNCF graduated distributed-tracing collector. cave-tracing
# tracks its OTLP-receiver and storage surface. cave-trace (already in
# the registry) covers the same upstream — these may merge before launch.
#
# Stubbed 2026-05-02.

[upstream]
org     = "jaegertracing"
repo    = "jaeger"
version = "v2.17.0"

[module]
name        = "cave-tracing"
description = "Distributed tracing collector — Jaeger v2 reimplementation"
source_root = "src"

[parity]
infra_only = true
