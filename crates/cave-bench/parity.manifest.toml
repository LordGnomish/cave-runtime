# ─── SKIPPED subsystems (scope_cut to sibling crate or Phase 2) ────────────

[[skipped]]
name = "container_runtime_introspection"
reason = "Live CRI/containerd process flag enumeration is a runtime concern; cave-cri owns CRI sockets and ps-style introspection that would populate CisContext.flags at scan time."
scope_cut_target = "cave-cri"

[[skipped]]
name = "kubelet_api_live_watch"
reason = "kubelet /pods + /config endpoints require host-port access + bearer-token; live introspection lives in cave-kubelet, not cave-bench."
scope_cut_target = "cave-kubelet"

[[skipped]]
name = "kube_apiserver_live_watch"
reason = "K8s API watch for live manifest evaluation is owned by cave-apiserver client; cave-bench evaluates static manifests handed in by callers."
scope_cut_target = "cave-apiserver"

[[skipped]]
name = "kubescape_helm_chart_install"
reason = "Operator deployment + Helm install glue lives in cave-deploy; cave-bench publishes the scan API only."
scope_cut_target = "cave-deploy"

[[skipped]]
name = "kubescape_vuln_scan_integration"
reason = "kubescape v4 fans out to Trivy for image CVE scans — cave-trivy owns the scanner; cave-bench imports cve_critical_count via NsaManifestFacts."
scope_cut_target = "cave-trivy"

[[skipped]]
name = "kubescape_compliance_report_sync"
reason = "Compliance reports cross-link to cave-portal-api dashboards; report routing is portal-side, not bench-side."
scope_cut_target = "cave-portal-api"

[[skipped]]
name = "notification_delivery_transports"
reason = "Slack/PagerDuty/Webhook transport implementations are cave-noti / cave-oncall responsibility; cave-bench only declares NotifyAction enum."
scope_cut_target = "cave-noti"

[[skipped]]
name = "open_policy_agent_rego_eval"
reason = "kubescape uses OPA Rego to evaluate controls. cave-policy is the OPA evaluator crate; cave-bench's NSA controls use compiled Rust predicates."
scope_cut_target = "cave-policy"

[[skipped]]
name = "regolibrary_artifact_sync"
reason = "Periodic refresh of kubescape/regolibrary control JSONs from upstream is a build-time concern handled by cave-upstream-watchd."
scope_cut_target = "cave-upstream-watchd"

# ─── UNMAPPED (honest gap) ─────────────────────────────────────────────────

[[unmapped]]
name = "kube-bench_plugin_marketplace"
reason = "kube-bench supports custom-plugin checks via Go-plugin .so loading. Pure-Rust pluginization (WASM or shared-lib) is a Phase 2 design item; no clean owner yet."

