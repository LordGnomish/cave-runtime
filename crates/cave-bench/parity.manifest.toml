# parity.manifest.toml — cave-bench
# Charter v2 deep-port close 2026-05-23.
#
# Dual upstream:
# - aquasecurity/kube-bench  https://github.com/aquasecurity/kube-bench  v0.15.5
# - kubescape/kubescape      https://github.com/kubescape/kubescape       v4.0.8
# Both Apache-2.0 (compatible with cave-runtime AGPL-3.0-or-later).
#
# cave-bench is the K8s security benchmark crate: CIS K8s Benchmark from
# kube-bench, NSA Hardening Guide + MITRE ATT&CK mapping from kubescape.
# It hosts the check engine (BinOp + TestItem + CisRule + CisContext),
# four CIS control catalogues (master / node / etcd / control-plane),
# the NSA control catalogue (32 controls) and MITRE technique catalogue
# (30 techniques across 10 tactics), plus a profile manager, scan runner,
# scheduler, finding store, axum HTTP routes, observability shapes, and
# a `cavectl bench` CLI surface.
#
# Per ADR-RUNTIME-bench the runtime stack uses cave-bench as the single
# entry-point for compliance scans. Live-introspection (cri, kube-proxy,
# K8s API watches) live in their dedicated crates; cave-bench is *file-
# and manifest-* oriented.

[upstream]
# Primary upstream — kube-bench CIS engine.
org           = "aquasecurity"
repo          = "kube-bench"
version       = "v0.15.5"
name          = "kube-bench"
license       = "Apache-2.0"
language      = "Go"
url           = "https://github.com/aquasecurity/kube-bench"
source_sha    = "13c5a2bed634b4f324ad54ba2942f4a77fc802e0"

[[upstreams]]
org           = "kubescape"
repo          = "kubescape"
version       = "v4.0.8"
name          = "kubescape"
license       = "Apache-2.0"
language      = "Go"
url           = "https://github.com/kubescape/kubescape"
source_sha    = "d7539c2264560a8685f59e89a731d6de833258a6"

[module]
name          = "cave-bench"
description   = "kube-bench v0.15.5 (CIS) + kubescape v4.0.8 (NSA + MITRE) dual deep-port"
source_root   = "src"

[parity]
fill_ratio            = 0.9697
honest_ratio          = 0.6970
mapped_count          = 23
partial_count         = 0
skipped_count         = 9
unmapped_count        = 1
total                 = 33
parity_ratio_source   = "manifest"
last_audit            = "2026-05-23"
infra_only            = false

