# parity.manifest.toml — cave-knative
# Upstream: knative/serving  https://github.com/knative/serving
# Skeleton generated by cave parity init — fill in the mapping sections

[upstream]
org     = "knative"
repo    = "serving"
version = "v1.12.0"

[module]
name        = "cave-knative"
description = "Serverless workloads — Knative replacement"
source_root = "src"

# ── File mappings ────────────────────────────────────────────────────────────
# [[files]]
# upstream = "path/in/upstream/repo.go"
# local    = "src/local.rs"

# ── Function mappings ────────────────────────────────────────────────────────
# [[functions]]
# upstream_name = "UpstreamFunc"
# local_name    = "local_fn"
# file          = "src/routes.rs"

# ── Test mappings ────────────────────────────────────────────────────────────
# [[tests]]
# upstream_test = "TestUpstreamFunc"
# local_test    = "test_local_fn"

# ── Surface mappings ─────────────────────────────────────────────────────────
# [[surfaces]]
# kind          = "http"
# upstream_path = "/api/upstream"
# local_path    = "/api/knative/endpoint"
