# parity.manifest.toml — cave-knative
# Upstream: knative/serving knative-v1.22.0  https://github.com/knative/serving
#
# Tag-scheme fix 2026-05-02: Knative tags releases as `knative-vX.Y.Z`,
# not `vX.Y.Z`. The previous pin `v1.12.0` did not exist in the upstream
# tag list (Knative has never cut a `v1.x` tag). Latest stable is
# `knative-v1.22.0`.

[upstream]
org     = "knative"
repo    = "serving"
version = "knative-v1.22.0"
name    = "Knative Serving"
license = "Apache-2.0"
language= "Go"
url     = "https://github.com/knative/serving"

[parity]
ratio       = 0.0        # honest: 0.0 means upstream parity NOT yet measured
last_audit  = "2026-05-12"
infra_only  = false
[module]
name        = "cave-knative"
description = "Serverless workloads — Knative replacement"
source_root = "src"

# ── File mappings ────────────────────────────────────────────────────────────
# [[files]]
# upstream = "path/in/upstream/repo.go"
# local    = "src/local.rs"

# ── Function mappings ────────────────────────────────────────────────────────
# [[functions]]
# upstream_name = "UpstreamFunc"
# local_name    = "local_fn"
# file          = "src/routes.rs"

# ── Test mappings ────────────────────────────────────────────────────────────
# [[tests]]
# upstream_test = "TestUpstreamFunc"
# local_test    = "test_local_fn"

# ── Surface mappings ─────────────────────────────────────────────────────────
# [[surfaces]]
# kind          = "http"
# upstream_path = "/api/upstream"
# local_path    = "/api/knative/endpoint"
