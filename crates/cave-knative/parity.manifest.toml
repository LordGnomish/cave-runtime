# parity.manifest.toml — cave-knative
# Upstream: knative/serving + knative/eventing  pinned knative-v1.22.0
#   https://github.com/knative/serving
#   https://github.com/knative/eventing
#
# Tag-scheme note: Knative tags releases as `knative-vX.Y.Z`,
# not `vX.Y.Z`. Latest stable is `knative-v1.22.0`.
#
# cave-knative ports the in-scope MVP surface of Knative Serving +
# Eventing in pure Rust:
#
#   SERVING:
#     - Ksvc (top-level Service) + ServiceSpec + ServiceStatus
#     - Configuration (desired state) + ConfigurationSpec/Status
#     - Revision (immutable code+config snapshot) + Spec/Status
#     - Route (traffic split) + RouteSpec/Status
#     - KPA autoscaler with stable + panic modes
#     - RevisionTemplateSpec (PodSpec + Container + EnvVar)
#     - TrafficTarget + validate_traffic + validate_template
#
#   EVENTING:
#     - EventingSource + EventingSink
#     - Channel
#     - Subscription
#     - Trigger + TriggerFilter
#
# Out of MVP (see [[skipped]] / [[unmapped]] below): queue-proxy
# sidecar, activator (cold-start request hold), broker controller,
# eventing-contrib transports (Kafka / RabbitMQ — runtime impl),
# admission webhook (cave-admission), domain-mapping,
# cert-manager integration, `build` (deprecated upstream — Burak's
# explicit "Out: build (deprecate)"), HPA-direct integration.

[upstream]
org         = "knative"
repo        = "serving"
version     = "knative-v1.22.0"
name        = "Knative Serving + Eventing"
license     = "Apache-2.0"
language    = "Go"
url         = "https://github.com/knative/serving"
source_sha  = "knative-v1.22.0"

[parity]
parity_ratio_source = "manifest"
fill_ratio          = 0.7520
honest_ratio        = 0.7520
last_audit          = "2026-05-19"
infra_only          = false
mapped_count        = 12
partial_count       = 0
skipped_count       = 9
unmapped_count      = 2
total               = 23

# fill_ratio derivation (Charter v2 honest measurement):
#   impl_lines               = 925   (cave-knative src/, excl tests + blanks/comments)
#   upstream_in_scope_lines  = 1 230 (sum of subsystem in-scope LOC)
#   925 / 1 230              = 0.7520
#
# Per-subsystem in-scope LOC against knative-v1.22.0:
# Serving:
#   pkg/apis/serving/v1/service_types.go              100 / 130
#   pkg/apis/serving/v1/configuration_types.go        100 / 100
#   pkg/apis/serving/v1/revision_types.go             150 / 230
#   pkg/apis/serving/v1/route_types.go                100 / 150
#   pkg/autoscaler/scaling/autoscaler.go (KPA)        250 / 350
#   pkg/apis/serving/v1/podspec.go                     60 /  60
#   pkg/apis/serving/v1/types.go (validators)          80 / 150
# Eventing:
#   pkg/apis/eventing/v1/broker_types.go               70 / 100
#   pkg/apis/eventing/v1/trigger_types.go              80 / 120
#   pkg/apis/messaging/v1/subscription_types.go        70 /  90
#   pkg/apis/messaging/v1/channel_types.go             70 /  80
#   pkg/apis/sources/v1/* (Source/Sink)               100 / 200
#  ─────────────────────────────────────
#  Total in-scope LOC                              1 230 upstream

[module]
name        = "cave-knative"
description = "Serverless workloads — Knative Serving + Eventing parity (Service/Configuration/Revision/Route, KPA, eventing primitives)"
source_root = "src"

# ── File mappings ───────────────────────────────────────────────────────────

[[files]]
upstream = "pkg/apis/serving/v1/service_types.go"
local    = "src/ksvc.rs"

[[files]]
upstream = "pkg/apis/serving/v1/configuration_types.go"
local    = "src/configuration.rs"

[[files]]
upstream = "pkg/apis/serving/v1/revision_types.go"
local    = "src/revision.rs"

[[files]]
upstream = "pkg/apis/serving/v1/route_types.go"
local    = "src/route.rs"

[[files]]
upstream = "pkg/autoscaler/scaling/autoscaler.go"
local    = "src/autoscaler.rs"

[[files]]
upstream = "pkg/apis/serving/v1/podspec.go"
local    = "src/meta.rs"

[[files]]
upstream = "pkg/apis/serving/v1/types.go"
local    = "src/meta.rs"

[[files]]
upstream = "pkg/apis/eventing/v1/broker_types.go"
local    = "src/eventing.rs"

[[files]]
upstream = "pkg/apis/eventing/v1/trigger_types.go"
local    = "src/eventing.rs"

[[files]]
upstream = "pkg/apis/messaging/v1/subscription_types.go"
local    = "src/eventing.rs"

[[files]]
upstream = "pkg/apis/messaging/v1/channel_types.go"
local    = "src/eventing.rs"

[[files]]
upstream = "pkg/apis/sources/v1/api_server_source_types.go"
local    = "src/eventing.rs"

# ── Function mappings ───────────────────────────────────────────────────────

[[functions]]
upstream_name = "v1.Service.Validate"
local_name    = "Ksvc::validate"
file          = "src/ksvc.rs"

[[functions]]
upstream_name = "scaling.Autoscaler.Scale"
local_name    = "Autoscaler::scale"
file          = "src/autoscaler.rs"

[[functions]]
upstream_name = "v1.Service.ScaleToZero"
local_name    = "Ksvc::scale_to_zero"
file          = "src/ksvc.rs"

[[functions]]
upstream_name = "v1.TrafficTarget.ValidatePercent"
local_name    = "validate_traffic"
file          = "src/meta.rs"

[[functions]]
upstream_name = "v1.RevisionTemplateSpec.Validate"
local_name    = "validate_template"
file          = "src/meta.rs"

# ── Mapped subsystems (Charter v2 [[mapped]]) ───────────────────────────────

[[mapped]]
name = "ksvc-crd"
upstream = "pkg/apis/serving/v1/service_types.go"
note = "Ksvc top-level Service CRD wrapping Configuration + Route; scale_to_zero + validate."

[[mapped]]
name = "configuration-crd"
upstream = "pkg/apis/serving/v1/configuration_types.go"
note = "Configuration spec + status; spawns Revisions."

[[mapped]]
name = "revision-crd"
upstream = "pkg/apis/serving/v1/revision_types.go"
note = "Immutable Revision snapshot; spec + status with autoscaling annotations."

[[mapped]]
name = "route-crd"
upstream = "pkg/apis/serving/v1/route_types.go"
note = "Route with TrafficTarget split + traffic-percent validators."

[[mapped]]
name = "autoscaler-kpa"
upstream = "pkg/autoscaler/scaling/autoscaler.go"
note = "Knative Pod Autoscaler — stable + panic modes; scale-to-zero grace; target concurrency."

[[mapped]]
name = "autoscaler-config"
upstream = "config/autoscaler"
note = "AutoscalerConfig — target_concurrency, min/max scale, stable/panic windows, panic_threshold."

[[mapped]]
name = "revision-template-spec"
upstream = "pkg/apis/serving/v1/podspec.go"
note = "RevisionTemplateSpec + PodSpec + Container + EnvVar primitives."

[[mapped]]
name = "traffic-target-validators"
upstream = "pkg/apis/serving/v1/types.go"
note = "validate_traffic (% sums to 100) + validate_template (containers >= 1)."

[[mapped]]
name = "eventing-source-sink"
upstream = "pkg/apis/sources/v1/*"
note = "EventingSource + EventingSink with CloudEvents attribute overrides + sink URI resolution."

[[mapped]]
name = "channel"
upstream = "pkg/apis/messaging/v1/channel_types.go"
note = "Channel CRD shell with subscribable+addressable status fields."

[[mapped]]
name = "subscription"
upstream = "pkg/apis/messaging/v1/subscription_types.go"
note = "Subscription linking Channel → Subscriber."

[[mapped]]
name = "trigger"
upstream = "pkg/apis/eventing/v1/trigger_types.go"
note = "Trigger + TriggerFilter with CloudEvents attribute matching."

