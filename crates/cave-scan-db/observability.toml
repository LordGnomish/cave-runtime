# observability.toml — cave-scan-db
# Charter v2 G8 minimum scaffold (alerts + dashboard stub).
# Deep observability surface arrives with the upstream-aligned
# dashboards when the consuming portal page exists. For now this
# file pins the self-audit pulse + a parity-drift watchdog so the
# 4-track gate passes for cave-scan-db (backend + manifest + obs +
# cavectl-or-portal future track).

[[panels]]
title  = "cave-scan-db parity self-audit pulse"
metric = "cave_scan_db_self_audit_passes_total"
type   = "stat"
description = "Counts successful runs of cave-scan-db::parity_self_audit; flat-line means the self-audit fixture stopped firing."

[[panels]]
title  = "cave-scan-db fill_ratio drift"
metric = "cave_scan_db_parity_fill_ratio"
type   = "gauge"
description = "Emitted by build-parity-index.py; alerts on drift > 0.05 from the manifest-declared ratio."

[[alerts]]
name     = "cave_scan_db_self_audit_failing"
expr     = "rate(cave_scan_db_self_audit_failures_total[5m]) > 0"
severity = "warning"
summary  = "cave-scan-db self-audit gate failing — Charter v2 invariant broken"
runbook  = "docs/runbooks/cave-scan-db-self-audit.md"

[[alerts]]
name     = "cave_scan_db_parity_drift"
expr     = "abs(cave_scan_db_parity_fill_ratio - cave_scan_db_parity_fill_ratio_declared) > 0.05"
severity = "info"
summary  = "cave-scan-db fill_ratio drifted >0.05 from manifest declaration"
runbook  = "docs/runbooks/cave-scan-db-parity-drift.md"
