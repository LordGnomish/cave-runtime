# parity.manifest.toml — cave-security
# Upstream: falcosecurity/falco  https://github.com/falcosecurity/falco  pinned v0.36.0
#
# cave-security has two upstream targets bundled together:
#   - Falco runtime detection (rules engine + condition lang + alert output) — primary
#   - Trivy-style scanning (image/fs/config + vuln DB + SBOM + secret scan + license + ignore)
# Mappings below use Falco as the primary upstream; the trivy/* slice is
# tracked here too so the calculator-format scoring covers both.

[upstream]
org     = "falcosecurity"
repo    = "falco"
version = "v0.36.0"
source_sha = "v0.36.0"  # G1: tag-based pin (deep-port may override)
name    = "Falco"
license = "Apache-2.0"
language= "C++"
url     = "https://github.com/falcosecurity/falco"

[parity]
ratio       = 0.0        # honest: 0.0 means upstream parity NOT yet measured
last_audit  = "2026-05-12"
infra_only  = false
[module]
name        = "cave-security"
description = "Falco-equivalent runtime detection (rules engine + condition lang + alerts) + Trivy-style image/fs/config scanning + SBOM"
source_root = "src"

# ── File mappings ────────────────────────────────────────────────────────────
