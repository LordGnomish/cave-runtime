# parity.manifest.toml — cave-security
# Upstream: falcosecurity/falco  https://github.com/falcosecurity/falco
# Skeleton generated by cave parity init — fill in the mapping sections

[upstream]
org     = "falcosecurity"
repo    = "falco"
version = "v0.36.0"

[module]
name        = "cave-security"
description = "Runtime security — Falco replacement"
source_root = "src"

# ── File mappings ────────────────────────────────────────────────────────────
# [[files]]
# upstream = "path/in/upstream/repo.go"
# local    = "src/local.rs"

# ── Function mappings ────────────────────────────────────────────────────────
# [[functions]]
# upstream_name = "UpstreamFunc"
# local_name    = "local_fn"
# file          = "src/routes.rs"

# ── Test mappings ────────────────────────────────────────────────────────────
# [[tests]]
# upstream_test = "TestUpstreamFunc"
# local_test    = "test_local_fn"

# ── Surface mappings ─────────────────────────────────────────────────────────
# [[surfaces]]
# kind          = "http"
# upstream_path = "/api/upstream"
# local_path    = "/api/security/endpoint"
