# parity.manifest.toml — cave-certs
# Upstream: cert-manager/cert-manager  https://github.com/cert-manager/cert-manager
# Skeleton generated by cave parity init — fill in the mapping sections

[upstream]
org     = "cert-manager"
repo    = "cert-manager"
version = "v1.13.0"
name    = "cert-manager"
license = "Apache-2.0"
language= "Go"
url     = "https://github.com/cert-manager/cert-manager"

[parity]
ratio       = 0.0        # honest: 0.0 means upstream parity NOT yet measured
last_audit  = "2026-05-12"
infra_only  = false
[module]
name        = "cave-certs"
description = "Certificate management — cert-manager replacement"
source_root = "src"

# ── File mappings ────────────────────────────────────────────────────────────
# [[files]]
# upstream = "path/in/upstream/repo.go"
# local    = "src/local.rs"

# ── Function mappings ────────────────────────────────────────────────────────
# [[functions]]
# upstream_name = "UpstreamFunc"
# local_name    = "local_fn"
# file          = "src/routes.rs"

# ── Test mappings ────────────────────────────────────────────────────────────
# [[tests]]
# upstream_test = "TestUpstreamFunc"
# local_test    = "test_local_fn"

# ── Surface mappings ─────────────────────────────────────────────────────────
