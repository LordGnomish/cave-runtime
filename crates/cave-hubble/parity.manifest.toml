# parity.manifest.toml — cave-hubble
# Upstream: cilium/hubble  https://github.com/cilium/hubble
# Skeleton generated by cave parity init — fill in the mapping sections

[upstream]
org     = "cilium"
repo    = "hubble"
version = "v0.13.0"

[module]
name        = "cave-hubble"
description = "Network observability — Hubble replacement"
source_root = "src"

