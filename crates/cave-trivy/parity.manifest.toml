# parity.manifest.toml — cave-trivy
# Upstream: aquasecurity/trivy  https://github.com/aquasecurity/trivy  pinned v0.70.0
# Companion: aquasecurity/trivy-checks  https://github.com/aquasecurity/trivy-checks  pinned v2.2.0
# Charter v2 deep-port close 2026-05-23.
#
# cave-trivy is the cave-runtime vulnerability + misconfig + secret +
# license scanner. It implements the trivy command surface (image / fs /
# repo / k8s / sbom / secret / config) on top of an offline CVE+GHSA+OSV
# database, per-ecosystem OS + language package detection, the Aqua
# AppShield misconfig ruleset, the Aqua secret rule catalog, CycloneDX
# 1.5 + SPDX 2.3 SBOM emission, OpenVEX 0.2.0 suppression, and the four
# report writers `table` / `json` / `sarif` / `template`.
#
# MVP scope (mapped + partial + scope_cuts):
#   - 7 scan targets: image, fs, repo, k8s, sbom, secret, config
#   - OS pkg detection: Alpine apk / Debian+Ubuntu dpkg / RHEL-family rpm text
#   - Language pkg detection: npm, yarn, pnpm, pip, pipenv, gem, go, cargo,
#     composer, maven (pom.xml), pub
#   - VulnDB: in-memory CVE/GHSA fixture + OSV 1.6 ingest
#   - Misconfig: Terraform AWS/GCP/Azure, K8s, Dockerfile, Helm
#   - Secrets: 30+ Aqua-equivalent regex rules + Aho-Corasick prefilter
#   - SBOM: CycloneDX 1.5 + SPDX 2.3 JSON
#   - VEX: OpenVEX 0.2.0
#   - Reports: table, json, sarif (2.1.0), Go-template subset
#   - K8s operator CRDs: VulnerabilityReport + ConfigAuditReport shapes
#   - Filter: --severity / --ignore-unfixed / --only-fixed / .trivyignore
#   - Cache: in-process content-addressed scan-result cache
#   - HTTP server: POST /trivy/scan + GET /trivy/reports + healthz
#
# Out of MVP (skipped / Phase 2 — see [[scope_cuts]] + [[skipped]]):
#   - Live registry pulls (cave-artifacts handles OCI client)
#   - Live git clone (delegated to cave-deploy)
#   - Live kubectl collector (delegated to cave-cri / kube-proxy)
#   - Online vuln-db sync (Phase 2 cave-vulns-sync)
#   - sled-backed persistent cache (deferred to Phase 2)
#   - Java DB (jar SHA1 → groupId:artifactId — cave-trivy-javadb Phase 2)
#   - Full RPM BDB / SQLite binary reader (text-format only)
#   - VM scanner (qcow2 / vmdk introspection)
#   - Custom Rego policy compiler (cave-policy owns OPA)
#   - GitHub native scan target + GitHub report writer
#   - Fuzz harness (cargo-fuzz workspace job)
#   - Plugin downloader / module marketplace
#   - Compliance reports (CIS / PCI / NSA-CISA — Phase 2 cave-compliance)
#   - SLSA provenance attestation generator (cave-sign owns SLSA)
#   - SBOM diff (Phase 2 cave-sbom)
#   - Notification dispatcher (cave-alerts owns alert routing)

[upstream]
org        = "aquasecurity"
repo       = "trivy"
version    = "v0.70.0"
name       = "Aqua Trivy"
license    = "Apache-2.0"
language   = "Go"
url        = "https://github.com/aquasecurity/trivy"
source_sha = "8a3177aedf7ee0864920eb1852eef031cd3742b8"

# Companion library — aquasecurity/trivy-checks — the curated misconfig
# rule catalogue that cave-trivy's `misconf` registry mirrors.
[[upstreams]]
org        = "aquasecurity"
repo       = "trivy-checks"
version    = "v2.2.0"
license    = "Apache-2.0"
language   = "Go+Rego"
url        = "https://github.com/aquasecurity/trivy-checks"
source_sha = "d7c9302130a9b7e614a5c5d32854f6a08b4bc52e"

[parity]
parity_ratio_source = "manifest"
fill_ratio          = 0.9714
honest_ratio        = 0.6571
last_audit          = "2026-05-23"
infra_only          = false
mapped_count        = 22
partial_count       = 1
skipped_count       = 11
unmapped_count      = 1
total               = 35

# 2026-05-23 Charter v2 deep-port — claude/cave-trivy-2026-05-23-deep:
#   * Pre-port: no cave-trivy crate existed; cave-{container-scan,vulns,
#     sbom,secrets,scan} cover orthogonal slices but no Trivy CLI parity.
#   * Deep-port shipped 23 src/ modules (5021 LOC) implementing the seven
#     scan targets + OS+lang pkg detection + offline DB + misconfig +
#     secrets + SBOM emit + report writers + cache + store + K8s operator
#     CRDs + HTTP server + engine orchestrator.
#   * Subsystem-count formula: fill_ratio = (mapped + partial + skipped) /
#     total = (22 + 1 + 11) / 35 = 0.9714.
#   * honest_ratio = (mapped + partial) / total = 23 / 35 = 0.6571 — 11
#     trivy subsystems are honestly cut to Phase 2 / sibling crates.
#   * source_sha pinned to trivy v0.70.0 commit
#     8a3177aedf7ee0864920eb1852eef031cd3742b8 + trivy-checks v2.2.0
#     d7c9302130a9b7e614a5c5d32854f6a08b4bc52e.

[module]
name        = "cave-trivy"
description = "Vulnerability scanner — Trivy reimplementation (image+fs+repo+k8s+sbom+secret+license+IaC+VEX+offline DB)"
source_root = "src"

