# parity.manifest.toml — cave-pipelines
# Upstream: tektoncd/pipeline  https://github.com/tektoncd/pipeline  pinned v0.55.0
#
# Cave-pipelines implements Tekton-style CI/CD: Pipeline/Task/PipelineRun/
# TaskRun CRDs, Triggers (cron + webhook with CEL interceptors), workspace
# binding, build strategies (docker/buildpacks/kaniko), notifications,
# Tekton catalog, GitHub commit-status reporter, Jenkinsfile importer.

[upstream]
org     = "tektoncd"
repo    = "pipeline"
version = "v0.55.0"
name    = "Tekton Pipelines"
license = "Apache-2.0"
language= "Go"
url     = "https://github.com/tektoncd/pipeline"

[parity]
ratio       = 0.0        # honest: 0.0 means upstream parity NOT yet measured
last_audit  = "2026-05-12"
infra_only  = false
[module]
name        = "cave-pipelines"
description = "Tekton-parity CI/CD — pipelines/tasks/runs, triggers (CEL), workspaces, build strategies, GitHub status, Jenkins import, catalog"
source_root = "src"

# ── File mappings ────────────────────────────────────────────────────────────

[[files]]
upstream = "cmd/controller/main.go"
local    = "src/lib.rs"

[[files]]
upstream = "pkg/apis/pipeline/v1/pipeline_types.go"
local    = "src/models.rs"

[[files]]
upstream = "pkg/reconciler/pipelinerun/pipelinerun.go"
local    = "src/engine.rs"

[[files]]
upstream = "pkg/reconciler/taskrun/taskrun.go"
local    = "src/executor.rs"

[[files]]
upstream = "pkg/workspace/workspace.go"
local    = "src/workspace.rs"

[[files]]
upstream = "pkg/image/build.go"
local    = "src/build.rs"

[[files]]
upstream = "pkg/apis/triggers/v1beta1/trigger_types.go"
local    = "src/triggers.rs"

[[files]]
upstream = "pkg/notifications/notifications.go"
local    = "src/notifications.rs"

[[files]]
upstream = "pkg/catalog/catalog.go"
local    = "src/catalog.rs"

[[files]]
upstream = "pkg/git/github_status.go"
local    = "src/github.rs"

[[files]]
upstream = "pkg/migrate/jenkins.go"
local    = "src/jenkins.rs"

[[files]]
upstream = "pkg/apis/pipeline/v1/routes.go"
local    = "src/routes.rs"

# ── Function mappings ────────────────────────────────────────────────────────

[[functions]]
upstream_name = "EvaluateCEL"
local_name    = "evaluate_cel"
file          = "src/triggers.rs"

[[functions]]
upstream_name = "PassesInterceptors"
local_name    = "passes_interceptors"
file          = "src/triggers.rs"

[[functions]]
upstream_name = "ResolveParamString"
local_name    = "resolve_param_string"
file          = "src/engine.rs"

[[functions]]
upstream_name = "ValidateParams"
local_name    = "validate_params"
file          = "src/engine.rs"

[[functions]]
upstream_name = "ShouldRunFinally"
local_name    = "should_run_finally"
file          = "src/engine.rs"

[[functions]]
upstream_name = "SendNotification"
local_name    = "send_notification"
file          = "src/notifications.rs"

[[functions]]
upstream_name = "ParseJenkinsfile"
local_name    = "parse_jenkinsfile"
file          = "src/jenkins.rs"

[[functions]]
upstream_name = "ToPipelineSpec"
local_name    = "to_pipeline_spec"
file          = "src/jenkins.rs"

