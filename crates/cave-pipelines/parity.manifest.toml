# parity.manifest.toml — cave-pipelines
# Upstream: tektoncd/pipeline  https://github.com/tektoncd/pipeline
# Skeleton generated by cave parity init — fill in the mapping sections

[upstream]
org     = "tektoncd"
repo    = "pipeline"
version = "v0.55.0"

[module]
name        = "cave-pipelines"
description = "CI/CD pipelines — Tekton replacement"
source_root = "src"

# ── File mappings ────────────────────────────────────────────────────────────
# [[files]]
# upstream = "path/in/upstream/repo.go"
# local    = "src/local.rs"

# ── Function mappings ────────────────────────────────────────────────────────
# [[functions]]
# upstream_name = "UpstreamFunc"
# local_name    = "local_fn"
# file          = "src/routes.rs"

# ── Test mappings ────────────────────────────────────────────────────────────
# [[tests]]
# upstream_test = "TestUpstreamFunc"
# local_test    = "test_local_fn"

# ── Surface mappings ─────────────────────────────────────────────────────────
# [[surfaces]]
# kind          = "http"
# upstream_path = "/api/upstream"
# local_path    = "/api/pipelines/endpoint"
