local    = "src/ambient/virtualservice.rs"

[[files]]
upstream = "pilot/pkg/networking/core/v1alpha3/cluster.go"
local    = "src/ambient/destinationrule.rs"

[[files]]
upstream = "security/pkg/pki/ca/ca.go"
local    = "src/ambient/svid.rs"

[[files]]
upstream = "pilot/pkg/networking/telemetry/telemetry.go"
local    = "src/ambient/telemetry.rs"

[[files]]
upstream = "pilot/pkg/networking/core/cluster_traffic_policy.go"
local    = "src/traffic_policy.rs"

# Wave-2 close-out (2026-05-19) — 2 unmapped → mapped

[[files]]
upstream = "pilot/pkg/networking/serviceentry/external"
local    = "src/vm_mesh.rs"

[[files]]
upstream = "https://github.com/istio/ztunnel/tree/release-1.29/src/state/policy"
local    = "src/ambient/l7_policy.rs"

[portal_ui]
upstream_ui  = "Kiali (Istio)"
upstream_url = "https://kiali.io/"
status       = "complete"
loc          = 484
priority     = "P0"
notes        = "Service-mesh topology; covered by admin/kiali.rs"
last_audit   = "2026-05-11"


