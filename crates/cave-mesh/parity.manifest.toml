# parity.manifest.toml — cave-mesh
# Upstream: istio/istio  https://github.com/istio/istio
# Skeleton generated by cave parity init — fill in the mapping sections

[upstream]
org     = "istio"
repo    = "istio"
version = "v1.20.0"

[module]
name        = "cave-mesh"
description = "Service mesh — Istio replacement"
source_root = "src"

# ── File mappings ────────────────────────────────────────────────────────────
# [[files]]
# upstream = "path/in/upstream/repo.go"
# local    = "src/local.rs"

# ── Function mappings ────────────────────────────────────────────────────────
# [[functions]]
# upstream_name = "UpstreamFunc"
# local_name    = "local_fn"
# file          = "src/routes.rs"

# ── Test mappings ────────────────────────────────────────────────────────────
# [[tests]]
# upstream_test = "TestUpstreamFunc"
# local_test    = "test_local_fn"

# ── Surface mappings ─────────────────────────────────────────────────────────
# [[surfaces]]
# kind          = "http"
# upstream_path = "/api/upstream"
# local_path    = "/api/mesh/endpoint"
