# parity.manifest.toml — cave-mesh
# Upstream: istio/istio  https://github.com/istio/istio
# Tracks the Ambient-mode pieces (ztunnel, waypoint) plus the legacy
# control-plane surface (Pilot xDS, security, telemetry).

[upstream]
org     = "istio"
repo    = "istio"
version = "1.29.2"
name    = "Istio"
license = "Apache-2.0"
language= "Go"
url     = "https://github.com/istio/istio"
[parity]
# Package-level inventory against istio/istio v1.29 + ambient-mode
# add-ons (ztunnel, waypoint). Inventory hand-curated 2026-05-12
# against the Istio repo layout (pilot/, security/, telemetry/,
# istioctl/, operator/, cni/, pkg/) plus the ztunnel repo.
# The ambient-mode layer in `src/ambient/` is the cave-side entry
# point; legacy control-plane bits live alongside.
mapped_count   = 14
skipped_count  = 13
unmapped_count = 8
total          = 35
fill_ratio     = 0.7714
last_audit     = "2026-05-12"
infra_only     = false

[module]
name        = "cave-mesh"
description = "Service mesh — Istio-parity control plane (sidecar + ambient mode: ztunnel L4 mTLS, waypoint L7 routing, AuthZ, VS/DR, SPIFFE, telemetry)"
source_root = "src"
pump_priority = "HIGH"  # qwen-pump B-prime priority gate
target_tests = 30        # qwen-pump B-prime target (#[test] count in tests/qwen_drafted.rs); below this, B-prime fires

# ── Ambient-mode file mappings (this batch) ──────────────────────────────────
[[files]]
upstream = "pkg/hbone/server.go"
local    = "src/ambient/hbone.rs"

# ztunnel lives in a separate Rust repo upstream — we cite it explicitly.
[[files]]
upstream = "https://github.com/istio/ztunnel/blob/release-1.29/src/proxy/inbound.rs"
local    = "src/ambient/ztunnel.rs"

[[files]]
upstream = "pilot/pkg/networking/core/v1alpha3/waypoint.go"
local    = "src/ambient/waypoint.rs"

[[files]]
upstream = "pilot/pkg/security/authz/builder/builder.go"
local    = "src/ambient/authz.rs"

[[files]]
upstream = "pilot/pkg/networking/core/v1alpha3/route/route.go"
local    = "src/ambient/virtualservice.rs"

[[files]]
upstream = "pilot/pkg/networking/core/v1alpha3/cluster.go"
local    = "src/ambient/destinationrule.rs"

[[files]]
upstream = "security/pkg/pki/ca/ca.go"
local    = "src/ambient/svid.rs"

[[files]]
upstream = "pilot/pkg/networking/telemetry/telemetry.go"
local    = "src/ambient/telemetry.rs"

[portal_ui]
upstream_ui  = "Kiali (Istio)"
upstream_url = "https://kiali.io/"
status       = "complete"
loc          = 484
priority     = "P0"
notes        = "Service-mesh topology; covered by admin/kiali.rs"
last_audit   = "2026-05-11"


