# parity.manifest.toml — cave-mesh
# Upstream: istio/istio  https://github.com/istio/istio
# Cave Runtime no-backcompat mandate: Ambient-only. The sidecar data
# plane (Sidecar / EnvoyFilter / WorkloadGroup CRDs, xDS v3
# LDS/RDS/CDS/EDS/SDS streams, Envoy WASM filter runtime) is removed
# from the workspace, not deferred — see [[skipped]] block + the
# 2026-05-19 ambient-only sweep.

[upstream]
org        = "istio"
repo       = "istio"
version    = "1.30.0"
source_sha = "badd809ed7d57954d4c16e12e75e15a7722a7b96"   # istio v1.30.0 commit (tag → commit deref)
name       = "Istio"
license    = "Apache-2.0"
language   = "Go"
url        = "https://github.com/istio/istio"
[parity]
# Package-level inventory against istio/istio v1.30.0 + ambient-mode
# add-ons (ztunnel, waypoint). 2026-05-19 ambient-only re-baseline:
# 3 previously-mapped sidecar packages (sidecar, proxy, pilot xds)
# and 1 previously-partial (Envoy extension/wasm) moved to [[skipped]]
# under the Cave Runtime no-backcompat Ambient-only mandate; new
# pkg/wasm/ skipped entry added (was reported as unmapped, now
# explicitly out-of-scope). Net: total 36 → 37, mapped 17 → 14,
# partial 2 → 1, skipped 13 → 18, unmapped 4 → 4.
mapped_count        = 16
partial_count       = 1
skipped_count       = 20
unmapped_count      = 0
total               = 37
fill_ratio          = 1.0      # (mapped + partial + skipped) / total = 37/37
honest_ratio        = 0.9730   # (mapped + skipped) / total = 36/37 — partial excluded
parity_ratio_source = "manifest"
last_audit          = "2026-05-19"
infra_only          = false
# Wave-2 close-out (2026-05-19):
#   * VM-mesh expansion: unmapped → mapped (src/vm_mesh.rs).
#   * Ambient L7 policy chain: unmapped → mapped (src/ambient/l7_policy.rs).
#   * AnalyticsClient (vendor backend telemetry): unmapped → skipped.
#   * istioctl analyze/debug (CLI tooling, cavectl absorbs): unmapped → skipped.

[module]
name        = "cave-mesh"
description = "Service mesh — ambient-only mode (ztunnel L4 mTLS + waypoint L7 routing, AuthZ, VS/DR, SPIFFE, telemetry). Sidecar/EnvoyFilter/WorkloadGroup CRDs + xDS v3 streams + Envoy WASM filters are intentionally absent per Cave Runtime no-backcompat mandate."
source_root = "src"
pump_priority = "HIGH"  # qwen-pump B-prime priority gate
target_tests = 30        # qwen-pump B-prime target (#[test] count in tests/qwen_drafted.rs); below this, B-prime fires

# ── Scope cuts (Ambient-only mandate, 2026-05-19) ────────────────────────────
# The five `src/*.rs` files listed below were deleted from the workspace in
# commit `d1b4e0c6` (chore(mesh): remove sidecar legacy + xDS + WASM —
# Ambient-only mandate enforcement). They are NOT deferred work; they are
# permanently out-of-scope. See `[[skipped]]` entries flagged with
# `reason = "ambient-only-mandate"` for the per-package record.
[[scope_cuts]]
removed_files = [
    "src/sidecar.rs",       # 297 LOC — SidecarManager + EnvoyFilterManager + WorkloadGroupManager
    "src/xds.rs",           # 1095 LOC — xDS v3 LDS/RDS/CDS/EDS/SDS snapshot stream
    "src/proxy.rs",         # 257 LOC — Envoy sidecar proxy abstraction
    "src/wasm_plugin.rs",   # 460 LOC — Envoy WASM filter CRD lifecycle
    "src/wasm_runtime.rs",  # 601 LOC — wasmtime-backed proxy-wasm runtime
]
removed_loc     = 2710
mandate         = "Cave Runtime no-backcompat Ambient-only"
ambient_replacement = "src/ambient/{ztunnel.rs,waypoint.rs,hbone.rs,svid.rs,authz.rs,telemetry.rs,virtualservice.rs,destinationrule.rs}"
phase_2_backlog = [
    "Ambient telemetry deep (per-workload metrics labels + tracing exemplars)",
    "Multi-cluster ambient federation (cross-mesh ztunnel peering)",
    "IPv6 dual-stack waypoint",
]

# ── Ambient-mode file mappings (this batch) ──────────────────────────────────
[[files]]
upstream = "pkg/hbone/server.go"
local    = "src/ambient/hbone.rs"

# ztunnel lives in a separate Rust repo upstream — we cite it explicitly.
[[files]]
upstream = "https://github.com/istio/ztunnel/blob/release-1.29/src/proxy/inbound.rs"
local    = "src/ambient/ztunnel.rs"

[[files]]
upstream = "pilot/pkg/networking/core/v1alpha3/waypoint.go"
local    = "src/ambient/waypoint.rs"

[[files]]
