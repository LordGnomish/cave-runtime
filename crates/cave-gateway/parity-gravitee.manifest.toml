# parity-gravitee.manifest.toml — cave-gateway/gravitee sub-module
#
# Companion manifest for the Gravitee half of cave-gateway. cave-kernel's
# discover_workspace currently only reads parity.manifest.toml (one
# upstream per crate) — this file therefore is read documentation /
# future-tool input today, same pattern as cave-artifacts'
# parity-harbor.manifest.toml + parity-nexus.manifest.toml.
#
# cave-gateway is a Kong + Gravitee multi-upstream consolidation per
# ADR-RUNTIME-API-GATEWAY-CONSOLIDATION-001. Kong covers the proxy data
# path (mapped in parity.manifest.toml as the primary [upstream]); this
# file maps the Gravitee management + portal + governance surface.

[upstream]
org     = "gravitee-io"
repo    = "gravitee-api-management"
version = "v4.4.0"

[module]
name        = "cave-gateway-gravitee"
description = "Gravitee API/plan/application/subscription management surface, developer portal, governance, federation"
source_root = "src/gravitee"

