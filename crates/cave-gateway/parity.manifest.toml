# parity.manifest.toml — cave-gateway
# Upstream: Kong/kong  https://github.com/Kong/kong  pinned v3.5.0
#
# cave-gateway covers the Kong-equivalent surface (admin API, runloop proxy,
# load balancer, healthchecks, plugin chain) plus an Envoy-style xDS shim
# (src/xds.rs) and a Gravitee-derived API portal/catalog/federation slice
# (src/gravitee/*). The calculator-format mappings below pin the Kong
# correspondence; the wider feature set is documented in src/lib.rs.

[upstream]
org     = "Kong"
repo    = "kong"
version = "v3.5.0"

[module]
name        = "cave-gateway"
description = "API gateway — Kong reimplementation + Envoy xDS surface + Gravitee API portal/catalog"
source_root = "src"

