# ── Surface mappings ─────────────────────────────────────────────────────────
# Kong admin API surfaces map to /admin/v1/* (Kong-compatible) under
# cave-gateway. Gravitee management surfaces map to /api/gateway/gravitee/*
# (see parity-gravitee.manifest.toml for those entries).

[[surfaces]]
kind          = "http"
upstream_path = "/services"
local_path    = "/admin/v1/services"

[[surfaces]]
kind          = "http"
upstream_path = "/services/{id}"
local_path    = "/admin/v1/services/{id_or_name}"

[[surfaces]]
kind          = "http"
upstream_path = "/upstreams"
local_path    = "/admin/v1/upstreams"

[[surfaces]]
kind          = "http"
upstream_path = "/consumers"
local_path    = "/admin/v1/consumers"

[[surfaces]]
kind          = "http"
upstream_path = "/upstreams/{id}/targets"
local_path    = "/admin/v1/upstreams/{id_or_name}/targets"

[[surfaces]]
kind          = "http"
upstream_path = "/upstreams/{id}/health"
local_path    = "/admin/v1/upstreams/{id_or_name}/health"

[[surfaces]]
kind          = "http"
upstream_path = "/routes"
local_path    = "/admin/v1/routes"

[[surfaces]]
kind          = "http"
upstream_path = "/plugins"
local_path    = "/admin/v1/plugins"
