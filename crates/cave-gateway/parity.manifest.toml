# ── Surface mappings ─────────────────────────────────────────────────────────
# Kong admin API surfaces map to /api/v1/gateway/* under cave-gateway. Envoy
# xDS surfaces also live in cave-gateway under /xds/v3/* (xds.rs).

[[surfaces]]
kind          = "http"
upstream_path = "/services"
local_path    = "/services"

[[surfaces]]
kind          = "http"
upstream_path = "/services/{id}"
local_path    = "/services/{id_or_name}"

[[surfaces]]
kind          = "http"
upstream_path = "/upstreams"
local_path    = "/upstreams"

[[surfaces]]
kind          = "http"
upstream_path = "/consumers"
local_path    = "/consumers"

[[surfaces]]
kind          = "http"
upstream_path = "/upstreams/{id}/targets"
local_path    = "/upstreams/{id_or_name}/targets"

[[surfaces]]
kind          = "http"
upstream_path = "/upstreams/{id}/health"
local_path    = "/upstreams/{id_or_name}/health"

[[surfaces]]
kind          = "http"
upstream_path = "/status"
local_path    = "/api/v1/gateway/billing/usage"

[[surfaces]]
