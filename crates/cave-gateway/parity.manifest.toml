# parity.manifest.toml — cave-gateway
# Upstream: Kong/kong  https://github.com/Kong/kong
# Skeleton generated by cave parity init — fill in the mapping sections

[upstream]
org     = "Kong"
repo    = "kong"
version = "v3.5.0"

[module]
name        = "cave-gateway"
description = "API gateway — Kong replacement"
source_root = "src"

# ── File mappings ────────────────────────────────────────────────────────────
# [[files]]
# upstream = "path/in/upstream/repo.go"
# local    = "src/local.rs"

# ── Function mappings ────────────────────────────────────────────────────────
# [[functions]]
# upstream_name = "UpstreamFunc"
# local_name    = "local_fn"
# file          = "src/routes.rs"

# ── Test mappings ────────────────────────────────────────────────────────────
# [[tests]]
# upstream_test = "TestUpstreamFunc"
# local_test    = "test_local_fn"

# ── Surface mappings ─────────────────────────────────────────────────────────
# [[surfaces]]
# kind          = "http"
# upstream_path = "/api/upstream"
# local_path    = "/api/gateway/endpoint"
