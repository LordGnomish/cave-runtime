# parity.manifest.toml — cave-gateway
# Upstream: Kong/kong  https://github.com/Kong/kong  pinned v3.5.0
#
# cave-gateway is a Kong + Gravitee multi-upstream consolidation crate per
# ADR-RUNTIME-API-GATEWAY-CONSOLIDATION-001. Kong covers the proxy data path
# (admin API, runloop proxy, balancer, healthchecks, plugin chain) and is
# recorded here as the primary upstream — cave-kernel's discover_workspace
# reads one [upstream] per parity.manifest.toml. The Gravitee half (API /
# Plan / Application / Subscription management surface, developer portal,
# governance, federation) lives under src/gravitee/* and is documented in
# the companion parity-gravitee.manifest.toml in this directory; same
# multi-upstream + companion-manifest pattern as cave-artifacts (Pulp +
# Harbor + Nexus).
#
# 2026-05-02 — Envoy xDS surface removed. Envoy was a "rejected alternative"
# in seven ADRs and the previous src/xds.rs file along with its mappings
# (LDS/RDS/CDS/EDS) is gone. The crate is now Kong + Gravitee canonical.

[upstream]
org     = "Kong"
repo    = "kong"
version = "v3.5.0"
name    = "Kong"
license = "Apache-2.0"
language= "Lua"
url     = "https://github.com/Kong/kong"

[parity]
ratio       = 0.0        # honest: 0.0 means upstream parity NOT yet measured
last_audit  = "2026-05-12"
infra_only  = false
[module]
name        = "cave-gateway"
description = "API gateway — Kong reimplementation + Gravitee API/plan/application/subscription surface + portal/catalog/governance"
source_root = "src"

