# parity.manifest.toml — cave-kamaji
# Upstream: clastix/kamaji  https://github.com/clastix/kamaji
# Skeleton generated by cave parity init — fill in the mapping sections

[upstream]
org     = "clastix"
repo    = "kamaji"
version = "v1.0.0"

[module]
name        = "cave-kamaji"
description = "Hosted control planes — Kamaji replacement"
source_root = "src"

