reason = "Prometheus metrics export — Phase 2 alongside obs-stack."

# ── Unmapped subsystems (in-scope but not yet ported) ───────────────────────

[[unmapped]]
name = "control-plane-pod-mgmt"
upstream = "internal/resources/kubeapiserver"
reason = "Real kube-apiserver pod orchestration — paired with kubeadm-init bootstrap in Phase 2."

[[unmapped]]
name = "webhook-validation"
upstream = "internal/webhook"
reason = "Admission webhook validation — cave-admission owns this surface; defer."

[portal_ui]
upstream_ui  = "(CRD-only)"
upstream_url = "https://kamaji.clastix.io/"
status       = "partial"
loc          = 164
priority     = "P2"
notes        = "Kamaji is CRD/CLI upstream; /admin/kamaji Phase 2 alongside multi-tenant data-plane."
last_audit   = "2026-05-19"
