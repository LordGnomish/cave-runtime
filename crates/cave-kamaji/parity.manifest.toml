# parity.manifest.toml — cave-kamaji
# Upstream: clastix-labs/kamaji  https://github.com/clastix-labs/kamaji  pinned v1.0.0
#
# cave-kamaji ports the in-scope MVP surface of Kamaji — Kubernetes
# hosted-control-plane management — in pure Rust: the
# TenantControlPlane CRD shape (spec + 5-phase status), a phase
# transition machine (Provisioning → Running → Deleting → Failed),
# a Kubernetes-style kubeconfig generator, a REST API
# (axum-mounted CRUD + kubeconfig endpoint), and an in-memory
# DashMap-backed store.
#
# Out of MVP (see [[skipped]] / [[unmapped]] below): certificate
# controller (cert-manager integration), datastore management
# (PostgreSQL / shared etcd / MySQL — multi-tenant data-plane
# backends), kubeadm-init bootstrap, konnectivity-server,
# Cluster API integration (Burak's Phase 2 deferral per
# cave_runtime_kamaji_not_vcluster memory), metrics export.
#
# NOTE: vcluster is NOT a target — see ADR / Charter decision and
# cave_runtime_kamaji_not_vcluster memory.

[upstream]
org         = "clastix-labs"
repo        = "kamaji"
version     = "v1.0.0"
name        = "Kamaji"
license     = "Apache-2.0"
language    = "Go"
url         = "https://github.com/clastix-labs/kamaji"
source_sha  = "v1.0.0"

[parity]
parity_ratio_source = "manifest"
fill_ratio          = 0.6429
honest_ratio        = 0.6429
last_audit          = "2026-05-19"
infra_only          = false
mapped_count        = 6
partial_count       = 0
skipped_count       = 8
unmapped_count      = 2
total               = 16

# fill_ratio derivation (Charter v2 honest measurement):
#   impl_lines               = 180  (cave-kamaji src/, excl tests + blanks/comments)
#   upstream_in_scope_lines  = 280  (sum of subsystem in-scope LOC, see below)
#   180 / 280                = 0.6429
#
# Per-subsystem in-scope LOC against v1.0.0:
#   api/v1alpha1/tenantcontrolplane_types.go      100 / 250 (spec + status core)
#   internal/controllers/tcp_controller.go         60 / 600 (lifecycle phase transitions)
#   internal/utilities/kubeconfig.go               50 / 100 (kubeconfig gen)
#   internal/resources/cert_controller.go (skip-edge) 40 / 400 (cert mgmt; mostly skipped)
#   internal/datastore/* (skip-edge)               30 / 250 (datastore mgmt; mostly skipped)
#  ─────────────────────────────────────
#  Total in-scope LOC                            280 upstream

[module]
name        = "cave-kamaji"
description = "Hosted control planes — Kamaji TenantControlPlane CRD + lifecycle + REST API + kubeconfig"
source_root = "src"
pump_priority = "HIGH"
target_tests = 30

# ── File mappings ───────────────────────────────────────────────────────────

[[files]]
upstream = "api/v1alpha1/tenantcontrolplane_types.go"
local    = "src/models.rs"

[[files]]
upstream = "internal/controllers/tenantcontrolplane_controller.go"
local    = "src/lifecycle.rs"

[[files]]
upstream = "internal/utilities/kubeconfig.go"
local    = "src/lifecycle.rs"

# ── Function mappings ───────────────────────────────────────────────────────

[[functions]]
upstream_name = "v1alpha1.TenantControlPlane.Provision"
local_name    = "lifecycle::provision"
file          = "src/lifecycle.rs"

[[functions]]
upstream_name = "v1alpha1.TenantControlPlane.MarkRunning"
local_name    = "lifecycle::mark_running"
file          = "src/lifecycle.rs"

[[functions]]
upstream_name = "v1alpha1.TenantControlPlane.Deprovision"
local_name    = "lifecycle::deprovision"
file          = "src/lifecycle.rs"

[[functions]]
upstream_name = "utilities.GenerateKubeconfig"
local_name    = "lifecycle::generate_kubeconfig"
file          = "src/lifecycle.rs"

# ── Mapped subsystems (Charter v2 [[mapped]]) ────────────────────────────────

[[mapped]]
name = "tcp-spec"
upstream = "api/v1alpha1/tenantcontrolplane_types.go"
note = "TenantSpec + TenantControlPlane wire shape with kubernetes_version / data_store / replicas."

[[mapped]]
name = "tcp-status-phases"
upstream = "api/v1alpha1/tenantcontrolplane_status.go"
note = "TenantStatus + TenantPhase enum (Provisioning/Running/Upgrading/Deleting/Failed)."

[[mapped]]
name = "lifecycle-phase-machine"
upstream = "internal/controllers/tenantcontrolplane_controller.go"
note = "provision / mark_running / deprovision / health_check transitions + tracing instrumentation."

[[mapped]]
name = "kubeconfig-generator"
upstream = "internal/utilities/kubeconfig.go"
note = "Standard kubeconfig JSON (apiVersion/clusters/contexts/users) keyed on tcp.status.api_server_endpoint."

[[mapped]]
name = "rest-api"
upstream = "(Cave-specific HTTP surface)"
note = "axum router /api/kamaji/tenants{,/:id,/:id/kubeconfig} — CRUD + kubeconfig endpoint."

[[mapped]]
name = "in-memory-store"
upstream = "(local — Cave runtime hold)"
note = "DashMap<Uuid, TenantControlPlane>; persistence Phase 2 alongside datastore tracks."

# ── Skipped subsystems (out-of-scope MVP) ───────────────────────────────────

[[skipped]]
name = "cert-controller"
upstream = "internal/resources/cert"
reason = "cert-manager integration — Phase 2; cave-certs owns this surface."

[[skipped]]
name = "datastore-postgresql"
upstream = "internal/datastore/postgresql"
reason = "PostgreSQL data-plane backend — Phase 2; gated on cave-rdbms operator multi-tenant story."

[[skipped]]
name = "datastore-etcd-shared"
upstream = "internal/datastore/etcd"
reason = "Shared etcd back-end — Phase 2; pairs with cave-etcd multi-tenant slicing."

[[skipped]]
name = "datastore-mysql"
upstream = "internal/datastore/mysql"
reason = "MySQL/MariaDB back-end — Phase 2; same wave as PostgreSQL data plane."

[[skipped]]
name = "kubeadm-init-bootstrap"
upstream = "internal/utilities/kubeadm"
reason = "kubeadm-init invocation — Phase 2; requires real kube-apiserver pod orchestration."

[[skipped]]
