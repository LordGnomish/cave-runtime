# parity.manifest.toml — cave-chat
# Upstream: danny-avila/LibreChat  https://github.com/danny-avila/LibreChat
# Skeleton generated by cave parity init — fill in the mapping sections

[upstream]
org     = "danny-avila"
repo    = "LibreChat"
version = "v0.7.0"
name    = "LibreChat"
license = "MIT"
language= "TypeScript"
url     = "https://github.com/danny-avila/LibreChat"

[parity]
ratio       = 0.0        # honest: 0.0 means upstream parity NOT yet measured
last_audit  = "2026-05-12"
infra_only  = false
[module]
name        = "cave-chat"
description = "Team chat — LibreChat replacement"
source_root = "src"

