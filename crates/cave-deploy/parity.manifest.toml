# parity.manifest.toml — cave-deploy
# Upstream: argoproj/argo-cd  https://github.com/argoproj/argo-cd
# Skeleton generated by cave parity init — fill in the mapping sections

[upstream]
org     = "argoproj"
repo    = "argo-cd"
version = "v2.9.0"

[module]
name        = "cave-deploy"
description = "GitOps deployment — ArgoCD replacement"
source_root = "src"

# ── File mappings ────────────────────────────────────────────────────────────
# [[files]]
# upstream = "path/in/upstream/repo.go"
# local    = "src/local.rs"

# ── Function mappings ────────────────────────────────────────────────────────
# [[functions]]
# upstream_name = "UpstreamFunc"
# local_name    = "local_fn"
# file          = "src/routes.rs"

# ── Test mappings ────────────────────────────────────────────────────────────
# [[tests]]
# upstream_test = "TestUpstreamFunc"
# local_test    = "test_local_fn"

# ── Surface mappings ─────────────────────────────────────────────────────────
# [[surfaces]]
# kind          = "http"
# upstream_path = "/api/upstream"
# local_path    = "/api/deploy/endpoint"
