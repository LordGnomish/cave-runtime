# parity.manifest.toml — cave-deploy
# Upstream: argoproj/argo-cd  https://github.com/argoproj/argo-cd  pinned v2.9.0
#
# Cave-deploy implements GitOps continuous deployment — Application/AppProject/
# AppSet CRDs, sync engine with hooks/waves, drift detection, RBAC,
# notifications, multi-cluster fan-out, and rollback via revision history.

[upstream]
org     = "argoproj"
repo    = "argo-cd"
version = "v2.9.0"
name    = "Argo CD"
license = "Apache-2.0"
language= "Go"
url     = "https://github.com/argoproj/argo-cd"

[parity]
ratio       = 0.0        # honest: 0.0 means upstream parity NOT yet measured
last_audit  = "2026-05-12"
infra_only  = false
[module]
name        = "cave-deploy"
description = "GitOps continuous deployment — ArgoCD parity (sync engine, app of apps, hooks/waves, drift, rollback, RBAC, notifications)"
source_root = "src"

# ── File mappings ────────────────────────────────────────────────────────────

[[files]]
upstream = "cmd/argocd-server/main.go"
local    = "src/lib.rs"

[[files]]
upstream = "pkg/apis/application/v1alpha1/types.go"
local    = "src/models.rs"

[[files]]
upstream = "applicationset/controllers/applicationset_controller.go"
local    = "src/appset.rs"

[[files]]
upstream = "controller/cache/cache.go"
local    = "src/cluster.rs"

[[files]]
upstream = "util/argo/diff/diff.go"
local    = "src/diff.rs"

[[files]]
upstream = "reposerver/repository/repository.go"
local    = "src/gitops.rs"

[[files]]
upstream = "controller/health.go"
local    = "src/health.rs"

[[files]]
upstream = "util/notification/notification.go"
local    = "src/notifications.rs"

[[files]]
upstream = "util/rbac/rbac.go"
local    = "src/rbac.rs"

[[files]]
upstream = "controller/sync.go"
local    = "src/sync.rs"

[[files]]
upstream = "controller/state.go"
local    = "src/store.rs"

[[files]]
upstream = "controller/rollouts.go"
local    = "src/rollout.rs"

[[files]]
upstream = "server/application/application.go"
local    = "src/routes.rs"

[[files]]
upstream = "util/errors/errors.go"
local    = "src/error.rs"

