# parity.manifest.toml — cave-net
# Upstream: flannel-io/flannel  https://github.com/flannel-io/flannel
# Skeleton generated by cave parity init — fill in the mapping sections

[upstream]
org     = "flannel-io"
repo    = "flannel"
version = "v0.23.0"

[module]
name        = "cave-net"
description = "Container networking — Flannel replacement"
source_root = "src"

# ── File mappings ────────────────────────────────────────────────────────────
# [[files]]
# upstream = "path/in/upstream/repo.go"
# local    = "src/local.rs"

# ── Function mappings ────────────────────────────────────────────────────────
# [[functions]]
# upstream_name = "UpstreamFunc"
# local_name    = "local_fn"
# file          = "src/routes.rs"

# ── Test mappings ────────────────────────────────────────────────────────────
# [[tests]]
# upstream_test = "TestUpstreamFunc"
# local_test    = "test_local_fn"

# ── Surface mappings ─────────────────────────────────────────────────────────
# [[surfaces]]
# kind          = "http"
# upstream_path = "/api/upstream"
# local_path    = "/api/net/endpoint"
