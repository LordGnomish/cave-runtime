# parity.manifest.toml — cave-net
# Upstream: cilium/cilium  https://github.com/cilium/cilium  pinned v1.19.3
#
# This manifest enumerates every upstream Cilium top-level dir and pkg/<name>/
# subpackage and classifies each as one of:
#
#   [[mapped]]   — at least one src/cilium/*.rs file cites a Go file inside it
#   [[skipped]]  — explicitly out-of-scope. Per the sprint contract, skipped is
#                  reserved for: UI/spec | CLI tooling | orchestrator-handles |
#                  backcompat. Anything else must be mapped or unmapped.
#   [[unmapped]] — real port gap, acknowledged honestly
#
# Contract: fill_ratio = (mapped + skipped) / total
# See crates/cave-net/PARITY_REPORT.md for what wire-faithful does and does not
# mean here, and the explicit list of items left for follow-up sprints.

[upstream]
org     = "cilium"
repo    = "cilium"
version = "v1.19.3"
# inventory fetched via GitHub API (recursive=1)
upstream_files_total       = 2827  # non-vendor non-generated non-test .go
upstream_pkg_dirs_total    = 118   # distinct pkg/<name>/ directories
upstream_bpf_c_h_files     = 302   # bpf/**/*.{c,h}
name    = "Cilium"
license = "Apache-2.0"
language= "Go"
url     = "https://github.com/cilium/cilium"
[module]
name          = "cave-net"
description   = "Cilium parity port — agent-side state machines, CRDs, REST/gRPC surface, Prometheus metrics. Datapath is semantic; see PARITY_REPORT.md for wire-faithful exclusions."
source_root   = "src"
target_tests = 30        # qwen-pump B-prime target (#[test] count in tests/qwen_drafted.rs); below this, B-prime fires
pump_priority = "HIGH"  # charter-critical 7 — networking control plane
rs_files          = 86    # crates/cave-net/src/cilium/*.rs
rs_loc            = 35938
tests_passing     = 1759
todos_unimpl      = 0     # 0 todo!/unimplemented! (verified by rg)

[parity]
mapped_count    = 117
skipped_count   = 17
unmapped_count  = 0
total           = 134
fill_ratio      = 1.0000

