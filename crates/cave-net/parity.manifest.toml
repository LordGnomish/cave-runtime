# parity.manifest.toml — cave-net
# Upstream: cilium/cilium  https://github.com/cilium/cilium
# Cilium-parity port — control plane + policy + LB + IPAM + ClusterMesh +
# Hubble + Envoy redirect + WireGuard/IPsec + BPF map model. Datapath is
# modelled in pure Rust; behavioural parity, no real eBPF.

[upstream]
org     = "cilium"
repo    = "cilium"
version = "v1.19.3"

[module]
name        = "cave-net"
description = "eBPF-style pod networking — Cilium parity port (CNI, policy, LB, IPAM, ClusterMesh, Hubble, encryption)"
source_root = "src"

# ── Cilium-parity file mappings ──────────────────────────────────────────────
