# ─── Unmapped (acknowledged port gaps) ───────────────────────────────────────

[[unmapped]]
upstream_pkg = "bpf/"
note         = "Real eBPF bytecode generation (302 C/H files). cave-net ports the semantic state machines (conntrack/nat/lb/srv6/ipv6/bpf_loader) but does not emit BPF bytecode — would need libbpf + clang + kernel-verifier integration on the build host. Wire-faithful exclusion #1."

[[unmapped]]
upstream_pkg = "pkg/aws/"
note         = "Cloud-provider IPAM (ENI). Cluster-pool IPAM is the supported path; AWS ENI needs the AWS SDK + credentials story. Wire-faithful exclusion #4."

[[unmapped]]
upstream_pkg = "pkg/azure/"
note         = "Cloud-provider IPAM (Azure). Cluster-pool IPAM is the supported path; Azure-IPAM needs the Azure SDK. Wire-faithful exclusion #4."

[[unmapped]]
upstream_pkg = "pkg/alibabacloud/"
note         = "Cloud-provider IPAM (AlibabaCloud). Cluster-pool IPAM is the supported path; needs the Alibaba SDK. Wire-faithful exclusion #4."

[[unmapped]]
upstream_pkg = "pkg/bpf/"
note         = "Userspace eBPF map/program management. cave-net keeps a semantic state-machine port (in-process map model); upstream's libbpf-backed loader + kernel verifier interaction are not implemented. Wire-faithful exclusion #1 (userspace half)."

[[unmapped]]
upstream_pkg = "pkg/ebpf/"
note         = "Cilium's Go ebpf wrapper around cilium/ebpf upstream library. Same scope cut as pkg/bpf/ — no kernel-side loader. Wire-faithful exclusion #1."

[[unmapped]]
upstream_pkg = "pkg/netns/"
note         = "Linux netns enter/exit syscalls. cave-net runs userspace on macOS/Linux; netns hooks only fire under a real CNI integration test. Wire-faithful exclusion #5."

[[unmapped]]
upstream_pkg = "pkg/cgroups/"
note         = "cgroup v2 attach/detach syscalls (bpf_cgroup_attach). Userspace state machine ported elsewhere; the actual syscall side requires a Linux host. Wire-faithful exclusion #5."

[[unmapped]]
upstream_pkg = "pkg/mountinfo/"
note         = "Reads /proc/<pid>/mountinfo for bpffs mount discovery. Linux-only kernel surface. Wire-faithful exclusion #5."

[[unmapped]]
upstream_pkg = "pkg/multicast/"
note         = "Linux multicast group membership (IGMP). Kernel-side; not portable to userspace test. Wire-faithful exclusion #5."

[[unmapped]]
upstream_pkg = "pkg/mcastmanager/"
note         = "Multicast group lifecycle manager paired with pkg/multicast/. Same kernel-side scope cut. Wire-faithful exclusion #5."

