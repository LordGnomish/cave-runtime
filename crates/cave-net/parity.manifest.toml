# parity.manifest.toml — cave-net
# Upstream: cilium/cilium  https://github.com/cilium/cilium
# Tracks the Cilium identity model, L7 policy enforcement, ClusterMesh,
# Hubble observability, and the L7 envoy proxy redirect surface.

[upstream]
org     = "cilium"
repo    = "cilium"
version = "v1.19.3"

[module]
name        = "cave-net"
description = "eBPF pod networking + Cilium-parity identity / L7 policy / ClusterMesh / Hubble / L7 proxy"
source_root = "src"

# ── Cilium-parity file mappings (this batch) ─────────────────────────────────
[[files]]
upstream = "pkg/identity/cache/local.go"
local    = "src/cilium/identity.rs"

[[files]]
upstream = "pkg/policy/api/l7.go"
local    = "src/cilium/l7policy.rs"

[[files]]
upstream = "pkg/clustermesh/clustermesh.go"
local    = "src/cilium/clustermesh.rs"

[[files]]
upstream = "pkg/hubble/parser/parser.go"
local    = "src/cilium/hubble.rs"

[[files]]
upstream = "pkg/proxy/proxy.go"
local    = "src/cilium/l7proxy.rs"
