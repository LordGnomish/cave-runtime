# ── Mapped (real implementation) ─────────────────────────────────────────────

[[mapped]]
area        = "JIT access request workflow"
description = "Create, approve/deny, expire, list access requests with RBAC justification"
local_file  = "src/access_request.rs"
notes       = "Full store + state machine, sweep_expired, list_pending, list_for_user"

[[mapped]]
area        = "Role-based access control (RBAC)"
description = "Role definitions, policy rules, deny-overrides evaluation engine"
local_file  = "src/rbac.rs"
notes       = "RoleStore + PolicyEngine; Named/Prefix/All resource selectors; deny wins"

[[mapped]]
area        = "Session recording"
description = "Structured per-session event recording, lifecycle timestamps, user-scoped listing"
local_file  = "src/session_recorder.rs"
notes       = "SessionRecorder + TimestampedEvent; monotonic seq; active_count; list_completed"

[[mapped]]
area        = "Node/resource inventory"
description = "Enroll SSH servers, DBs, K8s clusters; health tracking; label-based filtering"
local_file  = "src/node_inventory.rs"
notes       = "NodeInventory; duplicate-hostname guard; heartbeat update; list_unhealthy"

[[mapped]]
area        = "Structured audit log"
description = "Append-only audit event stream with queryable filters (user, kind, time range)"
local_file  = "src/audit_log.rs"
notes       = "AuditLog + AuditQuery; limit; since/until; events_for_actor"

[[mapped]]
area        = "Certificate authority model"
description = "Short-lived SSH/TLS cert issuance, serial tracking, revocation list"
local_file  = "src/cert_authority.rs"
notes       = "CertAuthority; atomic serial counter; list_active; revocation_list"

[[mapped]]
area        = "Access proxy tunnel state"
description = "Track lifecycle of reverse-tunnel connections: active, closed, errored"
local_file  = "src/proxy_tunnel.rs"
notes       = "TunnelRegistry; byte counters; tunnels_for_user/node; close/error"

