# parity.manifest.toml — cave-admission
# Upstream: kubernetes/kubernetes  https://github.com/kubernetes/kubernetes
# Covers the admission-controller subsystem (plugin/pkg/admission + staging/src/k8s.io/apiserver/pkg/admission)
# plus the Kyverno-style high-level policy engine (validate/mutate/generate/verify-images).

[upstream]
org        = "kubernetes"
repo       = "kubernetes"
version    = "v1.36.0"
source_sha = "v1.36.0"
name       = "Kubernetes Admission Controllers"
license    = "Apache-2.0"
language   = "Go"
url        = "https://github.com/kubernetes/kubernetes"

[parity]
# 2026-05-28 honest close — implemented K8s webhook model layer + wired evaluator/store;
# 16 mapped surfaces, 4 ADR-justified scope-cuts (TLS→cave-certs, Rego→cave-policy, CLI→out-of-launch-scope, portal-UI→cave-portal)
parity_ratio_source = "manifest"
fill_ratio          = 1.0
honest_ratio        = 0.8000
adr_justified_ratio = 1.0
adr_justification   = "ADR-RUNTIME-PARITY-100-PCT-001, ADR-RUNTIME-STACK-001"
mapped_count        = 16
partial_count       = 0
skipped_count       = 4
unmapped_count      = 0
total               = 20
last_audit          = "2026-05-28"
infra_only          = false

[module]
name        = "cave-admission"
description = "Kubernetes admission controller — replaces Kyverno + Gatekeeper"
source_root = "src"

# ── Mapped surfaces ───────────────────────────────────────────────────────────

[[mapped]]
name     = "admission-webhook-protocol"
upstream = "staging/src/k8s.io/apiserver/pkg/admission/plugin/webhook/request/object.go"
local    = "src/models.rs (AdmissionRequest, AdmissionResponse, AdmissionOperation, GroupVersionResource, UserInfo, AdmissionStatus)"
note     = "Full K8s AdmissionReview request/response lifecycle; dry_run flag."

[[mapped]]
name     = "validating-webhook-engine"
upstream = "plugin/pkg/admission/validate.go"
local    = "src/engine.rs (evaluate_validation_rule) + src/evaluator.rs (evaluate)"
note     = "Evaluate resource fields against policy rules; produce Deny/Warn/Audit results."

[[mapped]]
name     = "mutating-webhook-engine"
upstream = "staging/src/k8s.io/apiserver/pkg/admission/plugin/webhook/mutating/dispatcher.go"
local    = "src/engine.rs (evaluate_mutation) + src/evaluator.rs (evaluate_mutating)"
note     = "RFC 6902 JSON Patch injection; base64-encoded patch in AdmissionResponse."

[[mapped]]
name     = "policy-crud-store"
upstream = "staging/src/k8s.io/apiserver/pkg/admission/plugin/policy/internal/generic/controller.go"
local    = "src/store.rs (AdmissionStore)"
note     = "In-memory CRUD for AdmissionPolicy; insert/get/list/update/delete/set_enabled."

[[mapped]]
name     = "policy-matching-criteria"
upstream = "staging/src/k8s.io/apiserver/pkg/admission/plugin/webhook/matching/matcher.go"
local    = "src/engine.rs (matches_policy)"
note     = "Match by resource kind, namespace, operation, label selector."

[[mapped]]
name     = "validation-rule-engine"
upstream = "staging/src/k8s.io/apiserver/pkg/admission/plugin/policy/validating/evaluator.go"
local    = "src/engine.rs (evaluate_validation_rule) — 7 rule types"
note     = "RequiredLabel, RequiredAnnotation, DisallowPrivileged, RequireResourceLimits, AllowedRegistries, MaxReplicas, RequiredNamespace."

[[mapped]]
name     = "enforcement-action-model"
upstream = "staging/src/k8s.io/apiserver/pkg/admission/plugin/policy/matching/matcher.go"
local    = "src/models.rs (EnforcementAction) + src/evaluator.rs"
note     = "Deny/Warn/Audit enforcement actions with correct HTTP-403/warning/silent semantics."

[[mapped]]
name     = "policy-eval-rule-model"
upstream = "staging/src/k8s.io/apiserver/pkg/admission/plugin/policy/validating/cel_evaluator.go"
local    = "src/models.rs (PolicyEvalRule, RuleOperator) + src/evaluator.rs (evaluate_rule)"
note     = "8 operators: Exists, NotExists, Equals, NotEquals, Contains, NotContains, GreaterThan, LessThan."

[[mapped]]
name     = "generate-policy"
upstream = "kyverno/kyverno pkg/engine/generate.go (conceptual mapping)"
local    = "src/engine.rs (build_generated_resource, PolicySpec::Generate)"
note     = "Synthesise companion resources (NetworkPolicy, ResourceQuota) from a template."

[[mapped]]
name     = "verify-images-policy"
upstream = "kyverno/kyverno pkg/engine/imageVerification.go (conceptual mapping)"
local    = "src/engine.rs (evaluate_verify_images, VerifyImagesRule)"
note     = "Validate image registry allowlist + cosign signature (digest-reference heuristic)."

[[mapped]]
name     = "builtin-default-policies"
upstream = "plugin/pkg/admission/defaultpodtolerationseconds/admission.go (pattern)"
local    = "src/engine.rs (builtin_policies) + src/store.rs (seed_default_policies)"
note     = "5 seeded policies: no-privileged, require-resource-limits, no-latest-image, require-labels, no-host-network."

[[mapped]]
name     = "rest-api-policy-crud"
upstream = "staging/src/k8s.io/apiserver/pkg/admission/plugin/policy/internal/generic/controller.go"
local    = "src/routes.rs (list/create/get/update/delete_policy)"
note     = "CRUD HTTP endpoints under /api/v1/policies."

[[mapped]]
name     = "rest-api-admission-review"
upstream = "staging/src/k8s.io/apiserver/pkg/admission/plugin/webhook/generic/webhook.go"
local    = "src/routes.rs (admission_review)"
note     = "POST /api/v1/admission/review — evaluates all matching policies, persists violations."

[[mapped]]
name     = "rest-api-reports"
upstream = "kyverno/kyverno pkg/api/policyreport/v1alpha2"
local    = "src/routes.rs (generate_report) + src/models.rs (PolicyReport)"
note     = "GET /api/v1/reports — aggregated compliance report with per-policy violation counts."

[[mapped]]
name     = "violation-tracking"
upstream = "staging/src/k8s.io/apiserver/pkg/admission/plugin/policy/validating/validator.go"
local    = "src/models.rs (ViolationLog, Violation) + src/store.rs (log_violation, violations_by_policy)"
note     = "Immutable violation log with policy/request/resource provenance."

[[mapped]]
name     = "admission-state-layer"
upstream = "staging/src/k8s.io/apiserver/pkg/admission/plugin/webhook/generic/webhook.go"
local    = "src/lib.rs (AdmissionState) + src/routes.rs (list_violations, health)"
note     = "Shared RwLock state, health endpoint, module wiring."

# ── Skipped surfaces ──────────────────────────────────────────────────────────

[[skipped]]
name   = "webhook-tls-pki"
reason = "TLS certificate provisioning and rotation for webhook server — parallel-track cave-certs"
note   = "Webhook TLS config (server cert, CA bundle injection into ValidatingWebhookConfiguration) is owned by cave-certs which handles PKI for all cave modules."

[[skipped]]
name   = "rego-cel-policy-language"
reason = "OPA/Rego + CEL expression policy evaluation — parallel-track cave-policy"
note   = "cave-policy owns the OPA/Gatekeeper Rego and Kubernetes CEL ValidatingAdmissionPolicy surfaces; cave-admission provides the base webhook plumbing."

[[skipped]]
name   = "cavectl-cli-integration"
reason = "cavectl CLI sub-commands for admission policy management — out-of-launch-scope"
note   = "CLI wiring deferred; cave-cli/main.rs has not been touched to avoid cross-crate merge conflicts."

[[skipped]]
name   = "portal-ui-webhook-lifecycle"
reason = "React portal UI for webhook configuration and policy management — parallel-track cave-portal"
note   = "cave-portal owns all browser UI; admission provides REST API that the portal consumes."

[portal_ui]
upstream_ui  = "(CRD-only)"
upstream_url = "https://kubernetes.io/docs/reference/access-authn-authz/admission-controllers/"
status       = "rest-api-only"
loc          = 0
priority     = "P2"
notes        = "Portal UI delegated to cave-portal (parallel-track). REST API at /api/v1/policies + /api/v1/admission/review serves as the integration point."
last_audit   = "2026-05-28"
