# parity.manifest.toml — cave-security
# Upstream: falcosecurity/falco  https://github.com/falcosecurity/falco  pinned v0.36.0
#
# cave-security is the integrated runtime-security module for cave-runtime:
#   - Falco-style rule engine (condition language, rule store, alert engine)
#   - Trivy-style vulnerability scanner (image/config/SBOM/policy evaluation)
#
# Companion crates (out-of-scope for this manifest):
#   - cave-falco  — full Falco v0.43.1 userspace deep-port (kernel driver, plugin SDK, gRPC, sidekick)
#   - cave-container-scan — full Trivy v0.70.0 deep-port (OCI layer walker, NVD sync, full parsers)
#   - cave-policy — OPA/Gatekeeper/Kyverno policy evaluation (Rego engine)
#
# fill_ratio = (mapped + skipped) / total
# 2026-05-29 Charter v2 close: all 22 manifest items genuinely implemented;
# 11 additional Falco/Trivy surface areas scope-cut to companion crates.
# 2026-05-30 honest-uplift (strict TDD): ported the OpenVEX statement filter
# (trivy/pkg/vex/vex.go OpenVEX.Filter + openvex/go-vex Matches/PurlMatches/
# SortStatements) — a pure in-memory matcher — into src/trivy/vex.rs. The
# prior "SBOM attestation + VEX" skip is narrowed to attestation/CycloneDX-VEX
# BOM-Link, which genuinely remains cross-crate (cave-container-scan/cave-sign).
# mapped 22→23, total 33→34, honest_ratio 0.6667→0.6765.

[upstream]
org        = "falcosecurity"
repo       = "falco"
version    = "v0.36.0"
name       = "Falco"
license    = "Apache-2.0"
language   = "C++"
url        = "https://github.com/falcosecurity/falco"

[[upstreams]]
org        = "aquasecurity"
repo       = "trivy"
version    = "v0.48.0"
name       = "Trivy"
license    = "Apache-2.0"
language   = "Go"
url        = "https://github.com/aquasecurity/trivy"

[module]
name          = "cave-security"
description   = "Integrated Falco-style rule engine + Trivy-style vulnerability scanner for cave-runtime"
source_root   = "src"
rs_loc        = 6664
tests_passing = 79

[parity]
# 2026-05-30 honest-uplift (strict TDD).
#   Counted surface: 23 directly-implemented items (11 Falco + 12 Trivy) +
#   11 scope-cut items (advanced Falco kernel/plugin/gRPC surface → cave-falco;
#   full Trivy OCI/NVD/Rego/attestation surface → cave-container-scan/cave-policy/cave-sign).
#
#   fill_ratio  = (mapped=23 + skipped=11) / total=34 = 1.0000
#   honest_ratio = mapped/total = 23/34 = 0.6765
#
#   All 23 mapped items have real idiomatic Rust implementations (non-stub);
#   skipped items are architecturally parallel-tracked to companion crates.
mapped_count        = 23
partial_count       = 0
skipped_count       = 11
unmapped_count      = 0
total               = 34
fill_ratio          = 1.0    # (mapped + skipped) / total = 34/34 — all remaining gaps scope-cut to cave-falco/cave-container-scan/cave-sign per ADR-RUNTIME-PARITY-100-PCT-001 §5
honest_ratio        = 0.6765 # mapped/total = 23/34 (Falco kernel + advanced Trivy surface owned by companion crates)
adr_justified_ratio = 1.0
adr_justification   = "ADR-RUNTIME-PARITY-100-PCT-001, ADR-RUNTIME-STACK-001"
parity_ratio_source = "manifest"
last_audit          = "2026-05-30"
infra_only          = false

