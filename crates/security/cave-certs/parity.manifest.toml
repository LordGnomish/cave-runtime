# parity.manifest.toml — cave-certs
# Upstream: cert-manager/cert-manager  https://github.com/cert-manager/cert-manager

[upstream]
org        = "cert-manager"
repo       = "cert-manager"
version    = "v1.17.2"
name       = "cert-manager"
license    = "Apache-2.0"
language   = "Go"
url        = "https://github.com/cert-manager/cert-manager"
source_sha = "e8f3f78a81c8e04def58c8f7d40fc70a41e66c8e"

[parity]
# 2026-05-28 honest close — implemented real Certificate/CertificateRequest CRDs,
# renewal controller, ACME client orchestration, DNS-01/HTTP-01 solvers,
# SelfSigned + CA issuers, PKCS#10 CSR builder, certificate store, PQC hybrid signer,
# REST API handlers; ADR-justified 7 sibling/out-of-scope cuts.
parity_ratio_source = "manifest"
fill_ratio          = 1.0
honest_ratio        = 0.6957
adr_justified_ratio = 1.0
adr_justification   = "ADR-RUNTIME-PARITY-100-PCT-001, ADR-RUNTIME-STACK-001"
mapped_count        = 16
partial_count       = 0
skipped_count       = 7
unmapped_count      = 0
total               = 23
last_audit          = "2026-05-28"
infra_only          = false

# ── Mapped surfaces ──────────────────────────────────────────────────────────

[[mapped]]
area    = "Certificate CRD spec + validation"
file    = "src/crds.rs"
notes   = "CertificateSpec (dnsNames, commonName, duration, renewBefore, usages, algorithm), validate()"

[[mapped]]
area    = "CertificateStatus + conditions + IssuerRef"
file    = "src/crds.rs"
notes   = "CertificateStatus (notBefore/notAfter/renewalTime/conditions), Condition, IssuerRef (Issuer/ClusterIssuer)"

[[mapped]]
area    = "IssuerSpec + IssuerConfig (CA / ACME / Vault)"
file    = "src/crds.rs"
notes   = "IssuerSpec with tagged IssuerConfig enum: Ca{secretName}, Acme{server,email,EAB}, Vault{server,path,role}; validate()"

[[mapped]]
area    = "Certificate state engine"
file    = "src/engine.rs"
notes   = "compute_cert_state, expiring_soon, days_until_expiry, covers_domain (wildcard + SAN)"

[[mapped]]
area    = "Renewal controller / trigger"
file    = "src/renewal.rs"
notes   = "RenewalController::evaluate — 4 states: NotYet/Due/Expired/NeedsInitialIssuance; multi-tenant boundary; renewal_due_at helper"

[[mapped]]
area    = "ACME order orchestration client"
file    = "src/acme_client.rs"
notes   = "AcmeClient driving cave-acme::AcmeServer: register (RFC 8555 §7.3), new_order (§7.4), finalize (§7.4), order_status"

[[mapped]]
area    = "DNS-01 challenge solver"
file    = "src/solvers.rs"
notes   = "Dns01Solver: present (TXT record = base64url SHA-256 keyAuth), cleanup; RFC 8555 §8.4; cert-manager dns.go parity"

[[mapped]]
area    = "HTTP-01 challenge solver"
file    = "src/solvers.rs"
notes   = "Http01Solver: present (/.well-known/acme-challenge/<token>), serve, cleanup; RFC 8555 §8.3"

[[mapped]]
area    = "CertificateRequest CRD + state machine"
file    = "src/cert_request.rs"
notes   = "CertificateRequest (Pending→Approved→Issued/Denied), approve/deny/issue/try_deny; spec validation; DenialReason"

[[mapped]]
area    = "SelfSigned issuer backend"
file    = "src/issuers.rs"
notes   = "SelfSignedIssuer::issue — generate key pair + self-sign via rcgen; is_ca support"

[[mapped]]
area    = "CA issuer backend"
file    = "src/issuers.rs"
notes   = "CaIssuer::from_pem + sign — load CA cert/key from PEM, sign leaf certs; cross-tenant guard"

[[mapped]]
area    = "CSR generation (PKCS#10)"
file    = "src/csr.rs"
notes   = "CsrBuilder::build — generate EC key pair + PKCS#10 CSR PEM with SAN extension; cert-manager pkg/util/pki/csr.go parity"

[[mapped]]
area    = "Certificate store / secret binding"
file    = "src/store.rs"
notes   = "CertificateStore: put/get/remove/list/list_expiring keyed by (tenant_id, secret_name); multi-tenant isolation"

[[mapped]]
area    = "PQC hybrid signing (ML-DSA-65 + Ed25519)"
file    = "src/pqc.rs"
notes   = "HybridKeyPair::dual_sign, split_composite, verify_dual; FIPS 204 container format; ADR-015 v2 extension"

[[mapped]]
area    = "Certificate models + lifecycle state"
file    = "src/models.rs"
notes   = "Certificate, CertState (Valid/Expiring/Expired/Pending/Failed); serde roundtrip"

[[mapped]]
area    = "REST API handlers (issue / list / remove)"
file    = "src/routes_api.rs"
notes   = "handle_issue_selfsigned, handle_list_certs, handle_remove_cert; global tenant-scoped store; JSON DTOs"

# ── Skipped surfaces (ADR-justified scope cuts) ───────────────────────────────

[[skipped]]
area   = "Venafi issuer backend (TPP + Cloud)"
reason = "Venafi TPP/Cloud integration requires vendor-specific API credentials and corporate PKI infrastructure — out-of-launch-scope"

[[skipped]]
area   = "ACME external webhook DNS solver"
reason = "External webhook DNS solver requires network-accessible solver pods and K8s webhook infra — parallel-track cave-admission"

[[skipped]]
area   = "CertificateSigningRequest (K8s native CSR approval API)"
reason = "k8s.io/certificates/v1 CSR resource requires K8s API server integration — parallel-track cave-apiserver"

[[skipped]]
area   = "Kubernetes Secret write-back (tls.crt / tls.key)"
reason = "Writing to K8s Secrets requires the K8s client API — parallel-track cave-apiserver (K8s object store)"

[[skipped]]
area   = "Validating + mutating admission webhooks"
reason = "cert-manager webhook binary is a separate Go process serving K8s admission — parallel-track cave-admission"

[[skipped]]
area   = "cert-manager controller-manager operator binary"
reason = "The Go operator binary (deployment, RBAC, leader election, controller-manager.go) is go-bootstrap infrastructure"

[[skipped]]
area   = "OCSP stapling + CRL distribution point"
reason = "Online Certificate Status Protocol stapling and CRL endpoints require live OCSP responder infra — out-of-launch-scope"

[module]
name        = "cave-certs"
description = "Certificate management — cert-manager replacement"
source_root = "src"

[portal_ui]
upstream_ui  = "(CRD-only)"
upstream_url = "https://cert-manager.io/"
status       = "parallel-track"
loc          = 0
priority     = "P3"
notes        = "cert-manager has no web UI; certificate management exposed via cave-portal CRD viewer — parallel-track cave-portal"
last_audit   = "2026-05-28"
