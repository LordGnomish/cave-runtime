# ─── Partial subsystems (2) ─────────────────────────────────────────────────

[[partial]]
name = "cyclonedx-sbom-output"
upstream = "pkg/sbom/cyclonedx"
note = "ScanResult -> CycloneDX 1.5 JSON emit — fields covered: bomFormat / specVersion / serialNumber / version / components. Missing: vulnerabilities[] cross-reference + full lifecycle metadata. Full CycloneDX coverage lives in cave-sbom; cave-container-scan ships the basic component listing only."

[[partial]]
name = "sarif-output"
upstream = "pkg/report/sarif"
note = "Findings -> SARIF 2.1 JSON minimal emit (runs[].results[].ruleId + message + locations). Missing: runs[].tool.driver.rules[] catalog + invocations[] + tool extensions; consumer dashboards work with the minimal shape we emit."

# ─── Skipped subsystems (12 — formalised scope cuts) ───────────────────────

[[skipped]]
name = "trivy-cli-binary"
upstream = "cmd/trivy"
reason = "Standalone Trivy CLI is replaced by `cavectl scan`; cave-cli wires the same HTTP surface."

[[skipped]]
name = "trivy-server-mode"
upstream = "pkg/commands/server"
reason = "`trivy server` (long-running mode) is replaced by cave-runtime hosting the axum router we already provide."

[[skipped]]
name = "trivy-db-bolt-persistence"
upstream = "pkg/db (BoltDB)"
reason = "Persistent vuln-DB store — cave-scan-db owns the DB lifecycle; cave-container-scan stays stateless."

[[skipped]]
name = "trivy-cve-cwe-mitre-correlation"
upstream = "pkg/vex + pkg/types/cwe"
reason = "CVE↔CWE↔MITRE enrichment lives in cave-vulns (DependencyTrack mapping)."

[[skipped]]
name = "trivy-sbom-generation"
upstream = "pkg/sbom"
reason = "SBOM generation — cave-sbom is the canonical owner."

[[skipped]]
name = "trivy-license-detection"
upstream = "pkg/fanal/analyzer/license"
reason = "License detection — cave-sbom handles SPDX expression evaluation."

[[skipped]]
name = "trivy-aws-account-scan"
upstream = "pkg/cloud/aws"
reason = "Full AWS account misconfig scan — out of cave-runtime scope (sovereign-first); Phase 2 cave-cloud if ever needed."

[[skipped]]
name = "trivy-k8s-cluster-scan"
upstream = "pkg/k8s"
reason = "Live K8s cluster scan — cave-admission + cave-policy cover that on the cave-apiserver path."

[[skipped]]
name = "trivy-vm-image-scan"
upstream = "pkg/fanal/artifact/vm"
reason = "VM disk image scan — out of cave-runtime container-focused scope."

[[skipped]]
name = "trivy-rego-config-misconfig"
upstream = "pkg/iac/rego"
reason = "Full opa/rego config misconfig engine — cave-scan owns the rego runtime; this crate only ships first-party Rust rules for the common Dockerfile/K8s/Terraform cases."

[[skipped]]
name = "trivy-secret-rule-config-toml"
upstream = "pkg/fanal/secret config"
reason = "External TOML rule config loader — cave-secrets owns the configurable rule pack; this crate ships the built-in heuristic set only."

[[skipped]]
name = "trivy-plugin-system"
upstream = "pkg/plugin"
reason = "Trivy plugin system (external binaries) — cave-runtime uses workspace crates as plugins instead."

# ─── Unmapped (2 — honest gaps) ─────────────────────────────────────────────

[[unmapped]]
name = "image-layer-tarball-extract"
upstream = "pkg/fanal/artifact/image"
note = "Real OCI layer tarball extraction + per-file scan — cave-container-scan currently treats image scan as 'manifest + InstalledPackage list' rather than actually unpacking layers. Phase 2 — cave-artifacts already extracts layers for storage; share that path."

[[unmapped]]
name = "cve-cwe-mitre-enrichment-inline"
upstream = "pkg/db/types VulnerabilityDetail"
note = "We emit Finding IDs without inline CVE→CWE→MITRE enrichment. Phase 2 — cave-vulns enrichment HTTP call from the orchestrator."

# ─── Scope cuts (groupings → Phase 2 crate owners) ──────────────────────────

[[scope_cuts]]
group = "cli-and-server"
crates = ["cave-cli"]
items = ["trivy-cli-binary", "trivy-server-mode"]

[[scope_cuts]]
group = "vuln-db"
crates = ["cave-scan-db", "cave-vulns"]
items = ["trivy-db-bolt-persistence", "trivy-cve-cwe-mitre-correlation", "cve-cwe-mitre-enrichment-inline"]

[[scope_cuts]]
group = "vex-sign"
crates = ["cave-sign"]
# trivy-vex-evaluation (the OpenVEX *filter matcher*) was line-ported in-crate
# on 2026-05-30 → now [[mapped]] (src/vex.rs). cave-sign retains only VEX
# *document signing / cosign attestation*, which has no separate skip entry.
items = []

[[scope_cuts]]
group = "sbom-license"
crates = ["cave-sbom"]
items = ["trivy-sbom-generation", "trivy-license-detection"]

[[scope_cuts]]
group = "cloud-and-cluster"
crates = ["cave-cloud", "cave-admission", "cave-policy"]
items = ["trivy-aws-account-scan", "trivy-k8s-cluster-scan", "trivy-vm-image-scan"]

[[scope_cuts]]
group = "rego-and-secrets"
crates = ["cave-scan", "cave-secrets"]
items = ["trivy-rego-config-misconfig", "trivy-secret-rule-config-toml"]

[[scope_cuts]]
group = "plugin-system"
crates = ["cave-container-scan"]
items = ["trivy-plugin-system"]

[[scope_cuts]]
group = "artifact-layer-extract"
crates = ["cave-artifacts"]
items = ["image-layer-tarball-extract"]

