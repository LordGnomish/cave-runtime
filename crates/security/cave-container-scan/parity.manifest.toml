note = "Top-level scan dispatch — routes ScanRequest by ScanKind to the right scanner trait impl. src/engine.rs::ScanOrchestrator + Scanner trait."

[[mapped]]
name = "dedupe-findings"
upstream = "pkg/result/result.go DedupeFindings"
note = "Deduplicate Findings by (rule_id, location, severity). src/engine.rs::dedupe_findings."

[[mapped]]
name = "aggregate-verdict"
upstream = "pkg/result/policy.go"
note = "Aggregate Findings into a Pass/Warn/Fail ScanVerdict using a severity floor. src/engine.rs::aggregate_verdict."

[[mapped]]
name = "scan-policy-evaluator"
