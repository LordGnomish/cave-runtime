# ── Skipped surfaces ───────────────────────────────────────────────────────────

[[skipped]]
surface = "OVAL XML parser (RedHat / Debian)"
reason  = "wire-format-detail — OVAL is an XML wire format; the JSON advisory feeds carry equivalent content. OVAL adds no new storage schema, only a different serialisation to parse."

[[skipped]]
surface = "CycloneDX / SPDX advisory export"
reason  = "parallel-track — export into SBOM formats is owned by cave-scan (the scanner crate, crates/security/cave-scan); cave-scan-db is the storage layer only."

[[skipped]]
surface = "In-memory backend (non-persistent store)"
reason  = "stdlib-analog — SledStore::temporary() already uses sled's in-memory mode for tests; a second memory-only trait impl adds no new surface beyond what ::temporary() provides."

[[skipped]]
surface = "Sled compaction / GC policy"
reason  = "out-of-launch-scope — database maintenance scheduling (compact on startup, TTL-based GC of stale advisories) is a Phase 2 operational feature; the storage core is complete without it."

[[skipped]]
surface = "DB bundle signing / integrity verifier"
reason  = "parallel-track — bundle signing and signature verification is owned by cave-sign (crates/security/cave-sign); cave-scan-db trusts the feed bytes it receives."

[[skipped]]
surface = "Multi-arch OS index / variant matcher"
reason  = "out-of-launch-scope — matching advisories to architecture-specific variants (e.g. arm64 vs amd64 RPMs) is a scanner-side runtime concern owned by cave-scan, not the storage layer."

[module]
name        = "cave-scan-db"
description = "Vulnerability + IaC advisory store — trivy-db compatible (sled-backed)"
source_root = "src"

