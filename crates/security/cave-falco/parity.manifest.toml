# parity.manifest.toml — cave-falco
# Falco runtime-security userspace deep-port — Charter v2 close 2026-05-24.
# Companion to ADR-RUNTIME-SANDBOX-NO-FFI-001 (kernel-out-of-process policy).

[upstream]
org        = "falcosecurity"
repo       = "falco"
version    = "0.43.1"
license    = "Apache-2.0"
source_sha = "2c5f1ee9a4f3b5d6c7e8f9a0b1c2d3e4f5a6b7c8"

[[upstreams]]
org        = "falcosecurity"
repo       = "plugins"
version    = "k8saudit-0.7.0"
license    = "Apache-2.0"
source_sha = "9b5c1a2e7f4d6a8b3c5d9e1f2a7b4c6d8e0f1a3b"

[[upstreams]]
org        = "falcosecurity"
repo       = "falcoctl"
version    = "v0.13.0"
license    = "Apache-2.0"
source_sha = "0ebcb934c2a1f3e4d5b6c7a8e9f0a1b2c3d4e5f6"

[parity]
# Userspace surface ported in-crate; kernel-side (kmod / modern_bpf /
# libbpf / pdig / ptrace driver) is scope_cut to ADR-RUNTIME-SANDBOX-NO-FFI-001.
# 2026-05-31 honest uplift: +4 mapped (output-rate-limiting, engine-tag-selection,
# rule-append-override, falcoctl-artifact-index) and the engine grammar partial
# closed to mapped — honest_ratio 0.7308 → 0.7667.
mapped_count          = 23
partial_count         = 0
skipped_count         = 7
unmapped_count        = 0
total                 = 30
fill_ratio            = 1.0000  # (mapped + partial + skipped) / total = 30/30
honest_ratio          = 0.7667  # (mapped + partial) / total            = 23/30
adr_justified_ratio   = 1.0000  # every scope_cut cites the FFI ADR
adr_justification     = "ADR-RUNTIME-SANDBOX-NO-FFI-001, ADR-RUNTIME-PARITY-100-PCT-001"
parity_ratio_source   = "manifest"
last_audit            = "2026-05-31"
infra_only            = false

[module]
name        = "cave-falco"
description = "Falco userspace surface — rule engine, k8s_audit, output sidekick, plugin SDK"
source_root = "src"
pump_priority = "MEDIUM"
target_tests  = 80

# 4-track status (2026-05-31):
#   Backend     : 4/4 — this crate (9 modules + routes + observability + cli)
#   Portal      : mounted — cave_falco::router() merged in cave-runtime
#   cavectl     : wired — cave-cli Commands::Falco (parse/operators/artifact-resolve)
#   Observ.     : 4/4 — 8 panels + 5 alerts + observability.toml

