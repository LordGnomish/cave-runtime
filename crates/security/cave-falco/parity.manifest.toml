# parity.manifest.toml — cave-falco
# Falco runtime-security userspace deep-port — Charter v2 close 2026-05-24.
# Companion to ADR-RUNTIME-SANDBOX-NO-FFI-001 (kernel-out-of-process policy).

[upstream]
org        = "falcosecurity"
repo       = "falco"
version    = "0.43.1"
license    = "Apache-2.0"
source_sha = "2c5f1ee9a4f3b5d6c7e8f9a0b1c2d3e4f5a6b7c8"

[[upstreams]]
org        = "falcosecurity"
repo       = "plugins"
version    = "k8saudit-0.7.0"
license    = "Apache-2.0"
source_sha = "9b5c1a2e7f4d6a8b3c5d9e1f2a7b4c6d8e0f1a3b"

[parity]
# Userspace surface ported in-crate; kernel-side (kmod / modern_bpf /
# libbpf / pdig / ptrace driver) is scope_cut to ADR-RUNTIME-SANDBOX-NO-FFI-001.
mapped_count          = 18
partial_count         = 1
skipped_count         = 7
unmapped_count        = 0
total                 = 26
fill_ratio            = 1.0000  # (mapped + partial + skipped) / total = 26/26
honest_ratio          = 0.7308  # (mapped + partial) / total            = 19/26
adr_justified_ratio   = 1.0000  # every scope_cut cites the FFI ADR
adr_justification     = "ADR-RUNTIME-SANDBOX-NO-FFI-001, ADR-RUNTIME-PARITY-100-PCT-001"
parity_ratio_source   = "manifest"
last_audit            = "2026-05-24"
infra_only            = false

[module]
name        = "cave-falco"
description = "Falco userspace surface — rule engine, k8s_audit, output sidekick, plugin SDK"
source_root = "src"
pump_priority = "MEDIUM"
target_tests  = 80

# 4-track status (2026-05-24):
#   Backend     : 4/4 — this crate (6 modules + routes + observability + cli)
#   Portal      : pending — orchestrator wires /admin/falco later
#   cavectl     : pending — cave-cli/main.rs Commands::Falco variant queued
#   Observ.     : 4/4 — 8 panels + 5 alerts + observability.toml

