# ── Partial (1) ─────────────────────────────────────────────────────────────

[[partial]]
name   = "engine-condition-grammar-full"
reason = "libsinsp full filter grammar (regex, exists/glob/cidr/numeric ops, nested-list intersect) — cave-falco supports the rule-shipping subset (=, !=, in, contains, startswith, endswith, and/or/not, parens). Remaining ops are a Phase 2 lift."
local  = "src/engine.rs"

# ── Scope cuts (7) — kernel-FFI + dlopen out-of-process ─────────────────────

[[scope_cuts]]
name   = "kernel-module-driver"
reason = "Legacy kmod (falco-driver) — out-of-tree kernel module; requires kernel headers + insmod. unsafe-kernel-FFI per ADR-RUNTIME-SANDBOX-NO-FFI-001."
target = "out-of-process: external falco-driver kmod"

[[scope_cuts]]
name   = "modern-bpf-driver"
reason = "modern_bpf libbpf-skeleton driver — CO-RE eBPF program install via bpf(2). unsafe-kernel-FFI."
target = "out-of-process: external falco --modern-bpf"

[[scope_cuts]]
name   = "legacy-ebpf-driver"
reason = "Legacy eBPF probe — bpf(2) + perf_event_open(2). unsafe-kernel-FFI."
target = "out-of-process: external falco --bpf"

[[scope_cuts]]
name   = "pdig-userspace-driver"
reason = "pdig ptrace-based userspace driver — ptrace(2) + PTRACE_SYSCALL_INFO. unsafe-kernel-FFI."
target = "out-of-process: external pdig binary"

[[scope_cuts]]
name   = "libsinsp-syscall-decoder"
reason = "libsinsp converts raw tracepoint payloads into structured syscall events. Decoder relies on kernel-version table + ELF symbol resolution. out-of-process-by-design."
target = "out-of-process: external falco binary"

[[scope_cuts]]
name   = "plugin-dlopen-runtime"
reason = "Plugin loader's dlopen+dlsym binary-ABI dispatch — requires unsafe Rust to bind ss_plugin_t fn pointers. cave-falco loads only in-tree Rust plugins via the Plugin trait. unsafe-kernel-FFI (libc::dlopen)."
target = "out-of-process: external falco plugin runtime"

[[scope_cuts]]
name   = "grpc-outputs-bidi-stream"
reason = "gRPC outputs service (`falco.outputs.service.subscribe` bidi-stream) — Tonic wiring lives in the orchestrator-level cave-grpc bridge, not in this crate. out-of-process-by-design."
target = "cave-grpc bridge (deferred)"
