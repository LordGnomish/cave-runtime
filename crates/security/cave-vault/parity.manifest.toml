# parity.manifest.toml — cave-vault
# Upstream: openbao/openbao  https://github.com/openbao/openbao
# Pinned to the latest v2.x stable release at 2026-04-26.

[upstream]
org        = "openbao"
repo       = "openbao"
version    = "v2.5.4"
source_sha = "4f6d47246a053375271a5fd8af85c3b75695aa46"
name       = "OpenBao"
license    = "MPL-2.0"
language   = "Go"
url        = "https://github.com/openbao/openbao"

# ─── Companion upstreams (2026-05-23 close) ─────────────────────────────────
[[upstreams]]
org           = "external-secrets"
repo          = "external-secrets"
version       = "v2.5.0"
source_sha    = "0755b0af7de7f05a104b0df29ba84f43513fee8b"
license       = "Apache-2.0"
language      = "Go"
url           = "https://github.com/external-secrets/external-secrets"
role          = "Secret-source-to-K8s-Secret reconciler (SecretStore/ExternalSecret/PushSecret CRDs)"

[[upstreams]]
org           = "bitnami-labs"
repo          = "sealed-secrets"
version       = "v0.37.0"
source_sha    = "8e4ed463552a6a6462648a9ff090a1f42abbda30"
license       = "Apache-2.0"
language      = "Go"
url           = "https://github.com/bitnami-labs/sealed-secrets"
role          = "GitOps-safe encrypted-Secret CRD with RSA-OAEP+AES-GCM hybrid envelope"

[parity]
# 2026-05-23 Charter v2 triumvirate close:
#   * +6 mapped: ESO SecretStore/ExternalSecret/PushSecret/providers/reconciler
#     (src/external_secrets/) + Sealed Secrets types/crypto/controller
#     (src/sealed_secrets/).
#   * +4 skipped: ESO continuous-reconciler informer + helm-chart-bootstrap +
#     kubeseal CLI + sealed-secrets prom exporter (k8s-controller-runtime &
#     CLI ownership).
# 2026-05-30 depth continuation (count-neutral — strengthens the already-mapped
# transit engine, no reclassification):
#   * transit derived-key encryption — per-context HKDF-SHA256 key derivation
#     with context-required enforcement (keysutil DeriveKey, Kdf_hkdf_sha256).
#   * transit convergent encryption v3 — deterministic HMAC-SHA256 nonce for
#     equality-searchable ciphertext (keysutil SymmetricEncryptRaw v3).
#   The 21 skips remain genuine architectural scope-cuts (Go bootstrap, cloud
#   SDKs, k8s controller-runtime, Enterprise licensing); honest_ratio is held
#   honest at 0.5625 rather than inflated.
mapped_count   = 27
partial_count  = 0
skipped_count  = 21
unmapped_count = 0
total          = 48
fill_ratio     = 1.0000
honest_ratio   = 0.5625
last_audit     = "2026-05-30"
parity_ratio_source = "manifest"
infra_only     = false

[module]
name          = "cave-vault"
description   = "Secrets management — OpenBao (HashiCorp Vault fork) parity"
source_root   = "src"
target_tests = 30        # qwen-pump B-prime target (#[test] count in tests/qwen_drafted.rs); below this, B-prime fires
pump_priority = "HIGH"  # charter-critical 7 — secrets management surface

