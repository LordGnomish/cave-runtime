[package]
name = "cave-scan"
description = "Code quality & SAST — compatible with SonarQube"
authors.workspace = true
repository.workspace = true
homepage.workspace = true
documentation = "https://docs.rs/cave-scan"
readme = "README.md"
rust-version.workspace = true
keywords = ["sast", "code-quality", "sonarqube", "security", "static-analysis"]
