hcl-rs = { workspace = true }
# === S3 end ===
# === S2 trivy scan engine ===
toml = { workspace = true }
# === S2 end ===

# hcl-rs is imported as `hcl` (crate rename); machete misses that — ignore.
[package.metadata.cargo-machete]
ignored = ["hcl-rs"]

[dev-dependencies]
proptest = "1"
