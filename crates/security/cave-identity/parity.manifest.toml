# ─── Scope cuts (explicit Charter-v2 boundary decisions) ────────────────────

[[scope_cuts]]
group = "cli-replaced"
items = ["spire-server-cli", "spire-agent-cli"]
rationale = "Replaced by `cavectl identity` subcommand wired by the orchestrator post-merge — not a runtime gap."

[[scope_cuts]]
group = "k8s-operator-informer-loop"
items = ["spire-controller-manager-informer"]
rationale = "honest-cont2: the ClusterSPIFFEID/ClusterFederatedTrustDomain reconcile core is now ported (see partial crd-reconcile-core, src/crd.rs); only the controller-runtime informer/watch/apply loop that drives it from the live k8s API remains delegated to cave-cri / cave-k8s."

[[scope_cuts]]
group = "datastore-delegation"
items = ["sqlite-postgres-backends"]
rationale = "Persistence layer fanned out to cave-db (CavePool); SqliteStoreFacade keeps the boundary stable for future wiring."

[[scope_cuts]]
group = "wire-format-elsewhere"
items = ["grpc-sds-v3-wire", "workload-api-uds-transport"]
rationale = "honest-cont2: the in-process Workload API handler is now ported (see partial workload-api-handler, src/workload_api.rs); only the gRPC SDS-v3 stream + the SPIFFE_ENDPOINT_SOCKET Unix-domain-socket transport that carry it remain owned by cave-mesh / cave-cri."

[[scope_cuts]]
group = "cloud-attestors"
items = ["aws-iid-node-attestor", "azure-msi-node-attestor", "gcp-iit-node-attestor"]
rationale = "All three need cloud SDKs (AWS / Azure / GCP); deferred to Phase 2 cave-cloud."

[[scope_cuts]]
group = "hardware-attestors"
items = ["tpm-devid-node-attestor"]
rationale = "honest-cont2: the sshpop attestor is now ported with real ed25519 crypto (see partial sshpop-node-attestor, src/sshpop.rs); only the tpm_devid sibling remains a scope_cut because it requires a hardware TPM the runtime cannot exercise. Deferred to Phase 2 cave-hwsign."

[[scope_cuts]]
group = "upstream-pki"
items = ["upstream-authority-vault", "spire-bundle-publisher-aws-secrets"]
rationale = "UpstreamAuthority + BundlePublisher are cross-ring concerns owned by cave-pki / cave-vault / cave-cloud."

[[scope_cuts]]
group = "ha-cluster"
items = ["spire-server-cluster-ha"]
rationale = "Multi-replica HA requires distributed lease primitives — deferred until cave-ha exposes them."

[[scope_cuts]]
group = "os-version-specific"
items = ["spire-cgroup-v1-inspection"]
rationale = "cgroup-v1 inspection is rare on modern K8s nodes; cave-cri populates K8sPodInfo and feeds cave-identity directly."

[[scope_cuts]]
group = "crypto-backend"
items = ["cryptographic-backend"]
rationale = "Live ES256/RSA/Ed25519 signing is delegated to cave-pki + cave-certs once their key-management surface exposes a SignSvid interface."
