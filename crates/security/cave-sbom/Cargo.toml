[package]
name = "cave-sbom"
description = "SBOM & dependency intelligence — compatible with DependencyTrack"
authors.workspace = true
repository.workspace = true
homepage.workspace = true
documentation = "https://docs.rs/cave-sbom"
readme = "README.md"
rust-version.workspace = true
keywords = ["sbom", "dependency", "security", "intelligence", "spdx"]
categories = ["api-bindings", "development-tools", "encoding"]
version.workspace = true
edition.workspace = true
license.workspace = true

[dependencies]
axum = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
uuid = { workspace = true }
chrono = { workspace = true }
thiserror = { workspace = true }
quick-xml = { version = "0.37", features = ["serialize"] }
async-trait = { workspace = true }
base64 = { workspace = true }

[dev-dependencies]
tower = "0.5"
