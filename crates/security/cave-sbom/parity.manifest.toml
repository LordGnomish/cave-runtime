# parity.manifest.toml — cave-sbom
# Upstream: DependencyTrack/dependency-track  https://github.com/DependencyTrack/dependency-track

[upstream]
org     = "DependencyTrack"
repo    = "dependency-track"
version = "v4.11.6"
sha     = "128fd0fa01bed9fcb57abffa3b30047c45941415"
name    = "Dependency-Track"
license = "Apache-2.0"
language= "Java"
url     = "https://github.com/DependencyTrack/dependency-track"

[parity]
# 2026-05-28 honest close — implemented LicenseGroupEvaluator, VersionDistanceEvaluator,
# VulnerabilityIdEvaluator, and cross-entity SearchResource; ADR-justified 8 sibling/
# out-of-scope cuts (OSS Index + VulnDB commercial APIs, Cisco Spark transport,
# OIDC/LDAP → cave-identity, Kafka → cave-streams, portfolio-sched → cave-pipelines,
# leader-election → cave-etcd).
parity_ratio_source = "manifest"
fill_ratio          = 1.0
honest_ratio        = 0.7778
adr_justified_ratio = 1.0
adr_justification   = "ADR-RUNTIME-PARITY-100-PCT-001, ADR-RUNTIME-STACK-001"
mapped_count        = 23
partial_count       = 5
skipped_count       = 8
unmapped_count      = 0
total               = 36
last_audit          = "2026-05-28"
infra_only          = false

[module]
name        = "cave-sbom"
description = "SBOM and dependency tracking — DependencyTrack replacement (line-by-line port)"
source_root = "src"

