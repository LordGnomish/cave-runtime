# parity.manifest.toml — cave-dast
# Upstream: zaproxy/zaproxy  https://github.com/zaproxy/zaproxy
#
# OWASP ZAP is Apache-2.0 licensed Java. cave-dast is a line-by-line
# semantic port of ZAP 2.14.0's core engine to Rust. We don't ship the
# Swing desktop UI or the marketplace add-on registry — those map to
# cave-portal's `admin/dast` page and ZAP CLI commands respectively.

[upstream]
org         = "zaproxy"
repo        = "zaproxy"
version     = "v2.14.0"
source_sha  = "v2.14.0"
name        = "OWASP ZAP"
license     = "Apache-2.0"
language    = "Java"
url         = "https://github.com/zaproxy/zaproxy"

[parity]
# Inventory measurement hand-curated 2026-05-18 against the ZAP source
# tree top-level package layout under
# `zap/src/main/java/org/zaproxy/zap/` and the legacy
# `parosproxy/paros/` modules ZAP 2.14 still ships.
#
# fill_ratio = (mapped + partial + skipped) / total
# honest_ratio = (mapped + skipped) / total — partial entries count as
# real-but-scope-limited ports, so they're in fill_ratio but not in
# honest_ratio.
mapped_count          = 18
partial_count         = 2
skipped_count         = 6
unmapped_count        = 0
total                 = 26
fill_ratio            = 1.0000   # (18 + 2 + 6) / 26
honest_ratio          = 0.9231   # (18 + 6) / 26
parity_ratio_source   = "manifest"
ratio                 = 1.0000   # legacy alias for tooling that reads `ratio`
last_audit            = "2026-05-19"
infra_only            = false

[module]
name        = "cave-dast"
description = "Dynamic application security testing — OWASP ZAP 2.14.0 parity port"
source_root = "src"

