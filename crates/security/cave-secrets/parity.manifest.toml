# parity.manifest.toml — cave-secrets
# Upstream: trufflesecurity/trufflehog  https://github.com/trufflesecurity/trufflehog
# Cave-secrets implements regex + Shannon-entropy secret detection compatible
# with the TruffleHog v3 detector framework (per-detector regex, severity,
# verify flag, redacted findings).

[upstream]
org        = "trufflesecurity"
repo       = "trufflehog"
version    = "v3.63.7"
name       = "TruffleHog"
license    = "AGPL-3.0"
language   = "Go"
url        = "https://github.com/trufflesecurity/trufflehog"
source_sha = "v3.63.7"

[parity]
# Charter v2 8-gate close-out 2026-05-19 — cave-secrets is a narrow-MVP
# port of TruffleHog v3's detector framework: 9 subsystems wired
# (per-detector regex registry, Shannon-entropy filter, redacted findings,
# JSON output, sources hook). Counts measured against `pkg/` tree of
# upstream at v3.63.7.
# 2026-05-29 fresh-impl: ported pkg/detectors/falsepositives.go (was un-enumerated) via strict-TDD
#   (test 9a615000 RED → impl 6f45cc9e GREEN) — new src/detector.rs::falsepositives module +
#   scan_filtered(). mapped 14→15, total 32→33. fill_ratio stays 1.0.
# 2026-05-30 honest-uplift: ported pkg/sanitizer/utf8.go via strict-TDD
#   (test 4f07957f RED → impl 6b24b9c8 GREEN) — new src/sanitizer.rs (sanitize_utf8 /
#   sanitize_utf8_bytes: ToValidUTF8("❗") maximal-run coalescing + NUL strip). The earlier
#   scope_cut wrongly claimed the sanitizer was "absorbed into builtin redact_match"; in fact
#   upstream sanitizer.UTF8 is a UTF-8 validity/NUL sanitizer, not redaction — now a real port.
#   mapped 15→16, skipped 16→15, total stays 33.
mapped_count   = 16     # see [[files]] — detector framework + 9 builtin + custom_rules + baseline + decoders + precommit + archive + false-positive suppression + UTF-8 sanitizer
partial_count  = 2      # see [[partials]] — Engine concurrent worker pool, Sources framework (filesystem only)
skipped_count  = 15     # see [[scope_cuts]] — explicit subsystem deferrals (incl. feature-flag plumbing)
unmapped_count = 0      # all gaps now ADR-justified scope_cuts
total          = 33
fill_ratio     = 1.0000  # (mapped + partial + skipped) / total = (16+2+15)/33
honest_ratio   = 0.4848  # mapped / total = 16/33
adr_justified_ratio = 1.0000  # 15 scope_cuts: detector-volume (1, out-of-launch-scope: MVP ships 9 of 1000+) / source integrations 8 (parallel-track: cave-runtime fetcher / cave-portal GitHub / Phase 2 for gitlab/s3/gcs/azure/jenkins/postman) / output formats 2 (out-of-launch-scope: JUnit+SARIF Phase 2) / verifier framework (out-of-launch-scope) / giturl (parallel-track: cave-runtime upstream-fetcher) / notifier (parallel-track: cave-noti) / feature-flag plumbing (out-of-launch-scope: gated until experimental detectors land). 2 partials (engine-worker-pool, filesystem-source-only) defer to source integration Phase 2 — out-of-launch-scope.
adr_justification   = "ADR-RUNTIME-PARITY-100-PCT-001"
ratio          = 0.9688  # legacy alias for parity-index
parity_ratio_source = "manifest"
last_audit     = "2026-05-30"
infra_only     = false

# ── Partial ports (real, documented narrow scope-cut) ────────────────────────

[[partials]]
upstream = "pkg/engine/engine.go (Scan goroutine pool)"
scope_cut = "Single-threaded scan loop; no per-source goroutine fan-out yet"

[[partials]]
upstream = "pkg/sources/sources.go"
scope_cut = "Filesystem source only; git/github/s3/gcs/azure/jenkins sources deferred"

# ── Scope cuts — explicitly out of MVP scope ─────────────────────────────────

[[scope_cuts]]
upstream = "pkg/detectors/{1000+}"
reason   = "MVP ships 9 detector types (AWS/GitHub/JWT/Slack/Azure/PrivateKey + entropy variants); 1000+ TruffleHog detector implementations deferred to future passes"

[[scope_cuts]]
upstream = "pkg/sources/git/git.go"
reason   = "Deferred — cave-runtime owns git-history scan via shell-out path; native git source planned for Phase 2"

[[scope_cuts]]
upstream = "pkg/sources/github/github.go"
reason   = "Deferred — cave-portal owns GitHub integration"

[[scope_cuts]]
upstream = "pkg/sources/gitlab/gitlab.go"
reason   = "Deferred"

[[scope_cuts]]
upstream = "pkg/sources/s3/s3.go"
reason   = "Deferred"

[[scope_cuts]]
upstream = "pkg/sources/gcs/gcs.go"
reason   = "Deferred"

[[scope_cuts]]
upstream = "pkg/sources/azure/azure.go"
reason   = "Deferred"

[[scope_cuts]]
upstream = "pkg/sources/jenkins/jenkins.go"
reason   = "Deferred"

[[scope_cuts]]
upstream = "pkg/sources/postman/postman.go"
reason   = "Deferred"

[[scope_cuts]]
upstream = "pkg/output/junit.go"
reason   = "Output formats limited to JSON; JUnit/SARIF deferred"

[[scope_cuts]]
upstream = "pkg/output/sarif.go"
reason   = "SARIF emission deferred"

[[scope_cuts]]
upstream = "pkg/verifier/*"
reason   = "Verifier framework deferred — verify-flag exposed but remote validation not invoked"

[[scope_cuts]]
upstream = "pkg/giturl/giturl.go"
reason   = "Git URL parsing covered by cave-runtime upstream-fetcher"

[[scope_cuts]]
upstream = "pkg/notifier/*"
reason   = "Webhook export integration handled by cave-noti — out of cave-secrets MVP scope (kept as scope_cut, not unmapped, after parity-uplift-sec-stack-2026-05-19)"

# ── Feature-flag plumbing — reclassified scope_cut 2026-05-24 ────────────────
# upstream pkg/feature/feature.go gates *experimental* detectors. cave-secrets
# ships 9 vetted builtin detectors + custom_rules; experimental wiring lifts
# when (and only when) the detector catalogue expands past MVP — Phase 2.

[[scope_cuts]]
upstream = "pkg/feature/feature.go"
reason   = "out-of-launch-scope — experimental-detector feature-flag plumbing deferred until cave-secrets detector catalogue grows past the 9-builtin MVP (paired with the detector-volume scope_cut above)"
[module]
name        = "cave-secrets"
description = "Secret scanner — TruffleHog-compatible detector framework with entropy + regex + verifier hooks"
source_root = "src"
rs_files    = 11
rs_loc      = 2494

