# parity.manifest.toml — cave-dns
# Upstream: coredns/coredns  https://github.com/coredns/coredns  pinned v1.11.0
#
# cave-dns covers CoreDNS's plugin chain (cache/forward/file/etcd/kubernetes/
# acl/rewrite/log/health/metrics/etc.), DNSSEC + EDNS protocol parsing, and
# UDP/TCP/DoH/DoT servers + a REST zone management API.

[upstream]
org     = "coredns"
repo    = "coredns"
version = "v1.11.0"
name    = "CoreDNS"
license = "Apache-2.0"
language= "Go"
url     = "https://github.com/coredns/coredns"

[parity]
ratio       = 0.0        # honest: 0.0 means upstream parity NOT yet measured
last_audit  = "2026-05-12"
infra_only  = false
[module]
name        = "cave-dns"
description = "CoreDNS reimplementation — plugin chain + DNSSEC + UDP/TCP/DoH/DoT servers + REST zone management"
source_root = "src"

