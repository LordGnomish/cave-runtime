# parity.manifest.toml — cave-dns
# Upstream: coredns/coredns  https://github.com/coredns/coredns
# Skeleton generated by cave parity init — fill in the mapping sections

[upstream]
org     = "coredns"
repo    = "coredns"
version = "v1.11.0"

[module]
name        = "cave-dns"
description = "DNS — CoreDNS replacement"
source_root = "src"

# ── File mappings ────────────────────────────────────────────────────────────
# [[files]]
# upstream = "path/in/upstream/repo.go"
