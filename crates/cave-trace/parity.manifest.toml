note = "TenantRegistry with X-Scope-OrgID extraction + per-tenant store isolation + auto-register policy; src/multi_tenant.rs."

[[mapped]]
name = "ingest-otlp-http"
upstream = "cmd/collector/app/handler.go (OTLP receiver)"
note = "OTLP HTTP/JSON ingestion (POST /v1/traces) + base64 trace/span IDs + resource attribute coercion; src/ingestion/otlp.rs + src/otlp.rs."

[[mapped]]
name = "ingest-jaeger-thrift-http"
upstream = "cmd/collector/app/http_handler.go"
note = "Jaeger Thrift binary + JSON over HTTP (POST /api/traces, content-type x-thrift / application/json); src/ingestion/jaeger.rs."

[[mapped]]
name = "ingest-jaeger-udp-agent"
upstream = "cmd/agent/app/processors"
note = "Embedded Jaeger UDP agent: compact protocol (port 6831) + binary protocol (port 6832), started via start_background_services; src/lib.rs::run_jaeger_udp_agent + src/ingestion/jaeger.rs."

[[mapped]]
name = "ingest-zipkin-v2"
upstream = "cmd/collector/app/handler.go (Zipkin v2 receiver)"
note = "Zipkin v2 JSON ingestion (POST /api/v2/spans) with kind→SpanKind mapping + endpoint.serviceName extraction; src/ingestion/zipkin.rs."

[[mapped]]
name = "ingest-opencensus"
upstream = "cmd/collector/app/handler.go (OpenCensus receiver)"
note = "OpenCensus JSON ingestion (POST /oc/v1/traces) with attribute-map normalization + status-code → SpanStatus translation; src/ingestion/opencensus.rs."

[[mapped]]
name = "propagation-w3c-b3-jaeger"
upstream = "internal/jaegerclientenv2otel/headers.go"
note = "W3C trace-context (traceparent/tracestate) + B3 single+multi headers + Jaeger uber-trace-id; parse_traceparent / parse_tracestate + extract_or_new / inject; src/propagation.rs."

[[mapped]]
name = "traceql-engine"
upstream = "(Tempo-compat extension)"
note = "TraceQL lexer + parser + AST + executor over in-memory store; filters / aggregates / span-set ops; src/traceql.rs."

[[mapped]]
name = "service-performance-monitoring"
upstream = "internal/jptrace/processor/spanmetrics/spanmetrics.go"
note = "SPM RED metrics (request rate / error rate / duration percentiles) per service/operation with sliding window aggregation; src/spm.rs::SpmRegistry."

[[mapped]]
name = "adjuster-anonymizer-pipeline"
upstream = "model/adjuster/adjuster.go + cmd/anonymizer/app/anonymizer/anonymizer.go"
note = "Adjuster pipeline (deduplicate / normalize spans) + PII anonymizer (hash/scrub user.* + http.url query params + db.statement values); src/analyzer.rs + src/correlation.rs + src/comparison.rs."

# ─── Partial subsystems (2) ──────────────────────────────────────────────────

[[partial]]
name = "storage-pluggable-trait"
upstream = "storage/spanstore/interface.go"
note = "TraceStore surface is in place but only the memory backend is implemented in-tree. Operational backends (cassandra/es/badger/kafka/grpc) cut from MVP — see [[skipped]] + [[scope_cuts]]."

[[partial]]
name = "clientcfg-remote-sampler"
upstream = "pkg/clientcfg + cmd/agent/app/configmanager"
note = "reqwest-based client for fetching remote sampler strategy is present (used by AdaptiveSampler), but the server-side strategy distribution endpoint (jaeger-agent → SDK fetch) is not exposed."

# ─── Skipped subsystems (13 — out of MVP scope) ──────────────────────────────

[[skipped]]
name = "storage-cassandra"
upstream = "plugin/storage/cassandra"
reason = "Operational backend — requires cave-cassandra crate (not in workspace). In-memory store covers MVP; long-term ops backend routes via cave-store Phase 3 (BoltDB or S3 chunks)."

[[skipped]]
name = "storage-elasticsearch"
upstream = "plugin/storage/es"
reason = "Operational backend — depends on cave-search Manticore port. Deferred to Phase 3 obs-LTS unification."

[[skipped]]
name = "storage-badger"
upstream = "plugin/storage/badger"
reason = "Embedded LSM store. In-memory + retention GC covers MVP; Badger-equivalent embedded path can target cave-store sled-shim in Phase 3."

[[skipped]]
name = "storage-kafka"
upstream = "plugin/storage/kafka"
reason = "Async durable buffer between collector + ingester. cave-streams provides the workspace Kafka surface; bridge crate (cave-trace ↔ cave-streams) is Phase 3."

[[skipped]]
name = "storage-grpc-remote"
upstream = "plugin/storage/grpc"
reason = "Out-of-process gRPC storage plugin host. cave-trace runs in-process inside cave-runtime; gRPC remote-plugin protocol is operational not API surface."

[[skipped]]
name = "storage-scylladb"
upstream = "plugin/storage/scylladb"
reason = "Cassandra-protocol-compatible store. Same rationale as storage-cassandra; one would imply the other."

[[skipped]]
name = "storage-blackhole"
upstream = "plugin/storage/blackhole"
reason = "Null sink for benchmarking. TraceStore default + retention=0 covers the same need; standalone backend not warranted."

[[skipped]]
name = "cmd-ingester-binary"
upstream = "cmd/ingester"
reason = "Standalone Kafka consumer binary draining storage-kafka into a span store. Skipped jointly with storage-kafka — Phase 3 cave-streams bridge."

[[skipped]]
name = "cmd-remote-storage-binary"
upstream = "cmd/remote-storage"
reason = "Standalone gRPC plugin host. Skipped jointly with storage-grpc-remote."

[[skipped]]
name = "cmd-tracegen-binary"
upstream = "cmd/tracegen"
reason = "Load-test generator that emits synthetic traces. tests/qwen_drafted.rs + parity_self_audit cover the in-process equivalent; standalone binary not warranted in cave-runtime."

[[skipped]]
name = "es-tooling"
upstream = "cmd/es-index-cleaner + cmd/es-rollover + cmd/esmapping-generator"
reason = "Elasticsearch-specific operational tooling. Out of scope without storage-elasticsearch."

[[skipped]]
name = "sampling-leader-election"
upstream = "plugin/sampling/leaderelection"
reason = "Distributed sampling coordination across collector replicas — requires cave-ha shared-state coordination. Phase 3 deferred."

[[skipped]]
name = "jaeger-v2-otel-binary"
upstream = "cmd/jaeger"
reason = "Jaeger v2 OTel-collector-based binary (separate code path from v1 query/collector). cave-trace targets the v1 API surface contract; v2 wrapper is operational packaging."

# ─── Unmapped subsystems (2 — honest gaps, Phase 3) ──────────────────────────

[[unmapped]]
name = "agent-grpc-forwarder"
upstream = "cmd/agent/app/reporter/grpc/reporter.go"
note = "Jaeger agent's gRPC forwarder to collector (agent batches UDP spans then ships via gRPC). cave-trace's embedded UDP agent writes directly into the in-process TraceStore so the gRPC forwarder hop is structurally unnecessary today — but a future deployment that splits agent + collector across hosts would need it."

[[unmapped]]
name = "storage-archival"
upstream = "storage/spanstore/composite/composite.go (archival second writer)"
note = "Secondary archival writer (warm store → cold store) that mirrors traces to a second backend for long-term retention. cave-trace exposes only one TraceStore today; archival composition would land alongside cave-store integration in Phase 3."

# ─── Scope cuts (deliberate Phase 3 deferrals) ───────────────────────────────

[[scope_cuts]]
group = "operational-storage-backends"
reason = "cassandra / elasticsearch / badger / kafka / grpc-remote / scylladb / blackhole are operational deployment surfaces — cave-trace covers them in [[skipped]] (7 entries). MVP routes operational storage through cave-store (S3 surface) in Phase 3."
phase = "Phase 3 — cave-store / cave-search / cave-streams integration"

[[scope_cuts]]
group = "standalone-cli-binaries"
reason = "cmd/ingester + cmd/remote-storage + cmd/tracegen + es-tooling are standalone binaries — cave-trace runs inside cave-runtime, not as separate processes. Their data-plane behaviors map to in-process functions."
phase = "Phase 3 — only if cave-runtime composition demands process splits"

