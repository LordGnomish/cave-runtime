upstream = "model/span.go"
note = "Span / SpanContext / SpanKind / SpanStatus / Reference / SpanRef. OTel-compatible primitives in src/types.rs."

[[mapped]]
name = "trace-model"
upstream = "model/trace.go"
note = "Trace + TraceId + ProcessId + tag-value coercion (TagValue { String, Int64, Float64, Bool, Bytes })."

[[mapped]]
name = "in-memory-span-store"
upstream = "plugin/storage/memory/memory.go"
note = "ColumnarTrace + TraceRecord + Bloom filter + retention GC + per-tenant cap; src/storage.rs."

[[mapped]]
name = "dependency-store"
upstream = "storage/dependencystore/interface.go"
note = "Service dependency graph extraction (caller→callee edges + call_count) from span Reference::ChildOf chains; src/dependency.rs."

[[mapped]]
name = "collector-http-handler"
upstream = "cmd/collector/app/handler.go"
note = "Span ingestion handler routing into TraceStore::ingest_spans; src/collector.rs + src/routes/ingest.rs."

[[mapped]]
name = "query-service"
upstream = "cmd/query/app/querysvc/query_service.go"
