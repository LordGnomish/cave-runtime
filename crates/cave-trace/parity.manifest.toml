# parity.manifest.toml — cave-trace
# Upstream: jaegertracing/jaeger  https://github.com/jaegertracing/jaeger  pinned v1.52.0
#
# cave-trace ingests traces in the OTLP/Zipkin/Jaeger/OpenCensus formats,
# stores them in an in-memory store, and exposes both the Jaeger query API
# and a Tempo-compatible search/TraceQL surface.

[upstream]
org     = "jaegertracing"
repo    = "jaeger"
version = "v1.52.0"
name    = "Jaeger"
license = "Apache-2.0"
language= "Go"
url     = "https://github.com/jaegertracing/jaeger"

[parity]
ratio       = 0.0        # honest: 0.0 means upstream parity NOT yet measured
last_audit  = "2026-05-12"
infra_only  = false
[module]
name        = "cave-trace"
description = "Distributed tracing — Jaeger reimplementation + OTLP/Zipkin/OpenCensus ingestion + Tempo TraceQL search"
source_root = "src"

