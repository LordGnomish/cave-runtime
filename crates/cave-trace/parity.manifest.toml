# parity.manifest.toml — cave-trace
# Upstream: jaegertracing/jaeger  https://github.com/jaegertracing/jaeger
# Skeleton generated by cave parity init — fill in the mapping sections

[upstream]
org     = "jaegertracing"
repo    = "jaeger"
version = "v1.52.0"

[module]
name        = "cave-trace"
description = "Distributed tracing — Jaeger replacement"
source_root = "src"

# ── File mappings ────────────────────────────────────────────────────────────
# [[files]]
# upstream = "path/in/upstream/repo.go"
# local    = "src/local.rs"

# ── Function mappings ────────────────────────────────────────────────────────
# [[functions]]
# upstream_name = "UpstreamFunc"
# local_name    = "local_fn"
# file          = "src/routes.rs"

# ── Test mappings ────────────────────────────────────────────────────────────
# [[tests]]
# upstream_test = "TestUpstreamFunc"
# local_test    = "test_local_fn"

# ── Surface mappings ─────────────────────────────────────────────────────────
# [[surfaces]]
# kind          = "http"
# upstream_path = "/api/upstream"
# local_path    = "/api/trace/endpoint"
