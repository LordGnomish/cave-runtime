upstream = "plugin/sampling/strategystore/static/strategy_store.go"
note = "Constant + Probabilistic + RateLimiting strategy stores; src/sampling.rs (ConstantSampler, ProbabilisticSampler, RateLimitingSampler)."

[[mapped]]
