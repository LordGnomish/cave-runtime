# parity.manifest.toml — cave-llm-gateway
# Upstream: BerriAI/litellm  https://github.com/BerriAI/litellm
# Skeleton generated by cave parity init — fill in the mapping sections

[upstream]
org     = "BerriAI"
repo    = "litellm"
version = "v1.0.0"

[module]
name        = "cave-llm-gateway"
description = "LLM gateway — LiteLLM replacement"
source_root = "src"

