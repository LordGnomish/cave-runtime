# parity.manifest.toml — cave-llm-gateway
# Upstream: BerriAI/litellm  https://github.com/BerriAI/litellm  pinned v1.0.0
#
# Cave-llm-gateway implements an OpenAI-compatible LLM proxy: chat
# completions (incl. SSE streaming), model alias routing, multi-provider
# registry, per-consumer API keys + rate limits + budgets + cost tracking,
# response cache, structured request logs, and guardrails.

[upstream]
org     = "BerriAI"
repo    = "litellm"
version = "v1.0.0"
name    = "LiteLLM"
license = "MIT"
language= "Python"
url     = "https://github.com/BerriAI/litellm"

[parity]
ratio       = 0.0        # honest: 0.0 means upstream parity NOT yet measured
last_audit  = "2026-05-12"
infra_only  = false
[module]
name        = "cave-llm-gateway"
description = "LLM gateway — LiteLLM parity (OpenAI-compatible /v1/chat/completions, aliases, providers, keys/rate-limits/budgets, cache, logs, guardrails)"
source_root = "src"

# ── File mappings ────────────────────────────────────────────────────────────

[[files]]
upstream = "litellm/proxy/proxy_server.py"
local    = "src/lib.rs"

[[files]]
upstream = "litellm/types/utils.py"
local    = "src/models.rs"

[[files]]
upstream = "litellm/router.py"
local    = "src/router.rs"

[[files]]
upstream = "litellm/llms/openai.py"
local    = "src/openai.rs"

[[files]]
upstream = "litellm/llms/base.py"
local    = "src/provider.rs"

[[files]]
upstream = "litellm/proxy/auth/api_key_auth.py"
local    = "src/api_keys.rs"

[[files]]
upstream = "litellm/proxy/management_endpoints/team_endpoints.py"
local    = "src/alias.rs"

[[files]]
upstream = "litellm/proxy/spend_tracking/spend_tracking_utils.py"
local    = "src/cost.rs"

[[files]]
upstream = "litellm/proxy/utils/budget_check.py"
local    = "src/budget.rs"

[[files]]
upstream = "litellm/caching.py"
local    = "src/cache.rs"

[[files]]
upstream = "litellm/proxy/hooks/parallel_request_limiter.py"
local    = "src/rate_limit.rs"

[[files]]
upstream = "litellm/proxy/db/log_store.py"
local    = "src/logging.rs"

[[files]]
upstream = "litellm/proxy/guardrails/guardrail_helpers.py"
local    = "src/guardrails.rs"

[[files]]
upstream = "litellm/utils.py"
local    = "src/streaming.rs"

[[files]]
upstream = "litellm/proxy/management_endpoints/internal_user_endpoints.py"
local    = "src/store.rs"

[[files]]
upstream = "litellm/proxy/proxy_routes.py"
local    = "src/routes.rs"

[[files]]
upstream = "litellm/exceptions.py"
local    = "src/error.rs"

