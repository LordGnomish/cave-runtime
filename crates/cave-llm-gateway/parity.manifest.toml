# parity.manifest.toml — cave-llm-gateway
# Upstream: BerriAI/litellm  https://github.com/BerriAI/litellm  pinned v1.85.1
#
# cave-llm-gateway is an OpenAI-compatible LLM proxy with:
#   - Provider trait + concrete backends (Ollama / llama.cpp / MLX / Anthropic /
#     OpenAI / Mistral / generic OpenAI-compat)
#   - Keychain-resolved SaaS keys (macOS `security` + env-var fallback)
#   - Capability-based router (context / tools / vision / locality / cost)
#   - Cost ledger + response cache + exponential-backoff retry
#   - Prometheus-format exposition compatible with cave-metrics scrape
#   - Aggregate health probe + cave-hermes MultiGateway bridge
#   - cave-llm-tracker bench wire + cavectl `llm-gateway` subcommand

[upstream]
org      = "BerriAI"
repo     = "litellm"
version  = "v1.85.1"
name     = "LiteLLM"
license  = "MIT"
language = "Python"
url      = "https://github.com/BerriAI/litellm"

[parity]
ratio                = 1.0
fill_ratio           = 1.0
honest_ratio         = 0.5532
parity_ratio_source  = "manifest"
last_audit           = "2026-05-31"
source_sha           = "f9c2a417a530a8369aeed96d259992040739c0f0"
infra_only           = false
mapped_count         = 26
partial_count        = 2
skipped_count        = 19
unmapped_count       = 0
total                = 47

[module]
name        = "cave-llm-gateway"
description = "LLM gateway — LiteLLM parity (OpenAI-compatible /v1/chat/completions, providers, capability router, keys/rate-limits, cache, cost, metrics, health, hermes+tracker integrations)"
source_root = "src"

