# parity.manifest.toml — cave-cluster
# Upstream: kubernetes-sigs/cluster-api  https://github.com/kubernetes-sigs/cluster-api  pinned v1.6.0
#
# Cave-cluster implements multi-cluster lifecycle management — provisioning,
# upgrades, node pools, addons, RBAC, kubeconfig generation, multi-tenancy,
# and federated operations across registered clusters.

[upstream]
org     = "kubernetes-sigs"
repo    = "cluster-api"
version = "v1.6.0"

[module]
name        = "cave-cluster"
description = "Multi-cluster lifecycle — Cluster-API parity (provision, upgrade, node pools, addons, RBAC, kubeconfig, tenants)"
source_root = "src"

# ── File mappings ────────────────────────────────────────────────────────────

[[files]]
upstream = "main.go"
local    = "src/lib.rs"

[[files]]
upstream = "api/v1beta1/cluster_types.go"
local    = "src/cluster.rs"

[[files]]
upstream = "api/v1beta1/machine_types.go"
local    = "src/node.rs"

[[files]]
upstream = "api/v1beta1/machinedeployment_types.go"
