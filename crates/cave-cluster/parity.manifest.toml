# parity.manifest.toml — cave-cluster
# Upstream: kubernetes-sigs/cluster-api  https://github.com/kubernetes-sigs/cluster-api
# Skeleton generated by cave parity init — fill in the mapping sections

[upstream]
org     = "kubernetes-sigs"
repo    = "cluster-api"
version = "v1.6.0"

[module]
name        = "cave-cluster"
description = "Cluster lifecycle — Cluster API replacement"
source_root = "src"

# ── File mappings ────────────────────────────────────────────────────────────
# [[files]]
# upstream = "path/in/upstream/repo.go"
# local    = "src/local.rs"

# ── Function mappings ────────────────────────────────────────────────────────
# [[functions]]
# upstream_name = "UpstreamFunc"
# local_name    = "local_fn"
# file          = "src/routes.rs"

# ── Test mappings ────────────────────────────────────────────────────────────
# [[tests]]
# upstream_test = "TestUpstreamFunc"
# local_test    = "test_local_fn"

# ── Surface mappings ─────────────────────────────────────────────────────────
# [[surfaces]]
# kind          = "http"
# upstream_path = "/api/upstream"
# local_path    = "/api/cluster/endpoint"
