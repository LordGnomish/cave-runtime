local    = "src/health.rs"

[[files]]
upstream = "internal/runtime/cluster/cluster_routes.go"
local    = "src/routes.rs"

[[files]]
upstream = "exp/addons/api/v1beta1/clusterresourceset_types.go"
local    = "src/addons.rs"

[[files]]
upstream = "util/kubeconfig/kubeconfig.go"
