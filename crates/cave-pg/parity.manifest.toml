# parity.manifest.toml — cave-pg
# Upstream: pgbouncer/pgbouncer  https://github.com/pgbouncer/pgbouncer
# Skeleton generated by cave parity init — fill in the mapping sections

[upstream]
org     = "pgbouncer"
repo    = "pgbouncer"
version = "1.21.0"

[module]
name        = "cave-pg"
description = "PostgreSQL connection pooler — PgBouncer replacement"
source_root = "src"

