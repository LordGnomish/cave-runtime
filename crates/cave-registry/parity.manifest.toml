# parity.manifest.toml — cave-registry
# Upstream: goharbor/harbor  https://github.com/goharbor/harbor
# Skeleton generated by cave parity init — fill in the mapping sections

[upstream]
org     = "goharbor"
repo    = "harbor"
version = "v2.10.0"

[module]
name        = "cave-registry"
description = "Container registry — Harbor replacement"
source_root = "src"

# ── File mappings ────────────────────────────────────────────────────────────
# [[files]]
# upstream = "path/in/upstream/repo.go"
# local    = "src/local.rs"

# ── Function mappings ────────────────────────────────────────────────────────
# [[functions]]
# upstream_name = "UpstreamFunc"
# local_name    = "local_fn"
# file          = "src/routes.rs"

# ── Test mappings ────────────────────────────────────────────────────────────
# [[tests]]
# upstream_test = "TestUpstreamFunc"
# local_test    = "test_local_fn"

# ── Surface mappings ─────────────────────────────────────────────────────────
# [[surfaces]]
# kind          = "http"
# upstream_path = "/api/upstream"
# local_path    = "/api/registry/endpoint"
