# parity.manifest.toml — cave-keda
# Upstream: kedacore/keda  https://github.com/kedacore/keda
# Skeleton generated by cave parity init — fill in the mapping sections

[upstream]
org     = "kedacore"
repo    = "keda"
version = "v2.12.0"

[module]
name        = "cave-keda"
description = "Event-driven autoscaling — KEDA replacement"
source_root = "src"

