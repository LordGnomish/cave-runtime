# parity.manifest.toml — cave-keda
# Upstream: kedacore/keda  https://github.com/kedacore/keda  pinned v2.16.1
#
# cave-keda ports the KEDA event-driven autoscaler surface in pure Rust:
#   - ScaledObject + ScaledJob CRD models with cooldown/pause/idle/scaling-strategy
#   - Scaler trait + replicas_from_metric helper
#   - TriggerAuthentication (Secret + Env resolution + inline fallback)
#   - 16 scalers — CPU/Memory, Cron (with built-in 5-field validator),
#     HTTP (pending-request), Kafka (per-partition lag), Prometheus (value),
#     Redis (list/stream length), AWS SQS, Azure Service Bus, Azure
#     Event Hub, GCP Pub/Sub, NATS JetStream, Etcd, Datadog, RabbitMQ
#     (queue-length / message-rate), PostgreSQL (SQL query result)
#   - HPA generation (newHPAForScaledObject: external-metric specs, replica
#     bounds, paused pinning, scale-target ref) — extends the HPA path
#   - CloudEvents emission (operator-side event emitter: source/subject/type
#     format + structured-content envelope)
#   - ScalingModifiers formula evaluator (max / min / sum + activation_target)
#   - Hibernation schedules (cron-based weekday-locked windows)
#
# Out of MVP (see [[skipped]] below): full CEL expression engine
# (reuses cave-apiserver CEL when it lands), New Relic + Splunk +
# Dynatrace + Selenium Grid scalers (low-signal niches), CloudEvents-as-a-
# scaling-source (distinct from emission; waits on cave-knative eventing),
# WASM scaler plugin runtime (needs wasmtime).

[upstream]
org         = "kedacore"
repo        = "keda"
version     = "v2.16.1"
name        = "KEDA"
license     = "Apache-2.0"
language    = "Go"
url         = "https://github.com/kedacore/keda"
source_sha  = "v2.16.1"

[parity]
parity_ratio_source = "manifest"
fill_ratio          = 0.9615  # mapped / (mapped + partial + unmapped) = 25/26
honest_ratio        = 0.8065  # mapped / total = 25/31
last_audit          = "2026-06-07"
infra_only          = false
mapped_count        = 25
partial_count       = 1
skipped_count       = 5
unmapped_count      = 0
total               = 31

