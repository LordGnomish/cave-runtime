# parity.manifest.toml — cave-keda
# Upstream: kedacore/keda  https://github.com/kedacore/keda  pinned v2.16.1
#
# cave-keda ports the in-scope MVP surface of KEDA's event-driven
# autoscaler in pure Rust: ScaledObject + ScaledJob CRD models with
# cooldown/pause/idle/scaling-strategy semantics, the Scaler trait +
# replicas_from_metric helper, TriggerAuthentication (Secret + Env
# resolution + inline fallback), and 7 scalers — CPU/Memory, Cron
# (with built-in 5-field validator), HTTP (pending-request), Kafka
# (per-partition lag), Prometheus (value), Redis (list/stream
# length).
#
# Out of MVP (see [[skipped]] below): cloud-provider scalers
# (AWS/Azure/GCP/DataDog/NewRelic/Splunk/Dynatrace), WASM scaler
# runtime, ScalingModifiers expression engine, HPA-direct
# integration, CloudEvents source scaler.

[upstream]
org         = "kedacore"
repo        = "keda"
version     = "v2.16.1"
name        = "KEDA"
license     = "Apache-2.0"
language    = "Go"
url         = "https://github.com/kedacore/keda"
source_sha  = "v2.16.1"

[parity]
parity_ratio_source = "manifest"
fill_ratio          = 0.6537
honest_ratio        = 0.6537
last_audit          = "2026-05-19"
infra_only          = false
mapped_count        = 12
partial_count       = 0
skipped_count       = 12
unmapped_count      = 0
total               = 24

# fill_ratio derivation (Charter v2 honest measurement):
#   impl_lines               = 889  (cave-keda src/, excl #[cfg(test)] + blanks/comments)
#   upstream_in_scope_lines  = 1360 (sum of subsystem in-scope LOC, see below)
#   889 / 1360               = 0.6537
#
# Per-subsystem in-scope LOC against v2.16.1:
#   pkg/apis/keda/v1alpha1/scaledobject_types.go               200 / 220
#   pkg/apis/keda/v1alpha1/scaledjob_types.go                  150 / 175
#   pkg/apis/keda/v1alpha1/triggerauthentication_types.go       60 /  65
#   pkg/scaling/scaledobject_controller.go (cooldown subset)   200 / 600
#   pkg/scaling/scaledjob_controller.go (strategy subset)      150 / 400
#   pkg/scalers/scaler.go                                       80 /  80
#   pkg/scalers/cpu_memory_scaler.go                           100 / 150
#   pkg/scalers/cron_scaler.go                                 120 / 200
#   pkg/scalers/kafka_scaler.go (lag-only)                      80 / 600
#   pkg/scalers/prometheus_scaler.go (value-only)               60 / 250
#   pkg/scalers/redis_scaler.go (list/stream length)            80 / 350
#   pkg/scalers/external_scaler.go (HTTP add-on)                80 / 200
#  ─────────────────────────────────────
#  Total in-scope LOC                                        1 360 upstream

